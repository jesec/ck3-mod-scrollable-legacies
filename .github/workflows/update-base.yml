name: Update CK3 Mod Base

on:
  # Manual trigger
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force update even if version matches'
        required: false
        type: boolean
        default: false

  # Scheduled check (daily at 12:00 UTC)
  schedule:
    - cron: '0 12 * * *'

# Prevent concurrent runs
concurrency:
  group: ck3-update
  cancel-in-progress: false  # Let running job finish

# Required secrets:
# - STEAM_USERNAME: Your Steam username
# - STEAM_PASSWORD: Your Steam password
# - STEAM_TOTP_SECRET: Your Steam shared secret for TOTP generation

env:
  DEPOTDOWNLOADER_COMMIT: '007857c13fa3b32c30d20ee078dd6f1ea0075402'
  DOTNET_VERSION: '9.0.x'
  NODE_VERSION: '20.x'

jobs:
  update:
    # Only run on jesec/ck3-mod-base, not forks or other repos
    if: github.repository == 'jesec/ck3-mod-base'
    runs-on: ubuntu-latest
    timeout-minutes: 60  # Prevent infinite hangs

    permissions:
      contents: write  # For pushing commits

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1  # Only need latest commit
          fetch-tags: true  # Need existing base/* tags so we don't try to recreate them

      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.STEAM_USERNAME }}" ]; then
            echo "❌ STEAM_USERNAME secret is not set"
            echo "::error::STEAM_USERNAME secret must be configured in repository settings"
            exit 1
          fi
          if [ -z "${{ secrets.STEAM_PASSWORD }}" ]; then
            echo "❌ STEAM_PASSWORD secret is not set"
            echo "::error::STEAM_PASSWORD secret must be configured in repository settings"
            exit 1
          fi
          if [ -z "${{ secrets.STEAM_TOTP_SECRET }}" ]; then
            echo "❌ STEAM_TOTP_SECRET secret is not set"
            echo "::error::STEAM_TOTP_SECRET secret must be configured in repository settings"
            exit 1
          fi
          echo "✅ Secrets validated"

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: base/scripts/automation/package-lock.json

      - name: Install Node dependencies
        run: npm ci
        working-directory: base/scripts/automation

      - name: Cache DepotDownloader binary
        id: cache-depot
        uses: actions/cache@v4
        with:
          path: /tmp/depotdownloader
          # Cache key includes both commit hash AND patch file hash
          key: depotdownloader-${{ env.DEPOTDOWNLOADER_COMMIT }}-${{ hashFiles('base/scripts/automation/depotdownloader.patch') }}

      - name: Build patched DepotDownloader
        if: steps.cache-depot.outputs.cache-hit != 'true'
        run: |
          set -e  # Exit on any error

          echo "📦 Cloning DepotDownloader at commit $DEPOTDOWNLOADER_COMMIT..."
          # Clone full repo to access specific commit (can't use --depth with old commits)
          git clone https://github.com/SteamRE/DepotDownloader.git /tmp/depot-repo
          cd /tmp/depot-repo

          echo "🔍 Checking out specific commit..."
          git checkout $DEPOTDOWNLOADER_COMMIT

          echo "🔧 Validating patch..."
          if ! git apply --check $GITHUB_WORKSPACE/base/scripts/automation/depotdownloader.patch 2>&1; then
            echo "❌ Patch failed validation!"
            echo "::error::Patch file does not apply cleanly to commit $DEPOTDOWNLOADER_COMMIT"
            git apply --check $GITHUB_WORKSPACE/base/scripts/automation/depotdownloader.patch || true
            exit 1
          fi

          echo "🔧 Applying 2FA authentication patch..."
          git apply $GITHUB_WORKSPACE/base/scripts/automation/depotdownloader.patch

          echo "🏗️  Building DepotDownloader..."
          dotnet publish DepotDownloader/DepotDownloader.csproj \
            --configuration Release \
            -p:PublishSingleFile=true \
            -p:DebugType=embedded \
            --self-contained \
            --runtime linux-x64 \
            --output /tmp/depotdownloader

          if [ ! -f /tmp/depotdownloader/DepotDownloader ]; then
            echo "❌ Build failed - binary not found"
            exit 1
          fi

          echo "✅ DepotDownloader built successfully"
          ls -lh /tmp/depotdownloader/DepotDownloader

      - name: Add DepotDownloader to PATH
        run: |
          if [ ! -f /tmp/depotdownloader/DepotDownloader ]; then
            echo "❌ DepotDownloader binary not found (cache/build issue)"
            exit 1
          fi
          chmod +x /tmp/depotdownloader/DepotDownloader
          echo "/tmp/depotdownloader" >> $GITHUB_PATH

      - name: Check via Steam PICS
        id: check
        run: |
          set -e
          # Anonymous PICS query — compares public-branch manifest GIDs against
          # base/.ck3-version.json and enumerates Paradox-published historical
          # branches newer than our stored version.
          # Writes to $GITHUB_OUTPUT: needs_update, current_version,
          # public_buildid, changed_depots, intermediate_versions.
          node "$GITHUB_WORKSPACE/base/scripts/automation/index.js" check \
            "$GITHUB_WORKSPACE/base/.ck3-version.json"

      - name: Plan branches to fetch
        id: plan
        run: |
          FORCE="${{ github.event.inputs.force_update }}"
          NEEDS="${{ steps.check.outputs.needs_update }}"
          INTERMEDIATE="${{ steps.check.outputs.intermediate_versions }}"

          if [ "$FORCE" = "true" ]; then
            echo "🔄 Force update requested — will re-fetch public only (no backfill)"
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "intermediate=" >> $GITHUB_OUTPUT
          elif [ "$NEEDS" = "true" ]; then
            if [ -n "$INTERMEDIATE" ]; then
              echo "🆕 Update available; backfilling: $INTERMEDIATE → public"
            else
              echo "🆕 Update available; fetching public"
            fi
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "intermediate=$INTERMEDIATE" >> $GITHUB_OUTPUT
          else
            echo "✅ Already up to date"
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Free up disk space
        if: steps.plan.outputs.should_run == 'true'
        run: |
          echo "🧹 Freeing up disk space..."
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h

      - name: Download, parse, extract, commit each missing version
        if: steps.plan.outputs.should_run == 'true'
        env:
          STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
          STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}
          STEAM_TOTP_SECRET: ${{ secrets.STEAM_TOTP_SECRET }}
        run: |
          set -e
          AUTOMATION_DIR="$GITHUB_WORKSPACE/base/scripts/automation"
          BASE_DIR="$GITHUB_WORKSPACE/base"
          RELEASE_NOTES_DIR="$BASE_DIR/release-notes"

          git config user.name "CK3 Bot"
          git config user.email "bot@ck3.local"

          CURRENT_BRANCH=$(git branch --show-current)
          if [ -z "$CURRENT_BRANCH" ]; then
            echo "::error::Detached HEAD state — cannot push"
            exit 1
          fi

          INTERMEDIATE="${{ steps.plan.outputs.intermediate }}"
          # Build the queue: each intermediate branch name, then '' for public.
          BRANCHES=()
          if [ -n "$INTERMEDIATE" ]; then
            IFS=',' read -r -a BRANCHES <<< "$INTERMEDIATE"
          fi
          BRANCHES+=('')  # empty string = public branch

          for BRANCH in "${BRANCHES[@]}"; do
            LABEL="${BRANCH:-public}"
            echo "::group::Processing $LABEL"

            DOWNLOAD_DIR="/tmp/ck3-download-${LABEL//\//_}"

            # Download
            cd "$AUTOMATION_DIR"
            if [ -n "$BRANCH" ]; then
              node index.js download latest "$DOWNLOAD_DIR" "$BRANCH"
            else
              node index.js download latest "$DOWNLOAD_DIR"
            fi

            if [ ! -d "$DOWNLOAD_DIR/game" ]; then
              echo "::error::Download did not produce expected $DOWNLOAD_DIR/game directory"
              exit 1
            fi

            # Parse (writes base/.ck3-version.json and release notes)
            node index.js parse "$DOWNLOAD_DIR" "$BASE_DIR" "$RELEASE_NOTES_DIR"

            if [ ! -f "$BASE_DIR/.ck3-version.json" ]; then
              echo "::error::Parse did not produce $BASE_DIR/.ck3-version.json"
              exit 1
            fi

            # Extract (replaces base/game)
            rm -rf "$BASE_DIR/game"
            node index.js extract "$DOWNLOAD_DIR/game" "$BASE_DIR/game"

            # Stage changes; skip commit if nothing actually changed on disk
            cd "$GITHUB_WORKSPACE"
            git add -A
            if git diff --cached --quiet; then
              echo "ℹ️  No file changes after fetching $LABEL — skipping commit"
              rm -rf "$DOWNLOAD_DIR"
              echo "::endgroup::"
              continue
            fi
            git diff --cached --stat | tail -5

            # Read the canonical version from the game's own metadata
            VERSION=$(jq -r '.version' base/.ck3-version.json)
            VERSION_NAME=$(jq -r '.version_name // "Unknown"' base/.ck3-version.json)
            RELEASE_DATE=$(jq -r '.release_notes.date // ""' base/.ck3-version.json)

            if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
              echo "::error::Could not read version from base/.ck3-version.json"
              exit 1
            fi

            # Tag hierarchy
            IFS='.' read -r -a parts <<< "$VERSION"
            NORMALIZED_VERSION="${parts[0]:-0}.${parts[1]:-0}.${parts[2]:-0}.${parts[3]:-0}"
            MINOR_SERIES="${parts[0]:-0}.${parts[1]:-0}.${parts[2]:-0}"
            MAJOR_SERIES="${parts[0]:-0}.${parts[1]:-0}"
            REFRESH_SERIES="${parts[0]:-0}"

            COMMIT_MSG="Version $VERSION ($VERSION_NAME)"$'\n\n'"Released $RELEASE_DATE"$'\n\n'"See release notes for details."
            git commit -m "$COMMIT_MSG"

            # Exact version tag: create once, never move
            if git rev-parse "base/$NORMALIZED_VERSION" >/dev/null 2>&1; then
              echo "   base/$NORMALIZED_VERSION exists, skipping exact tag"
            else
              git tag -a "base/$NORMALIZED_VERSION" -m "CK3 $VERSION ($VERSION_NAME)"
            fi
            # Floating series tags: force-update to point to this commit
            git tag -af "base/$MINOR_SERIES"   -m "CK3 $VERSION ($VERSION_NAME) - latest patch in $MINOR_SERIES series"
            git tag -af "base/$MAJOR_SERIES"   -m "CK3 $VERSION ($VERSION_NAME) - latest minor in $MAJOR_SERIES series"
            git tag -af "base/$REFRESH_SERIES" -m "CK3 $VERSION ($VERSION_NAME) - latest major in refresh $REFRESH_SERIES"

            # Push this iteration immediately — partial failures shouldn't cost re-downloads
            git pull --rebase origin "$CURRENT_BRANCH" || git pull --no-rebase origin "$CURRENT_BRANCH"
            git push origin "$CURRENT_BRANCH" \
              "refs/tags/base/$NORMALIZED_VERSION" \
              "+refs/tags/base/$MINOR_SERIES" \
              "+refs/tags/base/$MAJOR_SERIES" \
              "+refs/tags/base/$REFRESH_SERIES"

            echo "✅ $VERSION ($LABEL) committed and pushed"
            rm -rf "$DOWNLOAD_DIR"
            echo "::endgroup::"
          done

      - name: Cleanup
        if: always()
        run: |
          rm -rf /tmp/depot-repo /tmp/ck3-download-*
          echo "🧹 Cleanup complete"

      - name: Summary
        if: always()
        run: |
          echo "## CK3 Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Stored version (before run)**: ${{ steps.check.outputs.current_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Public buildid**: ${{ steps.check.outputs.public_buildid }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Update needed**: ${{ steps.check.outputs.needs_update }}" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.check.outputs.intermediate_versions }}" ]; then
            echo "- **Intermediate branches backfilled**: ${{ steps.check.outputs.intermediate_versions }}" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -n "${{ steps.check.outputs.changed_depots }}" ]; then
            echo "- **Changed depots**: ${{ steps.check.outputs.changed_depots }}" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f base/.ck3-version.json ]; then
            FINAL_VERSION=$(jq -r '.version' base/.ck3-version.json)
            echo "- **Stored version (after run)**: $FINAL_VERSION" >> $GITHUB_STEP_SUMMARY
          fi
