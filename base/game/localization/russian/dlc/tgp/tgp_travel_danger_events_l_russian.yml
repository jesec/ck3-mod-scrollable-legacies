l_russian:
 tgp_travel_danger_events.0001.t: "Жизнь среди руин"
 tgp_travel_danger_events.0001.intro: "Путешествуя через владение [ROOT.Char.GetCurrentLocation.GetName], я повсюду наблюдаю последствия ужасных разрушений. Несомненно, это всё [disaster_situation.GetType.GetNameNoTooltip|l]."
 tgp_travel_danger_events.0001.flood: "Речные берега усыпаны мусором. В воде плавают целые дома, подобно листьям дерева, упавшим в ручей. Яростный поток смыл с лица земли целую деревню."
 tgp_travel_danger_events.0001.earthquake: "Некогда процветавшая деревня, окруженная плодородными полями, лежит в запустении, наполовину поглощенная землей."
 tgp_travel_danger_events.0001.desc: "\n\nВыехав на окраину разрушенного городка, я замечаю в развалинах [Select_CString(peasant_character_child.IsFemale, 'одинокую маленькую девочку', 'одинокого маленького мальчика' )]. [peasant_character_child.GetSheHe|U] копошится среди обломков, безнадежно пытаясь восстановить руины крестьянского дома. Кажется, [Select_CString(peasant_character_child.IsFemale, 'девочка', 'мальчик' )] меня не замечает."
 tgp_travel_danger_events.0001.a: "Пусть мои люди расчистят завалы."
 tgp_travel_danger_events.0001.b: "Я возьму [Select_CString(peasant_character_child.IsFemale, 'бедняжку', 'беднягу' )] под свое крыло."
 tgp_travel_danger_events.0001.c: "Мне не до того!"
 impressed_by_kindness: "Впечатление от проявленной доброты"
