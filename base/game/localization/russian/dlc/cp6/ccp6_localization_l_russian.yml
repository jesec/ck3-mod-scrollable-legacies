l_russian:
 #St Peter's Basilica
 building_type_holy_site_st_peters_basilica_01: "$building_holy_site_st_peters_basilica_01$"
 building_type_holy_site_st_peters_basilica_01_desc: "$building_holy_site_st_peters_basilica_01_desc$"
 building_holy_site_st_peters_basilica_01: "Собор Святого Петра"
 building_holy_site_st_peters_basilica_01_desc: "Собор Святого Петра был построен на месте гробницы святого Петра на Ватиканском холме по приказу императора Константина I после его обращения в христианство и служит центром западного христианского мира.\n\nТрадиционно он является резиденцией римско-католического папы и с течением веков превратился в обширный комплекс, защищенный Леонинской стеной."
 #Mont-Saint-Michel
 building_type_mont_st_michel_01: "Мон-Сен-Мишель"
 building_type_mont_st_michel_01_desc: "$building_mont_st_michel_01_desc$"
 building_mont_st_michel_01: "Часовня святого Обера, посвященная святому Михаилу"
 building_mont_st_michel_01_desc: "В 708 году святой Обер, епископ Авранша, увидел во сне Архангела Михаила, повелевшего ему построить часовню на близлежащем приливном острове. Сначала Обер проигнорировал это видение, приписав его проискам дьявола. В конце концов Архангелу удалось его убедить — по легенде, проткнув ему череп перстом, — и епископ приказал построить новое святилище на Могильной горе. \n\nТак начинается история Мон-Сен-Мишеля."
 building_mont_st_michel_02: "Романское аббатство на острове Мон-Сен-Мишель"
 building_mont_st_michel_02_desc: "Новая церковь аббатства расположена на самой высокой точке острова, олицетворяя собой власть бога над всем, что есть на небе и на земле, а также изобретательность человечества. \n\nПод аббатством постепенно растет небольшой городок паломников и рыбаков."
 building_mont_st_michel_03: "Комплекс «Чудо»"
 building_mont_st_michel_03_desc: "Аббатство было расширено за счет ряда внутренних дворов, помещения для капелланов, винного погреба, рыцарского зала и многочисленных жилых помещений. Получившийся в результате готический комплекс можно описать только как чудо инженерной мысли. \n\nАббатство обзавелось внушительными новыми укреплениями, а поселение под ним теперь представляет собой настоящий город, в котором проживает множество паломников и местных жителей."
 building_mont_st_michel_04: "Укрепленный монастырь на острове Мон-Сен-Мишель"
 building_mont_st_michel_04_desc: "Недавние войны ясно показали, что даже такой мирный остров, как Мон-Сен-Мишель, может представлять собой важнейший стратегический пункт. Поэтому скала была основательно укреплена массивными стенами и бастионами, а для гарнизона было построено несколько новых жилых помещений. \n\nПрибрежный город сейчас представляет собой оживленный мегаполис: почти весь остров застроен домами."
 #Sanchi Stupa
 building_type_sanchi_stupa_01: "$building_sanchi_stupa_01$"
 building_type_sanchi_stupa_01_desc: "$building_sanchi_stupa_01_desc$"
 building_sanchi_stupa_01: "Большая ступа в Санчи"
 building_sanchi_stupa_01_desc: "Большая ступа была построена императором Маурьев Ашокой в ​​III веке до нашей эры, недалеко от места его свадьбы с женой Деви. Это грандиозное сооружение, в котором хранятся реликвии Будды, является одним из старейших в своем роде и славится искусно вырезанными воротами-торанами."
 #Boudhanath
 building_type_boudhanath_01: "$building_boudhanath_01$"
 building_type_boudhanath_01_desc: "$building_boudhanath_01_desc$"
 building_boudhanath_01: "Боднатх"
 building_boudhanath_01_desc: "Буддийская ступа в Катманду, также известная как Джарун Кашор и Кхаса Чайтья, является одной из крупнейших ступ в буддизме и, возможно, местом зарождения тибетской ветви этой религии. В ее огромном куполе и мандале хранятся останки множества будд и бесчисленные священные реликвии различных форм и размеров. \n\nСтупа расположена на древнем торговом пути между Непалом и Тибетом, поэтому путешественники и торговцы часто останавливаются здесь, чтобы отдохнуть и помолиться."
 #Grand Mosque of Yazd
 building_type_yazd_mosque_01: "$building_yazd_mosque_01$"
 building_type_yazd_mosque_01_desc: "$building_yazd_mosque_01_desc$"
 building_yazd_mosque_01: "Пятничная мечеть Йезда"
 building_yazd_mosque_01_desc: "Это величественное здание, построенное на месте храма огня IV века, поражает путешественников и паломников своими огромными айванами, черепичным куполом и величественным входным порталом с парой высоких минаретов."
 #Qutb Minar
 building_type_qutb_minar_01: "$building_qutb_minar_01$"
 building_type_qutb_minar_01_desc: "$building_qutb_minar_01_desc$"
 building_qutb_minar_01: "Железная колонна в Дели"
 building_qutb_minar_01_desc: "Могучая Железная колонна возвышается в Дели как символ славы короля Чандрагупты II, хотя свои имена увековечили на нем и его потомки. Хотя колонна стоит уже много лет, на ней нет ни следа ржавчины — и это лучшее свидетельство мастерства индийских кузнецов!"
 building_qutb_minar_02: "Кутб-Минар"
 building_qutb_minar_02_desc: "Кувват-уль-Ислам — величественная мечеть, во дворе которой стоит Железная колонна Дели, увенчана поистине огромным минаретом, называемым Кутб-Минар. \n\nВеликолепный памятник могуществу правителей Дели."
 building_qutb_minar_03: "Расширенная мечеть Кувват-уль-Ислам"
 building_qutb_minar_03_desc: "Комплекс вокруг Кутб-Минара был расширен за счет нескольких дополнительных дворов, ворот и мавзолеев и достиг легендарных масштабов."
 building_qutb_minar_04: "Алай-Минар"
 building_qutb_minar_04_desc: "К комплексу был пристроен второй минарет, спроектированный по образу Кутб-Минара, но вдвое большего размера. Этот возвышающийся над Дели колосс — вершина индо-исламской архитектуры."
