l_russian:
 #Goguryeo Tomb
 building_type_goguryeo_tomb_01: "$building_goguryeo_tomb_01$"
 building_type_goguryeo_tomb_01_desc: "$building_goguryeo_tomb_01_desc$"
 building_goguryeo_tomb_01: "Гробница царя Когурё"
 building_goguryeo_tomb_01_desc: "Эта величественная каменная усыпальница в форме прямоугольника, говорят, принадлежит древнему царю государства Когурё, имя которого не дошло до наших дней. Проходы, ведущие к погребальному залу, украшены пестрыми фресками, а на вершине пирамиды возвышается деревянный павильон в честь усопшего."
 #Great Buddha of Kamakura
 building_type_buddha_kamakura_01: "$building_buddha_kamakura_01$"
 building_type_buddha_kamakura_01_desc: "$building_buddha_kamakura_01_desc$"
 building_buddha_kamakura_01: "Большой Будда Камакуры"
 building_buddha_kamakura_01_desc: "#italic Дайбуцу#! Камакуры — это древняя бронзовая статуя Будды Амитабхи весом в несколько десятков тонн, украшенная золочеными узорами. Она находится в просторном павильоне, возведенном по примеру юго-западных храмов, и окружена тридцатью двумя лепестками лотоса."
 #Lingapura Pyramid
 building_type_pyramid_lingapura_01: "$building_pyramid_lingapura_01$"
 building_type_pyramid_lingapura_01_desc: "$building_pyramid_lingapura_01_desc$"
 building_pyramid_lingapura_01: "Пирамида Лингапуры"
 building_pyramid_lingapura_01_desc: "Эта величественная ступенчатая пирамида возвышается над джунглями, подобно священной горе. На каждом из семи ее ярусов расположены всё более изощренные святилища и алтари. Пирамиду венчает святилище, в котором установлен священный #italic лингам#! Шивы — средоточие и центральная ось этого замысловатого религиозного сооружения."
 #Maijishan Grottoes
 building_type_maijishan_grottoes_01: "$building_maijishan_grottoes_01$"
 building_type_maijishan_grottoes_01_desc: "$building_maijishan_grottoes_01_desc$"
 building_maijishan_grottoes_01: "Пещерные храмы Майцзишань"
 building_maijishan_grottoes_01_desc: "Гора Майцзишань испокон веков была местом поклонения. На ее южных склонах, что считаются благодатными в геомантическом смысле, в красноватой скале высечены сотни святилищ. В них пребывают статуи и многоцветные фрески с ликами безмятежных будд и бодхисаттв. Многие из них созданы на пожертвования городских семей из окрестностей, которые устраивают сюда паломничества и используют это место как пространство для созерцательной медитации."
 #Three Pagodas of Dali
 building_type_three_pagodas_dali_01: "$building_three_pagodas_dali_01$"
 building_type_three_pagodas_dali_01_desc: "$building_three_pagodas_dali_01_desc$"
 building_three_pagodas_dali_01: "Три пагоды Дали"
 building_three_pagodas_dali_01_desc: "Среди обширного храмового комплекса правящей династии возвышаются три стройные пагоды с кирпичными стенами и каменными основаниями. Они образуют вершины равнобедренного треугольника, воплощая сакральную геометрию этого места и обрамляя окружающие горы и озеро."
 #Iron Lion of Cangzhou
 building_type_iron_lion_cangzhou_01: "$building_iron_lion_cangzhou_01$"
 building_type_iron_lion_cangzhou_01_desc: "$building_iron_lion_cangzhou_01_desc$"
 building_iron_lion_cangzhou_01: "Железный лев Цанчжоу"
 building_iron_lion_cangzhou_01_desc: "Этот исполинский лев — крупнейшая в Китае скульптура, полностью отлитая из железа. На его мощной спине покоится бодхисаттва, восседающий на лотосовом пьедестале и богато украшенный золотом. Воздвигнутый у равнины, что часто подвергается наводнениям, для местных жителей он стал хранителем, сдерживающим разгул водной стихии."
 #Gaocheng Observatory
 building_type_dengfeng_observatory_01: "$building_dengfeng_observatory_01$"
 building_type_dengfeng_observatory_01_desc: "$building_dengfeng_observatory_01_desc$"
 building_dengfeng_observatory_01: "Обсерватория Гаочэн"
 building_dengfeng_observatory_01_desc: "Благодаря своим геомантическим свойствам и символическому расположению в центре Китая это излюбленное место для астрономических наблюдений на протяжении многих веков. Нынешнее сооружение сложной трапециевидной формы служит гигантскими солнечными часами: тень от высокой центральной стелы ложится в желоб, разделяющий платформу, и отмечает путь солнца."
 #Candi of Muara Takus
 building_type_muara_takus_01: "$building_muara_takus_01$"
 building_type_muara_takus_01_desc: "$building_muara_takus_01_desc$"
 building_muara_takus_01: "Храмовый комплекс Муара-Такус"
 building_muara_takus_01_desc: "В состав этого храмового комплекса входит множество построек, которые возведены из кирпича и украшены деталями из песчаника. В центре высятся великие ступы #italic Махлигаи#! и #italic Туо#!: первая — высокая и стройная, вторая — обширная, словно гора, и возвышающаяся над окружающими ее малыми святилищами и террасами."
 #Stone Pagoda of Mireuksa
 building_type_stone_pagoda_01: "$building_stone_pagoda_01$"
 building_type_stone_pagoda_01_desc: "$building_stone_pagoda_01_desc$"
 building_stone_pagoda_01: "Каменная пагода Мирыкса"
 building_stone_pagoda_01_desc: "Девятиярусная пагода, возвышающаяся на широком каменном основании. Ее светлая кладка сияет под солнцем на фоне неба. Это первая из каменных пагод Кореи, и ее форма и сбалансированные пропорции стали образцом для строителей храмов по всему полуострову."
 #Thuriang Kilns
 building_type_thuriang_kilns_01: "$building_thuriang_kilns_01$"
 building_type_thuriang_kilns_01_desc: "$building_thuriang_kilns_01_desc$"
 building_thuriang_kilns_01: "Печи Тхурианга"
 building_thuriang_kilns_01_desc: "Более двух сотен крупных печей покрывают эту территорию, образуя крупнейший в регионе центр производства селадона. Обожженная здесь керамика славится своей грубоватой, твердой фактурой и характерной желтовато-зеленой глазурью. Ее можно встретить на рынках по всей Юго-Восточной Азии."
 #Yuelu Academy
 building_type_yuelu_academy_01: "$building_yuelu_academy_01$"
 building_type_yuelu_academy_01_desc: "$building_yuelu_academy_01_desc$"
 building_yuelu_academy_01: "Академия Юэлу"
 building_yuelu_academy_01_desc: "Одна из самых престижных академий Китая, Юэлу издавна служит центром учености и государственных экзаменов. В ее центре находится главный двор, от которого в строгой симметрии расходятся второстепенные залы и павильоны, где многие поколения ученых готовились к гражданской службе."
 #Chocolate Hills #NOTE: today are called "Chocolate" Hills, but of course chocolate didn't exist in the Philippines back then. This is a random name I thought out, but it is not based on native names (none of which seem to have survived from then)
 building_type_chocolate_hills_01: "$building_chocolate_hills_01$"
 building_type_chocolate_hills_01_desc: "$building_chocolate_hills_01_desc$"
 building_chocolate_hills_01: "Рыжие склоны"
 building_chocolate_hills_01_desc: "Это геологическое образование являет собой множество округлых конических холмов, равномерно распределенных по местности. Они покрыты травяным покровом, который в засушливое время года приобретает яркий буро-оранжевый оттенок, придавая земле необычный осенний румянец."
 #Fanfang of Guangzhou
 building_type_fanfang_guangzhou_01: "$building_fanfang_guangzhou_01$"
 building_type_fanfang_guangzhou_01_desc: "$building_fanfang_guangzhou_01_desc$"
 building_fanfang_guangzhou_01: "Фаньфан Гуанчжоу"
 building_fanfang_guangzhou_01_desc: "#italic Фаньфан#! — важная община иноземных купцов, в основном арабов-мусульман и персов, прибывших сюда морскими путями. Для них был выделен квартал к западу от города, со своими чиновниками и укладом. В его центре возвышается мечеть с красными стенами, увенчанная высоким минаретом, что также служит маяком, указывающим кораблям и душам путь в безопасную гавань."
 #Wilwatikta Palace
 building_type_wilwatikta_palace_01: "$building_wilwatikta_palace_01$"
 building_type_wilwatikta_palace_01_desc: "$building_wilwatikta_palace_01_desc$"
 building_wilwatikta_palace_01: "Дворец Вилватикта"
 building_wilwatikta_palace_01_desc: "Обширный дворцовый комплекс из павильонов, залов, храмов и дворов Вилватикта столь велик, что напоминает отдельный город. Прямоугольные кирпичные стены ограждают его владения, а вход на церемониальную аллею отмечен рядом исполинских ворот #italic падуракша#!."
 #Ha Long Bay
 building_type_ha_long_bay_01: "$building_ha_long_bay_01$"
 building_type_ha_long_bay_01_desc: "$building_ha_long_bay_01_desc$"
 building_ha_long_bay_01: "Бухта Халонг"
 building_ha_long_bay_01_desc: "Местный пейзаж захватывает дух: карстовые и известняковые островки возносятся над спокойными изумрудными водами залива, а местные рыбаки неспешно скользят на лодках среди этих каменных исполинов в поисках улова."
 #My Son Sanctuary
 building_type_my_son_sanctuary_01: "$building_my_son_sanctuary_01$"
 building_type_my_son_sanctuary_01_desc: "$building_my_son_sanctuary_01_desc$"
 building_my_son_sanctuary_01: "Святилище Мишон"
 building_my_son_sanctuary_01_desc: "Это святилище — крупнейший и самый утонченный храмовый комплекс чамов. Он состоит из нескольких огражденных участков, расположенных близко друг к другу в лесистой местности, каждый со своими воротами, алтарями и ступами. Все сооружения построены из красного кирпича, выложены геометрическими узорами и украшены песчаниковыми перемычками."
 #Gunung Api
 building_type_gunung_api_01: "$building_gunung_api_01$"
 building_type_gunung_api_01_desc: "$building_gunung_api_01_desc$"
 building_gunung_api_01: "Гунунг-Апи"
 building_gunung_api_01_desc: "Эта гора, вздымающаяся над дикими джунглями, священна для местных народов. Ее влажные, затянутые туманами склоны покрыты поразительными известняковыми пиками и испещрены глубокими пещерами, выточенными водой за бесчисленные столетия."
 #Suwalesi Megaliths
 building_type_suwalesi_megaliths_01: "$building_suwalesi_megaliths_01$"
 building_type_suwalesi_megaliths_01_desc: "$building_suwalesi_megaliths_01_desc$"
 building_suwalesi_megaliths_01: "Мегалиты Сулавеси"
 building_suwalesi_megaliths_01_desc: "По долинам Центрального Сулавеси рассеяны многочисленные мегалитические изваяния и символы, воздвигнутые местными жителями, чтобы проводить ритуалы и почитать духов. Эти статуи, известные как #italic арки#!, высечены в минималистичном стиле, а их формы очерчены ненавязчивыми и изящными линиями."
 #Izumo Taisha
 building_type_izumo_taisha_01: "$building_izumo_taisha_01$"
 building_type_izumo_taisha_01_desc: "$building_izumo_taisha_01_desc$"
 building_izumo_taisha_01: "Кидзуки тайся"
 building_izumo_taisha_01_desc: "Это большое синтоистское святилище — #italic тайся#! — возведено у самого берега и смотрит на море. Оно стоит на нескольких исполинских деревянных столбах и массивных стволах: его залы поднимаются высоко над землей, по которой ходят смертные, — в самое небо, где обитают боги и духи этих краев."
 #Temple of Confucius
 building_type_confucius_temple_01: "$building_confucius_temple_01$"
 building_type_confucius_temple_01_desc: "$building_confucius_temple_01_desc$"
 building_confucius_temple_01: "Храм Конфуция"
 building_confucius_temple_01_desc: "Старейший и самый влиятельный из всех конфуцианских храмов. Этот обширный комплекс залов и дворов служил примером и источником вдохновения для строителей храмов по всему Китаю и за его пределами — всё благодаря гармоничной геометрической планировке и утонченным деталям. Поблизости находится тихая роща, где обрели покой Конфуций и его потомки, что делает ее важным местом для паломничества среди его последователей."
 #Imperial Citadel of Lin'an
 building_type_citadel_linan_01: "$building_citadel_linan_01$"
 building_type_citadel_linan_01_desc: "$building_citadel_linan_01_desc$"
 building_citadel_linan_01: "Императорская цитадель Линьаня"
 building_citadel_linan_01_desc: "Императорская цитадель, возведенная на северных склонах Холма Феникса, служит резиденцией двора и администрации, вмещая в своих обширных залах и коридорах бесчисленных ученых мужей и чиновников. Хотя она и не столь грандиозна, ее террасные сады и павильоны отнюдь не уступают дворцам северных столиц."
 #The Temples of Angkor
 building_type_temples_angkor_01: "$building_temples_angkor_01$"
 building_type_temples_angkor_01_desc: "$building_temples_angkor_01_desc$"
 building_temples_angkor_01: "Храмы Ангкора"
 building_temples_angkor_01_desc: "В процветающем городе Индра не счесть позолоченных крыш и храмовых шпилей, которые соперничают друг с другом в красоте резных рельефов и изваяний божеств и девараджей."
 building_temples_angkor_02: "Ангкор-Ват"
 building_temples_angkor_02_desc: "Ангкор-Ват — это огромный храмовый комплекс, посвященный богу Вишну. Его конструкция олицетворяет пики горы Меру — дома дэвов в индуистской мифологии. Комплекс окружен внушительным рвом и имеет несколько галерей, украшенных религиозными фресками, рельефами и скульптурами."
