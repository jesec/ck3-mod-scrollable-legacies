l_russian:
 RW_TT_RAIDING_REALM_TOOLTIP: "#T Налетчик: [Character.GetPrimaryTitle.GetName|V]#!\n#I Щелкните, чтобы посмотреть#!"
 RW_TT_DEFENDING_REALM_TOOLTIP: "#T Обороняется: [Character.GetPrimaryTitle.GetName|V]#!\n#I Щелкните, чтобы посмотреть#!"
 RW_TIME_LEFT: "Еще [Raid.GetEta.GetTimeDiffFromNow|V]"
 RW_TIME_LEFT_TT: "#T Время\n#!Налет завершится [Raid.GetEta.GetString]"
 RW_TT_LOOT: "#T Добыча: [gold_i][Province.GetLoot|0V]\n#![realm|E] налетчиков получит эту добычу, если [raid|El] завершится успехом."
 RAID_PROGRESS_TOOLTIP: "#T Прогресс налета: [Raid.GetProgress|0]/[Raid.GetProgressNeeded|0]#!\n[Raid.GetRaidProgressTooltip]"
 RAID_TROOPS_TOOLTIP: "#T Количество солдат#!\nАрмия [Concept( 'raiding', 'налётчиков' )|E]: [Raid.GetAttackerMen|V]\n[garrison|E]: [Raid.GetDefenderMen|V]\nЕжедневный прогресс: [Raid.GetDailyProgressPercent|%1V]"
 RAID_BLOCKED_BY_COMBAT: "@warning_icon! #X Армия налетчиков [Concept( 'battle', 'сражается' )|E]#!"
 RAID_ON_ME_TOOLTIP: "#T Держава подвергается налету#!\n[GetPlayer.GetTopLiege.GetPrimaryTitle.GetDefinitiveNameNoTooltip|U] [Concept('raided', 'страдает от налета')|E] [Select_CString(Character.IsLocalPlayer, 'вашего персонажа', Concatenate('персонажа ', Character.GetShortUIName))].\n\n[Concept('armies', 'Армии')|E] налетчика перестанут быть [Concept('hostile_army', 'враждебными')|E] через [GetPlayer.GetRaidHostilityEnd( Character.Self ).GetTimeDiffFromNow].\n\n#I Щелкните для просмотра персонажа, устроившего налет#!"
 RAID_BY_ME_TOOLTIP: "#T Совершается налет#!\nИдет налет на [Select_CString(Character.IsLocalPlayer, 'вашего персонажа', Concatenate('персонажа ', Character.GetShortUIName))].\n\nВаши [Concept('armies', 'армии')|E] перестанут быть [Concept('hostile_army', 'враждебными')|E] державе [Character.GetTopLiege.GetPrimaryTitle.GetDefinitiveNameNoTooltip] через [GetPlayer.GetRaidHostilityEnd( Character.Self ).GetTimeDiffFromNow].\n\n#I Щелкните для просмотра правителя, пострадавшего от налета#!"
 RW_TT_DAILY_PROGRESS: "Ежедневный прогресс"
 RW_TT_BASE_PROGRESS: "Базовое значение"
 RW_TT_MEN_PROGRESS: "[soldiers|E]-налетчики"
 PROVINCE_LOOT_VALUE: "[loot_i] [Province.GetLoot|0]"
