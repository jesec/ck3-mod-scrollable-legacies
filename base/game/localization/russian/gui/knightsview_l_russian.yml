l_russian:
 KNIGHTS_VIEW_FORCE: "Заставить"
 KNIGHTS_VIEW_ALLOW: "Позволить"
 KNIGHTS_VIEW_FORBID: "Запретить"
 KNIGHTS_VIEW_TITLE: "$knight_culture_player_plural_no_tooltip$"
 MAX_KNIGHT_COUNT: "$knight_culture_player_plural_no_tooltip$: #high [GetKnightCount( GetPlayer.Self )]/[GetKnightLimit( GetPlayer.Self )]#!"
 MAX_KNIGHT_TOOLTIP: "#T $knight_culture_player_plural_no_tooltip$: макс. число [knight_i][GetKnightLimit( GetPlayer.Self )|V]#!\n[GetKnightLimitBreakdown( GetPlayer.Self )]"
 KNIGHT_EFFECTIVENESS: "Эффективность $knight_culture_player_plural_possessive_no_tooltip_lowercase$ — #high [GetPlayer.GetKnightEffectiveness|%0]#!"
 KNIGHT_EFFECTIVENESS_TOOLTIP: "#T [Concept( 'knight_effectiveness', 'Эффективность рыцарей' )|E]: [GetPlayer.GetKnightEffectiveness|V%0]#!\nБазовая: #V 100%#!\n[GetPlayer.GetKnightEffectivenessBreakdown]"
 KNIGHTS_VIEW_TITLE_FORBID_TT: "#T Запретить персонажу [Character.GetShortUIName] занимать должность $knight_culture_player$#!\n\n[Character.GetShortUIName] #emphasis никогда#! не присоединится к вашей [armies|El] как $knight_culture_player_no_tooltip$. Это гарантирует, что [Character.GetSheHe] не погибнет, когда начнется [battle|El]."
 CREATE_ACCOLADE_FORBID_TT: "#T Запретить [Select_CString(CreateAccoladeView.GetSelectedKnight.IsLocalPlayer, 'вашему персонажу', Concatenate('персонажу ', CreateAccoladeView.GetSelectedKnight.GetShortUIName))] занимать должность «$knight_culture_player$»#!\n\n[CreateAccoladeView.GetSelectedKnight.GetShortUIName|U] #emphasis никогда#! не [Select_CString(CreateAccoladeView.GetSelectedKnight.IsLocalPlayer, 'присоединитесь', 'присоединится' )] к вашей [Concept('armies', 'армии')|E] как $knight_culture_player_no_tooltip$. Это гарантирует, что [Select_CString(CreateAccoladeView.GetSelectedKnight.IsLocalPlayer, 'вы', Select_CString(CreateAccoladeView.GetSelectedKnight.IsFemale, 'она', 'он' ))] не [Select_CString(CreateAccoladeView.GetSelectedKnight.IsLocalPlayer, 'погибнете', 'погибнет' )] в [Concept('battle', 'бою')|E]."
 KNIGHTS_VIEW_TITLE_BY_PROWESS_TT: "#T Позволить [Select_CString(Character.IsLocalPlayer, '', 'персонажу ' )|l][Character.GetShortUINamePossessive][Select_CString(Character.IsLocalPlayer, 'ему персонажу', '' )] занимать должность $knight_culture_player$#!\n\n[Character.GetShortUIName][Select_CString(Character.IsLocalPlayer, '', 'Персонаж ' )|l][Character.GetShortUINamePossessive][Select_CString(Character.IsLocalPlayer, ' персонаж', '' )] может присоединиться к вашей [armies|El] как $knight_culture_player_no_tooltip$, если у н[Character.GetHerHis] [prowess|El] выше, чем у большинства других персонажей в [Concept('realm', 'державе')|E]"
 CREATE_ACCOLADE_BY_PROWESS_TT: "#T Позволить [Select_CString(CreateAccoladeView.GetSelectedKnight.IsLocalPlayer, 'вашему персонажу', Concatenate('персонажу ', CreateAccoladeView.GetSelectedKnight.GetShortUIName))] занимать должность «$knight_culture_player$»#!\n\n[CreateAccoladeView.GetSelectedKnight.GetShortUIName|U] [Select_CString(CreateAccoladeView.GetSelectedKnight.IsLocalPlayer, 'можете', 'может' )] присоединиться к вашей [Concept('armies', 'армии')|E] как $knight_culture_player_no_tooltip$, если [Select_CString(CreateAccoladeView.GetSelectedKnight.IsLocalPlayer, 'ваша', Select_CString(CreateAccoladeView.GetSelectedKnight.IsFemale, 'ее', 'его' ))] [Concept('prowess', 'доблесть')|E] выше, чем у большинства других персонажей в [Concept('realm', 'державе')|E]"
 KNIGHTS_VIEW_TITLE_FORCE_TT: "#T Заставить персонажа [Character.GetShortUIName] занять должность $knight_culture_player$#!\n\n[Character.GetShortUIName] #emphasis обязательно#! присоединится к моей [armies|El] как $knight_culture_player_no_tooltip$ вне зависимости от того, какая у н[Character.GetHerHis] [prowess|El]. [Character.GetSheHe|U] может занять место человека с более высокой доблестью."
 CREATE_ACCOLADE_FORCE_TT: "#T Заставить [Select_CString(CreateAccoladeView.GetSelectedKnight.IsLocalPlayer, 'вашего персонажа', Concatenate('персонажа ', CreateAccoladeView.GetSelectedKnight.GetShortUIName))] занять должность «$knight_culture_player$»#!\n\n[CreateAccoladeView.GetSelectedKnight.GetShortUIName|U] #emphasis обязательно#! [Select_CString(CreateAccoladeView.GetSelectedKnight.IsLocalPlayer, 'присоединитесь', 'присоединится' )] к вашей [Concept('armies', 'армии')|E] как $knight_culture_player_no_tooltip$ вне зависимости от того, какая у [Select_CString(CreateAccoladeView.GetSelectedKnight.IsLocalPlayer, 'вас', Select_CString(CreateAccoladeView.GetSelectedKnight.IsFemale, 'нее', 'него' ))] [Concept('prowess', 'доблесть')|E]. При этом [Select_CString(CreateAccoladeView.GetSelectedKnight.IsLocalPlayer, 'вы', Select_CString(CreateAccoladeView.GetSelectedKnight.IsFemale, 'она', 'он' ))] [Select_CString(CreateAccoladeView.GetSelectedKnight.IsLocalPlayer, 'можете', 'может' )] занять место воина с более высокой доблестью."
 KNIGHTS_CURRENT_MAX: "[GetKnightCount( GetPlayer.Self )|V]/[GetKnightLimit( GetPlayer.Self )|V]"
 KNIGHTS_SUBHEADER: "Подходящие [Concept( 'courtiers', 'придворные' )|E] и [Concept( 'vassals', 'вассалы' )|E]"
 KNIGHTS_SUBHEADER_LANDLESS_ADVENTURER: "Пригодные [Concept( 'followers', 'последователи' )|E]"
 ### Knight permissions
 knight_singular: "[GetPlayer.Custom('KnightCultureNoTooltip')]"
 knight_plural: "[GetPlayer.Custom('KnightCulturePluralNoTooltip')]"
 knight_singular_tt: "[GetPlayer.Custom('KnightCulture')]"
 knight_plural_tt: "[GetPlayer.Custom('KnightCulturePlural')]"
 KNIGHT_PERMISSIONS_TITLE: "[GetPlayer.Custom('KnightCulturePluralNoTooltip')|U]: разрешения"
 KNIGHT_PERMISSIONS_SHORT: "Разрешения"
 KNIGHT_PERMISSIONS_TT: "Указать, кто может служить как [GetPlayer.Custom('KnightCulture')|l][AddLocalizationIf(Not( KnightsView.GetKnightPermissions.IsDefault), 'KNIGHT_PERMISSIONS_SET')]"
 KNIGHT_PERMISSIONS_SET: "\n#warning Включены некоторые ограничения!#!"
 YOUR_KNIGHT_PERMISSIONS: "Задать ограничения для персонажей, которые смогут служить как [GetPlayer.Custom('KnightCulturePlural')|l].\n[Concept('acclaimed', 'Именитые')|E] [GetPlayer.Custom('KnightCulturePluralNoTooltip')|l] и те, кого заставляют служить, будут служить вне зависимости от этих правил."
 MINIMUM_PROWESS: "Минимальная доблесть"
 DECREASE_MIN_PROWESS_KP: "Снизить минимальные требования к [Concept('prowess', 'доблести')|E] [Concept('knights', 'рыцарей')|E]\n#i ПКМ — снизить на 10"
 INCREASE_MIN_PROWESS_KP: "Повысить минимальные требования к [Concept('prowess', 'доблести')|E] [Concept('knights', 'рыцарей')|E]\n#i ПКМ — повысить на 10"
 FAMILY_RELATIONS_KP: "Семья и отношения"
 OTHER_CHILDERN_KP: "Другие дети"
 WITH_TRAITS_KP: "Свойства"
 SPOUSES_OF_CHILDERN_KP: "Супруги детей"
 COURT_POSITIONS_KP: "Придворные должности"
 COURT_POSITIONS_TT: "Запретить для не связанных с войной должностей.\n[GetCourtPositionType('bodyguard_court_position').GetName|U] и [GetCourtPositionType('garuda_court_position').GetName] являются исключениями — они обязаны помогать в сражениях, и потому всегда могут быть [Concept('knights', 'рыцарями')|E]"
 HBOX_DOCTRINE_FAITH_TT: "#T [FaithDoctrine.GetNameNoTooltip( Faith.Self )]#!\n[FaithDoctrine.GetEffectsDescription( Faith.Self )]\n\n[FaithDoctrine.GetDescription( Faith.Self )|F]"
 KNIGHT_RESTRICTIONS: "Действуют иные ограничения"
 #this is can_be_knight_trigger in 00_war_and_peace_triggers.txt
 KNIGHT_RESTRICTIONS_TT: "#T Ограничения для рыцарей#!\nТолько прямые [Concept('vassals', 'вассалы')|E], [Concept('courtier', 'придворные')|E] и [Concept('followers', 'последователи')|E] могут служить в качестве [Concept('knights', 'рыцарей')|E].\nДопустимый для [Concept('knights', 'рыцарей')|E] пол определяется вашей [Concept('culture', 'культурой')|E] или [Concept('faith', 'конфессией')|E].\n\nРыцарями не могут стать:\n - персонажи игрока, [Concept('child', 'дети')|E], [Concept('prisoner', 'узники')|E] и персонажи со свойством «[GetTrait('incapable').GetName(GetPlayer.Self)]»\n - представители [Concept('clergy', 'духовенства')|E], если их [Concept('faith', 'конфессия')|E] или [Concept('culture', 'культура')|E] не предполагают обратного\n - [Concept('master_assassin', 'мастера-ассасины')|E] и персонажи со свойством «[GetTrait('blind').GetName(GetPlayer.Self)]» (если они не обладают свойством «[GetTrait('order_member').GetName(GetPlayer.Self)]» и их [Concept('culture', 'культура')|E] не предполагает обратного)\n - [Concept('diarch', 'диархи')|E] и [Concept('ceremonial_liege', 'церемониальные сюзерены')|E]\n - [Concept('governor', 'губернаторы')|E] [Concept('duchy', 'герцогств')|E] и вышестоящих [Concept('title', 'титулов')|E], а также [Concept('house_head', 'главы')|E] [Concept('noble_family', 'благородных семейств')|E]\n\nНекоторые из этих ограничений могут быть сняты культурными [Concept('traditions', 'традициями')|E] и определенными событиями"
 KP_CULTURE_MINIMUM_PROWESS: "@alert_icon! Ваша [Concept('culture', 'культура')|E] требует [Concept('prowess', 'доблести')|E] 12 и выше"
 KP_CULTURE_ADMIN_FAMILY_KNIGHTS: "@check_icon! Ваша [Concept('culture', 'культура')|E] допускает отказ от некоторых гендерных ограничений в случае оборонительных [Concept('wars', 'войн' )|E]"
 KP_CULTURE_HIGH_PROWESS: "@check_icon! Ваша [Concept('culture', 'культура')|E] допускает отказ от большинства ограничений для [Concept('knights', 'рыцарей')|E] с [Concept('prowess', 'доблестью')|E] 10 и выше"
