l_russian:
 elder_events.1000.t: "Мы же знаем друг друга!"
 elder_events.1000.desc: "«[confusion_target.GetFirstName], [Select_CString(confusion_target.IsFemale, 'моя дорогая', 'мой дорогой' )] [elder.Custom2('RelationToMeShort', SCOPE.sC('confusion_target'))]! Как славно, что ты [Select_CString(confusion_target.IsFemale, 'пришла', 'пришел' )]! — [Select_CString(elder.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('elder'))] [elder.GetFirstName] смотрит мне прямо в глаза, на губах застыла неуверенная улыбка. — Ты всегда [Select_CString(confusion_target.IsFemale, 'была самой', 'был самым' )] [confusion_target.Custom('ComplimentAdjective')][Select_CString(confusion_target.IsFemale, 'ой', 'ым' )] из всех моих близких. Потому-то я и люблю тебя больше всех!»\n\n[elder.GetHerHis|U] [GetTrait('withering_mind').GetName( GetNullCharacter )|l] совсем слаб, сегодня [elder.GetSheHe] [Select_CString(elder.IsFemale, 'приняла', 'принял' )] меня за [Select_CString(confusion_target.IsFemale, 'мою сестру', 'моего брата' )]…\n\nА завтра, наверное, не узнает вовсе."
 elder_events.1000.a: "[ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('elder'))|U], пожалуйста! Это же я, [ROOT.Char.GetFirstNameNoTooltip]!"
 elder_events.1000.b: "Что?.. Да, я тоже [Select_CString(ROOT.Char.IsFemale, 'рада', 'рад' )] видеть тебя…"
 elder_events.1100.t: "Лестница в…"
 elder_events.1100.desc: "Сколько раз я [Select_CString(ROOT.Char.IsFemale, 'поднималась', 'поднимался' )] по этим ступеням… Почему же сегодня они кажутся крутыми, как [mountain_reference.GetName]?\n\nНоги дрожат. Колени подгибаются. Я пытаюсь за что-нибудь ухватиться…\n\nИ падаю вниз."
 elder_events.1100.a: "А-а-а!"
 elder_events.1100.bodyguard: "На помощь!"
 EVENT_WINDOW_OPTION_AVAILABLE_BODYGUARD: "Этот вариант доступен, потому что у вас есть [GetCourtPositionType('bodyguard_court_position').GetName()|l]"
 EVENT_WINDOW_OPTION_AVAILABLE_TUTOR: "Этот вариант доступен, потому что у вас есть [GetCourtPositionType('court_tutor_court_position').GetName()|l]"
 partially_mute_modifier: "Частичная немота"
 partially_mute_modifier_desc: "Этому персонажу очень трудно говорить из-за возрастных заболеваний."
 elder_events.1200.t: "Онемение"
 elder_events.1200.desc: "Всё происходит внезапно. Левая половина тела совершенно немеет. Я пытаюсь улыбнуться, но губы не слушаются.\n\nПытаюсь заговорить, но ничего не выходит.\n\nВ конце концов голос возвращается. Но страх перед тем, что меня ожидает [ROOT.Char.GetFaith.NegativeAfterLife], останется со мной навсегда."
 elder_events.1200.a: "…"
 elder_events.1300.t: "Забытые уроки"
 elder_events.1300.desc: "Я [Select_CString(ROOT.Char.IsFemale, 'читала', 'читал' )] эти свитки? [ROOT.Char.Custom('education_scroll_subject')|U]… Нет, не помню. Или [Select_CString(ROOT.Char.IsFemale, 'читала', 'читал' )]?\n\nНет, я точно с ними [Select_CString(ROOT.Char.IsFemale, 'занималась', 'занимался' )], они были частью моего обучения…\n\nДа… обучения…"
 elder_events.1300.a: "Наверное, это не так уж и важно…"
 elder_events.1300.tutor: "Мне нужна помощь. Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] всё вспомнить…"
 elder_events.1400.t: "Бурная ночь"
 elder_events.1400.desc: "«Давай скорее в постель, [ROOT.Char.Custom('RomanticComplimentAdjective')][Select_CString(ROOT.Char.IsFemale, 'ая', 'ый' )] [Select_CString(ROOT.Char.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom('RaunchyComplimentNoun')]! — [lover.Custom('PurrGrowl')] [Select_CString(lover.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('lover'))] [lover.GetFirstName], дрожа от страсти. — Разве тебе не любопытно, чему [Select_CString(lover.IsFemale, 'научилась твоя', 'научился твой' )] [lover.Custom('GetRaunchyPrefix')] [lover.Custom('RaunchyComplimentNoun')]?»\n\nЗакусив губу, [lover.GetSheHe] с похотливой улыбкой растягивается на перинах.\n\n«Возьми меня. Возьми меня прямо сейчас!»"
 elder_events.1400.a: "Меня не остановит и тысяча лошадей!"
 elder_events.1400.b: "[ROOT.Char.GetFaith.HighGodName], убереги меня от [Select_CString(lover.IsFemale, 'этой женщины', 'этого мужчины' )]."
 death_best_sex_of_their_life: "[Select_CString(CHARACTER.IsFemale, 'умерла', 'умер' )] от сердечного приступа в разгар бурной ночи"
 purrs: "мурлычет"
 growls: "рычит"
 raunchy_little: "[Select_CString(lover.IsFemale, 'маленькая', 'маленький' )]"
 raunchy_sweet: "[Select_CString(lover.IsFemale, 'сладкая', 'сладкий' )]"
 raunchy_pretty: "[Select_CString(lover.IsFemale, 'милая', 'милый' )]"
 raunchy_bold: "[Select_CString(lover.IsFemale, 'отважная', 'отважный' )]"
 raunchy_wild: "[Select_CString(lover.IsFemale, 'дикая', 'дикий' )]"
 raunchy_fiery: "[Select_CString(lover.IsFemale, 'горячая', 'горячий' )]"
 raunchy_young: "[Select_CString(lover.IsFemale, 'юная', 'юный' )]"
 raunchy_eager: "[Select_CString(lover.IsFemale, 'ненасытная', 'ненасытный' )]"
 elder_events.1500.t: "Ночь, ради которой не жалко и умереть"
 elder_events.1500.desc: "«Когда-то меня называли „[lover.Custom('GetRaunchyPrefix')] [lover.Custom('RaunchyComplimentNoun')]“, — вздыхает [Select_CString(lover.IsFemale, 'моя', 'мой' )] [lover.GetWifeHusband] [lover.GetFirstName], мечтательно улыбаясь. — А теперь я даже по лестнице с трудом поднимаюсь…»\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'молода и полна', 'молод и полон' )] сил и вполне [Select_CString(ROOT.Char.IsFemale, 'способна', 'способен' )] напомнить [Select_CString(lover.IsFemale, 'ей', 'ему' )], каково это — чувствовать себя [Select_CString(lover.IsFemale, 'желанной', 'желанным' )].\n\nНо у [Select_CString(lover.IsFemale, 'нее', 'него' )] же [GetTrait('faltering_heart').GetName( GetNullCharacter )|l] — выдержит ли оно мою страсть?"
 elder_events.1500.a: "Я подарю [Select_CString(lover.IsFemale, 'ей', 'ему' )] незабываемую ночь!"
 elder_events.1500.b: "Лучше не рисковать."
 elder_events.1600.t: "От времени не убежишь"
 elder_events.1600.desc: "Я перехожу на бег… и останавливаюсь. Проклятая одышка.\nЕще недавно я без труда [Select_CString(ROOT.Char.IsFemale, 'бегала', 'бегал' )] вокруг [ROOT.Char.Custom('ResidenceBuilding_RU_Gen')]…\n\nЯ начинаю снова — и чуть не падаю. Надо прекращать.\n\nБудь проклято это хилое тело…"
 elder_events.1600.a: "Теперь бег в прошлом."
 elder_events.1600.b: "Я #EMP [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )]#! превозмочь боль."
