l_russian:
 #Travel Flavor Events
 #Troll bridge - you encounter a troll bridge.
 travel_events.5100.t: "[ROOT.Char.GetCurrentLocation.Custom('GetProvinceTricksterSpirit')|U] под мостом"
 travel_events.5100.desc: "«[Select_CString(ROOT.Char.IsFemale, 'Моя госпожа', 'Мой господин' )]! Про этот мост ходят дурные слухи. Говорят, под ним обитает [ROOT.Char.GetCurrentLocation.Custom('GetProvinceTricksterSpirit')]! — испуганно бормочет [Select_CString(superstitious_traveler.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('RelationToMe', superstitious_traveler)], [superstitious_traveler.GetTitledFirstName]. — Этот злой дух непременно набросится на нас. Или проклянет издалека, когда мы проедем мимо!»\n\nМои встревоженные спутники перешептываются друг с другом, кое-кто поминает имя [ROOT.Char.GetFaith.HighGodNamePossessive]. Увы, это единственная переправа на много миль вокруг."
 travel_events.5100.a: "«Меня не страшит ни [ROOT.Char.GetCurrentLocation.Custom('GetProvinceTricksterSpirit')], ни какой другой демон!»"
 travel_events.5100.b: "«[ROOT.Char.GetCurrentLocation.Custom('GetProvinceTricksterSpirit')|U]? [superstitious_traveler.GetTitledFirstNameNoTooltip], это всё сказки!»"
 travel_events.5100.c: "«Давайте помолимся, чтобы изгнать этого духа»."
 travel_events.5100.d: "«Ужас какой. Давайте поищем обходной путь»."
 custom.every_brave_or_impatient_entourage_member: "Каждый член свиты, обладающий свойствами «[GetTrait('brave').GetName( GetNullCharacter )]» или «[GetTrait('impatient').GetName( GetNullCharacter )]»"
 custom.every_cynical_or_impatient_entourage_member: "Каждый член свиты, обладающий свойствами «[GetTrait('cynical').GetName( GetNullCharacter )]» или «[GetTrait('impatient').GetName( GetNullCharacter )]»"
 custom.every_eccentric_or_zealous_entourage_member: "Каждый член свиты, обладающий свойствами «[GetTrait('eccentric').GetName( GetNullCharacter )]» или «[GetTrait('zealous').GetName( GetNullCharacter )]»"
 custom.every_craven_or_impatient_entourage_member: "Каждый член свиты, обладающий свойствами «[GetTrait('craven').GetName( GetNullCharacter )]» или «[GetTrait('impatient').GetName( GetNullCharacter )]»"
