l_russian:
 hunt_events_anna.0001.t: "Глубокие корни"
 hunt_events_anna.0001.desc: "Впереди возвышается величественный дуб. Его могучая, раскидистая крона отбрасывает глубокую тень, укутывая подножие в полумрак. Глядя на его ветви, я невольно размышляю о судьбе династий, сменяющих друг друга, — о тех, кто жил до меня, и тех, кто продолжит мой род, когда меня не станет.\n\nПодойдя поближе, я замечаю вырезанные на коре инициалы — безмолвное напоминание о людях минувших времен. Я сразу вспоминаю о [Select_CString(love_interest.IsFemale, 'той', 'том' )], с кем [Select_CString(ROOT.Char.IsFemale, 'хотела', 'хотел' )] бы провести остаток вечности. О [love_interest.GetFirstName], ты мне дороже всего на свете…"
 hunt_events_anna.0001.a: "Я вырежу [Select_CString(love_interest.IsFemale, 'ее', 'его' )] инициалы на коре."
 hunt_events_anna.0001.b: "У меня нет времени на эти глупости!"
 hunt_events_anna.0001.b.t_toast: "Нужно сосредоточиться на охоте."
 hunt_events_anna.0005.t: "Кожа да кости"
 hunt_events_anna.0005.desc: "Мой недолгий отдых нарушает ехидный смех, звучащий всё ближе. Подняв голову, я вижу, что ко мне направляется [mocking_participant.GetFirstName], ухмыляясь до ушей. В руках у [Select_CString(mocking_participant.IsFemale, 'нее', 'него' )] болтается маленький трупик — кажется, это [ROOT.Char.Custom('SmallAnimal')|l].\n\n«Я никогда не [Select_CString(mocking_participant.IsFemale, 'думала', 'думал' )], что ты [Select_CString(ROOT.Char.IsFemale, 'способна', 'способен' )] в одиночку выжить в глуши, — насмешливо говорит [mocking_participant.GetSheHe], бросая тушку к моим ногам. — Вот, потренируйся»."
 hunt_events_anna.0005.a: "Попробовать освежевать тушку."
 hunt_events_anna.0005.a.toast.good: "У меня получается снять шкурку с животного"
 hunt_events_anna.0005.a.toast.nothing: "Шкурка изуродована до неузнаваемости"
 hunt_events_anna.0005.b: "Потренироваться? Ну, если ты не против…"
 hunt_events_anna.0005.c: "Это занятие для слуг — не для меня!"
 hunt_events_anna.0010.t: "В западне"
 hunt_events_anna.0010.desc: "Вокруг раскинулись живописные [ROOT.Char.GetCurrentLocation.Custom('GetTerrainTypePlural')], но сейчас мне не до любования видами: нетвердо ступая, я преследую свою добычу, думая лишь о том, чтобы не отстать. Внезапно раздается оглушительный треск. Почва уходит у меня из-под ног, желудок подкатывает к горлу — я падаю! Затем следует резкий удар, и тело пронзает болью.\n\nПревозмогая боль, я оглядываюсь и понимаю, что [Select_CString(ROOT.Char.IsFemale, 'угодила', 'угодил' )] в западню. Со всех сторон поднимаются стены… Надо как-то выбираться отсюда!"
 hunt_events_anna.0010.a: "Попробую выбраться из ямы."
 hunt_events_anna.0010.a.desc.good: "Мне удается подняться наверх"
 hunt_events_anna.0010.a.toast.good: "Стиснув зубы, я выбираюсь наружу"
 hunt_events_anna.0010.a.toast.bad: "Сорвавшись со стены, я ушибаюсь снова"
 hunt_events_anna.0010.a.desc.bad: "Соскользнув, я снова оказываюсь на дне"
 hunt_events_anna.0010.b: "«Ау? Есть кто-нибудь?»"
 hunt_events_anna.0010.b.flavor: "Охотники останавливают погоню за зверем, чтобы вытащить меня."
 hunt_events_anna.0015.t: "Вдох… выдох"
 hunt_events_anna.0015.desc: "Со стороны поляны доносится звук приглушенных ударов, сопровождаемых негромким бормотанием и тяжкими вздохами. Какая-то фигура с луком в руках недовольно ходит взад и вперед, явно чем-то раздосадованная.\n\nПодкравшись поближе, я прячусь за деревом и исподтишка наблюдаю за сценой. Ха, так это же [Select_CString(child_with_bow.IsFemale, 'моя дочь', 'мой сын' )] [child_with_bow.GetFirstName]! В траве разбросаны стрелы, ни одна из них не долетела до поставленной [Select_CString(child_with_bow.IsFemale, 'ею', 'им' )] мишени. Похоже, что [Select_CString(child_with_bow.IsFemale, 'ей', 'ему' )] не помешает совет…"
 hunt_events_anna.0015.a: "«Смотри, я покажу, как надо…»"
 hunt_events_anna.0015.a.flavor: "[Select_CString(ROOT.Char.IsFemale, 'Сама', 'Сам' )]-то я стрелок хоть куда, с моей помощью [child_with_bow.GetSheHe] быстро научится правильному положению тела."
 hunt_events_anna.0015.a.toast.good: "[child_with_bow.GetFirstNameNoTooltip] следует моим указаниям"
 hunt_events_anna.0015.a.toast.bad: "[child_with_bow.GetFirstNameNoTooltip] не может понять, чего от [Select_CString(child_with_bow.IsFemale, 'нее', 'него' )] хотят"
 hunt_events_anna.0015.b: "Надо [Select_CString(child_with_bow.IsFemale, 'ее', 'его' )] подбодрить."
 hunt_events_anna.0015.c: "[child_with_bow.GetFirstNameNoTooltip] [Select_CString(child_with_bow.IsFemale, 'должна', 'должен' )] научиться [Select_CString(child_with_bow.IsFemale, 'сама', 'сам' )]."
 hunt_events_anna.0015.c.toast: "[child_with_bow.GetFirstNameNoTooltip] понимает, как обращаться с луком"
