l_russian:
 #Lessons of the heart
 intrigue_events_bjorn.5100.t: "Уроки сердца"
 intrigue_events_bjorn.5100.desc: "Я не перестаю восхищаться [Select_CString(the_lover.IsFemale, 'моей возлюбленной', 'моим возлюбленным' )]. [the_lover.GetFirstName] — [Select_CString(the_lover.IsFemale, 'удивительная женщина', 'удивительный человек' )], я столь многому могу от [Select_CString(the_lover.IsFemale, 'нее', 'него' )] научиться! [the_lover.GetHerHis|U] ум подобен сокровищу, только и ждущему, чтобы его похитили. Да и [Select_CString(ROOT.Char.IsFemale, 'сама', 'сам' )] я могу [the_lover.GetHerHis] кое-чему научить…\n\nЯ уже молчу о том, что это отличный повод провести время вместе!"
 intrigue_events_bjorn.5100.a: "Моя любовь поможет мне так много узнать!"
 intrigue_events_bjorn.5100.b: "Из [Select_CString(the_lover.IsFemale, 'нее', 'него' )] выйдет [Select_CString(the_lover.IsFemale, 'чудесная ученица', 'чудесный ученик' )]."
 intrigue_events_bjorn.5100.c: "Хватит и того, что мы проводим время вместе."
 #shared interests
 intrigue_events_bjorn.5101.t: "Общие интересы"
 intrigue_events_bjorn.5101.desc: "[the_lover.GetFirstName] завораживает меня. Вот бы научиться радоваться всему, что доставляет [Select_CString(the_lover.IsFemale, 'ей', 'ему' )] удовольствие!\n\nПроводить день за днем вместе с [Select_CString(the_lover.IsFemale, 'ней', 'ним' )]…\n\nРаботать вдвоем, делать всё сообща…\n\nЛишь бы наши сердца бились в унисон."
 intrigue_events_bjorn.5101.a: "Расскажи, любовь моя, что заставляет твое сердце трепетать."
 intrigue_events_bjorn.5101.b: "Позволь, я поделюсь с тобой тем, что меня радует."
 intrigue_events_bjorn.5101.c: "Давай вместе узнаем что-то новое?"
 #Dark depths of the soul
 intrigue_events_bjorn.5102.t: "Любовь к тени"
 intrigue_events_bjorn.5102.desc: "[the_lover.GetFirstName] и я стали почти неразлучны. Наверное, пришло время раскрыть все наши тайны, поделиться всеми секретами — поведать друг другу такое, о чем не должен знать никто.\n\nЕсли решиться на этот шаг, назад дороги не будет. Но сможет ли [the_lover.GetFirstName] воистину принять меня [Select_CString(ROOT.Char.IsFemale, 'такой', 'таким' )], [Select_CString(ROOT.Char.IsFemale, 'какая', 'какой' )] я есть на самом деле?"
 intrigue_events_bjorn.5102.a: "Мне нужно многое тебе рассказать…"
 intrigue_events_bjorn.5102.b: "Поделись со мной тем, что ты никогда и никому не [Select_CString(the_lover.IsFemale, 'рассказывала', 'рассказывал' )]…"
 intrigue_events_bjorn.5102.c: "Давай вместе разделим наши самые потайные желания."
 intrigue_events_bjorn.5102.d: "Нет. Некоторые вещи должны оставаться тайной."
