l_russian:
 SITUATION_LIST_STORY_CYCLE_MODIFIERS_HEADER: "Модификаторы"
 SITUATION_LIST_STORY_CYCLE_DECISIONS_HEADER: "Решения"
 not_yet_chosen: "— впрочем, вы ещё не определились, как назвать животное"
 story_cycle_pet_dog: "Домашняя собака"
 story_cycle_pet_dog_desc: "#F Вас повсюду сопровождает преданная собака. Она готова погибнуть, защищая вас от угрозы, — качество, которое редко встретишь среди людей.#!"
 DOG_INFORMATION_STRING: "Вашу собаку зовут #V [Story.Custom('DogStoryNameAll')].#!\nУ н[Story.Custom('DogStoryHerHisAll')|U] [Story.Custom('DogFurColorAll')] мех и [Story.Custom('DogEyeColorAll')] глаза. [Story.Custom('DogStoryPuppyOrAgeAll')].\nИди сюда, [Story.Custom('DogStoryGirlBoyAll')]. Кто у нас хороший песик?"
 dog_age_puppy: "[Story.Custom('DogStorySheHeAll')|U] еще щенок"
 dog_age_proper: "[Story.Custom('DogStoryHerHisAll')|U] возраст около [Story.MakeScope.Var('dog_age_variable').GetValue|0] лет"
 cat_age_kitten: "[Story.Custom('CatStorySheHeAll')|U] еще котенок"
 cat_age_proper: "[Story.Custom('CatStoryHerHisAll')|U] возраст около [Story.MakeScope.Var('cat_age_variable').GetValue|0]  лет"
 story_cycle_pet_cat: "Домашняя кошка"
 story_cycle_pet_cat_desc: "#F У вас дома живет гордая кошка — проворный охотник, который проявляет привязанность лишь тогда, когда сам того пожелает.#!"
 CAT_INFORMATION_STRING: "Вашу кошку зовут #V [Story.Custom('CatStoryNameAll')].#!\nУ н[Story.Custom('CatStoryHerHisAll')|U] шелковистый [Story.Custom('CatFurColorAll')] мех и проницательные [Story.Custom('CatEyeColorAll')] глаза. [Story.Custom('CatStoryKittenOrAgeAll')].[Story.Custom('CatStupidOrNotStupidAll')]"
 dumb_but_sweet_orange_boy: "\n[Story.Custom('CatStorySheHeAll')|U] невероятно милый [Story.Custom('CatFurColorAll')] зверек, хоть и глупенький."
 story_cycle_pet_eagle: "Охотничий орел"
 story_cycle_pet_eagle_desc: "#F На вашей перчатке восседает охотничий орел — бдительная и вечно голодная птица, всегда готовая обрушиться на добычу с небес.#!"
 EAGLE_INFORMATION_STRING: "Вашего орла зовут #V [Story.Custom('EagleStoryNameAll')].#!\nПтице около [Story.MakeScope.Var('eagle_age_variable').GetValue|0] лет."
 bp2_hostage_loyalty: "Верный заложник"
 bp2_hostage_loyalty_desc: "Один из ваших [Concept('hostages', 'заложников')|E] начинает проявлять к вам привязанность."
 hostage: "[hostage|E]"
 HOSTAGE_STORY_PRACTICAL_INFORMATION_STRING: "[Select_CString(Story.MakeScope.Var('hostage_target').Char.IsFemale, 'Взятый', 'Взятая' )] в [Concept('hostage', 'заложники')|E] [Story.MakeScope.Var('hostage_target').Char.GetUIName] уже давно воспитывается при вашем [Concept('court', 'дворе')|E], и это не могло не сказаться на [Story.MakeScope.Var('hostage_target').Char.GetHerHis] привязанностях. Постарайтесь сохранить [Story.MakeScope.Var('hostage_target').Char.GetHerHis] высокое [Concept('opinion', 'мнение')|E] о вас и выбирайте подходящие варианты в событиях, чтобы [Story.MakeScope.Var('hostage_target').Char.GetSheHe] [Select_CString(Story.MakeScope.Var('hostage_target').Char.IsFemale, 'сохранила', 'сохранил' )] вам верность даже после достижения совершеннолетия.\n\nТекущая верность: [Story.MakeScope.Var('theon_points').GetValue|0+]"
 LOYALTY_LABEL: "Очки верности"
 claimant: "[claimant|E]"
 diverted_crusaders: "Крестоносцы-оппортунисты"
 frankokratia_story: "Франкократия"
 frankokratia_story_desc: "Претендент на #L [GetTitleByKey('e_byzantium').GetAdjective|l]ий#! престол убедил алчных западных крестоносцев изменить цель их похода и направить мечи в самое сердце христианского мира…"
 FRANKOKRATIA_STORY_PRACTICAL_INFORMATION_STRING: "[GetTitleByKey('e_byzantium').GetHolder.GetShortUIName|U] [Select_CString(GetTitleByKey('e_byzantium').GetHolder.IsLocalPlayer, 'стали', Select_CString(GetTitleByKey('e_byzantium').GetHolder.IsFemale, 'стала', 'стал' ))] врагом крестоносцев, и теперь будущее #L [GetTitleByKey('e_byzantium').GetAdjective|l]ой#! державы зависит от исхода этой [Concept('war', 'войны')|E]. Либо [Concept('claimant', 'претендент')|E] [Story.MakeScope.Var('byz_claimant').Char.GetUIName] займет трон и заплатит крестоносцам за службу, либо на месте [GetTitleByKey('e_byzantium').GetAdjectiveNoTooltip|l]ой империи возникнет новая #L [GetFaithByKey('catholic').GetName|l]ая#! держава — [GetTitleByKey('e_latin_empire').GetBaseName]."
 story_conqueror: "Завоеватель"
 story_conqueror_desc: "Ваши амбиции безграничны! Мир похож на перезрелый фрукт, который вот-вот сам упадет вам в руки."
 CONQUEROR_STORY_PRACTICAL_INFORMATION_STRING: "Завоеватели получают множество мощных бонусов — это и ослабленные [Concept('factions', 'фракции')|E], и доступ к [Concept('vassalize_casus_belli', 'казус белли «насильная вассализация»')|E], и периодические события, дающие значительные преимущества.\n\nВы лишаетесь статуса завоевателя в следующих случаях:\n$BULLET_WITH_TAB$Вы утратили [Concept('independent', 'независимость')|E]\n$BULLET_WITH_TAB$Ваш ранг титула снизился до [Concept('count', 'графского')|E]\n$BULLET_WITH_TAB$Вы стали [Concept('unlanded', 'безземельным')|E] персонажем\n$BULLET_WITH_TAB$Вы не вели [Concept('war', 'войн')|E] в течение #V 10#! лет\n$BULLET_WITH_TAB$Вы погрязли в [Concept('debt', 'долгах')|E]\n$BULLET_WITH_TAB$Вы потерпели поражение в #V 3#! и более [Concept('wars', 'войнах')|E]\n$BULLET_WITH_TAB$Ваш персонаж стал #TOOLTIP:GAME_TRAIT,incapable,$CHARACTER_ID$ #L недееспособным#!#!"
 story_destiny_child: "Дитя предназначения"
 story_destiny_child_desc: "На свет родился ребенок, которому уготована поистине великая судьба."
 DESTINY_CHILD_STORY_PRACTICAL_INFORMATION_STRING: "Иногда в мир приходит дитя, которому с рождения суждено величие. Такие дети развиваются быстрее своих сверстников и со временем способны достичь недосягаемых высот.\n\n[Story.MakeScope.Var('destiny_child').Char.GetUIName] заслуживает самого пристального внимания. Позаботьтесь о [Select_CString(Story.MakeScope.Var('destiny_child').Char.IsFemale, 'ней', 'нем' )] как следует и постарайтесь найти способ [Concept('player_heir', 'передать')|E] [Select_CString(Story.MakeScope.Var('destiny_child').Char.IsFemale, 'ей', 'ему' )] свой титул — например, назначив [Story.MakeScope.Var('destiny_child').Char.GetHerHis] [Concept('designated_heir', 'предопределенным наследником')|E]."
 CHILD_OF_DESTINY: "Дитя предназначения"
 story_cycle_martial_lifestyle_warhorse: "Боевой конь"
 story_cycle_martial_lifestyle_warhorse_desc: "У вас прекрасно обученный боевой конь. Ваши враги дрожат от ужаса, заслышав гром его копыт."
 WARHORSE_STORY_PRACTICAL_INFORMATION_STRING: "Вашего скакуна зовут #V [Story.Custom('WarhorseStoryNameAll')]#!. Это [Story.Custom('HorseStoryMareStallionAll')|l]."
 DOPPELGANGER: "Ваш [Glossary( 'двойник', 'DOPPELGANGER_GLOSS' )]"
 story_doppelganger: "Зеркало в грязи"
 DOPPELGANGER_GLOSS: "Доппельгангер — это двойник или точная копия живого человека. В немецком фольклоре случайная встреча с доппельгангером считается дурным знамением, она предвещает болезнь или смерть."
 story_doppelganger_desc: "В одной из деревень [Select_CString(ROOT.Char.IsFemale, 'нашлась крестьянка', 'нашелся крестьянин' )], [Select_CString(ROOT.Char.IsFemale, 'похожая', 'похожий' )] на вас как две капли воды — вылитая копия, настоящий [Glossary( 'доппельгангер', 'DOPPELGANGER_GLOSS' )]…"
 DOPPELGANGER_STORY_PRACTICAL_INFORMATION_STRING: "[Select_CString(ROOT.Char.IsFemale, 'Крестьянка', 'Крестьянин' )], чья внешность и манеры неотличимы от ваших, может стать серьезной угрозой… или великолепной возможностью. В данный момент [Story.MakeScope.Var('doppelganger_character').Char.GetUIName] проживает у вас при [Concept('court', 'дворе')|E]."
 story_cycle_hunt_mystical_animal: "Охота за мистическим животным"
 story_cycle_hunt_mystical_animal_desc: "Во время охоты вы заметили мистического белого зверя. Поймать такую добычу — всё равно что отыскать Святой Грааль!"
 WHITE_ANIMAL_INFORMATION_STRING: "Вы одержимы преследованием удивительного зверя. Это #V [Story.MakeScope.Var('animal_type').GetFlagName] снежно-белого цвета#!.\n\nНастигнув свою добычу, вы получите огромную награду — но всякий раз, когда [Story.MakeScope.Var('animal_type').GetFlagName] уходит от погони, у вас повышается [Concept('stress', 'стресс')|E]. Время от времени будет появляться модификатор «[GetModifier('hunt_sighting_legendary_modifier').GetNameWithTooltip]», который означает, что охоту можно продолжить.\n\nВстречи с добычей ([Story.MakeScope.Var('animal_type').GetFlagName] белого цвета): [Story.MakeScope.Var('encounters').GetValue|0V] #weak (начиная с первого раза)#!"
 LEGENDARY_COUNTY_LABEL: "Место, где сейчас обитает [Story.MakeScope.Var('animal_type').GetFlagName] белого цвета"
 story_sycophant: "Подхалим"
 story_sycophant_desc: "Один из придворных — неисправимый подхалим — раздражает ваших вассалов одним своим существованием."
 SYCOPHANT_INFORMATION_STRING: "[Select_CString(Story.MakeScope.Var('sycophant_character').Char.IsFemale, 'Моя', 'Мой' )] [Story.GetOwner.Custom2( 'RelationToMeShort', Story.MakeScope.Var('sycophant_character').Char )] [Story.MakeScope.Var('sycophant_character').Char.GetShortUIName] и [Select_CString(Story.MakeScope.Var('jealous_character').Char.IsFemale, 'моя', 'мой' )] [Story.GetOwner.Custom2( 'RelationToMeShort', Story.MakeScope.Var('jealous_character').Char )] [Story.MakeScope.Var('jealous_character').Char.GetShortUIName] ненавидят друг друга. Я [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] бы поддержать кого-то из них, но это наверняка разозлит другого. Кто знает, чем всё это закончится…"
 SYCOPHANT_LABEL: "Подхалим"
 JEALOUS_VASSAL_LABEL: "Самый ревностный вассал"
 story_cycle_pet_rock: "Ручной камень"
 story_cycle_pet_rock_desc: "Вас повсюду сопровождает ручной камень. Его невозмутимый вид как нельзя лучше соответствует вашим своеобразным предпочтениям в выборе товарищей."
 PET_ROCK_INFORMATION_STRING: "Ваш камень зовут #V [Story.GetOwner.Custom('RockStoryName')].#!\nУ н[Story.GetOwner.Custom('RockStoryHerHis')] угловатая поверхность и насыщенно-[Story.GetOwner.Custom('RockColor')] цвет."
 story_cycle_admin_eunuch: "Видный евнух"
 story_cycle_admin_eunuch_desc: "К вашему двору прибился весьма одаренный евнух. Станет ли он угрозой или благодаря ему у вас появятся новые возможности?"
 EUNUCH_INFORMATION_STRING: "Если на то будет ваша воля, со временем [Story.MakeScope.Var('eunuch').Char.GetShortUIName] приобретет всё больше власти и влияния, что приведет к усилению [Concept('modifier', 'модификатора')|E] «[GetModifier('admin_eunuch_liege_4_modifier').GetNameWithTooltip]».\n\nНо учтите: если вы будете [Select_CString(Story.MakeScope.Var('eunuch').Char.IsFemale, 'ею', 'им' )] пренебрегать или дадите [Select_CString(Story.MakeScope.Var('eunuch').Char.IsFemale, 'ей', 'ему' )] #EMP слишком#! большую власть, не заручившись [Story.MakeScope.Var('eunuch').Char.GetHerHis] верностью, последствия могут быть ужасными…\n\nК настоящему моменту вы [Story.MakeScope.Var('eunuch_refusals').GetValue|0V] раз(а) отказали в [Story.MakeScope.Var('eunuch').Char.GetHerHis] просьбах."
 EUNUCH_LABEL: "Евнух"
 UPSET_COURTIERS: "Недовольные евнухом подданные"
 POETRY_BOOK_LABEL: "Моя книга стихов"
 commission_epic_story: "Составление эпоса"
 commission_epic_story_desc: "Вы заказали героический эпос, прославляющий великие деяния вашей семьи."
 EPIC_INFORMATION_STRING: "[Select_CString(Story.MakeScope.Var('composer').Char.IsFemale, 'Ваша', 'Ваш' )] [Story.GetOwner.Custom('CommissionEpicScribe')][AddTextIf(Story.MakeScope.Var('composer').IsSet, Concatenate(Concatenate(', ', Story.MakeScope.Var('composer').Char.GetShortUIName), ','))] работает над эпическим произведением. [Story.MakeScope.Var('composer').Char.GetHerHis|U] [Story.Custom('CompositionTypeAll')] повысит [Concept('dynasty_prestige', 'признание')|E] [Concept('dynasty', 'династии')|E] [Story.GetOwner.GetDynasty.GetName] и принесет вам [Concept('artifact', 'артефакт')|E].\n\nВероятность того, что [Story.Custom('CompositionTypeAll')] будет выдающегося качества: [Story.MakeScope.Var('final_outcome_chance').GetValue|0+/%]"
 COMPOSER: "Автор вашего эпоса"
 story_foreign_raised_reformer: "Реформатор из дальних стран"
 story_foreign_raised_reformer_desc: "Вы выросли вдали от родного дома.\nНа родине всё кажется таким непривычным… А что, если здесь кое-что поменять, привнести сюда знакомые до боли элементы?"
 REFORMER_INFORMATION_STRING: "Вы росли в державе [Story.MakeScope.Var('advanced_realm').Title.GetBaseName], [Select_CString(Story.MakeScope.Var('foreign_educator').Char.IsFemale, 'вашей воспитательницей была', 'вашим воспитателем был' )] [Story.MakeScope.Var('foreign_educator').Char.GetShortUIName] — [Select_CString(Story.MakeScope.Var('foreign_educator').Char.IsFemale, 'женщина', 'человек' )] #L [Story.MakeScope.Var('advanced_culture').Culture.GetCollectiveNoun|l]ого#! происхождения и #L [Story.MakeScope.Var('advanced_culture_faith').Faith.GetName|l]ого#! вероисповедания. С раннего детства вас восхищала #L [Story.MakeScope.Var('advanced_culture').Culture.GetCollectiveNoun|l]ая#! [Concept('culture', 'культура')|E], и теперь вам бы хотелось, чтобы подданные переняли ее обычаи.\n\nВремя от времени у вас будет шанс заработать очки реформирования или укрепления культуры:\n$BULLET_WITH_TAB$#indent_newline:7 Реформирование обеспечит вам [Concept('innovations', 'инновации')|E], [Concept('cultural_acceptance', 'терпимость культур')|E], [Concept('traditions', 'традиции')|E], а возможно, даже [GetBuilding('generic_university').GetName|l] — только помните, что это долгий и дорогостоящий процесс.#!\n$BULLET_WITH_TAB$#indent_newline:7 Укрепление культуры повысит [Concept('opinion', 'мнение')|E] [Concept('vassal', 'вассалов')|E], даст [Concept('dynasty_prestige', 'признание')|E] и поможет в [Concept('war', 'войне')|E], обеспечивая новые [Concept('casus_bellis', 'казус белли')|E] и [Concept('special_troops', 'особых солдат')|E].#!"
 REFORM_LABEL: "Прогресс на пути к реформированию [Concept('culture', 'культуры')|E]"
 REAFFIRMATION_LABEL: "Прогресс на пути к укреплению [Concept('culture', 'культуры')|E]"
 REFORM_MIN_VALUE_LABEL: ""
 REFORM_MAX_VALUE_LABEL: "Максимум: #V 3#!"
 REAFFIRMATION_MIN_VALUE_LABEL: ""
 REAFFIRMATION_MAX_VALUE_LABEL: "Максимум: #V 2#!"
 ECCENTRIC_MIN_VALUE_LABEL: ""
 ECCENTRIC_MAX_VALUE_LABEL: "Максимум: #V 5#!"
 IMAGINARY_FRIEND_INFORMATION_STRING: "Вашего воображаемого друга зовут [Story.MakeScope.Var('imaginary_friend_name').Char.GetShortUINameNoTooltip]. Время от времени у вас будет возможность взаимодействовать с [Select_CString(Story.MakeScope.Var('imaginary_friend_name').Char.IsFemale, 'ней', 'ним' )]."
 ECCENTRIC_VALUE: "Прогресс к приобретению свойства «[GetTrait('eccentric').GetName( GetNullCharacter )]»"
 story_cycle_imaginary_friend: "Воображаемый друг"
 story_cycle_imaginary_friend_desc: "Наконец-то у меня есть товарищ для игр! Какая разница, настоящий он или нет? Для меня нет никого более настоящего!"
 story_greatest_of_khans: "Величайший из ханов"
 story_greatest_of_khans_desc: "На небе множество разных светил — солнце, луна, звезды… Но на земле может быть лишь один хан."
 GREATEST_OF_KHANS_INFORMATION_STRING: "$become_greatest_of_khans_decision_enable_gok_invasion_cb$\n$gok_enable_offer_submission_or_ruin_tt$\n\n@alert_icon! #alert_trial Если ваша [Concept('dynasty', 'династия')|E] лишится власти над #L [Story.GetOwner.GetPrimaryTitle.GetAdjective|l]ой#! державой, откажется от #TOOLTIP:GOVERNMENT_TYPE,nomad_government #L кочевой формы правления#!#! или не примет [Concept('decision', 'решение')|E] #high «$mpo_gok_world_conquest_decision$»#! до #high [Story.MakeScope.Var('gok_final_date').GetValue|0]#! года, она лишится своих бонусов, а #L [Story.GetOwner.GetPrimaryTitle.GetAdjective|l]ая#! держава рискует распасться!#!"
