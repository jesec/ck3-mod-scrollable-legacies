l_russian:
 acclaimed_opinion: "Именитость"
 accolade.0001.notification_high: "Ранг акколады значительно повышается"
 accolade_rank_unlock_notification_tooltip_high: "Отныне ранг акколады «[changing_accolade.GetNameNoTooltip]» — [acclaimed_knight.Custom('AccoladeRankFlavorNumber')]\n[acclaimed_knight.Custom('FormalComplimentAdjective')|U][Select_CString(acclaimed_knight.IsFemale, 'ая', 'ый' )] [acclaimed_knight.GetShortUINameNoTooltip] обретает новую славу, все [GetPlayer.Custom( 'KnightCulturePluralNoTooltipLowercase' )] страны видят в [Select_CString(acclaimed_knight.IsFemale, 'ней', 'нём' )] пример для подражания."
 accolade.0001.notification_low: "Ранг акколады повышается"
 accolade_rank_unlock_notification_tooltip_low: "Отныне ранг акколады «[changing_accolade.GetNameNoTooltip]» — [acclaimed_knight.Custom('AccoladeRankFlavorNumber')]\n[acclaimed_knight.Custom('ComplimentAdjective')|U][Select_CString(acclaimed_knight.IsFemale, 'ая', 'ый' )] [acclaimed_knight.GetShortUINameNoTooltip] занимает заслуженное место, и ваши [GetPlayer.Custom( 'KnightCulturePluralNoTooltipLowercase' )] приветствуют ее в своем кругу."
 accolade.0002.notification_high: "Ранг акколады заметно понижается"
 accolade_rank_loss_notification_tooltip_high: "Отныне ранг акколады «[changing_accolade.GetNameNoTooltip]» — [acclaimed_knight.Custom('AccoladeRankFlavorNumber')]\nВсе [GetPlayer.Custom( 'KnightCulturePluralNoTooltipLowercase' )] страны спорят, сможет ли [acclaimed_knight.GetShortUINameNoTooltip] вернуть высокий статус, подобающий [acclaimed_knight.GetHerHis] званию."
 accolade_rank_loss_notification_tooltip_high_dead: "Отныне ранг акколады «[changing_accolade.GetNameNoTooltip]» — [acclaimed_knight.Custom('AccoladeRankFlavorNumber')]\nТеперь, когда [acclaimed_knight.Custom('FormalComplimentAdjective')][Select_CString(acclaimed_knight.IsFemale, 'ая', 'ый' )] [acclaimed_knight.GetShortUINameNoTooltip] [Select_CString(acclaimed_knight.IsFemale, 'мертва', 'мертв' )], едва ли былая слава [acclaimed_knight.GetHerHis] звания может быть скоро восстановлена."
 accolade.0002.notification_low: "Ранг акколады понижается"
 accolade_rank_loss_notification_tooltip_low: "Отныне ранг акколады «[changing_accolade.GetNameNoTooltip]» — [acclaimed_knight.Custom('AccoladeRankFlavorNumber')]\nВремя покажет, сумеет ли [acclaimed_knight.GetShortUINameNoTooltip] восстановить былую славу своего звания."
 accolade_rank_loss_notification_tooltip_low_dead: "Отныне ранг акколады «[changing_accolade.GetNameNoTooltip]» — [acclaimed_knight.Custom('AccoladeRankFlavorNumber')]\nТеперь, когда [acclaimed_knight.Custom('ComplimentAdjective')][Select_CString(acclaimed_knight.IsFemale, 'ая', 'ый' )] [acclaimed_knight.GetShortUINameNoTooltip] [Select_CString(acclaimed_knight.IsFemale, 'мертва', 'мертв' )], судьба [acclaimed_knight.GetHerHis] высокого звания лежит в руках [acclaimed_knight.GetHerHis] преемника."
 accolade.0002.notification_empty: "Ранг акколады понижается"
 accolade_rank_loss_notification_tooltip_empty: "[changing_accolade.GetNameNoTooltip] теряет [Concept( 'accolade_rank', 'ранг' )|E]"
 accolade_rank_loss_notification_tooltip_no_rank: "Отныне ранг акколады «[changing_accolade.GetNameNoTooltip]» — [acclaimed_knight.Custom('AccoladeRankFlavorNumber')], а все эффекты потеряны\nВремя покажет, сумеет ли [acclaimed_knight.GetShortUINameNoTooltip] восстановить былую славу своего звания."
 accolade_rank_loss_notification_tooltip_no_rank_dead: "Отныне ранг акколады «[changing_accolade.GetNameNoTooltip]» — [acclaimed_knight.Custom('AccoladeRankFlavorNumber')], а все эффекты потеряны\nТеперь, когда [acclaimed_knight.Custom('ComplimentAdjective')][Select_CString(acclaimed_knight.IsFemale, 'ая', 'ый' )] [acclaimed_knight.GetShortUINameNoTooltip] [Select_CString(acclaimed_knight.IsFemale, 'мертва', 'мертв' )], судьба [acclaimed_knight.GetHerHis] высокого звания лежит в руках [acclaimed_knight.GetHerHis] преемника."
 accolade_rank_loss_notification_tooltip_empty_no_rank: "Отныне ранг акколады «[changing_accolade.GetNameNoTooltip]» — [acclaimed_knight.Custom('AccoladeRankFlavorNumber')], а все эффекты потеряны"
 accolade.0003.accolade_becomes_idle.tt: "Акколада «[dead_accolade.GetNameNoTooltip]» становится неактивной"
 accolade.0003.accolade_becomes_idle_effects.tt: "В отсутствие подходящего именитого рыцаря все эффекты будут потеряны"
 accolade_notification_new.old_acclaimed_knight.tt: "Преемник: [succeeding_accolade.GetNameNoTooltip]"
 accolade_notification_new.old_acclaimed_knight_name.tt: "Отныне [new_acclaimed_knight.GetName] — [succeeding_accolade.GetName]."
 accolade.glory_loss.tt: "Акколада «[succeeding_accolade.GetName]» теряет #N [TopScope.GetValue( 'glory' )|0]#! ед. [Concept('glory', 'славы')|E]"
 accolade.no_glory_loss.tt: "Последний $knight_culture_player_no_tooltip_lowercase$, удостоенный акколады «[succeeding_accolade.GetName]», умер [Concept('character_death_death', 'почетной смертью')|E], поэтому акколада не теряет [Concept('glory', 'славы')|E]"
 accolade.0007.notification: "Преемник акколады найден"
 accolade_find_successor_notification_tooltip: "[chosen_knight.GetUIName], [Select_CString(chosen_knight.IsFemale, 'почтенная', 'почтенный' )] [GetPlayer.Custom( 'KnightCultureNoTooltipLowercase' )], присоединяется к вашему двору.\n[chosen_knight.GetSheHe|U] может стать преемником акколады [accolade_in_need.GetName]."
 accolade.0007.notification_fail: "Нет достойных преемников акколады"
 accolade_find_successor_fail_notification_tooltip: "Поиск [GetPlayer.Custom( 'KnightCultureNoTooltipLowercase' )], достойного стать [accolade_in_need.GetName], не увенчался успехом."
