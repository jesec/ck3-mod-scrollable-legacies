l_spanish:
 # Flight of the Tai, Mass migration main event
 tgp_tai_migration_event.1000.t: "La fuga de los tai"
 tgp_tai_migration_event.1000.desc: "Durante la reunión del consejo de hoy, se me informa de una migración masiva de colonos tai. [migration_leader.GetName], [migration_leader.Custom('ES_ElLa')] representante de su comunidad, se halla ante mí y presenta su caso con toda humildad.\n\n«Mi [ROOT.Char.GetTitleAsNameNoTooltip|l], buscamos guía y un nuevo hogar como antiguos súbditos de [migration_origin_holder.GetName]. Hablo en nombre de muchos clanes y de millares que esperan un refugio. Protegednos de los males y dadnos un propósito para que podamos ser sirvientes útiles que merezcan vuestra generosidad».\n\nSu destino se encuentra en mis labios."
 tgp_tai_migration_event.1000.a: "Os doy la bienvenida no como invitados, sino como súbditos."
 tgp_tai_migration_event.1000.b: "Solo los más diestros de vosotros residiréis en mi [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip|l]."
 tgp_tai_migration_event.1000.c: "Más gente conlleva más problemas; buscad otra puerta a la que llamar."
 tgp_tai_migration_event_1000.c_shooed_immigrants_tt: "Los inmigrantes pueden pedir refugio a otro gobernante cercano en un futuro próximo."
 tgp_tai_migration_skilled_development_county_modifier: "Fuga de artesanos"
 tgp_tai_migration_migration_happened_county_modifier: "Colonos tai"
 tgp_tai_migration_migration_happened_character_modifier: "Miríadas de inmigrantes aceptados"
 tgp_tai_migration_migration_rejected_character_modifier: "Inmigrantes rechazados"
 # Lone skilled Tai character offers services
 tgp_tai_migration_event.2000.t: "Tai con talento"
 tgp_tai_migration_event.2000.desc: "Un[migrant_skilled_character.Custom('ES_XA')] [migrant_skilled_character.GetWomanMan] capaz que proclama venir de tierra [migrant_skilled_character.GetCulture.GetNameNoTooltip] se encuentra ante mí como alguien culto en busca de trabajo. Sus modales parecen reflejar las noticias recientes sobre la huida de su pueblo.\n\n"
 tgp_tai_migration_event.2000.wet_nurse.desc: "«Vuestra Santidad, me llamo [migrant_skilled_character.GetName], un[migrant_skilled_character.Custom('ES_XA')] cuidador[migrant_skilled_character.Custom('ES_XA')] con experiencia, list[migrant_skilled_character.Custom('ES_OA')] para servir. Estoy san[migrant_skilled_character.Custom('ES_OA')], bien nutrid[migrant_skilled_character.Custom('ES_OA')] y conozco las necesidades de los bebés. Permitidme ayudar a que vuestro linaje prospere»."
 tgp_tai_migration_event.2000.champion.desc: "«Magistral señor[ROOT.Char.Custom('ES_XA')]; en mi tierra natal se me conoce como [migrant_skilled_character.GetName], guerrer[migrant_skilled_character.Custom('ES_OA')] juramentad[migrant_skilled_character.Custom('ES_OA')] y vencedor[migrant_skilled_character.Custom('ES_XA')] en muchos torneos. Mi brazo es firme y mi lealtad incuestionable. Dejadme ser [Select_CString( migrant_skilled_character.IsFemale, 'vuestra campeona', 'vuestro campeón' )]»."
 tgp_tai_migration_event.2000.travel_leader.desc: "«Mi [ROOT.Char.GetTitleAsNameNoTooltip|l], soy [migrant_skilled_character.GetName]. Tras haber viajado por desiertos, las estrellas me sirven de mapa y los vientos como aliados. Bajo mi dirección, no se perderá ninguna caravana y ninguna senda presentará problemas»."
 tgp_tai_migration_event.2000.master_of_hunt.desc: "«Nacid[migrant_skilled_character.Custom('ES_OA')] para cazar, templad[migrant_skilled_character.Custom('ES_OA')] por la naturaleza, conozco el olor de toda bestia y el silencio de todo árbol. Leo las huellas como nadie. ¿Qué me decís, mi [ROOT.Char.GetTitleAsNameNoTooltip|l]?»."
 tgp_tai_migration_event.2000.court_physician.desc: "«Ungüentos sacados de tomos antiguos y la destreza de rendir bajo presión, soy [Select_CString( migrant_skilled_character.IsFemale, 'la única', 'el único' )] al que precisaréis para calmar vuestro cuerpo celestial, mi [ROOT.Char.GetTitleAsNameNoTooltip|l]. Me llaman [migrant_skilled_character.GetName]»."
 tgp_tai_migration_event.2000.antiquarian.desc: "«Mis ojos han visto mitos y mis manos han tocado imperios antiguos. Dejad que me quede para que la sabiduría de los antiguos llegue a vuestra corte»."
 tgp_tai_migration_event.2000.court_tutor.desc: "«He influido sobre muchos guerreros y estadistas, mi [ROOT.Char.GetTitleAsNameNoTooltip|l]. Vuestra progenie también alcanzará la grandeza bajo mi supervisión, si lo permitís»."
 tgp_tai_migration_event.2000.end.desc: "\n\nParece desesperad[migrant_skilled_character.Custom('ES_OA')] por tener refugio, probablemente por las razones que le han traído aquí, pero seguro que conoce bien su oficio. ¿Debo emplear sus habilidades en mi beneficio?"
 tgp_tai_migration_event.2000.a: "Puede que precise de vuestros servicios."
 tgp_tai_migration_event.2000.b: "Aún no, pero debéis quedaros con nosotros."
 tgp_tai_migration_event.2000.b.success: "[migrant_skilled_character.GetNameNoTooltip] se une a tu corte"
 tgp_tai_migration_event.2000.b.failure: "[migrant_skilled_character.GetNameNoTooltip] rechaza tu oferta"
 tgp_tai_migration_event.2000.c: "He de negarme."
 # Noble Tai character and his family are asking for a spare county
 tgp_tai_migration_event.3000.t: "La propuesta de un hombre de familia"
 tgp_tai_migration_event.3000.desc: "Un extranjero recto se acerca a mis salones con una confianza notable para hacer una oferta administrativa.\n\nTras un saludo sorprendentemente sincero, al contrario de los típicos modales rústicos, y una narración detallada del penoso viaje de su familia hasta mis tierras, llega a una conclusión audaz.\n\n«… forajidos y salteadores, os lo aseguro, mi [ROOT.Char.GetTitleAsNameNoTooltip|l]. Lo que me queda de mis posesiones saqueadas es un talento probado, una percepción aguda para supervisar, lealtad y una familia que necesita de vuestra ayuda. Mi sangre y yo seremos vuestros sirvientes hasta que consideréis que no lo merecemos»."
 tgp_tai_migration_event.3000.a: "Se os concederá vuestro deseo, siempre que seáis leales."
 tgp_tai_migration_event.3000.b: "No me parece un intercambio justo."
 # A family of lowborn peasant characters offer services
 tgp_tai_migration_event.4000.t: "Una familia tai"
 tgp_tai_migration_event.4000.desc: "Mis guardias traen al salón a una familia indigente de extranjeros de las tierras del norte.\n\nTras una larga sesión de súplicas, el cabeza de familia mira en mi alma y ofrece todo lo que no posee para limpiar los suelos de mi palacio a cambio de refugiarse bajo mis poderosas alas. Según su historia, parece que muchos de los suyos acuden a nuestras tierras en busca de nuevos protectores."
 tgp_tai_migration_event.4000.a: "Os protegeré en estos momentos difíciles."
 tgp_tai_migration_event.4000.b: "A mi corte no le sirve de nada vuestra familia."
