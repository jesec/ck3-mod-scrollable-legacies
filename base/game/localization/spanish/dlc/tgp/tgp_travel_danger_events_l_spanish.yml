l_spanish:
 tgp_travel_danger_events.0001.t: "Vivir entre las ruinas"
 tgp_travel_danger_events.0001.intro: "Al viajar por [ROOT.Char.GetCurrentLocation.GetName], veo en todas partes el impacto de semejante [disaster_situation.GetType.GetNameNoTooltip|l]."
 tgp_travel_danger_events.0001.flood: "Las orillas del río atestadas de restos, casas flotando por el río como si fueran hojas en un arroyo. Una aldea entera ha sido arrasada por la feroz corriente."
 tgp_travel_danger_events.0001.earthquake: "La tierra que fue fértil en el pasado se halla en silencio entre escombros y caos, tragada por la misma tierra."
 tgp_travel_danger_events.0001.desc: "\n\nCuando llegamos a los límites de un pueblo destrozado me fijo en [Select_CString(peasant_character_child.IsFemale, 'una niña solitaria', 'un niño solitario' )] entre los escombros. No me presta atención, pues intenta reconstruir desesperadamente lo que parece que fue una granja."
 tgp_travel_danger_events.0001.a: "Mis hombres despejarán los escombros."
 tgp_travel_danger_events.0001.b: "[peasant_character_child.GetHerHim|U] podré bajo mi protección."
 tgp_travel_danger_events.0001.c: "¡No tengo tiempo para esto!"
 impressed_by_kindness: "Impresión por amabilidad"
