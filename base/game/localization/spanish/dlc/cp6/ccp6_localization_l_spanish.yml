l_spanish:
 #St Peter's Basilica
 building_type_holy_site_st_peters_basilica_01: "$building_holy_site_st_peters_basilica_01$"
 building_type_holy_site_st_peters_basilica_01_desc: "$building_holy_site_st_peters_basilica_01_desc$"
 building_holy_site_st_peters_basilica_01: "Basílica de San Pedro"
 building_holy_site_st_peters_basilica_01_desc: "Levantada sobre la tumba de san Pedro en la colina del Vaticano por orden del emperador Constantino I tras convertirse al cristianismo, la basílica de san Pedro sirve como centro de la cristiandad de Occidente. \n\nSegún la tradición, esta iglesia actúa como la sede del papa católico y con el paso de los siglos se ha extendido hasta convertirse en un extenso complejo, protegido por la muralla leonina."
 #Mont-Saint-Michel
 building_type_mont_st_michel_01: "Mont-Saint-Michel"
 building_type_mont_st_michel_01_desc: "$building_mont_st_michel_01_desc$"
 building_mont_st_michel_01: "Oratorio de san Aubert a san Miguel"
 building_mont_st_michel_01_desc: "En 708, san Aubert, obispo de Avranches, vio en sueños al arcángel Miguel que le encargó levantar un oratorio en una isla mareal cercana. Aubert no hizo caso de la misión al principio, al creer que se trataba de una jugarreta del diablo. Al final, el arcángel consiguió convencerlo —según la leyenda, cuando le hizo un agujero en la cabeza con un solo toque— y el obispo ordenó la construcción del nuevo santuario en el monte Tombe. \n\nAsí comienza la historia del Mont-Saint-Michel."
 building_mont_st_michel_02: "La abadía románica de Mont-Saint-Michel"
 building_mont_st_michel_02_desc: "La nueva iglesia de la abadía se sitúa en el punto más alto de la isla, como testimonio del poder de Dios en el cielo y en la tierra y del ingenio de la humanidad. \n\nA los pies de la abadía, una pequeña aldea de peregrinos y pescadores crece poco a poco."
 building_mont_st_michel_03: "La Merveille"
 building_mont_st_michel_03_desc: "La abadía se ha expandido con una serie de claustros, una capellanía, una bodega de vinos, la sala de los caballeros y muchos alojamientos hasta formar un complejo gótico que solo se puede describir como una maravilla de la ingeniería. \n\nLa abadía ahora posee unas fortificaciones nuevas e impresionantes y el asentamiento a sus pies ya es todo un pueblo que alberga a peregrinos y lugareños por igual."
 building_mont_st_michel_04: "Monasterio fortificado de Mont-Saint-Michel"
 building_mont_st_michel_04_desc: "Las guerras recientes han dejado claro que hasta una isla de paz como Mont-Saint-Michel puede ser un punto de interés estratégico. Por este motivo, se ha fortificado la isla a fondo con grandes murallas y bastiones y se han creado varios cuarteles nuevos para la guarnición. \n\nEl pueblo costero ahora es una ciudad llena de vida y la isla entera está prácticamente cubierta de casas."
 #Sanchi Stupa
 building_type_sanchi_stupa_01: "$building_sanchi_stupa_01$"
 building_type_sanchi_stupa_01_desc: "$building_sanchi_stupa_01_desc$"
 building_sanchi_stupa_01: "Gran estupa de Sanchi"
 building_sanchi_stupa_01_desc: "La gran estupa fue construida por el emperador maurya Ashoka en el siglo III a. C., cerca de donde se casó con su esposa Devi. La grandiosa estructura, que alberga reliquias de Buda, es una de las más antiguas de su clase y también es famosa por sus puertas torana intrincadamente talladas."
 #Boudhanath
 building_type_boudhanath_01: "$building_boudhanath_01$"
 building_type_boudhanath_01_desc: "$building_boudhanath_01_desc$"
 building_boudhanath_01: "Boudhanath"
 building_boudhanath_01_desc: "La estupa Boudha de Katmandú, también conocida como Jarung Kashor y Khāsa Chaitya, es una de las mayores estupas del budismo y puede que sea el lugar de nacimiento de lo que llegaría a ser la rama tibetana del budismo. Sus enormes cúpula y mandala alojan los restos de muchos budas e incontables reliquias sagradas de distintos tipos y formas. \n\nDado que se ubica en una antigua ruta comercial entre Nepal y el Tíbet, viajeros y comerciantes suelen detenerse aquí a descansar y orar."
 #Grand Mosque of Yazd
 building_type_yazd_mosque_01: "$building_yazd_mosque_01$"
 building_type_yazd_mosque_01_desc: "$building_yazd_mosque_01_desc$"
 building_yazd_mosque_01: "Gran mezquita de Yazd"
 building_yazd_mosque_01_desc: "Construido donde se encontraba un templo del fuego del siglo IV, este edificio ilustre asombra al viajero y al peregrino por igual con sus grandes iwanes, su cúpula alicatada y su entrada majestuosa con un par de minaretes altísimos."
 #Qutb Minar
 building_type_qutb_minar_01: "$building_qutb_minar_01$"
 building_type_qutb_minar_01_desc: "$building_qutb_minar_01_desc$"
 building_qutb_minar_01: "Pilar de hierro de Delhi"
 building_qutb_minar_01_desc: "El imponente Pilar de hierro de Delhi se alza como símbolo del rey Chandragupta II, aunque gobernantes posteriores también grabaran sus nombres en él. Pese a llevar mucho tiempo en pie, no hay ni rastro de oxidación, ¡prueba de la habilidad de los herreros de la India!"
 building_qutb_minar_02: "Qutb Minar"
 building_qutb_minar_02_desc: "La Quwwat-ul-Islam, una gran mezquita que rodea el antiguo lugar que era el pilar de hierro de Delhi, coronada con un minarete ciertamente enorme llamado el Qutb Minar. \n\nUn monumento magnífico al poder de los gobernantes de Delhi."
 building_qutb_minar_03: "Mezquita de Quwwat-ul-Islam ampliada"
 building_qutb_minar_03_desc: "El complejo en torno al Qutb Minar se ha ampliado con más patios, pórticos y mausoleos, hasta alcanzar proporciones legendarias."
 building_qutb_minar_04: "Alai Minar"
 building_qutb_minar_04_desc: "Se ha añadido un segundo minarete al complejo, diseñado a imagen del Qutb Minar, pero el doble de grande. Este coloso que se cierne sobre Delhi es el culmen de la arquitectura indoislámica."
