l_spanish:
 #Goguryeo Tomb
 building_type_goguryeo_tomb_01: "$building_goguryeo_tomb_01$"
 building_type_goguryeo_tomb_01_desc: "$building_goguryeo_tomb_01_desc$"
 building_goguryeo_tomb_01: "Tumba de un rey de Goguryeo"
 building_goguryeo_tomb_01_desc: "Se dice que esta gran tumba rectangular de roca trabajada pertenece a un antiguo rey de Goguryeo, si bien se ha perdido el recuerdo de su nombre. Los pasillos que llevan a la tumba están decorados con coloridos frescos y en la cima de la pirámide se alza un pequeño pabellón de madera que honra al enterrado"
 #Great Buddha of Kamakura
 building_type_buddha_kamakura_01: "$building_buddha_kamakura_01$"
 building_type_buddha_kamakura_01_desc: "$building_buddha_kamakura_01_desc$"
 building_buddha_kamakura_01: "Gran Buda de Kamakura"
 building_buddha_kamakura_01_desc: "El #italic daibutsu#! de Kamakura es una venerable estatua de bronce de Buda Amitābha; tiene varias toneladas de peso y está adornada con detalles en oro. Se encuentra dentro de una gran sala inspirada en los templos del sudoeste y está rodeado por treinta y dos pétalos de loto."
 #Lingapura Pyramid
 building_type_pyramid_lingapura_01: "$building_pyramid_lingapura_01$"
 building_type_pyramid_lingapura_01_desc: "$building_pyramid_lingapura_01_desc$"
 building_pyramid_lingapura_01: "Pirámide de Lingapura"
 building_pyramid_lingapura_01_desc: "Esta gran pirámide escalonada se alza de entre la selva como una montaña sagradas; cada una de sus terrazas aloja santuarios y altares cada vez más decorados. El santuario superior corona la estructura y protege en su interior el #italic lingam#! sagrado de Shiva, el centro de un complejo plano axial de diseño religioso."
 #Maijishan Grottoes
 building_type_maijishan_grottoes_01: "$building_maijishan_grottoes_01$"
 building_type_maijishan_grottoes_01_desc: "$building_maijishan_grottoes_01_desc$"
 building_maijishan_grottoes_01: "Grutas de Maijishan"
 building_maijishan_grottoes_01_desc: "Las montañas de Maijishan son un lugar de veneración desde hace mucho y en sus escarpaduras al sur, consideradas auspiciosas por la geomancia, se han excavado cientos de santuarios en su piedra roja que albergan estatuas y frescos coloridos de Budas y bodhisattvas serenos. Muchos fueron encargos de familias urbanas cercanas, que consideran este emplazamiento como un lugar ocasional de peregrinación y contemplación meditativa."
 #Three Pagodas of Dali
 building_type_three_pagodas_dali_01: "$building_three_pagodas_dali_01$"
 building_type_three_pagodas_dali_01_desc: "$building_three_pagodas_dali_01_desc$"
 building_three_pagodas_dali_01: "Tres pagodas de Dali"
 building_three_pagodas_dali_01_desc: "Tres altas pagodas de muros de ladrillo y pedestales de piedra se alzan desde el expandido complejo del templo de la familia gobernante de la ciudad. Son los extremos de un triángulo isósceles que indican la geometría sagrada del lugar y enmarcan las montañas y el lago colindantes."
 #Iron Lion of Cangzhou
 building_type_iron_lion_cangzhou_01: "$building_iron_lion_cangzhou_01$"
 building_type_iron_lion_cangzhou_01_desc: "$building_iron_lion_cangzhou_01_desc$"
 building_iron_lion_cangzhou_01: "León de hierro de Cangzhou"
 building_iron_lion_cangzhou_01_desc: "Este león monumental es la escultura de hierro fundido más grande de China y su fuerte lomo sostiene un bodhisattva que se sienta cuidadoso sobre un pedestal de loto, decorado lujosamente con detalles en oro. Situado cerca de una llanura dada a las inundaciones, se ha convertido en un guardián contra las mareas crecientes para los ciudadanos locales."
 #Gaocheng Observatory
 building_type_dengfeng_observatory_01: "$building_dengfeng_observatory_01$"
 building_type_dengfeng_observatory_01_desc: "$building_dengfeng_observatory_01_desc$"
 building_dengfeng_observatory_01: "Observatorio de Gaocheng"
 building_dengfeng_observatory_01_desc: "Este lugar se ha visto favorecido por la observación astronómica durante siglos gracias a sus cualidades geománticas y centralidad geográfica simbólica en China. La estructura actual, una forma trapezoidal compleja, actúa como reloj de sol inmenso, donde la alta aguja central proyecta su sombra sobre la zanja que divide la plataforma para marcar el recorrido del sol."
 #Candi of Muara Takus
 building_type_muara_takus_01: "$building_muara_takus_01$"
 building_type_muara_takus_01_desc: "$building_muara_takus_01_desc$"
 building_muara_takus_01: "Candi de Muara Takus"
 building_muara_takus_01_desc: "Muchas estructuras componen el complejo del templo, todas construidas con ladrillo y decoradas con detalles en arenisca. En su centro se alzan las grandes estupas de #italic Mahligai#! y #italic Tuo#!; alta y esbelta la primera, la segunda extensa como una montaña, sobresalen por encima de los santuarios más pequeños y bancales que las rodean."
 #Stone Pagoda of Mireuksa
 building_type_stone_pagoda_01: "$building_stone_pagoda_01$"
 building_type_stone_pagoda_01_desc: "$building_stone_pagoda_01_desc$"
 building_stone_pagoda_01: "Pagoda de piedra de Mireuksa"
 building_stone_pagoda_01_desc: "Una pagoda de nueve plantas que se alza sobre un amplio pedestal de piedra, con una mampostería pálida que brilla bajo el cielo soleado. Es la primera de las cinco pagodas de piedra de Corea; su forma y sus proporciones equilibradas la han convertido en un modelo para los constructores de templos de toda la península."
 #Thuriang Kilns
 building_type_thuriang_kilns_01: "$building_thuriang_kilns_01$"
 building_type_thuriang_kilns_01_desc: "$building_thuriang_kilns_01_desc$"
 building_thuriang_kilns_01: "Hornos de Thuriang"
 building_thuriang_kilns_01_desc: "Más de doscientos grandes hornos ocupan este lugar, el mayor centro de producción de celadón de la región. La cerámica que aquí se cuece es famosa por su textura basta, cocida a fuego fuerte y de un vidriado verde amarillento que se comercializa en todos los mercados del sudeste asiático."
 #Yuelu Academy
 building_type_yuelu_academy_01: "$building_yuelu_academy_01$"
 building_type_yuelu_academy_01_desc: "$building_yuelu_academy_01_desc$"
 building_yuelu_academy_01: "Academia de Yuelu"
 building_yuelu_academy_01_desc: "Yuelu, una de las academias de enseñanza más prestigiosas de China, ha funcionado durante mucho tiempo como lugar de estudio y exámenes. Su diseño se centra en torno a un patio principal desde el cual se extienden hacia el exterior con una simetría equilibrada salas adyacentes y pabellones donde generaciones de eruditos se han preparado para la administración pública."
 #Chocolate Hills #NOTE: today are called "Chocolate" Hills, but of course chocolate didn't exist in the Philippines back then. This is a random name I thought out, but it is not based on native names (none of which seem to have survived from then)
 building_type_chocolate_hills_01: "$building_chocolate_hills_01$"
 building_type_chocolate_hills_01_desc: "$building_chocolate_hills_01_desc$"
 building_chocolate_hills_01: "Laderas de Russet"
 building_chocolate_hills_01_desc: "Esta formación geológica se caracteriza por un gran número de colinas redondeas y cónicas que se extienden por todo el paisaje. Están cubiertas por una capa de hierba que, en la estación seca, adquieren una tonalidad viva marrón y naranja que dan al terreno un tinte otoñal poco corriente."
 #Fanfang of Guangzhou
 building_type_fanfang_guangzhou_01: "$building_fanfang_guangzhou_01$"
 building_type_fanfang_guangzhou_01_desc: "$building_fanfang_guangzhou_01_desc$"
 building_fanfang_guangzhou_01: "Fanfang de Guangzhou"
 building_fanfang_guangzhou_01_desc: "El #italic fanfang#! es una comunidad importante de mercaderes extranjeros —sobre todo musulmanes árabes y persas que han llegado aquí por rutas marítimas— a quienes se les ha concedido un distrito propio al oeste de la ciudad, con costumbres y funcionarios propios. En su centro se encuentra una mezquita de muros rojos, coronada por un minarete y faro alto que guía a barcos y almas a la seguridad del puerto."
 #Wilwatikta Palace
 building_type_wilwatikta_palace_01: "$building_wilwatikta_palace_01$"
 building_type_wilwatikta_palace_01_desc: "$building_wilwatikta_palace_01_desc$"
 building_wilwatikta_palace_01: "Palacio de Wilwatikta"
 building_wilwatikta_palace_01_desc: "El Wilwatikta, un vasto complejo palaciego de pabellones, salas, templos y patios, es lo bastante extenso como para parecer una ciudad por derecho propio. Muros rectangulares de ladrillo rodean los terrenos y la entrada a la avenida procesional está señalada por una serie de imponentes puertas #italic paduraksa#!."
 #Ha Long Bay
 building_type_ha_long_bay_01: "$building_ha_long_bay_01$"
 building_type_ha_long_bay_01_desc: "$building_ha_long_bay_01_desc$"
 building_ha_long_bay_01: "Bahía de Ha Long"
 building_ha_long_bay_01_desc: "Este impresionante paisaje de islotes kársticos y calizos se alza de entre las tranquilas aguas esmeralda del golfo, donde los pescadores locales van de un lado a otro en busca de pesca a la sombra de los pilares."
 #My Son Sanctuary
 building_type_my_son_sanctuary_01: "$building_my_son_sanctuary_01$"
 building_type_my_son_sanctuary_01_desc: "$building_my_son_sanctuary_01_desc$"
 building_my_son_sanctuary_01: "Santuario de My Son"
 building_my_son_sanctuary_01_desc: "El mayor y más elegante de los complejos de templos cham, el santuario está compuesto por una serie de recintos desperdigados, pero cerca unos de otros en la tierra arbolada; cada uno con sus respectivas puertas, santuarios y estupas. Todas las estructuras están construidas en ladrillo rojo, colocado en pautas geométricas y adornadas con dinteles de arenisca."
 #Gunung Api
 building_type_gunung_api_01: "$building_gunung_api_01$"
 building_type_gunung_api_01_desc: "$building_gunung_api_01_desc$"
 building_gunung_api_01: "Gunung Api"
 building_gunung_api_01_desc: "Esta montaña que se alza de la selva es sagrada para las gentes de la zona. Entre la humedad y el rocío, sus laderas están cubiertas de llamativos pináculos calizos y profundas cavernas talladas por el agua a lo largo de incontables siglos."
 #Suwalesi Megaliths
 building_type_suwalesi_megaliths_01: "$building_suwalesi_megaliths_01$"
 building_type_suwalesi_megaliths_01_desc: "$building_suwalesi_megaliths_01_desc$"
 building_suwalesi_megaliths_01: "Megalitos de las Célebes"
 building_suwalesi_megaliths_01_desc: "Repartidos por los valles de las Célebes centrales, yacen muchas figuras e iconos megalíticos levantados por la población local para rituales y honrar a los espíritus. Estas efigies, conocidas como #italic arcas#!, están talladas con una precisión minimalista, con formas trazadas con líneas sutiles y elegantes."
 #Izumo Taisha
 building_type_izumo_taisha_01: "$building_izumo_taisha_01$"
 building_type_izumo_taisha_01_desc: "$building_izumo_taisha_01_desc$"
 building_izumo_taisha_01: "Kizuki Taisha"
 building_izumo_taisha_01_desc: "Este gran santuario sintoísta o #italic taisha#! se ha construido cerca de la costa, mirando al mar. Se alza sobre una serie de enormes pilares de madera y gruesos troncos que levantan sus estancias por encima del suelo, por el que caminan los mortales, y hacia el cielo, donde viven los dioses y los espíritus de la tierra."
 #Temple of Confucius
 building_type_confucius_temple_01: "$building_confucius_temple_01$"
 building_type_confucius_temple_01_desc: "$building_confucius_temple_01_desc$"
 building_confucius_temple_01: "Templo de Confucio"
 building_confucius_temple_01_desc: "Este vasto complejo de salas y patios, el más antiguo e influyente de todos los templos confucianos, ha sido un modelo de referencia e inspiración para los constructores de templos de toda China y más allá, con su armoniosa planta geométrica y sofisticados detalles. Cerca se halla un silencioso bosque donde se situaron las tumbas de Confucio y sus descendientes, las cuales se han convertido en un lugar importante de peregrinación para los devotos."
 #Imperial Citadel of Lin'an
 building_type_citadel_linan_01: "$building_citadel_linan_01$"
 building_type_citadel_linan_01_desc: "$building_citadel_linan_01_desc$"
 building_citadel_linan_01: "Ciudadela imperial de Lin'an"
 building_citadel_linan_01_desc: "Construida junto a la ladera norte de la colina del Fénix, la ciudadela imperial actúa como sede de la corte y su administración al alojar a incontables eruditos y funcionarios en sus salas y corredores cavernosos. Si bien no es tan extensa como los palacios de las capitales del norte, el refinamiento y la elegancia de sus jardines y pabellones en terraza están más que a la altura."
 #The Temples of Angkor
 building_type_temples_angkor_01: "$building_temples_angkor_01$"
 building_type_temples_angkor_01_desc: "$building_temples_angkor_01_desc$"
 building_temples_angkor_01: "Templos de Angkor"
 building_temples_angkor_01_desc: "En la próspera ciudad de Indra, los tejados y pináculos dorados de sus templos son innumerables, cada templo más abundantemente decorado que el anterior con relieves tallados y estatuas de deidades y devarajas."
 building_temples_angkor_02: "Angkor Wat"
 building_temples_angkor_02_desc: "Angkor Wat es un complejo de templos inmenso consagrado al dios Visnú. Está diseñado como una representación del monte Meru, el hogar de los dioses de la mitología hindú. El complejo está rodeado por un foso impresionante y tiene varios templos con galerías que abundan en arte, esculturas y relieves religiosos."
