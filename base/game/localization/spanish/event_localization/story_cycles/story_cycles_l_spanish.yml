l_spanish:
 SITUATION_LIST_STORY_CYCLE_MODIFIERS_HEADER: "Modificadores"
 SITUATION_LIST_STORY_CYCLE_DECISIONS_HEADER: "Decisiones"
 not_yet_chosen: "aún por elegir"
 story_cycle_pet_dog: "Perro mascota"
 story_cycle_pet_dog_desc: "#F Un compañero canino fiel camina a tu lado, te ofrece protección y un vínculo de lealtad que pocos humanos pueden igualar.#!"
 DOG_INFORMATION_STRING: "Se llama #V [Story.Custom('DogStoryNameAll')].#!\nTiene un pelaje [Story.Custom('DogFurColorAll')], los ojos [Story.Custom('DogEyeColorAll')] y [Story.Custom('DogStoryPuppyOrAgeAll')].\nNo hay [Story.Custom('DogStoryGirlBoyAll')] mejor."
 dog_age_puppy: "es un cachorro"
 dog_age_proper: "tiene [Story.MakeScope.Var('dog_age_variable').GetValue|0] años"
 cat_age_kitten: "es un gatito"
 cat_age_proper: "tiene [Story.MakeScope.Var('cat_age_variable').GetValue|0] años"
 story_cycle_pet_cat: "Gato mascota"
 story_cycle_pet_cat_desc: "#F Un orgulloso felino te hace compañía; es un cazador diestro que te ofrece afecto solo bajo sus propias condiciones.#!"
 CAT_INFORMATION_STRING: "Se llama #V [Story.Custom('CatStoryNameAll')].#!\nTiene un pelaje [Story.Custom('CatFurColorAll')], los ojos [Story.Custom('CatEyeColorAll')] y [Story.Custom('CatStoryKittenOrAgeAll')].[Story.Custom('CatStupidOrNotStupidAll')]"
 dumb_but_sweet_orange_boy: "\nEs un/a [Story.Custom('CatStoryGirlBoyAll')] idiota de pelaje [Story.Custom('CatFurColorAll')], pero muy dulce."
 story_cycle_pet_eagle: "Águila cazadora"
 story_cycle_pet_eagle_desc: "#F En tu guantelete hay posada un águila cazadora, siempre vigilante, siempre hambrienta, que trae la muerte desde el cielo.#!"
 EAGLE_INFORMATION_STRING: "Tu águila se llama #V [Story.Custom('EagleStoryNameAll')].#!\nTiene [Story.MakeScope.Var('eagle_age_variable').GetValue|0] años."
 bp2_hostage_loyalty: "Un cautivo leal"
 bp2_hostage_loyalty_desc: "Uno de tus [hostages|El] empieza a tomarte cariño a ti y a tus costumbres."
 hostage: "[hostage|E]"
 HOSTAGE_STORY_PRACTICAL_INFORMATION_STRING: "Tu [Concept('hostage',Select_CString(Story.MakeScope.Var('hostage_target').Char.IsFemale,'cautiva', 'cautivo'))|E], [Story.MakeScope.Var('hostage_target').Char.GetUIName], crece en tu [court|El], lo que afecta a su lealtad. Mantén su [opinion|El] alta y toma las elecciones correctas en los eventos para tener mayor probabilidad de que te sea leal cuando se haga adult[Story.MakeScope.Var('hostage_target').Char.Custom('ES_OA')].\n\nLealtad actual: [Story.MakeScope.Var('theon_points').GetValue|0+]"
 LOYALTY_LABEL: "Puntos de lealtad"
 claimant: "[claimant|E]"
 diverted_crusaders: "Cruzados desviados"
 frankokratia_story: "Francocracia"
 frankokratia_story_desc: "Un pretendiente al [GetTitleByKey('e_byzantium').GetName] ha atraído a oportunistas occidentales de su cruzada y ha vuelto unas espadas codiciosas contra el corazón mismo de la cristiandad…"
 FRANKOKRATIA_STORY_PRACTICAL_INFORMATION_STRING: "Una [war|El] contra el [GetTitleByKey('e_byzantium').GetHolder.GetShortUIName] decidirá el futuro del [GetTitleByKey('e_byzantium').GetName]. O bien [Story.MakeScope.Var('byz_claimant').Char.Custom('ES_ElLa')] [claimant|El] [Story.MakeScope.Var('byz_claimant').Char.GetUIName] se apodera del trono y paga a los cruzados por su trabajo… o se fundará un nuevo [GetTitleByKey('e_latin_empire').GetBaseName] bajo la autoridad [GetFaithByKey('catholic').GetAdjective]."
 story_conqueror: "Conquistador"
 story_conqueror_desc: "¡Tu ambición no conoce límites! El mundo yace ante ti, listo para que lo tomes."
 CONQUEROR_STORY_PRACTICAL_INFORMATION_STRING: "Los conquistadores reciben muchas bonificaciones potentes, como la reducción de [factions|El], acceso a [vassalize_casus_belli|El] y, de vez en cuando, eventos poderosos.\n\nDejarás de ser conquistador si:\n$BULLET_WITH_TAB$No eres [independent|El]\n$BULLET_WITH_TAB$Quedas degradado a [count|El]\n$BULLET_WITH_TAB$Te quedas [Concept('unlanded', 'sin tierras')|E]\n$BULLET_WITH_TAB$Llevas #V 10#! años sin librar [war|El]s\n$BULLET_WITH_TAB$Estás muy [Concept('debt', 'endeudado')|E]\n$BULLET_WITH_TAB$Pierdes #V 3#! [wars|El] o más\n$BULLET_WITH_TAB$Quedas [GetTrait('incapable').GetName( GetNullCharacter )|l]"
 story_destiny_child: "Niño predestinado"
 story_destiny_child_desc: "Ha nacido un niño muy prometedor, es como si el mismo destino lo hubiera elegido."
 DESTINY_CHILD_STORY_PRACTICAL_INFORMATION_STRING: "Muy de vez en cuando, nace un niño cuyo destino es la grandeza. Se desarrolla más rápido de lo normal y alcanza cotas que otros no pueden.\n\nCuida bien de [Story.MakeScope.Var('destiny_child').Char.GetUIName] y considera seriamente trabajar para que [Story.MakeScope.Var('destiny_child').Char.GetSheHe] llegue a ser tu [player_heir|El]; por ejemplo, haciendo que sea tu [designated_heir|El]."
 CHILD_OF_DESTINY: "El niño predestinado"
 story_cycle_martial_lifestyle_warhorse: "Caballo de guerra"
 story_cycle_martial_lifestyle_warhorse_desc: "Tienes un caballo de guerra especialmente bien adiestrado a tu disposición. Que tus enemigos se estremezcan cuando cargues."
 WARHORSE_STORY_PRACTICAL_INFORMATION_STRING: "Tu caballo de guerra se llama #V [Story.Custom('WarhorseStoryNameAll')]#!. Y es [Story.Custom('HorseStoryMareStallionAll')]."
 DOPPELGANGER: "Tu [Glossary( 'doppelgänger', 'DOPPELGANGER_GLOSS' )]"
 story_doppelganger: "El espejo en el barro"
 DOPPELGANGER_GLOSS: "Un sosias o doble de una persona viva, a menudo encontrado por casualidad. En el folclore alemán es una aparición insólita y un mal augurio, pues ver a tu doble puede presagiar enfermedad o muerte."
 story_doppelganger_desc: "Se ha encontrado a un[Story.MakeScope.Var('doppelganger_character').Char.Custom('ES_XA')] campesin[Story.MakeScope.Var('doppelganger_character').Char.Custom('ES_OA')] que es exactamente igual a ti, un[Story.MakeScope.Var('doppelganger_character').Char.Custom('ES_XA')] verdader[Story.MakeScope.Var('doppelganger_character').Char.Custom('ES_OA')] [Glossary( 'doppelgänger', 'DOPPELGANGER_GLOSS' )]…"
 DOPPELGANGER_STORY_PRACTICAL_INFORMATION_STRING: "Un[Story.MakeScope.Var('doppelganger_character').Char.Custom('ES_XA')] campesin[Story.MakeScope.Var('doppelganger_character').Char.Custom('ES_OA')] que se asemeja a ti y habla como tú puede ser una oportunidad… o una maldición. Por ahora, [Story.MakeScope.Var('doppelganger_character').Char.GetUIName] reside en tu [court|El]."
 story_cycle_hunt_mystical_animal: "La caza de un animal místico"
 story_cycle_hunt_mystical_animal_desc: "En el transcurso de una cacería, vislumbraste a una bestia blanca mística. ¡Cazarla sería como encontrar el santo grial!"
 WHITE_ANIMAL_INFORMATION_STRING: "Sigues el rastro de un ejemplar de #V [Story.MakeScope.Var('animal_type').GetFlagName|l] de blanco pelaje#!.\n\nCazarlo te traerá grandes recompensas, pero ganarás [stress|El] cada vez que el animal se te escape. De cuando en cuando, un [GetModifier('hunt_sighting_legendary_modifier').GetNameWithTooltip] te permitirá continuar con la cacería.\n\nEncuentros con el ejemplar de [Story.MakeScope.Var('animal_type').GetFlagName] de pelaje blanco: [Story.MakeScope.Var('encounters').GetValue|0V] #weak (desde la primera vez)#!"
 LEGENDARY_COUNTY_LABEL: "Hogar actual del ejemplar de [Story.MakeScope.Var('animal_type').GetFlagName] de blanco pelaje"
 story_sycophant: "El adulador"
 story_sycophant_desc: "Uno de tus cortesanos es un adulador obvio que irrita a tus vasallos con su mera presencia."
 SYCOPHANT_INFORMATION_STRING: "Mi [Story.GetOwner.Custom2( 'RelationToMeShort', Story.MakeScope.Var('sycophant_character').Char )] [Story.MakeScope.Var('sycophant_character').Char.GetShortUIName] y mi [Story.GetOwner.Custom2( 'RelationToMeShort', Story.MakeScope.Var('jealous_character').Char )] [Story.MakeScope.Var('jealous_character').Char.GetShortUIName] están a la greña. Podría elegir un favorito, pero quien no fuera elegido seguramente se enfurecería. El tiempo dirá cómo se desarrolla la situación…"
 SYCOPHANT_LABEL: "El adulador"
 JEALOUS_VASSAL_LABEL: "Mi vasallo más celoso"
 story_cycle_pet_rock: "Roca mascota"
 story_cycle_pet_rock_desc: "A tu lado hay una roca mascota; su rostro inmutable encaja perfectamente con tu peculiar sentido de la compañía."
 PET_ROCK_INFORMATION_STRING: "Tu roca se llama #V [Story.GetOwner.Custom('RockStoryName')].#!\nSu marcado exterior es de color [Story.GetOwner.Custom('RockColor')]."
 story_cycle_admin_eunuch: "Eunuco eminente"
 story_cycle_admin_eunuch_desc: "Un eunuco de talento particular se ha abierto paso en tu corte. ¿Será una oportunidad o una amenaza…?"
 EUNUCH_INFORMATION_STRING: "Con el tiempo, surgirá la posibilidad de conceder a [Story.MakeScope.Var('eunuch').Char.GetShortUIName] mayor poder e influencia. Hacerlo aumentará la fuerza del [modifier|El] [GetModifier('admin_eunuch_liege_4_modifier').GetNameWithTooltip].\n\nPero cuidado: desdeñar a su persona o darle #EMP demasiado#! poder sin garantizar su lealtad puede tener consecuencias funestas…\n\nHasta ahora has rechazado sus peticiones [Story.MakeScope.Var('eunuch_refusals').GetValue|0V] veces."
 EUNUCH_LABEL: "El eunuco"
 UPSET_COURTIERS: "Súbditos disgustados con el eunuco"
 POETRY_BOOK_LABEL: "Mi libro de poesía"
 commission_epic_story: "Encargar epopeya"
 commission_epic_story_desc: "Encargas una gran epopeya que relate las hazañas de tu familia."
 EPIC_INFORMATION_STRING: "Tu [Story.GetOwner.Custom('CommissionEpicScribe')][AddTextIf(Story.MakeScope.Var('composer').IsSet, Concatenate(Concatenate(', ', Story.MakeScope.Var('composer').Char.GetShortUIName), ','))] crea una [Story.Custom('CompositionTypeAll')|l] épica para aumentar el [dynasty_prestige|El] de la [dynasty|El] [Story.GetOwner.GetDynasty.GetName] y conseguir un [artifact|El].\n\nLa probabilidad de una [Story.Custom('CompositionTypeAll')|l] excepcional es del [Story.MakeScope.Var('final_outcome_chance').GetValue|0+/%]"
 COMPOSER: "El escritor de tu epopeya"
 story_foreign_raised_reformer: "Reformador formado en el extranjero"
 story_foreign_raised_reformer_desc: "Te criaste lejos de la tierra que ahora consideras tu hogar.\nTan distinta… y, sin embargo, ¿y si tu hogar fuera más como aquella?"
 REFORMER_INFORMATION_STRING: "[Story.MakeScope.Var('foreign_educator').Char.GetShortUIName], alguien de la comunidad [Story.MakeScope.Var('advanced_culture').Culture.GetName] y fe [Story.MakeScope.Var('advanced_culture_faith').Faith.GetAdjective] te crio en [Story.MakeScope.Var('advanced_realm').Title.GetBaseName]. Te impresionó la [culture|El] [Story.MakeScope.Var('advanced_culture').Culture.GetName] y desearías que tu pueblo fuera más como ellos.\n\nEmpezarás a tener oportunidades para ganar puntos de reforma o de reafirmación:\n$BULLET_WITH_TAB$#indent_newline:7 Si buscas la reforma conseguirás [innovations|El], [cultural_acceptance|El], [traditions|El] o puede que hasta una [GetBuilding('generic_university').GetName|l]. Pero ten en cuenta que la reforma es un proceso largo y costoso.#!\n$BULLET_WITH_TAB$#indent_newline:7 Si buscas la reafirmación, ganarás [opinion|El] de los [vassals|El], [dynasty_prestige|El], bonificaciones para la [war|El] en forma de [casus_bellis|El] y [special_troops|El].#!"
 REFORM_LABEL: "Progreso hacia la reforma de tu [culture|El]"
 REAFFIRMATION_LABEL: "Progreso hacia la reafirmación de tu [culture|El]"
 REFORM_MIN_VALUE_LABEL: ""
 REFORM_MAX_VALUE_LABEL: "Máx.: #V 3#!"
 REAFFIRMATION_MIN_VALUE_LABEL: ""
 REAFFIRMATION_MAX_VALUE_LABEL: "Máx.: #V 2#!"
 ECCENTRIC_MIN_VALUE_LABEL: ""
 ECCENTRIC_MAX_VALUE_LABEL: "Máx.: #V 5#!"
 IMAGINARY_FRIEND_INFORMATION_STRING: "Tu amigo imaginario se llama [Story.MakeScope.Var('imaginary_friend_name').Char.GetShortUINameNoTooltip]. Acabarás teniendo oportunidades para interactuar con [Story.MakeScope.Var('imaginary_friend_name').Char.GetSheHe]."
 ECCENTRIC_VALUE: "Progreso hacia ganar el rasgo [GetTrait('eccentric').GetName( GetNullCharacter )|l]"
 story_cycle_imaginary_friend: "Amigo imaginario"
 story_cycle_imaginary_friend_desc: "¡Por fin un amigo con el que jugar! ¿Qué más da que no sea real? ¡Para mí lo es!"
 story_greatest_of_khans: "El más grande de los kanes"
 story_greatest_of_khans_desc: "En los cielos hay muchas grandes luces. En los cielos están el sol, la luna y las estrellas. Pero en la tierra solo puede haber un kan."
 GREATEST_OF_KHANS_INFORMATION_STRING: "$become_greatest_of_khans_decision_enable_gok_invasion_cb$\n$gok_enable_offer_submission_or_ruin_tt$\n\n@alert_icon! #alert_trial Si tu [dynasty|El] pierde el control sobre [Story.GetOwner.GetPrimaryTitle.GetName|l], deja de ser [GetGovernment( 'nomad_government' ).GetName|l] o no llega a tomar la [decision|El] #high $mpo_gok_world_conquest_decision$#! para el año #high [Story.MakeScope.Var('gok_final_date').GetValue|0]#!, se perderán estas bonificaciones ¡y [Story.GetOwner.GetPrimaryTitle.GetName|l] será vulnerable y podrá desmoronarse!#!"
