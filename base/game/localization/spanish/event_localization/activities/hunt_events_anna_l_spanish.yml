l_spanish:
 hunt_events_anna.0001.t: "Raíces profundas"
 hunt_events_anna.0001.desc: "Un gran roble se presenta con su majestuosa corona, que se extiende a lo largo y ancho, y cubre de oscuridad todo lo que hay debajo. Al alzar la mirada hacia sus ramas, me acuerdo de las distintas dinastías que llegaron y se fueron. De todos quienes me precedieron y de quienes continuarán mi legado cuando me haya ido.\n\nAl acercarme, veo las diferentes iniciales grabadas en su corteza, un gentil recordatorio de que la gente vine y va a lo largo de las épocas. Y [love_interest.GetFirstName], la persona con quien quiero transmitir mi legado, lo es todo para mí."
 hunt_events_anna.0001.a: "Grabar las iniciales de [love_interest.GetFirstNameNoTooltip] en la corteza."
 hunt_events_anna.0001.b: "¡No hay tiempo para semejantes necedades!"
 hunt_events_anna.0001.b.t_toast: "Mi prioridad principal es la cacería."
 hunt_events_anna.0005.t: "Bajo la piel"
 hunt_events_anna.0005.desc: "Mi breve descanso se ve interrumpido por una risa burlona que viene en mi dirección. Miro hacia arriba y, para poca sorpresa, me saluda una amplia sonrisa de [mocking_participant.GetFirstName], que agarra lo que parece ser un ejemplar muerto de [ROOT.Char.Custom('SmallAnimal')].\n\n«Nunca os he tomado por alguien capaz de sobrevivir en la naturaleza, así que he imaginado que os vendría bien algo de práctica», dice con tono despectivo y arroja el cuerpo a mis pies."
 hunt_events_anna.0005.a: "Intentar despellejar el animal."
 hunt_events_anna.0005.a.toast.good: "Logro despellejar al animal"
 hunt_events_anna.0005.a.toast.nothing: "Lo que queda es irreconocible"
 hunt_events_anna.0005.b: "¿Practicar? ¿Por qué no…?"
 hunt_events_anna.0005.c: "Es indigno de mí realizar una tarea tan menor."
 hunt_events_anna.0010.t: "Atrapados abajo"
 hunt_events_anna.0010.desc: "Con pisadas pesadas e inestables, rastreo a mi presa por los/las [ROOT.Char.GetCurrentLocation.Custom('GetTerrainTypePlural')], concentrad[ROOT.Char.Custom('ES_OA')] en mantener el paso. Un crujido repentino me resuena en los oídos. Siento una ingravidez repentina y las tripas se me agitan con fuerza. La caída se detiene y un dolor punzante me recorre el cuerpo con el impacto.\n\nCuando miro a mi alrededor, dolorid[ROOT.Char.Custom('ES_OA')], solo veo cuatro paredes que me rodean. He caído en una trampa y tengo que encontrar un modo de salir de ella."
 hunt_events_anna.0010.a: "Escalar hasta salir del agujero."
 hunt_events_anna.0010.a.desc.good: "Logro escalar para salir"
 hunt_events_anna.0010.a.toast.good: "Consigo superar el dolor y salir"
 hunt_events_anna.0010.a.toast.bad: "Vuelvo a tropezar y me hago daño"
 hunt_events_anna.0010.a.desc.bad: "Resbalo y caigo de nuevo en el agujero"
 hunt_events_anna.0010.b: "«¡¿Hay alguien ahí?!»."
 hunt_events_anna.0010.b.flavor: "La partida de caza detiene la cacería y me rescata."
 hunt_events_anna.0015.t: "Inspirar… Expirar…"
 hunt_events_anna.0015.desc: "Golpes extraños, balbuceos en voz baja y un suspiro ocasional resuenan por el claro. Una figura que sostiene un arco va de un lado a otro, al parecer, frustrada con algo.\n\nPara ver mejor, me escondo detrás de un árbol y echo un vistazo discreto. Veo a mi [child_with_bow.Custom('GetDaughterSon')] [child_with_bow.GetFirstName], con unas cuantas flechas en el suelo a su alrededor, que casi no llega a las dianas que [child_with_bow.GetSheHe] se ha puesto. Parce que le vendría bien algo de asistencia."
 hunt_events_anna.0015.a: "«Mira, te lo voy a mostrar…»."
 hunt_events_anna.0015.a.flavor: "Como soy un[ROOT.Char.Custom('ES_XA')] cazador[ROOT.Char.Custom('ES_XA')] capaz, debería poder usar mi propia pericia para enseñarle una mejor postura y posición."
 hunt_events_anna.0015.a.toast.good: "[child_with_bow.GetFirstNameNoTooltip] sigue mis instrucciones"
 hunt_events_anna.0015.a.toast.bad: "[child_with_bow.GetFirstNameNoTooltip] no entiende mis instrucciones"
 hunt_events_anna.0015.b: "Decido alentarle dándole ánimos."
 hunt_events_anna.0015.c: "Dejad que [child_with_bow.GetFirstNameNoTooltip] lo descubra."
 hunt_events_anna.0015.c.toast: "[child_with_bow.GetFirstNameNoTooltip] encuentra la manera de manejar el arco"
