l_spanish:
 #Travel Flavor Events
 #Troll bridge - you encounter a troll bridge.
 travel_events.5100.t: "El puente con [ROOT.Char.GetCurrentLocation.Custom('GetProvinceTricksterSpirit')]"
 travel_events.5100.desc: "«Mi señor[ROOT.Char.Custom('ES_XA')]! Este puente tiene muy mala reputación. ¡Bajo él vive un [ROOT.Char.GetCurrentLocation.Custom('GetProvinceTricksterSpirit')]!», chilla mi [ROOT.Char.Custom2('RelationToMe', superstitious_traveler)], [superstitious_traveler.Custom('ES_ElLa')] [superstitious_traveler.GetTitledFirstName|l]. «Seguro que salta sobre nosotros o nos maldice cuando lo crucemos».\n\nLos miembros de mi grupo empiezan a susurrar entre ellos. Algunos invocan el nombre de [ROOT.Char.GetFaith.HighGodName] como protección. Por desgracia, este puente es el único lugar seguro para cruzar en kilómetros a la redonda."
 travel_events.5100.a: "«¡No temo ni a [ROOT.Char.GetCurrentLocation.Custom('GetProvinceTricksterSpirit')] ni a demonio!»."
 travel_events.5100.b: "«[superstitious_traveler.GetTitledFirstNameNoTooltip], esos seres no existen»."
 travel_events.5100.c: "«Debemos rezar para repeler a ese espíritu»."
 travel_events.5100.d: "«¡Qué espanto! Vamos a buscar otra ruta»."
 custom.every_brave_or_impatient_entourage_member: "Todo personaje del séquito de carácter [GetTrait('brave').GetName( GetNullCharacter )|l] o [GetTrait('impatient').GetName( GetNullCharacter )|l]"
 custom.every_cynical_or_impatient_entourage_member: "Todo personaje del séquito de carácter [GetTrait('cynical').GetName( GetNullCharacter )|l] o [GetTrait('impatient').GetName( GetNullCharacter )|l]"
 custom.every_eccentric_or_zealous_entourage_member: "Todo personaje del séquito de carácter [GetTrait('eccentric').GetName( GetNullCharacter )|l] o [GetTrait('zealous').GetName( GetNullCharacter )|l]"
 custom.every_craven_or_impatient_entourage_member: "Todo personaje del séquito de carácter [GetTrait('craven').GetName( GetNullCharacter )|l] o [GetTrait('impatient').GetName( GetNullCharacter )|l]"
