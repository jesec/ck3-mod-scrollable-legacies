l_spanish:
 #Lessons of the heart
 intrigue_events_bjorn.5100.t: "Lecciones del corazón"
 intrigue_events_bjorn.5100.desc: "Cuando miro a mi querid[the_lover.Custom('ES_OA')] [the_lover.GetFirstName], se me ocurre que podría aprender tanto de una persona tan maravillosa. Su mente es como un tesoro del que apoderarse y creo que también podría enseñarle un par de cosas.\n\n¡Por no mencionar que es un modo maravilloso de pasar el tiempo [Select_CString(And(ROOT.Char.IsFemale, the_lover.IsFemale), 'juntas', 'juntos')]!"
 intrigue_events_bjorn.5100.a: "Mi amor tiene tanto que enseñarme."
 intrigue_events_bjorn.5100.b: "Será un[the_lover.Custom('ES_XA')] estudiante maravillos[the_lover.Custom('ES_OA')]."
 intrigue_events_bjorn.5100.c: "Me basta con pasar el tiempo [Select_CString(And(ROOT.Char.IsFemale, the_lover.IsFemale), 'juntas', 'juntos')]."
 #shared interests
 intrigue_events_bjorn.5101.t: "Intereses compartidos"
 intrigue_events_bjorn.5101.desc: "¡[the_lover.GetFirstName] me intriga tanto! Quiero disfrutar de aquello que le proporciona alegría.\n\nOh, pasar días felices [Select_CString(And(ROOT.Char.IsFemale, the_lover.IsFemale), 'juntas', 'juntos')]:\n\nLas manos trabajando unidas, las mentes concentradas en intereses compartidos.\n\nNuestros corazones latiendo como uno solo."
 intrigue_events_bjorn.5101.a: "Mostradme que inflama vuestra pasión, amor mío."
 intrigue_events_bjorn.5101.b: "Venid, compartid esta alegría conmigo."
 intrigue_events_bjorn.5101.c: "¿Y si aprendemos algo nuevo [Select_CString(And(ROOT.Char.IsFemale, the_lover.IsFemale), 'juntas', 'juntos')]?"
 #Dark depths of the soul
 intrigue_events_bjorn.5102.t: "Amar la sombra"
 intrigue_events_bjorn.5102.desc: "De tanto que nos hemos ido acercando, y ahora nos encontramos en un umbral. Quizás sea hora de compartirlo todo entre [Select_CString(And(ROOT.Char.IsFemale, the_lover.IsFemale), 'nosotras', 'nosotros')], ciertamente, para saber todo lo que haya que saber. Compartir cosas que normalmente… no se comparten.\n\nNo hay vuelta atrás tras este punto, pero ¿aceptará [the_lover.GetFirstName] todo lo que hay que saber de mí?"
 intrigue_events_bjorn.5102.a: "Tengo tantas cosas que mostrarte."
 intrigue_events_bjorn.5102.b: "Contadme lo que no habéis compartido con nadie."
 intrigue_events_bjorn.5102.c: "Exploremos nuestras fantasías más oscuras."
 intrigue_events_bjorn.5102.d: "¡No! Algunas cosas jamás deben salir a la luz."
