l_spanish:
 elder_events.1000.t: "Antes me conocías"
 elder_events.1000.desc: "«[confusion_target.GetFirstName], querid[ROOT.Char.Custom('ES_OA')] [elder.Custom2('RelationToMeShort', SCOPE.sC('confusion_target'))], ¡me alegro tanto de verte!». Mi [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('elder'))] [elder.GetFirstName] me mira a los ojos, hay una chispa de incertidumbre tras su sonrisa. «Siempre has sido tan [confusion_target.Custom('ComplimentAdjective')]. ¡Por eso eres [ROOT.Char.Custom('ES_AlAla')] que más quiero!».\n\nEn su [GetTrait('withering_mind').GetName( GetNullCharacter )|l], hoy soy mi [confusion_target.Custom('SisterBrother')]…\n\nMañana puede que no me reconozca."
 elder_events.1000.a: "Por favor, [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('elder'))], ¡soy [ROOT.Char.GetFirstNameNoTooltip]!"
 elder_events.1000.b: "Qué… Sí, también me alegro de verte…"
 elder_events.1100.t: "La escalera a…"
 elder_events.1100.desc: "He subido estas escaleras muchas veces. Pero entonces, ¿por qué hoy me siento como si escalase las montañas de [mountain_reference.GetName]?\n\nMe tiemblan las piernas. Las rodillas me fallan. No hay nada que detenga mi caída.\n\nCaigo dando tumbos hasta el inicio."
 elder_events.1100.a: "¡Aaargh!"
 elder_events.1100.bodyguard: "¡Socorro! ¡Ayudadme!"
 EVENT_WINDOW_OPTION_AVAILABLE_BODYGUARD: "Esta opción está disponible porque tienes un [GetCourtPositionType('bodyguard_court_position').GetName()|l]"
 EVENT_WINDOW_OPTION_AVAILABLE_TUTOR: "Esta opción está disponible porque tienes un [GetCourtPositionType('court_tutor_court_position').GetName()|l]"
 partially_mute_modifier: "Medio mudo"
 partially_mute_modifier_desc: "A este personaje le cuesta mucho hablar por culpa de aflicciones relacionadas con la edad."
 elder_events.1200.t: "Parálisis"
 elder_events.1200.desc: "Golpea sin aviso. El lado izquierdo de mi cuerpo queda paralizado. Intento sonreír, pero los labios no se me mueven.\n\nTrato de hablar, pero no puedo.\n\nAl final la voz me acaba volviendo, pero el miedo a acabar en [ROOT.Char.GetFaith.NegativeAfterLife] permanece."
 elder_events.1200.a: "…"
 elder_events.1300.t: "Lecciones olvidadas"
 elder_events.1300.desc: "¿He leído estos pergaminos sobre [ROOT.Char.Custom('education_scroll_subject')]? No… No lo recuerdo. ¿A lo mejor sí?\n\nTuvieron que ser parte de mis estudios, de mi educación…\n\nSí. Mi educación…"
 elder_events.1300.a: "No habrá sido tan importante…"
 elder_events.1300.tutor: "Necesito ayuda para recordar."
 elder_events.1400.t: "Un buen revolcón"
 elder_events.1400.desc: "«Venid al lecho, [ROOT.Char.Custom('RaunchyComplimentNoun')] [ROOT.Char.Custom('RomanticComplimentAdjective')] mí[ROOT.Char.Custom('ES_OA')]», [lover.Custom('PurrGrowl')] mi [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('lover'))] [lover.GetFirstName], con unos ojos ardientes de lujuria. «¿No sentís ni pizca de curiosidad por lo que vuestr[lover.Custom('ES_OA')] [lover.Custom('GetRaunchyPrefix')] [lover.Custom('RaunchyComplimentNoun')|l] ha aprendido?».\n\nCon una sonrisa pícara, se muerde el labio y se zambulle entre las sábanas.\n\n«Tomadme. Ahora»."
 elder_events.1400.a: "¡No podría detenerme ni un millar de caballos!"
 elder_events.1400.b: "[ROOT.Char.GetFaith.HighGodName] me libre de est[lover.Custom('ES_EA')] [lover.GetWomanMan]."
 death_best_sex_of_their_life: "sufrió un ataque al corazón cuando tenía el mejor revolcón de su vida"
 purrs: "ronronea"
 growls: "gruñe"
 raunchy_little: "pequeñ[CHARACTER.Custom('ES_OA')]"
 raunchy_sweet: "dulce"
 raunchy_pretty: "precios[CHARACTER.Custom('ES_OA')]"
 raunchy_bold: "valiente"
 raunchy_wild: "salvaje"
 raunchy_fiery: "feroz"
 raunchy_young: "joven"
 raunchy_eager: "ansios[CHARACTER.Custom('ES_OA')]"
 elder_events.1500.t: "Un revolcón para morirse"
 elder_events.1500.desc: "«Me llamaban \"[lover.Custom('GetRaunchyPrefix')] [lover.Custom('RaunchyComplimentNoun')]\"», suspira [lover.GetFirstName], mi [lover.GetWifeHusband], con una leve sonrisa en los labios. «Ahora apenas puedo subir las escaleras sin pararme a tomar aire…».\n\nCon mi vigor juvenil, podría ayudar a que recordase lo que es sentirse desead[lover.Custom('ES_OA')].\n\nPero… ¿lo soportaría su [GetTrait('faltering_heart').GetName( GetNullCharacter )|l]?"
 elder_events.1500.a: "¡Tendrá el revolcón de su vida!"
 elder_events.1500.b: "Mejor que no."
 elder_events.1600.t: "No se puede vencer al tiempo"
 elder_events.1600.desc: "Echo a correr, pero he de parar. Ya estoy sin aliento.\nAntes daba vueltas en torno a mi [ROOT.Char.Custom('ResidenceBuilding')|l]…\n\nVuelvo a empezar. Casi me caigo. Me vuelvo a parar.\n\nMaldito sea este cuerpo frágil."
 elder_events.1600.a: "Mis días de correr se han acabado."
 elder_events.1600.b: "#EMP Tengo#! que abrirme paso a través del dolor."
