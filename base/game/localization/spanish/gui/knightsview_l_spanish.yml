 HBOX_DOCTRINE_FAITH_TT: "#T [FaithDoctrine.GetNameNoTooltip( Faith.Self )]#!\n[FaithDoctrine.GetEffectsDescription( Faith.Self )]\n\n[FaithDoctrine.GetDescription( Faith.Self )|F]"
 KNIGHT_RESTRICTIONS: "Se aplican otras restricciones"
 #this is can_be_knight_trigger in 00_war_and_peace_triggers.txt
 KNIGHT_RESTRICTIONS_TT: "#T Restricciones de [knights|El]#!\nSolo tus [vassals|El] directos, [courtiers|El] o [followers|El] pueden servir como [knights|El]\nTu [culture|El] o [faith|El] determina qué géneros pueden servir como [knights|El].\n\nUn caballero no puede ser:\n - Jugador, [child|El], [prisoner|El] o [GetTrait('incapable').GetName(GetPlayer.Self)|l]\n - Miembro del [clergy|El] (salvo si su [faith|El] o [culture|El] lo permiten)\n - [master_assassin|El] o [GetTrait('blind').GetName(GetPlayer.Self)|l] (salvo si su [culture|El] lo permite o es [GetTrait('order_member').GetName(GetPlayer.Self)|l])\n - [diarch|E] o [ceremonial_liege|El]\n - [governor|El] de un [duchy|El] (o un [title|El] superior) o [house_head|El] de una [noble_family|El]\n\nLas [traditions|El] culturales o los eventos pueden eliminar algunas restricciones"
 KP_CULTURE_MINIMUM_PROWESS: "@alert_icon! Tu [culture|lE] requiere al menos 12 de [prowess|El]"
 KP_CULTURE_ADMIN_FAMILY_KNIGHTS: "@check_icon! Tu [culture|lE] elimina algunas restricciones de género para las [wars|El] defensivas"
 KP_CULTURE_HIGH_PROWESS: "@check_icon! Tu [culture|lE] elimina la mayoría de las restricciones para los [knights|El] con una [prowess|El] mínima de 10"
