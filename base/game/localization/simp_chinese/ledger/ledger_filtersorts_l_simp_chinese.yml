 # standalone sorting buttons, usually reusing dropdown names
 BUTTON_SORT_LEDGER: "$sort_by$[Localize(Concatenate('sort_l_', PdxGuiWidget.GetName))]" # we concatenate so we don't end up localizeing simple terms like 'date' or 'counties'
 # dropdown items. Using GetKey to reuse them instead of having 40 identical options for titles
 DROP_SORT_LEDGER: "[Localize(Concatenate('sort_l_', OrderLedgerOption.GetKey))]"
 # some standalones need more detailed tooltips, so we replace them like this
 EXTRA_SORT_LEDGER: "$sort_by$[Localize(Concatenate('sort_tt_', PdxGuiWidget.GetName))]"
