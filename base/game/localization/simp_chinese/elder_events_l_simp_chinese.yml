l_simp_chinese:
 elder_events.1000.t: "你曾经了解我"
 elder_events.1000.desc: "“[confusion_target.GetFirstName]，我亲爱的[elder.Custom2('RelationToMeShort', SCOPE.sC('confusion_target'))]——见到你真好！”我的[ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('elder'))][elder.GetFirstName]注视着我的眼睛，笑容背后隐隐透着一丝不确定。“你一向是最[confusion_target.Custom('ComplimentAdjective')]那个。也正因为如此，我才最爱你。”\n\n对[GetTrait('withering_mind').GetName( GetNullCharacter )]的[elder.GetHerHis]来说，今天我成了自己的[confusion_target.Custom('SisterBrother')]……\n\n而明天，我或许就会变成一个陌生人了。"
 elder_events.1000.a: "拜托，[ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('elder'))]——我是[ROOT.Char.GetFirstNameNoTooltip]！"
 elder_events.1000.b: "啥……嗯，我也很高兴见到你……"
 elder_events.1100.t: "阶梯……"
 elder_events.1100.desc: "我曾无数次登上这楼梯。可为何今天却仿佛在攀登[mountain_reference.GetName]的崇山峻岭？\n\n我的双腿直打颤，双膝再也支撑不住。四周空无一物，根本抓不到任何可以托住我的东西。\n\n我一个踉跄，直朝楼下跌去。"
 elder_events.1100.a: "啊啊啊啊啊啊！"
 elder_events.1100.bodyguard: "救命！救救我！"
 EVENT_WINDOW_OPTION_AVAILABLE_BODYGUARD: "此选项可用，因为你拥有[GetCourtPositionType('bodyguard_court_position').GetName()]"
 EVENT_WINDOW_OPTION_AVAILABLE_TUTOR: "此选项可用，因为你拥有[GetCourtPositionType('court_tutor_court_position').GetName()]"
 partially_mute_modifier: "部分失声"
 partially_mute_modifier_desc: "该角色因年老体衰，说话十分困难。"
 elder_events.1200.t: "麻木"
 elder_events.1200.desc: "一切发生得毫无预兆。我的左半边身体骤然失去知觉。我想挤出一个微笑，嘴角却纹丝不动。\n\n我挣扎着想要开口，喉咙里发不出半点声响。\n\n待到声音终于回归，那份对[ROOT.Char.GetFaith.NegativeAfterLife]的恐惧却已在心底深深扎根。"
 elder_events.1200.a: "……"
 elder_events.1300.t: "未竟之教"
 elder_events.1300.desc: "我是否读过这些关于[ROOT.Char.Custom('education_scroll_subject')]的卷轴呢？记忆有些模糊了……或许曾经翻过吧？\n\n这些肯定是我学业中避不开的部分，是我受过的教育……\n\n没错。我的……教育……"
 elder_events.1300.a: "肯定没有那么要紧吧……"
 elder_events.1300.tutor: "我需要一些帮助来记起。"
 elder_events.1400.t: "爽翻天"
 elder_events.1400.desc: "“到床上来吧，我[ROOT.Char.Custom('RomanticComplimentAdjective')][ROOT.Char.Custom('RaunchyComplimentNoun')]。”我的[ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('lover'))][lover.GetFirstName][lover.Custom('PurrGrowl')]，[lover.GetHerHis]的眼眸中跃动着渴望的火焰。“难道你就不好奇，你[lover.Custom('GetRaunchyPrefix')][lover.Custom('RaunchyComplimentNoun')]又学会了什么新花样吗？”\n\n[lover.GetSheHe]唇角勾起一抹狡黠的笑意，然后轻轻咬住下唇，身子陷进柔软的被褥中。\n\n“快点，我已经等不及了。”"
 elder_events.1400.a: "千军万马也阻挡不了我！"
 elder_events.1400.b: "[ROOT.Char.GetFaith.HighGodName]啊，救救我，让我摆脱这个[lover.GetWomanMan]吧。"
 death_best_sex_of_their_life: "在进行此生最棒的性爱时心脏病发"
 purrs: "媚声说道"
 growls: "沉声说道"
 raunchy_little: "娇小的"
 raunchy_sweet: "甜美的"
 raunchy_pretty: "美丽的"
 raunchy_bold: "大胆的"
 raunchy_wild: "狂野的"
 raunchy_fiery: "炽烈的"
 raunchy_young: "年轻的"
 raunchy_eager: "渴望的"
 elder_events.1500.t: "牵魂缠绵"
 elder_events.1500.desc: "“他们曾称我为‘[lover.Custom('GetRaunchyPrefix')][lover.Custom('RaunchyComplimentNoun')]’，”我的[lover.GetWifeHusband][lover.GetFirstName]叹道，嘴角挂着一丝淡淡的微笑，“如今我连爬楼梯都气喘吁吁……”\n\n我的青春活力，也许能帮[lover.GetHerHim]重温被人渴望的滋味。\n\n但……[lover.GetHerHis][GetTrait('faltering_heart').GetName( GetNullCharacter )]成那样，能承受得住吗？"
 elder_events.1500.a: "我会给[lover.GetHerHim]一次终生难忘的欢愉！"
 elder_events.1500.b: "最好不要。"
 elder_events.1600.t: "无法跑赢时间"
 elder_events.1600.desc: "我跑起来，但又得停下。已经喘不过气了。\n我以前能绕着[ROOT.Char.Custom('ResidenceBuilding')]跑上好几圈……\n\n我又开始跑。差点摔倒。又一次停下。\n\n真该死，这副虚弱的身体。"
 elder_events.1600.a: "我奔跑的时代已经结束了。"
 elder_events.1600.b: "我#EMP 必须#!顶住痛苦。"
