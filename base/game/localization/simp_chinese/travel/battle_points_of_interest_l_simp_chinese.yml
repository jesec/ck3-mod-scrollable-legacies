 #Intro
 BattlePoiDescriptionIntro1: "双方战于$BattlePoiProvince$，一方由$BattlePoiCommander$率领，另一方由$BattlePoiEnemyCommander$率领。"
 BattlePoiDescriptionIntroAttacker2: "$BattlePoiCommander$对$BattlePoiEnemyCommander$的军队发起猛攻。"
 BattlePoiDescriptionIntroDefender2: "$BattlePoiCommander$全力阻击$BattlePoiEnemyCommander$来袭的军队。"
 BattlePoiDescriptionIntroAttackerFallback: "$BattlePoiCommander$率领$BattlePoiCommanderHisHer$的军队英勇地向$BattlePoiEnemyCommander$的$BattlePoiEnemyCommanderCulture$人军队发起冲锋。"
 BattlePoiDescriptionIntroDefenderFallback: "$BattlePoiCommander$率领$BattlePoiCommanderHisHer$的军队英勇地抵抗$BattlePoiEnemyCommander$的$BattlePoiEnemyCommanderCulture$人军队。"
 #Key Moment
 BattlePoiDescriptionLocArchers: "战斗的关键时刻，$BattlePoiCommanderCulture$人弓箭手成功瞄准敌军，"
 BattlePoiDescriptionLocHeavyInfantry: "战斗的决定性时刻，一队$BattlePoiCommanderCulture$人重步兵突破了敌军阵线，"
 BattlePoiDescriptionLocLightCavalry: "战斗的决定性时刻，$BattlePoiCommanderCulture$人骑兵成功绕到敌军后方，"
 BattlePoiDescriptionLocHeavyCavalry: "战斗的最终时刻，$BattlePoiCommanderCulture$人骑兵突破了战线，直插敌军军阵的心脏，"
 BattlePoiDescriptionLocPikemen: "决胜时刻，$BattlePoiCommanderCulture$人枪兵击退了敌军冲锋，"
 BattlePoiDescriptionLocArchersKnight: "战斗的关键时刻，$BattlePoiCommanderCulture$人弓箭手在$BattlePoiBraveKnight$的带领下成功瞄准敌军，"
 BattlePoiDescriptionLocHeavyInfantryKnight: "战斗的决定性时刻，一队$BattlePoiCommanderCulture$人重步兵在$BattlePoiBraveKnight$的带领下突破了敌军阵线，"
 BattlePoiDescriptionLocLightCavalryKnight: "战斗的决定性时刻，$BattlePoiCommanderCulture$人骑兵在$BattlePoiBraveKnight$的带领下成功绕到敌军后方，"
 BattlePoiDescriptionLocHeavyCavalryKnight: "战斗的最终时刻，$BattlePoiCommanderCulture$人骑兵在$BattlePoiBraveKnight$的带领下突破了战线，直插敌军军阵的心脏，"
 BattlePoiDescriptionLocPikemenKnight: "决胜时刻，$BattlePoiCommanderCulture$人枪兵在$BattlePoiBraveKnight$的带领下击退了敌军冲锋，"
 BattlePoiDescriptionLocVarangian: "战斗的最终时刻，$BattlePoiBraveKnight$率领一队瓦兰吉卫士突破了战线，深入敌军军阵，"
 BattlePoiDescriptionLocBerserker: "战斗发生了意想不到的转变，$BattlePoiBraveKnight$贯穿了$BattlePoiEnemyCommanderCulture$人的阵线，"
 BattlePoiDescriptionLocMidFallback: "双方都疲惫不堪，最终$BattlePoiCommanderCulture$人包围了敌军，"
 #Outcome
 BattlePoiDescriptionLocOutcomeBerserker: "单枪匹马杀死数十名敌人，以一己之力粉碎了敌军士气，"
 BattlePoiDescriptionLocOutcomeBerserkerFled: "单枪匹马杀死数十名敌人，以一己之力粉碎了敌军士气。"
 BattlePoiDescriptionLocOutcomeDevastation: "歼灭了他们的敌人，"
 BattlePoiDescriptionLocOutcomeDevastationFled: "并歼灭了敌军。"
 BattlePoiDescriptionLocOutcomeChaos: "对对手造成了沉重打击，"
 BattlePoiDescriptionLocOutcomeChaosFled: "并对对手造成了沉重打击。"
 BattlePoiDescriptionLocOutcomeLoss: "粉碎了对手的士气，"
 BattlePoiDescriptionLocOutcomeLossFled: "并粉碎了对手的士气。"
 #Outro
 BattlePoiDescriptionLocOutroImprisoned: "并俘虏了$BattlePoiEnemyCommander$。"
 BattlePoiDescriptionLocOutroSlain: "并杀死了$BattlePoiEnemyCommander$。"
 BattlePoiDescriptionLocOutroFledChaos: "在一片混乱中，$BattlePoiEnemyCommander$成功带领$BattlePoiCommanderHisHer$的亲卫一起逃走。"
 BattlePoiDescriptionLocOutroFledOrganized: "尽管损失惨重，但$BattlePoiEnemyCommander$还是成功组织了一场战略撤退。"
