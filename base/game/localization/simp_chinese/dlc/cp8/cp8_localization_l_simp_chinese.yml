l_simp_chinese:
 #Goguryeo Tomb
 building_type_goguryeo_tomb_01: "$building_goguryeo_tomb_01$"
 building_type_goguryeo_tomb_01_desc: "$building_goguryeo_tomb_01_desc$"
 building_goguryeo_tomb_01: "高句丽王陵"
 building_goguryeo_tomb_01_desc: "这座由规整石块砌成的巨大长方形陵墓，据说属于一位古高句丽国王，只是他的名字如今已被遗忘。通往陵墓的走廊绘有色彩鲜艳的壁画，而在金字塔状墓顶的顶端，建有一座用于纪念逝者的小木亭。"
 #Great Buddha of Kamakura
 building_type_buddha_kamakura_01: "$building_buddha_kamakura_01$"
 building_type_buddha_kamakura_01_desc: "$building_buddha_kamakura_01_desc$"
 building_buddha_kamakura_01: "镰仓大佛"
 building_buddha_kamakura_01_desc: "镰仓#italic 大佛#!是一尊庄严的阿弥陀佛青铜像，重达数吨，饰有鎏金纹样。一座仿西南寺庙风格的大殿环绕佛像而建，大殿周围还立着三十二片莲花瓣。"
 #Lingapura Pyramid
 building_type_pyramid_lingapura_01: "$building_pyramid_lingapura_01$"
 building_type_pyramid_lingapura_01_desc: "$building_pyramid_lingapura_01_desc$"
 building_pyramid_lingapura_01: "陵伽补罗金字塔"
 building_pyramid_lingapura_01_desc: "这座巨大的阶梯式金字塔如圣山般从丛林中升起，七层台地每一层都建有愈发精美的神龛与祭坛。顶部的圣所为整座建筑加冕，内部供奉着湿婆神圣的#italic 陵伽#!，这是宗教建筑复杂轴线布局的中心。"
 #Maijishan Grottoes
 building_type_maijishan_grottoes_01: "$building_maijishan_grottoes_01$"
 building_type_maijishan_grottoes_01_desc: "$building_maijishan_grottoes_01_desc$"
 building_maijishan_grottoes_01: "麦积山石窟"
 building_maijishan_grottoes_01_desc: "麦积山自古便是朝圣之地，在其风水被认为极佳的南面峭壁上，人们于赭红色岩石中凿出了数以百计的洞窟，里面供奉着神态安详的佛像与菩萨像，还绘有色彩绚丽的壁画。许多佛龛由邻近的城中家族出资开凿，这里是他们偶尔前来叩拜、静心冥想的地方。"
 #Three Pagodas of Dali
 building_type_three_pagodas_dali_01: "$building_three_pagodas_dali_01$"
 building_type_three_pagodas_dali_01_desc: "$building_three_pagodas_dali_01_desc$"
 building_three_pagodas_dali_01: "大理三塔"
 building_three_pagodas_dali_01_desc: "在城市统治家族的庞大寺庙建筑群中，矗立着三座高耸的砖墙石基宝塔。它们构成等腰三角形的三个顶点，标示出此地的神圣几何布局，并将周遭的山峦与湖泊框入景中。"
 #Iron Lion of Cangzhou
 building_type_iron_lion_cangzhou_01: "$building_iron_lion_cangzhou_01$"
 building_type_iron_lion_cangzhou_01_desc: "$building_iron_lion_cangzhou_01_desc$"
 building_iron_lion_cangzhou_01: "沧州铁狮子"
 building_iron_lion_cangzhou_01_desc: "这尊雄伟的铁狮是中国最大的铸铁雕塑。它强健的背脊上承托着一尊端坐莲台的菩萨像，周身装饰着华丽的鎏金纹样。它坐落于易遭水患的平原附近，被当地民众称为镇守潮汛的镇海吼。"
 #Gaocheng Observatory
 building_type_dengfeng_observatory_01: "$building_dengfeng_observatory_01$"
 building_type_dengfeng_observatory_01_desc: "$building_dengfeng_observatory_01_desc$"
 building_dengfeng_observatory_01: "告成天文台"
 building_dengfeng_observatory_01_desc: "几个世纪以来，此地因其风水特质以及在中国版图上象征性的中心位置，成为天文观测的优选之地。现存建筑呈复杂的梯形结构，是一个巨大的日晷，中间高起的标尺将影子投射到分隔平台的沟槽，以此标记太阳的移动轨迹。"
 #Candi of Muara Takus
 building_type_muara_takus_01: "$building_muara_takus_01$"
 building_type_muara_takus_01_desc: "$building_muara_takus_01_desc$"
 building_muara_takus_01: "麻拉塔库斯禅邸"
 building_muara_takus_01_desc: "寺庙建筑群由众多结构组成，均为砖砌，饰有砂岩雕饰。中央矗立着#italic 宫塔#!和#italic 旧塔#!这两座大塔，前者高挑修长，后者庞大如山，俯瞰着周围较小的神龛与台地。"
 #Stone Pagoda of Mireuksa
 building_type_stone_pagoda_01: "$building_stone_pagoda_01$"
 building_type_stone_pagoda_01_desc: "$building_stone_pagoda_01_desc$"
 building_stone_pagoda_01: "弥勒寺石塔"
 building_stone_pagoda_01_desc: "一座九层佛塔矗立在宽阔的石基上，浅色的砖石在晴空下泛着微光。这是百济第一座石质宝塔，其形态与匀称的比例已成为整个半岛建寺者的典范。"
 #Thuriang Kilns
 building_type_thuriang_kilns_01: "$building_thuriang_kilns_01$"
 building_type_thuriang_kilns_01_desc: "$building_thuriang_kilns_01_desc$"
 building_thuriang_kilns_01: "图良窑"
 building_thuriang_kilns_01_desc: "此处分布着两百多个大型窑炉，是该地区最大的青瓷生产中心。这里烧制的陶瓷以粗糙、高温硬烧的质感以及独特的黄绿色釉面而闻名，产品远销东南亚各地市场。"
 #Yuelu Academy
 building_type_yuelu_academy_01: "$building_yuelu_academy_01$"
 building_type_yuelu_academy_01_desc: "$building_yuelu_academy_01_desc$"
 building_yuelu_academy_01: "岳麓书院"
 building_yuelu_academy_01_desc: "岳麓书院是中国最负盛名的学府之一，长久以来一直是求学和科考的中心。其布局以主庭院为中心，附属的厅堂和亭阁由此向外呈均衡对称分布，历代学子曾在此为科举入仕做准备。"
 #Chocolate Hills #NOTE: today are called "Chocolate" Hills, but of course chocolate didn't exist in the Philippines back then. This is a random name I thought out, but it is not based on native names (none of which seem to have survived from then)
 building_type_chocolate_hills_01: "$building_chocolate_hills_01$"
 building_type_chocolate_hills_01_desc: "$building_chocolate_hills_01_desc$"
 building_chocolate_hills_01: "枯叶山坡"
 building_chocolate_hills_01_desc: "这一地质形态以大量浑圆的锥形山丘为特征，均匀地绵延至整片地貌。山丘覆盖着一层草被，在旱季会转变为鲜明的棕褐色与橙色调，为土地染上一抹不同寻常的秋意。"
 #Fanfang of Guangzhou
 building_type_fanfang_guangzhou_01: "$building_fanfang_guangzhou_01$"
 building_type_fanfang_guangzhou_01_desc: "$building_fanfang_guangzhou_01_desc$"
 building_fanfang_guangzhou_01: "广州蕃坊"
 building_fanfang_guangzhou_01_desc: "#italic 蕃坊#!是重要的外国商人社区，主要居住着通过海上商路来到此地的阿拉伯和波斯穆斯林，并且在城市西部拥有专属区域，设有自己的官员和海关。其中心坐落着一座红墙环绕的清真寺，顶部高耸着宣礼塔和灯塔，为船只和灵魂指引通往港口的安全路线。"
 #Wilwatikta Palace
 building_type_wilwatikta_palace_01: "$building_wilwatikta_palace_01$"
 building_type_wilwatikta_palace_01_desc: "$building_wilwatikta_palace_01_desc$"
 building_wilwatikta_palace_01: "苦枳宫"
 building_wilwatikta_palace_01_desc: "苦枳宫是一座庞大的宫殿建筑群，由亭阁、厅堂、庙宇和庭院组成，规模之广阔，宛如一座独立的城邦。长方形的砖墙环绕着这片区域，通往仪仗大道的入口立着一系列高耸的#italic 波度罗叉#!门。"
 #Ha Long Bay
 building_type_ha_long_bay_01: "$building_ha_long_bay_01$"
 building_type_ha_long_bay_01_desc: "$building_ha_long_bay_01_desc$"
 building_ha_long_bay_01: "下龙湾"
 building_ha_long_bay_01_desc: "这片令人惊叹的岩溶石灰岩群岛从海湾平静的翡翠色水域中升起，当地渔民在岩柱的阴影下泛舟寻觅着渔获。"
 #My Son Sanctuary
 building_type_my_son_sanctuary_01: "$building_my_son_sanctuary_01$"
 building_type_my_son_sanctuary_01_desc: "$building_my_son_sanctuary_01_desc$"
 building_my_son_sanctuary_01: "美山圣地"
 building_my_son_sanctuary_01_desc: "占婆寺庙建筑群中规模最大、最为精巧的一座，由一系列在林地中彼此靠近、分散分布的围合区域组成。每个区域都有各自的大门、神龛和佛塔。这些建筑全用红砖建造，砖块按几何图案排列，并饰以砂岩过梁。"
 #Gunung Api
 building_type_gunung_api_01: "$building_gunung_api_01$"
 building_type_gunung_api_01_desc: "$building_gunung_api_01_desc$"
 building_gunung_api_01: "阿比山"
 building_gunung_api_01_desc: "这座从原始丛林中升起的山峦，在当地人心中是神圣的。在湿气与雾气之中，山坡上覆盖着醒目的石灰岩尖峰，以及流水在漫长岁月中冲刷出的深邃洞穴。"
 #Suwalesi Megaliths
 building_type_suwalesi_megaliths_01: "$building_suwalesi_megaliths_01$"
 building_type_suwalesi_megaliths_01_desc: "$building_suwalesi_megaliths_01_desc$"
 building_suwalesi_megaliths_01: "苏拉威西巨石"
 building_suwalesi_megaliths_01_desc: "中苏拉威西的各个山谷中散布着石人像和图腾，由当地人为仪式和敬奉神灵而竖立。这些被称为#italic 遏遮#!的雕像以极简的精度雕刻而成，造型勾勒出精妙优雅的线条。"
 #Izumo Taisha
 building_type_izumo_taisha_01: "$building_izumo_taisha_01$"
 building_type_izumo_taisha_01_desc: "$building_izumo_taisha_01_desc$"
 building_izumo_taisha_01: "杵筑大社"
 building_izumo_taisha_01_desc: "这座有#italic 大社#!之称的宏伟神社建在海滨，面朝大海。它建立在一系列巨大的木柱与粗壮的树干上，将殿宇抬离凡人行走的地面，升入天际——那里是这片土地神灵的栖居之所。"
 #Temple of Confucius
 building_type_confucius_temple_01: "$building_confucius_temple_01$"
 building_type_confucius_temple_01_desc: "$building_confucius_temple_01_desc$"
 building_confucius_temple_01: "孔庙"
 building_confucius_temple_01_desc: "这座由厅堂与庭院组成的庞大建筑群，是所有孔庙中最古老、最具影响力的一座，凭借其和谐的几何布局和精致的细节，成为了中国乃至全世界寺庙建造者的参考模型和灵感源泉。附近有一片幽静的树林，安葬着孔子及其后裔，是儒生重要的朝圣地。"
 #Imperial Citadel of Lin'an
 building_type_citadel_linan_01: "$building_citadel_linan_01$"
 building_type_citadel_linan_01_desc: "$building_citadel_linan_01_desc$"
 building_citadel_linan_01: "临安皇城"
 building_citadel_linan_01_desc: "皇城依凤凰山北坡而建，是朝廷与政府的中枢，宏阔的殿宇与廊道间容纳着无数官吏与学者。它虽不及北方都城的宫殿那般庞大，但台地式园林与亭阁的精致典雅却足以相媲美。"
 #The Temples of Angkor
 building_type_temples_angkor_01: "$building_temples_angkor_01$"
 building_type_temples_angkor_01_desc: "$building_temples_angkor_01_desc$"
 building_temples_angkor_01: "吴哥窟"
 building_temples_angkor_01_desc: "在繁华的因陀罗之城，寺庙的镀金尖顶数不胜数，每一座都装饰得比另一座更加奢华，上面雕刻着神灵和提婆罗阇的浮雕和塑像。"
 building_temples_angkor_02: "吴哥窟"
 building_temples_angkor_02_desc: "吴哥窟是一座供奉毗湿奴神的巨大寺庙建筑群，其设计象征印度教神话中众神居住的须弥山。整个建筑群被宏伟的护城河环绕，拥有多座廊式殿堂，内部布满宗教艺术品、雕塑和浮雕。"
