l_simp_chinese:
 # Flight of the Tai, Mass migration main event
 tgp_tai_migration_event.1000.t: "傣人的迁徙"
 tgp_tai_migration_event.1000.desc: "在今日的议政会上，我被告知有大批傣人移民的消息。[migration_leader.GetName]，这群人的长者代表，[migration_leader.GetSheHe]如今站在我面前，恭敬地陈述着[migration_leader.GetHerHis]请求：\n\n“我的[ROOT.Char.GetTitleAsNameNoTooltip]，我们是[migration_origin_holder.GetName]的旧臣，现寻求您的指引与新家园。我代表众多氏族与成千上万的族人前来避难。请庇护我们，赐予我们新的目标，让我们成为配得上您慷慨的忠仆。”\n\n他们的命运，就悬于我一言之间。"
 tgp_tai_migration_event.1000.a: "我欢迎你们所有人，不是以宾客的身份，而是作为我的臣民。"
 tgp_tai_migration_event.1000.b: "唯有才能出众的，才可留居于我的[ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip]。"
 tgp_tai_migration_event.1000.c: "人多则乱——去别处叩门吧。"
 tgp_tai_migration_event_1000.c_shooed_immigrants_tt: "这些移民或许会在不久后向邻近的统治者寻求庇护。"
 tgp_tai_migration_skilled_development_county_modifier: "工匠的迁徙"
 tgp_tai_migration_migration_happened_county_modifier: "傣人移民"
 tgp_tai_migration_migration_happened_character_modifier: "接纳大量移民"
 tgp_tai_migration_migration_rejected_character_modifier: "拒绝移民"
 # Lone skilled Tai character offers services
 tgp_tai_migration_event.2000.t: "才华横溢的傣人"
 tgp_tai_migration_event.2000.desc: "一位自称来自[migrant_skilled_character.GetCulture.GetNameNoTooltip]的才能卓越的[migrant_skilled_character.GetWomanMan]站在我面前，显然是一位博学的求职者。[migrant_skilled_character.GetHerHis|U]的言行举止印证了最近关于他们民族迁徙的传闻。\n\n"
 tgp_tai_migration_event.2000.wet_nurse.desc: "“圣上，我是[migrant_skilled_character.GetName]，一名经验丰富的看护者。我健康、体格良好，熟知婴孩之需。请允许我助你血脉繁盛。”"
 tgp_tai_migration_event.2000.champion.desc: "“尊贵的君主，在我的故土，我被称作[migrant_skilled_character.GetName]，是一名宣誓武士，屡次在比武大会上获胜。我的手臂稳如磐石，忠诚毋庸置疑。请让我成为你的勇士。”"
 tgp_tai_migration_event.2000.travel_leader.desc: "“我的[ROOT.Char.GetTitleAsNameNoTooltip]，我是[migrant_skilled_character.GetName]。我横越沙漠，星辰为图，长风为伴。在我的带领下，商队从未迷途，荒原从无险阻。”"
 tgp_tai_migration_event.2000.master_of_hunt.desc: "“生于狩猎，锤炼于荒野，我熟悉万兽的气息与林间的寂静。我能从蹄印中读出真相。你意下如何，我的[ROOT.Char.GetTitleAsNameNoTooltip]？”"
 tgp_tai_migration_event.2000.court_physician.desc: "“源自古籍的秘方与灵巧的双手，使我能抚慰你的神躯的[migrant_skilled_character.GetWomanMan]，我的[ROOT.Char.GetTitleAsNameNoTooltip]。他们称我为[migrant_skilled_character.GetName]。”"
 tgp_tai_migration_event.2000.antiquarian.desc: "“我曾目睹传说，触摸古帝国。让我留下吧，让先贤的智慧得以在你的宫廷中延续。”"
 tgp_tai_migration_event.2000.court_tutor.desc: "“我曾启迪过无数战士与政治家，我的[ROOT.Char.GetTitleAsNameNoTooltip]。若蒙允准，你的子嗣亦将在我的引导下臻于伟大。”"
 tgp_tai_migration_event.2000.end.desc: "\n\n[migrant_skilled_character.GetSheHe|U]显然因避难而来，[migrant_skilled_character.GetHerHim]的神情中流露出一丝绝望，但[migrant_skilled_character.GetHerHis]的技艺却毋庸置疑。我是否该善用[migrant_skilled_character.GetHerHis]的才能？"
 tgp_tai_migration_event.2000.a: "我或许会用得上你。"
 tgp_tai_migration_event.2000.b: "时机未到，但你可以暂留。"
 tgp_tai_migration_event.2000.b.success: "[migrant_skilled_character.GetNameNoTooltip]加入你的宫廷"
 tgp_tai_migration_event.2000.b.failure: "[migrant_skilled_character.GetNameNoTooltip]拒绝了你的提议"
 tgp_tai_migration_event.2000.c: "我必须拒绝。"
 # Noble Tai character and his family are asking for a spare county
 tgp_tai_migration_event.3000.t: "一位顾家的男人的提议"
 tgp_tai_migration_event.3000.desc: "一位正直的异乡人满怀自信地步入我殿堂，提出一份行政上的请求。\n\n在一次意外真诚的问候后——截然不同于寻常的粗鄙举止——他详述了家族悲苦的流亡经历，最终得出一个大胆的结论：\n\n“……强盗与劫掠者无处不在，我的[ROOT.Char.GetTitleAsNameNoTooltip]。我仅存的财富，是一双善于察事的眼睛、管理的才干、忠诚的心，以及一个需要庇护的家人。请允我与我的血脉为你效劳，直到我们被认为不配为止。”"
 tgp_tai_migration_event.3000.a: "我应允你的愿望，只要你忠诚。"
 tgp_tai_migration_event.3000.b: "这似乎并非公平的交易。"
 # A family of lowborn peasant characters offer services
 tgp_tai_migration_event.4000.t: "傣人家族"
 tgp_tai_migration_event.4000.desc: "卫兵押来一户来自北方的流民家族。\n\n在漫长的哀求之后，那族长直视着我的眼睛，奉上他几乎一无所有的全部，以换取在我庇护之下扫净宫殿尘埃的机会。根据他的讲述，他们的族人正纷纷迁徙至此，寻求新的庇护者。"
 tgp_tai_migration_event.4000.a: "我将在这艰难时日庇护你们。"
 tgp_tai_migration_event.4000.b: "我的宫廷无需再添你一家。"
