l_simp_chinese:
 aspect_upgrade_event_header: "[ROOT.Char.Custom('GetAspectNoun')|U]之相："
 tgp_east_asia_mandala_events.1000.t: "$aspect_upgrade_event_header$升格"
 tgp_east_asia_mandala_events.1000.t.final: "$aspect_upgrade_event_header$超脱"
 tgp_east_asia_mandala_events.1000.desc.02: "伴随着欢腾、舞蹈与对[ROOT.Char.Custom('GetAspectNoun')]的祭仪，我令[ROOT.Char.GetHouse.GetBaseName]家族为我骄傲——我已登上[ROOT.Char.Custom('GetAspectNoun')]之相的更高层次。\n\n我们那#EMP 神力般的气息#!与类神的举止，随着时光流逝，吸引着越来越多的信徒。\n\n我让自己稍稍沉浸其中，静观眼前的庆典与狂欢。"
 tgp_east_asia_mandala_events.1000.desc.03.outro: "我倚身后靠，欣赏象征性的祭献与舞者为我起舞。#EMP 我们的力量正在壮大。#!"
 tgp_east_asia_mandala_events.1000.desc.creation_03: "为创造之相而举办的盛宴——这是一场色彩、舞蹈与音乐交织的壮丽庆典，庆贺[ROOT.Char.GetHouse.GetBaseName]家族登上创造之相的中级阶段。\n\n一场又一场的神迹使我们得以证明自身的神性，也聚拢了无数信徒。\n\n不，更正一下——#EMP 是我#!聚拢了他们。他们信仰的对象，正是#EMP 我#!。"
 tgp_east_asia_mandala_events.1000.desc.creation_04: "一场喧嚣至极的盛宴——庆贺几乎完美的创造之相，还有什么比这更合适的方式？舞者、祭仪、闪现的裸露肌肤，一切皆在颂扬创造与[ROOT.Char.GetHouse.GetBaseName]家族更进一步的神化。\n\n无数信徒坚定地使我们成为不可阻挡的力量，确立了我们在世间的地位。\n\n我从桌上取来几样美味的[ROOT.Char.Custom('GetAspectNoun')]，边品尝边欣赏这场盛景。"
 tgp_east_asia_mandala_events.1000.desc.05.intro: "终于，[ROOT.Char.GetHouse.GetBaseName]家族与其神裔的旅程告一段落。"
 tgp_east_asia_mandala_events.1000.desc.creation_05: "$tgp_east_asia_mandala_events.1000.desc.05.intro$\n\n如今，众人已毫无疑问——[ROOT.Char.GetHouse.GetBaseNameNoTooltip]的兄弟姐妹们肩负着创造之相的印记与使命，将造物主的神迹带向尘世。\n\n当然，以#EMP 我#!为[ROOT.Char.GetHerHis|U]的化身。\n\n我再斟一杯[ROOT.Char.Custom('RegionalDrink')]，以此为数周庆典的开端。"
 tgp_east_asia_mandala_events.1000.desc.serenity_03: "这是一场精心筹备的庆典——[ROOT.Char.GetHouse.GetBaseName]家族登上宁静之相的中阶，没有任何开支被吝惜。\n\n信奉我们和平之道的人正稳步增加，众人逐渐认识到其益处。\n\n我珍惜这机会，使世界变得更好——更宁和的世界。"
 tgp_east_asia_mandala_events.1000.desc.serenity_04: "一场以集体冥想开场的盛典——那无数低垂的头颅与弥漫的静谧令我心生喜悦。还有什么方式能更好地颂扬[ROOT.Char.GetHouse.GetBaseName]家族如今几近完美的宁和之相？\n\n无数信徒象征着我们在世间的地位——对和平、安宁、宽容与和谐的渴求。\n\n我再一次低首默祷，沉思良久。"
 tgp_east_asia_mandala_events.1000.desc.serenity_05: "$tgp_east_asia_mandala_events.1000.desc.05.intro$\n\n仇敌化为友人，和平与繁荣笼罩整个领域。[ROOT.Char.GetHouse.GetBaseNameNoTooltip]家族的兄弟姐妹所传授的智慧与宁和，已在[ROOT.Char.GetPrimaryTitle.GetBaseName]留下深远烙印。\n\n一场真正宁和的庆典，献给真正的宁和之相的化身。\n\n我慈祥地低首，以回应他们优雅的祈祷与祝福。"
 tgp_east_asia_mandala_events.1000.desc.destruction_03: "震耳欲聋的声响响起——士兵们击打武器与盾牌，以庆贺[ROOT.Char.GetHouse.GetBaseName]家族登上毁灭之相的中阶。\n\n我们的威名迅速传遍四方，信徒数量再创新高。\n\n$tgp_east_asia_mandala_events.1000.desc.03.outro$"
 tgp_east_asia_mandala_events.1000.desc.destruction_04: "#EMP 嗵！嗵！#! 除了[ROOT.Char.GetPrimaryTitle.GetBaseName]士兵那雷鸣般的践踏声外，一切寂静无声。他们以毁灭之舞的仪式庆祝，因[ROOT.Char.GetHouse.GetBaseName]家族已接近最终的超越。\n\n我们的信徒渴望加入我们的事业，在真正的毁灭之相麾下效忠。\n\n我嘴角微扬，手执磨刀石，轻抚刃锋，静观仪式的进行。\n\n#EMP 嗵！嗵！#!"
 tgp_east_asia_mandala_events.1000.desc.destruction_05: "$tgp_east_asia_mandala_events.1000.desc.05.intro$\n\n大地似乎在颤抖——[ROOT.Char.GetPrimaryTitle.GetBaseName]的誓约军团以恐怖的践踏、咏唱与仪式侍奉[ROOT.Char.GetHouse.GetBaseNameNoTooltip]家族的兄弟姐妹。\n\n他们短暂地跪拜于我——他们的神——面前，然后继续仪式。\n\n我心不在焉地抚摸着一只骷髅，那是仪式中的贡品，倚坐王座上，目光深沉。"
 tgp_east_asia_mandala_events.1000.desc.trickery_03: "我成功延续了[ROOT.Char.GetHouse.GetBaseName]家族中顽灵神祇的传承，而祭礼庆典的欢悦程度也与之相称。\n\n一个个敌人要么莫名倒下，要么改信追随[ROOT.Char.GetHouse.GetBaseNameNoTooltip]。\n\n$tgp_east_asia_mandala_events.1000.desc.03.outro$"
 tgp_east_asia_mandala_events.1000.desc.trickery_04: "贡品，数不尽的贡品，为了取悦濒临完美欺诈之相的[ROOT.Char.GetHouse.GetBaseName]家族。\n\n黄金、毛皮、香料——贝壳、异兽——我们的信徒深谙取悦我们的方式。或者，他们以为自己懂。\n\n究竟是否足够，由#EMP 我#!裁定。阴影之网自我手中撒开，笼罩所有反对者。\n\n我低笑出声。"
 tgp_east_asia_mandala_events.1000.desc.trickery_05: "$tgp_east_asia_mandala_events.1000.desc.05.intro$\n\n表面上，一切似乎平静喜乐，但所有人都明白——哪怕是最轻微的失言或道德瑕疵，也可能招致不可测的[ROOT.Char.GetHouse.GetBaseNameNoTooltip]神祇的“造访”。\n\n众人都在竭力维持我等的神恩，遵循规矩。#EMP 我的#!规矩。\n\n我凝视人群，暗自思索下一个该将恩宠赐予谁。"
 tgp_east_asia_mandala_events.1000.a: "一切都理所当然。"
 mandala_descendant_from_aspect_of_creation.tt: "你的所有[Concept('children', '子女')|E]"
 mandala_descendant_from_aspect_of_creation_modifier: "创造之裔"
 mandala_descendant_from_aspect_of_creation_modifier_desc: "此角色乃升格的创造之相的子嗣。"
 mandala_aspect_of_serenity_devotion.tt: "每一年未发动进攻[war|E]，获得#P [EmptyScope.ScriptValue('num_years_of_peace_devotion')]#![piety_experience|E]#WEAK （当前#P [THIS.Char.MakeScope.ScriptValue('num_years_of_peace_devotion_payout')]#![piety_experience|E]）#!"
 mandala_forged_from_aspect_of_destruction.tt: "你所有的[THIS.Char.Custom('KnightCulturePlural')]"
 mandala_forged_from_aspect_of_destruction_modifier: "锻于毁灭"
 mandala_forged_from_aspect_of_destruction_modifier_desc: "该角色曾作为骑士效忠于一位升格的毁灭之相。"
 mandala_aspect_of_trickery_devotion.tt: "截至目前，成功实施的每一项[scheme|E]可获得#P [EmptyScope.ScriptValue('num_years_of_peace_devotion')]#![piety_experience|E]#WEAK （当前#P [THIS.Char.MakeScope.ScriptValue('num_successful_schemes_devotion_payout')]#![piety_experience|E]）#!"
 mandala_ascended_in_aspect_of_trickery_modifier: "升格的欺诈者"
 mandala_ascended_in_aspect_of_trickery_modifier_desc: "该角色升级了欺诈之相。"
 busy_in_mandala_succession: "你目前正忙于[mandala|E]继承"
 mandala_succession_header: "曼荼罗继承："
 tgp_east_asia_mandala_events.8497.t.lose_by_default: "曼荼罗继承试炼无法继续"
 tgp_east_asia_mandala_events.8497.tt.lose_by_default: "$tgp_east_asia_mandala_events.8499.a.tt.imprisoned$"
 tgp_east_asia_mandala_events.8499.t: "$mandala_succession_header$试炼"
 tgp_east_asia_mandala_events.8499.intro.imprisoned: "消息传到了[ROOT.Char.GetImprisonedBy.GetTitledFirstName]的幽深地牢里。我的[ROOT.Char.Custom2('RelationToMe', deceased_mandala_ruler )][deceased_mandala_ruler.GetFirstName]已经离世，现在将由我来领导这片领地。"
 tgp_east_asia_mandala_events.8499.intro.recent_adult.imprisoned: "我终于到了成年的边缘；是时候参加试炼，向领地证明我有资格接替我的[ROOT.Char.Custom2('RelationToMe', deceased_mandala_ruler )][deceased_mandala_ruler.GetFirstName]了。"
 tgp_east_asia_mandala_events.8499.desc.imprisoned: "\n\n可我现在正被困在这牢狱中，满身污秽，被当作牲畜般对待，浑身#EMP 哪有半点神圣可言#!？我又怎能做到这一切？\n\n我发誓，等我从这里出去，我必将复仇。我将#EMP 让我的复仇雨落在我的敌人身上#!。"
 tgp_east_asia_mandala_events.8499.desc.recent_adult: "时机已到！现在是我通过试炼接替我的[ROOT.Char.Custom2('RelationToMe', deceased_mandala_ruler )][deceased_mandala_ruler.GetFirstName]的时候了。\n\n在各个领域都展现我的卓越才能，我的表现以及众人的反应将决定我的追随者对我身为[ROOT.Char.Custom('GetAspectNoun')]之相的信仰程度。\n\n我#EMP 将#!接替我的[ROOT.Char.Custom2('RelationToMe', deceased_mandala_ruler )]！"
 tgp_east_asia_mandala_events.8499.desc.was_traveling: "我被引入内室，还没来得及喘口气。浴池已备好温水，身上的衣物也被换成了适合[ROOT.Char.GetTitleAsNameNoTooltip]身份的服饰。\n\n粗暴的侍奉与突如其来的凉风让我起了一身鸡皮疙瘩，我在心中默默为即将到来的试炼做着准备。\n\n我将有机会证明自己配得上接替我的[ROOT.Char.Custom2('RelationToMe', deceased_mandala_ruler )]，并展现出[ROOT.Char.Custom('GetAspectNoun')]之相。是时候了。"
 tgp_east_asia_mandala_events.8499.desc: "我的[ROOT.Char.Custom2('RelationToMe', deceased_mandala_ruler )]，[deceased_mandala_ruler.GetFirstName]，已经离世。[deceased_mandala_ruler.GetSheHe|U]已经超脱凡尘世界，现在该由我挺身而出，展现[ROOT.Char.Custom('GetAspectNoun')]之相以领导我们的国家，并将其载入史册。\n\n我将接受试炼，通过诸多方面的卓越表现，证明自己无所不在的神性。\n\n……想到失败的后果，一阵寒意悄悄爬上我的脊背。"
 tgp_east_asia_mandala_events.8499.a: "我已经准备好了。"
 tgp_east_asia_mandala_events.8499.a.imprisoned: "我在此发誓。"
 tgp_east_asia_mandala_events.8499.a.flavor.imprisoned: "这发展和我想象的不一样……"
 tgp_east_asia_mandala_events.8499.a.tt.imprisoned: "你因缺席而未能通过[mandala_succession_succession|E]试炼"
 tgp_east_asia_mandala_events.8499.a.tt.trials: "第一次[mandala_succession_succession|E]试炼开始"
 mandala_divine_retribution_modifier: "神意报应"
 mandala_divine_retribution_modifier_desc: "该角色正投身于击败敌人。"
 tgp_east_asia_mandala_events.8500.t: "$mandala_succession_header$丢掉的头"
 tgp_east_asia_mandala_events.8500.desc: "我们正处在创造仪式的中间环节，庆祝我登上宝座。我穿梭在人群中，对上前献礼的信众报以仁慈的微笑。\n\n一个小孩从人群中钻出来，[dummy_gender.GetHerHis]一把抱住我的腰。[dummy_gender.Custom('GirlBoy')]抬头望着我问道：“[ROOT.Char.GetTitleAsNameNoTooltip|U]……你的第五颗头#EMP 到底#!怎么了？”\n\n[dummy_gender.GetHerHis|U]的监护人被这大不敬的举动吓得脸色惨白，但我注意到大殿里所有人都竖起耳朵，急切地等待我的回答。"
 tgp_east_asia_mandala_events.8500.dynasty.override: "“你的老师应该能告诉你。”"
 tgp_east_asia_mandala_events.8500.a: "“我的罪过和他人的嫉妒，孩子。”"
 tgp_east_asia_mandala_events.8500.a.final_aspect: "你未处于最终级的[aspect_of_creation|E]"
 tgp_east_asia_mandala_events.8500.success.tt: "你成功通过[stewardship|E][mandala_succession_succession|E]试炼"
 tgp_east_asia_mandala_events.8500.b: "“啊，让我告诉你……”"
 tgp_east_asia_mandala_events.8500.b.flavor: "我#EMP 很#!确定事情就是这样的？"
 tgp_east_asia_mandala_events.8500.b.t.success: "极具说服力"
 tgp_east_asia_mandala_events.8500.b.tt.success: "你成功说服了他们"
 tgp_east_asia_mandala_events.8500.b.t.failure: "不为所动"
 tgp_east_asia_mandala_events.8500.b.tt.failure: "人群中传来一阵怀疑的嘀咕"
 tgp_east_asia_mandala_events.8510.t: "$mandala_succession_header$平静如池"
 tgp_east_asia_mandala_events.8510.desc: "侍从们整齐地跪成几排，在我的登基仪式进行期间，整个大殿里回荡着低沉的诵经声。我缓步绕行，轻轻摸了几个人的额头，试图传递安宁与祥和。\n\n就在这时，两个[dummy_gender.GetWomenMen]正在殿外为一块土地大声争吵。\n\n他们的喧闹声让房间里的人慢慢都将目光转向我，急切地想看看我会如何处理这起扰乱安宁的事。"
 tgp_east_asia_mandala_events.8510.dynasty.override: "“这是神圣的地方，你要克制自己。”"
 tgp_east_asia_mandala_events.8510.a: "“你们#EMP 共同享有#!这片土地，也共同享有收成。”"
 tgp_east_asia_mandala_events.8510.a.final_aspect: "你未处于最终级的[aspect_of_serenity|E]"
 tgp_east_asia_mandala_events.8510.success.tt: "你成功通过[diplomacy|E][mandala_succession_succession|E]试炼"
 tgp_east_asia_mandala_events.8510.b: "“要不我们#EMP 这样#!……”"
 tgp_east_asia_mandala_events.8510.b.flavor: "人们为何如此计较……"
 tgp_east_asia_mandala_events.8510.b.t.success: "$tgp_east_asia_mandala_events.8500.b.t.success$"
 tgp_east_asia_mandala_events.8510.b.tt.success: "$tgp_east_asia_mandala_events.8500.b.tt.success$"
 tgp_east_asia_mandala_events.8510.b.t.failure: "$tgp_east_asia_mandala_events.8500.b.t.failure$"
 tgp_east_asia_mandala_events.8510.b.tt.failure: "$tgp_east_asia_mandala_events.8500.b.tt.failure$"
 tgp_east_asia_mandala_events.8520.t: "$mandala_succession_header$毁灭之舞"
 tgp_east_asia_mandala_events.8520.desc: "我的长矛映着火把闪烁的光，沉默的人群急切地注视着我那抹着灰烬的脸。我置身于花海中，海螺发出低沉的嗡嗡声。\n\n人们期待我跳起宇宙之舞——毁灭之舞，它象征着神明的二元性。旧事物的毁灭，为新事物的萌芽和成长腾出空间。\n\n当我走近空地中央的圆柱形石柱时，一股沉静的凉意从石体散发出来。"
 tgp_east_asia_mandala_events.8520.dynasty.override: "“我生来如此，这是我的权利。”"
 tgp_east_asia_mandala_events.8520.a: "这事我在#EMP 睡梦#!中都能做到！"
 tgp_east_asia_mandala_events.8520.a.final_aspect: "你未处于最终级的[aspect_of_destruction|E]"
 tgp_east_asia_mandala_events.8520.success.tt: "你成功通过[martial|E][mandala_succession_succession|E]试炼"
 tgp_east_asia_mandala_events.8520.b: "“好吧，我们试试看……”"
 tgp_east_asia_mandala_events.8520.b.flavor: "一、二、呃……侧着来？"
 tgp_east_asia_mandala_events.8520.b.t.success: "$tgp_east_asia_mandala_events.8500.b.t.success$"
 tgp_east_asia_mandala_events.8520.b.tt.success: "$tgp_east_asia_mandala_events.8500.b.tt.success$"
 tgp_east_asia_mandala_events.8520.b.t.failure: "$tgp_east_asia_mandala_events.8500.b.t.failure$"
 tgp_east_asia_mandala_events.8520.b.tt.failure: "$tgp_east_asia_mandala_events.8500.b.tt.failure$"
 tgp_east_asia_mandala_events.8530.t: "$mandala_succession_header$真正的幻像"
 tgp_east_asia_mandala_events.8530.desc: "人群在此聚集，他们希望看到我，希望被#EMP 我#!迷住。几群人低声交谈着，远处传来钟声，表明时间到了。\n\n我走进那个圆圈，站在圆柱形石头旁边，将手掌放在它那光滑又冰凉的石面上。\n\n形形色色的面孔，有老有少，在我清了清嗓子准备发言时都安静下来，转头望向我："
 tgp_east_asia_mandala_events.8530.dynasty.override: "“让我讲讲那些在我之前的人。”"
 tgp_east_asia_mandala_events.8530.a.final_aspect: "你未处于最终级的[aspect_of_trickery|E]"
 tgp_east_asia_mandala_events.8530.success.tt: "你成功通过[intrigue|E][mandala_succession_succession|E]试炼"
 tgp_east_asia_mandala_events.8530.a: "“让我跟你们讲讲二元的幻像。”"
 tgp_east_asia_mandala_events.8530.b: "“……如果我告诉你们骗局不是#EMP 真的#!呢？”"
 tgp_east_asia_mandala_events.8530.b.flavor: "至少我#EMP 想#!让他们这么认为的。"
 tgp_east_asia_mandala_events.8530.b.t.success: "$tgp_east_asia_mandala_events.8500.b.t.success$"
 tgp_east_asia_mandala_events.8530.b.tt.success: "$tgp_east_asia_mandala_events.8500.b.tt.success$"
 tgp_east_asia_mandala_events.8530.b.t.failure: "$tgp_east_asia_mandala_events.8500.b.t.failure$"
 tgp_east_asia_mandala_events.8530.b.tt.failure: "$tgp_east_asia_mandala_events.8500.b.tt.failure$"
 tgp_east_asia_mandala_events.8550.t: "$mandala_succession_header$前路"
 tgp_east_asia_mandala_events.8550.t.failed: "$mandala_succession_header$前方无路"
 tgp_east_asia_mandala_events.8550.desc.critical_success: "欢呼声，欢呼声，到处都是欢呼声。人群欣喜若狂，能明显感觉到他们因新神明不负[ROOT.Char.GetHerHis]前任[deceased_mandala_ruler.GetFirstNamePossessive]的神性而如释重负。\n\n人们朝我抛来花朵，有人高歌、有人鼓掌、有人兴奋地跺脚。一场小型宴会自发地组织起来，信徒们不停地念叨我的名字、举杯祝酒，一直持续到深夜。\n\n我做得很好，前路一片光明。我悄悄露出了微笑。"
 tgp_east_asia_mandala_events.8550.desc.success: "房间里先是响起一阵低语，随后变成零星的议论，最终在我证明自己是位初露头角的新神明后，偶尔的激动喊声慢慢变成了由衷的欢呼。\n\n尽管我没能完全达到我的[ROOT.Char.Custom2('RelationToMe', deceased_mandala_ruler )][deceased_mandala_ruler.GetFirstNamePossessive]那样的神性高度，但我已向信徒表明，我有能力将大家从那些或多或少不受我控制的不利局面中解救出来。\n\n这里显然有成长的空间，我期待着能证明自己。"
 tgp_east_asia_mandala_events.8550.desc: "大殿里响起此起彼伏的低语，仆人和廷臣——那些我一直视为朋友和忠诚臣属的人——三五成群地聚在一起。他们用怀疑的目光打量着我，因为我已被证明#EMP 不如#![ROOT.Char.Custom2('RelationToMe', deceased_mandala_ruler )][deceased_mandala_ruler.GetFirstName]那般神圣。\n\n我微微低头，一时对未来感到忧虑。但随即意识到这样的姿态可能被人误解，于是挺直腰背，毫不退缩地迎上房间里每一道窃窃私语的目光。\n\n这里还有许多信心需要重建，前方的道路必将#EMP 坎坷#!。"
 tgp_east_asia_mandala_events.8550.desc.failed: "当意识到即将发生什么时，我的膝盖开始打颤，脑袋也有些发晕。我让[deceased_mandala_ruler.GetFirstName]失望了，也让整个领地失望了。\n\n我不是[ROOT.Char.GetPrimaryTitle.GetName]合格的继承者。没有任何可以依靠的根基。\n\n在片刻的清醒中，我环顾四周，发现人们要么已经离开，要么正在离开——他们背对着我，都是失望的低语和抱怨。我跪倒在地，任由全世界的重量瞬间将我压垮。"
 tgp_east_asia_mandala_events.8550.a: "我准备好了。"
 tgp_east_asia_mandala_events.8550.a.failed: "事情不该是这样的！"
