l_simp_chinese:
 tgp_travel_danger_events.0001.t: "废墟中的生命"
 tgp_travel_danger_events.0001.intro: "穿行于[ROOT.Char.GetCurrentLocation.GetName]，[disaster_situation.GetType.GetNameNoTooltip|l]造成的影响随处可见。"
 tgp_travel_danger_events.0001.flood: "河岸边布满残骸，房屋像溪流中的落叶一样顺流而下。整个村庄都被湍急的水流吞噬了。"
 tgp_travel_danger_events.0001.earthquake: "那曾经肥沃的土地与生机勃勃的村庄，如今在混乱与废墟中一片死寂，仿佛已被大地吞噬。"
 tgp_travel_danger_events.0001.desc: "\n\n行至一座废墟小镇的边缘，我在瓦砾中看见一个孤独的孩子。[peasant_character_child.GetSheHe|U]没注意到我，只拼命地试图重建一座看起来曾是农舍的建筑。"
 tgp_travel_danger_events.0001.a: "我的人会清理碎石。"
 tgp_travel_danger_events.0001.b: "我会照顾教导[peasant_character_child.GetHerHim]。"
 tgp_travel_danger_events.0001.c: "我没时间管这个！"
 impressed_by_kindness: "被善良所打动"
