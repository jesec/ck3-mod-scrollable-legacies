l_simp_chinese:
 #St Peter's Basilica
 building_type_holy_site_st_peters_basilica_01: "$building_holy_site_st_peters_basilica_01$"
 building_type_holy_site_st_peters_basilica_01_desc: "$building_holy_site_st_peters_basilica_01_desc$"
 building_holy_site_st_peters_basilica_01: "圣伯多禄大殿"
 building_holy_site_st_peters_basilica_01_desc: "君士坦丁一世皇帝皈依基督教后，下令在圣伯多禄陵墓的位置建造了圣伯多禄大殿，这里就此成为了西方基督教世界的中心。\n\n传统上，这座教堂是罗马天主教教宗的驻地，几个世纪以来，它已发展成为了庞大的建筑群，并受到良城垣的保护。"
 #Mont-Saint-Michel
 building_type_mont_st_michel_01: "圣米歇尔山"
 building_type_mont_st_michel_01_desc: "$building_mont_st_michel_01_desc$"
 building_mont_st_michel_01: "圣欧伯的圣弥额尔圣堂"
 building_mont_st_michel_01_desc: "公元708年，阿夫朗什主教圣欧伯在梦中见到总领天使弥额尔显现，指示他在附近一座潮汐岛上建造一座圣堂。欧伯起初并未理会这一神视，认为是魔鬼的诡计。最终，总领天使设法使其信服——据传一碰就在他头骨上戳出了一个洞。于是，主教下令在通布山上修建一座新的圣所。\n\n圣米歇尔山的历史由此开始。"
 building_mont_st_michel_02: "圣米歇尔山罗马式修道院"
 building_mont_st_michel_02_desc: "新建的修道院教堂坐落于岛屿的最高点，它见证了天主凌驾于天地万物的权能，也展现了人类的巧思。\n\n修道院下方，一个由朝圣者和渔民组成的小镇正逐渐兴起。"
 building_mont_st_michel_03: "奇迹修道院"
 building_mont_st_michel_03_desc: "修道院扩建出了一系列禁院、一座小礼拜堂、一个酒窖、一间骑士厅以及许多住所，形成了一处哥特式建筑群，堪称工程学上的奇迹。\n\n修道院拥有坚固的新防御工事，其下方的聚落现已发展成一座真正的城镇，里面居住着许多朝圣者和当地居民。"
 building_mont_st_michel_04: "设防的圣米歇尔山修道院"
 building_mont_st_michel_04_desc: "最近的几场战争让人们清楚看到，即便是像圣米歇尔山这样和平的岛屿，也可能成为关键的战略要地。正因如此，岩礁已用厚重的城墙和堡垒彻底加固，并为驻军新建了多处营房。\n\n这座海滨小镇如今已是一座充满活力的城市，岛上几乎房屋遍布。"
 #Sanchi Stupa
 building_type_sanchi_stupa_01: "$building_sanchi_stupa_01$"
 building_type_sanchi_stupa_01_desc: "$building_sanchi_stupa_01_desc$"
 building_sanchi_stupa_01: "散脂大佛塔"
 building_sanchi_stupa_01_desc: "大佛塔由孔雀王朝的阿育王修建于公元前三世纪，靠近他与妻子提毗的成婚之地。这座存放佛陀遗骨的宏伟建筑是同类建筑中最古老的之一，因其雕刻精美的门楼而闻名。"
 #Boudhanath
 building_type_boudhanath_01: "$building_boudhanath_01$"
 building_type_boudhanath_01_desc: "$building_boudhanath_01_desc$"
 building_boudhanath_01: "觉主塔"
 building_boudhanath_01_desc: "迦瑟侘曼荼波的浮屠塔，亦被称为“满愿塔”或“佉娑支提”，是佛教最大的佛塔之一，可能是佛教藏传分支的发源地。其巨大的圆顶和坛城中，安奉着多位佛陀的灵骨以及无数形态各异的遗物。\n\n由于其地处尼波罗与吐蕃之间古老的贸易路线上，旅人和商贾常顺路到此休憩与祈祷。"
 #Grand Mosque of Yazd
 building_type_yazd_mosque_01: "$building_yazd_mosque_01$"
 building_type_yazd_mosque_01_desc: "$building_yazd_mosque_01_desc$"
 building_yazd_mosque_01: "亚兹德大清真寺"
 building_yazd_mosque_01_desc: "这座辉煌的建筑建于一座四世纪的祆祠原址之上，其巨大的敞厅、贴砖的拱顶，以及带有一对高耸入云宣礼塔的雄伟入口门廊，无不令旅人与朝圣者惊叹。"
 #Qutb Minar
 building_type_qutb_minar_01: "$building_qutb_minar_01$"
 building_type_qutb_minar_01_desc: "$building_qutb_minar_01_desc$"
 building_qutb_minar_01: "德里铁柱"
 building_qutb_minar_01_desc: "宏伟的德里铁柱是国王旃陀罗笈多二世荣耀的象征，虽然之后的统治者也在其上刻下了自己的名字。尽管这根铁柱已经屹立了很长时间，却没有任何生锈的痕迹——这是印度铁匠技艺的证明！"
 building_qutb_minar_02: "库特卜尖塔"
 building_qutb_minar_02_desc: "宏伟的伊斯兰之力清真寺环绕着德里铁柱的旧址，一座无比高大的宣礼塔矗立于此，名为库特卜尖塔。\n\n这是德里统治者权力壮丽的丰碑。"
 building_qutb_minar_03: "扩建的伊斯兰之力清真寺"
 building_qutb_minar_03_desc: "库特卜尖塔周边的建筑群又扩建了多个庭院、大门和陵墓，规模堪称传奇。"
 building_qutb_minar_04: "阿拉伊尖塔"
 building_qutb_minar_04_desc: "建筑群中新增了一座尖塔，其设计仿照库特卜尖塔，但规模是它的两倍。这座高耸于德里上空的巨塔，是印度‑伊斯兰建筑艺术的巅峰之作。"
