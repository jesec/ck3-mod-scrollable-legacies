l_simp_chinese:
 set_house_relation_third: "[DYNASTY_HOUSE.GetName]‑[DYNASTY_HOUSE_2.GetName]的[house_relation|E]转为[HOUSE_RELATION_LEVEL.GetName|V]"
 set_house_relation_global: "$set_house_relation_third$"
 set_house_relation_third_past: "$set_house_relation_third$"
 set_house_relation_global_past: "$set_house_relation_third_past$"
 # Partial house relation change (less than a full step)
 change_house_relation_fraction_third: "[HOUSE_RELATION.GetName][house_relation|E][HouseRelation.GetLevel.GetName][Select_CString( GreaterThan_CFixedPoint( '(CFixedPoint)$STEPS|q$', '(CFixedPoint)0.0'), '#P 改善#!', '#N 恶化#!' )]至[HOUSE_RELATION_LEVEL.GetName]（$STEPS|+=%^$）"
 change_house_relation_fraction_global: "$change_house_relation_fraction_third$"
 change_house_relation_fraction_third_past: "$change_house_relation_fraction_third$"
 change_house_relation_fraction_global_past: "$change_house_relation_fraction_third_past$"
 # Significant house relation change (full step or more)
 change_house_relation_third: "[HOUSE_RELATION.GetName][house_relation|E]由[HouseRelation.GetLevel.GetName][Select_CString( GreaterThan_CFixedPoint( '(CFixedPoint)$STEPS|q$', '(CFixedPoint)0.0'), '#P 改善#!', '#N 恶化#!' )]至[HOUSE_RELATION_LEVEL.GetName]（$STEPS|+=%^$）"
 change_house_relation_global: "$change_house_relation_third$"
 change_house_relation_third_past: "$change_house_relation_third$"
 change_house_relation_global_past: "$change_house_relation_third_past$"
 # Effect: impact_house_relation
 impact_house_relation_to_be_established_global: "在[DYNASTY_HOUSE.GetName]与[DYNASTY_HOUSE_2.GetName]之间建立初始等级为[HOUSE_RELATION_LEVEL.GetName]的[house_relation|E]"
 impact_house_relation_to_change_level_global: "[HOUSE_RELATION.GetName][house_relation|E]由[OLD_HOUSE_RELATION_LEVEL.GetName][Select_CString( GreaterThan_CFixedPoint( '(CFixedPoint)$STEPS|q$', '(CFixedPoint)0.0'), '#P 改善#!', '#N 恶化#!' )]至[NEW_HOUSE_RELATION_LEVEL.GetName]（$STEPS|+=%^$）"
 impact_house_relation_to_progress_towards_level_global: "[HOUSE_RELATION.GetName][house_relation|E][HOUSE_RELATION.GetLevel.GetName][Select_CString( GreaterThan_CFixedPoint( '(CFixedPoint)$STEPS|q$', '(CFixedPoint)0.0'), '#P 改善#!', '#N 恶化#!' )]至[HOUSE_RELATION_LEVEL.GetName]（$STEPS|+=%^$）"
 impact_house_relation_to_be_established_third: "$impact_house_relation_to_be_established_global$"
 impact_house_relation_to_change_level_third: "$impact_house_relation_to_change_level_global$"
 impact_house_relation_to_progress_towards_level_third: "$impact_house_relation_to_progress_towards_level_global$"
 I_CLEAR_HOUSE_RELATION_EFFECT: "[DYNASTY_HOUSE.GetName]‑[DYNASTY_HOUSE_2.GetName][house_relation|E]结束"
 THEY_CLEAR_HOUSE_RELATION_EFFECT: "$I_CLEAR_HOUSE_RELATION_EFFECT$"
 CLEAR_HOUSE_RELATION_EFFECT: "$I_CLEAR_HOUSE_RELATION_EFFECT$"
 CLEARED_HOUSE_RELATION_EFFECT: "[DYNASTY_HOUSE.GetName]‑[DYNASTY_HOUSE_2.GetName][house_relation|E]结束了"
