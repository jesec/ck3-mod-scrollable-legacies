 story_cycle_pet_cat: "宠物猫"
 story_cycle_pet_cat_desc: "#F 一只骄傲的猫科动物与你为伴，身手敏捷的猎手，只在它愿意时才会与你亲昵。#!"
 CAT_INFORMATION_STRING: "你的猫名为#V [Story.Custom('CatStoryNameAll')]#!。\n[Story.Custom('CatStoryHerHisAll')|U]有着[Story.Custom('CatFurColorAll')]色的毛皮，[Story.Custom('CatEyeColorAll')]的眼睛，今年[Story.Custom('CatStoryKittenOrAgeAll')]。[Story.Custom('CatStupidOrNotStupidAll')]"
 dumb_but_sweet_orange_boy: "\n[Story.Custom('CatStorySheHeAll')|U]是个笨笨的[Story.Custom('CatFurColorAll')]色[Story.Custom('CatStoryGirlBoyAll')]，但非常温顺。"
 story_cycle_pet_eagle: "猎鹰"
 story_cycle_pet_eagle_desc: "#F 一只猎鹰栖息在你的手套上，时刻警觉，永远饥渴，自高空带来死亡。#!"
 EAGLE_INFORMATION_STRING: "你的鹰名为#V [Story.Custom('EagleStoryNameAll')]。#!\n[Story.Custom('EagleStorySheHeAll')|U]目前[Story.MakeScope.Var('eagle_age_variable').GetValue|0]岁。"
 bp2_hostage_loyalty: "忠诚的人质"
 bp2_hostage_loyalty_desc: "你的一名[hostages|E]开始对你和你的行事方式感到亲切。"
 hostage: "[hostage|E]"
 HOSTAGE_STORY_PRACTICAL_INFORMATION_STRING: "你的[hostage|E][Story.MakeScope.Var('hostage_target').Char.GetUIName]，正在你的[court|E]中长大，这将影响[Story.MakeScope.Var('hostage_target').Char.GetHerHis]的效忠倾向。保持[Story.MakeScope.Var('hostage_target').Char.GetHerHis]存有较高的[opinion|E]，并在事件中选择合适的选项，使[Story.MakeScope.Var('hostage_target').Char.GetHerHim]在成年后更可能忠于你。\n\n当前忠诚度：[Story.MakeScope.Var('theon_points').GetValue|0+]"
 LOYALTY_LABEL: "忠诚点数"
 claimant: "[claimant|E]"
 diverted_crusaders: "歧路十字军"
 frankokratia_story: "法兰克人的统治"
 frankokratia_story_desc: "一位对[GetTitleByKey('e_byzantium').GetName|l]拥有宣称权的人诱使西方的机会主义者们偏离加入十字军的初心，将贪婪的利剑转向基督教世界的心脏……"
 FRANKOKRATIA_STORY_PRACTICAL_INFORMATION_STRING: "针对[GetTitleByKey('e_byzantium').GetHolder.GetShortUIName]的[war|E]将决定[GetTitleByKey('e_byzantium').GetName|l]的未来。要么[claimant|E][Story.MakeScope.Var('byz_claimant').Char.GetUIName]夺取皇位，并为十字军的努力支付报酬；要么将在[GetFaithByKey('catholic').GetAdjective]统治下建立一个新的[GetTitleByKey('e_latin_empire').GetBaseName]。"
 story_conqueror: "征服者"
 story_conqueror_desc: "你的野心毫无边界！世界就在你面前，等待你的征服。"
 CONQUEROR_STORY_PRACTICAL_INFORMATION_STRING: "征服者将获得诸多强力加成，例如减少[factions|E]、获得[vassalize_casus_belli|E]的使用权，以及偶发的强力事件。\n\n在以下情况下，你将不再是征服者：\n$BULLET_WITH_TAB$你不再[independent|E]\n$BULLET_WITH_TAB$你的级别降为[count|E]\n$BULLET_WITH_TAB$你成为[unlanded|E]\n$BULLET_WITH_TAB$你在#V 10#!年内未处于[war|E]状态\n$BULLET_WITH_TAB$你深陷[debt|E]\n$BULLET_WITH_TAB$你输掉#V 3#!场或更多[wars|E]\n$BULLET_WITH_TAB$你获得[GetTrait('incapable').GetName( GetNullCharacter )]"
 story_destiny_child: "天选之子"
 story_destiny_child_desc: "一名极具潜力的孩子诞生了，仿佛被命运之神亲自选中。"
 DESTINY_CHILD_STORY_PRACTICAL_INFORMATION_STRING: "千载难逢之时，天赋卓绝的孩子会降生。他们成长更快，所达高度亦非凡人可及。\n\n请悉心照料[Story.MakeScope.Var('destiny_child').Char.GetUIName]，并考虑让[Story.MakeScope.Var('destiny_child').Char.GetHerHim]成为你的[player_heir|E]——例如将[Story.MakeScope.Var('destiny_child').Char.GetHerHim]指定为你的[designated_heir|E]。"
 CHILD_OF_DESTINY: "天选之子"
 story_cycle_martial_lifestyle_warhorse: "战马"
 story_cycle_martial_lifestyle_warhorse_desc: "你拥有一匹训练有素的战马。愿敌人面对你的冲锋瑟瑟发抖。"
 WARHORSE_STORY_PRACTICAL_INFORMATION_STRING: "你的战马名为#V [Story.Custom('WarhorseStoryNameAll')]#!。[Story.Custom('HorseStorySheHeAll')|U]是一匹[Story.Custom('HorseStoryMareStallionAll')]。"
 DOPPELGANGER: "你的[Glossary( '二重身', 'DOPPELGANGER_GLOSS' )]"
 story_doppelganger: "泥中镜"
 DOPPELGANGER_GLOSS: "与在世之人容貌相似甚至相同的另一人，通常在偶然间相遇。在德国民间传说中，这是一种诡异的不祥征兆——见到自己的二重身，可能预示着疾病或死亡。"
 story_doppelganger_desc: "你遇到了一名与你容貌完全相同的农民——一个名副其实的[Glossary( '二重身', 'DOPPELGANGER_GLOSS' )]"
 DOPPELGANGER_STORY_PRACTICAL_INFORMATION_STRING: "一个与你长相与谈吐皆相似的农民可能是机遇……亦可能是诅咒。眼下，[Story.MakeScope.Var('doppelganger_character').Char.GetUIName]居住在你的[court|E]。"
 story_cycle_hunt_mystical_animal: "追猎神秘野兽"
 story_cycle_hunt_mystical_animal_desc: "在一次狩猎中，你瞥见一头神秘的白色野兽。捕获它必定犹如寻得圣杯！"
 WHITE_ANIMAL_INFORMATION_STRING: "你正在追踪一只#V 白色[Story.MakeScope.Var('animal_type').GetFlagName|U]#!。\n\n捕获它将带来巨大回报——但[Story.MakeScope.Var('animal_type').GetFlagName]的每次逃脱，都会让你获得[stress|E]。不时出现的[GetModifier('hunt_sighting_legendary_modifier').GetNameWithTooltip]将允许你继续狩猎。\n\n白色[Story.MakeScope.Var('animal_type').GetFlagName]遭遇次数：[Story.MakeScope.Var('encounters').GetValue|0V] #weak （自首次以来）#!"
 LEGENDARY_COUNTY_LABEL: "白色[Story.MakeScope.Var('animal_type').GetFlagName|U]当前的栖息地"
 story_sycophant: "谄媚者"
 story_sycophant_desc: "你的一名廷臣是显而易见的谄媚者，仅凭其存在便激怒了你的封臣。"
 SYCOPHANT_INFORMATION_STRING: "我的[Story.GetOwner.Custom2( 'RelationToMeShort', Story.MakeScope.Var('sycophant_character').Char )][Story.MakeScope.Var('sycophant_character').Char.GetShortUIName]与我的[Story.GetOwner.Custom2( 'RelationToMeShort', Story.MakeScope.Var('jealous_character').Char )][Story.MakeScope.Var('jealous_character').Char.GetShortUIName]针锋相对。我可以偏袒其中一人，但那必然激怒另一人。时间将揭示此事的走向……"
 SYCOPHANT_LABEL: "谄媚者"
 JEALOUS_VASSAL_LABEL: "我最善妒的封臣"
 story_cycle_pet_rock: "宠物石"
 story_cycle_pet_rock_desc: "你身旁有一块宠物石，它那亘古不变的面容完美契合你独特的陪伴观念。"
 PET_ROCK_INFORMATION_STRING: "你的石头名为#V [Story.GetOwner.Custom('RockStoryName')]#!。\n[Story.GetOwner.Custom('RockStoryHerHis')|U]崎岖的外表呈[Story.GetOwner.Custom('RockColor')]色。"
 story_cycle_admin_eunuch: "显赫的阉人"
 story_cycle_admin_eunuch_desc: "一名能力非凡的阉人寻求进入你的宫廷。这是机遇……还是威胁？"
 EUNUCH_INFORMATION_STRING: "随着时间推移，你将有机会赋予[Story.MakeScope.Var('eunuch').Char.GetShortUIName]更大的权力与影响力。如此将提升[GetModifier('admin_eunuch_liege_4_modifier').GetNameWithTooltip][modifier|E]的强度。\n\n但须谨慎——若你冷落[Story.MakeScope.Var('eunuch').Char.GetHerHim]，或在未确保[Story.MakeScope.Var('eunuch').Char.GetHerHis]忠诚的情况下赋予[Story.MakeScope.Var('eunuch').Char.GetHerHim]#EMP 过多#!权力，后果可能极其严重……\n\n迄今为止，你已拒绝[Story.MakeScope.Var('eunuch').Char.GetHerHis]的请求[Story.MakeScope.Var('eunuch_refusals').GetValue|0V]次。"
 EUNUCH_LABEL: "阉人"
 UPSET_COURTIERS: "对阉人不满的臣民"
 POETRY_BOOK_LABEL: "我的诗集"
 commission_epic_story: "编纂史诗"
 commission_epic_story_desc: "你正委托创作一部伟大的史诗，用来记述家族功绩。"
 EPIC_INFORMATION_STRING: "你的[Story.GetOwner.Custom('CommissionEpicScribe')][AddTextIf(Story.MakeScope.Var('composer').IsSet, Concatenate(Concatenate(', ', Story.MakeScope.Var('composer').Char.GetShortUIName), ','))]正在创作一部宏大的[Story.Custom('CompositionTypeAll')]，以提升[Story.GetOwner.GetDynasty.GetName][dynasty|E]的[dynasty_prestige|E]并获得一件[artifact|E]。\n\n创作出杰出[Story.Custom('CompositionTypeAll')]的概率：[Story.MakeScope.Var('final_outcome_chance').GetValue|0+/%]"
 COMPOSER: "你的史诗撰写者"
 story_foreign_raised_reformer: "异族抚养的改革者"
 story_foreign_raised_reformer_desc: "你成长于远离如今称为家园的土地。\n如此不同……然而，若家园也能变得如彼方一般呢？"
 REFORMER_INFORMATION_STRING: "你曾在[Story.MakeScope.Var('advanced_realm').Title.GetBaseName]由[Story.MakeScope.Var('foreign_educator').Char.GetShortUIName]抚养长大，抚养你的是一位[Story.MakeScope.Var('advanced_culture').Culture.GetName]人，信仰[Story.MakeScope.Var('advanced_culture_faith').Faith.GetAdjective]。你对[Story.MakeScope.Var('advanced_culture').Culture.GetName][culture|E]印象深刻，并希望让自己的人民更像他们。\n\n你将开始获得推进改革或坚守传统的机会：\n$BULLET_WITH_TAB$#indent_newline:7 通过推进改革，你可以获得[innovations|E]、[cultural_acceptance|E]、[traditions|E]，甚至可能是一座[GetBuilding('generic_university').GetName]。请记住，改革是一个漫长且代价高昂的过程。#!\n$BULLET_WITH_TAB$#indent_newline:7 通过坚守传统，你可以获得[vassal|E][opinion|E]、[dynasty_prestige|E]以及[casus_bellis|E]和[special_troops|E]形式的[war|E]增益。#!"
 REFORM_LABEL: "改革你的[culture|E]的进度"
 REAFFIRMATION_LABEL: "坚守你的[culture|E]的进度"
 REFORM_MIN_VALUE_LABEL: ""
 REFORM_MAX_VALUE_LABEL: "最大：#V 3#!"
 REAFFIRMATION_MIN_VALUE_LABEL: ""
 REAFFIRMATION_MAX_VALUE_LABEL: "最大：#V 2#!"
 ECCENTRIC_MIN_VALUE_LABEL: ""
 ECCENTRIC_MAX_VALUE_LABEL: "最大：#V 5#!"
 IMAGINARY_FRIEND_INFORMATION_STRING: "你想象中的朋友名叫[Story.MakeScope.Var('imaginary_friend_name').Char.GetShortUINameNoTooltip]。你将偶尔获得与[Story.MakeScope.Var('imaginary_friend_name').Char.GetHerHim]互动的机会。"
 ECCENTRIC_VALUE: "获得[GetTrait('eccentric').GetName( GetNullCharacter )]的进度"
 story_cycle_imaginary_friend: "想象中的朋友"
 story_cycle_imaginary_friend_desc: "终于有一名朋友可以一起玩了！谁在乎他是不是真的？对我来说他就是真的！"
 story_greatest_of_khans: "最伟大的汗"
 story_greatest_of_khans_desc: "在天际之上，有许多伟大的光芒。在那天际，有太阳、月亮和星辰。然而，在大地上只能有一位可汗。"
 GREATEST_OF_KHANS_INFORMATION_STRING: "$become_greatest_of_khans_decision_enable_gok_invasion_cb$\n$gok_enable_offer_submission_or_ruin_tt$\n\n@alert_icon!#alert_trial 如果你的[dynasty|E]失去[Story.GetOwner.GetPrimaryTitle.GetName|l]的控制、不再是[GetGovernment( 'nomad_government' ).GetName]或未能在#high [Story.MakeScope.Var('gok_final_date').GetValue|0]#!年之前采用#high $mpo_gok_world_conquest_decision$#![decision|E]，这些加成会消失，[Story.GetOwner.GetPrimaryTitle.GetName|l]有可能会分裂！#!"
