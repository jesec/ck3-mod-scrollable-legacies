 story_cycle_pet_dog: "宠物狗"
 story_cycle_pet_dog_desc: "#F 一只忠诚的犬类伙伴伴你左右，既提供保护，又建立起人类鲜能匹敌的忠诚纽带。#!"
 DOG_INFORMATION_STRING: "你的狗名为#V [Story.Custom('DogStoryNameAll')]#!。\n[Story.Custom('DogStoryHerHisAll')|U]有着[Story.Custom('DogFurColorAll')]色的毛皮，[Story.Custom('DogEyeColorAll')]的眼睛，今年[Story.Custom('DogStoryPuppyOrAgeAll')]。\n[Story.Custom('DogStorySheHeAll')|U]是个非常棒的[Story.Custom('DogStoryGirlBoyAll')]。"
 dog_age_puppy: "不到一岁"
 dog_age_proper: "[Story.MakeScope.Var('dog_age_variable').GetValue|0]岁"
