l_simp_chinese:
 #Travel Flavor Events
 #Troll bridge - you encounter a troll bridge.
 travel_events.5100.t: "[ROOT.Char.GetCurrentLocation.Custom('GetProvinceTricksterSpirit')|U]之桥"
 travel_events.5100.desc: "“大人！这座桥名声不好。桥下住着一个[ROOT.Char.GetCurrentLocation.Custom('GetProvinceTricksterSpirit')]！”我的[ROOT.Char.Custom2('RelationToMe', superstitious_traveler)]，[superstitious_traveler.GetTitledFirstName]喊道。“从这过的话，它肯定会找上我们，或者远远地诅咒我们。”\n\n我的同伴们开始低声议论。有人念起[ROOT.Char.GetFaith.HighGodName]的名字以求庇护。不幸的是，这座桥是方圆数里内唯一安全的过河地点。"
 travel_events.5100.a: "“我不怕任何[ROOT.Char.GetCurrentLocation.Custom('GetProvinceTricksterSpirit')]或恶魔！”"
 travel_events.5100.b: "“才没有这样的事，[superstitious_traveler.GetTitledFirstNameNoTooltip]。”"
 travel_events.5100.c: "“我们必须祈祷赶走这个灵。”"
 travel_events.5100.d: "“太可怕了！我们找其他路绕过去。”"
 custom.every_brave_or_impatient_entourage_member: "所有[GetTrait('brave').GetName( GetNullCharacter )]或[GetTrait('impatient').GetName( GetNullCharacter )]的随行人员"
