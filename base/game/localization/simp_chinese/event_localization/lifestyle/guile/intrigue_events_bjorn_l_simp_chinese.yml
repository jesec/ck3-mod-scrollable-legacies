l_simp_chinese:
 #Lessons of the heart
 intrigue_events_bjorn.5100.t: "心之教诲"
 intrigue_events_bjorn.5100.desc: "看着我心爱的[the_lover.GetFirstName]，我意识到能从这样一个出色的人身上学到很多东西。[the_lover.GetHerHis|U]的头脑就像一座有待挖掘的宝藏；而我也有些东西能教给[the_lover.GetFirstName]。\n\n更不用说，这是我们共度时光的美好方式！"
 intrigue_events_bjorn.5100.a: "我的爱人有太多东西要教我。"
 intrigue_events_bjorn.5100.b: "[the_lover.GetSheHe|U]将成为一个可爱的学生。"
 intrigue_events_bjorn.5100.c: "和你在一起的时光对我来说已经足够了。"
 #shared interests
 intrigue_events_bjorn.5101.t: "共同追求"
 intrigue_events_bjorn.5101.desc: "[the_lover.GetFirstName]是这样令我着迷！我想去体会[the_lover.GetHerHim]的喜悦。\n\n哦，要是能一起度过幸福的日子：\n\n双手默契配合，心思都专注于共同追求。\n\n我们的心跳合而为一。"
 intrigue_events_bjorn.5101.a: "亲爱的，让我看看是什么点燃了你的热情。"
 intrigue_events_bjorn.5101.b: "来，和我分享这份喜悦。"
 intrigue_events_bjorn.5101.c: "我们一起来学点新东西怎么样？"
 #Dark depths of the soul
 intrigue_events_bjorn.5102.t: "爱屋及乌"
 intrigue_events_bjorn.5102.desc: "随着我们愈发亲密，我们终于到了那一步。或许是时候真正地彼此坦诚一切了，这样我们才能知晓所有该知晓的事。分享那些通常……不会分享的事情。\n\n过了这个点就无法回头了，但[the_lover.GetFirstName]会接受关于我的一切吗？"
 intrigue_events_bjorn.5102.a: "我有这些东西要给你看。"
 intrigue_events_bjorn.5102.b: "告诉我些你从未告诉过其他人的事情。"
 intrigue_events_bjorn.5102.c: "让我们探索我们最黑暗的幻想。"
 intrigue_events_bjorn.5102.d: "不！有些事情永远不该被人知道。"
