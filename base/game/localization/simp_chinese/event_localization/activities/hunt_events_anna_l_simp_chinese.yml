l_simp_chinese:
 hunt_events_anna.0001.t: "根深叶茂"
 hunt_events_anna.0001.desc: "一棵高大的橡树展现在眼前，高大的树冠向四面八方伸展——将下方的一切笼罩在黑暗。抬头望向它的枝桠，让我想起那些来来去去的各个王朝。所有在我之前的人，还有那些在我离去后会将我的遗产传承下去的人。\n\n当我走近，我注意到树皮上刻着几组姓名首字母，温柔地提醒着岁月中人来人往。而我希望与我共同传承这份遗产的人，是我的全部，[love_interest.GetFirstName]。"
 hunt_events_anna.0001.a: "在树皮上刻下[love_interest.GetFirstNameNoTooltip]的姓名首字母。"
 hunt_events_anna.0001.b: "哪有时间做这种荒唐事！"
 hunt_events_anna.0001.b.t_toast: "狩猎是我的首要任务。"
 hunt_events_anna.0005.t: "皮肤之下"
 hunt_events_anna.0005.desc: "我短暂的休息被一阵朝我方向而来的嘲弄笑声打断。我抬起头，毫不意外地看到[mocking_participant.GetFirstName]咧嘴大笑，手里抓着一只似乎死去的[ROOT.Char.Custom('SmallAnimal')]。\n\n“我从没觉得你能独自在荒野中生存下去，所以我想你该练练手了。”[mocking_participant.GetSheHe|U]用嘲讽的语气说道，把尸体扔到了我的脚边。"
 hunt_events_anna.0005.a: "尝试剥下这只动物的皮。"
 hunt_events_anna.0005.a.toast.good: "我成功剥下了兽皮"
 hunt_events_anna.0005.a.toast.nothing: "剩下的部分已难以辨认"
 hunt_events_anna.0005.b: "练习？那我可不客气了……"
 hunt_events_anna.0005.c: "这种卑微的活计还轮不到我来做。"
 hunt_events_anna.0010.t: "困于陷阱之下"
 hunt_events_anna.0010.desc: "我迈着沉重且不稳的步伐，在[ROOT.Char.GetCurrentLocation.Custom('GetTerrainTypePlural')]中追踪猎物，一心只想着跟上节奏。突然，一阵清脆的断裂声传入耳中。我顿时感到一阵失重，胃里一阵翻腾。跌落停止了，身体因撞击而传来一阵剧痛。\n\n我痛苦地环顾四周，只看到四面墙将我包围。我掉进了一个陷阱，必须想办法爬上去。"
 hunt_events_anna.0010.a: "设法爬出洞口。"
 hunt_events_anna.0010.a.desc.good: "我成功爬了出来"
 hunt_events_anna.0010.a.toast.good: "我忍痛挣扎，成功脱身"
 hunt_events_anna.0010.a.toast.bad: "我再次踉跄，并因此受伤"
 hunt_events_anna.0010.a.desc.bad: "我失足滑落，再次跌回洞中"
 hunt_events_anna.0010.b: "“上面有人在吗？！”"
 hunt_events_anna.0010.b.flavor: "狩猎队停止了狩猎，转而前来救助我。"
 hunt_events_anna.0015.t: "吸气……呼气"
 hunt_events_anna.0015.desc: "林间空地上回荡着奇怪的咚咚声、低低的嘟囔声，还有时不时的叹息声。一个手持弓箭的身影来回踱步，似乎在为什么事感到懊恼。\n\n为了看得更清楚些，我躲到树后悄悄张望。我看到我的[child_with_bow.Custom('GetDaughterSon')][child_with_bow.GetFirstName]，周围地上散落着几支箭，几乎都没射中[child_with_bow.GetSheHe]设定的目标。看来[child_with_bow.GetSheHe]需要一些指导。"
 hunt_events_anna.0015.a: "“来，我教你……”"
 hunt_events_anna.0015.a.flavor: "身为一名老练的猎手，我理应能用自己的经验来帮助[child_with_bow.GetHerHim]改善射箭的姿势与准度。"
 hunt_events_anna.0015.a.toast.good: "[child_with_bow.GetFirstNameNoTooltip]遵循了我的教导"
 hunt_events_anna.0015.a.toast.bad: "[child_with_bow.GetFirstNameNoTooltip]未能理解我的教导"
 hunt_events_anna.0015.b: "为[child_with_bow.GetHerHim]喝彩以示鼓励。"
 hunt_events_anna.0015.c: "让[child_with_bow.GetFirstNameNoTooltip]自己摸索。"
 hunt_events_anna.0015.c.toast: "[child_with_bow.GetFirstNameNoTooltip]找到了使用弓箭的方法"
