 #Common attribute unlocks
 marauder_attribute.unlock_tt: "Beliebige der folgenden Dinge:\n$EFFECT_LIST_BULLET$Der [Concept('acclaimed_knight', 'ausgezeichnete Ritter')|E] ist [GetTrait('sadistic').GetName(GetNullCharacter)|l]\n$EFFECT_LIST_BULLET$Der [Concept('acclaimed_knight', 'ausgezeichnete Ritter')|E] ist [GetTrait('callous').GetName(GetNullCharacter)|l]\n$EFFECT_LIST_BULLET$Der [Concept('acclaimed_knight', 'ausgezeichnete Ritter')|E] ist [GetTrait('vengeful').GetName(GetNullCharacter)|l]\n$EFFECT_LIST_BULLET$Kann verfügbar werden, nachdem eine [army|E] mit dem [Concept('acclaimed_knight', 'ausgezeichneten Ritter')|E] erfolgreich ein [holding|E] [occupies|El]"
