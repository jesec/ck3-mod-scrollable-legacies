l_german:
 # reverse button
 LEDGER_SORT_BY: "#T $SORT_BY$[Select_CString(LedgerWindow.GetSortOrder, 'Aufsteigend', 'Absteigend')]\n#!#I Zum Wechseln klicken#!"
 # active sorting order, creates two loc keys for ascending and descending orders
 ACTIVE_SORTING_LEDGER: "#low Sortiert nach:#! #clickable [Localize(Concatenate(OrderLedgerOption.GetKey, Select_CString(LedgerWindow.GetSortOrder, '_least', '_most')))]#!"
 # shared locs
 any_filter: "Beliebig"
 all_filter_option: "$any_filter_option$" # yes, any is all
 your_filter_option: "$CHARACTER_NAME_MY_CAPITALIZED$"
 most_sort: "Am meisten"
 least_sort: "Am wenigsten"
 fewest_sort: "Wenigste"
 highest_sort: "Höchste"
 lowest_sort: "Niedrigste"
 player_realms_filter_option: "Spielerreiche"
 players_only_filter_option: "Nur Spieler"
 sort_by: "Sortieren nach" # same as SORT_BY but without :
 # standalone sorting buttons, usually reusing dropdown names
 BUTTON_SORT_LEDGER: "$sort_by$ [Localize(Concatenate('sort_l_', PdxGuiWidget.GetName))]" # we concatenate so we don't end up localizeing simple terms like 'date' or 'counties'
 # dropdown items. Using GetKey to reuse them instead of having 40 identical options for titles
 DROP_SORT_LEDGER: "[Localize(Concatenate('sort_l_', OrderLedgerOption.GetKey))]"
 # some standalones need more detailed tooltips, so we replace them like this
 EXTRA_SORT_LEDGER: "$sort_by$ [Localize(Concatenate('sort_tt_', PdxGuiWidget.GetName))]"
