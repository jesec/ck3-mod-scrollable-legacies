 HBOX_DOCTRINE_FAITH_TT: "#T [FaithDoctrine.GetNameNoTooltip(Faith.Self)]#!\n[FaithDoctrine.GetEffectsDescription(Faith.Self)]\n\n[FaithDoctrine.GetDescription(Faith.Self)|F]"
 KNIGHT_RESTRICTIONS: "Andere Einschränkungen gelten"
 #this is can_be_knight_trigger in 00_war_and_peace_triggers.txt
 KNIGHT_RESTRICTIONS_TT: "#T Ritter-Einschränkungen#!\nNur Eure direkten [vassals|E], [courtiers|e] oder [followers|E] können als Ritter dienen.\nEure [culture|e] oder Euer [faith|e] bestimmen, welche Geschlechter als [knights|e] dienen können.\n\nEin Ritter kann nicht sein:\n – Spieler, [child|E], [prisoner|e] oder [GetTrait('incapable').GetName(GetPlayer.Self)]\n – [clergy|e]-Mitglied (es sei denn, [faith|e] oder [culture|e] lassen dies zu)\n – [master_assassin|e] oder [GetTrait('blind').GetName(GetPlayer.Self)] (es sei denn, die [culture|e] lässt dies zu oder er ist ein [GetTrait('order_member').GetName(GetPlayer.Self)])\n – [diarch|e] oder [ceremonial_liege|e]\n – [governor|e] eines [Concept('duchy', 'Herzogtums')|E] (oder höherem [title|e]) oder [house_head|e] einer [noble_family|e]\n\nKultur-[traditions|e] und Ereignisse können einige Einschränkungen aufheben"
 KP_CULTURE_MINIMUM_PROWESS: "@alert_icon! Eure [culture|e] erfordert mindestens 12 [prowess|e]"
 KP_CULTURE_ADMIN_FAMILY_KNIGHTS: "@check_icon! Eure [culture|E] hebt Geschlechtseinschränkungen für Verteidigungs-[wars|e] auf"
 KP_CULTURE_HIGH_PROWESS: "@check_icon! Eure [culture|e] hebt die meisten Einschränkungen für [knights|e] mit mindestens 10 [prowess|e] auf"
