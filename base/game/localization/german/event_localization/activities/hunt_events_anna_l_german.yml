l_german:
 hunt_events_anna.0001.t: "Tiefe Wurzeln"
 hunt_events_anna.0001.desc: "Eine mächtige Eiche präsentiert sich mit ihrer majestätischen, weit ausladenden Krone: Alles darunter bleibt in Dunkelheit gehüllt. Beim Blick zu ihren Ästen denke ich an die verschiedenen Dynastien, die kommen und gehen. An all jene, die vor mir waren, und an jene, die mein Vermächtnis weitertragen werden, wenn ich nicht mehr bin.\n\nBeim Herantreten bemerke ich mehrere in die Rinde geschnitzte Initialen, eine weitere Erinnerung daran, dass Menschen im Lauf der Zeit kommen und gehen. Und jener Mensch, mit dem ich mein Vermächtnis gemeinsam weitergeben möchte, ist mein Ein und Alles: [love_interest.GetFirstName]."
 hunt_events_anna.0001.a: "Ritzt die Initialen von [love_interest.GetFirstNameNoTooltip] in die Rinde."
 hunt_events_anna.0001.b: "Für solchen Unfug ist keine Zeit!"
 hunt_events_anna.0001.b.t_toast: "Die Jagd ist mir am wichtigsten."
 hunt_events_anna.0005.t: "Unter meiner Haut"
 hunt_events_anna.0005.desc: "Meine kurze Ruhe wird von spöttischem Gelächter gestört, das sich in meine Richtung nähert. Ich schaue auf und zeige mich wenig bis gar nicht überrascht, als mich ein breites Grinsen von [mocking_participant.GetFirstName] begrüßt. [mocking_participant.Custom('DE_PRO_PER_S_3P_N')|U] hält etwas fest, wobei es sich anscheinend um ein totes Tier ([ROOT.Char.Custom('SmallAnimal')]) handelt.\n\n„Ihr kamt mir nie wie jemand vor, der in der Wildnis auf sich allein gestellt überleben könnte. Da dachte ich mir, Ihr könntet ein bisschen Übung gebrauchen“, sagt [mocking_participant.Custom('DE_PRO_PER_S_3P_N')] in abschätzigem Ton und wirft mir den Kadaver vor die Füße."
 hunt_events_anna.0005.a: "Versucht, dem Tier die Haut abzuziehen."
 hunt_events_anna.0005.a.toast.good: "Ich ziehe dem Tier erfolgreich die Haut ab"
 hunt_events_anna.0005.a.toast.nothing: "Was übrig bleibt, ist völlig unkenntlich"
 hunt_events_anna.0005.b: "Etwas Übung? Da habe ich nichts dagegen …"
 hunt_events_anna.0005.c: "Es ist nicht an mir, eine solch niedere Tätigkeit zu übernehmen."
 hunt_events_anna.0010.t: "Tief drunten gefangen"
 hunt_events_anna.0010.desc: "Mit schweren und unsicheren Schritten spüre ich meiner Beute im Gelände ([ROOT.Char.GetCurrentLocation.Custom('GetTerrainTypePlural')]) nach, voll und ganz darauf bedacht, mit ihr Schritt zu halten. Ein trockenes Knacken hallt mir in den Ohren wider. Ich verspüre eine jähe Schwerelosigkeit und ein Flattern tief in meiner Magengrube. Der Sturz endet, und der Aufprall jagt einen brennenden Schmerz durch meinen Leib.\n\nAls ich mich stöhnend umschaue, sehe ich um mich herum nichts als vier Wände. Ich bin in eine Falle hineingestürzt, und ich muss einen Weg nach oben finden."
 hunt_events_anna.0010.a: "Klettert aus dem Loch heraus."
 hunt_events_anna.0010.a.desc.good: "Ich klettere erfolgreich heraus"
 hunt_events_anna.0010.a.toast.good: "Es gelingt mir, mich durch den Schmerz hindurchzubeißen und mich zu befreien"
 hunt_events_anna.0010.a.toast.bad: "Ich falle erneut und verletze mich dabei"
 hunt_events_anna.0010.a.desc.bad: "Ich rutsche aus und falle zurück in das Loch"
 hunt_events_anna.0010.b: "„Ist da irgendjemand?!“"
 hunt_events_anna.0010.b.flavor: "Die Jagdgesellschaft stellt die Jagd ein und hilft mir stattdessen."
 hunt_events_anna.0015.t: "Einatmen … Ausatmen"
 hunt_events_anna.0015.desc: "Ein sonderbares dumpfes Klopfen, leises Gemurmel und gelegentliche Seufzer hallen über die Lichtung. Eine Gestalt, die einen Bogen hält, tigert unruhig hin und her. Anscheinend ist sie über irgendetwas verdrossen.\n\nUm mir die Sache näher anzusehen, verstecke ich mich hinter einem Baum und luge vorsichtig aus meinem Versteck hervor. Ich sehe [Select_CString(child_with_bow.IsFemale, 'meine', 'meinen')] [child_with_bow.Custom('GetDaughterSon')] [child_with_bow.GetFirstName], umringt von ein paar Pfeilen auf dem Boden, von denen kaum einmal einer das von [Select_CString(child_with_bow.IsFemale, 'ihr', 'ihm')] festgelegte Ziel erreicht. Es wirkt, als könne [child_with_bow.Custom('DE_PRO_PER_S_3P_N')] ein wenig Anleitung gebrauchen."
 hunt_events_anna.0015.a: "„Hier. Lasst es mich Euch zeigen …“"
 hunt_events_anna.0015.a.flavor: "Aufgrund meines eigenen Jagdgeschicks sollte ich in der Lage sein, [child_with_bow.Custom('DE_PRO_PER_S_3P_D')] dank meiner Fachkenntnis zu einer besseren Haltung und größeren Treffsicherheit zu verhelfen."
 hunt_events_anna.0015.a.toast.good: "[child_with_bow.GetFirstNameNoTooltip|U] folgt meinen Anweisungen"
 hunt_events_anna.0015.a.toast.bad: "[child_with_bow.GetFirstNameNoTooltip|U] versteht meine Anweisungen nicht"
 hunt_events_anna.0015.b: "Zeigt Unterstützung, indem Ihr [child_with_bow.Custom('DE_PRO_PER_S_3P_A')] anfeuert."
 hunt_events_anna.0015.c: "[child_with_bow.GetFirstNameNoTooltip|U] soll selbst auf den Trichter kommen."
 hunt_events_anna.0015.c.toast: "[child_with_bow.GetFirstNameNoTooltip|U] findet einen Weg, mit dem Bogen umzugehen"
