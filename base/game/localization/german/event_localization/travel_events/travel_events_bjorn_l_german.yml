l_german:
 #Travel Flavor Events
 #Troll bridge - you encounter a troll bridge.
 travel_events.5100.t: "Die [ROOT.Char.GetCurrentLocation.Custom('GetProvinceTricksterSpirit')]-Brücke"
 travel_events.5100.desc: "„[Select_CString(ROOT.Char.IsFemale, 'Herrin', 'Herr')]! Diese Brücke hat einen schlechten Ruf. Unter ihr vermutet man eine [ROOT.Char.GetCurrentLocation.Custom('GetProvinceTricksterSpirit')]-Behausung!“, ruft mein[superstitious_traveler.Custom('DE_END_PRO_S_N')] [ROOT.Char.Custom2('RelationToMe', superstitious_traveler)] [superstitious_traveler.GetTitledFirstName]. „Gewiss wird die Kreatur über uns herfallen oder uns aus der Ferne verwünschen, während wir vorüberziehen.“\n\nDie Mitglieder meiner Reisegesellschaft beginnen, untereinander zu tuscheln. Manche rufen zum Schutz den Namen der höchsten Macht ([ROOT.Char.GetFaith.HighGodName]) an. Leider ist die Brücke meilenweit die einzige sichere Möglichkeit, um auf die andere Seite zu gelangen."
 travel_events.5100.a: "„Ob [ROOT.Char.GetCurrentLocation.Custom('GetProvinceTricksterSpirit')] oder Dämon: Ich fürchte micht nicht!“"
 travel_events.5100.b: "„Derlei Dinge gibt es nicht, [superstitious_traveler.GetTitledFirstNameNoTooltip].“"
 travel_events.5100.c: "„Wir müssen beten, um diesen Geist zu vertreiben.“"
 travel_events.5100.d: "„Gruselig! Suchen wir uns einen anderen Weg hinüber.“"
 custom.every_brave_or_impatient_entourage_member: "Jedes [GetTrait('brave').GetName(GetNullCharacter)|l]e oder [GetTrait('impatient').GetName(GetNullCharacter)|l]e Mitglied des Gefolges"
 custom.every_cynical_or_impatient_entourage_member: "Jedes [GetTrait('cynical').GetName(GetNullCharacter)|l]e oder [GetTrait('impatient').GetName(GetNullCharacter)|l]e Mitglied des Gefolges"
 custom.every_eccentric_or_zealous_entourage_member: "Jedes [GetTrait('eccentric').GetName(GetNullCharacter)|l]e oder [GetTrait('zealous').GetName(GetNullCharacter)|l]e Mitglied des Gefolges"
 custom.every_craven_or_impatient_entourage_member: "Jedes [GetTrait('craven').GetName(GetNullCharacter)|l]e oder [GetTrait('impatient').GetName(GetNullCharacter)|l]e Mitglied des Gefolges"
