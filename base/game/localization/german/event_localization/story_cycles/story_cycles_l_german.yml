l_german:
 SITUATION_LIST_STORY_CYCLE_MODIFIERS_HEADER: "Modifikatoren"
 SITUATION_LIST_STORY_CYCLE_DECISIONS_HEADER: "Entscheidungen"
 not_yet_chosen: "noch nicht ausgewählt"
 story_cycle_pet_dog: "Hund streicheln"
 story_cycle_pet_dog_desc: "#F Ihr habt einen treuen Hundebegleiter an Eurer Seite, der Euch neben Schutz ein derart festes Band der Treue bietet, wie es nur die wenigsten Menschen zu knüpfen verstehen.#!"
 DOG_INFORMATION_STRING: "Der Name Eures Hundes lautet #V [Story.Custom('DogStoryNameAll')].#!\nSein Fell ist [Story.Custom('DogFurColorAll')|l], seine Augen sind [Story.Custom('DogEyeColorAll')|l] und er ist [Story.Custom('DogStoryPuppyOrAgeAll')].\nEr ist ein sehr braves Tier."
 dog_age_puppy: "ein Welpe"
 dog_age_proper: "[Story.MakeScope.Var('dog_age_variable').GetValue|0] Jahre alt"
 cat_age_kitten: "ein Junges"
 cat_age_proper: "[Story.MakeScope.Var('cat_age_variable').GetValue|0] Jahre alt"
 story_cycle_pet_cat: "Katze streicheln"
 story_cycle_pet_cat_desc: "#F Ihr habt eine stolze Katze zur Gesellschaft, eine geschickte Jägerin, die Euch ihre Zuneigung nur zu ihren eigenen Bedingungen schenkt.#!"
 CAT_INFORMATION_STRING: "Der Name Eurer Katze lautet #V [Story.Custom('CatStoryNameAll')].#!\nIhr Fell ist [Story.Custom('CatFurColorAll')|l], ihre Augen sind [Story.Custom('CatEyeColorAll')|l] und sie ist [Story.Custom('CatStoryPuppyOrAgeAll')].[Story.Custom('CatStupidOrNotStupidAll')]"
 dumb_but_sweet_orange_boy: "\nSie ist ein trotteliges [Story.Custom('CatFurColorAll')]es Tier, aber äußerst süß."
 story_cycle_pet_eagle: "Jagdadler"
 story_cycle_pet_eagle_desc: "#F Auf Eurem Handschuh sitzt ein Jagdadler – stets wachsam, immer hungrig und jederzeit bereit, vom Himmel aus den Tod zu bringen.#!"
 EAGLE_INFORMATION_STRING: "Der Name Eures Adlers lautet #V [Story.Custom('EagleStoryNameAll')].#!\nEr ist [Story.MakeScope.Var('eagle_age_variable').GetValue|0] Jahre alt."
 bp2_hostage_loyalty: "Eine treue Geisel"
 bp2_hostage_loyalty_desc: "Eine Eurer [hostages|E] beginnt, sich für Euch und Eure Gepflogenheiten zu erwärmen."
 hostage: "[hostage|E]"
 HOSTAGE_STORY_PRACTICAL_INFORMATION_STRING: "Eure [hostage|E] [Story.MakeScope.Var('hostage_target').Char.GetUIName] wächst an Eurem [court|E] auf, was [Story.MakeScope.Var('hostage_target').Char.Custom('DE_PRO_POS_S_3P')]e Treue beeinflusst. Haltet [Story.MakeScope.Var('hostage_target').Char.Custom('DE_PRO_POS_S_3P')]e [opinion|E] hoch und wählt bei Ereignissen die richtigen Möglichkeiten aus, die [Story.MakeScope.Var('hostage_target').Char.Custom('DE_PRO_PER_S_3P_A')] wahrscheinlich Euch gegenüber treuer machen, sobald [Story.MakeScope.Var('hostage_target').Char.Custom('DE_PRO_PER_S_3P_N')] erwachsen wird.\n\nDerzeitige Treue: [Story.MakeScope.Var('theon_points').GetValue|0+]"
 LOYALTY_LABEL: "Treuepunkte"
 claimant: "[claimant|E]"
 diverted_crusaders: "Abgelenkte Kreuzritter"
 frankokratia_story: "Frankokratien"
 frankokratia_story_desc: "Ein Anspruchsteller in Sachen [GetTitleByKey('e_byzantium').GetName] hat westliche Opportunisten von ihrem Kreuzzug abgelenkt und ihre gierigen Schwerter gegen die Christenheit selbst gerichtet …"
 FRANKOKRATIA_STORY_PRACTICAL_INFORMATION_STRING: "Ein [war|E] gegen [GetTitleByKey('e_byzantium').GetHolder.GetShortUIName] wird über die Zukunft in Sachen [GetTitleByKey('e_byzantium').GetName] entscheiden. Entweder besteigt der [claimant|E] [Story.MakeScope.Var('byz_claimant').Char.GetUIName] den Thron und bezahlt die Kreuzritter für ihre Bemühungen – oder es gründet sich ein neues [GetTitleByKey('e_latin_empire').GetBaseName] unter [GetFaithByKey('catholic').GetAdjective|l]er Herrschaft."
 story_conqueror: "Eroberer"
 story_conqueror_desc: "Euer Ehrgeiz kennt keine Grenzen! Die Welt liegt vor Euch, reif für die Eroberung."
 CONQUEROR_STORY_PRACTICAL_INFORMATION_STRING: "Eroberer erhalten viele mächtige Boni, darunter eine Verringerung von [factions|E], Zugriff auf den [vassalize_casus_belli|E] und gelegentliche bedeutsame Ereignisse.\n\nMan ist nicht länger ein Eroberer, wenn man:\n$BULLET_WITH_TAB$Nicht [independent|El] ist\n$BULLET_WITH_TAB$Auf den Rang eines [Concept('count', 'Grafen')|E] herabgesetzt wird\n$BULLET_WITH_TAB$[unlanded|El] wird\n$BULLET_WITH_TAB$#V 10#! Jahre nicht im [war|E] ist\n$BULLET_WITH_TAB$[debt|E] hat\n$BULLET_WITH_TAB$#V 3#! oder mehr [wars|E] verliert\n$BULLET_WITH_TAB$[GetTrait('incapable').GetName(GetNullCharacter)|U] wird"
 story_destiny_child: "Vorbestimmtes Kind"
 story_destiny_child_desc: "Ein Kind von großer Verheißung – fast so, als hätte das Schicksal selbst es auserwählt – wurde geboren."
 DESTINY_CHILD_STORY_PRACTICAL_INFORMATION_STRING: "Einmal alle Jubeljahre wird ein Kind geboren, das für Großes ausersehen ist. Es entwickelt sich schneller als gewöhnlich und erreicht Höhen, die anderen verwehrt bleiben.\n\nKümmert Euch sorgsam um [Story.MakeScope.Var('destiny_child').Char.GetUIName] und zieht in Betracht, darauf hinzuarbeiten, [Story.MakeScope.Var('destiny_child').Char.Custom('DE_PRO_PER_S_3P_A')] zu Eurem [Concept('player_heir', 'Spielererben')|E] zu machen – beispielsweise indem Ihr [Story.MakeScope.Var('destiny_child').Char.Custom('DE_PRO_PER_S_3P_A')] zu Eurem [Concept('designated_heir', 'designierten Nachfolger')|E] ausruft."
 CHILD_OF_DESTINY: "Das vorbestimmte Kind"
 story_cycle_martial_lifestyle_warhorse: "Schlachtross"
 story_cycle_martial_lifestyle_warhorse_desc: "Euch steht ein besonders gut abgerichtetes Schlachtross zur Verfügung. Mögen Eure Feinde vor Eurem Ansturm erzittern."
 WARHORSE_STORY_PRACTICAL_INFORMATION_STRING: "Euer Streitross mit dem Geschlecht [Story.Custom('HorseStoryMareStallionAll')] trägt den Namen #V [Story.Custom('WarhorseStoryNameAll')]#!."
 DOPPELGANGER: "Euer [Glossary('Doppelgänger', 'DOPPELGANGER_GLOSS')]"
 story_doppelganger: "Spiegel aus Fleisch"
 DOPPELGANGER_GLOSS: "Jemand, der einer anderen lebenden Person zum Verwechseln ähnlich sieht und dem man oft zufällig begegnet. In der deutschen Folklore handelt es sich dabei um eine unheimliche Erscheinung und ein böses Omen: Das Erblicken des eigenen Doppelgängers kann Krankheit oder Tod vorausgehen."
 story_doppelganger_desc: "Es wurde ein Bauer gefunden, der Euch zum Verwechseln ähnlich sieht: ein veritabler [Glossary('Doppelgänger', 'DOPPELGANGER_GLOSS')] …"
 DOPPELGANGER_STORY_PRACTICAL_INFORMATION_STRING: "Ein Bauer, der genauso aussieht und spricht wie Ihr, könnte eine günstige Gelegenheit sein … oder ein Fluch. Fürs Erste residiert [Story.MakeScope.Var('doppelganger_character').Char.GetUIName] an Eurem [court|E]."
 story_cycle_hunt_mystical_animal: "Ein mystisches Tier jagen"
 story_cycle_hunt_mystical_animal_desc: "Während einer Jagd erhaschtet Ihr einen Blick auf ein mystisches weißes Tier. Wenn Ihr es finget, wäre dies so, als fändet Ihr den Heiligen Gral!"
 WHITE_ANIMAL_INFORMATION_STRING: "Ihr seid auf der Fährte eines #V Tiers ([Story.MakeScope.Var('animal_type').GetFlagName]) in Weiß#!.\n\nEs zu fangen, brächte Euch große Belohnungen – doch Eure [stress|E] wächst jedes Mal, wenn Euch das Tier ([Story.MakeScope.Var('animal_type').GetFlagName]) entwischt. Von Zeit zu Zeit lässt Euch eine [GetModifier('hunt_sighting_legendary_modifier').GetNameWithTooltip] die Jagd fortsetzen.\n\nBegegnungen mit dem Tier ([Story.MakeScope.Var('animal_type').GetFlagName]) in Weiß: [Story.MakeScope.Var('encounters').GetValue|0V] #weak (seit dem ersten Mal)#!"
 LEGENDARY_COUNTY_LABEL: "Die derzeitige Heimat des Tiers ([Story.MakeScope.Var('animal_type').GetFlagName]) in Weiß"
 story_sycophant: "Der Speichellecker"
 story_sycophant_desc: "Einer Eurer Höflinge, ein unverhohlener Speichellecker, verärgert Eure Vasallen durch seine bloße Anwesenheit."
 SYCOPHANT_INFORMATION_STRING: "Mein[Story.MakeScope.Var('sycophant_character').Char.Custom('DE_END_PRO_S_N')] [Story.GetOwner.Custom2('RelationToMeShort', Story.MakeScope.Var('sycophant_character').Char)] [Story.MakeScope.Var('sycophant_character').Char.GetShortUIName] und mein[Story.MakeScope.Var('jealous_character').Char.Custom('DE_END_PRO_S_N')] [Story.GetOwner.Custom2('RelationToMeShort', Story.MakeScope.Var('jealous_character').Char)] [Story.MakeScope.Var('jealous_character').Char.GetShortUIName] liegen sich in den Haaren. Ich könnte mich auf eine Seite schlagen, doch dies würde den jeweils anderen gewiss verärgern. Die Zeit wird weisen, wie sich diese Lage entwickelt …"
 SYCOPHANT_LABEL: "Der Speichellecker"
 JEALOUS_VASSAL_LABEL: "Mein eifersüchtigster Vasall"
 story_cycle_pet_rock: "Steinfreund"
 story_cycle_pet_rock_desc: "Ihr habt einen Steinfreund an Eurer Seite, dessen unveränderliches Antlitz bestens zu Eurer sonderbaren Vorstellung passt, was ein wahrer Gefährte ist."
 PET_ROCK_INFORMATION_STRING: "Euer Stein heißt #V [Story.GetOwner.Custom('RockStoryName')].#!\nSein zerklüftetes Äußeres ist [Story.GetOwner.Custom('RockColor')|l]."
 story_cycle_admin_eunuch: "Eminenter Eunuch"
 story_cycle_admin_eunuch_desc: "Ein Eunuch von besonderem Können hat Euren Hof aufgesucht. Eine Gelegenheit oder eine Bedrohung?"
 EUNUCH_INFORMATION_STRING: "Mit der Zeit erhaltet Ihr Gelegenheiten, [Story.MakeScope.Var('eunuch').Char.GetShortUIName] mehr Macht und Einfluss zu verleihen. Dies verstärkt den [modifier|E] [GetModifier('admin_eunuch_liege_4_modifier').GetNameWithTooltip].\n\nAber Obacht: Weist [Story.MakeScope.Var('eunuch').Char.Custom('DE_PRO_PER_S_3P_A')] zu oft ab oder verleiht [Story.MakeScope.Var('eunuch').Char.Custom('DE_PRO_PER_S_3P_D')] #EMP zu viel#! Macht, ohne Euch [Story.MakeScope.Var('eunuch').Char.Custom('DE_PRO_POS_S_3P'')]e Treue zu sichern, und es könnte schlimme Folgen haben …\n\nIhr habt [Story.MakeScope.Var('eunuch').Char.Custom('DE_PRO_POS_S_3P')]e Bitten bislang [Story.MakeScope.Var('eunuch_refusals').GetValue|0V]-mal abgelehnt."
 EUNUCH_LABEL: "Der Eunuch"
 UPSET_COURTIERS: "Über den Eunuchen aufgebrachte Untertänige"
 POETRY_BOOK_LABEL: "Mein Buch der Dichtkunst"
 commission_epic_story: "Epos in Auftrag geben"
 commission_epic_story_desc: "Ihr gebt ein Epos in Auftrag, um die Großtaten Eurer Familie für die Nachwelt festzuhalten."
 EPIC_INFORMATION_STRING: "Euer [Story.GetOwner.Custom('CommissionEpicScribe')][AddTextIf(Story.MakeScope.Var('composer').IsSet, Concatenate(Concatenate(', ', Story.MakeScope.Var('composer').Char.GetShortUIName), ','))] schafft ein episches [Story.Custom('CompositionTypeAll')], um die [dynasty_prestige|E] der [Story.GetOwner.GetDynasty.GetName]-[dynasty|E] zu steigern und ein [artifact|E] zu erhalten.\n\nDie Chance auf ein hervorragendes [Story.Custom('CompositionTypeAll')] beträgt: [Story.MakeScope.Var('final_outcome_chance').GetValue|0+/%]"
 COMPOSER: "Der Verfasser Eures Epos"
 story_foreign_raised_reformer: "In der Fremde aufgewachsener Erneuerer"
 story_foreign_raised_reformer_desc: "Ihr seid fern jenes Landes aufgewachsen, da Ihr nun Eure Heimat nennt.\nSo anders, und doch: Was, wenn Eure Heimat mehr so wäre wie dieser ferne Ort?"
 REFORMER_INFORMATION_STRING: "Ihr wurdet an einem besonderen Ort ([Story.MakeScope.Var('advanced_realm').Title.GetBaseName]) von [Story.MakeScope.Var('foreign_educator').Char.GetShortUIName] großgezogen, einem [Story.MakeScope.Var('advanced_culture').Culture.GetName|l]en [Story.MakeScope.Var('advanced_culture_faith').Faith.GetAdjective|l]en Menschen. Ihr wurdet von der [Story.MakeScope.Var('advanced_culture').Culture.GetName|l]en [culture|E] geprägt und hättet es gern, wenn Euer Volk mehr so wäre wie deren Angehörige.\n\nIhr werdet Gelegenheiten erhalten, um entweder Erneuerungs- oder Bestätigungspunkte hinzuzugewinnen:\n$BULLET_WITH_TAB$#indent_newline:7 Indem Ihr eine Erneuerung verfolgt, könnt Ihr [innovations|E], [cultural_acceptance|E], [traditions|E] oder womöglich sogar eine [GetBuilding('generic_university').GetName] erlangen. Behaltet jedoch im Hinterkopf, dass eine Erneuerung ein langer und kostspieliger Vorgang ist.#!\n$BULLET_WITH_TAB$#indent_newline:7 Indem Ihr eine Bestätigung verfolgt, könnt Ihr [vassals|E]-[opinion|E], [dynasty_prestige|E], Boni für den [war|E] in Form von [Concept('casus_bellis', 'Kriegsgründen')|E] und [special_troops|E] erlangen.#!"
 REFORM_LABEL: "Fortschritt hin zu einer Erneuerung Eurer [culture|E]"
 REAFFIRMATION_LABEL: "Fortschritt hin zu einer Bekräftigung Eurer [culture|E]"
 REFORM_MIN_VALUE_LABEL: ""
 REFORM_MAX_VALUE_LABEL: "Max.: #V 3#!"
 REAFFIRMATION_MIN_VALUE_LABEL: ""
 REAFFIRMATION_MAX_VALUE_LABEL: "Max.: #V 2#!"
 ECCENTRIC_MIN_VALUE_LABEL: ""
 ECCENTRIC_MAX_VALUE_LABEL: "Max.: #V 5#!"
 IMAGINARY_FRIEND_INFORMATION_STRING: "Euer unsichtbarer Freund heißt [Story.MakeScope.Var('imaginary_friend_name').Char.GetShortUINameNoTooltip]. Ihr werdet ab und an Gelegenheiten erhalten, Euch mit ihm zu befassen."
 ECCENTRIC_VALUE: "Fortschritt hin zum Erhalt der Eigenschaft [GetTrait('eccentric').GetName(GetNullCharacter)|U]"
 story_cycle_imaginary_friend: "Unsichtbarer Freund"
 story_cycle_imaginary_friend_desc: "Endlich ein Freund zum Spielen! Wen schert es, dass er nicht echt ist? Für mich ist er echt!"
 story_greatest_of_khans: "Der Größte aller Khane"
 story_greatest_of_khans_desc: "Am Himmel strahlen viele große Lichter. Die Sonne, der Mond und die Sterne. Doch hier auf Erden kann es nur einen Khan geben."
 GREATEST_OF_KHANS_INFORMATION_STRING: "$become_greatest_of_khans_decision_enable_gok_invasion_cb$\n$gok_enable_offer_submission_or_ruin_tt$\n\n@alert_icon! #alert_trial Falls Eure [dynasty|E] die Kontrolle über das Reich ([Story.GetOwner.GetPrimaryTitle.GetName]) verliert, nicht mehr [GetGovernment('nomad_government').GetName|l] ist oder es bis zum Jahr#high [Story.MakeScope.Var('gok_final_date').GetValue|0]#! nicht geschafft hat, die [decision|E] #high $mpo_gok_world_conquest_decision$#! zu treffen, gehen diese Boni verloren und das Reich ([Story.GetOwner.GetPrimaryTitle.GetName]) könnte sehr wohl zersplittern!#!"
