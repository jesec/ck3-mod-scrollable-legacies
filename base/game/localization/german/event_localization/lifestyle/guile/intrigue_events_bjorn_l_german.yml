l_german:
 #Lessons of the heart
 intrigue_events_bjorn.5100.t: "Lektionen des Herzens"
 intrigue_events_bjorn.5100.desc: "Als ich [Select_CString(the_lover.IsFemale, 'meine geliebte', 'meinen geliebten')] [the_lover.GetFirstName] so betrachte, fällt mir unvermittelt auf, dass ich viel von einer derart wunderbaren Person lernen könnte. [the_lover.Custom('DE_PRO_POS_S_3P')|U] Verstand ist wie ein Schatz, der nur darauf wartet, geplündert zu werden. Und umgekehrt habe auch ich [the_lover.GetFirstName] das eine oder andere zu lehren.\n\nGanz zu schweigen davon, dass es so eine reizende Art ist, unsere gemeinsame Zeit miteinander zu verbringen!"
 intrigue_events_bjorn.5100.a: "Meine Liebe hat mir so viel beizubringen."
 intrigue_events_bjorn.5100.b: "[the_lover.Custom('DE_PRO_PER_S_3P_N')|U] wird [Select_CString(the_lover.IsFemale, 'eine großartige Schülerin', 'einen großartigen Schüler')] abgeben."
 intrigue_events_bjorn.5100.c: "Mir reicht es schon, wenn wir Zeit miteinander verbringen."
 #shared interests
 intrigue_events_bjorn.5101.t: "Geteilte Interessen"
 intrigue_events_bjorn.5101.desc: "Ich finde [the_lover.GetFirstName] so spannend! Ich will das, was [the_lover.Custom('DE_PRO_PER_S_3P_D')] Freude bereitet, ebenfalls genießen.\n\nOh, so segensreiche Tage gemeinsam zu verbringen:\n\nUnsere Hände, die in Einklang arbeiten, unsere Geister, die ganz auf geteilte Interessen ausgerichtet sind.\n\nUnsere Herzen, die wie eines schlagen."
 intrigue_events_bjorn.5101.a: "Zeigt mir, was Eure Leidenschaften entflammt, [Select_CString(the_lover.IsFemale, 'meine Süße', 'mein Süßer')]."
 intrigue_events_bjorn.5101.b: "Kommt und teilt diese Freude mit mir."
 intrigue_events_bjorn.5101.c: "Wie wäre es, wenn wir gemeinsam etwas Neues lernen?"
 #Dark depths of the soul
 intrigue_events_bjorn.5102.t: "Den Schatten zu lieben"
 intrigue_events_bjorn.5102.desc: "Wir stehen bei der Entwicklung unserer engeren Bande an einem entscheidenden Punkt. Womöglich ist es an der Zeit, wirklich alles miteinander zu teilen, damit wir alles übereinander wissen, was es zu wissen gibt. Dass wir einander Dinge erzählen, die man einander für gewöhnlich … nicht erzählt.\n\nDies ist auch ein Punkt ohne Wiederkehr, doch wird [the_lover.GetFirstName] alles akzeptieren, was es über mich zu wissen gibt?"
 intrigue_events_bjorn.5102.a: "Was ich Euch für Dinge zu zeigen habe!"
 intrigue_events_bjorn.5102.b: "Erzählt mir, was Ihr sonst noch mit niemandem teiltet."
 intrigue_events_bjorn.5102.c: "Ergründen wir unsere dunkelsten Fantasien."
 intrigue_events_bjorn.5102.d: "Nein! Manche Dinge sollten nie ans Licht kommen."
