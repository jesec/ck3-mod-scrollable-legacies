l_german:
 elder_events.1000.t: "Wir kannten einander einst"
 elder_events.1000.desc: "„[confusion_target.GetFirstName|U], [elder.Custom2('RelationToMeShort', SCOPE.sC('confusion_target'))] meines Herzens – wie schön, Euch zu sehen!“ Mein[elder.Custom('DE_END_PRO_S_N')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('elder'))] [elder.GetFirstName] blickt mir in die Augen, doch [elder.Custom('DE_PRO_POS_S_3P')] Lächeln trägt einen Hauch von Unsicherheit in sich. „Ihr wart stets [confusion_target.Custom('ComplimentAdjective')]. Deshalb liebe ich Euch am meisten.“\n\n[elder.Custom('DE_PRO_POS_S_3P')] [GetTrait('withering_mind').GetName(GetNullCharacter)|l] macht mich heute zu [Select_CString(confusion_target.IsFemale, 'meiner', 'meinem')] [confusion_target.Custom('SisterBrother')] …\n\nMorgen bin ich womöglich [Select_CString(ROOT.Char.IsFemale, 'eine Fremde', 'ein Fremder')]."
 elder_events.1000.a: "Bitte, [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('elder'))] – ich bin [ROOT.Char.GetFirstNameNoTooltip]!"
 elder_events.1000.b: "Wa… Ja, ich freue mich auch, Euch zu sehen …"
 elder_events.1100.t: "Die Treppe zum …"
 elder_events.1100.desc: "So oft ging ich diese Stufen hinaus. Warum fühlt es sich dann heute an, als erklömme ich ein Gebirge?\n\nMeine Beine zittern. Meine Knie versagen mir den Dienst. Es gibt nichts, was meinen Sturz bremsen könnte.\n\nIch taumle dem Boden entgegen."
 elder_events.1100.a: "Aaargh!"
 elder_events.1100.bodyguard: "Hilfe! Rettet mich!"
 EVENT_WINDOW_OPTION_AVAILABLE_BODYGUARD: "Diese Auswahl ist verfügbar, weil Ihr einen [GetCourtPositionType('bodyguard_court_position').GetName()] habt"
 EVENT_WINDOW_OPTION_AVAILABLE_TUTOR: "Diese Auswahl ist verfügbar, weil Ihr einen [GetCourtPositionType('court_tutor_court_position').GetName()] habt"
 partially_mute_modifier: "Teilweise verstummt"
 partially_mute_modifier_desc: "Diesem Charakter fällt aufgrund eines altersbedingten Leidens das Sprechen sehr schwer."
 elder_events.1200.t: "Taubheit"
 elder_events.1200.desc: "Es schlägt ohne Warnung zu. Die linke Seite meines Körpers wird taub. Ich versuche zu lächeln, doch meine Lippen regen sich nicht.\n\nIch versuche zu sprechen, doch ich kann nicht.\n\nMeine Stimme kehrt irgendwann zurück, doch die Angst vor dem Jenseits ([ROOT.Char.GetFaith.NegativeAfterLife]) bleibt."
 elder_events.1200.a: "…"
 elder_events.1300.t: "Vergessene Lektionen"
 elder_events.1300.desc: "Habe ich diese Schriftrolle in Sachen [ROOT.Char.Custom('education_scroll_subject')] schon gelesen? Ich … Ich kann mich nicht erinnern. Vielleicht ja?\n\nEs war doch sicher Teil meiner Studien, Teil meiner Ausbildung …\n\nJa. Meine … Ausbildung …"
 elder_events.1300.a: "So wichtig kann es nicht gewesen sein …"
 elder_events.1300.tutor: "Ich brauche eine Gedächtnisstütze."
 elder_events.1400.t: "Ein gutes Schäferstündchen"
 elder_events.1400.desc: "„Kommt ins Bett, mein[ROOT.Char.Custom('DE_END_PRO_S_N')] [ROOT.Char.Custom('RomanticComplimentAdjective')|l][ROOT.Char.Custom('DE_END_ADJ_IND_S_N')] [Select_CString(ROOT.Char.IsFemale, 'Löwin', 'Löwe')]!“ Der Blick, den mein[lover.Custom('DE_END_PRO_S_N')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('lover'))] [lover.GetFirstName] zeigt, lodert vor Lust, und [lover.Custom('DE_PRO_PER_S_3P_N')] [lover.Custom('PurrGrowl')] verführerisch. „Seid Ihr denn kein bisschen neugierig, was [Select_CString(lover.IsFemale, 'Eure', 'Euer')] [lover.Custom('GetRaunchyPrefix')][lover.Custom('DE_END_ADJ_IND_S_N')] [Select_CString(ROOT.Char.IsFemale, 'Stute', 'Hengst')] gelernt hat?“\n\nMit einem fiesen Grinsen beißt [lover.Custom('DE_PRO_PER_S_3P_N')] sich auf die Lippe und sinkt auf den Laken darnieder.\n\n„Nehmt mich. Auf der Stelle.“"
 elder_events.1400.a: "Tausend Pferde könnten mich nicht aufhalten!"
 elder_events.1400.b: "Möge die höchste Macht ([ROOT.Char.GetFaith.HighGodName]) mich vor diesem Menschen erretten!"
 death_best_sex_of_their_life: "erlitt einen Herzanfall während der besten fleischlichen Vereinigung [Select_CString(CHARACTER.IsFemale, 'ihres', 'seines')] Lebens"
 purrs: "schnurrt"
 growls: "knurrt"
 raunchy_little: "klein"
 raunchy_sweet: "süß"
 raunchy_pretty: "hübsch"
 raunchy_bold: "kühn"
 raunchy_wild: "wild"
 raunchy_fiery: "feurig"
 raunchy_young: "jung"
 raunchy_eager: "eifrig"
 elder_events.1500.t: "Ein Schäferstündchen zum Sterben"
 elder_events.1500.desc: "„Einst nannte man mich ‚[lover.Custom('GetRaunchyPrefix')][Select_CString(lover.IsFemale, 'e Stute', 'Hengst')].‘“ Mein[lover.Custom('DE_END_PRO_S_N')] [lover.GetWifeHusband] [lover.GetFirstName] seufzt mit einem leisen Lächeln auf den Lippen. „Und nun komme ich kaum noch die Treppen hinauf, ohne um Atem zu ringen …“\n\nDank meiner jugendlichen Frische könnte ich [lover.Custom('DE_PRO_PER_S_3P_D')] dabei helfen, sich daran zu erinnern, wie es sich anfühlt, begehrt zu werden.\n\nDoch … wäre das womöglich nicht zu viel für [lover.Custom('DE_PRO_POS_S_3P')] [GetTrait('faltering_heart').GetName(GetNullCharacter)|l]?"
 elder_events.1500.a: "Ich schenke [Select_CString(lover.IsFemale, 'ihr', 'ihm')] das Schäferstündchen [Select_CString(lover.IsFemale, 'ihres', 'seines')] Lebens!"
 elder_events.1500.b: "Lieber nicht."
 elder_events.1600.t: "Vor der Zeit läuft man nicht davon"
 elder_events.1600.desc: "Ich laufe. Ich muss anhalten. Schon außer Atem.\nIch bin früher ganze Runden um dieses Gebäude ([ROOT.Char.Custom('ResidenceBuilding')]) gerannt …\n\nIch laufe wieder los. Ich stürze um ein Haar. Ich halte wieder an.\n\nVerflucht sei dieser schwächliche Leib."
 elder_events.1600.a: "Meine Zeiten des Laufens sind vorüber."
 elder_events.1600.b: "Ich #EMP muss#! mich durch den Schmerz hindurchzwingen."
