l_german:
 # Flight of the Tai, Mass migration main event
 tgp_tai_migration_event.1000.t: "Flucht der Tai"
 tgp_tai_migration_event.1000.desc: "Während des heutigen Ratstreffens wurde ich über die Masseneinwanderung von Tai-Siedlern informiert. [migration_leader.GetName|U], [Select_CString(migration_leader.IsFemale, 'die älteste Abgesandte ihrer', 'der älteste Abgesandte seiner')] Gemeinschaft steht nun vor mir und legt demütig [migration_leader.Custom('DE_PRO_POS_S_3P')]en Fall dar.\n\n„O [ROOT.Char.GetTitleAsNameNoTooltip], als vormalige Untertanen von [migration_origin_holder.GetName] suchen wir nach Führung und einer neuen Heimat. Ich spreche für viele Clans und Tausende, die auf Zuflucht hoffen. Schützt uns vor Unheil und gebt uns eine Aufgabe, sodass wir nützliche Diener sein können, die Eurer Großzügigkeit würdig sind.“\n\nIhr Schicksal hängt an meinen Lippen."
 tgp_tai_migration_event.1000.a: "Ich heiße Euch alle willkommen – nicht als Gäste, sondern als meine Untertanen."
 tgp_tai_migration_event.1000.b: "Nur die Fähigsten von Euch sollen in meinem Reich ([ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip]) wohnen."
 tgp_tai_migration_event.1000.c: "Mehr Leute führen zu mehr Scherereien; bittet an anderer Stelle um Hilfe."
 tgp_tai_migration_event_1000.c_shooed_immigrants_tt: "Die Einwohner können bald einen anderen Herrscher in der Nähe um Schutz bitten."
 tgp_tai_migration_skilled_development_county_modifier: "Flucht der Kunsthandwerker"
 tgp_tai_migration_migration_happened_county_modifier: "Tai-Siedler"
 tgp_tai_migration_migration_happened_character_modifier: "Akzeptierte eine Vielzahl an Einwanderern"
 tgp_tai_migration_migration_rejected_character_modifier: "Lehnte Einwanderer ab"
 # Lone skilled Tai character offers services
 tgp_tai_migration_event.2000.t: "[Select_CString(migrant_skilled_character.IsFemale, 'Eine talentierte', 'Ein talentierter')] Tai"
 tgp_tai_migration_event.2000.desc: "[Select_CString(migrant_skilled_character.IsFemale, 'Eine fähige Frau, die', 'Ein fähiger Mann, der')] behauptet, aus [migrant_skilled_character.GetCulture.GetNameNoTooltip|l]en Landen zu sein, steht vor mir und fragt nach Arbeit. [migrant_skilled_character.Custom('DE_PRO_POS_S_3P')|U]e Manieren scheinen die Neuigkeiten über die Flucht [migrant_skilled_character.Custom('DE_PRO_POS_S_3P')]er Leute widerzuspiegeln.\n\n"
 tgp_tai_migration_event.2000.wet_nurse.desc: "„Eure Heiligkeit, ich bin [migrant_skilled_character.GetName], eine erfahrene Amme, die bereit ist, Euch zu dienen. Ich bin gesund, gut genährt und erfahren mit den Bedürfnissen von Kindern. Gestattet mir, Euch zu helfen, dass Eure Blutlinie gedeiht.“"
 tgp_tai_migration_event.2000.champion.desc: "„[Select_CString(ROOT.Char.IsFemale, 'Herrliche Gebieterin', 'Herrlicher Gebieter')], in meiner Heimat bin ich als [migrant_skilled_character.GetName] bekannt, [Select_CString(migrant_skilled_character.IsFemale, 'eine treue Kriegerin und Siegerin', 'ein treuer Krieger und Sieger')] in vielen Turnieren. Mein Arm ist ruhig und meine Loyalität unbestritten. Lasst mich [Select_CString(migrant_skilled_character.IsFemale, 'Eure Reckin', 'Euer Recke')] sein.“"
 tgp_tai_migration_event.2000.travel_leader.desc: "„M[ROOT.Char.Custom('DE_ART_IND_N')] [ROOT.Char.GetTitleAsNameNoTooltip], ich bin [migrant_skilled_character.GetName] und habe Wüsten durchquert, nur mit den Sternen als Karte und den Winden als Verbündeten. Unter meiner Führung ging keine Karawane je verloren, und kein Pfad ist zu beschwerlich.“"
 tgp_tai_migration_event.2000.master_of_hunt.desc: "„Ich bin für die Jagd geboren und von der Wildnis gestählt und kenne den Witterung eines jeden Tieres und das Schweigen der Wälder. Ich kann Fährten lesen wie niemand sonst. Was sagt Ihr dazu, m[ROOT.Char.Custom('DE_ART_IND_N')] [ROOT.Char.GetTitleAsNameNoTooltip]?“"
 tgp_tai_migration_event.2000.court_physician.desc: "„Ich kann Salben aus alten Schriften herstellen und bin geschickt genug, um auch unter Druck zu arbeiten. Dies macht mich [Select_CString(migrant_skilled_character.IsFemale, 'zur einzigen Frau, die', 'zum einzigen Mann, den')] die Ihr benötigt, um Euren himmlischen Leib zu beruhigen, m[ROOT.Char.Custom('DE_ART_IND_N')] [ROOT.Char.GetTitleAsNameNoTooltip]. Man nennt mich [migrant_skilled_character.GetName].“"
 tgp_tai_migration_event.2000.antiquarian.desc: "„Meine Augen sahen Mythen und meine Hände berührten alte Reiche. Lasst mich damit fortfahren, damit die Weisheit der Alten an Euren Hof gelangt.“"
 tgp_tai_migration_event.2000.court_tutor.desc: "„Ich beeinflusste viele Krieger und Staatslenker, mein[ROOT.Char.Custom('DE_END_PRO_S_N')]. Eure Nachkommen werden unter meiner Führung Großes erreichen, wenn Ihr es gestattet.“"
 tgp_tai_migration_event.2000.end.desc: "\n\n[migrant_skilled_character.GetSheHe|U] scheint verzweifelt auf der Suche nach Schutz, wahrscheinlich wegen der Gründe, die [migrant_skilled_character.Custom('DE_PRO_PER_S_3P_A')] hierherbrachten, doch in der Tat kennt [migrant_skilled_character.Custom('DE_PRO_PER_S_3P_N')] [migrant_skilled_character.Custom('DE_PRO_POS_S_3P')] Handwerk gut. Sollte ich [migrant_skilled_character.Custom('DE_PRO_POS_S_3P')]e Fähigkeiten nutzen?"
 tgp_tai_migration_event.2000.a: "Ich könnte Eure Dienste benötigen."
 tgp_tai_migration_event.2000.b: "Nicht jetzt, doch Ihr solltet bei uns bleiben."
 tgp_tai_migration_event.2000.b.success: "[migrant_skilled_character.GetNameNoTooltip|U] kommt an Euren Hof"
 tgp_tai_migration_event.2000.b.failure: "[migrant_skilled_character.GetNameNoTooltip|U] lehnt Euer Angebot ab"
 tgp_tai_migration_event.2000.c: "Ich muss ablehnen."
 # Noble Tai character and his family are asking for a spare county
 tgp_tai_migration_event.3000.t: "Der Vorschlag eines Familienmannes"
 tgp_tai_migration_event.3000.desc: "Ein aufrechter Fremder nähert sich meinen Hallen mit ersichtlichem Selbstvertrauen im Schritt, um einen Verwaltungsvorschlag vorzubringen.\n\nNach einer erstaunlich aufrichtigen Begrüßung statt der sonst eher derben Art und einer ausschweifenden Geschichte über die beklagenswerte Reise seiner Familie in meine Lande kommt er zu einem kühnen Schluss.\n\n„… Räuber und Plünderer, sage ich Euch, m[ROOT.Char.Custom('DE_ART_IND_N')] [ROOT.Char.GetTitleAsNameNoTooltip]. Von meinem gestohlenen Besitz blieb mir nur mein nachweisliches Talent, mein Scharfsinn, alles zu überblicken, meine Treue und eine Familie, die Eure Hilfe braucht. Mein Blut und ich werden Eure Diener sein, bis Ihr uns als unwürdig erachtet.“"
 tgp_tai_migration_event.3000.a: "Euer Wunsch wird Euch gewährt, solange Ihr loyal seid."
 tgp_tai_migration_event.3000.b: "Das scheint mir kein gerechter Tausch zu sein."
 # A family of lowborn peasant characters offer services
 tgp_tai_migration_event.4000.t: "Eine Tai-Familie"
 tgp_tai_migration_event.4000.desc: "Meine Wachen bringen eine mittellose fremde Familie aus den nördlichen Landen in die Halle.\n\nNach vielem Betteln blickt das Familienoberhaupt unverwandt in meine Seele und bietet alles an, was es nicht besitzt, um meinen Palast zu reinigen im Austausch gegen Schutz unter meinen mächtigen Fittichen. Seiner Geschichte nach zu urteilen, scheint es, als seien viele seiner Art in unseren Landen unterwegs und hofften auf neue Beschützer."
 tgp_tai_migration_event.4000.a: "Ich gewähre Euch Schutz in diesen harten Zeiten."
 tgp_tai_migration_event.4000.b: "Mein Hof hat keine Verwendung für Eure Familie."
