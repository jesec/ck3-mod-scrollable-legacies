l_german:
 aspect_upgrade_event_header: "Aspekt ([ROOT.Char.Custom('GetAspectNoun')|U]):"
 tgp_east_asia_mandala_events.1000.t: "$aspect_upgrade_event_header$ Aufstieg"
 tgp_east_asia_mandala_events.1000.t.final: "$aspect_upgrade_event_header$ Transzendenz"
 tgp_east_asia_mandala_events.1000.desc.02: "Neben viel Freude, Tanz und Riten in Sachen [ROOT.Char.Custom('GetAspectNoun')] brachte ich dem Haus [ROOT.Char.GetHouse.GetBaseName] Stolz, indem es den nächsten Schritt auf dem Weg dieses Aspekts machte.\n\nDas Grollen unserer #EMP Macht#! und gottgleiche Taten ziehen jeden Tag mehr und mehr Anhänger an.\n\nIch gestatte mir, dies alles einen Augenblick zu genießen, während ich das Schauspiel der Feiernden vor mir betrachte."
 tgp_east_asia_mandala_events.1000.desc.03.outro: "Ich lehne mich zurück und sehe mir die symbolischen Opfer und die Gaukler an, die mir zu Ehren tanzen. #EMP Unsere Macht wächst.#!"
 tgp_east_asia_mandala_events.1000.desc.creation_03: "Ein Festmahl, um einen Aspekt der Schöpfung zu ehren – ein herrliches Spektakel voll Farben, Tanz und Musik – wird ausgerichtet, um den Aufstieg von Haus [ROOT.Char.GetHouse.GetBaseName] auf den mittleren Schritt der Schöpfung zu feiern.\n\nDurch eine Tat nach der anderen beweisen wir unsere Göttlichkeit und scharen eine Vielzahl an Anhängern um uns.\n\nFalsch – #EMP ich#! schare eine Vielzahl an Anhängern um mich. Und sie glauben an #EMP mich#!."
 tgp_east_asia_mandala_events.1000.desc.creation_04: "Ein äußerst wildes Festmahl –  wie sonst könnte man den nahezu makellosen Aspekt der Schöpfung zelebrieren? Die Tänzer, die Riten und das Aufblitzen nackter Haut markieren das Feiern der Schöpfung und den weiteren Aufstieg von Haus [ROOT.Char.GetHouse.GetBaseName].\n\nUnsere große Zahl an Gläubigen festigt unseren Status als unaufhaltsame Macht und wir beanspruchen damit unseren Platz in der Welt.\n\nIch nehme etwas von den Köstlichkeiten von einem nahen Tisch und lange ordentlich zu, während ich das Schauspiel genieße."
 tgp_east_asia_mandala_events.1000.desc.05.intro: "Zu guter Letzt ist die Reise von Haus [ROOT.Char.GetHouse.GetBaseName] und seinen göttlichen Nachfahren beendet."
 tgp_east_asia_mandala_events.1000.desc.creation_05: "$tgp_east_asia_mandala_events.1000.desc.05.intro$\n\nNiemand zweifelt mehr daran, dass die Schwestern und Brüder aus dem Haus [ROOT.Char.GetHouse.GetBaseNameNoTooltip] die Anzeichen und Merkmale des Aspekts der Schöpfung tragen und die Taten des Schöpfers auf Erden zum Vorschein bringen.\n\nMit #EMP mir#! als [ROOT.Char.Custom('DE_PRO_POS_S_3P')|U]e Gestalt natürlich.\n\nIch trinke einen weiteren Becher [ROOT.Char.Custom('RegionalDrink')] und läute damit den Beginn der Feierwochen ein."
 tgp_east_asia_mandala_events.1000.desc.serenity_03: "Feierlichkeiten, die man mit äußerster Sorgfalt plante – Haus [ROOT.Char.GetHouse.GetBaseName], das auf den mittleren Schritt des Aspekts der Gelassenheit aufsteigt, scheute keine Kosten.\n\nDie Anhänger unseres friedvollen Weges werden immer mehr, denn die Leute erkennen die Vorteile unserer Haltung.\n\nIch schätze die Gelegenheit, diese Welt zu einem besseren Ort zu machen. Zu einem friedlicheren Ort."
 tgp_east_asia_mandala_events.1000.desc.serenity_04: "Eine prächtige Feier, die mit einer gemeinschaftlichen Andacht beginnt – die schiere Anzahl an gebeugten Köpfen, die sich der Stille hingeben, lassen mein Herz juchzen. Welch besseren Weg könnte es geben, das Haus [ROOT.Char.GetHouse.GetBaseName] zu ehren, das sich derzeit an der Schwelle zu makellosen Aspekten der Gelassenheit befindet?\n\nDiese gewaltige Menge an Gläubigen tut unseren Platz in der Welt kund. Ein Durst nach Frieden und Ruhe. Nach Akzeptanz und Übereinkunft.\n\nErneut beuge ich mein Haupt, um in stummem Gebet und Andacht darüber nachzudenken."
 tgp_east_asia_mandala_events.1000.desc.serenity_05: "$tgp_east_asia_mandala_events.1000.desc.05.intro$\n\nFeinde wurden zu Freunden. Friede und Wohlstand durchdringen das Reich. Die Weisheit und Gelassenheit, die die Schwestern und Brüder aus dem Haus [ROOT.Char.GetHouse.GetBaseNameNoTooltip] brachten, hinterließen einen bleibenden Eindruck in [ROOT.Char.GetPrimaryTitle.GetBaseName].\n\nEine zutiefst gelassene Feier für die wahre Gestalt des Aspekts der Gelassenheit.\n\nIch beuge wohlwollend mein Haupt als Antwort auf ihre wohlmeinenden Gebete und Wünsche."
 tgp_east_asia_mandala_events.1000.desc.destruction_03: "Ein ohrenbetäubender Lärm erklingt, als die Truppen ihre Waffen gegen ihre Schilde schlagen und damit dem Aufstieg des Hauses [ROOT.Char.GetHouse.GetBaseName] auf den mittleren Schritt des Aspekts der Zerstörung ehren.\n\nGeschichten über unser Vermächtnis verbreiten sich rasch, und unsere Zahl an Anhängern wird immer größer.\n\n$tgp_east_asia_mandala_events.1000.desc.03.outro$"
 tgp_east_asia_mandala_events.1000.desc.destruction_04: "#EMP STAMPF, STAMPF.#! Kein Geräusch ist zu hören außer dem donnernden Stampfen der Soldaten aus [ROOT.Char.GetPrimaryTitle.GetBaseName], als sie ihre feierlichen Riten vollziehen und den Tanz der Zerstörung nachahmen, nun da das Haus [ROOT.Char.GetHouse.GetBaseName] so nahe der vollständigen Überlegenheit ist.\n\nUnsere Anhänger sind erpicht darauf, sich unserer Sache anzuschließen und unter einem wahren Aspekt der Zerstörung zu dienen.\n\nIch lächle und schärfe mit dem Wetzstein vorsichtig meine Klinge, während ich die Zeremonie beobachte.\n\n#EMP STAMPF, STAMPF.#!"
 tgp_east_asia_mandala_events.1000.desc.destruction_05: "$tgp_east_asia_mandala_events.1000.desc.05.intro$\n\nDie Erde selbst scheint zu zittern und zu beben, als die vereidigten Truppen von [ROOT.Char.GetPrimaryTitle.GetBaseName] ihre furchterweckenden Schritte, Gesänge und Rituale vollziehen – im Dienst der Schwestern und Brüder von [ROOT.Char.GetHouse.GetBaseNameNoTooltip].\n\nSie knien kurz vor mir nieder, ihrem Gott, ehe sie mit ihrem Tanz fortfahren.\n\nGedankenverloren streiche ich über einen Schädel, den man mir während einer der Riten überreichte, und lehne mich auf meinem Thron zurück."
 tgp_east_asia_mandala_events.1000.desc.trickery_03: "Ich förderte erfolgreich das Vermächtnis von Haus [ROOT.Char.GetHouse.GetBaseName], was zu Schabernack neigende Gottheiten anbelangt, und die Feierlichkeiten sind angemessen freudig.\n\nEiner nach dem anderen fallen die Feinde des Hauses [ROOT.Char.GetHouse.GetBaseNameNoTooltip] geheimnisvollerweise zur Seite oder schließen sich uns als Anhänger an.\n\n$tgp_east_asia_mandala_events.1000.desc.03.outro$"
 tgp_east_asia_mandala_events.1000.desc.trickery_04: "Opfergaben, so viele Opfergaben, um Haus [ROOT.Char.GetHouse.GetBaseName] zu beschwichtigen, das nun im Begriff ist, ein makelloser Aspekt der Betrügereien zu werden.\n\nGold, Pelze, Gewürze. Muscheln, exotische Tiere. Unsere Anhänger wissen, wie sie uns besänftigen können. Oder wissen sie es nicht?\n\nDas wird #EMP mir#! überlassen sein, der ich meinen Schatten über alle werfe, die sich mir entgegenstellen.\n\nIch kichere leise."
 tgp_east_asia_mandala_events.1000.desc.trickery_05: "$tgp_east_asia_mandala_events.1000.desc.05.intro$\n\nNach außen erscheint alles festlich und gewöhnlich, doch jeder weiß, dass der kleinste Fehltritt oder das kleinste moralische Versagen zu einem Besuch der unberechenbaren Gottheiten der [ROOT.Char.GetHouse.GetBaseNameNoTooltip] führt.\n\nSie alle wollen unsere göttliche Gunst behalten und in der Blutlinie bleiben. #EMP Meiner#! Blutlinie.\n\nIch schaue auf die Menge und grüble listig darüber nach, wer als Nächstes meiner Aufmerksamkeit würdig ist."
 tgp_east_asia_mandala_events.1000.a: "Alles ist, wie es sein sollte."
 mandala_descendant_from_aspect_of_creation.tt: "Alle Eure [children|E]"
 mandala_descendant_from_aspect_of_creation_modifier: "Nachfahre der Schöpfung"
 mandala_descendant_from_aspect_of_creation_modifier_desc: "Dieser Charakter ist das Kind eines aufgestiegenen Aspekts der Schöpfung."
 mandala_aspect_of_serenity_devotion.tt: "Erhält #P [EmptyScope.ScriptValue('num_years_of_peace_devotion')]#! [piety_experience|E] pro Jahr eines Nicht-Angriffs-[Concept('war', 'Kriegs')|E] #WEAK (Derzeit#P [THIS.Char.MakeScope.ScriptValue('num_years_of_peace_devotion_payout')]#! [piety_experience|E])#!"
 mandala_forged_from_aspect_of_destruction.tt: "Alle Eure [THIS.Char.Custom('KnightCulturePlural')]"
 mandala_forged_from_aspect_of_destruction_modifier: "Aus der Zerstörung hervorgegangen"
 mandala_forged_from_aspect_of_destruction_modifier_desc: "Dieser Charakter diente als ein Ritter unter einem aufgestiegenen Aspekt der Zerstörung."
 mandala_aspect_of_trickery_devotion.tt: "Erhält #P [EmptyScope.ScriptValue('num_years_of_peace_devotion')]#! [piety_experience|E] pro erfolgreichem [scheme|E] bis zum jetzigen Zeitpunkt #WEAK (Derzeit #P [THIS.Char.MakeScope.ScriptValue('num_successful_schemes_devotion_payout')]#! [piety_experience|E])#!"
 mandala_ascended_in_aspect_of_trickery_modifier: "Aufgestiegener Schwindler"
 mandala_ascended_in_aspect_of_trickery_modifier_desc: "Dieser Charakter stieg als ein Aspekt der Betrügereien auf."
 busy_in_mandala_succession: "Ihr seid derzeit mit einer [mandala|E]-Nachfolge beschäftigt"
 mandala_succession_header: "Mandala-Nachfolge:"
 tgp_east_asia_mandala_events.8497.t.lose_by_default: "Mandala-Nachfolge-Prüfungen: Nicht weitergekommen"
 tgp_east_asia_mandala_events.8497.tt.lose_by_default: "$tgp_east_asia_mandala_events.8499.a.tt.imprisoned$"
 tgp_east_asia_mandala_events.8499.t: "$mandala_succession_header$ Die Prüfungen"
 tgp_east_asia_mandala_events.8499.intro.imprisoned: "Die Kunde ereilt mich tief im Kerker von [ROOT.Char.GetImprisonedBy.GetTitledFirstName]. Mein[deceased_mandala_ruler.Custom('DE_END_PRO_S_N')] [ROOT.Char.Custom2('RelationToMe', deceased_mandala_ruler)] [deceased_mandala_ruler.GetFirstName] hat diese Welt verlassen, und es ist an mir, das Reich zu führen."
 tgp_east_asia_mandala_events.8499.intro.recent_adult.imprisoned: "Endlich stehe ich an der Schwelle zum Erwachsensein – meine Zeit, um endlich an den Prüfungen teilzunehmen und dem Reich zu zeigen, wie würdig ich bin, jene Rolle auszufüllen, die mein[deceased_mandala_ruler.Custom('DE_END_PRO_S_N')] [ROOT.Char.Custom2('RelationToMe', deceased_mandala_ruler)] [deceased_mandala_ruler.GetFirstName] innehatte."
 tgp_east_asia_mandala_events.8499.desc.imprisoned: "\n\nDoch wie soll ich das schaffen, wenn ich hier im Gefängnis sitze und alles bin, aber #EMP nur nicht göttlich#!? Von Unrat bedeckt und gehalten wie ein Tier.\n\nIch schwöre, ich werde Rache nehmen, wenn ich hier herauskomme. Ich werde #EMP meine Vergeltung auf meine Feinde herabregnen lassen#!."
 tgp_east_asia_mandala_events.8499.desc.recent_adult: "Die Zeit ist gekommen! Der Moment ist da, jene Rolle auszufüllen, die mein[deceased_mandala_ruler.Custom('DE_END_PRO_S_N')] [ROOT.Char.Custom2('RelationToMe', deceased_mandala_ruler)] [deceased_mandala_ruler.GetFirstName] innehatte, indem ich an den Prüfungen teilnehme.\n\nWenn ich meine Vortrefflichkeit in jedem Bereich zeige, werden meine Leistung und mein Zuspruch darüber bestimmen, wie sehr meine Anhänger in Zukunft an mich als Verkörperung meines Aspekts ([ROOT.Char.Custom('GetAspectNoun')]) glauben werden.\n\nMein[deceased_mandala_ruler.Custom('DE_END_PRO_S_N')] [ROOT.Char.Custom2('RelationToMe', deceased_mandala_ruler)] #EMP wird#! durch mich beerbt werden!"
 tgp_east_asia_mandala_events.8499.desc.was_traveling: "Der Staub hat sich kaum gelegt, als man mich auch schon in die Gemächer geleitet, das Bad bereitet und meine Kleidung durch jene ersetzt wird, wie man sie als [ROOT.Char.GetTitleAsNameNoTooltip] trägt.\n\nIch habe Gänsehaut von der schroffen Behandlung und der plötzlichen Kühle in der Luft. Gedanklich bereite ich mich schon auf die bevorstehenden Prüfungen vor.\n\nDies ist meine Gelegenheit, den Beweis dafür anzutreten, dass ich würdig bin, jene Rolle zu übernehmen, die mein[deceased_mandala_ruler.Custom('DE_END_PRO_S_N')] [ROOT.Char.Custom2('RelationToMe', deceased_mandala_ruler)] innehatte, und meinen Aspekt ([ROOT.Char.Custom('GetAspectNoun')]) angemessen zu verkörpern. Es wird Zeit."
 tgp_east_asia_mandala_events.8499.desc: "[deceased_mandala_ruler.GetFirstName|U], mein[deceased_mandala_ruler.Custom('DE_END_PRO_S_N')] [ROOT.Char.Custom2('RelationToMe', deceased_mandala_ruler)], ist nicht mehr unter uns. [deceased_mandala_ruler.Custom('DE_PRO_PER_S_3P_N')|U] hat diese Welt verlassen und mir die Aufgabe anvertraut, an [deceased_mandala_ruler.Custom('DE_PRO_POS_S_3P')]e Stelle zu treten, einen ganz bestimmten Aspekt ([ROOT.Char.Custom('GetAspectNoun')]) zu verinnerlichen, unser Reich zu führen und es in die Annalen der Geschichte einzuschreiben.\n\nIch werde die Prüfungen bestehen und zeigen, wie göttlich und allgegenwärtig ich bin, indem ich mich in einer Vielzahl von Aspekten auszeichne.\n\n… Ein Schauer läuft mir über den Rücken, als ich kurz daran denke, wie es mir sonst ergehen wird."
 tgp_east_asia_mandala_events.8499.a: "Ich bin bereit wie nie."
 tgp_east_asia_mandala_events.8499.a.imprisoned: "Das schwöre ich."
 tgp_east_asia_mandala_events.8499.a.flavor.imprisoned: "So war das nicht geplant …"
 tgp_east_asia_mandala_events.8499.a.tt.imprisoned: "Ihr seid nicht zu den [mandala_succession_succession|E]-Prüfungen erschienen, was ein automatisches Versagen bedeutet"
 tgp_east_asia_mandala_events.8499.a.tt.trials: "Die erste [mandala_succession_succession|E]-Prüfung beginnt"
 mandala_divine_retribution_modifier: "Göttliche Vergeltung"
 mandala_divine_retribution_modifier_desc: "Dieser Charakter widmet sein Leben dem Kampf gegen seine Feinde."
 tgp_east_asia_mandala_events.8500.t: "$mandala_succession_header$ Den Kopf verlieren"
 tgp_east_asia_mandala_events.8500.desc: "Wir befinden uns gerade mitten in den Ritualen zur Feier meiner Thronbesteigung. Ich mische mich unter die Menge und lächle meinen Anhängern wohlwollend zu, während sie mit ihren Opfergaben nach vorn treten.\n\nPlötzlich taucht ein kleines Kind aus der Menge auf und umarmt mich. Es sieht zu mir auf und fragt: „[ROOT.Char.GetTitleAsNameNoTooltip|U] … Was #EMP ist#! mit Eurem fünften Kopf geschehen?“\n\nDer Betreuer des Kindes erstarrt angesichts dieser frechen Frage, doch ich merke, dass alle im Saal aufhorchen und gespannt auf meine Antwort warten."
 tgp_east_asia_mandala_events.8500.dynasty.override: "„Eure Lehrer sollten es Euch sagen können.“"
 tgp_east_asia_mandala_events.8500.a: "„Meine Sünden und die Eifersucht anderer widerfuhren ihm, mein Kind.“"
 tgp_east_asia_mandala_events.8500.a.final_aspect: "Ihr habt die letzte Stufe in Sachen [aspect_of_creation|E] noch nicht erreicht"
 tgp_east_asia_mandala_events.8500.success.tt: "Die [mandala_succession_succession|E]-Prüfung in Bezug auf [stewardship|E] war erfolgreich"
 tgp_east_asia_mandala_events.8500.b: "„Ah, lasst mich Euch die Geschichte erzählen …“"
 tgp_east_asia_mandala_events.8500.b.flavor: "Ich bin mir #EMP ziemlich#! sicher, dass es so war, oder?"
 tgp_east_asia_mandala_events.8500.b.t.success: "Sehr überzeugend"
 tgp_east_asia_mandala_events.8500.b.tt.success: "Ihr schafft es, die Leute zu überzeugen"
 tgp_east_asia_mandala_events.8500.b.t.failure: "Unbeeindruckt"
 tgp_east_asia_mandala_events.8500.b.tt.failure: "Ein ungläubiges Raunen geht durch die Menge"
 tgp_east_asia_mandala_events.8510.t: "$mandala_succession_header$ Ruhig wie ein Teich"
 tgp_east_asia_mandala_events.8510.desc: "Die Gäste knien in ordentlichen Reihen. Während meines Aufstiegsrituals ist ein leises Singen in der gesamten Kammer zu hören. Ich gehe langsam umher, berühre sanft einige Menschen an der Stirn und versuche, Frieden und Gelassenheit zu verbreiten.\n\nWährenddessen streiten sich draußen zwei Leute lautstark um ein Stück Land.\n\nIhr Tumult lenkt die Aufmerksamkeit der Anwesenden langsam auf mich. Sie beobachten gespannt, wie ich mit dieser Störung der Ruhe umgehe."
 tgp_east_asia_mandala_events.8510.dynasty.override: "„Das ist ein heiliger Ort. Mäßigt Euch.“"
 tgp_east_asia_mandala_events.8510.a: "„Ihr werdet das Land #EMP und#! den Ertrag miteinander teilen.“"
 tgp_east_asia_mandala_events.8510.a.final_aspect: "Ihr habt die letzte Stufe in Sachen [aspect_of_serenity|E] noch nicht erreicht"
 tgp_east_asia_mandala_events.8510.success.tt: "Die [mandala_succession_succession|E]-Prüfung in Bezug auf [diplomacy|E] war erfolgreich"
 tgp_east_asia_mandala_events.8510.b: "„Wie wäre es, wenn wir das #EMP so#! lösen …“"
 tgp_east_asia_mandala_events.8510.b.flavor: "Warum sind die Leute nur so kleinlich …?"
 tgp_east_asia_mandala_events.8510.b.t.success: "$tgp_east_asia_mandala_events.8500.b.t.success$"
 tgp_east_asia_mandala_events.8510.b.tt.success: "$tgp_east_asia_mandala_events.8500.b.tt.success$"
 tgp_east_asia_mandala_events.8510.b.t.failure: "$tgp_east_asia_mandala_events.8500.b.t.failure$"
 tgp_east_asia_mandala_events.8510.b.tt.failure: "$tgp_east_asia_mandala_events.8500.b.tt.failure$"
 tgp_east_asia_mandala_events.8520.t: "$mandala_succession_header$ Der Tanz der Zerstörung"
 tgp_east_asia_mandala_events.8520.desc: "Das flackernde Licht der Fackeln spiegelt sich in meinem Speer, während die schweigende Menge gespannt mein mit Asche beschmiertes Gesicht mustert. Ein Meer aus Blumen umgibt mich, während die Muschelhörner einen tiefen, vibrierenden Klang von sich geben.\n\nVon mir wird erwartet, dass ich den kosmischen Tanz aufführe – jenen Tanz der Zerstörung, der die göttliche Dualität symbolisiert. Die Zerstörung des Alten, um Platz für das Neue zu schaffen, damit es sprießen und wachsen kann.\n\nDer zylindrische Stein in der Mitte der Lichtung strahlt eine ruhige Kühle aus, als ich mich ihm nähere."
 tgp_east_asia_mandala_events.8520.dynasty.override: "„Ich wurde dazu geboren. Es ist mein Recht“"
 tgp_east_asia_mandala_events.8520.a: "Das könnte ich sogar im #EMP Schlaf#!!"
 tgp_east_asia_mandala_events.8520.a.final_aspect: "Ihr habt die letzte Stufe in Sachen [aspect_of_destruction|E] noch nicht erreicht"
 tgp_east_asia_mandala_events.8520.success.tt: "Die [mandala_succession_succession|E]-Prüfung in Bezug auf [martial|E] war erfolgreich"
 tgp_east_asia_mandala_events.8520.b: "Nun denn. Versuchen wir es einmal …"
 tgp_east_asia_mandala_events.8520.b.flavor: "Eins, zwei, äh … zur Seite?"
 tgp_east_asia_mandala_events.8520.b.t.success: "$tgp_east_asia_mandala_events.8500.b.t.success$"
 tgp_east_asia_mandala_events.8520.b.tt.success: "$tgp_east_asia_mandala_events.8500.b.tt.success$"
 tgp_east_asia_mandala_events.8520.b.t.failure: "$tgp_east_asia_mandala_events.8500.b.t.failure$"
 tgp_east_asia_mandala_events.8520.b.tt.failure: "$tgp_east_asia_mandala_events.8500.b.tt.failure$"
 tgp_east_asia_mandala_events.8530.t: "$mandala_succession_header$ Wahre Illusionen"
 tgp_east_asia_mandala_events.8530.desc: "Die Leute haben sich alle hier versammelt, um mich zu sehen. Um von #EMP mir#! verzaubert zu werden. Hier und da wird leise geplaudert, und irgendwo läutet eine Glocke – die Zeit ist gekommen.\n\nIch trete in den Kreis, stelle mich neben den zylindrischen Stein und lege meine Handfläche auf die glatte, kühle Oberfläche.\n\nUnzählige Gesichter – alt und jung – verstummen und wenden sich mir zu, während ich mich räuspere und meine Rede vorbereite:"
 tgp_east_asia_mandala_events.8530.dynasty.override: "„Lasst mich von jenen sprechen, die vor mir kamen.“"
 tgp_east_asia_mandala_events.8530.a.final_aspect: "Ihr habt die letzte Stufe in Sachen [aspect_of_trickery|E] noch nicht erreicht"
 tgp_east_asia_mandala_events.8530.success.tt: "Die [mandala_succession_succession|E]-Prüfung in Bezug auf [intrigue|E] war erfolgreich"
 tgp_east_asia_mandala_events.8530.a: "„Lasst mich Euch etwas von der Illusion der Dualität erzählen.“"
 tgp_east_asia_mandala_events.8530.b: "„… Was wäre, wenn ich Euch sagen würde, dass die Täuschung nicht #EMP echt#! ist?“"
 tgp_east_asia_mandala_events.8530.b.flavor: "Zumindest #EMP möchte#! ich, dass sie das glauben."
 tgp_east_asia_mandala_events.8530.b.t.success: "$tgp_east_asia_mandala_events.8500.b.t.success$"
 tgp_east_asia_mandala_events.8530.b.tt.success: "$tgp_east_asia_mandala_events.8500.b.tt.success$"
 tgp_east_asia_mandala_events.8530.b.t.failure: "$tgp_east_asia_mandala_events.8500.b.t.failure$"
 tgp_east_asia_mandala_events.8530.b.tt.failure: "$tgp_east_asia_mandala_events.8500.b.tt.failure$"
 tgp_east_asia_mandala_events.8550.t: "$mandala_succession_header$ Der Weg vor uns"
 tgp_east_asia_mandala_events.8550.t.failed: "$mandala_succession_header$ Kein Weg vor uns"
 tgp_east_asia_mandala_events.8550.desc.critical_success: "Jubel, Jubel, Jubel überall! Die Menge ist außer sich vor Freude, und die Erleichterung, dass ihre neue Gottheit der Göttlichkeit ihr[Select_CString(deceased_mandala_ruler.IsFemale, 'er Vorgängerin', 'es Vorgängers')] [deceased_mandala_ruler.GetFirstName] gerecht wird, ist spürbar.\n\nMir werden Blumen zugeworfen, Leute singen, andere klatschen oder stampfen vor Begeisterung auf den Boden. Aus dem Stegreif entsteht ein kleines Fest, und die Anhänger rufen meinen Namen, während sie bis spät in die Nacht anstoßen.\n\nIch habe meine Sache gut gemacht, und der Weg vor mir ist vielversprechend. Ein feines Lächeln huscht mir über die Lippen."
 tgp_east_asia_mandala_events.8550.desc.success: "Ein leises Flüstern geht durch den Raum, gefolgt von einem leisen Raunen und schließlich vereinzelten Ausbrüchen, die sich zu einem herzlichen Jubel steigern, als ich meine Fähigkeiten als junge Gottheit unter Beweis gestellt habe.\n\nAuch wenn ich jener Göttlichkeit, wie mein[ROOT.Char.Custom('DE_END_PRO_S_N')] [ROOT.Char.Custom2('RelationToMe', deceased_mandala_ruler)] [deceased_mandala_ruler.GetFirstName] sie besaß, nicht ganz gerecht wurde, so habe ich meinen Anhängern doch gezeigt, dass ich über das Wissen verfüge, um uns aus brenzligen Lagen zu retten, die mehr oder weniger außerhalb meiner Einflussmöglichkeiten liegen.\n\nHier gibt es auf jeden Fall noch Raum zum Wachsen, und ich freue mich darauf, mich zu beweisen."
 tgp_east_asia_mandala_events.8550.desc: "In der Kammer wird es laut, weil die Diener und Höflinge, die ich stets als meine Freunde und treuen Untertanen ansah, heftig untereinander tuscheln. Sie beäugen mich misstrauisch, weil man nun herausfand, dass ich #EMP nicht#! so göttlich bin wie mein[ROOT.Char.Custom('DE_END_PRO_S_N')] [ROOT.Char.Custom2('RelationToMe', deceased_mandala_ruler)] [deceased_mandala_ruler.GetFirstName].\n\nIch senke leicht den Kopf, kurz besorgt darüber, was kommen wird. Dann wird mir klar, wie dies wirken könnte, und ich straffe die Schultern, um den Blicken aller murmelnden Anwesenden trotzig zu begegnen.\n\nEs gilt, viel Vertrauen wiederherzustellen, und der Weg dorthin wird #EMP holprig#! sein."
 tgp_east_asia_mandala_events.8550.desc.failed: "Mir wird schwindelig und mir zittern die Knie, als mir klar wird, was gleich geschehen wird. Ich habe [deceased_mandala_ruler.GetFirstName] enttäuscht und damit auch das Reich.\n\nIch bin [Select_CString(ROOT.Char.IsFemale, 'keine würdige Nachfolgerin', 'kein würdiger Nachfolger')] als [ROOT.Char.GetPrimaryTitle.GetName]. Es gibt nichts, worauf ich aufbauen könnte.\n\nIn einem Moment der Klarheit schaue ich mich um und stelle fest, dass alle entweder schon gegangen sind oder gerade gehen – sie drehen mir den Rücken zu und murmeln enttäuscht vor sich hin. Ich falle auf die Knie und lasse mich für einen Augenblick von der Last der Welt überwältigen."
 tgp_east_asia_mandala_events.8550.a: "Ich bin bereit."
 tgp_east_asia_mandala_events.8550.a.failed: "So war das nicht geplant!"
 tgp_east_asia_mandala_events.8550.a.failed.tt: "Eure Unzulänglichkeit führte dazu, dass sich das [realm|E] auflöste"
 tgp_east_asia_mandala_events.lose_3_tributaries.tt: "#alert_trial Bis zu #V 3#! [tributaries|E] lassen Euch im Stich#!"
 tgp_east_asia_mandala_events.lose_all_tributaries.tt: "@alert_icon! #alert_trial Alle Eure [tributaries|E] lassen Euch im Stich#!"
