п»ҝl_german:
 # Celestial
 game_concept_celestial_government: "Himmlische Regierung"
 game_concept_celestial: "Himmlischer"
 game_concept_celestials: "Himmlische"
 game_concept_celestial_i: "@government_type_celestial!"
 game_concept_celestial_government_desc: "вҖһHimmlischвҖң ist eine hoch zentralisierte [Concept('government_bureaucratic_type', 'bГјrokratische')|E] [government_form|E], in der der [liege|E] Charaktere als [governors|E] einsetzt, von denen es zwei Arten gibt: zivile und militГӨrische.\n\nCharaktere haben Zugriff auf [influence|E], [noble_families|E], [family_estates|E] und [treasury|E].\n\nUnabhГӨngige [rulers|E] haben [legitimacy|E], wohingegen [vassals|E] sich ganz dem Erlangen von [merit|E] widmen."
 # Merit
 game_concept_merit: "Verdienst"
 game_concept_meritorious: "verdienstreich"
 game_concept_merit_desc: "Der $game_concept_merit$ eines [Concept('character','Charakters')|E] zeigt seinen Fortschritt zum nГӨchsten [merit_level|E]. Alle Charaktere mit einem [Concept('elder', 'Г„ltesten')|E] oder [disciples|E] haben einen passiven $game_concept_merit$-Zuwachs.\n\n[governors|E] kГ¶nnen ihren $game_concept_merit$ durch den Bau von [Concept('buildings', 'GebГӨuden')|E] in ihren zugewiesenen [Concept('holdings', 'BesitztГјmern')|E], das Unternehmen einer [Concept('inspection', 'Inspektions')|E]-[activity|E], die Teilnahme an einer [GetActivityType('activity_debate').GetName] oder [examinations|E] steigern.\n\n[GetSubjectContractType('celestial_provinces').GetObligationNameShort( 'celestial_province_standard')]s-Statthalter steigern ihren monatlichen Verdienstzuwachs durch das Zahlen von [taxes|E] an ihren [Concept('liege', 'Lehnsherrn')|E], wГӨhrend [GetSubjectContractType('celestial_provinces').GetObligationNameShort('celestial_province_military')]s -Statthalter ihn durch die Schaffung von [men_at_arms|E] steigern.\n\nNicht-$game_concept_governors$ kГ¶nnen versuchen, ihn durch die Teilnahme an [examinations|E] zu steigern."
 game_concept_merit_i: "@merit_icon!"
 game_concept_merit_level: "Verdienstrang"
 game_concept_merit_level_desc: "Der $game_concept_merit_level$ eines [Concept('character','Charakters')|E] gibt sein Potenzial als [governor|E] in ostasiatischen [administrative_governments|E] an.\n\nEr steht fГјr seine dokumentierten Leistungen und sein moralisches Benehmen entsprechend der konfuzianischen Ideale und wird durch den von ihm erlangten [merit|E] dargestellt.\n\nEin Beamter mit hГ¶herem $game_concept_merit_level$ hat einen hГ¶heren [candidate_score|E] und ein besseres [governor_salary|E].\n\nDie RГӨnge sind:\n$EFFECT_LIST_BULLET$[GetModifier('merit_level_0').GetNameWithTooltip|L]\n$EFFECT_LIST_BULLET$[GetModifier('merit_level_1').GetNameWithTooltip|L]\n$EFFECT_LIST_BULLET$[GetModifier('merit_level_2').GetNameWithTooltip|L]\n$EFFECT_LIST_BULLET$[GetModifier('merit_level_3').GetNameWithTooltip|L]\n$EFFECT_LIST_BULLET$[GetModifier('merit_level_4').GetNameWithTooltip|L]\n$EFFECT_LIST_BULLET$[GetModifier('merit_level_5').GetNameWithTooltip|L]\n$EFFECT_LIST_BULLET$[GetModifier('merit_level_6').GetNameWithTooltip|L]\n$EFFECT_LIST_BULLET$[GetModifier('merit_level_7').GetNameWithTooltip|L]\n$EFFECT_LIST_BULLET$[GetModifier('merit_level_8').GetNameWithTooltip|L]\n$EFFECT_LIST_BULLET$[GetModifier('merit_level_9').GetNameWithTooltip|L]"
 game_concept_merit_levels: "VerdienstrГӨnge"
 game_concept_merit_level_impact: "Verdienstrang-Auswirkung"
 game_concept_merit_level_impact_desc: "Die Auswirkung des Verdienstrangs erhГ¶ht oder verringert die [modifiers|E], die man durch Euren derzeitigen [merit_level|E] erlangt."
 # Imperial Examinations
 game_concept_imperial_examination: "BeamtenprГјfung"
 game_concept_imperial_examinations: "BeamtenprГјfungen"
 game_concept_examination: "PrГјfung"
 game_concept_examinations: "PrГјfungen"
 game_concept_imperial_examination_desc: "Die $game_concept_imperial_examinations$ spielen eine entscheidende Rolle bei den [Concept('administrative', 'Verwaltungs')|E]-Г„mtern der [GetGovernment('celestial_government').GetName|El]en und [GetGovernment('meritocratic_government').GetName|El]en [government|E].\n\nDurch das PrГјfungssystem werden BГјrokraten anhand ihres [Concept('merit', 'Verdiensts')|E] statt durch ihre Abstammung eingesetzt, was den klГјgsten Gelehrten ungeachtet ihrer Herkunft [governorship|E]-Ernennungen ermГ¶glicht.\n\nDie PrГјfungsstufen sind:\n#indent_newline:2 $EFFECT_LIST_BULLET$#bold Kinder#!: Eltern kГ¶nnen ihre Kinder ab einem Alter von [EmptyScope.ScriptValue('child_exam_min_age')]В Jahren die PrГјfung Гјber die [interaction|E] вҖһ$send_child_to_examination_interaction$вҖң ablegen lassen.#!\n#indent_newline:2 $EFFECT_LIST_BULLET$#bold Provinz#!: Charaktere ohne [Concept('landed', 'Landbesitz')|E] kГ¶nnen sich Гјber die [decision|E] вҖһ[GetActivityType('activity_local_examination').GetName]вҖң an der zweiten Stufe der PrГјfungen versuchen.#!\n#indent_newline:2 $EFFECT_LIST_BULLET$#bold Metropole#!: Diese PrГјfungen werden Гјber die AktivitГӨt вҖһ[GetActivityType('activity_imperial_examination').GetName]вҖң von der Himmlischen Regierung abgehalten.#!\n#indent_newline:2 $EFFECT_LIST_BULLET$#bold Palast#!: Die letzten [EmptyScope.ScriptValue('metropolitan_exam_final_entrants_loc')]В PrГјflinge aus der [activity|E] вҖһ$activity_imperial_examination$вҖң werden zu einem Festmahl in den Herrscherpalast eingeladen, wo sie den [son_of_heaven|E] treffen und ihm ihren Wert beweisen kГ¶nnen.#!"
 game_concept_exam_cheat: "PrГјfungsschummelei"
 game_concept_exam_cheat_desc: "Eine $game_concept_exam_cheat$ schaltet Auswahlen frei, die man einsetzen kann, um die nГӨchste anstehende PrГјfung zu umgehen. Aber Obacht: Erwischt zu werden, kann einen teuer zu stehen kommen."
 game_concept_childrens_examination_i: "@child_exam_icon"
 game_concept_childrens_examination: "KinderprГјfung"
 game_concept_childrens_examination_desc: "Die erste Stufe der [imperial_examinations|E], an der man im Alter von [EmptyScope.ScriptValue('child_exam_min_age')]В Jahren teilnehmen kann. Eltern entsenden ihre Kinder mit der [interaction|E] вҖһ$send_child_to_examination_interaction$вҖң zur PrГјfung."
 game_concept_provincial_examination_i: "@provincial_exam_icon"
 game_concept_provincial_examination: "ProvinzprГјfung"
 game_concept_provincial_examination_desc: "Die zweite Stufe der [imperial_examinations|E], an der man sich Гјber die вҖһ[GetActivityType('activity_local_examination').GetName]вҖң-[activity|E] versuchen kann.\n\n#S Bei Bestehen:#!\n[GetModifier('tgp_passed_provincial_exam_modifier').GetDescWithEffects]."
 game_concept_metropolitan_examination_i: "@metropolitan_exam_icon"
 game_concept_metropolitan_examination: "MetropolenprГјfung"
 game_concept_metropolitan_examination_desc: "Die dritte Stufe der [imperial_examinations|E]. Abgehalten von der [GetGovernment('celestial_government').GetName|EU]en [government|E] bei der [activity|E] вҖһ[GetActivityType('activity_imperial_examination').GetName]вҖң.\n\n#S Bei Bestehen:#!\n[GetModifier('tgp_passed_metropolitan_exam_modifier').GetDescWithEffects]."
 game_concept_palace_examination_i: "@palace_exam_icon"
 game_concept_palace_examination: "PalastprГјfung"
 game_concept_palace_examination_desc: "Die vierte und letzte [imperial_examinations|E]. Die verbleibenden [EmptyScope.ScriptValue('metropolitan_exam_final_entrants_loc')]В Teilnehmer an der [GetActivityType('activity_imperial_examination').GetName] werden zu einem Festmahl im Kaiserpalast eingeladen, um sich kennenzulernen und dem [son_of_heaven|E] ihren Wert zu beweisen.\n\n#S Bei Bestehen:#!\n[GetModifier('tgp_passed_palace_exam_modifier').GetDescWithEffects]."
 game_concept_exam_advantage: "PrГјfungsvorteil"
 game_concept_exam_advantage_desc: "Ein $game_concept_exam_advantage$ verbessert die Erfolgswahrscheinlichkeit verschiedener Aktionen wГӨhrend einer [imperial_examination|E] sowie die Beantwortung von Fragen und die Zurschaustellung des eigenen KГ¶nnens."
 game_concept_exam_score: "PrГјfungspunkte"
 game_concept_exam_score_desc: "Die $game_concept_exam_score$ bestimmen darГјber, wie wahrscheinlich ein PrГјfling eine [imperial_examination|E] besteht.\n\nDie anfГӨnglichen Punkte beruhen auf der [trait|E] fГјr [GetTrait('confucian_education').GetName(GetNullCharacter)] des PrГјflings sowie auf den Werten fГјr [learning|E], [stewardship|E] und [martial|E], abhГӨngig vom Schwerpunkt der $game_concept_examination$.\n\nNur die zehn besten PrГјflinge der [GetActivityType('activity_imperial_examination').GetName]s-[activity|E] kГ¶nnen sich an der @palace_exam_icon! #V PalastprГјfung#! versuchen."
 game_concept_merit_pool: "Kandidatenliste"
 game_concept_merit_pools: "Kandidatenlisten"
 game_concept_merit_pool_possessive: "der Kandidatenliste"
 game_concept_merit_pool_desc: "Eine $game_concept_merit_pool$ enthГӨlt alle [characters|E], die zulГӨssig fГјr die [appointment|E] fГјr bestimmte Arten von [Concept('titles','Titeln')|E] sind.\n\nKandidaten werden nach [candidate_score|E] sortiert. Einige [appointment_succession_laws|E] verwenden [merit|E], sodass die Kandidaten erst nach [merit_level|E] und dann nach $game_concept_candidate_score$ sortiert werden.\n\nStirbt der [holder|E] eines $game_concept_appointment$stitels, wird der Titel an den hГ¶chstrangigen Charakter der Liste Гјbertragen. HГӨlt der Charakter bereits Titel, muss der Titel eine hГ¶here [appointment_prominence|E] haben. Ansonsten geht er an den nГӨchsten Charakter auf der Liste."
 game_concept_appointment_prominence: "Wichtigkeit"
 game_concept_appointment_prominence_desc: "$game_concept_appointment_prominence$ spiegelt wider, wie erstrebenswert ein [title|E] fГјr zulГӨssige Kandidaten ist.\n\nEin Kandidat, der bereits einen Titel hГӨlt, wird nur fГјr einen neuen Titel desselben [Concept('title_tier', 'Titelrangs')|E] ernannt werden, wenn dessen $game_concept_appointment_prominence$ hГ¶her ist.\n\n$game_concept_appointment_prominence$ beruht Гјblicherweise auf dem Wohlstand und der Entfernung zum [realm_capital|E], aber andere Faktoren abhГӨngig von den UmstГӨnden kГ¶nnen auch wichtig sein, beispielsweise die GrГ¶Гҹe in Sachen [title_men_at_arms|E] fГјr [military_governors|E]."
 game_concept_entrant: "PrГјfling"
 game_concept_entrants: "PrГјflinge"
 game_concept_entrant_desc: "Ein $game_concept_entrant$ ist ein Charakter, der sein KГ¶nnen bei der [activity|E] вҖһ[imperial_examination|E]вҖң beweisen will."
 game_concept_subject_standing: "UntertГӨnigenstand"
 game_concept_subject_standing_desc: "Der $game_concept_subject_standing$ stellt den Status dar, der einem [tributary|E] oder [Concept('vassal', 'Vasallen')|E] vom eigenen [suzerain|E] oder [Concept('liege', 'Lehnsherrn')|E] verliehen wurde."
 game_concept_imperial_grace: "Kaisergnade"
 game_concept_imperial_grace_desc: "Die $game_concept_imperial_grace$ stellt den Status dar, der einem [tributary|E] vom [son_of_heaven|E] verliehen wurde.\n\nEine hohe $game_concept_imperial_grace$ kann dazu fГјhren, dass einem $game_concept_tributary$ bei einer [tribute_missions|E] besondere Privilegien verliehen werden. Auf niedrigen $game_concept_favor$-Stufen kann der $game_concept_son_of_heaven$ Tribut von Euch #EMP fordern#!В вҖ“ und falls die Kaisergnade null erreicht, kann dies das Ende der Beziehung bedeuten."
 game_concept_seal_of_investiture: "Investitursiegel"
 game_concept_seal_of_investiture_desc: "Das $game_concept_seal_of_investiture$ ist zugleich ein rechtliches Dokument als auch ein geehrtes Symbol der Gunst des Himmelssohns: Es steht fГјr den besonderen Status des TrГӨgers als treuer und begГјnstigter [tributary|E] von China.\n\nEin $game_concept_seal_of_investiture$ kann $game_concept_tributaries$ mit hoher [imperial_grace|E] bei der Abschlusszeremonie einer erfolgreichen #bold Tributsmission#! gewГӨhrt werden."
 game_concept_seal_of_investiture_desc_ingame: "[GetTitleByKey('h_china').GetDefinitiveName]"
 HAS_SEAL_OF_INVESTITURE: "Ihr besitzt ein [seal_of_investiture|E]"
 NO_SEAL_OF_INVESTITURE: "Ihr besitzt kein [seal_of_investiture|E]"
 SUBJECT_STANDING_CONCEPT: "[subject_standing|E]"
 SUBJECT_STANDING_IMPERIAL_GRACE_CONCEPT: "[imperial_grace|E]"
 IMPERIAL_GRACE_ICON: "@imperial_grace!"
 IMPERIAL_GRACE_LOSS_STABILITY: "Da der [dynastic_cycle|E] derzeit in der Phase der $situation_dynastic_cycle_phase_stability$ ist, verlieren alle #EMP himmlischen Tributzahler#! @imperial_grace![EmptyScope.ScriptValue('imperial_grace_loss_situation_dynastic_cycle_phase_stability')|V1]В [imperial_grace|E] pro Jahr."
 IMPERIAL_GRACE_LOSS_STABILITY_EXPANSION: "Da der [dynastic_cycle|E] derzeit in der Phase der $situation_dynastic_cycle_phase_stability_expansion$ ist, verlieren alle #EMP himmlischen Tributzahler#! @imperial_grace![EmptyScope.ScriptValue('imperial_grace_loss_situation_dynastic_cycle_phase_stability_expansion')|V1]В [imperial_grace|E] pro Jahr."
 IMPERIAL_GRACE_LOSS_STABILITY_ADVANCEMENT: "Da der [dynastic_cycle|E] derzeit in der Phase des $situation_dynastic_cycle_phase_stability_advancement$s ist, verlieren alle #EMP himmlischen Tributzahler#! @imperial_grace![EmptyScope.ScriptValue('imperial_grace_loss_situation_dynastic_cycle_phase_stability_advancement')|V1]В [imperial_grace|E] pro Jahr."
 IMPERIAL_GRACE_LOSS_INSTABILITY: "Da der [dynastic_cycle|E] derzeit in der Phase der $situation_dynastic_cycle_phase_instability$ ist, verlieren alle #EMP himmlischen Tributzahler#! @imperial_grace![EmptyScope.ScriptValue('imperial_grace_loss_situation_dynastic_cycle_phase_instability')|V1]В [imperial_grace|E] pro Jahr."
 IMPERIAL_GRACE_LOSS_INSTABILITY_CONQUEST: "Da der [dynastic_cycle|E] derzeit in der Phase der $situation_dynastic_cycle_phase_instability_conquest$ ist, verlieren alle #EMP himmlischen Tributzahler#! @imperial_grace! [EmptyScope.ScriptValue('imperial_grace_loss_situation_dynastic_cycle_phase_instability_conquest')|V1]В [imperial_grace|E] pro Jahr."
 IMPERIAL_GRACE_LOSS_CHAOS: "Da der [dynastic_cycle|E] derzeit in der Phase der $situation_dynastic_cycle_phase_chaos$ ist, verlieren alle #EMP himmlischen Tributzahler#! @imperial_grace![EmptyScope.ScriptValue('imperial_grace_loss_situation_dynastic_cycle_phase_chaos')|V1]В [imperial_grace|E] pro Jahr."
 # Mandate
 game_concept_mandate_of_heaven: "Mandat des Himmels"
 game_concept_mandate_of_heaven_mandate: "Mandat"
 game_concept_mandate_of_heaven_desc: "Das $game_concept_mandate_of_heaven$ ist eine besondere Form der [legitimacy|E], die nur dem [son_of_heaven|E] zur VerfГјgung steht. Es steht fГјr das Anrecht des Monarchen auf die Herrschaft und darauf, wer als oberster Herrscher unter dem gesamten Himmel gilt.\n\nDas Mandat ist eng mit dem [dynastic_cycle|E] verknГјpft. Der Kreislauf wirkt sich darauf aus, wie der herrschende Monarch LegitimitГӨt erlangt, und kann sogar die [situation_dynastic_cycle_phase|E] ГӨndernВ вҖ“ abhГӨngig von der Mandatsstufe des Monarchen."
 game_concept_son_of_heaven: "Himmelssohn"
 game_concept_son_of_heaven_possessive: "des Himmelssohns"
 game_concept_son_of_heaven_desc: "Der $game_concept_son_of_heaven$ ist der [hegemon|E] von China und der [top_liege|El] der [Concept('celestial_government', 'Himmlischen Regierung')|E].\n\nDer $game_concept_son_of_heaven$ besitzt eine besondere Form der [legitimacy|E], das [mandate_of_heaven|E], sowie eine einzigartige [situation_participant_group|E], die schlicht $game_concept_son_of_heaven$ heiГҹt."
 # Treasury
 game_concept_treasury_i: "@treasury_icon!"
 game_concept_treasury: "Schatz"
 game_concept_treasury_desc: "In manchen [administrative_governments|E] stellt der Schatz Mittel dar, die nur fГјr Regierungszwecke verwendet werden dГјrfenВ вҖ“ und die damit getrennt vom persГ¶nlichen [gold|E] sind.\n\n$BULLET$#indent_newline:2 Als [vassal|E] erhaltet Ihr Schatz von Eurem [Concept('liege', 'Lehnsherrn')|E] auf Grundlage Eurer [tax|E]-BeitrГӨge und anderer Verpflichtungen#!\n$BULLET$#indent_newline:2 Schatz wird vom [Concept('top_liege', 'Obersten Lehnsherrn')|E] geschaffen, der einen Anteil der [Concept('taxation', 'Besteuerungs')|E]-Einnahmen in Schatz umwandelt#!\n$BULLET$#indent_newline:2 Ihr kГ¶nnt nach Belieben [gold|E] in den Schatz einzahlen#!\n$BULLET$#indent_newline:2 Der Schatz bleibt beim [title|E], wenn dieser einen neuen TrГӨger bekommt#!"
 game_concept_imperial_treasury_i: "$game_concept_treasury_i$"
 game_concept_imperial_treasury: "Kaiserschatz"
 game_concept_imperial_treasury_desc: "$game_concept_treasury_desc$"
 game_concept_treasury_vassal_development: "Vasallenentwicklung"
 game_concept_treasury_vassal_development_desc: "Direkte [vassals|E] werden durch ihren [Concept('liege', 'Lehnsherrn')|E] SchГӨtze geschickt (beruhend auf ihren SteuerbeitrГӨgen und anderen [obligations|E])."
 game_concept_treasury_ministry_budget: "Ministeriumsetat"
 game_concept_treasury_ministry_budget_short: "Ministerium"
 game_concept_treasury_ministry_budget_desc: "SchГӨtze, die die Zentralregierung an [vassals|E] schickt, um [ministries|E] zu finanzieren. Der Etat beruht auf einer regelmГӨГҹig berechneten Zuteilung der [treasury|E]-Einnahmen des [Concept('top_liege', 'Obersten Lehnsherrn')|E]."
 game_concept_treasury_salary_budget: "SalГӨretat"
 game_concept_treasury_salary_budget_short: "SalГӨr"
 game_concept_treasury_salary_budget_desc: "SchГӨtze, die die Zentralregierung an [vassals|E] schickt und die Letztere in Form von [gold|E] als ihr persГ¶nliches SalГӨr erhalten. Der Etat beruht auf einer regelmГӨГҹig berechneten Zuteilung der [treasury|E]-Einnahmen des [Concept('top_liege', 'Obersten Lehnsherrn')|E]."
 game_concept_treasury_military_budget: "MilitГӨretat"
 game_concept_treasury_military_budget_short: "MilitГӨr"
 game_concept_treasury_military_budget_desc: "SchГӨtze, die die Zentralregierung an MilitГӨr-[province|E]-[vassals|E] schickt, um zusГӨtzliche militГӨrische AktivitГӨten zu finanzieren. Der Etat beruht auf einer regelmГӨГҹig berechneten Zuteilung der [treasury|E]-Einnahmen des [Concept('top_liege', 'Obersten Lehnsherrn')|E]."
 game_concept_governor_salary: "StatthaltersalГӨr"
 game_concept_governor_salary_desc: "In [administrative_governments|E], die zwischen [gold|E] und [treasury|E] unterscheiden, erhalten [governors|E] ein SalГӨr in $game_concept_gold$."
 game_concept_treasury_budgeting: "Schatzetatverteilung"
 game_concept_treasury_budget: "Schatzetat"
 game_concept_treasury_budgeting_desc: "Nach diesen Vorgaben werden die zentralen Etats an bestimmte [vassals|E] und Unter-Vasallen entsprechend der Zuweisungsraten verteilt.\n\nWird ein Etat beschlossen, kommt es fГјr jeden Vasall zu einer Berechnung der [treasury_budget_base_rate|E] gemГӨГҹ der [treasury_budget_category|E] und auf Grundlage der verfГјgbaren [treasury_budget_capacity|E].\n\n@alert_icon! Die berechnete Grundrate #bold wird sich nicht ГӨndern#!, bis irgendwann in der Zukunft ein neuer Etat beschlossen wird! Wenn also weitere EmpfГӨnger dazukommen, steigen die Etatkosten."
 game_concept_treasury_budget_capacity: "EtatkapazitГӨt"
 game_concept_treasury_budget_capacity_desc: "Der monatliche [treasury|E], der fГјr die [treasury_budgeting|E] zur VerfГјgung steht. Die EtatkapazitГӨt setzt sich zusammen aus den Schatz-Einnahmen abzГјglich aller etwaigen regelmГӨГҹigen Ausgaben, die nicht Teil der Etats sind, darunter [treasury_vassal_development|E] und [court_amenities|E]."
 game_concept_treasury_budget_category: "Etatkategorie"
 game_concept_treasury_budget_category_desc: "Ein bestimmter Teil der [treasury_budgeting|E], dem man einen Schatzetat zuweisen kann. Jede Etatkategorie kann verschiedene EmpfГӨnger haben und unter UmstГӨnden sogar [gold|E] anstelle von [treasury|E] auszahlen."
 game_concept_treasury_budget_base_rate: "Budgetetatrate"
 game_concept_treasury_budget_base_rate_short: "Grundrate"
 game_concept_treasury_budget_base_rate_desc: "Die Menge, die ein Гјblicher EmpfГӨnger einer [treasury_budget_category|E] erhГӨlt. EmpfГӨnger kГ¶nnen mehr oder weniger als die Grundrate erhalten, abhГӨngig von ihrem [title_rank|E], ihrem [merit_level|E] oder anderen Modifikatoren."
 game_concept_treasury_budget_category_trend: "Etatkategorie-Entwicklung"
 game_concept_treasury_budget_category_trend_short: "Entwicklung"
 game_concept_treasury_budget_category_trend_desc: "Die Differenz an [Concept('treasury', 'Schatz')|E], die eine [treasury_budget_category|E] im Vergleich zum vorherigen Etatbeschluss erhГӨlt."
 game_concept_treasury_budget_unallocated: "nicht-zugewiesener Schatzetat"
 game_concept_treasury_budget_unallocated_short: "nicht zugewiesen"
 game_concept_treasury_budget_unallocated_desc: "Nicht-zugewiesener Schatzetat trГӨgt zu den allgemeinen [treasury]-Einnahmen bei."
 game_concept_treasury_budget_deficit: "Schatzetatdefizit"
 game_concept_treasury_budget_deficit_short: "Defizit"
 game_concept_treasury_budget_deficit_desc: "Wird mehr als die [treasury_budget_capacity|E] ausgegeben, wird eine gewisse Menge von den monatlichen [treasury|E]-Einnahmen abgezogen."
 # Celestial Bureaucracy
 game_concept_celestial_bureaucracy: "Himmlische BГјrokratie"
 game_concept_celestial_bureaucracy_desc: "Die $game_concept_celestial_bureaucracy$ steht fГјr die Zentralisierung von [Concept('celestial', 'himmlischen')|E] [realms|E] und die allgemeine Macht, die der [ruler|E] Гјber seine [vassals|E] ausГјbt.\n\nNur der [Concept('top_liege', 'Oberste Lehnsherr')|E] kann die $game_concept_celestial_bureaucracy$ ГӨndern. Himmlische Vasallen benutzen dieselbe Stufe wie ihr $game_concept_liege$.\n\nEs gibt vier Stufen von Himmlischer BГјrokratie:\n$EFFECT_LIST_BULLET$$celestial_bureaucracy_0$\n$EFFECT_LIST_BULLET$$celestial_bureaucracy_1$\n$EFFECT_LIST_BULLET$$celestial_bureaucracy_2$\n$EFFECT_LIST_BULLET$$celestial_bureaucracy_3$\n\nDie $game_concept_celestial_bureaucracy$ zu steigern, kostet einen Betrag an [prestige|E], der von der [realm_size|E] und dem [learning_skill|E] des Herrschers abhГӨngt."
 game_concept_minister: "Minister"
 game_concept_ministers: "Minister"
 game_concept_minister_possessive: "des Ministers"
 game_concept_ministers_possessive: "der Minister"
 game_concept_minister_desc: "$game_concept_ministers$ sind eine Art von [Concept('councillors', 'Ratsmitgliedern')|E], die im [council|E] oder [ministry|E] des [Concept('son_of_heaven', 'Himmelssohns')|E] dienen.\n\nJeder Minister hat eine Reihe von Verantwortlichkeiten, darunter die Finanzierung von [great_projects|E] sowie die UnterstГјtzung von [Concept('governors', 'Statthaltern')|E] auf unterschiedliche Arten und Weisen."
 game_concept_ministry: "Ministerium"
 game_concept_ministries: "Ministerien"
 game_concept_ministry_possessive: "des Ministeriums"
 game_concept_ministries_possessive: "der Ministerien"
 game_concept_ministry_desc: "Das $game_concept_ministry$ ist eine Art [council|E], der nur dem [son_of_heaven|E] zur VerfГјgung steht.\n\nEs gibt neun [ministers|E], die jeweils die hГ¶chste Ebene der Regierung und den Kopf ihrer Abteilung darstellen. Sie sind in einer Hierarchie angeordnet, sodass Minister eines niedrigeren Rangs auf Grundlage der [appointment_prominence|E] des [Concept('title', 'Titels')|E] auf einen Posten von hГ¶herem Rang befГ¶rdert werden kГ¶nnen.\n\nDie $game_concept_ministers$ sind:\n$EFFECT_LIST_BULLET$[minister_grand_chancellor|E]\n$EFFECT_LIST_BULLET$[minister_censor|E]\n$EFFECT_LIST_BULLET$[minister_grand_marshal|E]\n$EFFECT_LIST_BULLET$[minister_of_personnel|E]\n$EFFECT_LIST_BULLET$[minister_of_war|E]\n$EFFECT_LIST_BULLET$[minister_of_revenue|E]\n$EFFECT_LIST_BULLET$[minister_of_justice|E]\n$EFFECT_LIST_BULLET$[minister_of_rites|E]\n$EFFECT_LIST_BULLET$[minister_of_works|E]"
 game_concept_minister_grand_chancellor: "$councillor_chancellor_celestial_government_imperial$"
 game_concept_minister_grand_chancellor_desc: "Der $game_concept_minister_grand_chancellor$ ist der hГ¶chstrangige [minister|E] und verantwortlich fГјr diplomatische Angelegenheiten. Ihm wird Гјblicherweise das Amt des [Concept('grand_secretariat_director', 'Sekretariatsleiters')|E] Гјbertragen.\n\nDer Kanzler kann je nach #V [GetLawGroup('grand_secretariat_laws').GetName]#!-[law|E] zum [grand_secretariat_director|E] ernannt werden.\n\n$minister_grand_chancellor_action_breakdown$"
 game_concept_minister_grand_chancellor_possessive: "$councillor_chancellor_celestial_government_imperial_possessive$"
 minister_grand_chancellor_action_breakdown: "#indent_newline:4 #weak Der Minster kann zum Beispiel:\n$BULLET$Die [decision|E] вҖһ[GetDecision('favored_movement_consults_heaven_decision').GetName|V]вҖң einsetzen\nJede Art von [courtier|E] mit der [decision|E] вҖһ[GetDecision('tgp_minister_recruit_courtiers_decision').GetName|V]вҖң einladen\n$BULLET$Auf besondere Auswahlen bei der [interaction|E] #V $influence_meritorious_career_interaction$#! zu niedrigeren Kosten zugreifen\n$BULLET$Das вҖһ[GetGreatProjectType('minister_compel_religious_uniformity').GetName|V]вҖң-[great_project|E] beginnen#!#!"
 game_concept_minister_censor: "$councillor_spymaster_celestial_government_imperial$"
 game_concept_minister_censor_desc: "Der $game_concept_minister_censor$ ist als [minister|E] verantwortlich fГјr alle RГӨnkespiele und Spionage.\n\nVor untreuen Ratsspitzeln sei ausdrГјcklich gewarnt: Sie kГ¶nnen allzu leicht ihre Beteiligung an [Concept('schemes', 'Komplotten')|E] gegen Euch und Eure [close_family|El] verschleiern!\n\nDer Zensor kann je nach [law|E] in Sachen [GetLawGroup('grand_secretariat_laws').GetName|V] zum [grand_secretariat_director|E] ernannt werden.\n\n$minister_censor_action_breakdown$"
 game_concept_minister_censor_possessive: "$councillor_spymaster_celestial_government_imperial_possessive$"
 minister_censor_action_breakdown: "#indent_newline:4 #weak Der Minister kann zum Beispiel:\n$BULLET$Die [interaction|E] #V $censor_find_secrets_interaction$#! einsetzen, um [secrets|E] an [Concept('vassal', 'Vasallen')|E]-[Concept('courts', 'HГ¶fen')|E] zu finden oder [hooks|E] zu erhalten\n$BULLET$Durch [Concept('blackmail', 'Erpressungen')|E] den [dynastic_cycle_catalyst|E] #V $catalyst_minister_blackmailed$#! auslГ¶sen\n$BULLET$Auf besondere Auswahlen bei der [interaction|E] #V $influence_meritorious_career_interaction$#! zugreifen#!#!"
 game_concept_minister_grand_marshal: "$minister_grand_marshal$"
 game_concept_minister_grand_marshal_desc: "Der $game_concept_minister_grand_marshal$ ist der hГ¶chstrangigste Befehlshaber im [realm|E] und gebietet Гјber eine [army|E] von [title_men_at_arms|E].\n\nDer Marschall kann je nach #V [GetLawGroup('grand_secretariat_laws').GetName]#!-[law|E] zum [grand_secretariat_director|E] ernannt werden.\n\n$minister_grand_marshal_action_breakdown$"
 game_concept_minister_grand_marshal_possessive: "$minister_grand_marshal_possessive$"
 minister_grand_marshal_action_breakdown: "#indent_newline:4 #weak Der Minister kann zum Beispiel:\n$BULLET$Das #V GroГҹfeldzug#!-[great_project|E] beginnen\n$BULLET$Das вҖһ[GetGreatProjectType('construct_great_barracks').GetName|V]вҖң-[great_project|E] beginnen\n$BULLET$Die [casus_bellis|E] #V $CHINA_SEIZE_COUNTY_CB_NAME$#! und #V $CHINA_SEIZE_DUCHY_CB_NAME$#! in den [dynastic_cycle_eras_short|E] [GetSituationType('dynastic_cycle').GetPhaseType('situation_dynastic_cycle_phase_stability_expansion').GetName] und [GetSituationType('dynastic_cycle').GetPhaseType('situation_dynastic_cycle_phase_instability_conquest').GetName] einsetzen\n$BULLET$Auf besondere Auswahlen bei der [interaction|E] #V $influence_meritorious_career_interaction$#! zugreifen#!#!"
 game_concept_minister_of_personnel: "$minister_personnel$"
 game_concept_minister_of_personnel_desc: "Der $game_concept_minister_of_personnel$ ist die oberste AutoritГӨt bezГјglich aller [Concept('appointment', 'Ernennungen')|E] und hat groГҹen Einfluss auf den [candidate_score|E] anderer [characters|E].\n\n$minister_of_personnel_action_breakdown$"
 game_concept_minister_of_personnel_possessive: "$minister_personnel_possessive$"
 minister_of_personnel_action_breakdown: "#indent_newline:4 #weak Der Minister kann zum Beispiel:\n$BULLET$Die [interaction|E] #V $force_governor_removal_interaction$#! einsetzen, um [governors|E] ungeachtet des [GetLawGroup('celestial_retirement_law').GetName]-[Concept('law', 'Gesetzes')|E] zu entlassen\n$BULLET$Alle Arten von [courtier|E] mit der [decision|E] вҖһ[GetDecision('tgp_minister_recruit_courtiers_decision').GetName|V]вҖң einladen\n$BULLET$Die Annahme der [interactions|E] #V $offer_courtier_interaction$#! und #V $demand_courtier_interaction$#! erzwingen\n$BULLET$Auf besondere Auswahlen bei der [interaction|E] #V $influence_meritorious_career_interaction$#! zu geringeren Kosten zugreifen#!#!"
 game_concept_minister_of_revenue: "$councillor_steward_celestial_government_imperial$"
 game_concept_minister_of_revenue_desc: "Der $game_concept_minister_of_revenue$ ist der fГјr die [taxation|E] verantwortliche [minister|E] und unterstГјtzt den [son_of_heaven|E] in Sachen [treasury|E].\n\n$minister_of_revenue_action_breakdown$"
 game_concept_minister_of_revenue_possessive: "$councillor_steward_celestial_government_imperial_possessive$"
 minister_of_revenue_action_breakdown: "#indent_newline:4 #weak Der Minister kann zum Beispiel:\n$BULLET$[vassals|E] unterstГјtzen, die #V $celestial_request_treasury_interaction$#!\n$BULLET$Die [decision|E] вҖһ[GetDecision('tgp_suggest_budget_change_decision').GetName|V]вҖң einsetzen\n$BULLET$Das [GetGreatProjectType('minister_project_conduct_census').GetName|V]s-[great_project|E] beginnen\n$BULLET$Die [interaction|E] #V $pay_treasury_debt_interaction$#! einsetzen, um [treasury_debt|E] von [Concept('civilian_governors', 'Zivilstatthaltern')|E] zu bezahlen und den [dynastic_cycle_catalyst|E] #V '$catalyst_cleared_treasury_debt$'#! auszulГ¶sen\n$BULLET$Auf besondere Auswahlen bei der [interaction|E] #V $influence_meritorious_career_interaction$#! zugreifen#!#!"
 game_concept_minister_of_rites: "$councillor_court_chaplain_celestial_government_imperial$"
 game_concept_minister_of_rites_desc: "Der $game_concept_minister_of_rites$ ist der fГјr religiГ¶se und spirituelle Dinge verantwortliche [minister|E] und kann [Concept('governors', 'Statthaltern')|E] beim Ausrichten von [examinations|E] helfen.\n\n$minister_of_rites_action_breakdown$"
 game_concept_minister_of_rites_possessive: "$councillor_court_chaplain_celestial_government_imperial_possessive$"
 minister_of_rites_action_breakdown: "#indent_newline:4 #weak Der Minister kann zum Beispiel:\n$BULLET$Das вҖһ[GetGreatProjectType('minister_project_culture').GetName|V]вҖң-[great_project|E] beginnen\n$BULLET$Das вҖһ[GetGreatProjectType('minister_compel_religious_uniformity').GetName|V]вҖң-[great_project|E] beginnen\n$BULLET$[vassals|E] beim Ausrichten von [examinations|E] helfen\n$BULLET$Auf besondere Auswahlen bei der [interaction|E] #V $influence_meritorious_career_interaction$#! zugreifen\n$BULLET$#V $demand_conversion_minister_rites_interaction$#! bei [Concept('characters','Charakteren')|E] von [faiths|E], die [faith_hostile|El] oder [faith_evil|El] sind#!#!"
 game_concept_minister_of_war: "$minister_war$"
 game_concept_minister_of_war_desc: "Der $game_concept_minister_of_war$ ist der fГјr die Verwaltung von Truppen verantwortliche [minister|E]. Wenn untertГӨnige [governors|E] militГӨrische Hilfe brauchen, kann ihnen der $game_concept_minister_of_war$ MilitГӨr-Statthalter zu Hilfe schicken.\n\nDer Minister ist allerdings kein aktiver [commander|E] und fГјhrt keine Truppen. Dies liegt vielmehr in der Verantwortung des [Concept('minister_grand_marshal', 'GroГҹmarschalls')|E].\n\n$minister_of_war_action_breakdown$"
 game_concept_minister_of_war_possessive: "$minister_war_possessive$"
 minister_of_war_action_breakdown: "#indent_newline:4 #weak Der Minister kann zum Beispiel:\n$BULLET$[vassals|E] im [war|E] Hilfe schicken, die #V $celestial_request_military_aid_interaction$#!\n$BULLET$[Concept('military_governors', 'MilitГӨrstatthaltern')|E] befehlen, sich den [Concept('wars','Kriegen')|E] anderer [governors|E] anzuschlieГҹen\n$BULLET$Das вҖһ[GetGreatProjectType('minister_project_train_troops').GetName|V]вҖң-[great_project|E] beginnen\n$BULLET$Die [interaction|E] #V $pay_treasury_debt_interaction$#! einsetzen, um [treasury_debt|E] von [Concept('military_governors', 'MilitГӨrstatthaltern')|E] zu bezahlen und so den [dynastic_cycle_catalyst|E] #V '$catalyst_cleared_treasury_debt$'#! auslГ¶sen\n$BULLET$Auf besondere Auswahlen bei der [interaction|E] #V $influence_meritorious_career_interaction$#! zugreifen#!#!"
 game_concept_minister_of_justice: "$minister_justice$"
 game_concept_minister_of_justice_desc: "Der $game_concept_minister_of_justice$ ist der fГјr rechtliche Angelegenheiten verantwortliche Minister, der den [son_of_heaven|E] bei der Aufrechterhaltung einer rechtschaffenen Herrschaft unterstГјtzt.\n\n$minister_of_justice_action_breakdown$"
 game_concept_minister_of_justice_possessive: "$minister_justice_possessive$"
 minister_of_justice_action_breakdown: "#indent_newline:4 #weak Der Minister kann zum Beispiel:\n$BULLET$Das [great_project|E] [GetGreatProjectType('minister_project_establish_control').GetName|V] beginnen\n$BULLET$Die [interaction|E] #V $imprison_interaction$#! bei [vassals|E] und [Concept('courtiers', 'HГ¶flingen')|E] einsetzen, die sich nicht weigern kГ¶nnen\n$BULLET$Die [interaction|E] #V $pardon_interaction$#! bei [Concept('characters','Charakteren')|E] einsetzen, die [crimes|E] begangen haben\n$BULLET$Die [interaction|E] #V $censor_find_secrets_interaction$#! einsetzen, um [secrets|E] an [Concept('vassal', 'Vasallen')|E]-[Concept('courts', 'HГ¶fen')|E] zu finden und sie dafГјr [Concept('imprison', 'einzukerkern')|E] oder sie zu begnadigen\n$BULLET$Гңber das Aufdecken von [Concept('secrets', 'Geheimnissen')|E] den [dynastic_cycle_catalyst|E] вҖһ$catalyst_minister_exposed_secret$вҖң auslГ¶sen\n$BULLET$Auf besondere Auswahlen bei der [interaction|E] $influence_meritorious_career_interaction$#!#! zugreifen"
 game_concept_minister_of_works: "$minister_works$"
 game_concept_minister_of_works_desc: "Der $game_concept_minister_of_works$ ist der [minister|E] mit der Verantwortung fГјr den Bau und die Entwicklung im ganzen [realm|E]. Er kann [great_projects|E] beginnen.\n\n$minister_of_works_action_breakdown$"
 game_concept_minister_of_works_possessive: "$minister_works_possessive$"
 minister_of_works_action_breakdown: "#indent_newline:4 #weak Der Minister kann zum Beispiel:\n$BULLET$Das вҖһ[GetGreatProjectType('minister_project_development').GetName|V]вҖң-[great_project|E] beginnen\n$BULLET$Das вҖһ[GetGreatProjectType('grand_canals').GetName|V]вҖң-[great_project|E] beginnen\n$BULLET$Das вҖһ[GetGreatProjectType('great_wall').GetName|V]вҖң-[great_project|E] beginnen\n$BULLET$[buildings|E] und [holdings|E] im [realm|E] bauen\n$BULLET$[buildings|E] und [holdings|E] in [Concept('tributaries', 'Tributzahlern')|E] des [Concept('son_of_heaven', 'Himmelssohns')|E] in der [GetSituationType('dynastic_cycle').GetPhaseType('situation_dynastic_cycle_phase_stability_advancement').GetName]-[dynastic_cycle_era_short|E] bauen\n$BULLET$Auf besondere Auswahlen bei der [interaction|E] #V $influence_meritorious_career_interaction$#! zugreifen#!#!"
 game_concept_grand_secretariat_director: "Sekretariatsleiter"
 game_concept_grand_secretariat: "GroГҹsekretariat"
 game_concept_grand_secretariat_possessive: "des GroГҹsekretariats"
 game_concept_grand_secretariat_director_desc: "Der Sekretariatsleiter ist eine Art von [diarch|E] fГјr den [son_of_heaven|E], der dem himmlischen Herrscher beim Verwalten des [Concept('realm', 'Reichs')|E] hilft.\n\nWer der Leiter ist, hГӨngt vom aktiven вҖһ[GetLawGroup('grand_secretariat_laws').GetName|V]вҖң-[law|E] ab. Das Amt kann vom [minister_grand_chancellor|E], [minister_grand_marshal|E] oder [minister_censor|E] gehalten werden.\n\nDer Leiter kann die meisten [great_projects|E] beginnen, die bestimmten [Concept('ministers', 'Ministern')|E] und dem Himmelssohn zur VerfГјgung stehen."
 game_concept_ministry_obligation: "Ministerialpflicht"
 game_concept_ministry_obligations: "Ministerialpflichten"
 game_concept_ministry_obligations_desc: "$game_concept_ministry_obligations$ sind einzigartige [vassal_obligations|E], die nur [ministers|E] betreffen.\n\nAlle Zivilminister haben eine bestimmte Auswahl standardmГӨГҹig voreingestellt, wГӨhrend der [minister_grand_marshal|E] Гјber die einzigartige MГ¶glichkeit verfГјgt, den Marschall mit [title_men_at_arms|E] auszustatten.\n\nDiese Pflichten kГ¶nnen nicht geГӨndert werden."
 game_concept_civilian_career_path: "Zivillaufbahn"
 game_concept_civilian_career_path_i: "@celestial_standard_administration!"
 game_concept_civilian_career_path_desc: "[rulers|E], die einer Zivillaufbahn nachgehen, konzentrieren sich auf Verwaltungsangelegenheiten statt kriegerischem KГ¶nnen. Sie werden in Zivilkreisen eingesetzt und ihr [merit|E] wГӨchst entsprechend ihrer Erfolge beim Entwickeln des Lands mit [Concept('buildings', 'GebГӨuden')|E] und der Steigerung der an ihren [Concept('liege', 'Lehnsherrn')|E] gezahlten [taxes|E]."
 game_concept_civilian_career: "Zivillaufbahn"
 game_concept_civilian_career_short: "Zivil"
 game_concept_military_career_path: "MilitГӨrlaufbahn"
 game_concept_military_career_path_i: "@celestial_military_administration!"
 game_concept_military_career_path_desc: "[rulers|E], die einer MilitГӨrlaufbahn nachgehen, konzentrieren sich auf KriegsfГјhrung statt auf VerwaltungsfГӨhigkeiten. Sie werden fГјr MilitГӨrkreise ernannt und ihr [merit|E] wГӨchst auf Grundlage ihrer FГӨhigkeit, [title_men_at_arms|E] zu rekrutieren und zu unterhalten."
 game_concept_military_career: "MilitГӨrlaufbahn"
 game_concept_military_career_short: "MilitГӨr"
 game_concept_civilian_governor: "Zivilstatthalter"
 game_concept_civilian_governors: "Zivilstatthalter"
 game_concept_civilian_governor_short: "Zivil"
 game_concept_civilian_governor_desc: "Ein Zivilstatthalter ist ein [governor|E] mit zivilen [vassal_obligations|E]. Im Gegensatz zu [military_governors|E] kГ¶nnen sie kein [title_men_at_arms|E] ins Feld fГјhren und konzentrieren sich nur auf Verwaltungsaufgaben und die Entwicklung des von ihnen regierten Landes.\n\n[characters|E], die einer [civilian_career_path|E] nachgehen, kГ¶nnen Zivilstatthalter werden."
 game_concept_military_governor: "MilitГӨrstatthalter"
 game_concept_military_governors: "MilitГӨrstatthalter"
 game_concept_military_governor_short: "MilitГӨr"
 game_concept_military_governor_desc: "Ein MilitГӨrstatthalter ist ein [governor|E] mit militГӨrischen [vassal_obligations|E]. Sie kГ¶nnen im Gegensatz zu [Concept('civilian_governors', 'Zivilstatthaltern')|E] [title_men_at_arms|E] ins Feld schicken und es nutzen, um das [realm|E] vor fremdlГӨndischen Eindringlingen zu schГјtzen und andere Statthalter zu unterstГјtzen, die militГӨrische Hilfe brauchen.\n\n[characters|E], die einer [military_career_path|E] nachgehen, kГ¶nnen MilitГӨrstatthalter werden."
 # Great Projects
 game_concept_great_project: "GroГҹvorhaben"
 game_concept_great_projects: "GroГҹvorhaben"
 game_concept_great_project_i: "@great_project_icon!"
 game_concept_great_project_possessive: "des GroГҹvorhabens"
 game_concept_great_project_desc: "GroГҹvorhaben sind gewaltige Unternehmungen, die BeitrГӨge aus dem ganzen [realm|E] erfordern.\n\nBei manchen GroГҹvorhaben werden [great_building|E] errichtet, wГӨhrend es bei anderen darum geht, sich von einer [natural_disaster|E] zu erholen.\n\nWГӨhrend der [ruler|E] des Reichs die Entwicklung des GroГҹvorhabens Гјberwacht, kГ¶nnen seine [Concept('subjects', 'UntertГӨnigen')|E] [great_project_contributions|E] anbieten, um es voranzubringen."
 game_concept_great_project_contribution: "Beitrag"
 game_concept_great_project_contributions: "BeitrГӨge"
 game_concept_great_project_contribute: "beteiligen"
 game_concept_great_project_contributed: "Beigetragen"
 game_concept_great_project_contribution_desc: "BeitrГӨge erlauben es mehreren [Concept('rulers','Herrschern')|E], die Entwicklung eines [Concept('great_project', 'GroГҹvorhabens')|E] zu unterstГјtzen, was ihnen im Gegenzug verschiedene VorzГјge einbringt.\n\nManche BeitrГӨge sind erforderlich, damit ein GroГҹvorhaben Гјberhaupt beginnen kann, wГӨhrend andere wahlweise eingebracht werden kГ¶nnen. Verbleibende wahlweise BeitrГӨge kГ¶nnen noch fГјr eine gewisse Weile erbracht werden, auch wenn der Fortschritt bereits begonnen hat."
 game_concept_great_project_contributor: "Beitragender"
 game_concept_great_project_contributors: "Beitragende"
 game_concept_great_project_contributor_possessive: "des Beitragenden"
 game_concept_great_project_contributors_possessive: "der Beitragenden"
 game_concept_great_project_contributor_desc: "Beitragende [rulers|E], die sich zu mindestens einem [great_project_contribution|E] eines [Concept('great_project', 'GroГҹvorhabens')|E] verpflichten, erhalten im Gegenzug verschiedene VorzГјge.\n\nDer [subject|E] im [realm|E] mit den meisten [great_project_contributions|E] kann [great_project_contributor|E] werden."
 # Situation
 game_concept_dynastic_cycle: "Dynastiekreislauf"
 game_concept_dynastic_cycle_possessive: "des Dynastiekreislaufs"
 game_concept_dynastic_cycle_desc: "Der $game_concept_dynastic_cycle$ stellt den gesellschaftlich-politischen Zustand des groГҹen Kaiserreichs von China dar, das die [situation_dynastic_cycle_phases|E] StabilitГӨt, InstabilitГӨt und Chaos durchlГӨuft.\n\nEntscheidend fГјr den $game_concept_dynastic_cycle$ ist das [mandate_of_heaven|E], eine Form der [legitimacy|E], die der Kaiser innehat. Geht das Mandat jemals verloren, wird das groГҹe Kaiserreich von China #N zerschlagen#!В вҖ“ bis es wieder von jemandem geeint wird, der wГјrdig ist, der Himmelssohn zu sein.#!"
 game_concept_situation_dynastic_cycle_phase: "Dynastiekreislauf-Epoche"
 game_concept_situation_dynastic_cycle_phases: "Dynastiekreislauf-Epochen"
 game_concept_dynastic_cycle_era_short: "Epoche"
 game_concept_dynastic_cycle_eras_short: "Epochen"
 game_concept_situation_dynastic_cycle_phase_desc: "Der gesellschaftlich-politische Zustand des [Concept('dynastic_cycle', 'Dynastiekreislaufs')|E].\n\nEpochen:\n$BULLET$[dynastic_cycle_era_type_stable|E]: [GetSituationType('dynastic_cycle').GetPhaseType('situation_dynastic_cycle_phase_stability_advancement').GetName], [GetSituationType('dynastic_cycle').GetPhaseType('situation_dynastic_cycle_phase_stability_expansion').GetName]\n$BULLET$[dynastic_cycle_era_type_unstable|E]: [GetSituationType('dynastic_cycle').GetPhaseType('situation_dynastic_cycle_phase_instability').GetName]\n$BULLET$[dynastic_cycle_era_type_chaotic|E]: [GetSituationType('dynastic_cycle').GetPhaseType('situation_dynastic_cycle_phase_chaos').GetName]"
 game_concept_dynastic_cycle_era_type_stable: "StabilitГӨtsepoche"
 game_concept_dynastic_cycle_era_type_stable_desc: "Stabile [dynastic_cycle_era_types|E] stellen Zeiten dar, in denen das Kaiserreich wohlhabend und erfolgreich ist, wГӨhrend zugleich auch ein starkes [mandate_of_heaven|E] vorliegt.\n\nEpochen: [GetSituationType('dynastic_cycle').GetPhaseType('situation_dynastic_cycle_phase_stability_expansion').GetName], [GetSituationType('dynastic_cycle').GetPhaseType('situation_dynastic_cycle_phase_stability_advancement').GetName]"
 game_concept_dynastic_cycle_era_type_unstable: "InstabilitГӨtsepoche"
 game_concept_dynastic_cycle_era_type_unstable_desc: "Instabile [dynastic_cycle_era_types|E] stellen Zeiten dar, in denen das Kaiserreich aufgrund innerer oder ГӨuГҹerer KrГӨfte in Unruhe ist, wГӨhrend zugleich das [mandate_of_heaven|E] wankt.\n\nEpochen: [GetSituationType('dynastic_cycle').GetPhaseType('situation_dynastic_cycle_phase_instability').GetName], [GetSituationType('dynastic_cycle').GetPhaseType('situation_dynastic_cycle_phase_instability_conquest').GetName]"
 game_concept_dynastic_cycle_era_type_chaotic: "Chaosepoche"
 game_concept_dynastic_cycle_era_type_chaotic_desc: "Chaotische [dynastic_cycle_era_types|E] stellen Zeiten dar, in denen das Kaiserreich zerschlagen ist und das [mandate_of_heaven|E] verloren scheintВ вҖ“ bis es jemand WГјrdiges zurГјckerringt.\n\nEs gibt nur eine Chaosepoche: [GetSituationType('dynastic_cycle').GetPhaseType('situation_dynastic_cycle_phase_chaos').GetName]"
 game_concept_dynastic_cycle_era_type: "Dynastiekreislauf-Epochenart"
 game_concept_dynastic_cycle_era_types: "Epochenarten"
 game_concept_dynastic_cycle_era_type_desc: "Es gibt drei Epochenarten im [dynastic_cycle|E]. Teilen die [situation_dynastic_cycle_phases|E] ein und weisen ihnen einen Platz im dreiteiligen Ablauf des Dynastiekreislaufs zu.\n\nEpochenarten: [dynastic_cycle_era_type_stable|E], [dynastic_cycle_era_type_unstable|E], [dynastic_cycle_era_type_chaotic|E]"
 game_concept_dynastic_cycle_catalyst: "Dynastiekreislauf-AuslГ¶ser"
 game_concept_dynastic_cycle_catalysts: "Dynastiekreislauf-AuslГ¶ser"
 game_concept_dynastic_cycle_catalyst_possessive: "des Dynastiekreislauf-AuslГ¶sers"
 game_concept_dynastic_cycle_catalysts_possessive: "der Dynastiekreislauf-AuslГ¶ser"
 game_concept_dynastic_cycle_catalyst_desc: "$game_concept_situation_catalyst_desc$"
 game_concept_movement: "Bewegung"
 game_concept_movements: "Bewegungen"
 game_concept_movement_possessive: "der Bewegung"
 game_concept_movements_possessive: "der Bewegungen"
 game_concept_movement_desc: "Eine Gruppe von [characters|E] mit gemeinsamen Interessen und Zukunftsvisionen fГјr den [dynastic_cycle|E]. Jedes Bewegungsmitglied kann Zugriff auf unterschiedliche [interactions|E] und [decisions|E] besitzen, um den Kreislauf voranzutreiben. Ein [movement_leader|E] ist ein Sprecher, der die Interessen [movement_possessive|E] beim [son_of_heaven|E] vertritt."
 game_concept_movement_power: "Bewegungsmacht"
 game_concept_movement_power_i: "@movement_power_icon!"
 game_concept_movement_power_desc: "Bewegungsmacht stellt den politischen Druck einer Gruppe dar, die am [dynastic_cycle|E] beteiligt ist. Sie ist die Summe der [personal_movement_power|E] aller Mitglieder in der Gruppe.\n\n#V [movement_power_i|E][EmptyScope.ScriptValue('extremely_high_movement_power_value')]#! erlaubt die [interactions|E] вҖһ$dismiss_strong_hook_interaction$вҖң und вҖһ$request_raid_remit_interaction$вҖң sowie das вҖһ[GetScheme('raid_estate').GetTypeName]вҖң-[scheme|E]\n\n#help Macht ergibt sich aus folgenden Punkten:\n$BULLET_WITH_TAB$[merit_i][merit_level|E]\n$BULLET_WITH_TAB$[influence_i][influence_level|E]\n$BULLET_WITH_TAB$Alter\n$BULLET_WITH_TAB$[movement_power|E] der [disciples|E]\n$BULLET_WITH_TAB$Derzeitige MilitГӨrstГӨrke #weak (weniger wichtig im [GetSituationType('dynastic_cycle').GetPhaseType('situation_dynastic_cycle_phase_stability_advancement').GetName])#!\n$BULLET_WITH_TAB$вҖһ[GetTrait('confucian_education').GetName(GetNullCharacter)]вҖң-[trait_level_track_xp|E] #weak (weniger wichtig bei der [GetSituationType('dynastic_cycle').GetPhaseType('situation_dynastic_cycle_phase_stability_expansion').GetName])#!\n$BULLET_WITH_TAB$[GetTrait('governor').GetName(GetNullCharacter)]-[trait_level_track_xp|E] #weak (weniger wichtig bei der [GetSituationType('dynastic_cycle').GetPhaseType('situation_dynastic_cycle_phase_stability_expansion').GetName])#!#!"
 game_concept_movement_power_short: "Macht"
 game_concept_personal_movement_power: "PersГ¶nliche Bewegungsmacht"
 game_concept_personal_movement_power_desc: "$game_concept_personal_movement_power$ gibt an, um wie viel ein Mitglied die Gesamt-[movement_power_short|E] seiner [movement|E] erhГ¶ht."
 game_concept_personal_movement_power_short: "Macht"
 game_concept_movement_leader: "BewegungsanfГјhrer"
 game_concept_movement_leader_possessive: "des BewegungsanfГјhrers"
 game_concept_movement_leaders: "BewegungsanfГјhrer"
 game_concept_movement_leaders_possessive: "der BewegungsanfГјhrer"
 game_concept_movement_leader_short: "AnfГјhrer"
 game_concept_movement_leader_desc: "Ein Charakter, der die [movement|E] anfГјhrt, und als einziges Mitglied direkt mit dem [son_of_heaven|E] sprechen darf, um die Agenda der [movement|E] mit der [decision|E] вҖһ[GetDecision('movement_petition_decision').GetName]вҖң voranzubringen.\n\n#help Um ein AnfГјhrer zu werden, muss man ein hohes MaГҹ an [movement_power_i][movement_power|E] beim Tod des vorherigen AnfГјhrers haben oder den derzeitigen AnfГјhrer bei einer [GetActivityType('activity_debate').GetName]n-[activity|E] besiegen.#!"
 game_concept_favored_era: "bevorzugte Epoche"
 game_concept_favored_era_possessive: "der bevorzugten Epoche"
 game_concept_favored_era_desc: "Die bevorzugte Epoche ist der Wille des Himmels, der sich durch den [son_of_heaven|E] im Zuge des [Concept('dynastic_cycle', 'Dynastiekreislaufs')|E] manifestiert. Sie bestimmt darГјber, welche [dynastic_cycle_era_type_stable|E] eintritt, sobald die [dynastic_cycle_era_type_unstable|E] vorГјber ist."
 game_concept_favored_movement: "Bevorzugte Bewegung"
 game_concept_favored_movement_desc: "Die bevorzugte Bewegung ist die [movement|E], die die UnterstГјtzung des [Concept('son_of_heaven', 'Himmelssohns')|E] hat.\n$BULLET_WITH_TAB$Mitglieder haben hГ¶here [candidate_scores|E] fГјr alle [titles|E] in [SelectLocalization(GetPlayer.IsValid, 'game_concept_favored_movement_desc_ingame', 'h_china')]\n$BULLET_WITH_TAB$Petitionen der [decision|E] вҖһ[GetDecision('movement_petition_decision').GetName]вҖң werden wahrscheinlicher angenommen\n$BULLET_WITH_TAB$[situation_catalyst_catalysts|E] [dynastic_cycle_possessive|El] werden auf Grundlage der bevorzugten [movement|E] ausgelГ¶st\n$BULLET_WITH_TAB$Zugriff auf die [decision|E] вҖһ[GetDecision('favored_movement_consults_heaven_decision').GetName]вҖң\n\n#help Um eine bevorzugte Bewegung zu werden, muss man den AnfГјhrer der derzeit bevorzugten Bewegung in einer [GetActivityType('activity_debate').GetName]n-[activity|E] besiegen.#!"
 game_concept_favored_movement_desc_ingame: "[GetTitleByKey('h_china').GetDefinitiveName]"
 game_concept_favored_movement_possessive: "der bevorzugten Bewegung"
 game_concept_favored_movement_short: "Bevorzugt"
 game_concept_disciple: "ZГ¶gling"
 game_concept_disciples: "ZГ¶glinge"
 game_concept_disciple_possessive: "des ZГ¶glings"
 game_concept_disciples_possessive: "der ZГ¶glinge"
 game_concept_disciple_desc: "$game_concept_disciples$ sind [characters|E], die den hohen Status eines [Concept('elder', 'Г„ltesten')|E] respektieren und sich an dessen Lehre halten, bis zu einer gewissen [disciple_limit_short|E].\n\nSie erhalten Zugriff auf die [character_interaction|E] #high $request_mentoring_interaction$#! #weak (Komplott)#!, um ihre [skills|E] zu verbessern und die [character_interaction|E] #high $celestial_request_elders_support_interaction$#!, um [gold|E], [courtiers|E] und mehr zu erlangen.\n\n$disciple_elder_benefits_tt$"
 disciple_elder_benefits_tt: "Ein $game_concept_disciple$ und ein [elder|E]:\n$BULLET_WITH_TAB$Erhalten mehr [merit|E]\n$BULLET_WITH_TAB$SchlieГҹen sich weniger wahrscheinlich [Concept('hostile_schemes', 'feindseligen Komplotten')|E] gegeneinander an\n$BULLET_WITH_TAB$Nehmen wahrscheinlicher [interactions|E] an, die der andere geschickt hat\n$BULLET_WITH_TAB$Setzen wahrscheinlicher freundliche [interactions|E] gegeneinander ein #weak (beispielsweise вҖһ$gift_interaction$вҖң, вҖһ$invite_to_council_position_interaction$вҖң oder Г„hnliches)#!\n$BULLET_WITH_TAB$Werden beide zur [movement|E] $game_concept_elder_possessive$ gehГ¶ren"
 game_concept_disciple_limit: "ZГ¶glingsschwelle"
 game_concept_disciple_limit_short: "Schwelle"
 game_concept_disciple_limit_desc: "Die $game_concept_disciple_limit$ gibt an, wie viele [disciples|E] ein [elder|E] auf einmal haben kann.\n\nDie Schwelle liegt Гјblicherweise beiВ [EmptyScope.ScriptValue('disciples_limit_base_value')|V0]. Sie kann erhГ¶ht werdenВ вҖ“ zum Beispiel durch die Verbesserung eines [Concept('domicile', 'Wohnsitzes')|E] mit bestimmten [Concept('domicile_buildings', 'WohnsitzgebГӨuden')|E]."
 game_concept_elder: "Г„ltester"
 game_concept_elders: "Г„lteste"
 game_concept_elder_possessive: "des Г„ltesten"
 game_concept_elders_possessive: "der Г„ltesten"
 game_concept_elder_desc: "Ein $game_concept_elder$ ist ein [character|E] mit einem oder mehreren [disciples|E], die den Lehren $game_concept_elders_possessive$ folgen.\n\n$disciple_elder_benefits_tt$"
 game_concept_disaster: "Katastrophe"
 game_concept_disasters: "Katastrophen"
 game_concept_natural_disaster: "Naturkatastrophe"
 game_concept_natural_disasters: "Naturkatastrophen"
 game_concept_disaster_desc: "$game_concept_natural_disasters$ umfassen [floods|E] und [earthquakes|E].\n\nEin $game_concept_natural_disaster$ fГјhrt zum [character_death_death|E] vieler [characters|e] in den betroffenen [counties|E] und wird weitere negative Auswirkungen auf [development|E], [county_opinion|E] und [control|E] entsprechend der Schwere der Katastrophe haben.\n\nDie durch eine $game_concept_natural_disaster$ verursachte VerwГјstung kann ungeschehen gemacht und das Land neu belebt werden, indem man ein HilfsmaГҹnahmen-[great_project|E] abschlieГҹt."
 game_concept_earthquake: "Erdbeben"
 game_concept_earthquakes: "Erdbeben"
 game_concept_earthquake_desc: "Ein $game_concept_earthquake$ ist eine Art von [natural_disaster|E], die eine schwere und plГ¶tzliche ZerstГ¶rung in einer kleinen Zahl von [counties|E] verursacht.\n$game_concept_earthquakes$ kГ¶nnen nur in Regionen auftreten, die anfГӨlliger fГјr seismische AktivitГӨten sind."
 game_concept_flood: "Flut"
 game_concept_floods: "Fluten"
 game_concept_flooded: "Гјberflutet"
 game_concept_flood_desc: "Eine $game_concept_flood$ ist eine Art von [natural_disaster|E], die wachsenden Schaden in einer groГҹen Zahl an [counties|E] verursacht.\n$game_concept_floods$ kГ¶nnen nur an den Ufern groГҹer FlГјsse auftreten."
 game_concept_government_bureaucratic_type: "BГјrokratisch"
 game_concept_government_bureaucratic_type_desc: "Einige [governments|E] sind bГјrokratisch. Es sind stark zentralisierte Regierungen, die sich Гјblicherweise auf [governors|E], [appointment|E] und landlose [noble_families|E] verlassen, um [provinces|E] im [realm|E] zu verwalten.\n\nHГӨufig findet man bei Ihnen auch [domiciles|E], [influence|E] und [title_men_at_arms|E].\n\nEs gibt verschiedene bГјrokratische Regierungen:\n$BULLET_WITH_TAB$[GetGovernment('administrative_government').GetNameWithIcon]\n$BULLET_WITH_TAB$[GetGovernment('celestial_government').GetNameWithIcon]\n$BULLET_WITH_TAB$[GetGovernment('meritocratic_government').GetNameWithIcon]\n$BULLET_WITH_TAB$[GetGovernment('japan_administrative_government').GetNameWithIcon]\n$BULLET_WITH_TAB$[GetGovernment('steppe_admin_government').GetNameWithIcon]"
 game_concept_government_bureaucratic_gov: "BГјrokratische Regierung"
