l_german:
 tgp_travel_danger_events.0001.t: "Leben in den Ruinen"
 tgp_travel_danger_events.0001.intro: "Bei der Reise durch [ROOT.Char.GetCurrentLocation.GetName] sehe ich überall die Auswirkungen der Katastrophe ([disaster_situation.GetType.GetNameNoTooltip])."
 tgp_travel_danger_events.0001.flood: "Trümmer am Flussufer, Häuser, die der Fluss wie Blätter in einem Bach mit sich nahm. Ein ganzes Dorf, das von der reißenden Strömung verschlungen wurde."
 tgp_travel_danger_events.0001.earthquake: "Einst fruchtbare Lande und lebendige Dörfer liegen still und voller Trümmer dar, von der Erde selbst verschlungen."
 tgp_travel_danger_events.0001.desc: "\n\nKaum dass wir den Rand eines verwüsteten Dorfs erreichen, entdecke ich ein einsames Kind inmitten der Trümmer. Es bemerkt mich nicht, während es verzweifelt versucht, etwas wieder aufzubauen, was wohl einst ein Bauernhaus war."
 tgp_travel_danger_events.0001.a: "Meine Leute werden die Trümmer beiseiteschaffen."
 tgp_travel_danger_events.0001.b: "Ich werde das Kind unter meine Fittiche nehmen."
 tgp_travel_danger_events.0001.c: "Ich habe keine Zeit für so etwas!"
 impressed_by_kindness: "Beeindruckt von Freundlichkeit"
