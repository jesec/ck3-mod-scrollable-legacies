l_german:
 #Goguryeo Tomb
 building_type_goguryeo_tomb_01: "$building_goguryeo_tomb_01$"
 building_type_goguryeo_tomb_01_desc: "$building_goguryeo_tomb_01_desc$"
 building_goguryeo_tomb_01: "Grabmal eines Goguryeo-Königs"
 building_goguryeo_tomb_01_desc: "Dieses große, rechteckige Grabmal aus behauenen Steinen soll einem alten König von Goguryeo gehört haben, dessen Name jedoch in Vergessenheit geriet. Die Gänge, die zum Grabmal führen, sind mit farbenprächtigen Fresken bemalt, und auf der Spitze der Pyramide erhebt sich ein kleiner Holzpavillon zu Ehren des Bestatteten."
 #Great Buddha of Kamakura
 building_type_buddha_kamakura_01: "$building_buddha_kamakura_01$"
 building_type_buddha_kamakura_01_desc: "$building_buddha_kamakura_01_desc$"
 building_buddha_kamakura_01: "Großer Buddha von Kamakura"
 building_buddha_kamakura_01_desc: "Der #italic Daibutsu#! vom Kamakura ist eine ehrwürdige Bronzestatue des Amitābha-Buddhas, die mehrere Tonnen wiegt und mit Gold verziert wurde. Er wird in einer großen Halle verwahrt, die von den Tempeln des Südwestens inspiriert ist und in der er von zweiunddreißig Lotosblüten umringt ist."
 #Lingapura Pyramid
 building_type_pyramid_lingapura_01: "$building_pyramid_lingapura_01$"
 building_type_pyramid_lingapura_01_desc: "$building_pyramid_lingapura_01_desc$"
 building_pyramid_lingapura_01: "Lingapura-Pyramide"
 building_pyramid_lingapura_01_desc: "Diese große Stufenpyramide erhebt sich wie ein heiliger Berg aus dem Dschungel. Auf jeder ihrer sieben Terrassen stehen immer kunstvollere Schreine und Altäre. Das obere Heiligtum krönt das Gebäude und schützt den heiligen #italic Lingam#! von Shiva inmitten eines komplexen und über die Achsen der Anlage aufgebauten religiösen Musters."
 #Maijishan Grottoes
 building_type_maijishan_grottoes_01: "$building_maijishan_grottoes_01$"
 building_type_maijishan_grottoes_01_desc: "$building_maijishan_grottoes_01_desc$"
 building_maijishan_grottoes_01: "Maijishan-Grotten"
 building_maijishan_grottoes_01_desc: "Der Berg Maijishan ist schon lange ein Ort der Verehrung, und an seinen südlichen Steilwänden, die als geomantisch günstig gelten, wurden Hunderte von Schreinen in den rötlichen Fels gehauen. Sie beherbergen Statuen und farbenprächtige Fresken friedvoller Buddhas und Bodhisattwas. Viele wurden von den Familien der nahen Stadt in Auftrag gegeben, für die der Berg eine Pilgerstätte und ein Ort der Meditation ist."
 #Three Pagodas of Dali
 building_type_three_pagodas_dali_01: "$building_three_pagodas_dali_01$"
 building_type_three_pagodas_dali_01_desc: "$building_three_pagodas_dali_01_desc$"
 building_three_pagodas_dali_01: "Drei Pagoden von Dali"
 building_three_pagodas_dali_01_desc: "Aus der weitläufigen Tempelanlagen der Herrscherfamilie der Stadt erheben sich drei hohe Pagoden mit Ziegelmauern und Steinsockeln. Sie bilden die Ecken eines gleichschenkligen Dreiecks, das die heilige Geometrie des Ortes unterstreicht und die umliegenden Berge und den See einrahmt."
 #Iron Lion of Cangzhou
 building_type_iron_lion_cangzhou_01: "$building_iron_lion_cangzhou_01$"
 building_type_iron_lion_cangzhou_01_desc: "$building_iron_lion_cangzhou_01_desc$"
 building_iron_lion_cangzhou_01: "Eisenlöwe von Cangzhou"
 building_iron_lion_cangzhou_01_desc: "Dieser monumentale Löwe ist die größte gusseiserne Skulptur Chinas. Auf seinem kräftigen Rücken steht ein Lotussockel, auf dem ein Bodhisattwa ruht, der reich mit Gold geschmückt wurde. Er steht in der Nähe der immer wieder überschwemmten Ebene und gilt daher den Einheimischen als Wächter vor den steigenden Fluten."
 #Gaocheng Observatory
 building_type_dengfeng_observatory_01: "$building_dengfeng_observatory_01$"
 building_type_dengfeng_observatory_01_desc: "$building_dengfeng_observatory_01_desc$"
 building_dengfeng_observatory_01: "Gaocheng-Observatorium"
 building_dengfeng_observatory_01_desc: "Dieser Ort ist aufgrund seiner geomantischen Eigenschaften und seiner symbolischen geografischen Bedeutung innerhalb Chinas seit Jahrhunderten beliebt für astronomische Beobachtungen. Das heutige Bauwerk besitzt eine komplexe Trapezform und dient auch als riesige Sonnenuhr: Es wirft seinen Schatten in den Graben, der die Plattform teilt, und zeigt so den Sonnenstand an."
 #Candi of Muara Takus
 building_type_muara_takus_01: "$building_muara_takus_01$"
 building_type_muara_takus_01_desc: "$building_muara_takus_01_desc$"
 building_muara_takus_01: "Candi von Muara Takus"
 building_muara_takus_01_desc: "Die Tempelanlage besteht aus zahlreichen Bauwerken, die alle aus Ziegeln errichtet und mit Sandstein verziert wurden. In der Mitte erheben sich die gewaltigen Stupas von #italic Mahligai#! und #italic Tuo#!, ersterer hoch und schlank, letzterer gewaltig wie ein Berg, der die kleineren Schreine und Terrassen ringsum überragt."
 #Stone Pagoda of Mireuksa
 building_type_stone_pagoda_01: "$building_stone_pagoda_01$"
 building_type_stone_pagoda_01_desc: "$building_stone_pagoda_01_desc$"
 building_stone_pagoda_01: "Steinpagode von Mireuksa"
 building_stone_pagoda_01_desc: "Das helle Mauerwerk einer neunstöckigen Pagode, die auf einem breiten Steinsockel ruht, erstrahlt im Sonnenlicht. Sie ist die erste Steinpagode Koreas, und ihre Form und ihre harmonischen Proportionen machten sie zu einem Vorbild für Tempelbauer auf der gesamten Halbinsel."
 #Thuriang Kilns
 building_type_thuriang_kilns_01: "$building_thuriang_kilns_01$"
 building_type_thuriang_kilns_01_desc: "$building_thuriang_kilns_01_desc$"
 building_thuriang_kilns_01: "Thuriang-Brennöfen"
 building_thuriang_kilns_01_desc: "Über zweihundert große Brennöfen stehen in diesem Gebiet und bilden so das größte Zentrum der Seladon-Herstellung in der Region. Die hier gebrannte Keramik ist bekannt für ihre grobe, harte Oberfläche und ihre gelbgrüne Glasur. Sie wird überall auf den Märkten Südostasiens gehandelt."
 #Yuelu Academy
 building_type_yuelu_academy_01: "$building_yuelu_academy_01$"
 building_type_yuelu_academy_01_desc: "$building_yuelu_academy_01_desc$"
 building_yuelu_academy_01: "Yuelu-Akademie"
 building_yuelu_academy_01_desc: "Die Yuelu-Akademie, eine der renommiertesten Bildungsstätten Chinas, dient seit Langem als Zentrum der Lehre und der Prüfungen. Ihr Grundriss ist um einen zentralen Innenhof angelegt, von dem sich in harmonischer Symmetrie angrenzende Hallen und Pavillons erstrecken, in denen Generationen von Gelehrten auf den Staatsdienst vorbereitet wurden."
 #Chocolate Hills #NOTE: today are called "Chocolate" Hills, but of course chocolate didn't exist in the Philippines back then. This is a random name I thought out, but it is not based on native names (none of which seem to have survived from then)
 building_type_chocolate_hills_01: "$building_chocolate_hills_01$"
 building_type_chocolate_hills_01_desc: "$building_chocolate_hills_01_desc$"
 building_chocolate_hills_01: "Rost-Hänge"
 building_chocolate_hills_01_desc: "Diese Erdformation zeichnet sich durch eine Vielzahl abgerundeter, kegeliger Hügel aus, die sich gleichmäßig über die Landschaft verteilen. Sie sind von einer Grasdecke bedeckt, die sich während der Trockenzeit in eindrückliche Braun- und Orangetöne färbt und der Landschaft einen ungewöhnlichen herbstlichen Glanz verleiht."
 #Fanfang of Guangzhou
 building_type_fanfang_guangzhou_01: "$building_fanfang_guangzhou_01$"
 building_type_fanfang_guangzhou_01_desc: "$building_fanfang_guangzhou_01_desc$"
 building_fanfang_guangzhou_01: "Fanfang von Guangzhou"
 building_fanfang_guangzhou_01_desc: "Das #italic Fanfang#! ist eine bedeutende Gemeinschaft fremdländischer Händler, vorwiegend muslimische Araber und Perser, die über die Seewege hierhergelangten. Es liegt westlich der Stadt in einem Viertel mit eigenen Beamten und eigenen Bräuchen. Im Zentrum erhebt sich eine rot ummauerte Moschee mit einem hohen Minarett und einem Leuchtturm, der Schiffe und Menschen sicher in den Hafen lotst."
 #Wilwatikta Palace
 building_type_wilwatikta_palace_01: "$building_wilwatikta_palace_01$"
 building_type_wilwatikta_palace_01_desc: "$building_wilwatikta_palace_01_desc$"
 building_wilwatikta_palace_01: "Wilwatikta-Palast"
 building_wilwatikta_palace_01_desc: "Die weitläufige Palastanlage von Wilwatikta mit ihren Pavillons, Hallen, Tempeln und Höfen ist so groß, dass sie einer eigenen Stadt gleicht. Rechteckige Ziegelmauern umschließen das Gelände, und der Eingang zur Prozessionsstraße wird von einer Reihe hoch aufragender #italic Paduraksa#!-Tore markiert."
 #Ha Long Bay
 building_type_ha_long_bay_01: "$building_ha_long_bay_01$"
 building_type_ha_long_bay_01_desc: "$building_ha_long_bay_01_desc$"
 building_ha_long_bay_01: "Ha-Long-Bucht"
 building_ha_long_bay_01_desc: "Diese atemberaubende Landschaft aus Karst- und Kalksteininseln erhebt sich aus dem ruhigen smaragdgrünen Wasser des Golfs, wo einheimische Fischer im Schatten der Säulen ihren Fang einholen."
 #My Son Sanctuary
 building_type_my_son_sanctuary_01: "$building_my_son_sanctuary_01$"
 building_type_my_son_sanctuary_01_desc: "$building_my_son_sanctuary_01_desc$"
 building_my_son_sanctuary_01: "My-Son-Heiligtum"
 building_my_son_sanctuary_01_desc: "Das Heiligtum ist die größte und aufwendigste der Cham-Tempelanlagen. Es besteht aus einer Reihe dicht beieinanderliegender Gehege in einem Waldgebiet, die jeweils eigene Tore, Schreine und Stupas haben. Die Bauwerke wurden alle aus roten Ziegeln errichtet, in geometrischen Mustern angeordnet und mit Türstürzen aus Sandstein verziert."
 #Gunung Api
 building_type_gunung_api_01: "$building_gunung_api_01$"
 building_type_gunung_api_01_desc: "$building_gunung_api_01_desc$"
 building_gunung_api_01: "Gunung Api"
 building_gunung_api_01_desc: "Dieser Berg, der sich aus der Wildnis des Dschungels erhebt, ist den Einheimischen heilig. Inmitten der Feuchtigkeit und des Nebels sind seine Hänge mit markanten Kalksteinspitzen und tiefen Höhlen überzogen, die das Wasser über unzählige Zeitalter hinweg formte."
 #Suwalesi Megaliths
 building_type_suwalesi_megaliths_01: "$building_suwalesi_megaliths_01$"
 building_type_suwalesi_megaliths_01_desc: "$building_suwalesi_megaliths_01_desc$"
 building_suwalesi_megaliths_01: "Sulawesi-Megalithen"
 building_suwalesi_megaliths_01_desc: "In den Tälern von Zentral-Sulawesi finden sich zahlreiche Megalithstatuen und -ikonen, die von der örtlichen Bevölkerung für Rituale und zur Verehrung der Geister errichtet wurden. Diese als #italic Arcas#! bekannten Bildnisse wurden mit minimalistischer Präzision gefertigt, und ihre Formen zeichnen sich durch sanfte und elegante Linien aus."
 #Izumo Taisha
 building_type_izumo_taisha_01: "$building_izumo_taisha_01$"
 building_type_izumo_taisha_01_desc: "$building_izumo_taisha_01_desc$"
 building_izumo_taisha_01: "Kizuki Taisha"
 building_izumo_taisha_01_desc: "Dieser große Shinto-Schrein – ein #italic Taisha#! – wurde nahe der Küste mit Blick aufs Meer errichtet. Er erhebt sich auf einer Reihe gewaltiger Holzsäulen und dicker Baumstämme, sodass seine Hallen hoch über dem Boden liegen, auf dem die Sterblichen wandeln, und in den Himmel ragen, wo die Götter und Geister des Landes wohnen."
 #Temple of Confucius
 building_type_confucius_temple_01: "$building_confucius_temple_01$"
 building_type_confucius_temple_01_desc: "$building_confucius_temple_01_desc$"
 building_confucius_temple_01: "Tempel des Konfuzius"
 building_confucius_temple_01_desc: "Als ältester und einflussreichster aller Konfuziustempel diente diese weitläufige Anlage aus Hallen und Höfen mit ihrem harmonischen geometrischen Grundriss und den raffinierten Einzelheiten Tempelbauern in ganz China und darüber hinaus als Vorbild und Inspiration. In der Nähe gibt es einen ruhigen Wald mit den Gräbern von Konfuzius und seinen Jüngern: ein wichtiger Pilgerort für Gläubige."
 #Imperial Citadel of Lin'an
 building_type_citadel_linan_01: "$building_citadel_linan_01$"
 building_type_citadel_linan_01_desc: "$building_citadel_linan_01_desc$"
 building_citadel_linan_01: "Kaiserliche Zitadelle Lin’an"
 building_citadel_linan_01_desc: "Die an den Nordhängen des Phönixbergs erbaute Kaiserzitadelle dient als Sitz des Hofes und seiner Verwaltung und beherbergt in ihren gewaltigen Hallen und Gängen unzählige Gelehrte und Beamte. Obwohl sie nicht so imposant war wie die Paläste der nördlichen Hauptstädte, sind die Raffinesse und die Eleganz ihrer Terrassengärten und Pavillons ihnen duchaus ebenbürtig."
 #The Temples of Angkor
 building_type_temples_angkor_01: "$building_temples_angkor_01$"
 building_type_temples_angkor_01_desc: "$building_temples_angkor_01_desc$"
 building_temples_angkor_01: "Tempel von Angkor"
 building_temples_angkor_01_desc: "In der gedeihenden Stadt Indra sind die vergoldeten Dächer und Zinnen ihrer Tempel kaum zu zählen. Einer ist prächtiger als der andere mit Wandgemälden und Statuen von Gottheiten und Devarajas verziert."
 building_temples_angkor_02: "Angkor Wat"
 building_temples_angkor_02_desc: "Angkor Wat ist eine gewaltige Tempelanlage, die dem Gott Vishnu geweiht wurde. Man entwarf sie als Nachbildung des Berg Meru, der Götterheimat in der hinduistischen Mythologie. Die Anlage ist umgeben von einem eindrucksvollen Graben und mehreren Tempelgalerien, die voll religiöser Kunst, Skulpturen und Reliefs sind."
