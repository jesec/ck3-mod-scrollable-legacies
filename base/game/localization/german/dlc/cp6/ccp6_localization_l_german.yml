l_german:
 #St Peter's Basilica
 building_type_holy_site_st_peters_basilica_01: "$building_holy_site_st_peters_basilica_01$"
 building_type_holy_site_st_peters_basilica_01_desc: "$building_holy_site_st_peters_basilica_01_desc$"
 building_holy_site_st_peters_basilica_01: "Petersdom"
 building_holy_site_st_peters_basilica_01_desc: "Der Petersdom wurde auf Geheiß von Kaiser Konstantin I. nach seiner Bekehrung zum Christentum auf der Grabstätte des Heiligen Petrus auf dem Vatikanhügel errichtet. Er dient als Zentrum des westlichen Christentums.\n\nDiese Kirche war traditionell auch Sitz des römisch-katholischen Bischofs von Rom, also dem Papst. Im Lauf der Jahrhunderte wurde sie zu einer ausufernden Anlage, umschlossen von der Leoninischen Mauer."
 #Mont-Saint-Michel
 building_type_mont_st_michel_01: "Abtei Mont-Saint-Michel"
 building_type_mont_st_michel_01_desc: "$building_mont_st_michel_01_desc$"
 building_mont_st_michel_01: "Sankt Auberts Kirche für den Heiligen Michael"
 building_mont_st_michel_01_desc: "Im Jahr 708 hatte der Heilige Aubert, damals Bishof von Avranches, einen Traum vom Erzengel Michael, der ihm auftrug, eine Kirche auf einer nahen Gezeiteninsel zu errichten. Aubert missachtete diese Vision zunächst und hielt sie für eine List des Teufels. Doch schließlich konnte der Erzengel ihn überzeugen – der Legende nach, indem er ihm mit dem bloßen Finger in den Schädel bohrte. Daraufhin ordnete der Bischof den Bau eines neuen Gotteshauses auf Mont Tombe an.\n\nSo beginnt die Geschichte von Mont-Saint-Michel."
 building_mont_st_michel_02: "Romanische Abtei Mont-Saint-Michel"
 building_mont_st_michel_02_desc: "Die neue Kirche der Abtei liegt auf dem höchsten Punkt der Insel als Zeugnis für die Macht Gottes über Himmel und Erde sowie für den Einfallsreichtum der Menschen.\n\nUnter der Abtei wächst langsam eine kleine Siedlung von Pilgern und Fischern."
 building_mont_st_michel_03: "Das Merveille"
 building_mont_st_michel_03_desc: "Die Abtei wurde um eine Reihe von Kreuzgängen, eine Kapelle, einen Weinkeller und das Ritterzimmer sowie viele Unterbringungen erweitert, die eine gotische Anlage darstellen, die man nur als Wunder der Baukunst bezeichnen kann.\n\nDie Abtei verfügt zudem über beachtliche Befestigungen, und die Siedlung zu ihren Füßen ist nun fast schon ein Städtchen, in dem viele Pilger, aber auch Einheimische leben."
 building_mont_st_michel_04: "Festungskloster Mont-Saint-Michel"
 building_mont_st_michel_04_desc: "Die jüngsten Kriege machten klar, dass sogar eine Insel des Friedens wie Mont-Saint-Michel zu einem Ort von strategischer Bedeutung werden kann. Deshalb befestigte man den Fels gründlich mit schweren Mauern und Bastionen und schuf mehrere neue Unterkünfte für die Garnison.\n\nDie Siedlung am Ufer ist nun eine lebendige Stadt, deren Häuser fast die ganze Insel bedecken."
 #Sanchi Stupa
 building_type_sanchi_stupa_01: "$building_sanchi_stupa_01$"
 building_type_sanchi_stupa_01_desc: "$building_sanchi_stupa_01_desc$"
 building_sanchi_stupa_01: "Großer Stupa von Sanchi"
 building_sanchi_stupa_01_desc: "Der große Stupa wurde vom Maurya-Kaiser Ashoka im dritten Jahrhundert vor Christus erbaut, unweit von jenem Ort, an dem er seine Gattin Devi ehelichte. Das prächtige Bauwerk beherbergt Relikte Buddhas und ist eines der ältesten seiner Art. Er ist zudem für seine kunstvoll gravierten Torana-Tore berühmt."
 #Boudhanath
 building_type_boudhanath_01: "$building_boudhanath_01$"
 building_type_boudhanath_01_desc: "$building_boudhanath_01_desc$"
 building_boudhanath_01: "Bodnath"
 building_boudhanath_01_desc: "Der Bodnath-Stupa von Kathmandu, auch bekannt als Jarung Kashor und Khāsa Chaitya, ist einer der größten Stupas im Buddhismus und gilt als Geburtsort des tibetischen Buddhismus. Seine gewaltige Kuppel und das Mandala beherbergen die Gebeine zahlreicher Buddhas sowie unzählige heilige Reliquien verschiedenster Formen.\n\nAufgrund seiner Lage an einer alten Handelsroute zwischen Nepal und Tibet machen Reisende und Händler hier häufig halt, um zu rasten und zu beten."
 #Grand Mosque of Yazd
 building_type_yazd_mosque_01: "$building_yazd_mosque_01$"
 building_type_yazd_mosque_01_desc: "$building_yazd_mosque_01_desc$"
 building_yazd_mosque_01: "Freitagsmoschee von Yazd"
 building_yazd_mosque_01_desc: "Dieses prachtvolle Gebäude, das man an der Stelle eines Feuertempels aus dem vierten Jahrhundert errichtete, beeindruckt Reisende wie Pilger gleichermaßen mit seinen großen Iwanen, der gekachelten Kuppel und seinem majestätischen Eingangsportal mit zwei himmelhohen Minaretten."
 #Qutb Minar
 building_type_qutb_minar_01: "$building_qutb_minar_01$"
 building_type_qutb_minar_01_desc: "$building_qutb_minar_01_desc$"
 building_qutb_minar_01: "Eisensäule von Delhi"
 building_qutb_minar_01_desc: "Die mächtige Eisensäule von Delhi steht als Symbol für die Herrlichkeit von König Chandragupta II., obschon auch Herrscher, die auf ihn folgten, ihren Namen in die Säule einritzten. Trotz der langen Zeit seit ihrer Herstellung hat sie keinerlei Rost angesetzt: ein Zeugnis für das große Können indischer Schmiede!"
 building_qutb_minar_02: "Qutb Minar"
 building_qutb_minar_02_desc: "Die Quwwat-ul-Islam-Moschee – eine prächtige Moschee, die den Standort der ehemaligen Eisernen Säule von Delhi umgibt – wird von einem wahrhaft gigantischen Minarett, dem Qutb Minar, gekrönt.\n\nEin imposantes Denkmal der Macht der Herrscher von Delhi."
 building_qutb_minar_03: "Erweiterte Quwwat-ul-Islam-Moschee"
 building_qutb_minar_03_desc: "Die Anlage, die das Qutb Minar umgibt, wurde mehrfach durch Innenhöfe, Tore und Mausoleen erweitert, sodass sie legendäre Ausmaße angenommen hat."
 building_qutb_minar_04: "Alai Minar"
 building_qutb_minar_04_desc: "Der Anlage wurde ein zweites Minarett hinzugefügt, das dem Qutb Minar nachempfunden, aber doppelt so groß ist. Dieser Koloss, der Delhi überragt, ist der Gipfelpunkt indo-islamischer Architektur."
