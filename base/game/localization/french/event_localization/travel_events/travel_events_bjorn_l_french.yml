l_french:
 #Travel Flavor Events
 #Troll bridge - you encounter a troll bridge.
 travel_events.5100.t: "Pont habité par un [ROOT.Char.GetCurrentLocation.Custom('GetProvinceTricksterSpirit')]"
 travel_events.5100.desc: "« [ROOT.Char.Custom('FR_MonseigneurMadame')|U] ! Ce pont a mauvaise réputation. Un [ROOT.Char.GetCurrentLocation.Custom('GetProvinceTricksterSpirit')] vit en dessous ! » s’écrie m[ROOT.Char.Custom2('FR_RelationToMeShort_OnA', superstitious_traveler)], [superstitious_traveler.Custom('FR_le_Char_Pi')][superstitious_traveler.GetTitledFirstName]. « Il s’abattra sûrement sur nous, ou nous maudira de loin à notre passage. »\n\nLes membres de ma suite chuchotent entre eux. Certains invoquent le nom [ROOT.Char.GetFaith.HighGodNamePossessive] pour en recevoir une protection. Malheureusement, le pont est le seul endroit sûr à des kilomètres à la ronde pour traverser."
 travel_events.5100.a: "« Je ne crains aucun [ROOT.Char.GetCurrentLocation.Custom('GetProvinceTricksterSpirit')] ou démon ! »"
 travel_events.5100.b: "« Cela n’existe pas, [superstitious_traveler.GetTitledFirstNameNoTooltip]. »"
 travel_events.5100.c: "« Il faut prier pour chasser cet esprit. »"
 travel_events.5100.d: "« C’est effrayant ! Trouvons un autre chemin. »"
 custom.every_brave_or_impatient_entourage_member: "Chaque membre de la suite qui est [GetTrait('brave').GetName( GetNullCharacter )|l] ou [GetTrait('impatient').GetName( GetNullCharacter )|l]"
 custom.every_cynical_or_impatient_entourage_member: "Chaque membre de la suite qui est [GetTrait('cynical').GetName( GetNullCharacter )|l] ou [GetTrait('impatient').GetName( GetNullCharacter )|l]"
 custom.every_eccentric_or_zealous_entourage_member: "Chaque membre de la suite qui est [GetTrait('eccentric').GetName( GetNullCharacter )|l] ou [GetTrait('zealous').GetName( GetNullCharacter )|l]"
 custom.every_craven_or_impatient_entourage_member: "Chaque membre de la suite qui est [GetTrait('craven').GetName( GetNullCharacter )|l] ou [GetTrait('impatient').GetName( GetNullCharacter )|l]"
