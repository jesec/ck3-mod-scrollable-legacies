l_french:
 SITUATION_LIST_STORY_CYCLE_MODIFIERS_HEADER: "Modificateurs"
 SITUATION_LIST_STORY_CYCLE_DECISIONS_HEADER: "Décisions"
 not_yet_chosen: "indéterminé"
 story_cycle_pet_dog: "Chien de compagnie"
 story_cycle_pet_dog_desc: "#F Un fidèle compagnon canin marche à vos côtés, vous offrant une protection et un lien de loyauté que peu d’humains peuvent égaler.#!"
 DOG_INFORMATION_STRING: "Le nom de votre chien est #V [Story.Custom('DogStoryNameAll')].#!\nSon pelage est [Story.Custom('DogFurColorAll')], ses yeux sont [Story.Custom('DogEyeColorAll')], et [Story.Custom('DogStoryPuppyOrAgeAll')].\nIl est gentil et fidèle."
 dog_age_puppy: "c’est encore un chiot"
 dog_age_proper: "il a [Story.MakeScope.Var('dog_age_variable').GetValue|0] ans"
 cat_age_kitten: "c’est encore un chaton"
 cat_age_proper: "il a [Story.MakeScope.Var('cat_age_variable').GetValue|0] ans"
 story_cycle_pet_cat: "Chat de compagnie"
 story_cycle_pet_cat_desc: "#F Un félin fier vous tient compagnie, un chasseur agile qui n’offre son affection qu’à ses propres conditions.#!"
 CAT_INFORMATION_STRING: "Le nom de votre chat est #V [Story.Custom('CatStoryNameAll')].#!\nSon pelage est [Story.Custom('CatFurColorAll')], ses yeux sont [Story.Custom('CatEyeColorAll')], et [Story.Custom('CatStoryKittenOrAgeAll')].[Story.Custom('CatStupidOrNotStupidAll')]"
 dumb_but_sweet_orange_boy: "\nIl un peu bête, mais très gentil."
 story_cycle_pet_eagle: "Aigle de chasse"
 story_cycle_pet_eagle_desc: "#F Sur votre gant est perché un aigle chasseur, toujours vigilant, toujours affamé, apportant la mort depuis les airs.#!"
 EAGLE_INFORMATION_STRING: "Le nom de votre aigle est #V [Story.Custom('EagleStoryNameAll')].#!\nIl a [Story.MakeScope.Var('eagle_age_variable').GetValue|0] ans."
 bp2_hostage_loyalty: "Otage loyal"
 bp2_hostage_loyalty_desc: "Un de vos [hostages|El] commence à s’habituer à vous et vos manières."
 hostage: "[hostage|E]"
 HOSTAGE_STORY_PRACTICAL_INFORMATION_STRING: "Votre [hostage|El], [Story.MakeScope.Var('hostage_target').Char.Custom('FR_le_Char_U_P')][Story.MakeScope.Var('hostage_target').Char.GetUIName], grandit à votre [court|E], ce qui influence son allégeance. Maintenez son [opinion|El] à un niveau élevé et choisissez les bonnes options lors des événements afin qu’[Story.MakeScope.Var('hostage_target').Char.Custom('FR_IlElle')] soit plus enclin[Story.MakeScope.Var('hostage_target').Char.Custom('FR_E')] à vous rester fidèle à l’âge adulte.\n\nLoyauté actuelle : [Story.MakeScope.Var('theon_points').GetValue|0+]"
 LOYALTY_LABEL: "Points de loyauté"
 claimant: "[claimant|E]"
 diverted_crusaders: "Croisés déviés"
 frankokratia_story: "Francocratie"
 frankokratia_story_desc: "Un prétendant à l’[GetTitleByKey('e_byzantium').GetName] a détourné les opportunistes occidentaux de leur croisade en tournant leurs épées avides vers le cœur même de la chrétienté..."
 FRANKOKRATIA_STORY_PRACTICAL_INFORMATION_STRING: "Une [war|El] contre [GetTitleByKey('e_byzantium').GetHolder.Custom('FR_le_Char_U_Pi')][GetTitleByKey('e_byzantium').GetHolder.GetShortUIName] déterminera l’avenir de l’[GetTitleByKey('e_byzantium').GetName]. Soit le [claimant|El] ([Story.MakeScope.Var('byz_claimant').Char.GetUIName]) s’emparera du trône, récompensant les croisés pour leurs efforts, soit un [GetTitleByKey('e_latin_empire').GetBaseName] sera établi sous autorité [GetFaithByKey('catholic').GetAdjective]."
 story_conqueror: "Conquérant"
 story_conqueror_desc: "Votre ambition ne connaît aucune limite ! Le monde n’attend que vous pour que vous vous en empariez."
 CONQUEROR_STORY_PRACTICAL_INFORMATION_STRING: "Les conquérants reçoivent de nombreux bonus puissants, tels qu’une réduction de [factions|El], le [vassalize_casus_belli|El] ou des événements puissants occasionnels.\n\nVous cesserez d’être un conquérant si :\n$BULLET_WITH_TAB$Vous n’êtes pas [independent|El]\n$BULLET_WITH_TAB$Votre rang est réduit à celui de [count|El]\n$BULLET_WITH_TAB$Vous êtes [unlanded|El]\n$BULLET_WITH_TAB$Vous n’êtes pas en [war|El] pendant #V 10#! ans\n$BULLET_WITH_TAB$Vous êtes criblé de [Concept('debt', 'dettes')|E]\n$BULLET_WITH_TAB$Vous perdez au moins #V 3#! [wars|El]\n$BULLET_WITH_TAB$Vous êtes [GetTrait('incapable').GetName( GetNullCharacter )|l]"
 story_destiny_child: "Enfant prédestiné"
 story_destiny_child_desc: "Un enfant très prometteur est né, comme s’il avait été choisi par les dieux eux-mêmes."
 DESTINY_CHILD_STORY_PRACTICAL_INFORMATION_STRING: "Très rarement, un enfant destiné à la grandeur voit le jour. Il se développe plus rapidement que la normale et atteint des sommets que les autres ne pourront jamais atteindre.\n\nPrenez grand soin [Story.MakeScope.Var('destiny_child').Char.Custom('FR_du_Char_U_P')][Story.MakeScope.Var('destiny_child').Char.GetUIName], et envisagez de faire en sorte qu’[Story.MakeScope.Var('destiny_child').Char.Custom('FR_IlElle')] soit votre [player_heir|El]. Par exemple, en en faisant votre [designated_heir|El]."
 CHILD_OF_DESTINY: "Enfant prédestiné"
 story_cycle_martial_lifestyle_warhorse: "Cheval de bataille"
 story_cycle_martial_lifestyle_warhorse_desc: "Vous disposez d’un cheval de bataille particulièrement bien dressé. Que vos ennemis tremblent devant votre charge."
 WARHORSE_STORY_PRACTICAL_INFORMATION_STRING: "Votre cheval de bataille s’appelle #V [Story.Custom('WarhorseStoryNameAll')]#! ([Story.Custom('HorseStoryMareStallionAll')])."
 DOPPELGANGER: "Votre [Glossary( 'doppelgänger', 'DOPPELGANGER_GLOSS' )]"
 story_doppelganger: "Se voir dans la boue"
 DOPPELGANGER_GLOSS: "Un sosie, souvent rencontré par hasard. Dans le folklore allemand, c’est une apparition étrange et un mauvais présage : voir son propre double peut présager une maladie ou la mort."
 story_doppelganger_desc: "Un paysan qui vous ressemble trait pour trait a été retrouvé – un véritable [Glossary( 'doppelgänger', 'DOPPELGANGER_GLOSS' )]..."
 DOPPELGANGER_STORY_PRACTICAL_INFORMATION_STRING: "[Select_CString(Story.MakeScope.Var('doppelganger_character').Char.IsFemale,'Une paysanne','Un paysan')] qui vous ressemble et qui parle comme vous peut être une chance... ou une malédiction. Pour l’instant, [Story.MakeScope.Var('doppelganger_character').Char.Custom('FR_le_Char_U_P')][Story.MakeScope.Var('doppelganger_character').Char.GetUIName] réside à votre [court|E]."
 story_cycle_hunt_mystical_animal: "Chasse un animal mystique"
 story_cycle_hunt_mystical_animal_desc: "Au cours d’une chasse, vous avez aperçu une bête blanche mystique. La capturer serait comme trouver le Saint-Graal !"
 WHITE_ANIMAL_INFORMATION_STRING: "Vous êtes sur les traces d’un animal blanc (#V [Story.MakeScope.Var('animal_type').GetFlagName|l]#!).\n\nL’attraper procurerait de grandes récompenses, mais vous gagnez du [stress|El] chaque fois qu’il vous échappe. De temps en temps, un [GetModifier('hunt_sighting_legendary_modifier').GetNameWithTooltip|l] vous laissera continuer la chasse.\n\nRencontres de l’animal blanc : [Story.MakeScope.Var('encounters').GetValue|0V] #weak (depuis la première fois)#!"
 LEGENDARY_COUNTY_LABEL: "Le foyer actuel de l’animal blanc ([Story.MakeScope.Var('animal_type').GetFlagName|l])"
 story_sycophant: "Le flagorneur"
 story_sycophant_desc: "L’un de vos courtisans, un flagorneur notoire, irrite vos vassaux par sa simple présence."
 SYCOPHANT_INFORMATION_STRING: "M[Story.GetOwner.Custom2( 'FR_RelationToMeShort_OnA', Story.MakeScope.Var('sycophant_character').Char )], [Story.MakeScope.Var('sycophant_character').Char.Custom('FR_le_Char_U_Pi')][Story.MakeScope.Var('sycophant_character').Char.GetShortUIName], et m[Story.GetOwner.Custom2( 'FR_RelationToMeShort_OnA', Story.MakeScope.Var('jealous_character').Char )], [Story.MakeScope.Var('jealous_character').Char.Custom('FR_le_Char_U_Pi')][Story.MakeScope.Var('jealous_character').Char.GetShortUIName], sont à couteaux tirés. Je peux choisir mon préféré, mais cela ne manquera pas de mettre l’autre en colère. Seul le temps nous dira comment cette situation va évoluer..."
 SYCOPHANT_LABEL: "Le flagorneur"
 JEALOUS_VASSAL_LABEL: "Mon vassal le plus jaloux"
 story_cycle_pet_rock: "Pierre de compagnie"
 story_cycle_pet_rock_desc: "À vos côtés se trouve une pierre de compagnie, dont la face immuable correspond parfaitement à votre sens particulier de la compagnie."
 PET_ROCK_INFORMATION_STRING: "Le nom de votre pierre de compagnie est #V [Story.GetOwner.Custom('RockStoryName')].#!\nSon relief rugueux est [Story.GetOwner.Custom('RockColor')]."
 story_cycle_admin_eunuch: "Eunuque éminent"
 story_cycle_admin_eunuch_desc: "Un eunuque particulièrement habile a réussi à s’introduire dans votre Cour. Une opportunité ou une menace ?"
 EUNUCH_INFORMATION_STRING: "Au fil du temps, vous aurez la possibilité d’accorder [Story.MakeScope.Var('eunuch').Char.Custom('FR_au_Char_U_Pi')][Story.MakeScope.Var('eunuch').Char.GetShortUIName] plus de pouvoir. Cela augmente la force du [modifier|El] [GetModifier('admin_eunuch_liege_4_modifier').GetNameWithTooltip].\n\nCependant, le rejeter ou lui donner trop de pouvoir sans vous assurer de sa loyauté pourrait avoir de lourdes conséquences.\n\nVous avez rejeté ses requêtes [Story.MakeScope.Var('eunuch_refusals').GetValue|0V] fois jusqu’à présent."
 EUNUCH_LABEL: "L’eunuque"
 UPSET_COURTIERS: "Sujets contrariés par l’eunuque"
 POETRY_BOOK_LABEL: "Mon livre de poésie"
 commission_epic_story: "Commander une épopée familiale"
 commission_epic_story_desc: "Vous commandez une grande épopée pour raconter les exploits de votre famille."
 EPIC_INFORMATION_STRING: "Votre [Story.GetOwner.Custom('CommissionEpicScribe')][AddTextIf(Story.MakeScope.Var('composer').IsSet, Concatenate(Concatenate(', ', Story.MakeScope.Var('composer').Char.GetShortUIName), ','))] crée [Story.Custom('CompositionTypeAll')] épique pour augmenter la [dynasty_prestige|El] de la [dynasty|El] [Story.GetOwner.GetDynasty.GetName] et obtenir un [artifact|El].\n\nLa chance d’[Story.Custom('CompositionTypeAll')] d’exception est de [Story.MakeScope.Var('final_outcome_chance').GetValue|0+/%]"
 COMPOSER: "Le compositeur de votre épopée"
 story_foreign_raised_reformer: "Réformateur élevé à l’étranger"
 story_foreign_raised_reformer_desc: "Vous avez grandi loin de la terre que vous appelez maintenant votre chez-vous.\nTellement différent... et pourtant, et si votre chez-vous ressemblait davantage à là-bas ?"
 REFORMER_INFORMATION_STRING: "Vous avez été élevé en [Story.MakeScope.Var('advanced_realm').Title.GetBaseName] par [Story.MakeScope.Var('foreign_educator').Char.Custom('FR_le_Char_U_Pi')][Story.MakeScope.Var('foreign_educator').Char.GetShortUIName], de culture [Story.MakeScope.Var('advanced_culture').Culture.GetName] et de foi [Story.MakeScope.Var('advanced_culture_faith').Faith.GetAdjective]. La [culture|El] [Story.MakeScope.Var('advanced_culture').Culture.GetName] vous a impressionné et vous souhaitez que les vôtres leur ressemblent davantage.\n\nVous aurez la possibilité de gagner des points de réforme ou de réaffirmation :\n$BULLET_WITH_TAB$#indent_newline:7 En poursuivant la Réforme, vous pourriez obtenir des [innovations|El], de l’[cultural_acceptance|El], des [traditions|El] ou même une [GetBuilding('generic_university').GetName|l]. Gardez à l’esprit que la Réforme est un processus long et coûteux.#!\n$BULLET_WITH_TAB$#indent_newline:7 En poursuivant la réaffirmation, vous pourriez obtenir de l’[opinion|El] [Concept('vassal', 'vassale')|E], de la [dynasty_prestige|El], des bonus de [war|El] sous la forme de [casus_bellis|El] et [special_troops|El].#!"
 REFORM_LABEL: "Progression vers la réforme de votre [culture|El]"
 REAFFIRMATION_LABEL: "Progression vers la réaffirmation de votre [culture|El]"
 REFORM_MIN_VALUE_LABEL: ""
 REFORM_MAX_VALUE_LABEL: "Max : #V 3#!"
 REAFFIRMATION_MIN_VALUE_LABEL: ""
 REAFFIRMATION_MAX_VALUE_LABEL: "Max : #V 2#!"
 ECCENTRIC_MIN_VALUE_LABEL: ""
 ECCENTRIC_MAX_VALUE_LABEL: "Max : #V 5#!"
 IMAGINARY_FRIEND_INFORMATION_STRING: "Le nom de votre ami[Story.MakeScope.Var('imaginary_friend_name').Char.Custom('FR_E')] imaginaire est [Story.MakeScope.Var('imaginary_friend_name').Char.GetShortUINameNoTooltip]. Vous aurez l’occasion d’interagir avec [Story.MakeScope.Var('imaginary_friend_name').Char.Custom('FR_LuiElle')]."
 ECCENTRIC_VALUE: "Progression vers l’obtention du trait [GetTrait('eccentric').GetName( GetNullCharacter )]"
 story_cycle_imaginary_friend: "Ami imaginaire"
 story_cycle_imaginary_friend_desc: "Enfin un ami avec qui jouer ! Peu importe s’il n’est pas réel pour les autres, il l’est pour moi !"
 story_greatest_of_khans: "Le plus grand des khans"
 story_greatest_of_khans_desc: "Dans les Cieux, il y a beaucoup de grandes lumières : le soleil, la lune et les étoiles. Mais sur terre, il ne peut y avoir qu’un seul khan."
 GREATEST_OF_KHANS_INFORMATION_STRING: "$become_greatest_of_khans_decision_enable_gok_invasion_cb$\n$gok_enable_offer_submission_or_ruin_tt$\n\n@alert_icon! #alert_trial Si votre [dynasty|El] perd le contrôle de [Story.GetOwner.GetPrimaryTitle.GetName|l], cesse d’être [GetGovernment( 'nomad_government' ).GetName|l] ou ne réussit pas à prendre la [decision|El] de #high $mpo_gok_world_conquest_decision|l$#! d’ici l’an #high [Story.MakeScope.Var('gok_final_date').GetValue|0]#!, ces bonus seront perdus et [Story.GetOwner.GetPrimaryTitle.GetName] risque de connaître la ruine !#!"
