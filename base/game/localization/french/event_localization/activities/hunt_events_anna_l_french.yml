l_french:
 hunt_events_anna.0001.t: "Des racines profondes"
 hunt_events_anna.0001.desc: "Un grand chêne se présente avec sa cime majestueuse, s’étendant loin à la ronde, recouvrant tout ce qui se trouve en dessous dans l’obscurité. En levant les yeux vers ses branches, je pense aux différentes dynasties qui se sont succédé. Tous ceux qui m’ont précédé[ROOT.Char.Custom('FR_E')], et ceux qui transmettront mon héritage après mon départ.\n\nEn m’approchant, je remarque plusieurs initiales gravées sur son écorce, rappelant avec douceur que les gens vont et viennent à travers les âges. Et la personne à qui je voudrais transmettre mon héritage, [love_interest.GetFirstName], est tout pour moi."
 hunt_events_anna.0001.a: "Graver les initiales de [love_interest.GetFirstNameNoTooltip] sur l’écorce"
 hunt_events_anna.0001.b: "Il n’y a pas de temps pour ces bêtises !"
 hunt_events_anna.0001.b.t_toast: "La chasse est ma principale priorité."
 hunt_events_anna.0005.t: "Dépeçage"
 hunt_events_anna.0005.desc: "Ma petite pause est interrompue par un rire moqueur qui se rapproche. Je lève les yeux et, sans grande surprise, je fais face au large sourire de [mocking_participant.GetFirstName]. [mocking_participant.GetSheHe|U] tient dans ses mains ce qui semble être un [ROOT.Char.Custom('SmallAnimal')] mort.\n\n« Je ne vous aurais jamais pris pour quelqu’un capable de survivre seul[ROOT.Char.Custom('FR_E')] dans la nature, alors j’ai pensé que vous auriez besoin d’un peu d’entraînement », dit-[mocking_participant.Custom('FR_IlElle')] d’un ton moqueur en jetant la carcasse à mes pieds."
 hunt_events_anna.0005.a: "Tenter de dépecer l’animal."
 hunt_events_anna.0005.a.toast.good: "Je réussis à dépecer l’animal"
 hunt_events_anna.0005.a.toast.nothing: "Ce qui reste est indiscernable"
 hunt_events_anna.0005.b: "Un peu d’entraînement ? Vous n’y verrez pas d’inconvénient si je..."
 hunt_events_anna.0005.c: "Ce n’est pas à moi de m’occuper d’une tâche aussi insignifiante."
 hunt_events_anna.0010.t: "Pris[ROOT.Char.Custom('FR_E')] au piège dans les profondeurs"
 hunt_events_anna.0010.desc: "À pas lourds et incertains, je traque ma proie dans [ROOT.Char.GetCurrentLocation.Custom('GetTerrainTypePlural')], et tâche de garder le rythme. Un craquement sec résonne dans mes oreilles. Je ressens une soudaine sensation d’apesanteur et un frémissement au creux de mon estomac. La chute s’arrête et l’impact provoque une douleur lancinante dans tout mon corps.\n\nAlors que je regarde autour de moi en gémissant, je ne vois rien d’autre que quatre murs. Je suis tombé[ROOT.Char.Custom('FR_E')] dans un piège et je dois trouver un moyen de remonter."
 hunt_events_anna.0010.a: "Sortir du trou en grimpant."
 hunt_events_anna.0010.a.desc.good: "Je réussis à en sortir"
 hunt_events_anna.0010.a.toast.good: "Je parviens à surmonter la douleur et à sortir"
 hunt_events_anna.0010.a.toast.bad: "Je trébuche une fois de plus et me blesse par la même occasion"
 hunt_events_anna.0010.a.desc.bad: "Je glisse et retombe dans le trou"
 hunt_events_anna.0010.b: "« Y a-t-il quelqu’un ?! »"
 hunt_events_anna.0010.b.flavor: "Le groupe interrompt la chasse et m’aide."
 hunt_events_anna.0015.t: "Inspirez... Expirez..."
 hunt_events_anna.0015.desc: "Un étrange bruit sourd, des murmures et des soupirs occasionnels résonnent dans la clairière. Une silhouette tenant un arc fait les cent pas. Elle semble contrariée par quelque chose.\n\nPour mieux voir ce qui se passe, je me cache derrière un arbre et jette un œil prudent depuis ma cachette. Je vois [Select_CString(child_with_bow.IsFemale,'ma fille','mon fils')] [child_with_bow.GetFirstName], entouré[child_with_bow.Custom('FR_E')] de quelques flèches plantées dans le sol, dont aucune n’a vraiment atteint sa cible. On dirait qu’[child_with_bow.Custom('FR_IlElle')] aurait besoin d’un peu d’aide."
 hunt_events_anna.0015.a: "« Venez, je vais vous montrer... »"
 hunt_events_anna.0015.a.flavor: "Étant moi-même [Select_CString(ROOT.Char.IsFemale,'une chasseuse expérimentée','un chasseur expérimenté')], je devrais pouvoir lui permettre d’améliorer sa posture et sa précision."
 hunt_events_anna.0015.a.toast.good: "[child_with_bow.GetFirstNameNoTooltip] suit mes instructions"
 hunt_events_anna.0015.a.toast.bad: "[child_with_bow.GetFirstNameNoTooltip] ne comprend pas mes instructions"
 hunt_events_anna.0015.b: "L’encourager."
 hunt_events_anna.0015.c: "[child_with_bow.GetFirstNameNoTooltip] doit y arriver [Select_CString(child_with_bow.IsFemale,'toute seule','tout seul')]."
 hunt_events_anna.0015.c.toast: "[child_with_bow.GetFirstNameNoTooltip] trouve un moyen de manier l’arc"
