l_french:
 #Lessons of the heart
 intrigue_events_bjorn.5100.t: "Leçons passionnantes"
 intrigue_events_bjorn.5100.desc: "En observant [Select_CString(the_lover.IsFemale,'ma chère','mon cher')] [the_lover.GetFirstName], je me rends compte que j’ai beaucoup à apprendre d’une personne aussi merveilleuse. Son esprit est comme un trésor à découvrir, et j’ai moi aussi une ou deux choses à lui enseigner.\n\nSans oublier que c’est une façon tellement agréable de passer du temps ensemble !"
 intrigue_events_bjorn.5100.a: "Mon amour a tant à m’apprendre."
 intrigue_events_bjorn.5100.b: "[the_lover.Custom('FR_IlElle')|U] sera [Select_CString(the_lover.IsFemale,'une étudiante charmante','un étudiant charmant')]."
 intrigue_events_bjorn.5100.c: "Passer simplement du temps ensemble me suffit."
 #shared interests
 intrigue_events_bjorn.5101.t: "Objectifs communs"
 intrigue_events_bjorn.5101.desc: "[the_lover.GetFirstName] m’intrigue tellement ! Je veux profiter de ce qui lui procure de la joie.\n\nJe veux passer des jours heureux ensemble :\n\nLes mains qui œuvrent en tandem, des esprits tournés vers des objectifs communs.\n\nNos cœurs battant à l’unisson."
 intrigue_events_bjorn.5101.a: "Montrez-moi ce qui enflamme vos passions, mon amour."
 intrigue_events_bjorn.5101.b: "Venez partager cette joie avec moi."
 intrigue_events_bjorn.5101.c: "Et si on apprenait quelque chose ensemble ?"
 #Dark depths of the soul
 intrigue_events_bjorn.5102.t: "Aimer la part d’ombre"
 intrigue_events_bjorn.5102.desc: "Nous sommes plus proches et nous trouvons désormais à un tournant. Il est peut-être temps de tout partager entre nous, afin de savoir tout ce qu’il y a à savoir. De partager des choses qui, d’habitude, ne sont pas partagées.\n\nIl n’y aura pas de retour possible, alors il est crucial de savoir si [the_lover.GetFirstName] acceptera tout ce qu’il y a à savoir sur moi."
 intrigue_events_bjorn.5102.a: "J’ai des choses à vous montrer."
 intrigue_events_bjorn.5102.b: "Racontez-moi ce que vous n’avez partagé avec personne d’autre."
 intrigue_events_bjorn.5102.c: "Explorons nos fantasmes les plus sombres."
 intrigue_events_bjorn.5102.d: "Non ! Certaines choses ne devraient jamais être révélées."
