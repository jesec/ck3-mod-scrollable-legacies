l_french:
 elder_events.1000.t: "Vous me connaissiez autrefois"
 elder_events.1000.desc: "« [confusion_target.GetFirstName], [Select_CString(confusion_target.IsFemale,'ma chère','mon cher')] [elder.Custom2('RelationToMeShort', SCOPE.sC('confusion_target'))], je suis content[confusion_target.Custom('FR_E')] de vous voir ! » s’exclame m[ROOT.Char.Custom2('FR_RelationToMeShort_OnA', SCOPE.sC('elder'))] [elder.GetFirstName] en me regardant dans les yeux, une lueur de doute derrière son sourire. « Vous avez toujours été [confusion_target.Custom('FR_LeLa')] plus [confusion_target.Custom('ComplimentAdjective')] et je vous adore. »\n\nDans son [GetTrait('withering_mind').GetName( GetNullCharacter )|l], je suis [Select_CString(confusion_target.IsFemale,'sa soeur','son frère')] aujourd’hui...\n\nDemain, je serai peut-être [Select_CString(ROOT.Char.IsFemale,'une étrangère','un étranger')]."
 elder_events.1000.a: "Vous ne me reconnaissez pas ? Je suis [ROOT.Char.GetFirstNameNoTooltip] !"
 elder_events.1000.b: "Hein... Oui, moi aussi je suis content[ROOT.Char.Custom('FR_E')] de vous voir..."
 elder_events.1100.t: "L’escalier vers..."
 elder_events.1100.desc: "J’ai gravi ces marches tant de fois. Pourquoi, alors, ai-je aujourd’hui l’impression d’escalader les montagnes de [mountain_reference.GetName] ?\n\nMes jambes tremblent. Mes genoux me lâchent. Rien ne peut amortir ma chute.\n\nJe dégringole."
 elder_events.1100.a: "Aaahhhh !"
 elder_events.1100.bodyguard: "À l’aide ! Sauvez-moi !"
 EVENT_WINDOW_OPTION_AVAILABLE_BODYGUARD: "Cette option est disponible, car vous avez un [GetCourtPositionType('bodyguard_court_position').GetName()|l]"
 EVENT_WINDOW_OPTION_AVAILABLE_TUTOR: "Cette option est disponible, car vous avez un [GetCourtPositionType('court_tutor_court_position').GetName()|l]"
 partially_mute_modifier: "Presque muet"
 partially_mute_modifier_desc: "Ce personnage a beaucoup de mal à parler en raison de problèmes liés à l’âge."
 elder_events.1200.t: "Engourdissement"
 elder_events.1200.desc: "Cela frappe sans prévenir. Le côté gauche de mon corps s’engourdit. J’essaie de sourire, mais mes lèvres ne bougent pas.\n\nJ’essaie de parler. Je ne peux pas.\n\nFinalement, ma voix revient. Mais la peur [ROOT.Char.GetFaith.NegativeAfterLife3] persiste."
 elder_events.1200.a: "..."
 elder_events.1300.t: "Leçons non retenues"
 elder_events.1300.desc: "Ai-je lu ces parchemins sur [ROOT.Char.Custom('education_scroll_subject')] ? Je... Je ne m’en souviens pas. Peut-être ?\n\nIls faisaient sûrement partie de mes études...\n\nOui. Mes... études..."
 elder_events.1300.a: "Cela ne devait pas être si important..."
 elder_events.1300.tutor: "J’ai besoin d’aide pour me souvenir."
 elder_events.1400.t: "Une bonne culbute"
 elder_events.1400.desc: "« Venez vous coucher, mon amour », susurre m[ROOT.Char.Custom2('FR_RelationToMeShort_OnA', SCOPE.sC('lover'))] [lover.GetFirstName], les yeux brûlants de désir. « Vous n’êtes pas un tant soit peu [Select_CString(ROOT.Char.IsFemale,'curieuse','curieux')] de voir ce que votre [lover.Custom('RaunchyComplimentNoun')] sait faire ? »\n\n[lover.Custom('FR_IlElle')|U] esquisse un sourire malicieux, se mordille la lèvre et s’enfonce dans les draps.\n\n« Je suis tout[lover.Custom('FR_E')] à vous. »"
 elder_events.1400.a: "Un millier de chevaux ne pourraient pas m’arrêter !"
 elder_events.1400.b: "Puisse [ROOT.Char.GetFaith.HealthGodName] me sauver de [Select_CString(lover.IsFemale,'cette femme','cet homme')] !"
 death_best_sex_of_their_life: "a eu une crise cardiaque pendant le meilleur acte sexuel de sa vie"
 purrs: "ronronne"
 growls: "grogne"
 raunchy_little: "petit[ROOT.Char.Custom('FR_E')]"
 raunchy_sweet: "[Select_CString(ROOT.Char.IsFemale,'douce','doux')]"
 raunchy_pretty: "magnifique"
 raunchy_bold: "[Select_CString(ROOT.Char.IsFemale,'audacieuse','audacieux')]"
 raunchy_wild: "sauvage"
 raunchy_fiery: "[Select_CString(ROOT.Char.IsFemale,'fougueuse','fougueux')]"
 raunchy_young: "jeune"
 raunchy_eager: "avide"
 elder_events.1500.t: "Du sexe à en mourir"
 elder_events.1500.desc: "« On m’appelait autrefois \"[lover.Custom('GetRaunchyPrefix')] [lover.Custom('RaunchyComplimentNoun')]\" », soupire [Select_CString(lover.IsFemale,'ma femme','mon mari')], un léger sourire aux lèvres. « Aujourd’hui, j’ai du mal à monter les escaliers sans être essoufflé[lover.Custom('FR_E')]... »\n\nGrâce à ma vigueur juvénile, je pourrais l’aider à se rappeler ce que l’on ressent lorsqu’on est désiré.\n\nCependant, son [GetTrait('faltering_heart').GetName( GetNullCharacter )|l] pourra-t-il le supporter ?"
 elder_events.1500.a: "Je vais lui offrir la meilleure culbute de sa vie !"
 elder_events.1500.b: "Mieux vaut ne pas le faire."
 elder_events.1600.t: "On n’échappe pas au temps qui passe"
 elder_events.1600.desc: "Je cours. Je dois m’arrêter. Je suis déjà essoufflé[ROOT.Char.Custom('FR_E')].\nAvant, je faisais plusieurs fois le tour [ROOT.Char.Custom('FR_ResidenceBuilding_Du')]...\n\nJe recommence. Je tombe presque. Je m’arrête, encore une fois.\n\nMaudit soit ce corps fragile."
 elder_events.1600.a: "La course à pied appartient au passé."
 elder_events.1600.b: "Je dois surmonter la douleur."
