l_french:
 tgp_travel_danger_events.0001.t: "La vie parmi les ruines"
 tgp_travel_danger_events.0001.intro: "Alors que je voyage à travers [ROOT.Char.GetCurrentLocation.GetName], l’impact de l’épouvantable [disaster_situation.GetType.GetNameNoTooltip|l] est partout."
 tgp_travel_danger_events.0001.flood: "Des débris jonchent les berges, des maisons flottent sur le fleuve comme des feuilles dans un ruisseau. Un village entier a été emporté par le courant."
 tgp_travel_danger_events.0001.earthquake: "Les champs autrefois fertiles et le village autrefois animé gisent désormais silencieux, engloutis sous les décombres."
 tgp_travel_danger_events.0001.desc: "\n\nUne fois arrivé[ROOT.Char.Custom('FR_E')] aux abords d’une ville en ruines, j’aperçois un[peasant_character_child.Custom('FR_E')] enfant seul[peasant_character_child.Custom('FR_E')]. [peasant_character_child.Custom('FR_IlElle')|U] ne me remarque pas, alors qu’[peasant_character_child.Custom('FR_IlElle')] tente désespérément de reconstruire ce qui semble avoir été une ferme."
 tgp_travel_danger_events.0001.a: "Mes hommes nettoieront les décombres."
 tgp_travel_danger_events.0001.b: "Je vais prendre soin d[peasant_character_child.Custom('FR_EluiElle')]."
 tgp_travel_danger_events.0001.c: "Je n’ai pas le temps pour ça !"
 impressed_by_kindness: "Impressionné par la gentillesse"
