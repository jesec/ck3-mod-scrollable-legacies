l_french:
 # Flight of the Tai, Mass migration main event
 tgp_tai_migration_event.1000.t: "Fuite des Taïs"
 tgp_tai_migration_event.1000.desc: "Au cours de la réunion du Conseil d’aujourd’hui, j’ai été informé[ROOT.Char.Custom('FR_E')] d’une migration massive de colons taïs. [migration_leader.Custom('FR_le_Char_Pi')|U][migration_leader.GetTitledFirstName], leur représentant[migration_leader.Custom('FR_E')], se tient maintenant devant moi et présente son cas avec humilité.\n\n« [ROOT.Char.Custom('FR_MonseigneurMadame')|U], nous sommes d’anciens sujets [migration_origin_holder.Custom('FR_du_Char_Pi')][migration_origin_holder.GetTitledFirstName] qui cherchons une autorité protectrice et un foyer. Je parle au nom de nombreux clans et de milliers de personnes. Protégez-nous du mal et donnez-nous un but afin que nous puissions être des serviteurs utiles qui méritent votre générosité. »\n\nSon destin est entre mes mains."
 tgp_tai_migration_event.1000.a: "Je vous souhaite à tous la bienvenue, mes sujets."
 tgp_tai_migration_event.1000.b: "Seuls les plus compétents pourront résider dans notre [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip]."
 tgp_tai_migration_event.1000.c: "Plus de personnes entraînent plus de problèmes ; demandez de l’aide ailleurs."
 tgp_tai_migration_event_1000.c_shooed_immigrants_tt: "Les immigrants pourront bientôt demander protection à un autre dirigeant voisin"
 tgp_tai_migration_skilled_development_county_modifier: "Fuite des artisans"
 tgp_tai_migration_migration_happened_county_modifier: "Colons taïs"
 tgp_tai_migration_migration_happened_character_modifier: "A accepté un grand nombre d’immigrants"
 tgp_tai_migration_migration_rejected_character_modifier: "Immigrants refoulés"
 # Lone skilled Tai character offers services
 tgp_tai_migration_event.2000.t: "[Select_CString(migrant_skilled_character.IsFemale,'Une taï talentueuse','Un taï talentueux')]"
 tgp_tai_migration_event.2000.desc: "Un homme compétent, qui prétend être d’origine [migrant_skilled_character.GetCulture.GetNameNoTooltip], se tient devant moi et me demande du travail. Ses manières semblent refléter les nouvelles concernant la fuite de son peuple.\n\n"
 tgp_tai_migration_event.2000.wet_nurse.desc: "« Votre Sainteté, je suis [migrant_skilled_character.Custom('FR_le_Char_Pi')][migrant_skilled_character.GetTitledFirstName], [Select_CString(migrant_skilled_character.IsFemale,'une nourrice expérimentée prête','un nourricier expérimenté prêt')] à vous servir. Je suis en bonne santé, bien nourri[migrant_skilled_character.Custom('FR_E')] et connais les besoins des enfants. Permettez-moi de vous aider à faire prospérer votre lignée. »"
 tgp_tai_migration_event.2000.champion.desc: "« [Select_CString(ROOT.Char.IsFemale,'Glorieuse dame','Glorieux seigneur')], dans mon pays natal, je suis connu[migrant_skilled_character.Custom('FR_E')] sous le nom de [migrant_skilled_character.GetName], [Select_CString(migrant_skilled_character.IsFemale,'une guerrière locale','un guerrier loyal')] et vainqueur de nombreux tournois. Mon bras est sûr et ma loyauté incontestable. Laissez-moi être votre [Select_CString(migrant_skilled_character.IsFemale,'championne','champion')]. »"
 tgp_tai_migration_event.2000.travel_leader.desc: "« [ROOT.Char.Custom('FR_MonseigneurMadame')|U], je suis le [migrant_skilled_character.GetName] et j’ai traversé des déserts avec pour seule carte les étoiles et pour seuls alliés les vents. Sous ma conduite, aucune caravane ne s’est jamais perdue et aucun chemin n’est trop difficile. »"
 tgp_tai_migration_event.2000.master_of_hunt.desc: "« Je suis né[migrant_skilled_character.Custom('FR_E')] pour chasser. Endurci[migrant_skilled_character.Custom('FR_E')] par la nature sauvage, je connais l’odeur de chaque animal et le silence des forêts. Je sais suivre une piste comme personne d’autre. Qu’en dites-vous, [ROOT.Char.Custom('FR_MonseigneurMadame')|U] ? »"
 tgp_tai_migration_event.2000.court_physician.desc: "« Je sais fabriquer des onguents à partir d’anciens manuscrits et je sais travailler sous pression, ce qui fait de moi la seule personne dont vous avez besoin pour apaiser votre corps céleste, [ROOT.Char.Custom('FR_MonseigneurMadame')|U]. On m’appelle [migrant_skilled_character.GetName]. »"
 tgp_tai_migration_event.2000.antiquarian.desc: "« Mes yeux ont vu des mythes et mes mains ont touché d’anciens empires. Permettez-moi de continuer afin que la sagesse des anciens parvienne à votre Cour. »"
 tgp_tai_migration_event.2000.court_tutor.desc: "« J’ai influencé de nombreux guerriers et hommes d’État, [ROOT.Char.Custom('FR_MonseigneurMadame')|U]. Vos descendants accompliront de grandes choses sous ma direction, si vous me le permettez. »"
 tgp_tai_migration_event.2000.end.desc: "\n\n[migrant_skilled_character.Custom('FR_IlElle')|U] semble désespérément en quête de protection, probablement pour les raisons qui l’ont amené[migrant_skilled_character.Custom('FR_E')] ici, mais [migrant_skilled_character.Custom('FR_IlElle')] connaît manifestement son métier. Devrais-je tirer parti de ses compétences ?"
 tgp_tai_migration_event.2000.a: "Je pourrais avoir besoin de vos services."
 tgp_tai_migration_event.2000.b: "Pas maintenant, mais vous devriez rester avec nous."
 tgp_tai_migration_event.2000.b.success: "[migrant_skilled_character.Custom('FR_le_Char_Pi')|U][migrant_skilled_character.GetTitledFirstName] rejoint votre Cour"
 tgp_tai_migration_event.2000.b.failure: "[migrant_skilled_character.Custom('FR_le_Char_Pi')|U][migrant_skilled_character.GetTitledFirstName] refuse votre offre"
 tgp_tai_migration_event.2000.c: "Je dois refuser."
 # Noble Tai character and his family are asking for a spare county
 tgp_tai_migration_event.3000.t: "La proposition d’un père de famille"
 tgp_tai_migration_event.3000.desc: "Un étranger se tenant droit s’approche d’un pas assuré pour faire une proposition administrative.\n\nAprès une salutation étonnamment sincère, contrairement aux manières rustiques habituelles, et un récit détaillé du pénible voyage de sa famille jusqu’à mes terres, il arrive à une conclusion audacieuse.\n\n« ... Des voleurs et des pillards, je vous l’assure, [ROOT.Char.Custom('FR_MonseigneurMadame')|U]. De mes biens volés, il ne me reste que mon talent avéré, ma perspicacité à tout embrasser du regard, ma loyauté et une famille qui a besoin de votre aide. Moi et ma famille serons vos serviteurs jusqu’à ce que vous nous jugiez indignes. »"
 tgp_tai_migration_event.3000.a: "Votre souhait sera exaucé tant que vous resterez loyal."
 tgp_tai_migration_event.3000.b: "Cela ne me semble pas être un échange équitable."
 # A family of lowborn peasant characters offer services
 tgp_tai_migration_event.4000.t: "Une famille taï"
 tgp_tai_migration_event.4000.desc: "Mes gardes amènent une famille étrangère sans ressources venue des terres du nord.\n\nAprès avoir longuement supplié, le chef de famille me regarde droit dans les yeux et offre tout ce qu’il ne possède pas pour nettoyer mon palais en échange de ma protection. À l’instar de cette histoire, il semble que beaucoup de ses semblables parcourent nos contrées dans l’espoir de trouver de nouveaux protecteurs."
 tgp_tai_migration_event.4000.a: "Je vous offre ma protection en ces temps difficiles."
 tgp_tai_migration_event.4000.b: "Ma Cour n’a pas besoin de votre famille."
