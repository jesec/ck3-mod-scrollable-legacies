 #St Peter's Basilica
 building_type_holy_site_st_peters_basilica_01: "$building_holy_site_st_peters_basilica_01$"
 building_type_holy_site_st_peters_basilica_01_desc: "$building_holy_site_st_peters_basilica_01_desc$"
 building_holy_site_st_peters_basilica_01: "Basilique Saint-Pierre"
 building_holy_site_st_peters_basilica_01_desc: "La basilique Saint-Pierre a été construite sur ordre de l’empereur Constantin Ier après sa conversion au christianisme, sur le lieu de sépulture de saint Pierre, sur la colline du Vatican. Elle est le centre du christianisme occidental.\n\nCette église est également le siège traditionnel de l’évêque catholique romain de Rome : le pape. Au fil des siècles, elle est devenue un vaste complexe entouré par les murs léonins."
 #Mont-Saint-Michel
 building_type_mont_st_michel_01: "Mont-Saint-Michel"
 building_type_mont_st_michel_01_desc: "$building_mont_st_michel_01_desc$"
 building_mont_st_michel_01: "Chapelle Saint-Aubert du Mont-Saint-Michel"
 building_mont_st_michel_01_desc: "En 708, saint Aubert, alors évêque d’Avranches, fit un rêve dans lequel l’archange Michel lui demanda de construire une église sur une île voisine accessible à marée basse. Aubert ignora d’abord cette vision, la considérant comme une supercherie du diable. Mais l’archange finit par le convaincre : selon la légende, en lui perçant le crâne avec son doigt. L’évêque ordonna alors la construction d’un nouvel édifice religieux sur le Mont Tombe.\n\nAinsi commença l’histoire du Mont-Saint-Michel."
 building_mont_st_michel_02: "Abbaye romane du Mont-Saint-Michel"
 building_mont_st_michel_02_desc: "La nouvelle église de l’abbaye se trouve au point culminant de l’île, témoignant de la puissance de Dieu sur le ciel et la terre ainsi que de l’ingéniosité des hommes.\n\nSous l’abbaye, un petit village de pèlerins et de pêcheurs se développe lentement."
 building_mont_st_michel_03: "La Merveille"
 building_mont_st_michel_03_desc: "L’abbaye a été agrandie pour inclure une série de cloîtres, une chapelle, une cave à vin, une salle des chevaliers et de nombreux logements, formant un complexe gothique que l’on ne peut qualifier que de merveille architecturale.\n\nL’abbaye dispose également de fortifications impressionnantes et le village à ses pieds est aujourd’hui une petite ville où vivent de nombreux pèlerins et habitants locaux."
 building_mont_st_michel_04: "Monastère fortifié du Mont-Saint-Michel"
 building_mont_st_michel_04_desc: "Les guerres récentes ont clairement montré que même un havre de paix comme le Mont-Saint-Michel pouvait devenir un lieu d’importance stratégique. C’est pourquoi le rocher a été solidement fortifié à l’aide de murs épais et de bastions, et plusieurs nouveaux logements ont été construits pour la garnison.\n\nLe village situé sur la côte est aujourd’hui devenu une ville animée dont les maisons couvrent presque toute l’île."
 #Sanchi Stupa
 building_type_sanchi_stupa_01: "$building_sanchi_stupa_01$"
 building_type_sanchi_stupa_01_desc: "$building_sanchi_stupa_01_desc$"
 building_sanchi_stupa_01: "Grand stupa de Sanchi"
 building_sanchi_stupa_01_desc: "Le grand stupa a été construit par l’empereur Maurya Ashoka au IIIe siècle avant J.-C., près de l’endroit où il a épousé sa femme, Devi. Ce magnifique édifice abrite des reliques de Bouddha et est l’un des plus anciens de ce type. Il est également célèbre pour ses portes Torana finement sculptées."
 #Boudhanath
 building_type_boudhanath_01: "$building_boudhanath_01$"
 building_type_boudhanath_01_desc: "$building_boudhanath_01_desc$"
 building_boudhanath_01: "Bouddhanath"
 building_boudhanath_01_desc: "Le stupa de Bouddha à Katmandou, également connu sous les noms de Jarung Kashor et Khāsa Chaitya, est l’un des plus grands stupas du bouddhisme et est considéré comme le berceau du bouddhisme tibétain. Son immense dôme et ses maisons de mandala abritent les ossements de nombreux bouddhas et d’innombrables reliques sacrées de formes diverses.\n\nEn raison de son emplacement sur une ancienne route commerciale entre le Népal et le Tibet, les voyageurs et les commerçants s’y arrêtent souvent pour se reposer et prier."
 #Grand Mosque of Yazd
 building_type_yazd_mosque_01: "$building_yazd_mosque_01$"
 building_type_yazd_mosque_01_desc: "$building_yazd_mosque_01_desc$"
 building_yazd_mosque_01: "Grande mosquée de Yazd"
 building_yazd_mosque_01_desc: "Ce magnifique édifice, construit à l’emplacement d’un temple du feu datant du IVe siècle, impressionne autant les voyageurs que les pèlerins avec ses grands iwanes, sa coupole carrelée et son majestueux portail d’entrée flanqué de deux minarets vertigineux."
 #Qutb Minar
 building_type_qutb_minar_01: "$building_qutb_minar_01$"
 building_type_qutb_minar_01_desc: "$building_qutb_minar_01_desc$"
 building_qutb_minar_01: "Pilier de fer de Delhi"
 building_qutb_minar_01_desc: "Le puissant pilier de fer de Delhi est un symbole à la gloire du roi Chandragupta II, bien que les souverains ultérieurs y aient également gravé leurs noms. Malgré son ancienneté, il n’y a aucune trace de rouille – un témoignage de l’habileté des ferronniers indiens !"
 building_qutb_minar_02: "Qutb Minar"
 building_qutb_minar_02_desc: "La mosquée Quwwat-ul-Islam, une magnifique mosquée qui entoure l’emplacement de l’ancien pilier de fer de Delhi, est couronnée d’un minaret véritablement gigantesque, le Qutb Minar.\n\nUn monument imposant qui témoigne de la puissance des souverains de Delhi."
 building_qutb_minar_03: "Mosquée Quwwat-ul-Islam agrandie"
 building_qutb_minar_03_desc: "Le complexe qui entoure le Qutb Minar a été agrandi à plusieurs reprises par des cours intérieures, des portes et des mausolées, atteignant ainsi des dimensions légendaires."
 building_qutb_minar_04: "Alai Minar"
 building_qutb_minar_04_desc: "Un deuxième minaret a été ajouté au complexe, inspiré du Qutb Minar, mais deux fois plus grand. Ce colosse qui domine Delhi est le summum de l’architecture indo-islamique."
