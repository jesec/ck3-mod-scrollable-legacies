l_french:
 #Goguryeo Tomb
 building_type_goguryeo_tomb_01: "$building_goguryeo_tomb_01$"
 building_type_goguryeo_tomb_01_desc: "$building_goguryeo_tomb_01_desc$"
 building_goguryeo_tomb_01: "Tombeau d’un roi Goguryeo"
 building_goguryeo_tomb_01_desc: "Ce grand tombeau rectangulaire en pierre de taille aurait appartenu à un roi antique de Goguryeo dont le nom a été oublié. Les couloirs qui mènent au tombeau sont ornés de fresques colorées et, au sommet de la pyramide, s’élève un petit pavillon en bois en l’honneur du défunt."
 #Great Buddha of Kamakura
 building_type_buddha_kamakura_01: "$building_buddha_kamakura_01$"
 building_type_buddha_kamakura_01_desc: "$building_buddha_kamakura_01_desc$"
 building_buddha_kamakura_01: "Grand Bouddha de Kamakura"
 building_buddha_kamakura_01_desc: "Le #italic Daibutsu#! de Kamakura est une vénérable statue en bronze du Bouddha Amitābha, pesant plusieurs tonnes et décorée de détails dorés. Elle se trouve dans un grand hall inspiré des temples du sud-ouest et est entourée de trente-deux pétales de lotus."
 #Lingapura Pyramid
 building_type_pyramid_lingapura_01: "$building_pyramid_lingapura_01$"
 building_type_pyramid_lingapura_01_desc: "$building_pyramid_lingapura_01_desc$"
 building_pyramid_lingapura_01: "Pyramide Lingapura"
 building_pyramid_lingapura_01_desc: "Cette grande pyramide à degrés s’élève de la jungle, telle une montagne sacrée ; chacune de ses sept terrasses abritant des sanctuaires et des autels de plus en plus ornés. Le sanctuaire supérieur couronne la structure et protège le #italic lingam#! sacré de Shiva, centre d’un plan axial complexe de conception religieuse."
 #Maijishan Grottoes
 building_type_maijishan_grottoes_01: "$building_maijishan_grottoes_01$"
 building_type_maijishan_grottoes_01_desc: "$building_maijishan_grottoes_01_desc$"
 building_maijishan_grottoes_01: "Grottes de Maijishan"
 building_maijishan_grottoes_01_desc: "La montagne de Maijishan est depuis longtemps un lieu de vénération. Le long de ses falaises méridionales, considérées comme géomantiquement propices, des centaines de sanctuaires ont été creusés dans la roche rougeâtre, abritant des statues et des fresques colorées de bouddhas et de bodhisattvas sereins. Nombre d’entre eux ont été commandés par les familles urbaines voisines, pour lesquelles le site est un lieu occasionnel de pèlerinage et de contemplation méditative."
 #Three Pagodas of Dali
 building_type_three_pagodas_dali_01: "$building_three_pagodas_dali_01$"
 building_type_three_pagodas_dali_01_desc: "$building_three_pagodas_dali_01_desc$"
 building_three_pagodas_dali_01: "Trois pagodes de Dali"
 building_three_pagodas_dali_01_desc: "Dans le vaste complexe de temples de la famille régnante de la ville se dressent trois hautes pagodes faites de murs de briques et de piédestaux de pierre. Elles sont les extrémités d’un triangle isocèle, marquant la géométrie sacrée du site et encadrant les montagnes et le lac environnants."
 #Iron Lion of Cangzhou
 building_type_iron_lion_cangzhou_01: "$building_iron_lion_cangzhou_01$"
 building_type_iron_lion_cangzhou_01_desc: "$building_iron_lion_cangzhou_01_desc$"
 building_iron_lion_cangzhou_01: "Lion en fer de Cangzhou"
 building_iron_lion_cangzhou_01_desc: "Ce lion monumental est la plus grande sculpture en fonte de toute la Chine. Sur son dos solide repose un bodhisattva posé délicatement sur un piédestal en forme de lotus et richement décoré de détails dorés. Situé à proximité d’une plaine inondable, il est devenu un gardien contre les marées montantes pour les habitants de la région."
 #Gaocheng Observatory
 building_type_dengfeng_observatory_01: "$building_dengfeng_observatory_01$"
 building_type_dengfeng_observatory_01_desc: "$building_dengfeng_observatory_01_desc$"
 building_dengfeng_observatory_01: "Observatoire de Gaocheng"
 building_dengfeng_observatory_01_desc: "Ce site est privilégié pour l’observation astronomique depuis des siècles, en raison de ses qualités géomanciennes et de sa centralité géographique symbolique en Chine. Le bâtiment actuel a une forme trapézoïdale complexe et sert également d’énorme cadran solaire : il projette son ombre dans le fossé qui divise la plate-forme, indiquant ainsi la position du soleil."
 #Candi of Muara Takus
 building_type_muara_takus_01: "$building_muara_takus_01$"
 building_type_muara_takus_01_desc: "$building_muara_takus_01_desc$"
 building_muara_takus_01: "Candi de Muara Takus"
 building_muara_takus_01_desc: "Les nombreuses structures du complexe religieux sont toutes construites en briques et ornées de détails en grès. Au centre se dressent les grands stupas de #italic Mahligai#! et de #italic Tuo#!. Le premier, grand et élancé, et le second, large comme une montagne, dominent les sanctuaires plus petits et les terrasses qui les entourent."
 #Stone Pagoda of Mireuksa
 building_type_stone_pagoda_01: "$building_stone_pagoda_01$"
 building_type_stone_pagoda_01_desc: "$building_stone_pagoda_01_desc$"
 building_stone_pagoda_01: "Pagode en pierre de Mireuksa"
 building_stone_pagoda_01_desc: "Une pagode de neuf étages qui se dresse sur un large socle de pierre, dont la maçonnerie pâle brille sous le ciel ensoleillé. C’est la première des pagodes en pierre de Corée, et sa forme et ses proportions équilibrées en ont fait un modèle pour les bâtisseurs de temples de toute la péninsule."
 #Thuriang Kilns
 building_type_thuriang_kilns_01: "$building_thuriang_kilns_01$"
 building_type_thuriang_kilns_01_desc: "$building_thuriang_kilns_01_desc$"
 building_thuriang_kilns_01: "Fours de Thuriang"
 building_thuriang_kilns_01_desc: "Plus de deux cents grands fours couvrent le site, le plus grand centre de production de céladon de la région. Les céramiques cuites ici sont connues pour leur texture grossière et dure et leur glaçure jaune-vert caractéristique. Elles sont commercialisées sur tous les marchés d’Asie du Sud-Est."
 #Yuelu Academy
 building_type_yuelu_academy_01: "$building_yuelu_academy_01$"
 building_type_yuelu_academy_01_desc: "$building_yuelu_academy_01_desc$"
 building_yuelu_academy_01: "Académie Yuelu"
 building_yuelu_academy_01_desc: "Yuelu, l’une des plus prestigieuses académies de Chine, est depuis longtemps un centre d’étude et d’examen. Son agencement s’articule autour d’une cour principale à partir de laquelle s’étendent, dans une symétrie équilibrée, des salles et des pavillons corollaires, où des érudits se préparent à la fonction publique."
 #Chocolate Hills #NOTE: today are called "Chocolate" Hills, but of course chocolate didn't exist in the Philippines back then. This is a random name I thought out, but it is not based on native names (none of which seem to have survived from then)
 building_type_chocolate_hills_01: "$building_chocolate_hills_01$"
 building_type_chocolate_hills_01_desc: "$building_chocolate_hills_01_desc$"
 building_chocolate_hills_01: "Flancs roux"
 building_chocolate_hills_01_desc: "Cette formation géologique se caractérise par un grand nombre de collines arrondies et coniques qui s’étendent uniformément dans le paysage. Elles sont recouvertes d’une couche d’herbe qui, pendant la saison sèche, prend des teintes vives de brun et d’orange, donnant au terrain une couleur automnale inhabituelle."
 #Fanfang of Guangzhou
 building_type_fanfang_guangzhou_01: "$building_fanfang_guangzhou_01$"
 building_type_fanfang_guangzhou_01_desc: "$building_fanfang_guangzhou_01_desc$"
 building_fanfang_guangzhou_01: "Fanfang de Guangzhou"
 building_fanfang_guangzhou_01_desc: "Le #italic fanfang#! est une importante communauté de marchands étrangers – principalement des Arabes et des Perses musulmans venus par les routes commerciales maritimes – qui s’est vu accorder son propre quartier à l’ouest de la ville, avec ses propres fonctionnaires et ses propres coutumes. En son centre se dresse une mosquée aux murs rouges, couronnée d’un haut minaret et d’un phare qui guident les navires et les âmes vers la sécurité du port."
 #Wilwatikta Palace
 building_type_wilwatikta_palace_01: "$building_wilwatikta_palace_01$"
 building_type_wilwatikta_palace_01_desc: "$building_wilwatikta_palace_01_desc$"
 building_wilwatikta_palace_01: "Palais de Wilwatikta"
 building_wilwatikta_palace_01_desc: "Ensemble palatial de pavillons, salles, temples et cours, Wilwatikta est suffisamment vaste pour ressembler à une ville à part entière. Des murs rectangulaires en briques entourent le terrain, et l’entrée de l’avenue de procession est marquée par une série d’imposantes portes #italic Paduraksa#!."
 #Ha Long Bay
 building_type_ha_long_bay_01: "$building_ha_long_bay_01$"
 building_type_ha_long_bay_01_desc: "$building_ha_long_bay_01_desc$"
 building_ha_long_bay_01: "Baie d’Along"
 building_ha_long_bay_01_desc: "Ce paysage étonnant d’îlots karstiques et calcaires émerge des eaux calmes et émeraude du golfe, où les pêcheurs locaux dérivent à la recherche de prises à l’ombre des piliers."
 #My Son Sanctuary
 building_type_my_son_sanctuary_01: "$building_my_son_sanctuary_01$"
 building_type_my_son_sanctuary_01_desc: "$building_my_son_sanctuary_01_desc$"
 building_my_son_sanctuary_01: "Sanctuaire de My Son"
 building_my_son_sanctuary_01_desc: "Le plus grand et le plus raffiné des complexes religieux Cham, ce sanctuaire est composé d’une série d’enceintes les unes à côté des autres dans la forêt, chacune avec ses propres portes, sanctuaires et stupas. Les structures sont toutes construites en briques rouges, disposées selon des motifs géométriques et décorées de linteaux en grès."
 #Gunung Api
 building_type_gunung_api_01: "$building_gunung_api_01$"
 building_type_gunung_api_01_desc: "$building_gunung_api_01_desc$"
 building_gunung_api_01: "Gunung Api"
 building_gunung_api_01_desc: "Cette montagne qui s’élève au milieu de la jungle sauvage est sacrée pour les habitants locaux. Dans l’humidité et la brume, ses pentes sont couvertes de pics calcaires impressionnants et de grottes profondes que l’eau a sculptées au fil des siècles."
 #Suwalesi Megaliths
 building_type_suwalesi_megaliths_01: "$building_suwalesi_megaliths_01$"
 building_type_suwalesi_megaliths_01_desc: "$building_suwalesi_megaliths_01_desc$"
 building_suwalesi_megaliths_01: "Mégalithes de Sulawesi"
 building_suwalesi_megaliths_01_desc: "Dans les vallées du Sulawesi central se trouvent de nombreuses figures et icônes mégalithiques élevées par la population locale pour des rituels et honorer les esprits. Ces effigies, connues sous le nom d’#italic arcas#!, sont sculptées avec une précision minimaliste, leurs formes étant tracées avec des lignes subtiles et élégantes."
 #Izumo Taisha
 building_type_izumo_taisha_01: "$building_izumo_taisha_01$"
 building_type_izumo_taisha_01_desc: "$building_izumo_taisha_01_desc$"
 building_izumo_taisha_01: "Kizuki Taisha"
 building_izumo_taisha_01_desc: "Ce grand sanctuaire shintoïste – un #italic taisha#! – a été construit près du rivage, face à la mer. Il repose sur d’énormes piliers de bois, plaçant ses salles bien au-dessus du sol où marchent les mortels, et dans le ciel où vivent les dieux et les esprits de la terre."
 #Temple of Confucius
 building_type_confucius_temple_01: "$building_confucius_temple_01$"
 building_type_confucius_temple_01_desc: "$building_confucius_temple_01_desc$"
 building_confucius_temple_01: "Temple de Confucius"
 building_confucius_temple_01_desc: "Le plus ancien et le plus influent de tous les temples confucéens. Ce vaste ensemble de salles et de cours a été une référence et une source d’inspiration pour les bâtisseurs de temples dans toute la Chine et au-delà, en raison de sa disposition géométrique harmonieuse et ses détails raffinés. À proximité, une forêt paisible abrite les tombes de Confucius et de ses descendants, qui constituent un important lieu de pèlerinage."
 #Imperial Citadel of Lin'an
 building_type_citadel_linan_01: "$building_citadel_linan_01$"
 building_type_citadel_linan_01_desc: "$building_citadel_linan_01_desc$"
 building_citadel_linan_01: "Citadelle impériale de Lin’an"
 building_citadel_linan_01_desc: "Construite sur le versant nord de la colline du Phénix, la citadelle impériale sert de siège à la cour et à son administration, accueillant d’innombrables érudits et fonctionnaires dans ses salles et couloirs caverneux. Bien qu’elle ne soit pas aussi vaste que les palais des capitales du nord, le raffinement et l’élégance de ses jardins en terrasses et de ses pavillons n’ont rien à leur envier."
 #The Temples of Angkor
 building_type_temples_angkor_01: "$building_temples_angkor_01$"
 building_type_temples_angkor_01_desc: "$building_temples_angkor_01_desc$"
 building_temples_angkor_01: "Temples d’Angkor"
 building_temples_angkor_01_desc: "Dans la prospère cité d’Indra, on ne compte plus les toits dorés et les pinacles des temples, tous plus somptueusement décorés les uns que les autres de reliefs sculptés et de statues de divinités et Devarajas."
 building_temples_angkor_02: "Angkor Vat"
 building_temples_angkor_02_desc: "Angkor Vat est un immense temple dédié au dieu Vishnou. Il a été conçu comme une réplique du mont Meru, la terre des dieux dans la mythologie hindoue. Le site est entouré d’un impressionnant fossé et de plusieurs galeries de temples qui regorgent d’art religieux, de sculptures et de reliefs."
