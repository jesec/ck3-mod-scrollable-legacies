 SPOUSES_OF_CHILDERN_KP: "Conjoints des enfants"
 COURT_POSITIONS_KP: "Postes de la Cour"
 COURT_POSITIONS_TT: "Interdire les postes de non combat.\nLe [GetCourtPositionType('bodyguard_court_position').GetName|l] et le [GetCourtPositionType('garuda_court_position').GetName|l] sont exclus et toujours autorisés à être des [knights|el], puisqu’ils sont censés aider dans les batailles"
 HBOX_DOCTRINE_FAITH_TT: "#T [FaithDoctrine.GetNameNoTooltip( Faith.Self )]#!\n[FaithDoctrine.GetEffectsDescription( Faith.Self )]\n\n[FaithDoctrine.GetDescription( Faith.Self )|F]"
 KNIGHT_RESTRICTIONS: "D’autres restrictions s’appliquent"
 #this is can_be_knight_trigger in 00_war_and_peace_triggers.txt
 KNIGHT_RESTRICTIONS_TT: "#T Restrictions pour être chevalier#!\nSeuls vos [vassals|el] directs, [courtiers|el] ou [followers|el] peuvent être [knights|el].\nVotre [culture|el] ou [faith|el] détermine quels sexes peuvent être [knights|el].\n\nUn chevalier ne peut pas être :\n – joueur, [child|el], [prisoner|el] ou [GetTrait('incapable').GetName(GetPlayer.Self)|l]\n – membre du [clergy|el] (sauf si la [faith|el] ou la [culture|el] le permet)\n – [master_assassin|el] ou [GetTrait('blind').GetName(GetPlayer.Self)|l] (sauf si la [culture|el] le permet ou s’il est [GetTrait('order_member').GetName(GetPlayer.Self)|l])\n – [diarch|el] or [ceremonial_liege|el]\n – [governor|el] d’un [duchy|el] (ou [title|el] plus élevé) ou [Concept('house_head', 'chef de Maison')|E] d’une [noble_family|el]\n\nLes [traditions|el] et événements culturels peuvent lever certaines restrictions"
 KP_CULTURE_MINIMUM_PROWESS: "@alert_icon! Votre [culture|el] nécessite au moins 12 en [prowess|el]"
 KP_CULTURE_ADMIN_FAMILY_KNIGHTS: "@check_icon! Votre [culture|el] lève certaines restrictions de sexe pour les [wars|el] défensives"
 KP_CULTURE_HIGH_PROWESS: "@check_icon! Votre [culture|el] lève la plupart des restrictions pour les [knights|el] ayant au moins 10 en [prowess|el]"
