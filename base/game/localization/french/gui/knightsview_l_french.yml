 KNIGHT_PERMISSIONS_SHORT: "Conditions"
 KNIGHT_PERMISSIONS_TT: "Gérer qui peut être $knight_singular_tt|l$[AddLocalizationIf(Not( KnightsView.GetKnightPermissions.IsDefault), 'KNIGHT_PERMISSIONS_SET')]"
 KNIGHT_PERMISSIONS_SET: "\n#warning Certains filtres sont actifs !#!"
 YOUR_KNIGHT_PERMISSIONS: "Fixez les conditions pour être $knight_singular_tt|l$.\nLes $knight_plural|l$ [Concept('acclaimed', 'proclamés')|E] ou forcés ne sont pas affectés."
 MINIMUM_PROWESS: "Prouesse minimale"
 DECREASE_MIN_PROWESS_KP: "Diminuer le minimum requis de [prowess|el] pour les [knights|el]\n#i Faites un clic droit pour diminuer de 10"
 INCREASE_MIN_PROWESS_KP: "Augmenter le minimum requis de [prowess|el] pour les [knights|el]\n#i Faites un clic droit pour augmenter de 10"
