 ### Battle Poi - BP3
 TRAVEL_POINT_OF_INTEREST_TT_poi_battles: "#T La bataille de $BattlePoiProvince$#!\n$BattlePoiInfo$\n$BattlePoiDescription$\n\n"
 BattlePoiInfo: "#emp $BattlePoiVictoriousSide$\n$BattlePoiLosingSide$\n$BattlePoiDate$#!"
 BattlePoiVictoriousSide: "Vainqueur : [Province.MakeScope.Var('battle_poi_winner').Char.GetName]"
 BattlePoiLosingSide: "Vaincu : [Province.MakeScope.Var('battle_poi_loser').Char.GetName]"
 BattlePoiDate: "Date : [Province.Custom('OrdinalIndicatorPoI')] [Province.Custom('MonthBattlePoI')], [Province.MakeScope.Var('battle_poi_date_year').GetValue]"
 BattlePoiDescription: "#weak [Province.Custom('BattlePoIDescriptionLocIntro')] [Province.Custom('BattlePoIDescriptionLocMid')] [Province.Custom('BattlePoIDescriptionLocOutcome')] [Province.Custom('BattlePoIDescriptionLocOutro')]#!"
 poi_battles.visit: "A visité le site de la bataille de [province.GetNameNoTooltip]"
 poi_battles.learn: "A appris de la bataille de [province.GetNameNoTooltip]"
 OrdinalIndicatorPoIST: "[Province.MakeScope.Var('battle_poi_date_day').GetValue]"
 OrdinalIndicatorPoIND: "[Province.MakeScope.Var('battle_poi_date_day').GetValue]"
 OrdinalIndicatorPoIRD: "[Province.MakeScope.Var('battle_poi_date_day').GetValue]"
 OrdinalIndicatorPoIFallback: "[Province.MakeScope.Var('battle_poi_date_day').GetValue]"
 BattlePoiProvince: "[Province.GetNameNoTooltip]"
 BattlePoiCommander: "[Province.MakeScope.Var('battle_poi_winner').Char.Custom('FR_le_Char_Pi')][Province.MakeScope.Var('battle_poi_winner').Char.GetTitledFirstNameNoTooltip]"
 BattlePoiCommanderHisHer: "[Province.MakeScope.Var('battle_poi_winner').Char.GetHerHis]"
 BattlePoiCommanderCulture: "[Province.MakeScope.Var('battle_poi_winner').Char.GetCulture.GetNameNoTooltip]"
 BattlePoiEnemyCommander: "[Province.MakeScope.Var('battle_poi_loser').Char.Custom('FR_le_Char_Pi')][Province.MakeScope.Var('battle_poi_loser').Char.GetTitledFirstNameNoTooltip]"
 BattlePoiEnemyCommanderSheHe: "[Province.MakeScope.Var('battle_poi_loser').Char.GetSheHe]"
 BattlePoiEnemyCommanderHisHer: "[Province.MakeScope.Var('battle_poi_loser').Char.GetHerHis]"
 BattlePoiEnemyCommanderCulture: "[Province.MakeScope.Var('battle_poi_loser').Char.GetCulture.GetNameNoTooltip]"
 BattlePoiBraveKnight: "[Province.MakeScope.Var('battle_poi_brave_knight').Char.Custom('FR_le_Char_P')][Province.MakeScope.Var('battle_poi_brave_knight').Char.GetName]"
 #Intro
 BattlePoiDescriptionIntro1: "Les deux camps se sont affrontés en $BattlePoiProvince$, l’un mené par $BattlePoiCommander$, l’autre par $BattlePoiEnemyCommander$."
 BattlePoiDescriptionIntroAttacker2: "$BattlePoiCommander|U$ a mené une attaque audacieuse contre $BattlePoiEnemyCommander$."
 BattlePoiDescriptionIntroDefender2: "$BattlePoiCommander|U$ a réalisé de main de maître une défense contre $BattlePoiEnemyCommander$ et son armée."
 BattlePoiDescriptionIntroAttackerFallback: "$BattlePoiCommander|U$ a bravement mené la charge de ses troupes contre l’armée $BattlePoiEnemyCommanderCulture$, $BattlePoiEnemyCommander$ à sa tête."
 BattlePoiDescriptionIntroDefenderFallback: "$BattlePoiCommander|U$ a bravement mené ses troupes en défense contre l’armée $BattlePoiEnemyCommanderCulture$, $BattlePoiEnemyCommander$ à sa tête."
 #Key Moment
 BattlePoiDescriptionLocArchers: "Le moment décisif de la bataille est arrivé lorsque les archers [Province.MakeScope.Var('battle_poi_winner').Char.GetCulture.GetCollectiveNounNoTooltip|l] ont réussi à prendre l’ennemi en tenaille, "
 BattlePoiDescriptionLocHeavyInfantry: "L’issue de la bataille a été connue lorsqu’un régiment d’infanterie lourde $BattlePoiCommanderCulture$ a percé les lignes ennemies,"
 BattlePoiDescriptionLocLightCavalry: "L’issue de la bataille a été connue lorsque la cavalerie $BattlePoiCommanderCulture$ a pu passer à l’arrière des troupes ennemies,"
 BattlePoiDescriptionLocHeavyCavalry: "La bataille a pris fin lorsque la cavalerie $BattlePoiCommanderCulture$ a pénétré au cœur de la formation ennemie,"
 BattlePoiDescriptionLocPikemen: "Sa victoire fut assurée lorsque les piquiers [Province.MakeScope.Var('battle_poi_winner').Char.GetCulture.GetCollectiveNounNoTooltip|l] ont repoussé la charge ennemie,"
 BattlePoiDescriptionLocArchersKnight: "Le moment décisif fut lorsque les archers [Province.MakeScope.Var('battle_poi_winner').Char.GetCulture.GetCollectiveNounNoTooltip|l] menés par $BattlePoiBraveKnight$ ont réussi à prendre l’ennemi en tenaille, "
 BattlePoiDescriptionLocHeavyInfantryKnight: "L’issue de la bataille a été connue lorsqu’un régiment d’infanterie lourde mené par $BattlePoiBraveKnight$ a percé les lignes ennemies,"
 BattlePoiDescriptionLocLightCavalryKnight: "L’issue de la bataille a été connue lorsque la cavalerie $BattlePoiCommanderCulture$ menée par $BattlePoiBraveKnight$ a pu passer à l’arrière des troupes ennemies,"
 BattlePoiDescriptionLocHeavyCavalryKnight: "La bataille a pris fin lorsque la cavalerie $BattlePoiCommanderCulture$ menée par $BattlePoiBraveKnight$ a pénétré au cœur de la formation ennemie,"
 BattlePoiDescriptionLocPikemenKnight: "Sa victoire fut assurée lorsque les piquiers [Province.MakeScope.Var('battle_poi_winner').Char.GetCulture.GetCollectiveNounNoTooltip|l] mené par $BattlePoiBraveKnight$ ont repoussé la charge ennemie,"
 BattlePoiDescriptionLocVarangian: "La bataille a pris fin lorsqu’un groupe de varègues mené par $BattlePoiBraveKnight$ a traversé les lignes jusqu’au cœur de la formation ennemie,"
 BattlePoiDescriptionLocBerserker: "Le cours de cette bataille s’est inversé de manière inattendue lorsque $BattlePoiBraveKnight$ a traversé le rangs [Province.MakeScope.Var('battle_poi_loser').Char.GetCulture.GetCollectiveNounNoTooltip|l],"
 BattlePoiDescriptionLocMidFallback: "L’épuisement a gagné chaque camp, mais à la fin les [Province.MakeScope.Var('battle_poi_winner').Char.GetCulture.GetCollectiveNounNoTooltip|l] ont encerclé l’ennemi,"
 #Outcome
 BattlePoiDescriptionLocOutcomeBerserker: "a à lui seul brisé le moral ennemi en tuant plusieurs dizaines de guerriers,"
 BattlePoiDescriptionLocOutcomeBerserkerFled: "et à lui seul, a brisé le moral de l’ennemi en tuant plusieurs dizaines de guerriers."
 BattlePoiDescriptionLocOutcomeDevastation: "détruit les ennemis,"
 BattlePoiDescriptionLocOutcomeDevastationFled: "et détruit l’armée ennemie."
 BattlePoiDescriptionLocOutcomeChaos: "infligé des pertes importantes aux ennemis,"
 BattlePoiDescriptionLocOutcomeChaosFled: "et infligé des pertes importantes aux ennemis."
 BattlePoiDescriptionLocOutcomeLoss: "brisé le moral des ennemis,"
 BattlePoiDescriptionLocOutcomeLossFled: "et brisé le moral des ennemis."
 #Outro
 BattlePoiDescriptionLocOutroImprisoned: "et capturé $BattlePoiEnemyCommander$."
 BattlePoiDescriptionLocOutroSlain: "et tué $BattlePoiEnemyCommander$."
 BattlePoiDescriptionLocOutroFledChaos: "Profitant du chaos, $BattlePoiEnemyCommander$ a réussi à s’échapper avec ses plus proches compagnons."
 BattlePoiDescriptionLocOutroFledOrganized: "Malgré des pertes importantes, $BattlePoiEnemyCommander$ a réussi à organiser une retraite stratégique."
 MonthBattlePoIJanuary: "janvier"
 MonthBattlePoIFebruary: "février"
 MonthBattlePoIMarch: "mars"
 MonthBattlePoIApril: "avril"
 MonthBattlePoIMay: "mai"
 MonthBattlePoIJune: "juin"
 MonthBattlePoIJuly: "juillet"
 MonthBattlePoIAugust: "août"
 MonthBattlePoISeptember: "septembre"
 MonthBattlePoIOctober: "octobre"
 MonthBattlePoINovember: "novembre"
 MonthBattlePoIDecember: "décembre"
 #Historical Battles
 TRAVEL_POINT_OF_INTEREST_TT_poi_battles_historical: "#T $TRAVEL_POINT_OF_INTEREST_TT_poi_battles_historical_name$#!\n$TRAVEL_POINT_OF_INTEREST_TT_poi_battles_historical_desc$\n\n"
 TRAVEL_POINT_OF_INTEREST_TT_poi_battles_historical_name: "[Province.Custom('BattlePoiNameHistorical')]"
 TRAVEL_POINT_OF_INTEREST_TT_poi_battles_historical_desc: "[Province.Custom('BattlePoIDescriptionHistorical')]"
 travel_point_historical_name_visit_message: "[ROOT.Char.GetCurrentLocation.Custom('BattlePoiNameHistorical')]"
 BattlePoIHistoricalNameTours: "Bataille de Poitiers"
 BattlePoIHistoricalDescTours: "#emp Vainqueur : [GetScriptedCharacterByHistoryID( '131721' ).GetFirstNameNicknamed]\nVaincu : Abd al-Rahman al-Ghafiqi\nDate : 10 octobre 732#!\n#weak La bataille au cours de laquelle Charles Martel a repoussé l’invasion omeyyade de la France sur les rivières du Clain et de la Vienne. On dit que les hommes de Charles étaient aussi inébranlables qu’un mur et que la cavalerie lourde omeyyade qui se précipitait vers eux est venue s’y écraser. Après le repérage et l’élimination du commandant adverse, le reste des troupes s’est enfui du champ de bataille.#!"
 BattlePoIHistoricalNameLechfeld: "Bataille de Lechfeld"
 BattlePoIHistoricalDescLechfeld: "#emp Vainqueur : [GetScriptedCharacterByHistoryID( '1282' ).GetTitledFirstName]\nVaincu : [GetScriptedCharacterByHistoryID( '460' ).GetFirstName] [GetScriptedCharacterByHistoryID( '460' ).GetDynastyName]\nDate : 10 août 955#!\n#weak Une bataille brutale entre les forces du roi saxon Otto et les forces hongroises. Après des pertes écrasantes des deux côtés, les Hongrois ont pris la fuite juste avant d’être encerclés, ce qui a scellé leur sort.\n\nAprès la bataille, de nombreux commandants hongrois ont été capturés et exécutés, mais la menace permanente des Magyars sur l’Europe occidentale a pris fin.#!"
 BattlePoIHistoricalNameHastings: "Bataille d’Hastings"
 BattlePoIHistoricalDescHastings: "#emp Vainqueur : [GetScriptedCharacterByHistoryID( '140' ).GetFirstName] [GetScriptedCharacterByHistoryID( '140' ).GetDynastyName]\nVaincu : [GetScriptedCharacterByHistoryID( '122' ).GetFullName]\nDate : 14 octobre 1066#!\n#weak La bataille d’Hastings a été décisive dans l’ascension de Guillaume vers le pouvoir en Angleterre. L’armée normande, forcée de se battre sur une pente, ne progressait guère, au point même de devoir reculer. Une contre-attaque réussie de Guillaume a finalement eu raison des troupes anglaises.\n\nSubmergés par les forces ennemies, Harold est mort avec ses deux frères, [GetScriptedCharacterByHistoryID( '132' ).GetFirstNameNoTooltip] et [GetScriptedCharacterByHistoryID( '130' ).GetFirstNameNoTooltip], laissant le trône d’Angleterre vacant.#!"
 BattlePoIHistoricalNameStamfordBridge: "Bataille de Stamford Bridge"
 BattlePoIHistoricalDescStamfordBridge: "#emp Vainqueur : [GetScriptedCharacterByHistoryID( '122' ).GetFullName]\nVaincu : [GetScriptedCharacterByHistoryID( '102531' ).GetNameNicknamed]\nDate : 25 septembre 1066#!\n#weak La bataille de Stamford Bridge a été l’une des batailles décisives entre les trois prétendants au trône d’Angleterre : Guillaume de Normandie, Harald de Norvège et Harold d’Angleterre. Harold s’est précipité avec ses hommes vers le nord et a ainsi pu prendre de court les troupes norvégiennes.\n\nHarald a été mortellement touché à la gorge par une flèche et son allié anglais [GetScriptedCharacterByHistoryID( '124' ).GetFirstNameNoTooltip], frère d’Harold, a également été abattu. L’armée norvégienne, privée de ses commandants, n’a pas tardé à être écrasée.#!"
 BattlePoIHistoricalNameManzikert: "Bataille de Manzikert"
 BattlePoIHistoricalDescManzikert: "#emp Vainqueur : [GetScriptedCharacterByHistoryID( '3040' ).GetFirstName] [GetScriptedCharacterByHistoryID( '3040' ).GetDynastyName]\nVaincu : [GetScriptedCharacterByHistoryID( '1734' ).GetFullName]\nDate : 26 août 1071#!\n#weak Couronné empereur de l’Empire byzantin, Romanos a mené une campagne contre les incursions turques en Anatolie. Après des succès limités, il poussa à une victoire décisive lors d’une bataille contre Arp Arslan de l’empire seldjoukide à Manzikert.\n\nTrahi par ses commandants, qui se sont retirés avec une grande partie de l’armée, Romanos a finalement été capturé par les troupes musulmanes. Lorsque l’ennemi l’a libéré, il a été destitué, aveuglé, banni et a finalement succombé à ses blessures.#!"
 BattlePoIHistoricalNameYarmuk: "Bataille du Yarmouk"
 BattlePoIHistoricalDescYarmuk: "#emp Vainqueur : [GetScriptedCharacterByHistoryID( '163015' ).GetFullName]\nVaincu : [GetScriptedCharacterByHistoryID( '145071' ).GetFullName]\nDate : 20 août 636#!\n#weak La bataille du Yarmouk est l’une des batailles les plus décisives de l’histoire byzantine. Cette défaite décisive a entraîné la perte de la Syrie et de l’Égypte, puis la grande expansion de l’empire arabe.\n\nLa bataille, qui a duré six jours, semblait initialement se retourner contre les envahisseurs musulmans, mais à l’aube du cinquième jour, l’armée est passée d’une stratégie défensive à une stratégie offensive. Le sixième jour, la cavalerie s’est lancée dans un assaut audacieux qui a complètement brisé l’armée byzantine.\n\nLe moral en berne, les soldats byzantins tombaient dans des ravins, se noyaient ou été écrasés dans leur fuite par les soldats ennemis.#!"
 BattlePoIHistoricalNameDandanaqan: "Bataille de Dandanaka"
 BattlePoIHistoricalDescDandanaqan: "#emp Vainqueur : [GetScriptedCharacterByHistoryID( '3036' ).GetFullName]\nVaincu : [GetScriptedCharacterByHistoryID( '144129' ).GetFullName]\nDate : 23 mai 1040#!\n#weak Une bataille importante entre l’empire seldjoukide du nord de la Perse en pleine expansion et l’empire ghaznavide. Après avoir repoussé les Seldjoukides lors des batailles initiales, les troupes ghaznavides se sont disputé le butin qu’elles avaient laissé.\n\nTotalement désorganisées et prises de court lors du retour des forces seldjoukides, elles ont été poursuivies sans pitié. Affamées et démoralisées, les troupes restantes ont été écrasées.#!"
 BattlePoIHistoricalNameAror: "Bataille d’Aror"
 BattlePoIHistoricalDescAror: "#emp Vainqueur : Muhammad ibn al-Qasim\nVaincu : raja Dahir\nDate : 711#!\n#weak Une des batailles de l’invasion omeyyade de l’Inde entre le rajah du Sind et l’empire omeyyade.\n\nBien que ses ennemis étaient initialement plus nombreux que lui, le commandant des Omeyyades a pu engager la bataille dans une position avantageuse, ce qui a permis aux forces musulmanes de prendre progressivement le dessus. La mort du rajah Dahir a finalement assuré leur victoire.#!"
 BattlePoIHistoricalNameSvolder: "Bataille de Svolder"
 BattlePoIHistoricalDescSvolder: "#emp Vainqueur : [GetScriptedCharacterByHistoryID( '101505' ).GetFullName]\nVaincu : [GetScriptedCharacterByHistoryID( '144004' ).GetFullName]\nDate : 9 septembre 999#!\n#weak Cette bataille a vu s’affronter les troupes norvégiennes dirigées par Olaf Tryggvason et une coalition de troupes danoises et suédoises dirigées par le roi Sveinn du Danemark.\n\nBien qu’en infériorité numérique, le roi norvégien a refusé de fuir devant la coalition et a engagé les Suédois et les Danois dans une bataille navale. Il les traitait de « mangeurs de chevaux » et de « chèvres des bois ».\n\nBien que la flotte norvégienne a pu infliger de lourdes pertes à l’ennemi, elle a été battue. Olaf a disparu au cours de la bataille, probablement mort.#!"
 BattlePoIHistoricalNameCivitate: "Bataille de Civitate"
 BattlePoIHistoricalDescCivitate: "#emp Vainqueur : [GetScriptedCharacterByHistoryID( '1126' ).GetFullName]\nVaincu : [GetScriptedCharacterByHistoryID( '1338' ).GetFullName]\nDate : 18 juin 1053#!\n#weak Lors de cette bataille, les Normands ont affronté une coalition menée par le pape incluant des Allemands et des Italiens locaux.\n\nBien qu’elle ait eu le dessus en nombre, la coalition papale n’a pas pu venir à bout de l’infanterie normande au centre ni la cavalerie sur les flancs.\n\nPeu après la bataille, le pape a été capturé par les Normands, mettant ainsi fin au conflit.#!"
 BattlePoIHistoricalNameTalas: "Bataille de Talas"
 BattlePoIHistoricalDescTalas: "#emp Vainqueur : Califat abbasside\nVaincu : Dynastie Tang\nDate : 751#!\n#weak Un long conflit qui a éclaté lorsque le califat abbasside s’est étendu depuis le sud-ouest et la dynastie Tang depuis l’est.\n\nAu début, l’infanterie lourde de la dynastie Tang et ses mercenaires turcs ont joué un rôle important pour repousser les troupes abbassides, mais lorsque les mercenaires ont changé de camp et que de nombreux alliés les ont trahis, les Tang ont finalement été forcés de reculer.\n\nCe conflit a mis fin à l’expansion des Tang vers l’ouest et la Transoxiane est tombée aux mains des musulmans.#!"
 BattlePoIHistoricalNameSufuku: "Bataille de Subushi"
 BattlePoIHistoricalDescSufuku: "#emp Vainqueur : les Emishis d’Isawa\nVaincu : [GetScriptedCharacterByHistoryID( 'japanese_iruma_1' ).GetFullName]\nDate : 789 après J.-C.#!\n#weak Une bataille importante de la soumission des Emishis par les Japonais.\n\nLes forces armées japonaises se sont d’abord divisées en deux groupes et ont suivi les Emishis en retraite des deux côtés de la rivière Kitakami. Les escarmoucheurs emishis ont empêché les Japonais de traverser la rivière et ont encerclé une grande partie d’entre eux entre la rivière et les montagnes.\n\nLa défaite des Japonais qui s’ensuivit a été une grande humiliation ; de nombreux soldats ont traversé la rivière à la nage, nus, pour échapper à la mort. L’armée a été dissoute et [GetScriptedCharacterByHistoryID( 'japanese_yamato_24' ).GetFullName] a réprimandé sévèrement ses commandants.#!"
 BattlePoIHistoricalNameBaekgang: "Bataille de Baekgang"
 BattlePoIHistoricalDescBaekgang: "#emp Vainqueur : Royaume de Silla et Chine des Tang\nVaincu : [GetScriptedCharacterByHistoryID( 'japanese_abe_36' ).GetFullName]\nDate : 663 après J.-C.#!\n#weak Une bataille navale décisive au cours de laquelle les Tang et les Silla ont affronté les forces du mouvement de restauration du Baekje et leurs alliés japonais.\n\nLa bataille s’est principalement déroulée sur le fleuve Baengma. Bien que les forces japonaises étaient supérieures en nombre, la marine Tang a résisté et a finalement lancé une contre-attaque qui a encerclé et vaincu la flotte japonaise.\n\nLa victoire décisive de Silla et des Tang a contraint le Japon à se retirer complètement des affaires coréennes et a écrasé le mouvement de restauration du Baekje.#!"
 BattlePoIHistoricalNamePalembang: "Attaque Chola sur Palembang"
 BattlePoIHistoricalDescPalembang: "#emp Vainqueur : [GetScriptedCharacterByHistoryID( '189038' ).GetFullName]\nVaincu : [GetScriptedCharacterByHistoryID( 'javanese_sailendra_25' ).GetFullName]\nDate : 1025 après J.-C.#!\n#weak Une attaque soudaine des troupes Chola contre la capitale de l’empire Srivijaya, Palembang.\n\nLes troupes Chola sont arrivées par la mer et ont soumis rapidement la capitale de l’empire Srivijaya par le pillage.\n\nLa chute de Palembang a entraîné l’effondrement de l’empire Srivijaya et l’emprise des Chola sur la région pendant des décennies.#!"
 BattlePoIHistoricalNameAngkor: "Siège d’Angkor"
 BattlePoIHistoricalDescAngkor: "#emp Vainqueur : [GetScriptedCharacterByHistoryID( 'cham_panduranga_04' ).GetFullName]\nVaincu : [GetScriptedCharacterByHistoryID( 'khmer_tribhuvanaditya_01' ).GetFullName]\nDate : 1177 après J.-C.#!\n#weak Une période de troubles et de coups d’État au Kambuja a conduit à l’arrivée au pouvoir de Tribhuvanaditya, qui n’était pas de sang royal. Alors qu’il combattait les rebelles royaux qui soutenaient d’autres prétendants au trône, le Royaume de Champa a envahi Kambuja.\n\nLes troupes de Champa ont remonté le Mékong et le Tonlé Sap, pillé la capitale Angkor et tué Tribhuvanaditya.\n\nAprès le siège, Kambuja s’est effondré et le butin a été dispersé dans la région ou emporté par les Chams.#!"
 BattlePoIHistoricalNameSongping: "Siège de Songping"
 BattlePoIHistoricalDescSongping: "#emp Vainqueur : Yang Sijin\nVaincu : Cai Xi\nDate : 863 après J.-C.#!\n#weak Les troubles dans le protectorat Tang d’Annan ont poussé le royaume voisin de Nanzhao à s’allier avec les tribus locales et à envahir la région avec une force écrasante.\n\nL’armée de Nanzhao et ses alliés ont assiégé la ville pendant un certain temps avant de finalement pénétrer dans le centre-ville. Les défenseurs ont opposé une résistance acharnée à la porte est, attaquant la cavalerie ennemie et tuant nombre de ses membres avant d’être vaincus.\n\nBien que la population vietnamienne ait initialement accueilli les troupes de Nanzhao, celles-ci ont pillé la région, et une contre-attaque des Tang en 864 a finalement permis de reconquérir l’ensemble du territoire.#!"
 BattlePoIHistoricalNameMuye: "Bataille de Muye"
 BattlePoIHistoricalDescMuye: "#emp Vainqueur : roi Wu\nVaincu : empereur Zhou des Shang\nDate : 1046 avant J.-C.#!\n#weak La bataille de Muye a opposé le roi rebelle Wu à l’empereur Shang Zhou.\n\nLes troupes de Wu étaient initialement inférieures en nombre, mais les forces Shang, composées en grande partie d’esclaves de guerre, se sont révélées peu fiables et ont fui le champ de bataille. Les rebelles du roi Wu ont finalement remporté une victoire sanglante.\n\nLa bataille a conduit à la chute de la dynastie Shang et à l’accession au mandat du Ciel du roi Wu, qui a fondé la nouvelle dynastie Zhou.#!"
 BattlePoIHistoricalNameRedCliffs: "Bataille de la Falaise rouge"
 BattlePoIHistoricalDescRedCliffs: "#emp Vainqueur : Sun Quan\nVaincu : Cao Cao\nDate : 208 après J.-C.#!\n#weak La bataille de la Falaise rouge est une bataille fluviale qui a opposé une coalition de seigneurs de guerre au seigneur de guerre du Nord Cao Cao vers la fin de la dynastie Han. Cao Cao tentait d’établir une tête de pont sur le Yangtsé vers le sud de la Chine.\n\nLes forces alliées ont feint de se rendre et attiré les navires de Cao Cao dans un piège. Ils y ont mis le feu, brûlant vifs de nombreux soldats et chevaux. L’armée du Nord a ainsi été plongée dans le chaos et vaincue.\n\nCette défaite a empêché Cao Cao de progresser au-delà du Yangtsé et marqué les années suivantes de la période des Trois Royaumes.#!"
 BattlePoIHistoricalNameGuandu: "Bataille de Guandu"
 BattlePoIHistoricalDescGuandu: "#emp Vainqueur : Cao Cao\nVaincu : Yuan Shao\nDate : 200 après J.-C.#!\n#weak La bataille de Guandu a opposé les seigneurs de guerre Cao Cao et Yuan Shao à la fin de la dynastie Han orientale. Les deux seigneurs de guerre avaient acquis un pouvoir considérable et représentaient chacun le principal obstacle à la domination de la Chine.\n\nLes troupes de Cao Cao étaient inférieures en nombre lors de la bataille, mais elles ont affaibli l’armée adverse grâce à des tactiques telles que des attaques-surprises contre les dépôts de ravitaillement de Yuan Shao.\n\nCette bataille a été un tournant dans l’histoire : Cao Cao en est sorti vainqueur et a ouvert la voie à la création ultérieure de l’État de Cao Wei pendant la période des Trois Royaumes.#!"
 BattlePoIHistoricalNameYiling: "Bataille de Yiling"
 BattlePoIHistoricalDescYiling: "#emp Vainqueur : Lu Xun – Wu orientaux\nVaincu : Liu Bei – Shu Han\nDate : 221 après J.-C.#!\n#weak Dans le but de reconquérir les territoires perdus dans la province de Jing, Liu Bei a personnellement mené ses armées à l’assaut des Wu orientaux et remporté des succès initiaux.\n\nAu cours de la bataille, les troupes de Liu Bei sont tombées dans un piège lorsque le général Lu Xun a incendié le camp de Shu Han, après quoi Liu Bei a battu en retraite. Liu Bei a finalement réussi à quitter le champ de bataille en ordonnant à ses hommes de mettre le feu à leurs armures, créant ainsi un mur de feu contre les assaillants.\n\nLa bataille s’est soldée par une défaite écrasante pour Liu Bei, et a ainsi mis fin à sa campagne et entraîné sa mort.#!"
 BattlePoIHistoricalNameFeiRiver: "Bataille de la rivière Fei"
 BattlePoIHistoricalDescFeiRiver: "#emp Vainqueur : Xie An – Jin\nVaincu : Fu Jian – Ancien État de Qin\nDate : 383 après J.-C.#!\n#weak Cette bataille a été le point culminant d’une longue campagne au cours de laquelle l’ancien État de Qin, après avoir unifié diverses tribus étrangères, a pris le contrôle d’une partie importante du territoire Jin. Les armées Qin étaient largement supérieures en nombre aux Jin qui résistaient sur les rives du fleuve Fei.\n\nAu cours de la bataille, les troupes Jin, disciplinées et bien entraînées, ont vaincu les troupes tardives Qin, largement supérieures en nombre, mais désorganisées et démotivées.\n\nLa victoire des Jin sur les forces Qin, avec quelques pertes mineures seulement, a considérablement modifié l’équilibre des pouvoirs et assuré l’indépendance du sud de la Chine pendant plus de 100 ans.#!"
 BattlePoIHistoricalNameCanheSlope: "Bataille de Canhebei"
 BattlePoIHistoricalDescCanheSlope: "#emp Vainqueur : Touba Gui – Wei septentrionaux\nVaincu : Murong Bao – Yan\nDate : 395 après J.-C.#!\n#weak La bataille a été le résultat d’un conflit au cours duquel la dynastie Yan a mené une campagne punitive contre la dynastie Wei du Nord.\n\nLorsque les troupes de la dynastie Yan ont atteint la colline de Canhae, elles ont été prises dans une tempête et attaquées par l’ennemi. L’armée de la dynastie Yan a été prise par surprise et s’est enfuie vers le fleuve Jaune.\n\nLa bataille a renversé l’équilibre des pouvoirs dans la région puisque les Wei du Nord se sont emparés de la majeure partie du territoire des Yan.#!"
 BattlePoIHistoricalNameXiangji: "Bataille du temple Xiangji"
 BattlePoIHistoricalDescXiangji: "#emp Vainqueur : [GetScriptedCharacterByHistoryID( 'han_1528' ).GetFullName]\nVaincu : [GetScriptedCharacterByHistoryID( 'an_qingxu' ).GetFullName]\nDate : 757 après J.-C.#!\n#weak Cette bataille a été le point culminant d’une contre-offensive de la dynastie Tang contre les rebelles, qui avaient pris le contrôle de la majeure partie du nord de la Chine, et l’une des batailles les plus sanglantes de la révolte d’An Lushan. Les deux puissantes armées se sont affrontées au nord de Chang’an, près du temple Xiangji.\n\nVers midi, l’armée Tang avait pris la hauteur, tandis que l’armée Yan avait pris position devant Chang’an même. Après plusieurs manœuvres, la bataille s’est transformée en une longue guerre de position, au cours de laquelle des troupes disciplinées se sont affrontées sans relâche, jusqu’à ce que le front Yan finisse par s’effondrer en raison de pertes extrêmement élevées.\n\nLa brutalité de la bataille a décimé les deux armées, mais brisé le cœur de la rébellion. Les troupes Tang ont pu reprendre Chang’an le lendemain.#!"
 BattlePoIHistoricalNameGaoliang: "Bataille de la rivière Gaoliang"
 BattlePoIHistoricalDescGaoliang: "#emp Vainqueur : [GetScriptedCharacterByHistoryID( '194330' ).GetFullName]\nVaincu : [GetScriptedCharacterByHistoryID( 'han_4801' ).GetFullName]\nDate : 979 après J.-C.#!\n#weak La bataille a fait suite à une tentative de la dynastie Song de reconquérir les 16 préfectures conquises par la dynastie Liao en 960. Elle a été menée personnellement par le frère de l’empereur (le futur empereur [GetScriptedCharacterByHistoryID( 'han_4801' ).GetFullNameNoTooltip]).\n\nLa ville de Youzhou a été assiégée pendant trois mois avant que les renforts de la dynastie Liao n’arrivent pour soulager les défenseurs. Bien que l’armée Song ait d’abord été victorieuse, elle a été surprise pendant la nuit par une attaque venant de trois directions.\n\nLa bataille s’est terminée par la fuite de [GetScriptedCharacterByHistoryID( 'han_4801' ).GetFullNameNoTooltip] dans une charrette tirée par un âne. Cela a été la première grande défaite de la dynastie Song après son accession au pouvoir.#!"
