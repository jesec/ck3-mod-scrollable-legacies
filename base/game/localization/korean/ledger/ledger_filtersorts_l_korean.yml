l_korean:
 # reverse button
 LEDGER_SORT_BY: "#T $SORT_BY$[Select_CString( LedgerWindow.GetSortOrder, '오름차순', '내림차순' )]\n#!#I 클릭하여 전환하기#!"
 # active sorting order, creates two loc keys for ascending and descending orders
 ACTIVE_SORTING_LEDGER: "#low 정렬:#! #clickable [Localize(Concatenate(OrderLedgerOption.GetKey, Select_CString(LedgerWindow.GetSortOrder, '_least', '_most')))]#!"
 # shared locs
