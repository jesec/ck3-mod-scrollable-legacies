l_korean:
 #Lessons of the heart
 intrigue_events_bjorn.5100.t: "가슴으로 배운 교훈"
 intrigue_events_bjorn.5100.desc: "사랑하는 [the_lover.GetFirstName](을)를 보고 있자니, 이런 훌륭한 사람에게서 배울 것이 참 많다는 생각이 들었다. [the_lover.GetHerHis|U] 머릿속은 보물로 가득한 창고나 마찬가지다. 나도 [the_lover.GetFirstName]에게 가르쳐 줄 수 있는 게 있고 말이다.\n\n물론 둘이 같이 시간을 보낼 수 있는 좋은 방법이기도 하다!"
 intrigue_events_bjorn.5100.a: "내 사랑이 나한테 가르쳐 줄 것이 많겠군."
 intrigue_events_bjorn.5100.b: "[the_lover.GetSheHe|U]라면 훌륭한 학생이 될 거다."
 intrigue_events_bjorn.5100.c: "둘이 함께 시간을 보내는 것만으로도 족하다."
 #shared interests
 intrigue_events_bjorn.5101.t: "공통의 추구"
 intrigue_events_bjorn.5101.desc: "[the_lover.GetFirstName](은)는 내 흥미를 불러일으킨다! [the_lover.GetHerHim]를 기쁘게 하는 것이라면 나도 같이 즐기고 싶다.\n\n아, 함께 하는 매일이 즐겁다.\n\n같이 손을 모아 일하고, 두 마음이 공통의 목표를 추구한다.\n\n우리의 심장도 마치 하나가 된 듯 같이 뛰고 있다."
 intrigue_events_bjorn.5101.a: "그대의 열정을 어디서 불태우는지 알려주시오."
 intrigue_events_bjorn.5101.b: "자, 함께 이 즐거움을 나눕시다."
 intrigue_events_bjorn.5101.c: "같이 새로운 걸 배우는 건 어떻소?"
 #Dark depths of the soul
 intrigue_events_bjorn.5102.t: "그림자 사랑하기"
 intrigue_events_bjorn.5102.desc: "우리의 사이가 가까워지며, 이제 경계에 서게 되었다. 이제야말로 상대에게 모든 것을 밝히고, 서로의 모든 것을 알아갈 때가 왔는지도 모른다. 보통은... 남에게 나누지 않는 것까지 나누는 것이다.\n\n이 경계를 넘어서면 되돌아갈 수 없다. 하지만 [the_lover.GetFirstName](이)가 정말로 내 모든 것을 알고도 받아들여 줄까?"
 intrigue_events_bjorn.5102.a: "그대에게 보여줄 것이 있소."
 intrigue_events_bjorn.5102.b: "지금까지 남에게 말한 적 없는 이야기를 해 주시오."
 intrigue_events_bjorn.5102.c: "같이 서로의 가장 어두운 환상을 알아봅시다."
 intrigue_events_bjorn.5102.d: "안 돼! 절대 밝혀져선 안 되는 것도 있는 법이다."
