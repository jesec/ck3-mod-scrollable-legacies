l_korean:
 hunt_events_anna.0001.t: "깊이 내린 뿌리"
 hunt_events_anna.0001.desc: "거대한 참나무의 꼭대기는 멀리까지 넓게 퍼져 나가며 위용을 자랑했다. 그 아래의 모든 것이 그늘에 덮였다. 그 가지를 올려다보고 있자니, 지금까지 나타났다가 사라진 수많은 왕조를 생각하게 되었다. 내가 있기 이전에 존재했으며, 내가 세상을 떠나면 내 유산을 짊어지게 될 후대의 이들까지.\n\n가까이 가 보니 나무껍질에 머리글자들이 새겨져 있었다. 사람들이 세월을 따라 오고간다는 사실을 상기시켜 주는 흔적이었다. 그리고 내가 유산을 넘겨주고 싶은 사람은 바로 내 전부인 [love_interest.GetFirstName](이)다."
 hunt_events_anna.0001.a: "나무껍질에 [love_interest.GetFirstNameNoTooltip]의 머리글자를 새긴다."
 hunt_events_anna.0001.b: "이런 헛짓거리 할 시간은 없다!"
 hunt_events_anna.0001.b.t_toast: "사냥이 최우선 과제다."
 hunt_events_anna.0005.t: "신경 거스르기"
 hunt_events_anna.0005.desc: "잠깐 휴식을 취하던 중, 나를 조롱하는 듯한 웃음소리가 들렸다. 올려다보니, 당연하게도 [mocking_participant.GetFirstName](이)가 활짝 웃고 있었다. 손에는 죽은 [ROOT.Char.Custom('SmallAnimal')] 한 마리를 든 채였다.\n\n\"황야에서 혼자서도 살아남을 사람 같지는 않아 보이던데, 이걸로 연습이라도 하면 좋을 것 같군.\" [mocking_participant.GetSheHe|U]가 비웃는 어조로 말하며 내 발 앞에 동물 사체를 던졌다."
 hunt_events_anna.0005.a: "동물의 가죽을 벗기려 시도한다."
 hunt_events_anna.0005.a.toast.good: "가죽을 벗기는 데 성공함"
 hunt_events_anna.0005.a.toast.nothing: "남은 잔해를 알아볼 수 없음"
 hunt_events_anna.0005.b: "연습? 그럼 사양하지 않고..."
 hunt_events_anna.0005.c: "이런 하찮은 일은 내 몫이 아니다."
 hunt_events_anna.0010.t: "아래에 갇히다"
 hunt_events_anna.0010.desc: "나는 무겁고 불안정한 걸음으로 [ROOT.Char.GetCurrentLocation.Custom('GetTerrainTypePlural')]에서 사냥감을 쫓아다녔다. 속도를 유지하는 데 집중하고 있었는데, 갑자기 무언가 탁 끊어지는 소리가 들렸다. 갑자기 몸의 무게가 사라지더니, 뱃속 깊은 곳이 울렁거렸다. 추락이 멈추자 충격으로 인해 불타는 듯한 통증이 전신으로 퍼져나갔다.\n\n고통 속에서 주위를 둘러보니 사방을 벽이 둘러싸고 있었다. 함정에 걸려 떨어진 것이다. 다시 올라가는 길을 찾아야만 했다."
 hunt_events_anna.0010.a: "구멍에서 기어나간다."
 hunt_events_anna.0010.a.desc.good: "기어 나오는 데 성공함"
 hunt_events_anna.0010.a.toast.good: "고통과 맞서 싸우며 빠져나옴"
 hunt_events_anna.0010.a.toast.bad: "다시 굴러떨어지는 바람에 다침"
 hunt_events_anna.0010.a.desc.bad: "미끄러져 구멍으로 다시 떨어짐"
 hunt_events_anna.0010.b: "\"거기 아무도 없느냐?!\""
 hunt_events_anna.0010.b.flavor: "사냥하던 일행이 사냥을 멈추고 대신 나를 돕는다."
 hunt_events_anna.0015.t: "들이마시고... 내쉬고"
 hunt_events_anna.0015.desc: "빈터에서 이상한 쿵 소리가 들리고, 낮게 중얼거리는 소리가 나더니 종종 한숨이 울려 퍼졌다. 활을 든 사람이 이리저리 오가며 무언가에 좌절하고 있었다.\n\n나는 더 자세히 살펴보려고 나무 뒤에 숨어서 슬쩍 엿봤다. 내 [child_with_bow.Custom('GetDaughterSon')] [child_with_bow.GetFirstName](이)가 지면에 흩어진 화살들 가운데 서 있었다. 자신이 정해 놓은 표적의 근처도 못 간 모양이었다. 아이에게 지도가 좀 필요해 보였다."
 hunt_events_anna.0015.a: "\"자, 내가 직접 보여주지...\""
 hunt_events_anna.0015.a.flavor: "나는 능숙한 사냥꾼이니, 전문 지식을 이용해 아이의 자세와 정밀성을 발전시켜 줄 수 있다."
 hunt_events_anna.0015.a.toast.good: "[child_with_bow.GetFirstNameNoTooltip](이)가 내 지시를 따름"
 hunt_events_anna.0015.a.toast.bad: "[child_with_bow.GetFirstNameNoTooltip](이)가 내 지시를 이해하지 못함"
 hunt_events_anna.0015.b: "아이를 격려하며 응원하고 있음을 알려준다."
 hunt_events_anna.0015.c: "[child_with_bow.GetFirstNameNoTooltip](이)가 알아서 깨닫게 둔다."
 hunt_events_anna.0015.c.toast: "[child_with_bow.GetFirstNameNoTooltip](이)가 활 다루는 법을 알아냄"
