l_korean:
 #Travel Flavor Events
 #Troll bridge - you encounter a troll bridge.
 travel_events.5100.t: "[ROOT.Char.GetCurrentLocation.Custom('GetProvinceTricksterSpirit')|U] 다리"
 travel_events.5100.desc: "\"주군, 이 다리는 소문이 좋지 않습니다. [ROOT.Char.GetCurrentLocation.Custom('GetProvinceTricksterSpirit')](이)가 아래 산다는 이야기가 있습니다!\" 내 [ROOT.Char.Custom2('RelationToMe', superstitious_traveler)] [superstitious_traveler.GetTitledFirstName](이)가 외쳤다. \"분명 우리를 습격할 겁니다. 아니더라도 여길 지나갔으니 멀리서 우릴 저주할 겁니다.\"\n\n일행 사람들도 수군거리기 시작했다. [ROOT.Char.GetFaith.HighGodName]의 이름을 부르며 보호를 바라는 이도 있었다. 불행히도 근방에서 안전한 건널목은 이 다리뿐이다."
 travel_events.5100.a: "\"[ROOT.Char.GetCurrentLocation.Custom('GetProvinceTricksterSpirit')]도 악마도 두렵지 않다!\""
 travel_events.5100.b: "\"[superstitious_traveler.GetTitledFirstNameNoTooltip], 그런 것은 존재하지 않는다네.\""
 travel_events.5100.c: "\"이 정령을 쫓아내려면 기도해야 한다.\""
 travel_events.5100.d: "\"무섭군! 다른 우회로를 찾자.\""
 custom.every_brave_or_impatient_entourage_member: "모든 [GetTrait('brave').GetName( GetNullCharacter )] 또는 [GetTrait('impatient').GetName( GetNullCharacter )] 수행단 구성원"
