l_korean:
 SITUATION_LIST_STORY_CYCLE_MODIFIERS_HEADER: "변화 요소"
 SITUATION_LIST_STORY_CYCLE_DECISIONS_HEADER: "결단"
 not_yet_chosen: "아직 선택하지 않음"
 story_cycle_pet_dog: "애완견"
 story_cycle_pet_dog_desc: "#F 개는 당신의 곁에서 함께 걸어가는 충성스러운 동료입니다. 당신을 보호해 주며, 인간보다 더 나은 충성심과 유대를 보여줍니다.#!"
 DOG_INFORMATION_STRING: "당신의 개 이름은 #V [Story.Custom('DogStoryNameAll')]입니다.#!\n[Story.Custom('DogFurColorAll')] 털, [Story.Custom('DogEyeColorAll')] 눈을 가졌으며 [Story.Custom('DogStoryPuppyOrAgeAll')]입니다.\n아주 착한 [Story.Custom('DogStorySheHeAll')|U]입니다."
 dog_age_puppy: "강아지"
 dog_age_proper: "[Story.MakeScope.Var('dog_age_variable').GetValue|0]살"
 cat_age_kitten: "고양이"
 cat_age_proper: "[Story.MakeScope.Var('cat_age_variable').GetValue|0]살"
 story_cycle_pet_cat: "애완 고양이"
 story_cycle_pet_cat_desc: "#F 당신의 곁을 지키는 자신만만한 고양이입니다. 날렵한 사냥꾼이며, 자기만의 방식으로 애정을 표현합니다.#!"
 CAT_INFORMATION_STRING: "당신의 고양이 이름은 #V [Story.Custom('CatStoryNameAll')]#!입니다.\n이 [Story.Custom('CatStorySheHeAll')]는 [Story.Custom('CatFurColorAll')] 털, [Story.Custom('CatEyeColorAll')] 눈을 가졌으며 [Story.Custom('CatStoryKittenOrAgeAll')]입니다.[Story.Custom('CatStupidOrNotStupidAll')]"
 dumb_but_sweet_orange_boy: "\n[Story.Custom('CatFurColorAll')] 털의 맹한 고양이지만 아주 온순합니다."
 story_cycle_pet_eagle: "사냥 독수리"
 story_cycle_pet_eagle_desc: "#F 당신의 장갑에 앉는 사냥 독수리입니다. 쉼 없이 경계하며 언제나 굶주려 있습니다. 하늘에서 죽음을 몰고 오는 존재입니다.#!"
 EAGLE_INFORMATION_STRING: "당신의 독수리 이름은 #V [Story.Custom('EagleStoryNameAll')]입니다.#!\n[Story.Custom('EagleStorySheHeAll')|U]이며 [Story.MakeScope.Var('eagle_age_variable').GetValue|0]살입니다."
 bp2_hostage_loyalty: "충성스러운 인질"
 bp2_hostage_loyalty_desc: "당신의 [hostages|E] 중 하나가 당신과 당신의 방식에 호감을 느끼기 시작합니다."
 hostage: "[hostage|E]"
 HOSTAGE_STORY_PRACTICAL_INFORMATION_STRING: "당신의 [hostage|E] [Story.MakeScope.Var('hostage_target').Char.GetUIName](이)가 [court|E]에서 자라나며, 이 상황이 [Story.MakeScope.Var('hostage_target').Char.GetHerHis] 충성에 영향을 미칩니다. [Story.MakeScope.Var('hostage_target').Char.GetHerHis] [opinion|E]을 계속 높이 사며, 이벤트에서 적합한 선택지를 선택하면 [Story.MakeScope.Var('hostage_target').Char.GetHerHim]가 성인이 된 후 당신에게 충성할 가능성이 높아집니다.\n\n현재 충성심: [Story.MakeScope.Var('theon_points').GetValue|0+]"
 LOYALTY_LABEL: "충성심 점수"
 claimant: "[claimant|E]"
 diverted_crusaders: "우회한 십자군"
 frankokratia_story: "프랑코크라티아"
 frankokratia_story_desc: "[GetTitleByKey('e_byzantium').GetName|l]을 노리는 주장자가 서부의 기회주의자들을 십자군 원정에서 끌어들여, 탐욕으로 가득한 그 칼끝을 기독교 세계의 심장에 겨누고 있습니다..."
 FRANKOKRATIA_STORY_PRACTICAL_INFORMATION_STRING: "[GetTitleByKey('e_byzantium').GetHolder.GetShortUIName]을 상대로 한 [war|E]이 [GetTitleByKey('e_byzantium').GetName|l]의 미래를 결정짓게 됩니다. [claimant|E] [Story.MakeScope.Var('byz_claimant').Char.GetUIName](이)가 왕좌를 차지하고 십자군의 노력이 결실을 보거나, [GetFaithByKey('catholic').GetAdjective]의 지배 아래 새로운 [GetTitleByKey('e_latin_empire').GetBaseName]이 수립될 겁니다."
 story_conqueror: "정복자"
 story_conqueror_desc: "당신의 야망은 끝이 없습니다! 눈앞에 펼쳐진 드넓은 세상이 당신을 기다립니다."
 CONQUEROR_STORY_PRACTICAL_INFORMATION_STRING: "정복자는 [factions|E] 감소, [vassalize_casus_belli|E] 가능, 종종 발생하는 강력한 이벤트와 같은 여러 강력한 보너스를 획득합니다.\n\n다음의 경우 정복자가 아니게 됩니다.\n$BULLET_WITH_TAB$[independent|E] 상태가 아님\n$BULLET_WITH_TAB$지위가 [count|E]으로 하락\n$BULLET_WITH_TAB$[unlanded|E] 인물이 됨\n$BULLET_WITH_TAB$#V 10#!년 동안 [war|E]을 치르지 않음\n$BULLET_WITH_TAB$[debt|E]가 많음\n$BULLET_WITH_TAB$[wars|E]에서 #V 3#!번 이상 패배함\n$BULLET_WITH_TAB$[GetTrait('incapable').GetName( GetNullCharacter )]가 됨"
 story_destiny_child: "운명의 아이"
 story_destiny_child_desc: "위대한 약속의 아이가 태어났습니다. 운명이 직접 선택한 아이일지도 모릅니다."
 DESTINY_CHILD_STORY_PRACTICAL_INFORMATION_STRING: "아주 드물게 위대한 운명을 타고난 아이가 태어나기도 합니다. 이 아이는 보통의 아이보다 빠르게 성장하며 다른 이들이 도달하지 못하는 경지에 이릅니다.\n\n[Story.MakeScope.Var('destiny_child').Char.GetUIName](을)를 잘 보살피며 [player_heir|E]로 삼는 방향을 고려하십시오. 예시로 이 아이를 당신의 [designated_heir|E]로 삼는 방법도 있습니다."
 CHILD_OF_DESTINY: "운명의 아이"
 story_cycle_martial_lifestyle_warhorse: "군마"
 story_cycle_martial_lifestyle_warhorse_desc: "당신은 특히 잘 훈련된 군마를 보유하고 있습니다. 당신이 돌진하면 적들은 공포에 떨 것입니다."
 WARHORSE_STORY_PRACTICAL_INFORMATION_STRING: "당신의 군마 이름은 #V [Story.Custom('WarhorseStoryNameAll')]#!입니다. [Story.Custom('HorseStoryMareStallionAll')]입니다."
 DOPPELGANGER: "당신의 [Glossary( '도플갱어', 'DOPPELGANGER_GLOSS' )]"
 story_doppelganger: "진흙 속 거울"
 DOPPELGANGER_GLOSS: "가끔 누군가와 똑같이 생겼거나, 쌍둥이 같은 존재가 발견되기도 합니다. 독일 민담에서 이는 괴이한 유령이며 좋지 못한 징조입니다. 자신과 꼭 닮은 존재와 마주했다면 질병이나 죽음의 전조일 수 있습니다."
 story_doppelganger_desc: "당신과 똑같이 생긴 농노가 발견되었습니다. 진짜 [Glossary( '도플갱어', 'DOPPELGANGER_GLOSS' )]일지도 모릅니다..."
 DOPPELGANGER_STORY_PRACTICAL_INFORMATION_STRING: "당신과 똑같이 생겼으며, 목소리도 당신과 닮은 농노라면 기회가 되거나... 저주일지도 모릅니다. 일단 [Story.MakeScope.Var('doppelganger_character').Char.GetUIName](은)는 당신의 [court|E]에 거주하고 있습니다."
 story_cycle_hunt_mystical_animal: "신비로운 동물 사냥"
 story_cycle_hunt_mystical_animal_desc: "사냥 도중 신비로운 하얀 짐승을 목격했습니다. 이 짐승을 잡는다면 성배를 찾은 것이나 마찬가지입니다!"
 WHITE_ANIMAL_INFORMATION_STRING: "당신은 #V 하얀 [Story.MakeScope.Var('animal_type').GetFlagName|U]#! 한 마리를 쫓고 있습니다.\n\n이 짐승을 잡으면 큰 보상이 따릅니다. 그러나 [Story.MakeScope.Var('animal_type').GetFlagName](이)가 당신을 피해 갈 때마다 당신은 [stress|E]를 받습니다. 간혹 등장하는 [GetModifier('hunt_sighting_legendary_modifier').GetNameWithTooltip]으로 사냥을 계속 이어갈 수 있습니다.\n\n하얀 [Story.MakeScope.Var('animal_type').GetFlagName] 조우: [Story.MakeScope.Var('encounters').GetValue|0V] #weak (첫 조우 이후)#!"
 LEGENDARY_COUNTY_LABEL: "하얀 [Story.MakeScope.Var('animal_type').GetFlagName|U]이 머무는 곳"
 story_sycophant: "아첨꾼"
 story_sycophant_desc: "당신의 궁정 신하 중 하나는 명백한 아첨꾼입니다. 이 인물은 존재만으로도 봉신들의 화를 불러일으킵니다."
 SYCOPHANT_INFORMATION_STRING: "내 [Story.GetOwner.Custom2( 'RelationToMeShort', Story.MakeScope.Var('sycophant_character').Char )] [Story.MakeScope.Var('sycophant_character').Char.GetShortUIName](와)과 [Story.GetOwner.Custom2( 'RelationToMeShort', Story.MakeScope.Var('jealous_character').Char )] [Story.MakeScope.Var('jealous_character').Char.GetShortUIName](은)는 서로 못 잡아먹어서 안달이다. 한쪽만 편애할 수도 있지만, 그러면 남은 사람의 화만 부추길 것이다. 상황이 어떻게 흘러가는지 일단 두고 봐야겠다..."
 SYCOPHANT_LABEL: "아첨꾼"
 JEALOUS_VASSAL_LABEL: "가장 질투심이 강한 봉신"
 story_cycle_pet_rock: "애완용 돌"
 story_cycle_pet_rock_desc: "당신의 곁에는 애완용 돌이 있습니다. 당신의 독특한 우정관과 잘 어울리는 변함없는 얼굴의 동반자입니다."
 PET_ROCK_INFORMATION_STRING: "당신의 돌 이름은 #V [Story.GetOwner.Custom('RockStoryName')]입니다.#!\n[Story.GetOwner.Custom('RockStoryHerHis')|U] [Story.GetOwner.Custom('RockColor')] 표면은 울퉁불퉁합니다."
 story_cycle_admin_eunuch: "유명 환관"
 story_cycle_admin_eunuch_desc: "특별한 능력을 지닌 환관이 당신의 궁정으로 들어왔습니다. 이는 기회일까요, 위협일까요...?"
 EUNUCH_INFORMATION_STRING: "시간이 지나면서 [Story.MakeScope.Var('eunuch').Char.GetShortUIName]에게 더 강한 권력과 영향력을 부여할 기회가 생깁니다. 해당 인물에게 힘을 부여하면 [GetModifier('admin_eunuch_liege_4_modifier').GetNameWithTooltip] [modifier|E]의 위력이 증가합니다.\n\n그러나 주의하세요. [Story.MakeScope.Var('eunuch').Char.GetHerHim]의 의견을 배척하거나, [Story.MakeScope.Var('eunuch').Char.GetHerHis] 충성심을 확인하지 않은 채 #EMP 너무 많은#! 권력을 허용한다면 심각한 결과가 뒤따를 수 있습니다...\n\n지금까지 [Story.MakeScope.Var('eunuch').Char.GetHerHis] 요청을 [Story.MakeScope.Var('eunuch_refusals').GetValue|0V]번 거절했습니다."
 EUNUCH_LABEL: "환관"
 UPSET_COURTIERS: "환관에게 화가 난 신하들"
 POETRY_BOOK_LABEL: "내 시집"
 commission_epic_story: "서사 저술 의뢰"
 commission_epic_story_desc: "당신이 가문이 이룬 위업의 연대기를 담아낸 장대한 서사시를 의뢰합니다."
 EPIC_INFORMATION_STRING: "당신의 [Story.GetOwner.Custom('CommissionEpicScribe')][AddTextIf(Story.MakeScope.Var('composer').IsSet, Concatenate(Concatenate(', ', Story.MakeScope.Var('composer').Char.GetShortUIName), ','))](이)가 [Story.GetOwner.GetDynasty.GetName] [dynasty|E]의 [dynasty_prestige|E]을 증가시키고 [artifact|E]을 획득하기 위해 장대한 [Story.Custom('CompositionTypeAll')] 집필을 시작합니다.\n\n훌륭한 [Story.Custom('CompositionTypeAll')] 탄생 확률: [Story.MakeScope.Var('final_outcome_chance').GetValue|0+/%]"
 COMPOSER: "당신의 서사시 작가"
 story_foreign_raised_reformer: "외국에서 자란 개혁가"
 story_foreign_raised_reformer_desc: "당신은 지금 집으로 삼은 땅과 멀리 떨어진 곳에서 자랐습니다.\n두 땅은 서로 정말 다릅니다... 하지만 집이 그곳과 조금 더 비슷해진다면 어떨까요?"
 REFORMER_INFORMATION_STRING: "당신은 [Story.MakeScope.Var('advanced_realm').Title.GetBaseName]에서 자라났으며, [Story.MakeScope.Var('advanced_culture').Culture.GetName] [Story.MakeScope.Var('advanced_culture_faith').Faith.GetAdjective]의 [Story.MakeScope.Var('foreign_educator').Char.GetShortUIName]에게 가르침을 받았습니다. [Story.MakeScope.Var('advanced_culture').Culture.GetName] [culture|E]에 깊이 감명받은 당신은 자기 민족 또한 이 문화를 닮기를 바랍니다.\n\n개혁 또는 재확인 점수를 획득할 기회가 발생하기 시작합니다.\n$BULLET_WITH_TAB$#indent_newline:7 개혁을 추구하면 [innovations|E], [cultural_acceptance|E], [traditions|E] 또는 [GetBuilding('generic_university').GetName]까지도 획득할 수 있습니다. 하지만 유념하세요, 개혁의 과정은 오래 걸리며 비용도 많이 듭니다.#!\n$BULLET_WITH_TAB$#indent_newline:7 재확인을 추구하면 [vassal|E], [opinion|E], [dynasty_prestige|E]을 획득하며 [casus_bellis|E] 및 [special_troops|E]와 같은 [war|E] 관련 보너스도 획득할 수 있습니다.#!"
 REFORM_LABEL: "당신의 [culture|E] 개혁 방향 진행도"
 REAFFIRMATION_LABEL: "당신의 [culture|E] 재확인 방향 진행도"
 REFORM_MIN_VALUE_LABEL: ""
 REFORM_MAX_VALUE_LABEL: "최대: #V 3#!"
 REAFFIRMATION_MIN_VALUE_LABEL: ""
 REAFFIRMATION_MAX_VALUE_LABEL: "최대: #V 2#!"
 ECCENTRIC_MIN_VALUE_LABEL: ""
 ECCENTRIC_MAX_VALUE_LABEL: "최대: #V 5#!"
 IMAGINARY_FRIEND_INFORMATION_STRING: "당신의 상상 친구 이름은 [Story.MakeScope.Var('imaginary_friend_name').Char.GetShortUINameNoTooltip]입니다. 간혹 이 친구와 상호작용을 할 기회가 생기게 됩니다."
 ECCENTRIC_VALUE: "[GetTrait('eccentric').GetName( GetNullCharacter )] 특성 획득 방향 진행도"
 story_cycle_imaginary_friend: "상상 친구"
 story_cycle_imaginary_friend_desc: "드디어 같이 놀 친구가 생겼다! 진짜가 아닌들 무슨 상관이람, 나한테만 진짜면 됐지!"
 story_greatest_of_khans: "위대한 칸"
 story_greatest_of_khans_desc: "저 하늘에는 위대한 빛이 많습니다. 하늘에는 태양도 있고, 달도 있고, 별도 있습니다. 그러나 지상에는 단 한 명의 칸만 존재할 수 있습니다."
 GREATEST_OF_KHANS_INFORMATION_STRING: "$become_greatest_of_khans_decision_enable_gok_invasion_cb$\n$gok_enable_offer_submission_or_ruin_tt$\n\n@alert_icon! #alert_trial 당신의 [dynasty|E]이 [Story.GetOwner.GetPrimaryTitle.GetName|l]에서 장악력을 상실하거나 [GetGovernment( 'nomad_government' ).GetName](이)가 아니게 되거나 #high [Story.MakeScope.Var('gok_final_date').GetValue|0]#!년까지 #high $mpo_gok_world_conquest_decision$#! [decision|E]을 행하지 못하면 해당 보너스가 상실되며 [Story.GetOwner.GetPrimaryTitle.GetName|l](이)가 산산이 붕괴할 수 있습니다!#!"
