l_korean:
 elder_events.1000.t: "날 잘 알았으면서"
 elder_events.1000.desc: "\"[confusion_target.GetFirstName], 내 소중한 [elder.Custom2('RelationToMeShort', SCOPE.sC('confusion_target'))](이)여, 참으로 반갑군!\" 내 [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('elder'))] [elder.GetFirstName](이)가 내 눈을 바라보았다. [elder.GetHerHis] 미소 뒤에서 무언가 불확실한 감정이 일렁이고 있었다. \"그대는 언제나 [confusion_target.Custom('ComplimentAdjective')] 사람이었지, 그래서 그대를 가장 아꼈다네.\"\n\n[elder.GetHerHis] [GetTrait('withering_mind').GetName( GetNullCharacter )]에서 오늘 나는 내 [confusion_target.Custom('SisterBrother')]인 모양이다...\n\n내일이면 낯선 이가 될지도 모르고."
 elder_events.1000.a: "[ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('elder'))]... 난 [ROOT.Char.GetFirstNameNoTooltip](이)라오!"
 elder_events.1000.b: "뭔... 그렇군, 나 역시 반갑소..."
 elder_events.1100.t: "천국으로 가는..."
 elder_events.1100.desc: "이 계단을 얼마나 많이 오르내렸는지 모른다. 그런데 오늘따라 왜 이리도 [mountain_reference.GetName]의 산맥을 오르는 듯한 기분이 들까?\n\n다리가 떨린다. 무릎에 힘이 빠졌다. 내가 쓰러져도 잡아줄 것이 없었다.\n\n나는 바닥을 향해 굴러떨어졌다."
 elder_events.1100.a: "으아아!"
 elder_events.1100.bodyguard: "여봐라! 날 지켜라!"
 EVENT_WINDOW_OPTION_AVAILABLE_BODYGUARD: "당신이 [GetCourtPositionType('bodyguard_court_position').GetName()]을 보유한 덕분에 이 선택지를 사용할 수 있음"
 EVENT_WINDOW_OPTION_AVAILABLE_TUTOR: "당신이 [GetCourtPositionType('court_tutor_court_position').GetName()]를 보유한 덕분에 이 선택지를 사용할 수 있음"
 partially_mute_modifier: "반쯤 벙어리"
 partially_mute_modifier_desc: "해당 인물은 노화에 따른 질병으로 인해 말하는 데 어려움을 겪고 있습니다."
 elder_events.1200.t: "마비"
 elder_events.1200.desc: "증상은 예고도 없이 찾아왔다. 몸의 왼편에서 감각이 사라졌다. 미소를 지으려 해도 입술이 움직이지 않는다.\n\n말하려 했지만 그조차 불가능했다.\n\n다시 목소리를 낼 수 있게 되기는 했다. 하지만 [ROOT.Char.GetFaith.NegativeAfterLife]의 공포가 아직 선명하다."
 elder_events.1200.a: "..."
 elder_events.1300.t: "잊어버린 수업"
 elder_events.1300.desc: "[ROOT.Char.Custom('education_scroll_subject')]에 대한 이 두루마리를 읽은 적 있던가? 기억이... 잘 나지 않는다. 읽었던가?\n\n분명 공부한 내용이고, 받은 교육에도 있었는데...\n\n그랬지, 내... 교육..."
 elder_events.1300.a: "그리 중요한 내용은 아니었겠지..."
 elder_events.1300.tutor: "다시 기억할 수 있게 도움이 필요하다."
 elder_events.1400.t: "즐거운 잠자리"
 elder_events.1400.desc: "\"침대로 와요, 내 [ROOT.Char.Custom('RomanticComplimentAdjective')] [ROOT.Char.Custom('RaunchyComplimentNoun')].\" 내 [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('lover'))] [lover.GetFirstName](이)가 [lover.Custom('PurrGrowl')]. [lover.GetHerHis] 눈에서 욕망이 타오르고 있었다. \"그대의 [lover.Custom('GetRaunchyPrefix')] [lover.Custom('RaunchyComplimentNoun')](이)가 뭘 배워 왔는지 궁금하지 않나요?\"\n\n[lover.GetSheHe]는 짓궂은 미소와 함께 입술을 깨물며 침대로 누웠다.\n\n\"날 가져요. 당장.\""
 elder_events.1400.a: "천 마리 말도 날 막을 순 없다!"
 elder_events.1400.b: "[ROOT.Char.GetFaith.HighGodName]께서 나를 이 [lover.GetWomanMan]에게서 구하시기를."
 death_best_sex_of_their_life: "생애 최고의 정사를 즐기던 중 심장마비로 인해 사망"
 purrs: "간드러지게 말했다"
 growls: "으르렁거렸다"
 raunchy_little: "작은"
 raunchy_sweet: "다정한"
 raunchy_pretty: "예쁜"
 raunchy_bold: "대담한"
 raunchy_wild: "거친"
 raunchy_fiery: "사나운"
 raunchy_young: "어린"
 raunchy_eager: "열렬한"
 elder_events.1500.t: "죽어도 좋은 잠자리"
 elder_events.1500.desc: "\"한때는 사람들이 날 '[lover.Custom('GetRaunchyPrefix')] [lover.Custom('RaunchyComplimentNoun')]'(이)라고 불렀는데.\" 내 [lover.GetWifeHusband] [lover.GetFirstName](이)가 희미한 웃음을 띤 채 한숨을 쉬었다. \"이제는 고작 계단을 오를 때도 헐떡일 정도라니...\"\n\n난 젊고 활력이 넘치니 [lover.GetHerHim]에게 욕망의 대상이 되는 기분을 다시 일깨워 줄 수 있다.\n\n하지만... [lover.GetHerHis] [GetTrait('faltering_heart').GetName( GetNullCharacter )]에 무리가 가지는 않으려나?"
 elder_events.1500.a: "[lover.GetHerHim]에게 일생일대의 잠자리를 선사해 줘야겠군!"
 elder_events.1500.b: "안 하는 게 낫겠어."
 elder_events.1600.t: "시간은 앞지를 수 없다"
 elder_events.1600.desc: "난 달렸다. 멈춰야 했다. 벌써 숨이 찬다.\n[ROOT.Char.Custom('ResidenceBuilding')] 주변을 몇 바퀴고 달리곤 했는데...\n\n다시 시작해 봤다. 넘어질 뻔했다. 다시 멈춰야 했다.\n\n다 이 허약해빠진 몸 탓이다."
 elder_events.1600.a: "달리던 나날도 이제 끝이군."
 elder_events.1600.b: "고통을 참고 #EMP 밀어붙여야만#! 한다."
