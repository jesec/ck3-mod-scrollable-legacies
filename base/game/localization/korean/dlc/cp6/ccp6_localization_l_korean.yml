l_korean:
 #St Peter's Basilica
 building_type_holy_site_st_peters_basilica_01: "$building_holy_site_st_peters_basilica_01$"
 building_type_holy_site_st_peters_basilica_01_desc: "$building_holy_site_st_peters_basilica_01_desc$"
 building_holy_site_st_peters_basilica_01: "성 베드로 대성당"
 building_holy_site_st_peters_basilica_01_desc: "성 베드로 대성당은 기독교로 개종한 콘스탄티누스 1세 황제의 명에 따라 바티칸 언덕의 성 베드로 무덤터 위에 세워졌다. 이곳은 서방 기독교 세계의 중심지 역할을 오랫동안 해 왔다.\n\n이 교회는 전통적으로 로마 가톨릭 교황의 거처로 기능해 왔으며, 수 세기에 걸쳐 레오 성벽의 보호를 받는 광대한 복합 단지로 성장했다."
 #Mont-Saint-Michel
 building_type_mont_st_michel_01: "몽생미셸"
 building_type_mont_st_michel_01_desc: "$building_mont_st_michel_01_desc$"
 building_mont_st_michel_01: "성 미카엘에게 봉헌된 성 오베르의 기도원"
 building_mont_st_michel_01_desc: "708년, 아브헝슈의 주교였던 성 오베르는 꿈에서 대천사 미카엘의 환시를 보았다. 그리고 바다 위에 성을 쌓으라는 계시를 받았다. 처음에는 악마의 장난으로 여겨 이 환시를 무시했다. 그러나 결국 대천사는 오베르를 설득하는 데 성공했다. 전설에 따르면 직접 손을 써서 오베르의 두개골에 구멍을 내어 이를 이루었다고 전해진다. 그리하여 주교는 몽 통브에 새로운 성소를 건설하라고 명령했다.\n\n몽생미셸의 역사는 이렇게 시작되었다."
 building_mont_st_michel_02: "몽생미셸의 로마네스크 사원"
 building_mont_st_michel_02_desc: "사원의 새로운 교회는 섬의 가장 높은 지점에 자리 잡고 있으며, 이는 천상과 대지 위에 군림하는 신의 권능과 인류의 지혜를 증명하는 상징이다.\n\n수도원 아래에는 순례자와 어부들이 모여 사는 작은 마을이 서서히 성장하고 있다."
 building_mont_st_michel_03: "라 메르베유"
 building_mont_st_michel_03_desc: "수도원은 회랑, 예배실, 와인 저장고, 기사들의 방, 그리고 수많은 거처가 연이어 확장되며 고딕 양식의 복합 단지를 이루었다. 그 결과 공학의 경이로움이라 부를 수밖에 없는 현재의 모습이 되었다.\n\n수도원에는 견고한 새로운 방어 설비가 더해졌으며, 그 아래의 정착지는 이제 수많은 순례자와 현지인들이 함께 거주하는 제대로 된 마을이 되었다."
 building_mont_st_michel_04: "몽생미셸의 요새화된 수도원"
 building_mont_st_michel_04_desc: "최근의 전쟁들은 몽생미셸과 같은 평화의 섬조차 전략적 거점이 될 수 있음을 분명히 보여 주었다. 그 결과 바위섬 전체가 두꺼운 성벽과 보루로 철저히 요새화되었고, 수비대 병력을 위한 여러 거처가 새롭게 조성되었다.\n\n해안의 마을은 이제 활기찬 도시가 되었으며, 섬 대부분이 거주지로 뒤덮인 모습을 볼 수 있다."
 #Sanchi Stupa
 building_type_sanchi_stupa_01: "$building_sanchi_stupa_01$"
 building_type_sanchi_stupa_01_desc: "$building_sanchi_stupa_01_desc$"
 building_sanchi_stupa_01: "산치 대탑"
 building_sanchi_stupa_01_desc: "대탑은 기원전 3세기 마우리아 황제 아소카가 아내 데비와의 결혼 장소 인근에 건설한 건축물이다. 부처의 사리를 안치한 이 장엄한 구조물은 이러한 유형 가운데 가장 오래된 것으로 손꼽히며, 정교하게 조각된 토라나 문으로도 널리 알려져 있다."
 #Boudhanath
 building_type_boudhanath_01: "$building_boudhanath_01$"
 building_type_boudhanath_01_desc: "$building_boudhanath_01_desc$"
 building_boudhanath_01: "부다나트"
 building_boudhanath_01_desc: "자룽 카쇼르 및 카사 차이티야라는 이름으로도 알려진 카트만두의 부다나트 불탑은 불교에서 가장 거대한 불탑 가운데 하나로, 현재의 티베트 불교로 발전한 전통의 발상지일 가능성도 제기된다. 거대한 돔과 만다라 구조 안에는 여러 부처의 사리와 다양한 성유물이 여럿 안치되어 있다.\n\n또한 네팔과 티베트를 잇는 고대 교역로 위에 자리한 덕분에, 여행자와 상인들이 쉬거나 기도하기 위해 자주 들르는 장소이기도 하다."
 #Grand Mosque of Yazd
 building_type_yazd_mosque_01: "$building_yazd_mosque_01$"
 building_type_yazd_mosque_01_desc: "$building_yazd_mosque_01_desc$"
 building_yazd_mosque_01: "야즈드 대 모스크"
 building_yazd_mosque_01_desc: "4세기 불의 사원을 세웠던 자리 위에 건설된 이 빼어난 건축물은 거대한 홀, 타일로 장식된 돔, 그리고 하늘 높이 솟은 한 쌍의 뾰족탑을 갖춘 장엄한 정문으로 여행자와 순례자 모두를 놀라게 합니다."
 #Qutb Minar
 building_type_qutb_minar_01: "$building_qutb_minar_01$"
 building_type_qutb_minar_01_desc: "$building_qutb_minar_01_desc$"
 building_qutb_minar_01: "델리의 철기둥"
 building_qutb_minar_01_desc: "델리의 철기둥은 찬드라굽타 2세가 누렸던 영광을 상징하는 건축물입니다. 그 위에는 대를 이었던 통치자들의 이름 역시 아로새겨져 있습니다. 오랜 세월을 버텨냈음에도 불구하고, 녹이 슨 흔적을 찾아볼 수가 없는 건축물이기도 합니다. 인도의 대장장이들이 얼마나 뛰어난 기량을 지녔는지를 내보이는 사례라고도 볼 수 있습니다."
 building_qutb_minar_02: "쿠트브 미나르"
 building_qutb_minar_02_desc: "델리의 철기둥이 서 있던 옛터를 둘러싸고 세워진 웅장한 대 모스크 쿠와트 알 이슬람에는, 쿠트브 미나르라 불리는 실로 거대한 뾰족탑이 우뚝 솟아 있다.\n\n이는 델리 영주들의 권력을 상징하는 장대한 기념비이다."
 building_qutb_minar_03: "확장된 쿠와트 알 이슬람 모스크"
 building_qutb_minar_03_desc: "쿠트브 미나르 주변의 복합 시설은 여러 개의 안뜰과 출입문, 영묘가 추가되며 그 규모가 확장되어 전설적인 수준에 이르렀다."
 building_qutb_minar_04: "알라이 미나르"
 building_qutb_minar_04_desc: "쿠트브 미나르를 본떠 설계하되 두 배 크기로 만든 두 번째 뾰족탑이 복합 시설에 추가되었다. 델리 위로 거대하게 솟은 이 거석은 인도-이슬람 건축의 정점이라 할 수 있다."
