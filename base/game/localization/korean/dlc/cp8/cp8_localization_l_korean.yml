l_korean:
 #Goguryeo Tomb
 building_type_goguryeo_tomb_01: "$building_goguryeo_tomb_01$"
 building_type_goguryeo_tomb_01_desc: "$building_goguryeo_tomb_01_desc$"
 building_goguryeo_tomb_01: "장군총"
 building_goguryeo_tomb_01_desc: "정교하게 다듬은 석재로 지어진 거대한 직사각형 무덤입니다. 고대 고구려의 어떤 왕을 위해 조성되었다고 전해지지만, 왕릉의 주인은 기억 속에서 사라졌습니다. 무덤으로 이어지는 회랑에는 다채로운 프레스코화가 그려져 있으며, 피라미드 정상에는 매장된 이를 기리는 작은 목조 정자가 세워져 있습니다."
 #Great Buddha of Kamakura
 building_type_buddha_kamakura_01: "$building_buddha_kamakura_01$"
 building_type_buddha_kamakura_01_desc: "$building_buddha_kamakura_01_desc$"
 building_buddha_kamakura_01: "가마쿠라 대불"
 building_buddha_kamakura_01_desc: "가마쿠라 #italic 대불#!은 수 톤에 달하는 아미타불 청동상으로, 금빛 장식이 더해진 유서 깊은 조형물입니다. 이 불상은 남서부 지역 사원 양식에서 영감을 받은 웅장한 전각 안에 봉안되어 있으며, 서른두 장의 연꽃잎이 주변을 둘러싸고 있습니다."
 #Lingapura Pyramid
 building_type_pyramid_lingapura_01: "$building_pyramid_lingapura_01$"
 building_type_pyramid_lingapura_01_desc: "$building_pyramid_lingapura_01_desc$"
 building_pyramid_lingapura_01: "링가푸라 피라미드"
 building_pyramid_lingapura_01_desc: "이 위대한 계단식 피라미드는 밀림 속에서 성스러운 산처럼 솟아오르며, 일곱 개의 테라스에는 오를수록 점점 더 화려해지는 사당과 제단이 배치되어 있습니다. 최상부의 성소가 구조물의 정점을 이루고 있으며, 그 안에는 종교적 축선 설계의 중심이 되는 시바의 신성한 #italic 링가#!가 엄숙히 보호되어 있습니다."
 #Maijishan Grottoes
 building_type_maijishan_grottoes_01: "$building_maijishan_grottoes_01$"
 building_type_maijishan_grottoes_01_desc: "$building_maijishan_grottoes_01_desc$"
 building_maijishan_grottoes_01: "맥적산 석굴"
 building_maijishan_grottoes_01_desc: "맥적산은 오래전부터 숭배의 대상이 되어 온 성산으로, 풍수적으로 길지로 여겨지는 남쪽 절벽을 따라 붉은 암벽 속에 수백 개의 사당이 조성되어 있습니다. 평온한 부처와 보살들의 조각, 그리고 화려한 벽화들이 이곳에 봉안되어 있습니다. 석굴 대부분은 인근 도시의 유력 가문들이 시주해 조성한 것으로, 오랫동안 순례와 명상의 공간이 되어 왔습니다."
 #Three Pagodas of Dali
 building_type_three_pagodas_dali_01: "$building_three_pagodas_dali_01$"
 building_type_three_pagodas_dali_01_desc: "$building_three_pagodas_dali_01_desc$"
 building_three_pagodas_dali_01: "숭성사 삼탑"
 building_three_pagodas_dali_01_desc: "도시를 다스리는 가문의 광대한 사원 단지 한가운데에 벽돌 벽과 석조 기단으로 이루어진 세 개의 높은 탑이 서 있습니다. 이 탑들은 이등변삼각형을 이루며 배치되어 신성한 기하학적 질서를 드러내고, 주변의 산과 호수를 장엄하게 감싸안는 구도를 완성합니다."
 #Iron Lion of Cangzhou
 building_type_iron_lion_cangzhou_01: "$building_iron_lion_cangzhou_01$"
 building_type_iron_lion_cangzhou_01_desc: "$building_iron_lion_cangzhou_01_desc$"
 building_iron_lion_cangzhou_01: "창주 철사자"
 building_iron_lion_cangzhou_01_desc: "이 기념비적인 사자상은 중국 전역을 통틀어 가장 거대한 주철 조각입니다. 단단한 등 위에는 연꽃 좌대에 온화하게 앉은 보살상이 금빛 장식으로 화려하게 꾸며져 있습니다. 홍수가 잦은 평야 인근에 자리한 이 조형물은, 지역 주민들에게 밀려오는 물결을 막아 주는 수호자로 널리 알려져 있습니다."
 #Gaocheng Observatory
 building_type_dengfeng_observatory_01: "$building_dengfeng_observatory_01$"
 building_type_dengfeng_observatory_01_desc: "$building_dengfeng_observatory_01_desc$"
 building_dengfeng_observatory_01: "고성 관성대"
 building_dengfeng_observatory_01_desc: "풍수적 특성과 중국 내에서 지리적 중심을 상징한 덕분에 수백 년 동안 천문 관측에 이상적인 곳으로 여겨진 장소입니다. 현재의 구조물은 복합적인 사다리꼴 형태로 이루어져 있으며, 중앙에 세워진 높은 막대가 단을 가르는 도랑 위로 그림자를 드리워 태양의 이동과 시간의 흐름을 표시하는 거대한 해시계 역할을 합니다."
 #Candi of Muara Takus
 building_type_muara_takus_01: "$building_muara_takus_01$"
 building_type_muara_takus_01_desc: "$building_muara_takus_01_desc$"
 building_muara_takus_01: "무아라 타쿠스 사원"
 building_muara_takus_01_desc: "수많은 건축물로 이루어져 있으며, 모두 벽돌로 축조되고 사암 장식으로 꾸며진 사원 단지입니다. 중심부에는 #italic 마흘리가이#!와 #italic 투오#!의 커다란 첨탑이 솟아 있습니다. 전자는 높고 날렵한 형태를 지니고 있으며, 후자는 산처럼 웅대하여 주변의 작은 사당과 테라스들을 압도합니다."
 #Stone Pagoda of Mireuksa
 building_type_stone_pagoda_01: "$building_stone_pagoda_01$"
 building_type_stone_pagoda_01_desc: "$building_stone_pagoda_01_desc$"
 building_stone_pagoda_01: "미륵사지 석탑"
 building_stone_pagoda_01_desc: "넓은 석조 기단 위에 서 있는 9층 석탑입니다. 옅은 석재가 햇살 아래에서 은은하게 빛나는 모습입니다. 한반도 국가 최초의 석탑이란 평가를 받으며, 그 형태와 균형 잡힌 비례는 한반도 전역의 사찰 건축가들에게 모범이 되어 왔습니다."
 #Thuriang Kilns
 building_type_thuriang_kilns_01: "$building_thuriang_kilns_01$"
 building_type_thuriang_kilns_01_desc: "$building_thuriang_kilns_01_desc$"
 building_thuriang_kilns_01: "투리앙 가마터"
 building_thuriang_kilns_01_desc: "이 부지에는 200개가 대형 가마가 자리하고 있어, 이 지역 최대의 청자 생산 중심지로 알려져 있습니다. 이곳에서 구워진 도자기는 거칠고 단단하게 소성된 질감과 독특한 황록색 유약으로 유명하며, 동남아시아 전역의 시장으로 퍼져 거래되고 있습니다."
 #Yuelu Academy
 building_type_yuelu_academy_01: "$building_yuelu_academy_01$"
 building_type_yuelu_academy_01_desc: "$building_yuelu_academy_01_desc$"
 building_yuelu_academy_01: "악록서원"
 building_yuelu_academy_01_desc: "악록서원은 중국에서도 손꼽히는 명망 높은 학문 기관 가운데 하나로, 오랫동안 학문 연구와 과거 시험의 중심지 역할을 해 왔습니다. 서원의 배치는 중심 중정을 축으로 삼고 있으며, 그 주변으로 여러 부속 강당과 정자가 균형 잡힌 대칭을 이루며 뻗어 있습니다. 여러 세대에 걸쳐 수많은 학자가 이곳에서 관직 진출을 준비하곤 했습니다."
 #Chocolate Hills #NOTE: today are called "Chocolate" Hills, but of course chocolate didn't exist in the Philippines back then. This is a random name I thought out, but it is not based on native names (none of which seem to have survived from then)
 building_type_chocolate_hills_01: "$building_chocolate_hills_01$"
 building_type_chocolate_hills_01_desc: "$building_chocolate_hills_01_desc$"
 building_chocolate_hills_01: "적갈색 비탈"
 building_chocolate_hills_01_desc: "이 지질 구조는 둥글고 원뿔형에 가까운 언덕들이 광활한 지역에 걸쳐 균일하게 펼쳐져 있는 것이 특징입니다. 언덕들은 풀로 덮여 있으며, 건기에는 이 풀이 짙은 갈색과 주황빛으로 물들어 지형 전체에 독특한 가을빛 색감을 더합니다."
 #Fanfang of Guangzhou
 building_type_fanfang_guangzhou_01: "$building_fanfang_guangzhou_01$"
 building_type_fanfang_guangzhou_01_desc: "$building_fanfang_guangzhou_01_desc$"
 building_fanfang_guangzhou_01: "광저우 번방"
 building_fanfang_guangzhou_01_desc: "#italic 번방#!은 해상 교역로를 통해 이곳에 도착한 무슬림 아랍인과 페르시아인을 중심으로 형성된 외국 상인 공동체입니다. 이들은 독자적인 행정과 관습을 지닌 구역을 도시 서쪽에 부여받아 자리를 잡았습니다. 그 중심에는 붉은 벽으로 둘러싸인 모스크가 서 있으며, 높은 뾰족탑과 등대가 함께 솟아 선박과 사람들을 안전한 항구로 인도합니다."
 #Wilwatikta Palace
 building_type_wilwatikta_palace_01: "$building_wilwatikta_palace_01$"
 building_type_wilwatikta_palace_01_desc: "$building_wilwatikta_palace_01_desc$"
 building_wilwatikta_palace_01: "윌와틱타 궁전"
 building_wilwatikta_palace_01_desc: "윌와틱타는 정자와 전각, 사원, 중정이 광범위하게 펼쳐진 거대한 궁전 단지로, 하나의 도시처럼 느껴질 만큼 규모가 방대합니다. 직사각형의 벽돌 성벽이 경내를 둘러싸고 있으며, 의례 행렬이 지나가는 대로 입구에는 높이 솟은 #italic 파두락사#! 문들이 연이어 서 있습니다."
 #Ha Long Bay
 building_type_ha_long_bay_01: "$building_ha_long_bay_01$"
 building_type_ha_long_bay_01_desc: "$building_ha_long_bay_01_desc$"
 building_ha_long_bay_01: "하롱 만"
 building_ha_long_bay_01_desc: "잔잔한 에메랄드빛 바다 위로 카르스트와 석회암 섬들이 솟아올라 장엄한 풍경을 이룹니다. 현지 어부들은 어군을 찾아서 기둥 같은 바위들의 그늘 아래를 떠다닙니다."
 #My Son Sanctuary
 building_type_my_son_sanctuary_01: "$building_my_son_sanctuary_01$"
 building_type_my_son_sanctuary_01_desc: "$building_my_son_sanctuary_01_desc$"
 building_my_son_sanctuary_01: "미 선 유적지"
 building_my_son_sanctuary_01_desc: "참 사원 단지 가운데서도 가장 규모가 크고 정교한 유적입니다. 숲이 우거진 땅에 가까이 배치된 여러 개의 경내로 이루어져 있습니다. 각 경내에는 고유한 문과 사당, 불탑이 갖추어져 있으며, 모든 건축물은 붉은 벽돌로 축조되어 기하학적인 배치를 이루고, 사암으로 된 인방 장식으로 화려하게 꾸며져 있습니다."
 #Gunung Api
 building_type_gunung_api_01: "$building_gunung_api_01$"
 building_type_gunung_api_01_desc: "$building_gunung_api_01_desc$"
 building_gunung_api_01: "구눙 아피"
 building_gunung_api_01_desc: "밀림의 야생 속에서 솟아오른 이 산은 지역 주민들이 신성하게 여기는 장소입니다. 습기와 안개가 감도는 가운데, 헤아릴 수 없는 세월 동안 물이 깎아 만들어 낸 인상적인 석회암 첨봉과 깊은 동굴들이 산비탈 곳곳에서 존재감을 드러냅니다."
 #Sulawesi Megaliths
 building_type_suwalesi_megaliths_01: "$building_suwalesi_megaliths_01$"
 building_type_suwalesi_megaliths_01_desc: "$building_suwalesi_megaliths_01_desc$"
 building_suwalesi_megaliths_01: "술라웨시 거석"
 building_suwalesi_megaliths_01_desc: "지역 주민들이 의식을 치르고 영혼을 기리기 위해 세운 수많은 거석상과 상징물이 중부 술라웨시의 계곡 전역에 흩어져 있습니다. #italic 아르카#!라고 알려진 이 조형물은 극도로 절제된 손길로 정밀하게 조각되었으며, 그 덕분에 섬세하고 우아한 선으로 윤곽이 드러납니다."
 #Izumo Taisha
 building_type_izumo_taisha_01: "$building_izumo_taisha_01$"
 building_type_izumo_taisha_01_desc: "$building_izumo_taisha_01_desc$"
 building_izumo_taisha_01: "키즈키 대사"
 building_izumo_taisha_01_desc: "이 위대한 신토 신사, 즉 #italic 대사#!는 바닷가 가까이에 세워져 바다를 향해 서 있습니다. 거대한 목재 기둥과 굵은 통나무 위에 지어져, 사람들이 오가는 땅 위로 훌쩍 떠올라 대지의 신과 영혼들이 머무는 하늘로 높이 솟은 모습입니다."
 #Temple of Confucius
 building_type_confucius_temple_01: "$building_confucius_temple_01$"
 building_type_confucius_temple_01_desc: "$building_confucius_temple_01_desc$"
 building_confucius_temple_01: "공묘"
 building_confucius_temple_01_desc: "이 거대한 사원 단지는 모든 문묘 가운데 가장 오래되고 커다란 영향력을 지닌 곳입니다. 조화로운 기하학적 배치와 세련된 세부 장식을 통해 중국 전역은 물론 그 너머의 사원 건축가들에게 일종의 기준이자 영감의 원천이 되어 왔습니다. 인근에는 공자와 그 후손들이 잠든 숲이 고요하게 자리하고 있으며, 따라서 유학자들에게 중요한 순례지로 남아 있습니다."
 #Imperial Citadel of Lin'an
 building_type_citadel_linan_01: "$building_citadel_linan_01$"
 building_type_citadel_linan_01_desc: "$building_citadel_linan_01_desc$"
 building_citadel_linan_01: "임안 황성"
 building_citadel_linan_01_desc: "봉황산 북쪽 비탈을 따라 조성된 이 황성은 조정과 행정의 거점으로 기능하며, 수많은 학자와 관리들을 광활한 전각과 회랑으로 맞이해 왔습니다. 비록 북방 수도들의 궁전만큼 규모가 크지는 않지만, 층층이 조성된 정원과 정자의 세련됨, 우아함은 그에 결코 뒤지지 않습니다."
 #The Temples of Angkor
 building_type_temples_angkor_01: "$building_temples_angkor_01$"
 building_type_temples_angkor_01_desc: "$building_temples_angkor_01_desc$"
 building_temples_angkor_01: "앙코르 사원"
 building_temples_angkor_01_desc: "인드라의 번영하는 도시에는 금빛 지붕과 첨탑을 얹은 사원들이 셀 수 없이 늘어서 있으며, 각 사원은 신들과 데바라자를 형상화한 부조와 조각이 서로 경쟁하듯 화려하게 장식되어 있습니다."
 building_temples_angkor_02: "앙코르 와트"
 building_temples_angkor_02_desc: "앙코르 와트는 비슈누 신에게 바치는 거대한 사원 단지입니다. 힌두교 신화에서 신들의 거처로 여겨지는 메루산을 형상화하여 설계되었습니다. 단지 전체가 인상적인 해자로 둘러싸여 있으며, 수많은 회랑 사원은 종교적 예술, 조각, 부조로 가득합니다."
