l_korean:
 # Flight of the Tai, Mass migration main event
 tgp_tai_migration_event.1000.t: "타이족의 도피"
 tgp_tai_migration_event.1000.desc: "오늘 열린 자문회에서 타이족 정착민이 대규모로 이주해 왔다는 소식을 들었다. 이 공동체의 장로이자 대표자인 [migration_leader.GetName](이)가 지금 내 앞에 서서 겸손하게 [migration_leader.GetHerHis] 상황을 소개하고 있었다.\n\n\"[ROOT.Char.GetTitleAsNameNoTooltip], 저희는 [migration_origin_holder.GetName]의 신하였으나, 이제는 저희를 이끌어 줄 이와 새로운 고향을 찾고 있습니다. 저는 수많은 씨족과 수천의 난민을 대표해 이 자리에 와 있습니다. 저희를 지켜 주시고, 저희에게 목적을 주시면 그대의 너그러운 마음에 걸맞게 쓸모 있는 신하가 되겠습니다.\"\n\n저들의 운명이 내 입에서 나올 말에 달려 있었다."
 tgp_tai_migration_event.1000.a: "그대 모두를 내 문객이 아니라, 신하로서 환영하겠다."
 tgp_tai_migration_event.1000.b: "그대들 중 유능한 자만이 내 [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip]에 거주할 수 있다."
 tgp_tai_migration_event.1000.c: "사람이 많으면 문제도 늘어나는 법. 간청은 다른 곳에나 가서 하라."
 tgp_tai_migration_event_1000.c_shooed_immigrants_tt: "이주민들이 가까운 시일 내로 인근의 다른 영주에게 피난처를 요청하게 됨."
 tgp_tai_migration_skilled_development_county_modifier: "기능공의 도피"
 tgp_tai_migration_migration_happened_county_modifier: "타이족 정착민"
 tgp_tai_migration_migration_happened_character_modifier: "무수한 이주민 수용"
 tgp_tai_migration_migration_rejected_character_modifier: "거부당한 이주민"
 # Lone skilled Tai character offers services
 tgp_tai_migration_event.2000.t: "유능한 타이족"
 tgp_tai_migration_event.2000.desc: "[migrant_skilled_character.GetCulture.GetNameNoTooltip]에서 왔다는 유능하고 식견 있는 [migrant_skilled_character.GetWomanMan] 한 명이 내 앞에 서서 일자리를 구하고 있었다. [migrant_skilled_character.GetHerHis|U] 태도는 이 민족의 도피에 관한 최근의 소식을 반영하고 있는 듯했다.\n\n"
 tgp_tai_migration_event.2000.wet_nurse.desc: "\"성하, 제 이름은 [migrant_skilled_character.GetName]입니다. 경험 많은 보호자이며 당장이라도 일할 준비가 되어 있습니다. 신체도 건강하고, 영양 상태도 좋으며 아이들에게 무엇이 필요한지 잘 알고 있습니다. 성하의 혈통이 번성할 수 있도록 돕겠습니다.\""
 tgp_tai_migration_event.2000.champion.desc: "\"주군, 저는 고향에서 [migrant_skilled_character.GetName](으)로 불렸으며, 맹세를 한 전사로서 수많은 시합에서 우승을 거머쥐었습니다. 제 팔은 굳건하며 충성심 또한 흔들리지 않습니다. 주군의 투사가 되겠습니다.\""
 tgp_tai_migration_event.2000.travel_leader.desc: "\"[ROOT.Char.GetTitleAsNameNoTooltip], 저는 [migrant_skilled_character.GetName]입니다. 별들을 지도 삼고, 바람을 친구 삼아 사막을 가로질러 여행해 왔습니다. 제가 선두에 있다면 그 어떤 상단도 길을 잃지 않으며, 그 어떤 길을 만나도 골치를 썩이지 않으실 겁니다.\""
 tgp_tai_migration_event.2000.master_of_hunt.desc: "\"저는 타고난 추적자이며, 야생에서 단련한 사람입니다. 모든 짐승의 냄새는 물론, 모든 나무의 정적을 잘 알고 있습니다. 저만큼 말발굽을 잘 읽는 사람도 없지요. 어떻게 하시겠습니까, [ROOT.Char.GetTitleAsNameNoTooltip]?\""
 tgp_tai_migration_event.2000.court_physician.desc: "\"저는 오래된 서책의 연고를 잘 아는 것은 물론, 중압감 속에서도 실력을 발휘하는 재주가 있습니다. [ROOT.Char.GetTitleAsNameNoTooltip], 저야말로 그 신성한 육체를 안정시킬 수 있는 [migrant_skilled_character.GetWomanMan]입니다. 제 이름은 [migrant_skilled_character.GetName](이)라고 합니다.\""
 tgp_tai_migration_event.2000.antiquarian.desc: "\"이 눈으로는 신화를 봤으며, 이 손으로는 고대의 제국을 만졌습니다. 허락해 주시면 고대의 지혜가 이 궁정에 도달할 수 있도록 돕겠습니다.\""
 tgp_tai_migration_event.2000.court_tutor.desc: "\"[ROOT.Char.GetTitleAsNameNoTooltip], 저는 수많은 전사와 관리에게 영향을 미쳤습니다. 허락해 주신다면, 그대의 자손들 역시 제 지도 아래 위대한 능력을 갖추게 될 겁니다.\""
 tgp_tai_migration_event.2000.end.desc: "\n\n[migrant_skilled_character.GetSheHe|U]는 피난처가 절박해 보였다. 아마 [migrant_skilled_character.GetHerHim]를 여기까지 몰고 온 상황 때문일 것이다. 하지만 이 사람은 자신의 실력을 확실히 잘 알고 있기도 하다. [migrant_skilled_character.GetHerHis] 능력을 이용하는 것이 좋을까?"
 tgp_tai_migration_event.2000.a: "그대의 능력이 필요할지도 모르네."
 tgp_tai_migration_event.2000.b: "아직은 아닐세. 하지만 우리 곁에 머무르도록."
 tgp_tai_migration_event.2000.b.success: "[migrant_skilled_character.GetNameNoTooltip](이)가 당신의 궁정에 합류함"
 tgp_tai_migration_event.2000.b.failure: "[migrant_skilled_character.GetNameNoTooltip](이)가 당신의 제안을 거절함"
 tgp_tai_migration_event.2000.c: "거절해야겠군."
 # Noble Tai character and his family are asking for a spare county
 tgp_tai_migration_event.3000.t: "가장의 제안"
 tgp_tai_migration_event.3000.desc: "곧은 자세의 외국인이 내 전당으로 다가왔다. 누가 봐도 행정에 관련된 제안을 할 것 같은 자신감을 갖춘 모습이었다.\n\n이 사람은 보통의 투박한 태도가 아니라, 놀랍도록 진심이 담긴 인사를 건넨 뒤에 자신의 가족이 내 땅으로 오기까지 거쳤던 비통한 여정에 대해 자세한 이야기를 들려주었다. 그러더니 대담한 결론을 내어놓았다.\n\n\"...도적과 약탈자들입니다, [ROOT.Char.GetTitleAsNameNoTooltip]. 모든 것을 빼앗긴 제게 남은 것은 이제 입증된 재능, 관리에 걸맞은 통찰력, 그리고 그대의 도움이 필요한 가족뿐입니다. 저와 제 혈육은 저희가 더 이상 그대의 눈에 들지 않을 때까지 그대를 섬기겠습니다.\""
 tgp_tai_migration_event.3000.a: "충성한다면야 그 소원을 들어주겠네."
 tgp_tai_migration_event.3000.b: "나한테 공평한 거래 같진 않은데."
 # A family of lowborn peasant characters offer services
 tgp_tai_migration_event.4000.t: "타이족 가족"
 tgp_tai_migration_event.4000.desc: "경비병들이 북쪽 땅에서 온 궁핍한 외국인 가족을 전당으로 데려왔다.\n\n길고 긴 애원 끝에, 가장이 내 눈을 깊이 들여다보며 자신이 갖지 않은 모든 것을 내어놓고 내 궁전 바닥을 청소할 테니, 내 강력한 땅을 피난처로 삼게 해 달라고 했다. 이 사람의 이야기로 미루어보면, 이 가족 말고도 많은 이가 새로운 보호자를 찾아 우리의 땅으로 몰려들고 있는 모양이었다."
 tgp_tai_migration_event.4000.a: "어려운 시기에 그대의 피난처가 되어 주겠다."
 tgp_tai_migration_event.4000.b: "내 궁정에는 그대 가족이 필요하지 않다."
