l_korean:
 tgp_travel_danger_events.0001.t: "폐허 속 삶"
 tgp_travel_danger_events.0001.intro: "[ROOT.Char.GetCurrentLocation.GetName](을)를 거쳐 가던 나는 사방에 가득한 [disaster_situation.GetType.GetNameNoTooltip|l]의 영향을 보았다."
 tgp_travel_danger_events.0001.flood: "강가에는 잔해가 가득했고, 집들이 개울 위에 떠가는 낙엽처럼 강을 따라 흘러갔다. 격노한 급류가 마을 전체를 집어삼킨 것이다."
 tgp_travel_danger_events.0001.earthquake: "한때 풍요롭고 활기 넘치던 마을은 땅에 삼켜졌으며, 이제는 고요한 폐허와 잔해로만 남아 있었다."
 tgp_travel_danger_events.0001.desc: "\n\n폐허가 된 마을 변두리에 도착하자 돌무더기 속에 홀로 있는 아이가 보였다. [peasant_character_child.GetSheHe|U]는 나를 눈치채지 못했으며, 한때 농가였던 건물을 다시 지으려고 필사적으로 노력하고 있었다."
 tgp_travel_danger_events.0001.a: "내 부하들이 돌무더기를 치워 줄 거다."
 tgp_travel_danger_events.0001.b: "내가 이 아이를 보살피겠다."
 tgp_travel_danger_events.0001.c: "이러고 있을 시간은 없다!"
 impressed_by_kindness: "친절에 감명받음"
