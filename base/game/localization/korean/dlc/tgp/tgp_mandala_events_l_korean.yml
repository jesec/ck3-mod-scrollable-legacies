 maximum_devotion_reached_msg: "최대 헌신 단계 도달함"
 maximum_devotion_reached_msg_desc: "[maximum_piety_level|E]에 도달했습니다.\n[close_family|E] [heir|E]가 더 나아갈 수 있도록 하려면, 당신이 자신의 [aspect|E]과 어울리는 방식으로 [character_death_death|E]할 수 있도록 조심해야 합니다."
