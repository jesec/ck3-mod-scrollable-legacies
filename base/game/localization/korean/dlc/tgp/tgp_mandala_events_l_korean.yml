l_korean:
 aspect_upgrade_event_header: "[ROOT.Char.Custom('GetAspectNoun')|U]의 측면:"
 tgp_east_asia_mandala_events.1000.t: "$aspect_upgrade_event_header$ 승천"
 tgp_east_asia_mandala_events.1000.t.final: "$aspect_upgrade_event_header$ 초월"
 tgp_east_asia_mandala_events.1000.desc.02: "나는 [ROOT.Char.Custom('GetAspectNoun')]의 측면의 다음 단계로 승천하며, 큰 기쁨과 [ROOT.Char.Custom('GetAspectNoun')]의 춤과 의례로 [ROOT.Char.GetHouse.GetBaseName] 집안에 자부심을 안겨 주었다.\n\n우리의 #EMP 힘#!과 신을 닮은 행위에 대한 소문이 날이 갈수록 더 많은 추종자를 끌어모은다.\n\n나는 내 앞에 모인 축하자들이 이루는 광경을 감상하며 이 순간을 만끽했다."
 tgp_east_asia_mandala_events.1000.desc.03.outro: "나는 뒤로 기대 상징적인 희생을 바라보았고, 공연자들이 내 명예를 기리며 춤추는 모습을 지켜보았다. #EMP 우리의 힘이 자라난다.#!"
 tgp_east_asia_mandala_events.1000.desc.creation_03: "아름다운 색채의 향연, 춤과 음악으로 창조의 측면을 기리는 연회가 펼쳐졌다. [ROOT.Char.GetHouse.GetBaseName] 집안이 창조의 중간 단계로 승천한 것을 축하하기 위함이었다.\n\n연이은 행위로 신성함을 증명한 우리는 수많은 추종자를 모았다.\n\n아니지, #EMP 내가#! 수많은 추종자를 모은 것이다. 또한 이들은 #EMP 나를#! 믿고 있다."
 tgp_east_asia_mandala_events.1000.desc.creation_04: "확연히 시끌벅적한 연회였다. 거의 완벽한 창조의 측면을 축하하기에 이보다 더 좋은 방법이 어디 있을까? 춤, 의식, 흘끗 보이는 나체들이 창조와 [ROOT.Char.GetHouse.GetBaseName] 집안의 드높은 승천을 축하하고 있다.\n\n수많은 신도가 누구도 막을 수 없는 힘으로 우리를 단단히 뒷받침하며, 세계에서의 입지를 차지하게 해 준다.\n\n나는 근처의 탁자에서 아주 맛있어 보이는 [ROOT.Char.Custom('GetAspectNoun')](을)를 조금 집어 들고 눈앞의 광경을 감상하며 먹기 시작했다."
 tgp_east_asia_mandala_events.1000.desc.05.intro: "드디어 [ROOT.Char.GetHouse.GetBaseName] 집안과 그 신성한 후예들이 완벽해졌다."
 tgp_east_asia_mandala_events.1000.desc.creation_05: "$tgp_east_asia_mandala_events.1000.desc.05.intro$\n\n이제 그 누구도 [ROOT.Char.GetHouse.GetBaseNameNoTooltip]의 자매와 형제들이 창조의 측면의 증표와 소질을 지니고 있으며, 지상에 창조자의 행위를 퍼뜨리고 있음을 의심하지 않는다.\n\n물론 #EMP 내가#! 바로 그 창조자의 형상이다.\n\n나는 [ROOT.Char.Custom('RegionalDrink')] 한 잔을 더 내려놓으며 몇 주간 이어질 축하의 시작을 알렸다."
 tgp_east_asia_mandala_events.1000.desc.serenity_03: "최고로 주의를 기울여 이루어진 축하였다. [ROOT.Char.GetHouse.GetBaseName] 집안의 평온의 측면의 중간 단계로 승천했으니, 비용을 아낄 이유가 없었다.\n\n사람들은 우리의 방식이 주는 이득을 알기 시작했고, 우리의 평화로운 길을 따르는 이들도 점점 늘고 있다.\n\n나는 세상을 더 나은 곳이자 더 평화로운 곳으로 만들 기회를 소중히 여길 것이다."
 tgp_east_asia_mandala_events.1000.desc.serenity_04: "단체 명상과 함께 웅장한 축하가 시작되었다. 수많은 사람이 평온 속에 머리를 숙이는 모습을 보니 내 마음도 노래하는 듯했다. 완벽한 평온의 측면으로 가는 길목에 자리한 [ROOT.Char.GetHouse.GetBaseName] 집안을 기리기에 이보다 더 좋은 방법이 있을까?\n\n어마어마한 신도들이 이 세계에서 우리의 입지를 증명한다. 평화와 고요를 향한 갈망이자, 수용과 합의를 바라고 있는 이들이었다.\n\n나는 다시 한번 고요한 기도와 명상에 빠져들며 머리를 숙이고, 이 상황을 깊이 숙고해 보았다."
 tgp_east_asia_mandala_events.1000.desc.serenity_05: "$tgp_east_asia_mandala_events.1000.desc.05.intro$\n\n적은 친구가 되었다. 평화와 번영이 봉역 전체로 퍼져나갔다. [ROOT.Char.GetHouse.GetBaseNameNoTooltip] 집안의 자매와 형제들이 불어넣은 지혜와 평온은 [ROOT.Char.GetPrimaryTitle.GetBaseName]에서 오래도록 이어질 흔적을 남겼다.\n\n평온의 측면을 지닌 진정한 형상을 위한 참으로 평화로운 축하였다.\n\n나는 저들의 우아한 기도와 소원에 대한 답으로, 자비롭게 고개를 숙여 보였다."
 tgp_east_asia_mandala_events.1000.desc.destruction_03: "군대가 방패에 무기를 부딪히자 귀가 먹먹할 정도의 소음이 울려 퍼졌다. 모두가 파괴의 측면의 중간 단계로 승천한 [ROOT.Char.GetHouse.GetBaseName] 집안을 주목했다.\n\n우리의 유산에 대한 소문이 빠르게 퍼져 나가며, 우리를 따르는 추종자 수도 전보다 더 크게 늘었다.\n\n$tgp_east_asia_mandala_events.1000.desc.03.outro$"
 tgp_east_asia_mandala_events.1000.desc.destruction_04: "#EMP 쿵, 쿵.#! [ROOT.Char.GetPrimaryTitle.GetBaseName]의 병사들이 기념 의식을 수행하며, 파괴의 춤을 흉내 내는 동안 천둥 같은 발소리 외에는 아무런 소리도 들리지 않았다. 이제 [ROOT.Char.GetHouse.GetBaseName] 집안이 초월을 이루기 직전의 단계까지 왔다.\n\n추종자들은 열정적으로 우리와 뜻을 같이하며 진정한 파괴의 측면을 섬기고 싶어 한다.\n\n나는 씩 웃으며, 의식을 바라보면서 숫돌로 검날을 신중히 갈았다.\n\n#EMP 쿵, 쿵.#!"
 tgp_east_asia_mandala_events.1000.desc.destruction_05: "$tgp_east_asia_mandala_events.1000.desc.05.intro$\n\n맹세를 바친 [ROOT.Char.GetPrimaryTitle.GetBaseName]의 군대가 [ROOT.Char.GetHouse.GetBaseNameNoTooltip]의 자매와 형제들을 섬기며 무시무시하게 발을 구르고, 노래와 의식을 수행하자 땅이 떨리는 듯했다.\n\n이들은 의식을 계속하기 전에 자신들의 신인 내 앞에 잠깐 무릎을 꿇었다.\n\n나는 한 의식에서 바쳐진 두개골을 무심하게 내려친 뒤 옥좌에 몸을 기대앉았다."
 tgp_east_asia_mandala_events.1000.desc.trickery_03: "나는 [ROOT.Char.GetHouse.GetBaseName] 집안이 가진 장난기 많은 신들의 유산을 성공적으로 발전시켰으며, 축하 의식은 비교적 즐겁게 치러졌다.\n\n[ROOT.Char.GetHouse.GetBaseNameNoTooltip] 집안의 적은 의문 속에 한 명씩 쓰러지거나, 우리의 추종자가 되어 합류한다.\n\n$tgp_east_asia_mandala_events.1000.desc.03.outro$"
 tgp_east_asia_mandala_events.1000.desc.trickery_04: "완벽한 책략의 측면으로 넘어가기 직전의 단계에 있는 [ROOT.Char.GetHouse.GetBaseName] 집안에 수많은 공물이 바쳐졌다.\n\n금화, 모피, 향신료, 조가비, 이국적인 동물까지. 추종자들은 우릴 달랠 방법을 잘 알고 있다. 하지만 과연 그럴까?\n\n이건 오로지 #EMP 내게#! 달린 결정이다. 내게 반대하는 이들이 누구든, 그 위로 그림자 같은 거미줄을 드리울 것이다.\n\n나는 조용히 웃었다."
 tgp_east_asia_mandala_events.1000.desc.trickery_05: "$tgp_east_asia_mandala_events.1000.desc.05.intro$\n\n겉으로 보기에는 모든 것이 보통의 축제 분위기지만, 모두가 알고 있다. 아주 살짝 발을 헛디디거나 도덕적인 실수를 저지르기만 해도, 예측할 수 없는 [ROOT.Char.GetHouse.GetBaseNameNoTooltip]의 신 중 하나와 마주하게 될 것이다.\n\n이들은 모두 우리의 신성한 은총을 받고 싶어 하며, 선을 넘지 않으려 애를 쓰고 있다. #EMP 내#! 선 말이다.\n\n나는 군중을 살펴보며 다음으로 내 관심에 걸맞은 자는 누굴지 음흉하게 고르기 시작했다."
 tgp_east_asia_mandala_events.1000.a: "모든 것은 있어야 할 곳에 있을 것이다."
 mandala_descendant_from_aspect_of_creation.tt: "당신의 모든 [children|E]"
 mandala_descendant_from_aspect_of_creation_modifier: "창조의 후손"
 mandala_descendant_from_aspect_of_creation_modifier_desc: "해당 인물은 승천한 창조의 측면의 아이입니다."
 mandala_aspect_of_serenity_devotion.tt: "비공격 [war|E] 1년마다 #P [EmptyScope.ScriptValue('num_years_of_peace_devotion')]#!의 [piety_experience|E]을 획득함 #WEAK (현재 [piety_experience|E]: #P [THIS.Char.MakeScope.ScriptValue('num_years_of_peace_devotion_payout')]#!)#!"
 mandala_forged_from_aspect_of_destruction.tt: "당신의 모든 [THIS.Char.Custom('KnightCulturePlural')]"
 mandala_forged_from_aspect_of_destruction_modifier: "파괴로 빚어진"
 mandala_forged_from_aspect_of_destruction_modifier_desc: "해당 인물은 승천한 파괴의 측면을 기사로 섬겼습니다."
 mandala_aspect_of_trickery_devotion.tt: "지금까지 성공한 [scheme|E]당 #P [EmptyScope.ScriptValue('num_years_of_peace_devotion')]#!의 [piety_experience|E]을 획득함 #WEAK (현재 [piety_experience|E]: #P [THIS.Char.MakeScope.ScriptValue('num_successful_schemes_devotion_payout')]#!)#!"
 mandala_ascended_in_aspect_of_trickery_modifier: "승천한 책략가"
 mandala_ascended_in_aspect_of_trickery_modifier_desc: "해당 인물은 책략의 측면으로서 승천했습니다."
 busy_in_mandala_succession: "당신은 현재 [mandala|E] 승계로 바쁨"
 mandala_succession_header: "만다라 승계:"
 tgp_east_asia_mandala_events.8497.t.lose_by_default: "만다라 승계 시련 진행 실패"
 tgp_east_asia_mandala_events.8497.tt.lose_by_default: "$tgp_east_asia_mandala_events.8499.a.tt.imprisoned$"
 tgp_east_asia_mandala_events.8499.t: "$mandala_succession_header$ 시련"
 tgp_east_asia_mandala_events.8499.intro.imprisoned: "[ROOT.Char.GetImprisonedBy.GetTitledFirstName]의 지하 감옥 깊은 곳에서 소식이 들려왔다. 내 [ROOT.Char.Custom2('RelationToMe', deceased_mandala_ruler )] [deceased_mandala_ruler.GetFirstName](이)가 세상을 떠나, 이제 내가 봉역을 이끌어야 한다."
 tgp_east_asia_mandala_events.8499.intro.recent_adult.imprisoned: "마침내 성인이 되는 문턱까지 왔다. 마침내 시련을 치르고 봉역에 내가 [ROOT.Char.Custom2('RelationToMe', deceased_mandala_ruler )] [deceased_mandala_ruler.GetFirstName]의 자리를 승계할 자격이 있다는 사실을 보여 줄 때가 온 것이다."
 tgp_east_asia_mandala_events.8499.desc.imprisoned: "\n\n하지만 이렇게 감옥에 갇혀, 신성이라고는 #EMP 전혀 없는#! 상태에서 대체 어떻게 해내야 할까? 오물로 뒤덮여 짐승 같은 취급이나 받는데.\n\n맹세하는데 이곳을 나가는 날, 반드시 복수하겠다. 나의 #EMP 적 위로 복수의 비를 퍼부을 것이다#!."
 tgp_east_asia_mandala_events.8499.desc.recent_adult: "때가 왔다! 드디어 시련에 참여해 내 [ROOT.Char.Custom2('RelationToMe', deceased_mandala_ruler )] [deceased_mandala_ruler.GetFirstName]의 자리를 승계할 순간이다.\n\n각 영역에서 내 훌륭한 모습을 선보이고, 능력과 과정을 보여주면 추종자들이 앞으로 [ROOT.Char.Custom('GetAspectNoun')]의 측면에서 나를 얼마나 믿는지가 정해질 것이다.\n\n#EMP 내가#! 내 [ROOT.Char.Custom2('RelationToMe', deceased_mandala_ruler )]의 뒤를 이을 것이다!"
 tgp_east_asia_mandala_events.8499.desc.was_traveling: "먼지가 가라앉기도 전에 나는 방으로 인도되었고, 목욕했으며 옷 또한 [ROOT.Char.GetTitleAsNameNoTooltip]에 더 알맞은 의복으로 갈아입혀졌다.\n\n무뚝뚝한 시중 과정과 차가운 공기에 소름이 돋았다. 나를 기다리는 시련을 생각하며 마음속으로 각오를 다졌다.\n\n지금은 바로 내가 내 [ROOT.Char.Custom2('RelationToMe', deceased_mandala_ruler )]에 걸맞은 계승자임을 보여주고, [ROOT.Char.Custom('GetAspectNoun')]의 측면을 구현해 낼 기회다. 때가 온 것이다."
 tgp_east_asia_mandala_events.8499.desc: "내 [ROOT.Char.Custom2('RelationToMe', deceased_mandala_ruler )] [deceased_mandala_ruler.GetFirstName](은)는 이제 이 세상에 없다. [deceased_mandala_ruler.GetSheHe|U]는 이 존재의 차원을 떠나 승천하였고, 이제 내가 한 단계 올라서서 [ROOT.Char.Custom('GetAspectNoun')]의 측면을 불러일으켜 우리의 봉역을 역사의 기록에 남겨야 한다.\n\n시련을 받아들이고, 수많은 측면에서 뛰어난 모습을 보이며 내가 얼마나 신성하고 초월적인 존재인지를 보여주리라.\n\n...하지만 다른 결과를 잠깐 생각하자 등골을 타고 차가운 소름이 돋았다."
 tgp_east_asia_mandala_events.8499.a: "지금이야말로 가장 준비된 상태다."
 tgp_east_asia_mandala_events.8499.a.imprisoned: "이것만은 반드시 맹세하겠다."
 tgp_east_asia_mandala_events.8499.a.flavor.imprisoned: "이런 식이면 안 됐는데..."
 tgp_east_asia_mandala_events.8499.a.tt.imprisoned: "당신이 [mandala_succession_succession|E] 시련에 나타나지 않아 시련에 실패함"
 tgp_east_asia_mandala_events.8499.a.tt.trials: "첫 [mandala_succession_succession|E] 시련이 시작됨"
 mandala_divine_retribution_modifier: "신성한 응징"
 mandala_divine_retribution_modifier_desc: "해당 인물은 적을 물리치는 데 평생을 바칩니다."
 tgp_east_asia_mandala_events.8500.t: "$mandala_succession_header$ 머리를 잃는다는 것"
 tgp_east_asia_mandala_events.8500.desc: "내 즉위를 축하하는 창조의 의식이 한창 진행되는 중이었다. 나는 군중에 섞여 들었고, 추종자들이 앞으로 나서서 공물을 바치면 자비롭게 웃어 주었다.\n\n작은 아이가 군중 속에서 나타나더니 두 팔로 무턱대고 내 허리를 끌어안았다. 이 [dummy_gender.Custom('GirlBoy')](은)는 나를 올려다보더니 이렇게 물었다. \"[ROOT.Char.GetTitleAsNameNoTooltip|U]... 다섯 번째 머리는 #EMP 어떻게#! 된 거예요?\"\n\n아이의 보호자는 그 무례한 행동에 놀라 굳어 버렸다. 하지만 방 안의 모두가 눈을 반짝이며 내 대답만 기다리고 있었다."
 tgp_east_asia_mandala_events.8500.dynasty.override: "\"네 스승이 알려 줄 거다.\""
 tgp_east_asia_mandala_events.8500.a: "\"내 죄와 다른 이들의 질투 때문이란다, 아이야.\""
 tgp_east_asia_mandala_events.8500.a.final_aspect: "당신이 [aspect_of_creation|E]의 최종 단계가 아님"
 tgp_east_asia_mandala_events.8500.success.tt: "당신이 [stewardship|E] [mandala_succession_succession|E] 시련을 통과함"
 tgp_east_asia_mandala_events.8500.b: "\"아, 이야기를 들려 주마...\""
 tgp_east_asia_mandala_events.8500.b.flavor: "아마 #EMP 분명#! 이렇게 됐을걸?"
 tgp_east_asia_mandala_events.8500.b.t.success: "매우 설득력 있음"
 tgp_east_asia_mandala_events.8500.b.tt.success: "저들을 설득함"
 tgp_east_asia_mandala_events.8500.b.t.failure: "탐탁지 않음"
 tgp_east_asia_mandala_events.8500.b.tt.failure: "군중 사이로 불신의 중얼거림이 퍼져나감"
 tgp_east_asia_mandala_events.8510.t: "$mandala_succession_header$ 연못처럼 고요한"
 tgp_east_asia_mandala_events.8510.desc: "수행원들이 깔끔하게 열을 맞춰 서서 무릎을 꿇었다. 내 즉위 의식이 진행되는 동안 낮게 주문을 외는 소리가 온 공간에 울려 퍼졌다. 나는 나긋나긋하게 주위를 걸어 다니며 사람들의 이마에 손을 가볍게 얹고, 평화와 평온을 불어넣으려 노력했다.\n\n그러던 중, 밖에서 두 [dummy_gender.GetWomenMen]이 땅 한 뙈기를 두고 크게 다툼을 벌이는 소리가 들려왔다.\n\n저들의 소란에 방 안에 있던 이들이 결국 천천히 나를 바라보았다. 평화가 어지럽혀진 상황을 내가 어떻게 수습할지 기대하는 눈빛이었다."
 tgp_east_asia_mandala_events.8510.dynasty.override: "\"여기는 신성한 장소이니, 화를 누그러뜨려라.\""
 tgp_east_asia_mandala_events.8510.a: "\"그대는 땅을 나누어라. #EMP 그리고#! 그대는 수확물을 나누도록.\""
 tgp_east_asia_mandala_events.8510.a.final_aspect: "당신이 [aspect_of_serenity|E]의 최종 단계가 아님"
 tgp_east_asia_mandala_events.8510.success.tt: "당신이 [diplomacy|E] [mandala_succession_succession|E] 시련을 통과함"
 tgp_east_asia_mandala_events.8510.b: "\"#EMP 이런#! 식으로 해결하는 건 어떻겠느냐...\""
 tgp_east_asia_mandala_events.8510.b.flavor: "다들 왜 이리도 속이 좁은지..."
 tgp_east_asia_mandala_events.8510.b.t.success: "$tgp_east_asia_mandala_events.8500.b.t.success$"
 tgp_east_asia_mandala_events.8510.b.tt.success: "$tgp_east_asia_mandala_events.8500.b.tt.success$"
