 #this is can_be_knight_trigger in 00_war_and_peace_triggers.txt
 KNIGHT_RESTRICTIONS_TT: "#T 기사 제한#!\n직속 [vassals|e], [courtiers|e] 또는 [followers|e]만 [knights|e]로 복무할 수 있습니다.\n[knights|e]로 활동할 수 있는 성별은 당신의 [culture|e] 또는 [faith|e]에 의해 결정됩니다.\n\n다음 인물은 기사가 될 수 없습니다:\n - 플레이어, [child|e], [prisoner|e] 또는 [GetTrait('incapable').GetName(GetPlayer.Self)]\n - [clergy|e] 구성원 ([faith|e] 또는 [culture|e]에서 허용하는 경우 제외)\n - [master_assassin|e] 또는 [GetTrait('blind').GetName(GetPlayer.Self)] ([culture|e]에서 허용하거나 [GetTrait('order_member').GetName(GetPlayer.Self)]인 경우 제외)\n - [diarch|e] 또는 [ceremonial_liege|e]\n - [duchy|e]( 또는 그 이상 [title|e])의 [governor|e], 또는 [noble_family|e]의 [house_head|e]\n\n문화적 [traditions|e] 및 이벤트에 따라 일부 제한이 해제될 수 있음"
 KP_CULTURE_MINIMUM_PROWESS: "@alert_icon! 당신의 [culture|e]가 12 이상의 [prowess|e] 요구"
 KP_CULTURE_ADMIN_FAMILY_KNIGHTS: "@check_icon! 당신의 [culture|e]가 방어 [wars|e]에 대해 일부 성별 제한을 해제함"
