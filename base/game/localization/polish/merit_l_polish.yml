l_polish:
 TOTAL_MERIT: "Łączne [merit|El]: $VALUE|V0$"
 MERIT_EFFECTS_BREAKDOWN: "#S Efekty:#![AddTextIf( Not( StringIsEmpty(GetMeritLevelEffects( Character.GetMeritLevel )) ), '\n' )][GetMeritLevelEffects( Character.GetMeritLevel )]"
 MERIT_PROGRESSBAR_MARKER_TOOLTIP: "#T [GetMeritLevelNameNoTooltip( ComplexBarItem.GetIndex )]#!\nWymagane zasługi: [GetMeritLevelThreshold( ComplexBarItem.GetIndex )|V^]\n\n[GetMeritModifierByLevel( ComplexBarItem.GetIndex ).GetDescWithBulletPointEffects][AddTextIf( GreaterThan_int32( ComplexBarItem.GetIndex, '(int32)1' ), '\n' )]$BULLET$[movement_power|E]: [movement_power_i] [Multiply_int32( ComplexBarItem.GetIndex, '(int32)10' )|+=0]\n[GetMaxAppointmentRankDescription( 'merit', ComplexBarItem.GetIndex )][Character.GetMeritLevelDescription( ComplexBarItem.GetIndex )]"
 MERIT_TOOLTIP_COMPLETED_EXAMINATIONS: "Ukończone [imperial_examinations|El]"
 MERIT_TOOLTIP_EXAMINATION_DISCLAIMER: "Aby ukończyć więcej egzaminów, [governors|El] muszą zrezygnować z pełnionego stanowiska"
 MERIT_TOOLTIP_EXAMINATION_PASSED_CHILD_EXAM: "@child_exam_icon! #T Egzamin dziecięcy#!\n$CHILDRENS_EXAMINATION_PASSED_FAIL$\n\nPrzystąpiono do niego w następstwie [Concept('decision', 'decyzji')|E] „$tgp_china_attend_child_exam_decision$”"
 MERIT_TOOLTIP_EXAMINATION_PASSED_PROVINCIAL_EXAM: "@provincial_exam_icon! #T Egzamin prowincjonalny#!\n[SelectLocalization( HasPassedProvincialExamination(Character), 'EXAMINATION_PASSED', SelectLocalization(HasFailedProvincialExamination(Character),'EXAMINATION_FAILED','EXAMINATION_NOT_TAKEN') )]\n\n#S W przypadku zdania:#!\n[GetModifier( 'tgp_passed_provincial_exam_modifier' ).GetDescWithBulletPointEffects]\n\nPrzeprowadzony przez urzędników rządu w ramach następującej [Concept('activity', 'aktywności')|E]: [GetActivityType('activity_local_examination').GetName|l]"
 MERIT_TOOLTIP_EXAMINATION_PASSED_METROPOLITAN_EXAM: "@metropolitan_exam_icon! #T Egzamin metropolitalny#!\n[SelectLocalization( HasPassedMetropolitanExamination(Character), 'EXAMINATION_PASSED', SelectLocalization(HasFailedMetropolitanExamination(Character),'EXAMINATION_FAILED','EXAMINATION_NOT_TAKEN') )]\n\n#S W przypadku zdania: #!\n[GetModifier( 'tgp_passed_metropolitan_exam_modifier' ).GetDescWithBulletPointEffects]\n\nPrzeprowadzony przez [government|El] ([GetGovernment('celestial_government').GetName|El]) w ramach następującej [Concept('activity', 'aktywności')|E]: [GetActivityType('activity_imperial_examination').GetName|l]"
 MERIT_TOOLTIP_EXAMINATION_PASSED_PALACE_EXAM: "@palace_exam_icon! #T Egzamin pałacowy#!\n[SelectLocalization( HasPassedPalaceExamination(Character), 'EXAMINATION_PASSED', 'EXAMINATION_NOT_TAKEN' )]\n\n#S W przypadku zdania:#!\n[GetModifier( 'tgp_passed_palace_exam_modifier' ).GetDescWithBulletPointEffects]\n\nPrzeprowadzony przed [Concept('son_of_heaven', 'synem niebios')|E] w ramach następującej [Concept('activity', 'aktywności')|E]: [GetActivityType('activity_imperial_examination').GetName|l]"
 CHILDRENS_EXAMINATION_PASSED_FAIL: "[SelectLocalization( HasPassedChildrenExamination(Character), 'EXAMINATION_PASSED', SelectLocalization(HasFailedChildrenExamination(Character), SelectLocalization(Character.IsAdult, 'EXAMINATION_FAILED_NO_RETAKE' , 'EXAMINATION_FAILED') ,'EXAMINATION_NOT_TAKEN') )]"
 EXAMINATION_PASSED: "@passed_examination! #P Zdano#!"
 EXAMINATION_FAILED_NO_RETAKE: "@failed_examination! #N Nie zdano#!"
 EXAMINATION_FAILED: "$EXAMINATION_FAILED_NO_RETAKE$ #weak (można podejść ponownie)#![AddLocalizationIf(And(And(Character.IsMeritCapped, Character.IsAdult), Or(ObjectsEqual(GetPlayer, Character.GetWarden.Self), Character.IsLocalPlayer)), 'EXAMINATION_WOULD_TAKE')]"
 EXAMINATION_NOT_TAKEN: "#weak Nie przystąpiono#![AddLocalizationIf(And(And(And(Character.IsMeritCapped, Character.CanImproveMeritRank), Character.IsAdult), Or(ObjectsEqual(GetPlayer, Character.GetWarden.Self), Character.IsLocalPlayer)), 'EXAMINATION_WOULD_TAKE')]"
 EXAMINATION_WOULD_TAKE: "\n\nMaksymalna [merit_level|El] osoby znanej jako [Character.GetShortUINameNotMe] jest ograniczona, ponieważ nie zdano [Concept('examination', 'egzaminu')|E]. [SelectLocalization(Character.IsLocalPlayer, 'EXAMINATION_WOULD_TAKE_ME', 'EXAMINATION_WOULD_TAKE_OTHER')]"
 EXAMINATION_WOULD_TAKE_ME: "Lepiej podejdź do egzaminu."
 EXAMINATION_WOULD_TAKE_OTHER: "Osoba ta dołączy do ciebie, jeśli będzie dostępna podczas twojego podejścia do egzaminu."
 MERIT_GOVERNOR_APPOINTMENT_SCORE_POSITIVE: "$BULLET$[candidate_score|E]: @appointment_score! #P +[Character.GetGovernorAppointmentScoreByMerit]#!"
 MERIT_GOVERNOR_APPOINTMENT_SCORE_NEGATIVE: "$BULLET$[candidate_score|E]: @appointment_score! #N [Character.GetGovernorAppointmentScoreByMerit]#!"
 MERIT_MOVEMENT_POWER: "$BULLET$[movement_power|E]: [movement_power_i] [Character.GetMovementPowerByMerit|+=0]"
 MERIT_PROGRESS_HEADING: "Postęp do kolejnej rangi zasług"
 MAX_MERIT_RANK_BREAKDOWN_TOOLTIP: "#T Maksymalna [merit_level|El]#!\n[PlayerValueItem.GetMaxLevelBreakdown( Character.Self )]"
 MERIT_CAP_OVERFLOW_WILL_COUNT: "#weak Zasługi zdobywane powyżej limitu zostaną zaliczone na poczet wyższych rang zasług po zdaniu egzaminów.#!"
 MERIT_RANK_CAP_TT: "#T Osiągnięto limit zasług#!\n[SelectLocalization( Character.GetGovernment.IsType( 'celestial_government' ), 'MERIT_RANK_CAP_CELESTIAL_TT', 'MERIT_RANK_CAP_MERITOCRATIC_TT')]"
 MERIT_RANK_CAP_CELESTIAL_TT: "[AddLocalizationIf( Character.ShouldShowExaminationRequirement( '(int32)3' ), 'MERIT_RANK_CAP_CELESTIAL_PROVINCIAL_EXAMINATION_TT' )][AddLocalizationIf( Character.ShouldShowExaminationRequirement( '(int32)5' ), 'MERIT_RANK_CAP_CELESTIAL_METROPOLITAN_EXAMINATION_TT' )][AddLocalizationIf( Character.ShouldShowExaminationRequirement( '(int32)7' ), 'MERIT_RANK_CAP_CELESTIAL_PALACE_EXAMINATION_TT' )]\n\n$MERIT_CAP_OVERFLOW_WILL_COUNT$"
 MERIT_RANK_CAP_MERITOCRATIC_TT: "[AddLocalizationIf( Character.ShouldShowExaminationRequirement( '(int32)4' ), 'MERIT_RANK_CAP_MERITOCRATIC_PROVINCIAL_EXAMINATION_TT' )]\n\n$MERIT_CAP_OVERFLOW_WILL_COUNT$"
 MERIT_RANK_CAP_NO_EXAMINATION_TT: "Każdy może osiągnąć zasługi następującego poziomu: @merit_level_1_icon! [GetModifier( 'merit_level_1' ).GetNameWithTooltip|Ll]"
 MERIT_RANK_CAP_CELESTIAL_PROVINCIAL_EXAMINATION_TT: "Do osiągnięcia zasług poziomu, którym jest @merit_level_3_icon! [GetModifier( 'merit_level_3' ).GetNameWithTooltip|Ll], wymagane jest ukończenie egzaminu prowincjonalnego (lub egzaminu wyższego stopnia)"
 MERIT_RANK_CAP_CELESTIAL_METROPOLITAN_EXAMINATION_TT: "Do osiągnięcia zasług poziomu, którym jest @merit_level_5_icon! [GetModifier( 'merit_level_5' ).GetNameWithTooltip|Ll], wymagane jest ukończenie egzaminu metropolitarnego (lub egzaminu wyższego stopnia)"
 MERIT_RANK_CAP_CELESTIAL_PALACE_EXAMINATION_TT: "Do osiągnięcia zasług poziomu, którym jest @merit_level_7_icon! [GetModifier( 'merit_level_7' ).GetNameWithTooltip|Ll], wymagane jest ukończenie egzaminu pałacowego"
 MERIT_RANK_CAP_MERITOCRATIC_PROVINCIAL_EXAMINATION_TT: "Do osiągnięcia zasług poziomu, którym jest @merit_level_4_icon! [GetModifier( 'merit_level_4' ).GetNameWithTooltip|Ll], wymagane jest ukończenie egzaminu prowincjonalnego (lub egzaminu wyższego stopnia)"
 currency_tier_0_appointment_pool_desc: "$BULLET$Nie można mianować do żadnego [Concept('title', 'tytułu')|E]"
 currency_tier_1_appointment_pool_desc: "$BULLET$Można mianować do [Concept('titles', 'tytułów')|E] o [Concept('title_tier', 'poziomie')|E] [Concept('barony', 'baronii')|E]"
 currency_tier_2_appointment_pool_desc: "$BULLET$Można mianować do [Concept('titles', 'tytułów')|E] o [Concept('title_tier', 'poziomie')|E] [Concept('county', 'hrabstwa')|E] #weak (i niższych)#!"
 currency_tier_3_appointment_pool_desc: "$BULLET$Można mianować do [Concept('titles', 'tytułów')|E] o [Concept('title_tier', 'poziomie')|E] [Concept('duchy', 'księstwa')|E] #weak (i niższych)#!"
 currency_tier_4_appointment_pool_desc: "$BULLET$Można mianować do [Concept('titles', 'tytułów')|E] o [Concept('title_tier', 'poziomie')|E] [Concept('kingdom', 'królestwa')|E] #weak (i niższych)#!"
 currency_tier_5_appointment_pool_desc: "$BULLET$Można mianować do [Concept('titles', 'tytułów')|E] o [Concept('title_tier', 'poziomie')|E] [Concept('empire', 'imperium')|E] #weak (i niższych)#!"
 currency_tier_6_appointment_pool_desc: "$BULLET$Można mianować do [Concept('titles', 'tytułów')|E] o [Concept('title_tier', 'poziomie')|E] [Concept('hegemony', 'hegemonii')|E] #weak (i niższych)#!"
 career_path_civilian_province: "@celestial_standard_administration! [civilian_career_path|E]"
 career_path_military_province: "@celestial_military_administration! [military_career_path|E]"
 career_path_none: "Nie wybrano ścieżki kariery"
 celestial_government_merit_level_0_description: "\n\nAby podnieść swoją rangę, weź udział w [Concept('imperial_examinations', 'egzaminach do służby cywilnej')|E]."
 celestial_government_merit_level_1_description: "\n\nAby podnieść swoją rangę do wyższej ([GetModifier( 'merit_level_2' ).GetNameWithTooltip|Ll]), weź udział w [Concept('imperial_examinations', 'egzaminach do służby cywilnej')|E]."
 celestial_government_merit_level_2_description: "\n\nAby podnieść swoją rangę do wyższej ([GetModifier( 'merit_level_3' ).GetNameWithTooltip|Ll]), weź udział w [Concept('imperial_examinations', 'egzaminach do służby cywilnej')|E]."
 celestial_government_merit_level_3_description: "\n\n[government|E] [GetGovernment('celestial_government').GetName|l]: aby osiągnąć tę rangę, uczeni muszą ukończyć [provincial_examination|El]. [GetModifier( 'merit_level_4' ).GetNameWithTooltip|L] jest dostępna dopiero po zaliczeniu [Concept('examinations', 'egzaminów')|E] wyższego poziomu."
 celestial_government_merit_level_4_description: "\n\n[government|E] [GetGovernment('celestial_government').GetName|l]: aby osiągnąć tę rangę, uczeni muszą ukończyć [provincial_examination|El]. [GetModifier( 'merit_level_5' ).GetNameWithTooltip|L] jest dostępna dopiero po zaliczeniu [Concept('metropolitan_examination', 'egzaminu metropolitalnego')|E]."
 celestial_government_merit_level_5_description: "\n\n[government|E] [GetGovernment('celestial_government').GetName|l]: od urzędników z tą [Concept('merit_level', 'rangą zasług')|E] oczekuje się ukończenia [Concept('metropolitan_examination', 'egzaminu metropolitalnego')|E]. Następną rangą jest [GetModifier( 'merit_level_6' ).GetNameWithTooltip|Ll]."
 celestial_government_merit_level_6_description: "\n\n[government|E] [GetGovernment('celestial_government').GetName|l]: od urzędników z tą rangą wymaga się ukończenia [Concept('metropolitan_examination', 'egzaminu metropolitalnego')|E]. Następną rangą jest [GetModifier( 'merit_level_7' ).GetNameWithTooltip|Ll]."
 celestial_government_merit_level_7_description: "\n\n[government|E] [GetGovernment('celestial_government').GetName|l]: od urzędników z tą rangą oczekuje się ukończenia [Concept('palace_examination', 'egzaminu pałacowego')|E]. Następną rangą jest [GetModifier( 'merit_level_8' ).GetNameWithTooltip|Ll]."
 celestial_government_merit_level_8_description: "\n\n[government|E] [GetGovernment('celestial_government').GetName|l]: od urzędników z tą rangą oczekuje się ukończenia [Concept('palace_examination', 'egzaminu pałacowego')|E]. Następną rangą jest [GetModifier( 'merit_level_9' ).GetNameWithTooltip|Ll]."
 celestial_government_merit_level_9_description: "\n\n[government|E] [GetGovernment('celestial_government').GetName|l]: od urzędników z tą rangą oczekuje się ukończenia [Concept('palace_examination', 'egzaminu pałacowego')|E]."
 SORT_MERIT: "$game_concept_merit$"
