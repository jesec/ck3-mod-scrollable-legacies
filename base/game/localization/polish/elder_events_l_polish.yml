l_polish:
 elder_events.1000.t: "Dane ci było mnie znać"
 elder_events.1000.desc: "– [confusion_target.GetFirstName], [elder.Custom2('RelationToMeShortVocative', SCOPE.sC('confusion_target'))]! Jak dobrze cię widzieć! – [elder.GetFirstName], a dla mnie [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('elder'))], patrzy mi prosto w oczy, a w [elder.Custom('PL_jego_jej')] uśmiechu dostrzegam nutę niepewności. – Nie znam nikogo bystrzejszego w całej rodzinie. Dlatego ciebie kocham najbardziej.\n\nPrzez swój [GetTrait('withering_mind').GetName( GetNullCharacter )|l] myli mnie z moim rodzeństwem…\n\nA jutro może wcale nie wiedzieć, kim jestem."
 elder_events.1000.a: "Niech [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('elder'))] na mnie spojrzy. To ja, [ROOT.Char.GetFirstNameNoTooltip]!"
 elder_events.1000.b: "Co… Tak, ciebie też dobrze widzieć…"
 elder_events.1100.t: "Schody do…"
 elder_events.1100.desc: "Tyle razy było mi dane pokonywać te schody. Dlaczego więc dziś mam wrażenie, że próbuję wdrapać się na góry w miejscu znanym jako [mountain_reference.GetName]?\n\nNogi mi się trzęsą. Kolana odmawiają posłuszeństwa. Nic nie złagodzi mojego upadku.\n\nStaczam się w dół."
 elder_events.1100.a: "Aaargh!"
 elder_events.1100.bodyguard: "Pomocy! Ratujcie mnie!"
 EVENT_WINDOW_OPTION_AVAILABLE_BODYGUARD: "Ta opcja jest dostępna, ponieważ na twoim dworze przebywa osoba pełniąca następującą funkcję: [GetCourtPositionType('bodyguard_court_position').GetName()|l]"
 EVENT_WINDOW_OPTION_AVAILABLE_TUTOR: "Ta opcja jest dostępna, ponieważ na twoim dworze przebywa osoba pełniąca następującą funkcję: [GetCourtPositionType('court_tutor_court_position').GetName()|l]"
 partially_mute_modifier: "Częściowa niemowa"
 partially_mute_modifier_desc: "Ta postać ma duże trudności z mówieniem ze względu na starcze schorzenia."
 elder_events.1200.t: "Odrętwienie"
 elder_events.1200.desc: "Atak następuje bez ostrzeżenia. Lewa strona mojego ciała drętwieje. Próbuję się uśmiechnąć, lecz moje wargi są nieruchome.\n\nPróbuję coś powiedzieć, lecz nie mogę.\n\nPo pewnym czasie głos mi wraca. [ROOT.Char.GetFaith.NegativeAfterLife] nawiedza moje myśli."
 elder_events.1200.a: "…"
 elder_events.1300.t: "Zapomniane nauki"
 elder_events.1300.desc: "Czy dane mi było czytać zwoje, których motywem przewodnim jest [ROOT.Char.Custom('education_scroll_subject')]? Ja… nie pamiętam. Może je znam?\n\nTo musiał być przedmiot moich studiów, mojej edukacji…\n\nTak. Mojej… edukacji…"
 elder_events.1300.a: "To musiało być nieistotne…"
 elder_events.1300.tutor: "Potrzebuję pomocy, aby sobie przypomnieć."
 elder_events.1400.t: "Niezła rozrywka"
 elder_events.1400.desc: "– Chodź do łóżka, mój wulkanie rozkoszy – [lover.Custom('PurrGrowl')] [lover.GetFirstName], a dla mnie [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('lover'))]. W [lover.Custom('PL_jego_jej')] oczach można dostrzec rozpaloną żądzę. – Nie chcesz sprawdzić, czego nauczył się twój wspólnik zbereźnych występków?\n\n[lover.GetFirstName] przygryza wargę z łobuzerskim uśmiechem i powoli kładzie się na pościeli.\n\n– Weź mnie. W tej chwili."
 elder_events.1400.a: "Nie powstrzymałoby mnie stado koni!"
 elder_events.1400.b: "Niech mnie łaska [ROOT.Char.GetFaith.HighGodNamePossessive] przed [lover.Custom('PL_nim_nia')] uchroni."
 death_best_sex_of_their_life: "doznała ataku serca w trakcie najlepszego seksu w swoim życiu"
 purrs: "mruczy"
 growls: "warczy"
 raunchy_little: "mała"
 raunchy_sweet: "słodka"
 raunchy_pretty: "urodziwa"
 raunchy_bold: "śmiała"
 raunchy_wild: "dzika"
 raunchy_fiery: "namiętna"
 raunchy_young: "młoda"
 raunchy_eager: "chętna"
 elder_events.1500.t: "Zabawa, dla której warto umrzeć"
 elder_events.1500.desc: "– Niegdyś mówili o mnie „wulkan rozkoszy” – wzdycha [lover.GetWifeHusband] [lover.GetFirstName], a w kąciku [lover.Custom('PL_jego_jej')] ust pojawia się słaby uśmiech. – Teraz ledwo mogę wejść po schodach bez przerwy na złapanie oddechu…\n\nZ moim młodzieńczym wigorem mogę przypomnieć [lover.Custom('PL_mu_jej')], jak to jest być obiektem pożądania.\n\nTylko… czy [lover.Custom('PL_jego_jej')] [GetTrait('faltering_heart').GetName( GetNullCharacter )|l] to wytrzyma?"
 elder_events.1500.a: "Zapewnię [lover.Custom('PL_mu_jej')] najlepszą rozrywkę w [lover.Custom('PL_jego_jej')] życiu!"
 elder_events.1500.b: "Lepiej nie."
 elder_events.1600.t: "Z czasem nie wygrasz"
 elder_events.1600.desc: "Biegnę. Muszę przystanąć. Już brakuje mi oddechu.\n[ROOT.Char.Custom('ResidenceBuilding')] to miejsce, wokół którego kiedyś przychodziło mi robić całe okrążenia.\n\nPróbuję jeszcze raz. Niemal upadam. Ponownie staję.\n\nDo cholery z tym wątłym ciałem."
 elder_events.1600.a: "Moje dni biegania dobiegły końca."
 elder_events.1600.b: "#EMP Muszę#! przezwyciężyć ból."
