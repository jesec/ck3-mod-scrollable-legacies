l_polish:
 #St Peter's Basilica
 building_type_holy_site_st_peters_basilica_01: "$building_holy_site_st_peters_basilica_01$"
 building_type_holy_site_st_peters_basilica_01_desc: "$building_holy_site_st_peters_basilica_01_desc$"
 building_holy_site_st_peters_basilica_01: "Bazylika św. Piotra"
 building_holy_site_st_peters_basilica_01_desc: "Zbudowana w miejscu grobowca św. Piotra na Wzgórzu Watykańskim na polecenie cesarza Konstantyna I po jego nawróceniu na chrześcijaństwo, Bazylika św. Piotra stanowi główny ośrodek chrześcijaństwa na Zachodzie. \n\nBazylika tradycyjnie pełni funkcję siedziby papieża Kościoła Rzymskokatolickiego i na przestrzeni wieków stała się rozległym kompleksem chronionym murami Leonowymi."
 #Mont-Saint-Michel
 building_type_mont_st_michel_01: "Mont-Saint-Michel"
 building_type_mont_st_michel_01_desc: "$building_mont_st_michel_01_desc$"
 building_mont_st_michel_01: "Sanktuarium św. Michała Archanioła"
 building_mont_st_michel_01_desc: "W 708 roku św. Aubert, biskup Avranches, miał sen, w którym ukazał mu się archanioł Michał, polecając budowę kaplicy na pobliskiej wyspie pływowej. Aubert początkowo zignorował tę wizję, uznając ją za podstęp diabła. Ostatecznie archanioł zdołał go przekonać – zgodnie z legendą, dotykając jego głowę i robiąc w niej dziurę – i biskup nakazał budowę nowego sanktuarium na Górze Cmentarnej. \n\nTak zaczęła się historia Mont-Saint-Michel."
 building_mont_st_michel_02: "Romańskie opactwo na Mont-Saint-Michel"
 building_mont_st_michel_02_desc: "Nowy kościół opactwa znajduje się w najwyższym punkcie wyspy, jako świadectwo potęgi Boga ponad wszystkim w niebie i na ziemi oraz ludzkiej pomysłowości. \n\nU podnóża opactwa powoli rozwija się mała osada pielgrzymów i rybaków."
 building_mont_st_michel_03: "La Merveille"
 building_mont_st_michel_03_desc: "Opactwo rozbudowano o szereg krużganków, siedzibę kapelana, piwnicę winną, salę rycerską i wiele pomieszczeń mieszkalnych, tworząc gotycki kompleks, który można określić jedynie jako cud inżynierii. \n\nW opactwie znajdują się potężne nowe umocnienia, a osada u jego podnóża stała się prawdziwym miasteczkiem, w którym mieszka wielu pielgrzymów i miejscowych."
 building_mont_st_michel_04: "Ufortyfikowany klasztor Mont-Saint-Michel"
 building_mont_st_michel_04_desc: "Niedawne wojny pokazały, że nawet taka oaza spokoju jak Mont-Saint-Michel może być ważnym punktem strategicznym. Z tego powodu skała została solidnie ufortyfikowana grubymi murami i bastionami, a dla garnizonu zbudowano kilka nowych kwater. \n\nPrzybrzeżne miasteczko jest obecnie tętniącym życiem miastem, a domy wybudowano już niemal na całej wyspie."
 #Sanchi Stupa
 building_type_sanchi_stupa_01: "$building_sanchi_stupa_01$"
 building_type_sanchi_stupa_01_desc: "$building_sanchi_stupa_01_desc$"
 building_sanchi_stupa_01: "Wielka Stupa w Sańći"
 building_sanchi_stupa_01_desc: "Wielka Stupa została zbudowana przez cesarza Maurjów Aśokę w III wieku p.n.e., w pobliżu miejsca jego ślubu z żoną Devi. Ta imponująca budowla, w której przechowywane są relikwie Buddy, jest jedną z najstarszych tego typu i słynie również z kunsztownie rzeźbionych bram torana."
 #Boudhanath
 building_type_boudhanath_01: "$building_boudhanath_01$"
 building_type_boudhanath_01_desc: "$building_boudhanath_01_desc$"
 building_boudhanath_01: "Bodnath"
 building_boudhanath_01_desc: "Stupa Bodnath w Katmandu, znana również jako Jarung Kashor i Khāsa Chaitya, jest jedną z największych stup w buddyzmie i prawdopodobnie miejscem narodzin tybetańskiej gałęzi buddyzmu. Pod jej ogromną kopułą i mandalą przechowywane są szczątki wielu buddów oraz niezliczone święte relikwie o różnych kształtach i formach. \n\nZe względu na położenie na starożytnym szlaku handlowym między Nepalem a Tybetem podróżni i kupcy często zatrzymują się w tym miejscu, aby odpocząć i oddać się modlitwie."
 #Grand Mosque of Yazd
 building_type_yazd_mosque_01: "$building_yazd_mosque_01$"
 building_type_yazd_mosque_01_desc: "$building_yazd_mosque_01_desc$"
 building_yazd_mosque_01: "Wielki Meczet w Jazdzie"
 building_yazd_mosque_01_desc: "Zbudowany w miejscu Świątyni Ognia z IV wieku, ten znamienity budynek zachwyca zarówno podróżników, jak i pielgrzymów swoimi wielkimi ejwanami, pokrytą dachówką kopułą i majestatycznym portalem wejściowym z parą strzelistych minaretów."
 #Qutb Minar
 building_type_qutb_minar_01: "$building_qutb_minar_01$"
 building_type_qutb_minar_01_desc: "$building_qutb_minar_01_desc$"
 building_qutb_minar_01: "Żelazna kolumna w Delhi"
 building_qutb_minar_01_desc: "Potężna żelazna kolumna w Delhi jest symbolem chwały króla Ćandragupty II, chociaż kolejni władcy również wyryli w niej swoje imiona. Pomimo tego, że stoi w tym miejscu już od dłuższego czasu, nie ma na niej śladu rdzy, co jest świadectwem umiejętności indyjskich kowali!"
 building_qutb_minar_02: "Kutb Minar"
 building_qutb_minar_02_desc: "Quwwat-ul-Islam to wielki meczet otaczający miejsce, w którym znajdowała się Żelazna Kolumna w Delhi, zwieńczony doprawdy ogromnym minaretem zwanym Kutb Minar. \n\nTa wspaniała budowla doskonale oddaje potęgę władców Delhi."
 building_qutb_minar_03: "Rozbudowany meczet Quwwat-ul-Islam"
 building_qutb_minar_03_desc: "Kompleks wokół Kutb Minar został rozbudowany o kilka kolejnych dziedzińców, bram i mauzoleów, osiągając legendarne rozmiary."
 building_qutb_minar_04: "Alai Minar"
 building_qutb_minar_04_desc: "Kompleks rozbudowano o kolejny minaret zaprojektowany na wzór Kutb Minar, ale dwukrotnie większy. Ten kolos górujący nad Delhi stanowi szczytowe osiągnięcie architektury indo-islamskiej."
