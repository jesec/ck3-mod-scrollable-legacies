l_polish:
 tgp_travel_danger_events.0001.t: "Życie wśród ruin"
 tgp_travel_danger_events.0001.intro: "W trakcie podróży przez miejsce znane jako [ROOT.Char.GetCurrentLocation.GetName] dane mi jest widzieć wszechobecne zniszczenia wywołane przez [disaster_situation.GetType.GetNameNoTooltip|l]."
 tgp_travel_danger_events.0001.flood: "Gruz zalega na brzegu rzeki, domy spływają w dół koryta niczym liście w strumieniu. Cała wioska została pochłonięta przez rwący nurt."
 tgp_travel_danger_events.0001.earthquake: "Niegdyś żyzne grunty i tętniąca życiem wioska leżą w ciszy, w nieładzie i gruzach, pochłonięte przez samą ziemię."
 tgp_travel_danger_events.0001.desc: "\n\nGdy docieramy na skraj zrujnowanego miasta, dostrzegam wśród gruzów samotne dziecko. Nie dostrzega mnie, ponieważ rozpaczliwie próbuje odbudować coś, co niegdyś mogło być wiejskim domem."
 tgp_travel_danger_events.0001.a: "Moi ludzie usuną gruzy."
 tgp_travel_danger_events.0001.b: "Przyjmę to dziecko pod swoje skrzydła."
 tgp_travel_danger_events.0001.c: "Nie mam czasu na takie błahostki!"
 impressed_by_kindness: "Pod wrażeniem życzliwości"
