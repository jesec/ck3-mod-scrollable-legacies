l_polish:
 # Flight of the Tai, Mass migration main event
 tgp_tai_migration_event.1000.t: "Ucieczka ludów tajskich"
 tgp_tai_migration_event.1000.desc: "Podczas dzisiejszego spotkania rady poinformowano mnie o masowej migracji ludów tajskich. Starszy przedstawiciel ich społeczności, [migration_leader.GetName], staje w końcu przede mną, by z pokorą opowiedzieć o ich trudnej sytuacji.\n\n– Dziś [migration_origin_holder.GetName] już nam nie przewodzi, a my, [migration_origin_holder.Custom('PL_jego_jej')] dawni poddani, żywimy nadzieję, że właśnie [ROOT.Char.GetTitleAsNameNoTooltip] ofiaruje nam dom i przewodnictwo. Prośbę tę wygłaszam w imieniu wielu klanów i tysięcy uchodźców liczących na schronienie. Jeśli w swej łasce raczysz otoczyć nas ochroną i dać nam cel, będziemy użytecznymi sługami godnymi twej hojności.\n\nMoje słowa przypieczętują ich los."
 tgp_tai_migration_event.1000.a: "Przyjmuję was wszystkich nie jako gości, lecz jako poddanych."
 tgp_tai_migration_event.1000.b: "[ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip] to miejsce tylko dla najzdolniejszych z was."
 tgp_tai_migration_event.1000.c: "Więcej ludzi to więcej problemów, które nie są mi potrzebne. Skierujcie swoje błagania gdzieś indziej."
 tgp_tai_migration_event_1000.c_shooed_immigrants_tt: "Istnieje możliwość, że w najbliższej przyszłości imigranci poproszą o schronienie innego władcę w okolicy."
 tgp_tai_migration_skilled_development_county_modifier: "Ucieczka rzemieślników"
 tgp_tai_migration_migration_happened_county_modifier: "Osadnicy tajscy"
 tgp_tai_migration_migration_happened_character_modifier: "Przyjęcie ogromu imigrantów"
 tgp_tai_migration_migration_rejected_character_modifier: "Odrzucenie imigrantów"
 # Lone skilled Tai character offers services
 tgp_tai_migration_event.2000.t: "Utalentowani Tajowie"
 tgp_tai_migration_event.2000.desc: "Pewien uzdolniony człowiek, którego domem rzekomo była wcześniej ziemia [migrant_skilled_character.GetCulture.GetNameNoTooltip|l], staje przede mną z nadzieją na zatrudnienie. Zachowanie tej osoby zdaje się potwierdzać niedawne doniesienia o ucieczce jej ludu.\n\n"
 tgp_tai_migration_event.2000.wet_nurse.desc: "– Nazywam się [migrant_skilled_character.GetName], wasza świątobliwość. Jestem osobą doświadczoną w opiece nad dziećmi i gotową do podjęcia pracy. Cieszę się zdrowiem, dobrze się odżywiam i doskonale rozumiem potrzeby dzieci. Jeśli pozwolisz, pomogę ci wychować rodzinę."
 tgp_tai_migration_event.2000.champion.desc: "– [migrant_skilled_character.GetName]. Tak nazywają mnie w ojczyźnie, Wasza Wybitność. Mam za sobą karierę zaprzysiężonego wojownika i zwycięstwa w wielu turniejach. Cechuje mnie pewna ręka i niepodważalna lojalność. Chętnie zostanę twoim czempionem, jeśli tylko pozwolisz."
 tgp_tai_migration_event.2000.travel_leader.desc: "– Nazywam się [migrant_skilled_character.GetName]. Być może [ROOT.Char.GetTitleAsNameNoTooltip] wie już, że pustynne przeprawy to dla mnie nie pierwszyzna. Rozgwieżdżone niebo jest mi mapą, wiatr zaś – sprzymierzeńcem. Pod moim dowództwem nie zbłądzi żadna karawana; żaden też szlak nie okaże się wyzwaniem."
 tgp_tai_migration_event.2000.master_of_hunt.desc: "– Jestem osobą stworzoną do tropienia, zahartowaną przez wiatr. Znam zapach każdej zwierzyny i ciche połacie wszystkich lasów. Nikt nie wyczyta ze śladów kopyt więcej niż ja. Co [ROOT.Char.GetTitleAsNameNoTooltip] myśli?"
 tgp_tai_migration_event.2000.court_physician.desc: "– Znam receptury ze starożytnych ksiąg i mam bystry umysł, który pozwala mi wydajnie działać pod presją. Jeśli chce [ROOT.Char.GetTitleAsNameNoTooltip] ukoić swe niebiańskie ciało, potrzebuje jedynie mnie. Ludzie mówią na mnie [migrant_skilled_character.GetName]."
 tgp_tai_migration_event.2000.antiquarian.desc: "– Było mi dane na własne oczy ujrzeć to, co inni znają z mitów, i dotknąć dziedzictwa antycznych imperiów. Jeśli pozwolisz, wzbogacę twój dwór mądrością starożytnych ludów."
 tgp_tai_migration_event.2000.court_tutor.desc: "– Być może wie [ROOT.Char.GetTitleAsNameNoTooltip], że z mojej mądrości korzystało wielu wojowników i mężów stanu. Również twoi potomkowie mogą osiągnąć wielkość pod moim przewodnictwem – jeśli tylko pozwolisz."
 tgp_tai_migration_event.2000.end.desc: "\n\nOsoba ta wydaje się desperacko poszukiwać schronienia – czego powodem są zapewne okoliczności, które ją tu przywiodły – ale bez wątpienia doskonale orientuje się w swoim fachu. Czy chcę skorzystać z jej umiejętności?"
 tgp_tai_migration_event.2000.a: "Twoje usługi mogą mi się przydać."
 tgp_tai_migration_event.2000.b: "Nie zatrudnię cię jeszcze, ale możesz z nami zostać."
 tgp_tai_migration_event.2000.b.success: "[migrant_skilled_character.GetNameNoTooltip] dołącza do twojego dworu"
 tgp_tai_migration_event.2000.b.failure: "[migrant_skilled_character.GetNameNoTooltip] odrzuca twoją ofertę"
 tgp_tai_migration_event.2000.c: "Muszę odmówić."
 # Noble Tai character and his family are asking for a spare county
 tgp_tai_migration_event.3000.t: "Oferta przedstawiciela rodziny"
 tgp_tai_migration_event.3000.desc: "Do mojej sali wkracza z prostymi plecami i pewnością siebie gość z zagranicy, chcąc przedstawić mi pewną propozycję administracyjną.\n\nPrzywitawszy się ze mną w sposób zaskakująco autentyczny, a zarazem nietypowy dla prostego człowieka, opowiada mi ze szczegółami o znojnej podróży swojej rodziny do moich ziem, by wreszcie przejść do śmiałej puenty.\n\n– …zbójnicy i łupieżcy, może mi [ROOT.Char.GetTitleAsNameNoTooltip] wierzyć! Przed grabieżą udało mi się uchronić jedynie talent, wyostrzoną percepcję, lojalność oraz rodzinę, która potrzebuje twej pomocy – i z którą będę ci służyć, póki nie uznasz nas za niegodnych."
 tgp_tai_migration_event.3000.a: "Spełnię twoją prośbę, jeśli przysięgniesz mi lojalność."
 tgp_tai_migration_event.3000.b: "To nie brzmi jak sprawiedliwa wymiana."
 # A family of lowborn peasant characters offer services
 tgp_tai_migration_event.4000.t: "Rodzina Tajów"
 tgp_tai_migration_event.4000.desc: "Strażnicy wprowadzają do sali pogrążoną w nędzy rodzinę zza północnej granicy.\n\nPo długich błaganiach, wbijając we mnie przenikliwe spojrzenie, głowa rodziny oferuje mi cały swój dobytek – lub raczej jego brak – i deklaruje gotowość do zmywania pałacowych podłóg, jeśli tylko zapewnię tej gromadce schronienie pod swymi skrzydłami. Z przedstawionej mi historii wynika, że wiele takich osób ściąga w tej chwili na nasze ziemie z nadzieją na znalezienie nowych obrońców."
 tgp_tai_migration_event.4000.a: "Zapewnię wam schronienie w tych trudnych czasach."
 tgp_tai_migration_event.4000.b: "Z twojej rodziny nie będzie pożytku na moim dworze."
