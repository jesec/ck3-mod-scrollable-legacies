l_polish:
 #Goguryeo Tomb
 building_type_goguryeo_tomb_01: "$building_goguryeo_tomb_01$"
 building_type_goguryeo_tomb_01_desc: "$building_goguryeo_tomb_01_desc$"
 building_goguryeo_tomb_01: "Grobowiec króla Goguryeo"
 building_goguryeo_tomb_01_desc: "Podobno ten wielki prostokątny grobowiec wykonany z kamienia ciosanego należy do starożytnego króla Goguryeo, którego imię uległo już zapomnieniu. Korytarze prowadzące do grobowca są pokryte kolorowymi freskami, a na szczycie piramidy znajduje się mały drewniany pawilon wzniesiony na cześć pochowanego."
 #Great Buddha of Kamakura
 building_type_buddha_kamakura_01: "$building_buddha_kamakura_01$"
 building_type_buddha_kamakura_01_desc: "$building_buddha_kamakura_01_desc$"
 building_buddha_kamakura_01: "Wielki Budda z Kamakury"
 building_buddha_kamakura_01_desc: "#italic Daibutsu#! z Kamakury to przedstawiający Buddę Amitabhę czcigodny posąg z brązu, ważący kilka ton i ozdobiony pozłacanymi elementami. Znajduje się wewnątrz wielkiej sali zainspirowanej południowo-zachodnimi świątyniami i jest otoczony trzydziestoma dwoma płatkami lotosu."
 #Lingapura Pyramid
 building_type_pyramid_lingapura_01: "$building_pyramid_lingapura_01$"
 building_type_pyramid_lingapura_01_desc: "$building_pyramid_lingapura_01_desc$"
 building_pyramid_lingapura_01: "Piramida w Lingapurze"
 building_pyramid_lingapura_01_desc: "Ta wielka piramida schodkowa wznosi się nad dżunglą niczym święta góra. Na każdym z siedmiu tarasów znajdują kapliczki i ołtarze o coraz bogatszych zdobieniach. Górne sanktuarium wieńczy budowlę i służy jako schronienie dla świętej #italic lingi#! Śiwy stanowiącej centrum kompozycji symetrycznej projektu religijnego."
 #Maijishan Grottoes
 building_type_maijishan_grottoes_01: "$building_maijishan_grottoes_01$"
 building_type_maijishan_grottoes_01_desc: "$building_maijishan_grottoes_01_desc$"
 building_maijishan_grottoes_01: "Jaskinie Maijishan"
 building_maijishan_grottoes_01_desc: "Góra Maijishan od dawna była miejscem czci. Uważa się, że geomancja południowych klifów przynosi szczęście, dlatego w czerwonej skale wyrzeźbiono setki kapliczek, w których znajdują się posągi i kolorowe freski z wizerunkami pogodnych Buddów i bodhisattwów. Wiele z nich powstało na życzenie rodzin żyjących w pobliskim mieście, dla których miejsce to bywa celem pielgrzymki, medytacji i kontemplacji."
 #Three Pagodas of Dali
 building_type_three_pagodas_dali_01: "$building_three_pagodas_dali_01$"
 building_type_three_pagodas_dali_01_desc: "$building_three_pagodas_dali_01_desc$"
 building_three_pagodas_dali_01: "Trzy pagody w Dali"
 building_three_pagodas_dali_01_desc: "Z rozległego kompleksu świątynnego należącego do rządzącej w mieście rodziny wznoszą się trzy wysokie, ustawione na kamiennych fundamentach pagody o ceglanych ścianach. Stanowią wierzchołki trójkąta równoramiennego, wyznaczając świętą geometrię terenu, i otulając okoliczne góry i jezioro."
 #Iron Lion of Cangzhou
 building_type_iron_lion_cangzhou_01: "$building_iron_lion_cangzhou_01$"
 building_type_iron_lion_cangzhou_01_desc: "$building_iron_lion_cangzhou_01_desc$"
 building_iron_lion_cangzhou_01: "Żelazny lew w Cangzhou"
 building_iron_lion_cangzhou_01_desc: "Ten ogromny lew to największa żeliwna rzeźba w całych Chinach, a na jego wytrzymałym grzbiecie siedzi bodhisattwa bogato ozdobiona pozłacanymi elementami, delikatnie dotykając piedestału w kształcie lotosu. Umieszczony w pobliżu narażonej na powodzie równiny posąg stał się dla lokalnych mieszkańców niejako strażnikiem ostrzegającym przed podnoszącym się poziomem wody."
 #Gaocheng Observatory
 building_type_dengfeng_observatory_01: "$building_dengfeng_observatory_01$"
 building_type_dengfeng_observatory_01_desc: "$building_dengfeng_observatory_01_desc$"
 building_dengfeng_observatory_01: "Obserwatorium w Gaocheng"
 building_dengfeng_observatory_01_desc: "To miejsce od wieków służy do obserwacji astronomicznych ze względu na swoje właściwości geomantyczne i symboliczne położenie w geograficznym środku Chin. Obecna konstrukcja o złożonym trapezowym kształcie pełni funkcję ogromnego zegara słonecznego, którego wysoka środkowa wskazówka rzuca cień na szczelinę dzielącą platformę, wyznaczając przebieg słońca."
 #Candi of Muara Takus
 building_type_muara_takus_01: "$building_muara_takus_01$"
 building_type_muara_takus_01_desc: "$building_muara_takus_01_desc$"
 building_muara_takus_01: "Candi Muara Takus"
 building_muara_takus_01_desc: "Kompleks świątynny składa się z wielu budowli – każda jest murowana i ozdobiona dekoracjami z piaskowca. Pośrodku wznoszą się wielkie stupy #italic mahligai#! i #italic tuo#! – pierwsza wysoka i smukła, druga rozległa jak góra – górujące nad otaczającymi je mniejszymi kapliczkami i tarasami."
 #Stone Pagoda of Mireuksa
 building_type_stone_pagoda_01: "$building_stone_pagoda_01$"
 building_type_stone_pagoda_01_desc: "$building_stone_pagoda_01_desc$"
 building_stone_pagoda_01: "Kamienna pagoda Mirŭk sa"
 building_stone_pagoda_01_desc: "Dziewięciokondygnacyjna pagoda stojąca na szerokim kamiennym fundamencie, której blady kolor rozświetla się w słoneczny dzień. Jest to pierwsza kamienna pagoda w Korei, a jej kształt i wyważone proporcje stały się wzorem dla budowniczych świątyń na całym półwyspie."
 #Thuriang Kilns
 building_type_thuriang_kilns_01: "$building_thuriang_kilns_01$"
 building_type_thuriang_kilns_01_desc: "$building_thuriang_kilns_01_desc$"
 building_thuriang_kilns_01: "Piece z Thuriang"
 building_thuriang_kilns_01_desc: "Ponad dwieście dużych pieców znajduje się w tym miejscu, tworząc największe centrum produkcji celadonu w regionie. Wytwarzana tutaj ceramika jest znana ze swojej szorstkiej, mocno wypalonej tekstury i charakterystycznej żółtozielonej emalii. Handluje się nią na wszystkich rynkach Azji Południowo-Wschodniej."
 #Yuelu Academy
 building_type_yuelu_academy_01: "$building_yuelu_academy_01$"
 building_type_yuelu_academy_01_desc: "$building_yuelu_academy_01_desc$"
 building_yuelu_academy_01: "Akademia Yuelu"
 building_yuelu_academy_01_desc: "Yuelu to jedna z najbardziej prestiżowych akademii w Chinach, która od dawna pełni funkcję ośrodka naukowego i egzaminacyjnego. Jej centralnym miejscem jest główny dziedziniec, od którego w symetryczny sposób rozchodzą się boczne sale i pawilony, w których pokolenia uczonych przygotowywały się do służby cywilnej."
 #Chocolate Hills #NOTE: today are called "Chocolate" Hills, but of course chocolate didn't exist in the Philippines back then. This is a random name I thought out, but it is not based on native names (none of which seem to have survived from then)
 building_type_chocolate_hills_01: "$building_chocolate_hills_01$"
 building_type_chocolate_hills_01_desc: "$building_chocolate_hills_01_desc$"
 building_chocolate_hills_01: "Rdzawe Zbocza"
 building_chocolate_hills_01_desc: "Tę formację geologiczną wyróżnia duża liczba okrągłych, stożkowatych wzgórz, które rozciągają się równomiernie po całym krajobrazie. Pokrywa je warstwa trawy, która w okresie suszy przybiera żywe brązowe i pomarańczowe odcienie, nadając terenowi nietypową jesienną barwę."
 #Fanfang of Guangzhou
 building_type_fanfang_guangzhou_01: "$building_fanfang_guangzhou_01$"
 building_type_fanfang_guangzhou_01_desc: "$building_fanfang_guangzhou_01_desc$"
 building_fanfang_guangzhou_01: "Fanfang w Guangzhou"
 building_fanfang_guangzhou_01_desc: "#italic Fanfang#! to ważna społeczność zagranicznych kupców – głównie muzułmańskich Arabów i Persów, którzy przybyli tu morskimi szlakami handlowymi – posiadająca własną dzielnicę w zachodniej części miasta, własnych urzędników i zwyczaje. W jej centrum stoi meczet o czerwonych ścianach, zwieńczony wysokim minaretem i latarnią morską prowadzącą statki i ludzi do bezpiecznego portu."
 #Wilwatikta Palace
 building_type_wilwatikta_palace_01: "$building_wilwatikta_palace_01$"
 building_type_wilwatikta_palace_01_desc: "$building_wilwatikta_palace_01_desc$"
 building_wilwatikta_palace_01: "Pałac w Wilwatikce"
 building_wilwatikta_palace_01_desc: "Rozległy pałacowy kompleks pawilonów, sal, świątyń i dziedzińców Wilwatikta jest na tyle ogromny, że przypomina miasto. Prostokątne ceglane mury otaczają cały teren, a wejście na aleję procesyjną wyznacza ciąg strzelistych bram #italic paduraksa#!."
 #Ha Long Bay
 building_type_ha_long_bay_01: "$building_ha_long_bay_01$"
 building_type_ha_long_bay_01_desc: "$building_ha_long_bay_01_desc$"
 building_ha_long_bay_01: "Zatoka Ha Long"
 building_ha_long_bay_01_desc: "Znad spokojnych szmaragdowych wód zatoki wyłaniają się zniewalający krajobraz krasowy i wapienne wysepki, gdzie lokalni rybacy dryfują z nadzieją na połów w cieniu filarów."
 #My Son Sanctuary
 building_type_my_son_sanctuary_01: "$building_my_son_sanctuary_01$"
 building_type_my_son_sanctuary_01_desc: "$building_my_son_sanctuary_01_desc$"
 building_my_son_sanctuary_01: "Sanktuarium My Son"
 building_my_son_sanctuary_01_desc: "Największy i najwytworniejszy spośród kompleksów świątynnych Czamów. Sanktuarium składa się z wielu działek rozmieszczonych blisko siebie na zalesionym terenie, z których każda ma własne bramy, kapliczki i stupy. Wszystkie budowle wzniesiono z czerwonej cegły ułożonej w geometryczne wzory i ozdobiono nadprożami z piaskowca."
 #Gunung Api
 building_type_gunung_api_01: "$building_gunung_api_01$"
 building_type_gunung_api_01_desc: "$building_gunung_api_01_desc$"
 building_gunung_api_01: "Gunung Api"
 building_gunung_api_01_desc: "Ta góra, która wyrasta z dzikiej dżungli, jest w oczach miejscowych święta. Pośród wilgoci i mgły majaczą jej zbocza pokryte imponującymi wapiennymi szczytami i głębokimi jaskiniami wyżłobionymi przez wodę na przestrzeni niezliczonych stuleci."
 #Sulawesi Megaliths
 building_type_suwalesi_megaliths_01: "$building_suwalesi_megaliths_01$"
 building_type_suwalesi_megaliths_01_desc: "$building_suwalesi_megaliths_01_desc$"
 building_suwalesi_megaliths_01: "Megality z Sulawesi"
 building_suwalesi_megaliths_01_desc: "Liczne megalityczne figury i wizerunki wzniesione przez miejscową ludność w celach rytualnych oraz ku czci duchów można spotkać rozsiane po dolinach Celebesu Środkowego. Te podobizny znane jako #italic arca#! wyrzeźbiono z minimalistyczną precyzją, a ich formy zarysowano subtelnymi i eleganckimi liniami."
 #Izumo Taisha
 building_type_izumo_taisha_01: "$building_izumo_taisha_01$"
 building_type_izumo_taisha_01_desc: "$building_izumo_taisha_01_desc$"
 building_izumo_taisha_01: "Kizuki Taisha"
 building_izumo_taisha_01_desc: "Tę wielką kapliczkę shinto, zwaną #italic taisha#!, wybudowano w pobliżu wybrzeża tak, by była skierowana w stronę morza. Wznosi się na rzędach olbrzymich drewnianych filarów i grubych pniach unoszących jej korytarze wysoko ponad ziemią, gdzie poruszają się śmiertelnicy, w stronę nieba, gdzie żyją bogowie i duchy ziemi."
 #Temple of Confucius
 building_type_confucius_temple_01: "$building_confucius_temple_01$"
 building_type_confucius_temple_01_desc: "$building_confucius_temple_01_desc$"
 building_confucius_temple_01: "Świątynia Konfucjusza"
 building_confucius_temple_01_desc: "Najstarsza i najbardziej wpływowa spośród wszystkich świątyń konfucjańskich. Ten rozległy kompleks sal i dziedzińców przez wieki był wzorem i inspiracją dla budowniczych świątyń w całych Chinach i poza ich granicami dzięki harmonijnemu geometrycznemu układowi oraz doskonałym detalom. W pobliżu znajduje się cichy las, w którym spoczywają grobowce Konfucjusza i jego potomków, tworząc dla wyznawców ważne miejsce pielgrzymek."
 #Imperial Citadel of Lin'an
 building_type_citadel_linan_01: "$building_citadel_linan_01$"
 building_type_citadel_linan_01_desc: "$building_citadel_linan_01_desc$"
 building_citadel_linan_01: "Cytadela Cesarska w Lin’an"
 building_citadel_linan_01_desc: "Wzniesiona na północnych zboczach Góry Feniksa cytadela cesarska służy jako siedziba dworu i jego administracji. Jej przeogromne sale i korytarze odwiedzają niezliczeni uczeni i urzędnicy. Choć nie jest tak rozległa jak pałace północnych stolic, to wytworność i elegancja jej ogrodów tarasowych i pawilonów co najmniej im dorównuje."
 #The Temples of Angkor
 building_type_temples_angkor_01: "$building_temples_angkor_01$"
 building_type_temples_angkor_01_desc: "$building_temples_angkor_01_desc$"
 building_temples_angkor_01: "Świątynie w Angkorze"
 building_temples_angkor_01_desc: "O zamożności miasta Indry świadczą niezliczone pozłacane dachy i iglice świątyń, a każda budowla ma coraz to bogatsze zdobienia, a także rzeźbione płaskorzeźby i posągi bóstw oraz dewaradżów."
 building_temples_angkor_02: "Angkor Wat"
 building_temples_angkor_02_desc: "Angkor Wat to rozległy kompleks świątynny poświęcony bóstwu Wisznu. Zaprojektowano go na wzór góry Meru, która w mitologii hinduskiej była domem bogów. Kompleks otoczony jest imponującą fosą. W jego skład wchodzi kilka świątyń galeryjnych pełnych sztuki religijnej, rzeźb i płaskorzeźb."
