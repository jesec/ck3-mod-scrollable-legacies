 COURT_VISUAL_BYZANTINE_1_G3_TITLE: "Chrysotriklinos"
 COURT_VISUAL_BYZANTINE_1_G3_DESC: "Przeznaczona do audiencji, zwieńczona kopułą wspaniała sala pełna marmuru i mozaik. To w niej cesarz sprawuje władzę pod czujnym okiem świętych."
 COURT_VISUAL_CHINESE_1_G1_TITLE: "Sala niebios"
 COURT_VISUAL_CHINESE_1_G1_DESC: "Okazała sala, którą zdobią cynobrowe filary i jedwabna draperia. To w niej, z zadaszonego tronu, padają rozkazy."
