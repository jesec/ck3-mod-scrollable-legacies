 COURT_VISUAL_BYZANTINE_1_G1_TITLE: "Chrysotriklinos"
 COURT_VISUAL_BYZANTINE_1_G1_DESC: "Przeznaczona do cesarskich audiencji, zwieńczona kopułą sala pełna marmuru i mozaik. To w niej cesarz sprawuje władzę pod okiem świętych."
