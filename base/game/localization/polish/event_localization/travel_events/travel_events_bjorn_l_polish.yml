l_polish:
 #Travel Flavor Events
 #Troll bridge - you encounter a troll bridge.
 travel_events.5100.t: "Most, pod którym mieszka [ROOT.Char.GetCurrentLocation.Custom('GetProvinceTricksterSpirit')]"
 travel_events.5100.desc: "– Wasza czcigodność, ten most ma złą sławę. Mieszka pod nim [ROOT.Char.GetCurrentLocation.Custom('GetProvinceTricksterSpirit')]! – woła [superstitious_traveler.GetTitledFirstName], a dla mnie [ROOT.Char.Custom2('RelationToMe', superstitious_traveler)]. – Dopadnie nas albo rzuci na nas klątwę, gdy będziemy przejeżdżać.\n\nCzłonkowie mojej świty zaczynają szeptać. Niektórzy przywołują [ROOT.Char.GetFaith.HighGodNamePossessive] z nadzieją na ochronę. Niestety ten most to jedyny punkt przeprawy w promieniu wielu mil stąd."
 travel_events.5100.a: "– Niestraszny mi żaden demon czy [ROOT.Char.GetCurrentLocation.Custom('GetProvinceTricksterSpirit')]!"
 travel_events.5100.b: "– [superstitious_traveler.GetTitledFirstNameNoTooltip] wierzy w bajki. Nie istnieje coś takiego."
 travel_events.5100.c: "– Pomódlmy się, by odpędzić tego ducha."
 travel_events.5100.d: "– Brzmi strasznie! Poszukajmy objazdu."
 custom.every_brave_or_impatient_entourage_member: "Każdy członek świty z następującą cechą: [GetTrait('brave').GetName( GetNullCharacter )|l] lub [GetTrait('impatient').GetName( GetNullCharacter )|l]"
 custom.every_cynical_or_impatient_entourage_member: "Każdy członek świty z następującą cechą: [GetTrait('cynical').GetName( GetNullCharacter )|l] lub [GetTrait('impatient').GetName( GetNullCharacter )|l]"
 custom.every_eccentric_or_zealous_entourage_member: "Każdy członek świty z następującą cechą: [GetTrait('eccentric').GetName( GetNullCharacter )|l] lub [GetTrait('zealous').GetName( GetNullCharacter )|l]"
 custom.every_craven_or_impatient_entourage_member: "Każdy członek świty z następującą cechą: [GetTrait('craven').GetName( GetNullCharacter )|l] lub [GetTrait('impatient').GetName( GetNullCharacter )|l]"
