 SITUATION_LIST_STORY_CYCLE_MODIFIERS_HEADER: "Modyfikatory"
 SITUATION_LIST_STORY_CYCLE_DECISIONS_HEADER: "Decyzje"
 not_yet_chosen: "jeszcze nie wybrano"
 story_cycle_pet_dog: "Psi towarzysz"
 story_cycle_pet_dog_desc: "#F Towarzyszy ci wierny psi przyjaciel, oferując ochronę i lojalność, do jakiej zdolny jest mało który człowiek.#!"
 DOG_INFORMATION_STRING: "Twój pies wabi się #V [Story.Custom('DogStoryNameAll')].#!\nJest to [Story.Custom('DogStoryPuppyOrAgeAll')] o [Story.Custom('DogEyeColorAll')] oczach; futro ma [Story.Custom('DogFurColorAll')].\n[Story.Custom('DogStoryNameAll')] to dobry psiak!"
 dog_age_puppy: "szczenię"
 dog_age_proper: "[Story.MakeScope.Var('dog_age_variable').GetValue|0]-letni czworonóg"
 cat_age_kitten: "kocię"
 cat_age_proper: "[Story.MakeScope.Var('cat_age_variable').GetValue|0]-letni czworonóg"
 story_cycle_pet_cat: "Koci towarzysz"
 story_cycle_pet_cat_desc: "#F Towarzystwa dotrzymuje ci dumny kot – zwinny łowca, który obdarza człowieka uczuciami na własnych zasadach.#!"
 CAT_INFORMATION_STRING: "Twój kot wabi się #V [Story.Custom('CatStoryNameAll')].#!\nJest to [Story.Custom('CatStoryKittenOrAgeAll')] o [Story.Custom('CatEyeColorAll')] oczach; futro ma [Story.Custom('CatFurColorAll')].[Story.Custom('CatStupidOrNotStupidAll')]"
 dumb_but_sweet_orange_boy: "\nMoże nie grzeszy rozumem, ale nadrabia słodkością."
 story_cycle_pet_eagle: "Orzeł myśliwski"
 story_cycle_pet_eagle_desc: "#F Na twojej rękawicy pręży się orzeł – stale czujny, wiecznie nienasycony myśliwy gotowy nieść z firmamentu śmierć swym ofiarom.#!"
 EAGLE_INFORMATION_STRING: "Twój orzeł wabi się #V [Story.Custom('EagleStoryNameAll')].#!\nJego wiek (w latach) to [Story.MakeScope.Var('eagle_age_variable').GetValue|0]."
 bp2_hostage_loyalty: "Lojalny zakładnik"
 bp2_hostage_loyalty_desc: "Jeden z twoich [Concept('hostages', 'zakładników')|E] zaczyna przychylnie spoglądać na ciebie i twoje metody."
 hostage: "[hostage|E]"
 HOSTAGE_STORY_PRACTICAL_INFORMATION_STRING: "Twój [hostage|El], [Story.MakeScope.Var('hostage_target').Char.GetUINameNotMe], dorasta na twoim [Concept('court', 'dworze')|E], co wpływa na [Story.MakeScope.Var('hostage_target').Char.Custom('PL_jego_jej')] oddanie. Jeśli będziesz utrzymywać [Story.MakeScope.Var('hostage_target').Char.Custom('PL_jego_jej')] [Concept('opinion', 'opinię')|E] na wysokim poziomie i wybierać odpowiednie opcje w ramach wydarzeń, zwiększy się prawdopodobieństwo, że obdarzy cię większą lojalnością, gdy osiągnie dorosłość.\n\nObecny poziom lojalności: [Story.MakeScope.Var('theon_points').GetValue|0+]"
 LOYALTY_LABEL: "Punkty lojalności"
 claimant: "[claimant|E]"
 diverted_crusaders: "Przekierowani krzyżowcy"
 frankokratia_story: "Frankokracja"
 frankokratia_story_desc: "Pretendent do tytułu o nazwie [GetTitleByKey('e_byzantium').GetName] odwrócił uwagę oportunistów z Zachodu. Przerwali krucjatę, kierując zachłanne spojrzenia i ostrza w stronę samej kolebki chrześcijaństwa…"
 FRANKOKRATIA_STORY_PRACTICAL_INFORMATION_STRING: "[war|E] przeciwko osobie znanej jako [GetTitleByKey('e_byzantium').GetHolder.GetShortUINameNotMe] zadecyduje o losach miejsca o nazwie [GetTitleByKey('e_byzantium').GetName]. Może się to skończyć na dwa sposoby: albo [claimant|El], [Story.MakeScope.Var('byz_claimant').Char.GetUINameNotMe], obejmie tron i zapłaci krzyżowcom za ich działania, albo powstanie nowe cesarstwo – [GetTitleByKey('e_latin_empire').GetBaseName] – w którym porządek dyktować będzie władza [GetFaithByKey('catholic').GetAdjective|l]."
 story_conqueror: "Zdobywca"
 story_conqueror_desc: "Twoja ambicja nie zna granic. Świat leży u twych stóp – wystarczy, że po niego sięgniesz."
 CONQUEROR_STORY_PRACTICAL_INFORMATION_STRING: "Zdobywcy otrzymują wiele znaczących premii, takich jak ograniczenie [Concept('factions', 'frakcji')|E], występowanie wydarzeń o dużym znaczeniu oraz dostęp do następującego [vassalize_casus_belli|El].\n\nMiano zdobywcy zostanie ci odebrane, jeśli:\n$BULLET_WITH_TAB$nie będziesz władcą [Concept('independent', 'niezależnym')|E],\n$BULLET_WITH_TAB$twoja ranga obniży się do poziomu [Concept('count', 'hrabiego')|E],\n$BULLET_WITH_TAB$zostaniesz [unlanded|El],\n$BULLET_WITH_TAB$nie będziesz uczestniczyć w żadnej [Concept('war', 'wojnie')|E] przez #V 10#! lat,\n$BULLET_WITH_TAB$zaciągniesz zbyt duży [debt|El],\n$BULLET_WITH_TAB$przegrasz co najmniej #V 3#! [Concept('war', 'wojny')|E],\n$BULLET_WITH_TAB$otrzymasz cechę [GetTrait('incapable').GetName( GetNullCharacter )|l]."
 story_destiny_child: "Dziecko przeznaczenia"
 story_destiny_child_desc: "Narodziło się dziecko, któremu pisana jest wielkość – zupełnie jakby było wybrańcem przeznaczenia."
 DESTINY_CHILD_STORY_PRACTICAL_INFORMATION_STRING: "Zdarza się – choć wyjątkowo – że na świat przychodzi dziecko, któremu pisana jest wielkość. Rozwija się ono szybciej niż jego rówieśnicy i osiąga nierealne dla innych sukcesy.\n\n[Story.MakeScope.Var('destiny_child').Char.GetUINameNotMe] to postać, którą warto otoczyć szczególną opieką. Rozważ uczynienie [Story.MakeScope.Var('destiny_child').Char.Custom('PL_go_jej')] twoim [Concept('player_heir', 'następcą')|E] – na przykład poprzez ogłoszenie [Story.MakeScope.Var('destiny_child').Char.Custom('PL_go_jej')] [Concept('designated_heir', 'wyznaczonym dziedzicem')|E]."
 CHILD_OF_DESTINY: "Dziecko przeznaczenia"
 story_cycle_martial_lifestyle_warhorse: "Koń bojowy"
 story_cycle_martial_lifestyle_warhorse_desc: "Dysponujesz wyjątkowo dobrze wyszkolonym koniem. Niech wrogowie drżą, ilekroć rozpoczniesz szarżę."
 WARHORSE_STORY_PRACTICAL_INFORMATION_STRING: "Twój koń wabi się #V [Story.Custom('WarhorseStoryNameAll')]#!."
 DOPPELGANGER: "Twój [Glossary( 'sobowtór', 'DOPPELGANGER_GLOSS' )]"
 story_doppelganger: "Ubłocony sobowtór"
 DOPPELGANGER_GLOSS: "Ktoś, kto przypomina inną osobę lub wręcz wygląda zupełnie jak ona, często spotykany przez przypadek. W folklorze niemieckim to niepokojące zjawisko i zły omen: widok własnego sobowtóra może zwiastować chorobę lub śmierć."
 story_doppelganger_desc: "Ktoś znalazł wśród chłopstwa osobę, która wygląda zupełnie jak ty – [Glossary( 'sobowtóra', 'DOPPELGANGER_GLOSS' )] z krwi i kości…"
 DOPPELGANGER_STORY_PRACTICAL_INFORMATION_STRING: "Osoba chłopskiego pochodzenia, która wygląda i mówi zupełnie jak ty, może dać ci ciekawe możliwości… lub stać się twoim przekleństwem. Póki co [Story.MakeScope.Var('doppelganger_character').Char.GetUINameNotMe] zamieszkuje twój [court|El]."
 story_cycle_hunt_mystical_animal: "Polowanie na mistyczne zwierzę"
 story_cycle_hunt_mystical_animal_desc: "Podczas łowów udało ci się wypatrzyć mistyczne białe stworzenie. Schwytanie go byłoby jak znalezienie Graala!"
 WHITE_ANIMAL_INFORMATION_STRING: "Jesteś na tropie wyjątkowego zwierzęcia. To #V [Story.MakeScope.Var('animal_type').GetFlagName] o białym umaszczeniu.#!\n\nSchwytanie takiego stworzenia przyniosłoby ci wiele korzyści, ale za każdym razem, gdy [Story.MakeScope.Var('animal_type').GetFlagName] ci się wymknie, będzie zwiększał się twój [stress|El]. Od czasu do czasu modyfikator „[GetModifier('hunt_sighting_legendary_modifier').GetNameWithTooltip]” umożliwi ci kontynuowanie łowów.\n\n[Story.MakeScope.Var('animal_type').GetFlagName|U] o białym umaszczeniu – liczba spotkań: [Story.MakeScope.Var('encounters').GetValue|0V] #weak (od pierwszego razu)#!"
 LEGENDARY_COUNTY_LABEL: "[Story.MakeScope.Var('animal_type').GetFlagName|U] o białym umieszczeniu – aktualne miejsce bytowania"
 story_sycophant: "Pochlebca"
 story_sycophant_desc: "Jeden z twoich dworzan – oczywisty pochlebca – denerwuje twoich wasali samą obecnością."
 SYCOPHANT_INFORMATION_STRING: "[Story.MakeScope.Var('sycophant_character').Char.GetShortUINameNotMe] – dla mnie [Story.GetOwner.Custom2( 'RelationToMeShort', Story.MakeScope.Var('sycophant_character').Char )|l] – i [Story.MakeScope.Var('jealous_character').Char.GetShortUINameNotMe], [Story.GetOwner.Custom2( 'RelationToMeShort', Story.MakeScope.Var('jealous_character').Char )|l] mojej osoby, skaczą sobie do gardeł. Mogę stanąć po jednej ze stron, ale wtedy rozzłoszczę drugą. Czas pokaże, jak rozwinie się ta sytuacja…"
 SYCOPHANT_LABEL: "Pochlebca"
 JEALOUS_VASSAL_LABEL: "Najbardziej zazdrosny z wasali"
 story_cycle_pet_rock: "Ulubiony kamień"
 story_cycle_pet_rock_desc: "U boku masz ulubiony odłamek skały, którego kamienne oblicze idealnie wpasowuje się w twoje wyszukane oczekiwania towarzyskie."
 PET_ROCK_INFORMATION_STRING: "Twój kamień wabi się #V [Story.GetOwner.Custom('RockStoryName')].#!\nJego surowa powierzchnia ma [Story.GetOwner.Custom('RockColor')] zabarwienie."
 story_cycle_admin_eunuch: "Nadzwyczajny eunuch"
 story_cycle_admin_eunuch_desc: "Eunuch o nadzwyczajnych umiejętnościach stara się dołączyć do dworu. Okazja czy zagrożenie…?"
 EUNUCH_INFORMATION_STRING: "Z czasem będziesz mieć okazję obdarzenia osoby znanej jako [Story.MakeScope.Var('eunuch').Char.GetShortUINameNotMe] większą władzą i wpływem, zwiększając tym samym wartość [Concept('modifier', 'modyfikatora')|E] „[GetModifier('admin_eunuch_liege_4_modifier').GetNameWithTooltip]”.\n\nMiej się jednak na baczności: jeśli wzgardzisz tą osobą lub zapewnisz jej #EMP zbyt dużą#! władzę, nie zaskarbiwszy sobie jej lojalności, konsekwencje mogą być katastrofalne…\n\nDotychczas ta osoba spotkała się z twoją odmową [Story.MakeScope.Var('eunuch_refusals').GetValue|0V] razy."
 EUNUCH_LABEL: "Eunuch"
 UPSET_COURTIERS: "Poddani niezadowoleni z powodu eunucha"
 POETRY_BOOK_LABEL: "Mój tomik poezji"
 commission_epic_story: "Zleć skomponowanie eposu"
 commission_epic_story_desc: "Zlecasz skomponowanie wspaniałego eposu upamiętniającego dokonania twojej rodziny."
 EPIC_INFORMATION_STRING: "[Story.GetOwner.Custom('CommissionEpicScribe')][AddTextIf(Story.MakeScope.Var('composer').IsSet, Concatenate(Concatenate(', ', Story.MakeScope.Var('composer').Char.GetShortUINameNotMe), ','))|U] pracuje nad eposem. [Story.Custom('CompositionTypeAll')|U] ma zwiększyć [Concept('dynasty_prestige', 'renomę')|E] [Concept('dynasty', 'dynastii')|E] [Story.GetOwner.GetDynasty.GetName] i stanowić [artifact|El].\n\nSzansa, że [Story.Custom('CompositionTypeAll')] okaże się dziełem wybitnym, wynosi [Story.MakeScope.Var('final_outcome_chance').GetValue|0+/%]"
 COMPOSER: "Autor twojego eposu"
 story_foreign_raised_reformer: "Obce reformy"
 story_foreign_raised_reformer_desc: "Wychowywano cię w stronach odległych od miejsca, które nazywasz dziś domem.\nByło tam zupełnie inaczej, ale… może mogłoby tu być podobnie?"
 REFORMER_INFORMATION_STRING: "Twoje miejsce pochodzenia to [Story.MakeScope.Var('advanced_realm').Title.GetBaseName]. Wychowała cię tam osoba znana jako [Story.MakeScope.Var('foreign_educator').Char.GetShortUINameNotMe], której bliska była kultura [Story.MakeScope.Var('advanced_culture').Culture.GetAdjective|l] i wiara [Story.MakeScope.Var('advanced_culture_faith').Faith.GetAdjective|l]. [culture|E] [Story.MakeScope.Var('advanced_culture').Culture.GetAdjective|l] bardzo ci imponuje – chcesz, żeby twój lud bardziej przypominał jej społeczeństwo.\n\nBędziesz mieć okazje do uzyskania punktów na korzyść reformacji lub umocnienia dotychczasowego stanu rzeczy.\n$BULLET_WITH_TAB$#indent_newline:7 Dążąc do wprowadzenia reformy, możesz zyskać [innovations|El], [Concept('cultural_acceptance', 'tolerancję kulturową')|E], [traditions|El], a może nawet [GetBuilding('generic_university').GetName|l]. Miej na uwadze, że reformacja jest procesem czasochłonnym i kosztownym.#!\n$BULLET_WITH_TAB$#indent_newline:7 Dążąc do umocnienia dotychczasowego stanu rzeczy, możesz zdobyć lepszą [Concept('opinion', 'opinię')|E] u [Concept('vassal', 'wasali')|E] i [Concept('dynasty_prestige', 'renomę')|E] oraz premie związane z [Concept('war', 'wojną')|E] w postaci [casus_bellis|El] i [Concept('special_troops', 'oddziałów specjalnych')|E].#!"
 REFORM_LABEL: "Postęp w kierunku reformacji twojej [Concept('culture', 'kultury')|E]"
 REAFFIRMATION_LABEL: "Postęp w kierunku umocnienia twojej [Concept('culture', 'kultury')|E]"
 REFORM_MIN_VALUE_LABEL: ""
 REFORM_MAX_VALUE_LABEL: "Maks.: #V 3#!"
 REAFFIRMATION_MIN_VALUE_LABEL: ""
 REAFFIRMATION_MAX_VALUE_LABEL: "Maks.: #V 2#!"
 ECCENTRIC_MIN_VALUE_LABEL: ""
 ECCENTRIC_MAX_VALUE_LABEL: "Maks.: #V 5#!"
 IMAGINARY_FRIEND_INFORMATION_STRING: "Twój wymyślony przyjaciel nazywa się [Story.MakeScope.Var('imaginary_friend_name').Char.GetShortUINameNotMeNoTooltip]. Od czasu do czasu będziecie mieć okazję do wejścia w interakcję."
 ECCENTRIC_VALUE: "Postęp w kierunku uzyskania cechy [GetTrait('eccentric').GetName( GetNullCharacter )|l]"
 story_cycle_imaginary_friend: "Wymyślony przyjaciel"
 story_cycle_imaginary_friend_desc: "Nareszcie – przyjaciel, z którym można się bawić! Kogo obchodzi, że nie istnieje? Dla mnie jest prawdziwy!"
 story_greatest_of_khans: "Największy z chanów"
 story_greatest_of_khans_desc: "Wiele obiektów lśni na nieboskłonie: słońce, księżyc, niezliczone gwiazdy. Na ziemi jednak jest miejsce tylko dla jednego chana."
 GREATEST_OF_KHANS_INFORMATION_STRING: "$become_greatest_of_khans_decision_enable_gok_invasion_cb$\n$gok_enable_offer_submission_or_ruin_tt$\n\n@alert_icon! #alert_trial Jeśli twoja [dynasty|El] straci kontrolę nad miejscem o nazwie [Story.GetOwner.GetPrimaryTitle.GetName], zmieni [GetGovernment( 'nomad_government' ).GetName|l] na inny lub nie podejmie [Concept('decision', 'decyzji')|E] #high „$mpo_gok_world_conquest_decision$”#! przed rokiem #high [Story.MakeScope.Var('gok_final_date').GetValue|0]#!, te premie przepadną, a miejsce znane jako [Story.GetOwner.GetPrimaryTitle.GetName] będzie mogło upaść!#!"
