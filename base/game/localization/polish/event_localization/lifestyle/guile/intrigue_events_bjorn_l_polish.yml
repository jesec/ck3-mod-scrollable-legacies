l_polish:
 #Lessons of the heart
 intrigue_events_bjorn.5100.t: "Lekcje z miłością"
 intrigue_events_bjorn.5100.desc: "Ktoś tak wspaniały jak [the_lover.GetFirstName] – moja miłość – mógłby wiele mnie nauczyć. Dociera to do mnie, gdy [the_lover.Custom('PL_go_ja')] obserwuję. [the_lover.Custom('PL_jego_jej')|U] umysł jest jak skarb czekający na grabieżcę. [the_lover.GetFirstName] może też nauczyć się czegoś ode mnie.\n\nTo zresztą znakomity sposób wspólnego spędzania czasu!"
 intrigue_events_bjorn.5100.a: "Moja miłość może tak wiele mnie nauczyć."
 intrigue_events_bjorn.5100.b: "Cudownie będzie [the_lover.Custom('PL_go_ja')] uczyć."
 intrigue_events_bjorn.5100.c: "Wspólne spędzanie czasu w zupełności mi wystarczy."
 #shared interests
 intrigue_events_bjorn.5101.t: "Wspólne dążenia"
 intrigue_events_bjorn.5101.desc: "[the_lover.GetFirstName] niezwykle mnie intryguje! Chcę cieszyć się tym, co sprawia [the_lover.Custom('PL_mu_jej')] radość.\n\nDzielić wraz z [the_lover.Custom('PL_nim_nia')] błogie dni.\n\nHarmonię ruchów i bieg myśli.\n\nNasze serca biją w jednym rytmie."
 intrigue_events_bjorn.5101.a: "Pokaż mi, co wznieca w tobie pasję, kochanie."
 intrigue_events_bjorn.5101.b: "Dziel ze mną swą radość!"
 intrigue_events_bjorn.5101.c: "Może nauczymy się razem czegoś nowego?"
 #Dark depths of the soul
 intrigue_events_bjorn.5102.t: "Pokochać mrok"
 intrigue_events_bjorn.5102.desc: "Zbliżając się, docieramy do pewnej granicy. Może nadszedł czas, by odsłonić się przed sobą w pełni. Dowiedzieć się o sobie wszystkiego. Podzielić się tym, co zwykle… pozostaje ukryte.\n\nOd tego momentu nie będzie już odwrotu – tylko czy znając całą prawdę, [the_lover.GetFirstName] mnie zaakceptuje?"
 intrigue_events_bjorn.5102.a: "Chcę ci powierzyć moje sekrety."
 intrigue_events_bjorn.5102.b: "Powiedz mi coś, o czym nie wie nikt inny."
 intrigue_events_bjorn.5102.c: "Obnażmy przed sobą nasze najmroczniejsze fantazje."
 intrigue_events_bjorn.5102.d: "Nie! O pewnych rzeczach mówić nie wypada."
