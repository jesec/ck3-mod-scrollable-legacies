l_polish:
 hunt_events_anna.0001.t: "Głębokie korzenie"
 hunt_events_anna.0001.desc: "Przede mną góruje potężny dąb o majestatycznej koronie, przysłaniającej cieniem wszystko w dole. Gdy spoglądam na jego rozłożyste gałęzie, myślę o rozmaitych dynastiach przewijających się przez wieki; o wszystkich, którzy byli tu przede mną, i o tych, którzy przejmą moją spuściznę, gdy spocznę w grobie.\n\nZbliżywszy się nieco, zauważam, że w korze wyryto kilka inicjałów – i znów myślę o ulotności ludzkiego życia. Osoba, której chcę powierzyć moje dziedzictwo, to [love_interest.GetFirstName]. Jest dla mnie wszystkim."
 hunt_events_anna.0001.a: "Wyryj w korze inicjały osoby o imieniu [love_interest.GetFirstNameNoTooltip]"
 hunt_events_anna.0001.b: "Nie ma czasu na takie bzdury!"
 hunt_events_anna.0001.b.t_toast: "Moim priorytetem są łowy."
 hunt_events_anna.0005.t: "Za skórę"
 hunt_events_anna.0005.desc: "Mój krótki odpoczynek zostaje przerwany wybuchem szyderczego śmiechu. Spoglądam w górę i bez większego zaskoczenia zauważam, że to [mocking_participant.GetFirstName] stoi przede mną z wyszczerzonymi zębami. W rękach ściska martwe zwierzę – [ROOT.Char.Custom('SmallAnimal')], jeśli się nie mylę.\n\n– Zawsze wydawało mi się, że ktoś taki jak ty nie przetrwałby sam w dziczy. Może chcesz poćwiczyć oprawianie zwierzyny? – szydzi, rzucając mi truchło pod nogi."
 hunt_events_anna.0005.a: "Spróbuj oskórować zwierzę."
 hunt_events_anna.0005.a.toast.good: "Udaje mi się oskórować zwierzę"
 hunt_events_anna.0005.a.toast.nothing: "Po tym, co zostało, trudno poznać, jakie to było zwierzę"
 hunt_events_anna.0005.b: "Poćwiczyć? Czemu nie…"
 hunt_events_anna.0005.c: "Nie będę zniżać się do tak podrzędnych czynności."
 hunt_events_anna.0010.t: "Więzienie w dole"
 hunt_events_anna.0010.desc: "[ROOT.Char.GetCurrentLocation.Custom('GetTerrainTypePlural')|U] to niewdzięczny teren. Tropiąc ofiarę, stąpam ciężko i niezgrabnie; staram się przede wszystkim utrzymać tempo. Wtem jednak rozlega się trzask i grunt umyka mi spod nóg. Zawartość żołądka podchodzi mi do gardła. Zaraz potem uderzam w ziemię, a moje ciało przeszywa ostry ból.\n\nRozglądam się z wysiłkiem. Wokół mnie są tylko cztery ściany. Jestem w potrzasku. Muszę się jakoś wydostać z tej dziury."
 hunt_events_anna.0010.a: "Spróbuj się wspiąć i wydostać z dziury."
 hunt_events_anna.0010.a.desc.good: "Udaje mi się wydostać z pułapki"
 hunt_events_anna.0010.a.toast.good: "Udaje mi się pokonać ból i wydostać z pułapki"
 hunt_events_anna.0010.a.toast.bad: "Znów tracę równowagę, a do tego się ranię"
 hunt_events_anna.0010.a.desc.bad: "Zsuwam się i znów jestem na dnie"
 hunt_events_anna.0010.b: "– Jest tam kto?!"
 hunt_events_anna.0010.b.flavor: "Grupa łowiecka przerywa polowanie, żeby mi pomóc."
 hunt_events_anna.0015.t: "Wdech… i wydech"
 hunt_events_anna.0015.desc: "Z polany dochodzą mnie osobliwe tąpnięcia, ciche mamrotanie i – od czasu do czasu – westchnienie. Ktoś z wyraźną frustracją chodzi w tę i we w tę z łukiem w dłoniach.\n\nChowam się za drzewem i dyskretnie wychylam, by uważniej rzucić okiem, a wtedy okazuje się, że to [child_with_bow.GetFirstName] – moje dziecko. Wokół [child_with_bow.Custom('PL_niego_niej')] porozrzucane są strzały, które ledwo co dosięgły wyznaczonego przez [child_with_bow.Custom('PL_niego_nia')] celu. Chyba przydałaby [child_with_bow.Custom('PL_mu_jej')] się pomoc."
 hunt_events_anna.0015.a: "– Pozwól, że zademonstruję…"
 hunt_events_anna.0015.a.flavor: "Jako uzdolniony łowca mogę, korzystając ze swojej wiedzy, spróbować pomóc [child_with_bow.Custom('PL_mu_jej')] poprawić posturę i zwiększyć precyzję."
 hunt_events_anna.0015.a.toast.good: "[child_with_bow.GetFirstNameNoTooltip] słucha moich wskazówek"
 hunt_events_anna.0015.a.toast.bad: "[child_with_bow.GetFirstNameNoTooltip] nie rozumie moich wskazówek"
 hunt_events_anna.0015.b: "Okaż wsparcie, zachęcając [child_with_bow.Custom('PL_go_ja')] do ćwiczenia."
 hunt_events_anna.0015.c: "Niech [child_with_bow.GetFirstNameNoTooltip] uczy się samodzielnie."
 hunt_events_anna.0015.c.toast: "[child_with_bow.GetFirstNameNoTooltip] odkrywa, jak posługiwać się łukiem"
