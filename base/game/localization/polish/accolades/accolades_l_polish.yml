 #Common attribute unlocks
 marauder_attribute.unlock_tt: "Którekolwiek z poniższych:\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] to [GetTrait('sadistic').GetName( GetNullCharacter )|l].\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] to [GetTrait('callous').GetName( GetNullCharacter )|l].\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] to [GetTrait('vengeful').GetName( GetNullCharacter )|l].\n$EFFECT_LIST_BULLET$Można uzyskać dostęp po tym, jak [army|El], w której skład wchodzi [acclaimed_knight|El], dokona skutecznej [Concept('occupies', 'okupacji')|E] [Concept('holding', 'posiadłości')|E]."
 accolade_marauder_unlock.t: "Zdobycie twierdzy wroga inspiruje osobę znaną jako [marauder.GetName]"
 accolade_marauder_unlock.tt: "[marauder.GetName] może zdobyć [acclaimed|El] i otrzymać wyróżnienie „[GetAccoladeType('marauder_attribute').GetName]”"
 idealist_attribute.unlock_tt: "Którekolwiek z poniższych:\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] to [GetTrait('compassionate').GetName( GetNullCharacter )|l].\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] to [GetTrait('forgiving').GetName( GetNullCharacter )|l].\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] to [GetTrait('generous').GetName( GetNullCharacter )|l].\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] to [GetTrait('trusting').GetName( GetNullCharacter )|l].\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] może uzyskać dostęp po tym, jak #high uwolnisz#! [Concept('prisoner', 'więźnia')|E] bez dodatkowych warunków."
 accolade_idealist_unlock.t: "Uwolnienie więźnia inspiruje osobę znaną jako [idealist.GetName]"
 accolade_idealist_unlock.tt: "Nasze miłosierdzie wobec więźniów inspiruje osobę znaną jako [idealist.GetName] i zaszczepia w niej nowe ideały. Może ona zdobyć [acclaimed|El] i otrzymać wyróżnienie „[GetAccoladeType('idealist_attribute').GetName]”"
 charmer_attribute.unlock_tt: "Którekolwiek z poniższych:\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] to [GetTrait('seducer').GetName( GetNullCharacter )|l].\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] to [GetTrait('lustful').GetName( GetNullCharacter )|l].\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] może uzyskać dostęp po tym, jak ukończysz [scheme|El] „[GetScheme('seduce').GetTypeName]”."
 accolade_charmer_unlock.t: "Śmiałe uwodzenie inspiruje osobę znaną jako [accolade_knight.GetName]"
 accolade_charmer_unlock.tt: "[accolade_knight.GetName] może zdobyć [acclaimed|El] i otrzymać wyróżnienie „[GetAccoladeType('charmer_attribute').GetName]”"
 thug_attribute.unlock_tt: "Którekolwiek z poniższych:\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] to [GetTrait('reaver').GetName( GetNullCharacter )|l].\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] to [GetTrait('wrathful').GetName( GetNullCharacter )|l].\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] to [GetTrait('arbitrary').GetName( GetNullCharacter )|l].\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] to [GetTrait('arrogant').GetName( GetNullCharacter )|l].\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] to [GetTrait('impatient').GetName( GetNullCharacter )|l].\n$EFFECT_LIST_BULLET$Można uzyskać dostęp, kiedy [acclaimed_knight|El] jest częścią [Concept('army', 'armii')|E], która zabija wrogich [Concept('knights', 'rycerzy')|E]."
 accolade_thug_unlock.t: "Zabójstwa w bitwie inspirują osobę znaną jako [accolade_knight.GetName]"
 accolade_thug_unlock.tt: "[accolade_knight.GetName] może zdobyć [acclaimed|El] i otrzymać wyróżnienie „[GetAccoladeType('thug_attribute').GetName]”"
 disciplinarian_attribute.unlock_tt: "Którekolwiek z poniższych:\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] to [GetTrait('organizer').GetName( GetNullCharacter )|l].\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] to [GetTrait('overseer').GetName( GetNullCharacter )|l].\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] to [GetTrait('diligent').GetName( GetNullCharacter )|l].\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] to [GetTrait('temperate').GetName( GetNullCharacter )|l].\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] to [GetTrait('stubborn').GetName( GetNullCharacter )|l].\n$EFFECT_LIST_BULLET$Można uzyskać dostęp, kiedy [acclaimed_knight|El] jest częścią [Concept('army', 'armii')|E], która przegrywa [Concept('battle', 'bitwę')|E]."
 accolade_disciplinarian_unlock.t: "Przegrana bitwa inspiruje osobę znaną jako [accolade_knight.GetName]"
 accolade_disciplinarian_unlock.tt: "[accolade_knight.GetName] może zdobyć [acclaimed|El] i otrzymać wyróżnienie „[GetAccoladeType('disciplinarian_attribute').GetName]”"
 fanatic_attribute.unlock_tt: "Którekolwiek z poniższych:\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] to [GetTrait('holy_warrior').GetName( GetNullCharacter )|l].\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] to [GetTrait('zealous').GetName( GetNullCharacter )|l].\n$EFFECT_LIST_BULLET$Można uzyskać dostęp, kiedy [acclaimed_knight|El] jest częścią [Concept('army', 'armii')|E], która toczy [battles|El] przeciwko wrogiej [Concept('faith', 'wierze')|E]."
 fanatic_attribute.battle_message_tt: "[acclaimed_knight.GetName] wyróżnia się, wojując przeciwko złej wierze"
 stalwart_attribute.unlock_tt: "Którekolwiek z poniższych:\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] to [GetTrait('honest').GetName( GetNullCharacter )|l].\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] to [GetTrait('just').GetName( GetNullCharacter )|l].\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] to [GetTrait('patient').GetName( GetNullCharacter )|l].\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] to [GetTrait('unyielding_defender').GetName( GetNullCharacter )|l].\n$EFFECT_LIST_BULLET$Można uzyskać dostęp, kiedy [acclaimed_knight|El] [Concept('traveling', 'podróżuje')|E] w #high twojej#! [Concept('entourage', 'świcie')|E] przez [provinces|El] o wysokim poziomie [Concept('travel_danger', 'zagrożenia')|E]."
 accolade_stalwart_unlock.t: "Podróżowanie przez niebezpieczne ziemie inspiruje osobę znaną jako [accolade_knight.GetName]"
 accolade_stalwart_unlock.tt: "[accolade_knight.GetName] może zdobyć [acclaimed|El] i otrzymać wyróżnienie „[GetAccoladeType('stalwart_attribute').GetName]”"
 scoundrel_attribute.unlock_tt: "Którekolwiek z poniższych:\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] to [GetTrait('ambitious').GetName( GetNullCharacter )|l].\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] to [GetTrait('gregarious').GetName( GetNullCharacter )|l].\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] to [GetTrait('greedy').GetName( GetNullCharacter )|l].\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] to [GetTrait('deceitful').GetName( GetNullCharacter )|l].\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] to [GetTrait('adventurer').GetName( GetNullCharacter )|l].\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] może uzyskać dostęp po tym, jak #high ukończysz#! jakikolwiek [hostile_scheme|El] inny niż [scheme|El] „[GetScheme('murder').GetTypeName]”."
 accolade_scoundrel_unlock.t: "Spiski wrogie inspirują osobę znaną jako [accolade_knight.GetName]"
 accolade_scoundrel_unlock.tt: "[accolade_knight.GetName] może zdobyć [acclaimed|El] i otrzymać wyróżnienie „[GetAccoladeType('scoundrel_attribute').GetName]”"
 valiant_attribute.unlock_tt: "Którekolwiek z poniższych:\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] to [GetTrait('brave').GetName( GetNullCharacter )|l].\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] to [GetTrait('berserker').GetName( GetNullCharacter )|l].\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] to [GetTrait('reckless').GetName( GetNullCharacter )|l].\n$EFFECT_LIST_BULLET$Można uzyskać dostęp, kiedy [acclaimed_knight|El] jest częścią [Concept('army', 'armii')|E], która prowadzi [battles|E] przeciwko silniejszemu liczebnie wrogowi."
 valiant_attribute.battle_message_tt: "[acclaimed_knight.GetName] wyróżnia się, wojując przeciwko przeważającym liczebnie siłom wroga"
 #Skilled attribute unlocks
 politicker_attribute.unlock_tt: "Którekolwiek z poniższych:\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] to [GetTrait('diplomat').GetName( GetNullCharacter )|l].\n$EFFECT_LIST_BULLET$Wartość [Concept('diplomacy_skill', 'umiejętności dyplomacji')|E] [acclaimed_knight_possessive|El] wynosi [EmptyScope.ScriptValue('skill_accolade_qualifying_value')|V0] pkt.\n$EFFECT_LIST_BULLET$Można uzyskać dostęp, kiedy [acclaimed_knight|El] weźmie udział w [Concept('activity', 'aktywności')|E]: [GetActivityType('activity_coronation').GetName|l] lub [GetActivityType('activity_wedding').GetName|l]."
 accolade_politicker_unlock.t_coronation: "Polityka koronacyjna inspiruje osobę znaną jako [accolade_knight.GetName]"
 accolade_politicker_unlock.t_wedding: "Polityka zaślubin inspiruje osobę znaną jako [accolade_knight.GetName]"
 accolade_politicker_unlock.tt: "[accolade_knight.GetName] może zdobyć [acclaimed|El] i otrzymać wyróżnienie „[GetAccoladeType('politicker_attribute').GetName]”"
 reeve_attribute.unlock_tt: "Którekolwiek z poniższych:\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] to [GetTrait('administrator').GetName( GetNullCharacter )|l].\n$EFFECT_LIST_BULLET$Wartość [Concept('stewardship_skill', 'umiejętności zarządzania')|E] [acclaimed_knight_possessive|El] wynosi [EmptyScope.ScriptValue('skill_accolade_qualifying_value')|V0] pkt lub więcej.\n$EFFECT_LIST_BULLET$Można uzyskać dostęp, kiedy [acclaimed_knight|El] weźmie udział w [Concept('activity', 'aktywności')|E]: [GetActivityType('activity_tour').GetName|l]."
 accolade_reeve_unlock.t: "Wielki objazd ziem inspiruje osobę znaną jako [accolade_knight.GetName]"
 accolade_reeve_unlock.tt: "[accolade_knight.GetName] może zdobyć [acclaimed|El] i otrzymać wyróżnienie „[GetAccoladeType('reeve_attribute').GetName]”"
 manipulator_attribute.unlock_tt: "Którekolwiek z poniższych:\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] to [GetTrait('schemer').GetName( GetNullCharacter )|l].\n$EFFECT_LIST_BULLET$Wartość [Concept('intrigue_skill', 'umiejętności intrygi')|E] [acclaimed_knight_possessive|El] wynosi [EmptyScope.ScriptValue('skill_accolade_qualifying_value')|V0] pkt lub więcej.\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] może uzyskać dostęp po tym, jak #high ukończysz#! [scheme|El] „[GetScheme('murder').GetTypeName]”."
 accolade_manipulator_unlock.t: "Morderczy spisek inspiruje osobę znaną jako [accolade_knight.GetName]"
