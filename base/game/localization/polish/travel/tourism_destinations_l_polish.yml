l_polish:
 building_holy_site_mahabodhi_temple_destination_desc: "Wędrując przez uświęcone tereny budowli znanej jako [GetBuilding('holy_site_mahabodhi_temple_01').GetName|l], nie mogę wyjść spod wrażenia panującego tam spokoju. W miejscu, w którym Budda osiągnął oświecenie pod drzewem Bodhi, panuje idealna równowaga. Misterne rzeźby przedstawiające jego podróż ku oświeceniu przypominają mi o duchowej ścieżce, którą wszyscy musimy podążać."
 building_sanchi_stupa_destination_desc: "Kopuła budowli, którą jest [GetBuilding('sanchi_stupa_01').GetName|l], stanowi główny punkt orientacyjny na wzgórzu obok osady Sańći. Spotykam tu wielu pielgrzymów i mnichów, z których większość twierdzi, że kompleks świątynny funkcjonuje od tysięcy lat."
 building_boudhanath_destination_desc: "Pod ogromną kopułą stupy [GetBuilding('boudhanath_01').GetName] przechowywane są szczątki i relikwie wielu historycznych buddów. Jest to również zdecydowanie najwyższy budynek w Katmandu. Budowla góruje nad resztą miasta, oddając ogromne znaczenie buddyzmu w jego historii. Widzę w nim wielu podróżników, pielgrzymów i kupców, którzy przybywają tu odpocząć i oddać się modlitwie."
 building_mont_st_michel_destination_desc: "Zbliżywszy się do wyspy pływowej [GetBuilding('mont_st_michel_01').GetName] podczas odpływu, można dostrzec jej wspaniały kościół i mury górujące nad horyzontem, przywodzące na myśl panowanie Boga nad niebem i ziemią. Miejsce to jest zarówno ważnym ośrodkiem sakralnym, jak i twierdzą obronną dla miejscowych mnichów i rybaków."
 building_holy_site_st_peters_basilica_destination_desc: "[GetBuilding('holy_site_st_peters_basilica_01').GetName], wznosząca się nad Wzgórzem Watykańskim w miejscu grobowca św. Piotra, przypomina o potędze zachodniego Kościoła i jego papieży. W tej części wiecznego miasta można spotkać księży i zakonnice, a także żebraków liczących na datki od licznych pielgrzymów."
 building_holy_site_imam_ali_mosque_destination_desc: "Kiedy wchodzę do miasta, złota kopuła budowli znanej jako [GetBuilding('holy_site_imam_ali_mosque_01').GetName|l] jaśnieje niczym latarnia morska. To święte miejsce, w którym spoczywa imam [ali.GetFirstName], jest wypełnione pielgrzymami oddającymi [ali.Custom('PL_mu_jej')] hołd. Powietrze gęstnieje od pełnych uwielbienia szeptów, a misterna kaligrafia na ścianach mówi o głębokiej czci dla boskości."
 building_yazd_mosque_destination_desc: "Spoglądam na minarety nad wielką bramą miejsca, którym jest [GetBuilding('yazd_mosque_01').GetName], i czuję ogromny podziw. W drodze tutaj pewien miejscowy przypomniał mi, że miasto to od niepamiętnych czasów było ośrodkiem religijnym. Dzisiaj ulice nadal pełne są pielgrzymów i kapłanów – wiernych, którzy przybyli z daleka, aby odwiedzić to niezwykłe miejsce."
 building_holy_site_great_mosque_of_mecca_destination_desc: "Gdy patrzę na [GetBuilding('holy_site_great_mosque_of_mecca_01').GetName], moje serce wypełnia podziw. Widok Kaaby, świętego sanktuarium istniejącego od niepamiętnych czasów, to świadectwo niezmienności religii, którą jest [GetReligionByKey('islam_religion').GetName|l]. Tłumy pielgrzymów, z których każdy pragnie zbliżyć się ku boskości, w wyrazie uwielbienia poruszają się jak jedna istota."
 building_holy_site_great_mosque_of_cordoba_destination_desc: "Gdy wędruję przez rozległe sale budowli znanej jako [GetBuilding('holy_site_great_mosque_of_cordoba_01').GetName], podziwiam las kolumn oraz czerwonych i białych łuków, prawdziwy cud architektonicznej pomysłowości. [GetReligionByKey('islam_religion').GetName] i kultura [visigothic_culture.GetName|l] łączą się tu, świadcząc o bogactwie historii i kultury tych ziem."
 building_holy_site_great_mosque_of_djenne_destination_desc: "[GetBuilding('holy_site_great_mosque_of_djenne_01').GetName] majestatycznie wznoszący się z serca miasta to widok godny podziwu. Jego unikatowa konstrukcja z suszonej na słońcu cegły odzwierciedla krajobraz Sahelu, a do tego jest dumnym symbolem wiary i umiejętności jej budowniczych."
 building_holy_site_great_mosque_of_samarra_destination_desc: "Staję przed budowlą znaną jako [GetBuilding('holy_site_great_mosque_of_samarra_01').GetName] i podziwiam, jak nad krajobrazem góruje jej wyjątkowy spiralny minaret. Wyjątkowy styl architektoniczny tego obiektu wyróżnia jako istny klejnot świata, który wyznaje [GetReligionByKey('islam_religion').GetName|l]."
 building_holy_site_cologne_cathedral_destination_desc: "Podchodzę do budowli znanej jako [GetBuilding('holy_site_cologne_cathedral_01').GetName|l]. Jej niedokończone wieże i trwająca wciąż budowa są świadectwem ambicji minionej epoki. Pośród rusztowań i kamieni dostrzegam nabierającą kształtu wizję wielkości, symbol wiary, który przetrwa stulecia."
 building_holy_site_canterbury_cathedral_destination_desc: "Spacerując po świętych korytarzach budowli znanej jako [GetBuilding('holy_site_canterbury_cathedral_01').GetName|l], czuję wokół ciężar historii. Ta podwalina wiary chrześcijańskiej jest przesiąknięta opowieściami o męczennikach i świętych. Misterne rzeźby i uroczysta atmosfera wciąż odbijają echo modlitw niezliczonych pielgrzymów."
 building_holy_site_prophetic_mosque_destination_desc: "[GetBuilding('holy_site_prophetic_mosque_01').GetName] ze swoimi zacisznymi dziedzińcami i eleganckimi łukami jest miejscem o głębokim znaczeniu duchowym. Tu, gdzie prorok Mahomet przechadzał się i wygłaszał kazania, powietrze wydaje się być wypełnione spokojem. Wierni gromadzą się nabożnie, a ich modlitwy szemrzą cicho pod rozległym niebem."
 building_doges_palace_destination_desc: "Majestat budowli znanej jako [GetBuilding('doges_palace_01').GetName|l] pozbawia mnie słów. Jej ozdobna fasada i wystawne komnaty są symbolem potęgi i dobrobytu Wenecji. Misterne dzieła sztuki i luksusowy wystrój świadczą o potędze i bogactwie jej przywódców."
 building_walls_of_genoa_destination_desc: "Ogromne [GetBuilding('walls_of_genoa_01').GetName|l], potężne bariery chroniące miasto, są przykładem biegłości w sztuce wojennej i zmysłu strategicznego jego przywódców."
 building_visby_ringmur_destination_desc: "Otaczające miasto [GetBuilding('visby_ringmur_01').GetName|l] to kamienny dowód jego znaczenia w handlu i obronie. Spacerując wzdłuż tych murów, podziwiam umiejętności budowniczych i dalekowzroczność przywódców, którzy zapewnili swoim ludziom bezpieczeństwo i dobrobyt."
 building_walls_of_benin_destination_desc: "Potężne [GetBuilding('walls_of_benin_01').GetName|l] rozciągają się daleko, jak okiem sięgnąć, i stanowią monumentalny wysiłek miejscowej ludności. Ta masywna budowla ziemna, większa niż wiele innych, które dane mi było oglądać, stoi jako dumny symbol siły i pomysłowości mieszkańców tej ziemi."
 building_theodosian_walls_destination_desc: "Imponujące [GetBuilding('theodosian_walls_01').GetName] chroniące Konstantynopol to cud inżynierii. Ich potężna konstrukcja i wielowarstwowość świadczą o tym, że miasto jest przygotowane na każde oblężenie. Przezorność w konstruowaniu takich zabezpieczeń jest oczywista."
 building_aurelian_walls_destination_desc: "Otaczający wieczne miasto [GetBuilding('aurelian_walls_01').GetName] jest odporny na upływ czasu i wszelkie zawieruchy. Te rozbudowywane i wzmacniane przez lata starożytne fortyfikacje kryją w sobie bogatą i złożoną historię. To bastion trwałego dziedzictwa Rzymu."
 building_the_colosseum_destination_desc: "Przede mną leży [GetBuilding('the_colosseum_01').GetName], olbrzymia ruina z minionej epoki. Niegdyś miejsce widowisk i chwały, teraz stoi częściowo rozsypane, przypominając o potędze i zasięgu imperium znanego jako [GetTitleByKey('h_roman_empire').GetNameNoTier], rozbrzmiewając opowieściami o przeszłości przesiąkniętej zarówno wielkością, jak i konfliktami."
 building_iron_pillar_of_delhi_destination_desc: "[GetBuilding('iron_pillar_of_delhi_01').GetName] stawia czoło zniszczeniom dokonanym przez czas, a jej odporna na rdzę struktura to prawdziwy cud metalurgii. Została wzniesiona na cześć króla Ćandragupty II i stanowi świadectwo zaawansowanej wiedzy i umiejętności rzemieślników jego czasów."
 building_iron_pillar_of_dhar_destination_desc: "[GetBuilding('iron_pillar_of_dhar_01').GetName] to mniej znana, ale równie fascynująca siostra swojej odpowiedniczki w Delhi. Stanowi świadectwo pomysłowości starożytnych rzemieślników i ciekawostkę dla wielu podróżnych i uczonych."
 building_the_pyramids_destination_desc: "Starożytne i majestatyczne [GetBuilding('the_pyramids_01').GetName|l] wyłaniają się z piasków, jak miało to miejsce przez całe tysiąclecia. Te grobowce faraonów, obecnie pozbawione polerowanego wapienia, wciąż budzą podziw i szacunek, pozostając wspomnieniem wielkiej niegdyś cywilizacji."
 building_stonehenge_destination_desc: "Budowla znana jako [GetBuilding('stonehenge_01').GetName] stoi na równinie Salisbury, a odpowiedź na tajemnicę jej przeznaczenia przepadła wraz z upływającym czasem. Te wielkie kamienie ułożone w skomplikowaną formację świadczą o starożytnej wiedzy i połączeniu z boskością, które miało miejsce na długo przed naszą epoką."
 building_offas_dyke_destination_desc: "Przemierzając tutejszy krajobraz, zobaczyć można [GetBuilding('offas_dyke_01').GetName] – niezwykły szaniec, granicę stworzoną w czasach, gdy rządził król [offa.GetFirstName]. Ta olbrzymia przegroda, obecnie częściowo zniszczona, ale wciąż dostrzegalna, wyznacza starożytną linię obrony i demarkacji, wskazując na toczoną wówczas walkę o władzę."
 building_hadrians_wall_destination_desc: "Idąc wzdłuż pozostałości budowli znanej jako [GetBuilding('hadrians_wall_01').GetName], rozmyślam o potędze przodków, których wychowała kultura [roman_culture.GetName|l]. Ta potężna niegdyś przeszkoda, a obecnie kupa gruzu, służyła za północną granicę. Stanowi teraz dowód wpływów i granic imperium."
 building_petra_destination_desc: "Starożytne miasto [GetBuilding('petra_01').GetName] wyrzeźbione w różowo-czerwonych klifach to niesamowity widok. Jego słynna część, Al-Chazna, straciła na swojej dawnej świetności, lecz wciąż stanowi cud inżynierii i sztuki, odzwierciedlając dobrobyt minionej epoki."
 building_buddhas_of_bamian_destination_desc: "Kolosalne [GetBuilding('buddhas_of_bamian_01').GetName|l] wyrzeźbione w ścianie klifu stanowią ciche świadectwo religijnej i kulturowej historii tej ziemi. Pomimo upływu czasu w tych wspaniałych rzeźbach wciąż widoczne są kunszt i oddanie starożytnych rzemieślników."
 building_alhambra_destination_desc: "[GetBuilding('alhambra_01').GetName] ze swoją misterną architekturą mauretańską i bujnymi ogrodami to prawdziwy klejnot Granady. Zespół pałacowy, połączenie nieskazitelnej formy i doskonałej funkcjonalności, odzwierciedla wyrafinowany gust i potęgę jego władców."
 building_citadel_of_aleppo_destination_desc: "Imponująca [GetBuilding('citadel_of_aleppo_01').GetName|l], forteca na szczycie wzgórza, dominuje nad całym miastem. Jej masywne mury i solidne konstrukcje, które ewoluowały na przestrzeni wieków, świadczą o niezliczonych oblężeniach i odporności tego starożytnego miasta."
 building_house_of_wisdom_destination_desc: "[GetBuilding('house_of_wisdom_01').GetName] w Bagdadzie stanowi synonim wiedzy i nauki. Ta wspaniała biblioteka i centrum nauki – miejsce założone przez kalifów Abbasydów – przyciąga uczonych ze wszystkich krajów, którzy chętnie zagłębiają się w jej rozległą kolekcję tekstów i dyskursów."
 building_the_tower_of_london_destination_desc: "[GetBuilding('the_tower_of_london_01').GetName] ze swoją imponującą strukturą służy zarówno jako pałac królewski, jak i więzienie. Powietrze w środku przepełnia ciężar historii – wyrytych w kamieniach opowieści o królach, królowych i jeńcach."
 building_london_bridge_destination_desc: "[GetBuilding('london_bridge_01').GetName] z solidnymi łukami i gwarnymi sklepami rozciąga się nad potężną Tamizą jak linia życia biegnąca przez serce Londynu. Służy nie tylko jako przeprawa, ale także jako tętniący życiem ośrodek handlu i aktywności, gdzie spotykają się kupcy, podróżni i mieszkańcy miasta."
 building_notre_dame_destination_desc: "Majestatyczna [GetBuilding('notre_dame_01').GetName|l] ze strzelistymi iglicami i okazałą fasadą stanowi arcydzieło architektury gotyckiej. Wewnątrz powietrze rozbrzmiewa echem pobożności, a każdy witraż i rzeźba opowiadają świętą historię."
 building_brihadeeswarar_temple_destination_desc: "[GetBuilding('brihadeeswarar_temple_01').GetName], monumentalna granitowa budowla, góruje majestatycznie nad Tańdźawurem. Jej wysoka wimana i misterne płaskorzeźby mówią o wielkości dynastii [chola_dynasty.GetName] z czasów, gdy sztuka i oddanie zyskały wzniosły sposób ekspresji."
 building_shwedagon_pagoda_destination_desc: "[GetBuilding('shwedagon_pagoda_01').GetName] ze złotą iglicą sięgającą nieba jest cudem wartym zobaczenia. To święte miejsce, w którym podobno znajdują się relikwie Buddy, jest miejscem pielgrzymek i oddania stanowiącym duchowe serce Birmy."
 building_ananda_temple_destination_desc: "[GetBuilding('ananda_temple_01').GetName] z lśniącą sikharą i wspaniałymi tarasami to świadectwo kunsztu architektonicznego dynastii [pagan_dynasty.GetName]. Ta ozdobiona misternymi rzeźbami i malowidłami ściennymi niezwykła świątynia jest symbolem buddyzmu therewady."
 building_the_friday_mosque_destination_desc: "[GetBuilding('the_friday_mosque_01').GetName] o imponującej strukturze i eleganckich minaretach to centralne miejsce kultu. Co tydzień staje się ośrodkiem aktywności i modlitwy, gdzie wierni gromadzą się licznie, potwierdzając siłę i jedność społeczności wiary, którą jest [GetReligionByKey('islam_religion').GetName|l]."
 building_khajuraho_destination_desc: "[GetBuilding('khajuraho_01').GetName] o wykwintnych i odważnych rzeźbach to celebracja życia, miłości i czci. Te architektoniczne cuda zbudowane przez władców z rodu Ćandelów stanowią świadectwo artystycznej i duchowej wizji tamtych czasów."
 building_palace_of_aachen_destination_desc: "[GetBuilding('palace_of_aachen_01').GetName] to dziedzictwo osoby znanej jako [charlemagne.GetFirstNameNicknamed]. Wielka kaplica o ośmiokątnym kształcie i kopulastym dachu odzwierciedla ambicję cesarza, by [GetTitleByKey('h_roman_empire').GetNameNoTier] odzyskało dawną chwałę."
 building_hagia_sophia_christian_destination_desc: "Gdy wędruję po wspaniałej budowli znanej jako [GetBuilding('hagia_sophia_01').GetName], jej okazałość napawa mnie zachwytem. Ogromna kopuła wydaje się dotykać niebios, a misterne mozaiki mienią się w świetle. Czuję duchową głębię tego miejsca rezonującą z wiekami chrześcijańskiego kultu i bizantyjskim majestatem."
 building_hagia_sophia_islamic_destination_desc: "Wchodząc do wielkiej budowli znanej jako [GetBuilding('hagia_sophia_02').GetName|l], czuję zachwyt przemianą, jaka tam zaszła. Strzeliste minarety sięgają nieba, stanowiąc dopełnienie majestatycznej kopuły. Wewnątrz islamska kaligrafia i ornamentyka harmonijnie łączą się z architekturą bizantyjską, tworząc atmosferę głębokiej nabożności i kulturowej fuzji."
 building_dome_of_the_rock_destination_desc: "[GetBuilding('dome_of_the_rock_01').GetName] mieniąca się w słońcu złotem to obiekt powszechnie poważany w Jerozolimie. Ta świątynia, w której znajduje się święty kamień, jest miejscem o głębokim znaczeniu duchowym, czczonym zarówno przez muzułmanów, jak i żydów."
 building_temple_in_jerusalem_destination_desc: "Pozostałości budowli znanej jako [GetBuilding('temple_in_jerusalem_01').GetName], świętej zarówno dla żydów, jak i chrześcijan, przywołują głębokie poczucie przeszłości i duchowości. Ściana Płaczu – czyli wszystko, co pozostało z tej niegdyś wspaniałej świątyni – jest przejmującym przypomnieniem burzliwej przeszłości miasta."
 building_rammelsberg_mines_destination_desc: "[GetBuilding('rammelsberg_mines_01').GetName] to ośrodek aktywności zagłębiający się w ziemię w poszukiwaniu cennych rud. Pomysłowość i wytrwałość tutejszych górników są kluczowe dla dobrobytu i rzemiosła regionu."
 building_guiyang_mines_destination_desc: "[GetBuilding('guiyang_mines_01').GetName] to miejsce, które przez wieki odciskało wyraźny ślad na osadnictwie w tym regionie. Monety wybite tutaj są w obiegu w całych Chinach od czasów Zachodniej Dynastii Hanów."
 building_kaibao_mines_destination_desc: "[GetBuilding('kaibao_mines_01').GetName] to miejsce, które od ponad tysiąca lat jest źródłem srebra zasilającego skarbiec cesarski, co widać wyraźnie podczas podróży po tym regionie. Srebro i monety przyciągają bogactwo. Tutaj kupcy i rzemieślnicy prosperują dzięki temu, co górnicy dostarczają do odlewni."
 building_zijinshan_mines_destination_desc: "Gdyby nie [GetBuilding('zijinshan_mines_01').GetName|l] i złoto, które stamtąd pochodzi, region ten prawdopodobnie nie byłby tak rozwinięty. Osada ta jest wyraźnie ukształtowana przez przemysł wydobywczy oraz wielu inżynierów i rzemieślników, których sprowadził on z okolicznych regionów."
 building_liangzhe_mines_destination_desc: "[GetBuilding('liangzhe_mines_01').GetName] i handel srebrem sprawiają, że ten region tak dobrze prosperuje. Za sprawą srebra przybyli tu rzemieślnicy i górnicy, a wybite monety przyciągają licznych handlarzy."
 building_hanxing_mines_destination_desc: "[GetBuilding('hanxing_mines_01').GetName]."
 building_kutna_hora_mines_destination_desc: "[GetBuilding('kutna_hora_mines_01').GetName] to ważne źródło srebra stymulującego handel i gospodarkę walutową. Sieć tuneli i szybów wykopanych przez zdeterminowanych górników jest przykładem pomysłowości i pracy, które napędzają gospodarkę regionu."
 building_kremnica_mines_destination_desc: "[GetBuilding('kremnica_mines_01').GetName|l] słyną ze złóż złota. Wydobycie tego cennego metalu, symbolu bogactwa i władzy, pozwala na bicie monet i dodaje splendoru dworom władców."
 building_baofeng_mines_destination_desc: "Górnictwo stanowi główne źródło zatrudnienia w tym regionie, a większość budowli mieszkalnych skupia się w pobliżu miejsca znanego jako [GetBuilding('baofeng_mines_01').GetName|l]. Przy ulicach biegnących wzdłuż rzeki działają napędzane wodą warsztaty zajmujące się obróbką srebra."
 building_jiaodong_mines_destination_desc: "[GetBuilding('jiaodong_mines_01').GetName] to miejsce często nazywane Złotym Miastem Niebios. Powszechnie znane jest z ogromnych zasobów złota, które się tam wydobywa. Samo miasto stało się ważnym ośrodkiem handlowym skupiającym się na obróbce i odsprzedaży tego cennego metalu."
 building_chihu_mines_destination_desc: "Podobno [GetBuilding('chihu_mines_01').GetName|l] to miejsce, które działa od czasów trzech królestw i od ponad tysiąca lat dostarcza chińskim dynastiom żelazo i broń. W samym mieście widać to na każdym kroku – ulice pełne są mennic i kuźni, a na długo przed dotarciem do samej osady można natknąć się na wozy załadowane rudą żelaza."
 building_zigong_mines_destination_desc: "Od tysięcy lat [GetBuilding('zigong_mines_01').GetName|l] to miejsce, które zaopatruje Chińczyków w sól. Krajobraz miasta zdominowały charakterystyczne odwierty, miejsca odparowywania i inna infrastruktura służąca do wydobywania soli."
 building_falun_mines_destination_desc: "[GetBuilding('falun_mines_01').GetName] to labirynt tuneli wyrytych w poszukiwaniu miedzi. Pochodzący z kopalni żywy, czerwony pigment – czerwień faluńska – zdobi wiele tutejszych budynków i stanowi przypomnienie znaczenia kopalni dla lokalnej społeczności."
 building_konasamudram_mines_destination_desc: "[GetBuilding('konasamudram_mines_01').GetName] to miejsce znane z bogatej w diamenty ziemi. Blask tych drogocennych kamieni odzwierciedla nie tylko bogactwo, jakie przynoszą, ale także umiejętności i trud tych, którzy je wydobywają."
 building_dean_mines_destination_desc: "[GetBuilding('dean_mines_01').GetName] to znaczące źródło żelaza. W okolicy nieustannie słychać brzęk młotów, a żar w piecach nie gaśnie, ponieważ górnicy i kowale pracują niestrudzenie, przekuwając materiały w sprzęt na potrzeby wojska i budownictwa."
 building_phnom_dek_mines_destination_desc: "[GetBuilding('phnom_dek_mines_01').GetName] – tak zwana Żelazna Góra – to bogate źródło żelaza w tym regionie. Każdy, kto zbliża się do miasta, mija po drodze wypełnione wozy licznie zmierzające w kierunku rozciągających się wokół Angkoru nizin."
 building_schwaz_mines_destination_desc: "[GetBuilding('schwaz_mines_01').GetName] to zagłębie produkcji srebra. Bogactwo wydobywane z tych głębin przekształciło miasto w kwitnący ośrodek handlu, przyciągając kupców i rzemieślników z wielu zakątków świata."
 building_argentiera_mines_destination_desc: "[GetBuilding('argentiera_mines_01').GetName] to miejsce, które słynie z bogatych żył ołowiu i srebra. Trudne warunki, w jakich pracują tu górnicy, uwydatniają nieustanną pogoń za tymi cennymi zasobami."
 building_srebrenica_mines_destination_desc: "[GetBuilding('srebrenica_mines_01').GetName] to kluczowe źródło srebra. Ciągła praca drążących ziemię górników napędza dobrobyt regionu, czyniąc go ważnym ośrodkiem handlu."
 building_kollur_mines_destination_desc: "[GetBuilding('kollur_mines_01').GetName] położone w gęstych lasach tej okolicy słyną z wyjątkowych diamentów. Klejnoty z tych kopalni nie tylko zdobią korony królów, ale także symbolizują bogactwo ziem i umiejętności tych, którzy je wydobywają."
 building_siderokausia_mines_destination_desc: "[GetBuilding('siderokausia_mines_01').GetName] to miejsce, które tętni życiem, a prace tutaj skupiają się na wydobyciu żelaza niezbędnego dla potrzeb regionu. Niestrudzeni górnicy z olbrzymią determinacją dążą do wykorzystania zasobów ziemi."
 building_zawar_mines_destination_desc: "[GetBuilding('zawar_mines_01').GetName] to starożytne źródło cynku i ołowiu. Pomysłowość górników, którzy schodzą w podziemia, by wydobywać te metale, miała kluczowe znaczenie dla rozwoju regionu."
 building_pansjhir_mines_destination_desc: "[GetBuilding('pansjhir_mines_01').GetName] to miejsce znane z cennego lazurytu. Ten intensywnie niebieski kamień poszukiwany ze względu na swoje piękno i rzadkość jest skarbem tych ziem pożądanym zarówno przez rzemieślników, jak i handlarzy."
 building_nishapur_mines_destination_desc: "[GetBuilding('nishapur_mines_01').GetName] słyną z przepięknych turkusów. Ten jaskrawy kamień szlachetny jest nieoceniony w produkcji biżuterii i dekoracji oraz odzwierciedla bogactwo kultury i rzemiosła, którym cechuje się kultura [persian_culture.GetName|l]."
 building_ratnapura_mines_destination_desc: "[GetBuilding('ratnapura_mines_01').GetName] mienią się obietnicą szafirów i rubinów. Te głęboko zakopane w ziemi klejnoty są poszukiwane na całym świecie, co świadczy o bogactwie tych ziem."
 building_mogok_mines_destination_desc: "[GetBuilding('ratnapura_mines_01').GetName] są pełne mieniących się szafirów i rubinów. Tych skrytych w głębi ziemi klejnotów pożąda cały świat – podobno nie ma takiego kamienia, który dorównałby im blaskiem."
 building_allaq_mines_destination_desc: "Położone w górach [GetBuilding('allaq_mines_01').GetName|l] są najważniejszym źródłem miedzi. Dźwięk kilofów uderzających o skały rozbrzmiewa w powietrzu, gdy górnicy pracują niestrudzenie, aby zapewnić dostawy tego niezbędnego metalu."
 building_takkeda_mines_destination_desc: "Tętniące życiem [GetBuilding('takkeda_mines_01').GetName|l] słyną z bogatych żył srebra. Wydobyty tutaj metal nie tylko napędza lokalne rzemiosło, ale także znacząco zasila skarbiec regionu."
 building_turda_mines_destination_desc: "[GetBuilding('turda_mines_01').GetName] są kluczowym źródłem soli. To „białe złoto”, niezbędne zarówno do konserwacji, jak i handlu, uczyniło z kopalni ważny ośrodek gospodarczy."
 building_taghaza_mines_destination_desc: "W sercu Sahary leżą [GetBuilding('taghaza_mines_01').GetName|l] – to surowe, ale kluczowe źródło soli. Karawany pokonują olbrzymie odległości do tego odludnego miejsca, by zdobyć surowiec, który w tej okolicy jest cenniejszy niż złoto."
 building_phocaea_mines_destination_desc: "[GetBuilding('phocaea_mines_01').GetName] słyną z ałunu. Proces wydobywania tego ważnego minerału używanego w procesie farbowania i garbowania skór wymaga umiejętności i wiedzy przekazywanej z pokolenia na pokolenie."
 building_verespatak_mines_destination_desc: "[GetBuilding('verespatak_mines_01').GetName] to bogate źródło złota. Jego obfitość zamieniła ten obszar w tętniący życiem ośrodek działalności górniczej, przyciągając poszukiwaczy przygód i kupców zwabionych pokusą bogactwa."
 building_suvarnadvipa_mines_destination_desc: "[GetBuilding('suvarnadvipa_mines_01').GetName], położone u podnóża gór Barisan, dają robotnikom wymagającą, ale satysfakcjonującą pracę, a jednocześnie przyczyniają się do wzbogacenia lokalnych rzemieślników i kupców."
 building_khetri_mines_destination_desc: "[GetBuilding('khetri_mines_01').GetName] są znane ze znacznych złóż miedzi. Wytężone wysiłki miejscowych górników i kowali, którzy wydobywają i przetwarzają ten podstawowy metal, zapewniają źródło utrzymania regionu."
 building_trepca_mines_destination_desc: "[GetBuilding('trepca_mines_01').GetName] to znaczące źródło ołowiu i srebra. Miejscowa społeczność górnicza, biegła w poruszaniu się po trudnym terenie, odgrywa kluczową rolę w dobrobycie tego obszaru."
 building_rudnik_mines_destination_desc: "[GetBuilding('rudnik_mines_01').GetName] to gwarne miejsce, gdzie wydobywa się cenne srebro. Pracowici miejscowi górnicy i bogactwo, które zapewniają, uczyniły ten region ośrodkiem aktywności gospodarczej i rozwoju."
 building_ijil_mines_destination_desc: "Ogromne [GetBuilding('ijil_mines_01').GetName|l] to miejsce bogate w złoża soli. Wykwalifikowani górnicy sprawili, że obszar ten ma kluczowe znaczenie dla handlu i rozwoju regionu."
 building_cevennes_mines_destination_desc: "[GetBuilding('cevennes_mines_01').GetName] wraz z miejscowymi kopalniami to kluczowe źródło srebra. Wytężona praca górników i wynikające z niej zyski odgrywają zasadniczą rolę w zapewnieniu środków do życia w regionie."
 building_hetian_mines_destination_desc: "[GetBuilding('hetian_mines_01').GetName] wraz z miejscowymi kopalniami to źródło najbardziej cenionego jadeitu wszech czasów. Tutejsza gospodarka silnie polega na handlu tym minerałem, a miasto jest pełne górników i rzemieślników specjalizujących się w wyrabianiu jadeitowych dzieł sztuki."
 building_xiuyan_mines_destination_desc: "Jadeit wydobywany w miejscu znanym jako [GetBuilding('xiuyan_mines_01').GetName|l] od wieków zdobi wytwory rzemiosła artystycznego swoim charakterystycznym zielonym odcieniem."
 building_itoigawa_mines_destination_desc: "Jadeit wydobywany w miejscu znanym jako [GetBuilding('itoigawa_mines_01').GetName|l], wykorzystywany przez lokalnych mnichów i mistyków, cieszy się uznaniem od bardzo dawna. Jego piękno niezmiennie przyciągało kupców z całej wyspy, zaopatrujących tamtejszych rzemieślników."
 building_lantian_mines_destination_desc: "[GetBuilding('lantian_mines_01').GetName] były ważnym źródłem jadeitu, przez co ​​otaczające je wzgórza zachwycały rzeźbionymi kamieniołomami i mieniącymi się w oddali zielonymi kamieniami."
 building_fengtian_mines_destination_desc: "Już od starożytności górnicy z miejsca znanego jako [GetBuilding('fengtian_mines_01').GetName|l] tłukli kilofami skały, by poszerzać wyrobiska i gromadzić jadeit do inspekcji. Owoce ich pracy pozwalały kupcom z wyspy napełniać szkatuły złotem."
 building_hpakant_mines_destination_desc: "Ukryte wśród lasów i szerokich rzek [GetBuilding('hpakant_mines_01').GetName|l] są prężnie rozwijającym się źródłem jadeitu dla lokalnych rzemieślników. Jego wydobycie pozwala im lepiej wyrażać swoją kulturę."
 building_dushan_mines_destination_desc: "[GetBuilding('dushan_mines_01').GetName] to dominujący obiekt w tym regionie gospodarczym. Tutejszy jadeit jest jednym z najbardziej cenionych – mówi się, że żaden inny nie dorównuje mu bogactwem koloru."
 building_mali_mines_destination_desc: "Na rozległych terytoriach Mali znanych jako [GetBuilding('mali_mines_01').GetName|l] można znaleźć drogocenne rudy – źródło wielkiego bogactwa i dumy. Wykwalifikowani górnicy i rzemieślnicy z tego regionu od dawna wykorzystują te zasoby, wspierając lokalną gospodarkę i handel."
 building_al_azhar_university_destination_desc: "[GetBuilding('al_azhar_university').GetName] w Kairze to symbol nauki w świecie religii, którą jest [GetReligionByKey('islam_religion').GetName|l]. Uświęcone sale tej instytucji wykształciły całe pokolenia uczonych, wnosząc wielki wkład w intelektualne i kulturalne bogactwo regionu."
 building_sankore_university_destination_desc: "W legendarnym mieście Timbuktu wznosi się [GetBuilding('sankore_university').GetName] – ośrodek nauki i erudycji. Uczeni i studenci gromadzą się tam, zagłębiając się w badanie różnorodnych zagadnień, od teologii po astronomię."
 building_siena_university_destination_desc: "Uniwersytet w Sienie, położony w sercu Toskanii i reprezentowany przez uczelnię znaną jako [GetBuilding('siena_university').GetName], to ośrodek edukacji i rozważań. Jego znani wykładowcy i gorliwi studenci tworzą tętniącą życiem społeczność akademicką, odgrywając kluczową rolę w życiu intelektualnym lokalnej ludności."
 building_nalanda_university_destination_desc: "[GetBuilding('nalanda_university').GetName] to wielki ośrodek nauki wedyjskiej. Ta starożytna instytucja przyciągała uczonych z całej Azji, a jej dziedzictwo było cenione przez miejscową ludność, która czciła ją jako symbol swojej spuścizny historycznej i kulturowej."
 building_hotin_fort_destination_desc: "Potężna budowla znana jako [GetBuilding('hotin_fort_01').GetName|l] góruje nad rzeką Dniestr. Jej grube mury i strategiczne położenie świadczą o determinacji miejscowej ludności w obronie swoich ziem przed najeźdźcami."
 building_heddal_stave_church_destination_desc: "W spokojnej norweskiej scenerii [GetBuilding('heddal_stave_church_01').GetName|l] stanowi wspaniały przykład średniowiecznego rzemiosła. Misterne drewniane rzeźby i górująca nad miastem konstrukcja odzwierciedlają oddanie i umiejętności miejscowych rzemieślników."
 building_temple_of_uppsala_destination_desc: "[GetBuilding('temple_of_uppsala_01').GetName] to spowite aurą świętości, czczone przez wiernych miejsce, w którym starożytne tradycje nordyckie łączą się z teraźniejszością. Ta szanowana sala od dawna stanowi miejsce spotkań, a o jej początkach usłyszeć można od przeróżnych pielgrzymów."
 building_lund_cathedral_destination_desc: "[GetBuilding('lund_cathedral_01').GetName] zachwyca architekturą romańską i dominuje nad panoramą miasta. To duchowy ośrodek słynący z krypty i zegara astronomicznego. Stanowi centralny punkt życia religijnego miejscowej społeczności chrześcijańskiej."
 building_danevirke_destination_desc: "Wzdłuż Półwyspu Jutlandzkiego rozciąga się potężna fortyfikacja ziemna znana jako [GetBuilding('danevirke_01').GetName]. Ta starożytna budowla obronna, stworzona i rozbudowana przez miejscową ludność, symbolizuje ich determinację do ochrony swoich ziem i utrzymania autonomii."
 building_roman_wall_of_lugo_destination_desc: "[GetBuilding('roman_wall_of_lugo_01').GetName] okrążające stare miasto stanowią świadectwo wyjątkowości, którą cechuje się kultura [roman_culture.GetName|l]. Miejscowa ludność jest dumna z tego zabytku, który wciąż jest solidnym symbolem starożytnej przeszłości ich miasta."
 building_rock_of_gibraltar_destination_desc: "Wznosząca się majestatycznie nad morzem [GetBuilding('rock_of_gibraltar_01').GetName] to strategiczny i symboliczny punkt orientacyjny. Miejscowi ludzie świadomi jego militarnego znaczenia umacniali go przez stulecia, czyniąc z niego bastion u bram między dwoma światami."
 building_aljaferia_palace_destination_desc: "[GetBuilding('aljaferia_palace_01').GetName] w Saragossie to położony w sercu Aragonii klejnot architektury charakterystycznej dla religii, którą jest [GetReligionByKey('islam_religion').GetName|l]. Zdobione łuki i zaciszne dziedzińce odzwierciedlają niezwykłe połączenie kulturowe Maurów i chrześcijan, dziedzictwo cenione przez miejscową ludność."
 building_tower_of_hercules_destination_desc: "Na wybrzeżu wysoko w niebo wbija się [GetBuilding('tower_of_hercules_01').GetName], starożytna latarnia morska, która od wieków prowadzi żeglarzy. Ta [roman_culture.GetName|l] budowla, przesiąknięta legendą i przeszłością, jest symbolem wytrzymałości i wskazówką dla lokalnej społeczności żeglarzy."
 building_city_wall_of_toledo_destination_desc: "Potężne [GetBuilding('city_wall_of_toledo_01').GetName|l] otaczające to historyczne miejsce stanowią świadectwo jego bogatej przeszłości. Kultury [roman_culture.GetName|l], [visigothic_culture.GetName|l] i mauretańska łączą się, tworząc mury obronne, które są źródłem dumy i bezpieczeństwa dla mieszkańców."
 building_alcazar_of_segovia_destination_desc: "Wznoszący się na skalistym urwisku nad miastem [GetBuilding('alcazar_of_segovia_01').GetName] to zamek rodem z bajek. Twierdza o charakterystycznym kształcie i bogatej przeszłości rozpala wyobraźnię zarówno miejscowych, jak i gości."
 building_holy_site_basilica_santiago_destination_desc: "[GetBuilding('holy_site_basilica_santiago_01').GetName] to symbol dla pielgrzymów świata chrześcijańskiego. Ta wspaniała katedra, punkt końcowy Camino de Santiago, jest poważana ze względu na znajdujące się tam święte relikwie i oszałamiającą architekturę romańską głęboko czczoną przez wiernych."
 building_cilician_gates_destination_desc: "[GetBuilding('cilician_gates').GetName] od wieków stanowią strategiczne miejsce. Ten naturalny korytarz wykorzystywany zarówno przez kupców, jak i armie, ma ogromne znaczenie dla lokalnych społeczności, które od dawna przemierzają te ścieżki."
 building_fairy_chimneys_destination_desc: "[GetBuilding('fairy_chimneys').GetName] w Kapadocji rzeźbione są wiatrem i wodą. Te imponujące formacje skalne o unikatowych kształtach nie tylko przyciągają ciekawskich podróżnych, ale także służą jako domy i miejsca kultu miejscowej ludności."
 building_sofia_ohrid_destination_desc: "Gdy dostrzegam [GetBuilding('sofia_ohrid').GetName|l], oczarowuje mnie jej spokojne piękno. Każdy fresk i mozaika opowiada historię wiary i sztuki, dziedzictwo, które przetrwało próbę czasu i nadal inspiruje zarówno wiernych, jak i odwiedzających."
 building_hosios_loukas_destination_desc: "Położony w górach środkowej Grecji klasztor [GetBuilding('hosios_loukas').GetName] jest klejnotem sztuki bizantyjskiej. Jego oszałamiająca architektura i piękne freski są czczone przez miejscowych wiernych i stanowią symbol prawosławnego chrześcijaństwa."
 building_cattolica_stilo_destination_desc: "[GetBuilding('cattolica_stilo').GetName] to niezwykły przykład architektury bizantyjskiej we Włoszech. Ten mały, ale fascynujący kościół z charakterystycznym planem w kształcie krzyża zajmuje szczególne miejsce w sercach lokalnej społeczności."
 building_etchmiadzin_cathedral_destination_desc: "[GetBuilding('etchmiadzin_cathedral').GetName] to święte miejsce uważane za duchowe centrum Ormian z całego świata. Ta starożytna katedra o bogatej historii i znaczeniu religijnym jest źródłem dumy i duchowego pocieszenia dla lokalnej społeczności ormiańskiej."
 building_jvari_monastery_destination_desc: "Położony na szczycie wzgórza [GetBuilding('jvari_monastery').GetName|l] góruje nad zbiegiem rzek poniżej. Ten gruziński prawosławny klasztor o harmonijnej architekturze to spokojne schronienie i symbol trwałej wiary chrześcijańskiej w tym regionie."
 building_saint_catherine_destination_desc: "U stóp góry Synaj stoi twierdza wiary – starożytny [GetBuilding('saint_catherine').GetName|l] z bezcennymi manuskryptami i świętymi relikwiami. To miejsce refleksji dla lokalnej społeczności prawosławnej i odwiedzających."
 building_apollinare_nuovo_destination_desc: "W historycznym mieście Rawenna [GetBuilding('apollinare_nuovo').GetName|l] stanowi świadectwo wczesnej sztuki i architektury chrześcijańskiej. Niesamowite mozaiki kościoła przedstawiające sceny biblijne są źródłem podziwu i inspiracji zarówno dla miejscowych wiernych, jak i miłośników historii."
 building_mount_athos_destination_desc: "[GetBuilding('mount_athos_01').GetName], półwysep w północnej Grecji, to wyjątkowa wspólnota monastyczna. Ta święta góra, na której znajdują się liczne klasztory, jest duchowym rajem przesiąkniętym prawosławną tradycją chrześcijańską czczonym zarówno przez mnichów, jak i pielgrzymów."
 building_meteora_destination_desc: "[GetBuilding('meteora_01').GetName], klasztory w Tesalii usytuowane na szczytach wysokich filarów skalnych, stanowią widok godny podziwu. Te pozornie zawieszone między ziemią a niebem sanktuaria symbolizują dążenie miejscowych mnichów do duchowego uniesienia."
 building_despot_palace_destination_desc: "[GetBuilding('despot_palace').GetName] to miejsce, które trzeba zobaczyć. Jego wielkie sale i wytworne dziedzińce tętnią gwarem dworzan i melodiami wędrownych pieśniarzy. Pałac jako ośrodek aktywności politycznej i artystycznej jest dumnym symbolem potęgi i wyrafinowania."
 building_maiden_tower_destination_desc: "[GetBuilding('maiden_tower').GetName] stoi na straży cieśniny Bosfor. Jej przesiąknięte legendami mury były świadkiem wzlotów i upadków imperiów. Obecnie jest punktem strategicznym i pilnie czuwa nad przepływem statków przez te legendarne wody."
 building_patras_castle_destination_desc: "[GetBuilding('patras_castle').GetName] stał na straży przez całe stulecia. Jego solidne mury i wieże noszące ślady różnych epok są świadectwem historycznego znaczenia miasta i jego strategicznej wartości."
 building_sumela_monastery_destination_desc: "Wyrzeźbiony w klifach prowincji Trabzon [GetBuilding('sumela_monastery_01').GetName|l] jest cudem architektury monastycznej. To odległe miejsce odosobnienia przyczepione do zbocza góry oferuje zapierające dech w piersiach widoki i poczucie głębokiego spokoju tym, którzy je odwiedzają."
 building_saint_lazarus_destination_desc: "W sercu Larnaki stoi czcigodne miejsce kultu – [GetBuilding('saint_lazarus').GetName|l]. Ta piękna budowla ze skomplikowaną ikonografią i świętymi relikwiami zajmuje szczególne miejsce w życiu duchowym miejscowej społeczności prawosławnej."
 building_kassiopi_castle_destination_desc: "[GetBuilding('kassiopi_castle').GetName] majestatycznie wznosi się nad Morzem Jońskim i stanowi znak ostrzegawczy. Jako ośrodek aktywności morskiej i wojskowej odgrywa kluczową rolę w bezpieczeństwie i dobrobycie okolicznych ziem, a jego historia splata się ze wzlotami i upadkami samego Cesarstwa Wschodniorzymskiego."
 building_hagios_demetrios_destination_desc: "Kościół [GetBuilding('hagios_demetrios').GetName] w Salonikach jest sanktuarium duchowym poświęconym patronowi miasta. Ozdobione wspaniałymi mozaikami uświęcone sale rozbrzmiewają modlitwami i pieśniami pobożnej miejscowej kongregacji."
 building_church_of_the_theotokos_destination_desc: "W cieniu murów Konstantynopola symbolem wiary jest [GetBuilding('church_of_the_theotokos').GetName|l]. Ta starożytna świątynia wraz ze swoją błogą atmosferą i świętymi ikonami stanowią podwaliny religijnego i kulturalnego życia miejscowej społeczności."
 building_parthenon_destination_desc: "[GetBuilding('parthenon').GetName] na szczycie Akropolu w Atenach to trwały symbol starożytnej cywilizacji greckiej. Choć ta majestatyczna świątynia częściowo popadła w ruinę, nadal zachwyca odwiedzających swoim architektonicznym blaskiem i historycznym znaczeniem."
 building_imam_reza_shrine_destination_desc: "[GetBuilding('imam_reza_shrine_01').GetName] to miejsce o ogromnym znaczeniu duchowym. Wspaniały kompleks ze złotą kopułą i minaretami przyciąga niezliczonych pielgrzymów, którzy szukają ukojenia i duchowej odnowy w tej świętej przestrzeni."
 building_soltaniyeh_destination_desc: "[GetBuilding('soltaniyeh_01').GetName] to arcydzieło architektoniczne epoki Ilchanidów. Jej innowacyjna konstrukcja i oszałamiające turkusowe płytki sprawiają, że jest to obiekt, który naprawdę się wyróżnia."
 building_palace_of_ctesiphon_destination_desc: "[GetBuilding('palace_of_ctesiphon_01').GetName] przywołują na myśl świetność imperium Sasanidów. Łuk Taq Kasra, który mimo spustoszeń, jakich dokonał czas, wciąż stoi, jest dojmującym przypomnieniem o architektonicznym kunszcie tej starożytnej cywilizacji."
 building_falak_ol_aflak_citadel_destination_desc: "Górująca nad miastem Chorramabad [GetBuilding('falak_ol_aflak_citadel_01').GetName] to twierdza o niezwykłej sile i pięknie. Potężne blanki tej historycznej cytadeli i jej strategiczne położenie stanowią symbol wspaniałego dziedzictwa i nieprzemijającego ducha regionu."
 building_minarets_and_remains_of_jam_destination_desc: "Gdy podchodzę i widzę [GetBuilding('minarets_and_remains_of_jam_01').GetName|l], czuję zachwyt. Potężne budowle stanowiące pozostałości dynastii Ghurydów stoją jak samotni strażnicy w surowym krajobrazie, a ich misterna ceglana konstrukcja jest świadectwem zapomnianej epoki."
 building_great_wall_of_gorgan_destination_desc: "Gdy przemierzam okolicę, pokornieję wobec wielkości budowli znanej jako [GetBuilding('great_wall_of_gorgan_01').GetName]. Ta kolosalna fortyfikacja rozciąga się dalej, niż sięga wzrok, i stanowi zdecydowane przypomnienie o potrzebie ochrony granic starożytnego królestwa przed najeźdźcami."
 building_maharloo_lake_destination_desc: "Widok jeziora [GetBuilding('maharloo_lake_01').GetName] w pobliżu miasta Sziraz jest zachwycający. Jego różowe wody tworzą niemal surrealistyczny krajobraz. To wyjątkowe zjawisko naturalne urzeka mnie swoim niezwykłym pięknem i spokojem."
 building_rainbow_mountains_destination_desc: "Gdy na nie spoglądam, [GetBuilding('rainbow_mountains_01').GetName] zadziwiają mnie żywymi, wielobarwnymi warstwami skał. Te oszałamiające naturalne formacje, prawdziwy geologiczny cud, wprawiają mnie w zdumienie wywołane naturalnym kunsztem Ziemi."
 building_mount_damavand_destination_desc: "Górująca nad otaczającym krajobrazem majestatyczna [GetBuilding('mount_damavand_01').GetName|l] budzi zarówno podziw, jak i szacunek. To najwyższy szczyt w miejscu znanym jako [GetGeographicalRegion('world_persian_empire').GetName], a jego ośnieżony wierzchołek i mityczne skojarzenia porywają moją wyobraźnię."
 building_tomb_of_cyrus_destination_desc: "Gdy stoję przed miejscem znanym jako [GetBuilding('tomb_of_cyrus_01').GetName|l] w Pasargadach, przepełnia mnie uczucie głębokiej bliskości z minioną historią. Ten prosty, ale elegancki pomnik poświęcony matce króla Salomona rezonuje z potężnym dziedzictwem."
 building_ark_of_bukhara_destination_desc: "Gdy przechodzę przez imponujące bramy miejsca znanego jako [GetBuilding('ark_of_bukhara_01').GetName|l], nie mogę nie poczuć ciężaru stuleci. Ta starożytna forteca była siedzibą władzy miejscowych emirów już od czasu jej powstania, a w swoich grubych murach gościła niezliczone karawany podróżujące wzdłuż Jedwabnego Szlaku."
 building_shah_i_zinda_destination_desc: "Zwiedzanie nekropolii [GetBuilding('shah_i_zinda_01').GetName] w Samarkandzie to podróż w czasie i obcowanie ze sztuką. Każde mauzoleum swoją wykwintną mozaiką opowiada jakąś historię, przywołując głębokie poczucie szacunku dla bogatego dziedzictwa kulturowego i duchowego regionu."
 building_alamut_castle_destination_desc: "[GetBuilding('alamut_castle_01').GetName] położony na szczycie góry w Dolinie Alamut wywołuje poczucie tajemnicy i intrygi. Kiedyś był twierdzą asasynów, a jego strategiczne położenie i bogata przeszłość wciąż fascynują zarówno mnie, jak i miejscowych gości."
 building_golden_gate_of_kiev_destination_desc: "Kiedy zbliżam się do budowli znanej jako [GetBuilding('golden_gate_of_kiev_01').GetName], oszałamia mnie jej wspaniałość. Służące za wejście do miasta wrota rozbrzmiewają dźwiękami handlu. Solidna konstrukcja budowli stanowi świadectwo potęgi miasta, wciąż budząc szacunek i poczucie związku ze wspaniałą przeszłością Kijowa."
 building_sar_i_sang_mines_01_destination_desc: "W miejscu znanym jako [GetBuilding('sar_i_sang_mines_01').GetName|l] powietrze jest gęste od pyłu lazurytu. Ciemnoniebieski kamień ceniony za intensywny kolor jest starannie wydobywany przez wykwalifikowanych górników. Kopalnie przypominają o historii handlu i luksusu, gdy lazuryt zdobił najwspanialsze skarby imperiów."
 building_drassanes_01_destination_desc: "Wspaniały arsenał miejsca znanego jako [GetBuilding('drassanes_01').GetName] przygotowuje flotę galer wojennych, dając jej właścicielowi możliwość wywierania wpływu w rejonie Morza Śródziemnego. Pod spiczastymi kamiennymi sklepieniami niestrudzenie pracują robotnicy."
 building_kyz_kala_01_destination_desc: "[GetBuilding('kyz_kala_01').GetName] góruje nad bujną oazą Merw, rzucając długi cień na suche okoliczne tereny. Fundamenty tej budowli wnoszą się na solidnym cokole, a żłobione ściany okalają warsztaty, zbrojownie i przepastne sale, po których przechadzają się wysłannicy i biurokraci."
 building_cluny_abbey_01_destination_desc: "Dar ziemi i przywilejów w zamian za wieczne zbawienie. To właśnie przymierze zawarte między monastyczną społecznością miejsca znanego jako [GetBuilding('cluny_abbey_01').GetName] a lokalnym władcą."
 building_cluny_abbey_02_destination_desc: "[GetBuilding('cluny_abbey_02').GetName] to największy kościół, który ktoś miał odwagę sobie wymarzyć, a potem postawić. Ma pięć naw dłuższych niż którakolwiek w Watykanie, a jego masywne kamienne sklepienia pełne wież i daszków to prawdziwy architektoniczny cud. Oto duma nowego Rzymu."
 building_york_walls_01_destination_desc: "Ciągnące się kilometrami [GetBuilding('york_walls_01').GetName|l] chroniły miasto już od czasów cezarów. Miejsce na osadę wybrano nie po to, aby zająć wyżej położone tereny, ale by wykorzystać dwie rzeki wijące się przez okoliczne łąki."
 building_damascus_mosque_01_destination_desc: "[GetBuilding('damascus_mosque_01').GetName] to dla islamu jedno z najświętszych miejsc o wiekowej historii. Jego fundamenty stanęły na miejscu starożytnej rzymskiej świątyni i wczesnochrześcijańskiej bazyliki. Widać tu splot wielu stuleci duchowości i niezwykłej pomysłowości."
 building_jokhang_01_destination_desc: "[GetBuilding('jokhang_01').GetName] to złożony niczym labirynt kompleks dziedzińców i rezydencji klasztornych, poprzecinany przepastnymi korytarzami i salami pokrytymi masłem jaka. Hm… masło jaka… może trzeba by go spróbować…"
 building_wartburg_01_destination_desc: "Na szczycie wielkiego, skalistego urwiska gdzieś w głębi Lasu Turyńskiego potężna twierdza [GetBuilding('wartburg_01').GetName] góruje nad otoczeniem, nadzorując ruch towarów i ludności w regionie. Ogromna sala z zimnego kamienia ogrzewana jest ciepłem płonących w niej palenisk."
 building_beta_giyorgis_01_destination_desc: "Miejsce znane jako [GetBuilding('beta_giyorgis_01').GetName|l] w całości wyrzeźbiono z ciepłej, czerwonej skały wulkanicznej. Jego spoczywająca głęboko w skale główna sala jest bogato zdobiona pięknymi freskami, a jej ściany przystrojone są świętymi ikonami."
 building_holy_wisdom_01_destination_desc: "Wspaniała budowla znana jako [GetBuilding('holy_wisdom_01').GetName] była wzorowana na meczecie Hagia Sophia, by symbolizować tę samą światłość, bogactwo i siłę w mroźnej, północnej krainie. Surowy, biały wapień fasady kontrastuje z oszałamiająco kolorowymi freskami wewnątrz świątyni."
 building_kano_walls_01_destination_desc: "Wysokie na wiele stóp [GetBuilding('kano_walls_01').GetName|l] otaczają starożytną osadę. Przez jego wielkie bramy wiodą najważniejsze szlaki handlowe regionu."
 building_somapura_university_01_destination_desc: "[GetBuilding('somapura_university_01').GetName] od wieków stanowi jeden z najważniejszych ośrodków nauki w Indiach, przyciągając uczonych z odległych regionów dzięki licznym powiązaniom z klasztorami buddyjskimi, dżinijskimi i hinduistycznymi."
 building_duomo_florence_01_destination_desc: "[GetBuilding('duomo_florence_01').GetName|l], wczesnochrześcijańska budowla umiejscowiona w pobliżu północnej bramy starożytnych rzymskich murów, była domem dla wiernych jeszcze przed czasami Konstantyna. Ucierpiała w wyniku podpaleń i grabieży, ale została zrekonstruowana i dostąpiła licznych błogosławieństw."
 building_duomo_florence_02_destination_desc: "Położone w centrum miasta ogromne, ośmiokątne [GetBuilding('duomo_florence_02').GetName|l] poświęcone jest jego patronowi, Świętemu Janowi.\nPokrywają je drogie marmury, mistrzowskie rzeźby oraz złote mozaiki, dlatego stanowi prawdziwe świadectwo bogactwa miasta."
 building_duomo_florence_03_destination_desc: "[GetBuilding('duomo_florence_03').GetName] to budowla godna bogatej Florencji. Jej fasadę zdobią realistyczne posągi proroków, bogów i patronów, a wysoka dzwonnica rzuca długi cień, wskazując godziny pracy i modlitwy mieszkańcom miasta i przyjezdnym."
 building_duomo_florence_04_destination_desc: "[GetBuilding('duomo_florence_04').GetName] to największe osiągnięcie florenckich budowniczych, górujące na tle błękitnego nieba smukłą, nieomal zwiewną sylwetką. Jest wyższa i szersza od wszelkich dotychczasowych osiągnięć architektury, a dzięki pomysłowo zastosowanej podwójnej skorupie z cegły i kamienia nie wymaga żadnych systemów podporowych."
 building_konark_temple_01_destination_desc: "Ogromna budowla znana jako [GetBuilding('konark_temple_01').GetName], którą wznosiły tysiące rzemieślników, jest poświęcona bogu słońca, Surji. Cały kompleks został zbudowany tak, aby przypominać potężny rydwan boga niosący światło z morza na wschód."
 building_al_qarawiyyin_university_01_destination_desc: "[GetBuilding('al_qarawiyyin_university_01').GetName] został założony przez kupców i migrantów z afrykańskiego miasta Kairuan. To jeden z najbardziej prestiżowych ośrodków szkolnictwa wyższego w całym zachodnim świecie islamskim, który przyciąga uczonych z odległych regionów."
 building_kairouan_basins_01_destination_desc: "[GetBuilding('kairouan_basins_01').GetName] zbudowano, by, w razie potrzeby, zapewnić miastu dostęp do świeżej wody. Te wielkie rezerwuary oczyszczają wodę, działając jako filtry i zbiorniki osadowe."
 building_ghana_palace_01_destination_desc: "W otoczeniu świętego gaju znajduje się siedziba królewskich wodzów miasta – [GetBuilding('ghana_palace_01').GetName|l].\nKompleks składa się z budynków z piaskowca i cegły mułowej skrytych za bramą i ogrodzeniem. Cała budowla jest ogromna i góruje nad otaczającym ją miastem."
 building_visegrad_castle_01_destination_desc: "[GetBuilding('visegrad_castle_01').GetName] to okazały, niedostępny dla osób postronnych kompleks murów i wież chroniący zakole Dunaju i kontrolujący obfity handel."
 building_wawel_cathedral_01_destination_desc: "Ta wielka, kamienna katedra wzniesiona z pomocą chrześcijańskich rzemieślników jest pierwszą tego typu budowlą na polskich ziemiach. [GetBuilding('wawel_cathedral_01').GetName] wzywa mieszczan na mszę w jej długich, oświetlonych świecami nawach, niosąc ze szczytu odgłos bijących w dwóch wieżach dzwonów."
 building_vatapi_caves_01_destination_desc: "Zbudowane przez wczesną dynastię Ćalukja [GetBuilding('building_vatapi_caves_01').GetName|l] zostały wyrzeźbione głęboko w potężnej formacji piaskowca, gdzie powstał najświętszy i najcichszy wewnętrzny świat. Brama triumfalna prowadzi pielgrzymów prosto do monolitycznego czoła góry."
 building_jaisalmer_fort_01_destination_desc: "Gdy słońce zaczyna zachodzić nad horyzontem, potężne mury budowli znanej jako [GetBuilding('jaisalmer_fort_01').GetName] przybierają ciepły kolor słodkiego miodu, świecąc jasno pośrodku pustyni. Twierdza ta została zbudowana tak, by chronić miasto przed wszelkimi zagrożeniami."
 building_pleasure_dome_01_destination_desc: "[GetBuilding('pleasure_dome').GetName] wyrasta z ziemi niczym urzeczywistniony sen. Budowlę otaczają ogrody i strumienie, a marmurowe korytarze i otwarte pawilony zachęcają do odpoczynku i refleksji. Z oddali dobiegają dźwięki muzyki, a w powietrzu unosi się przyjemny zapach."
 building_burkhan_khaldun_01_destination_desc: "[GetBuilding('burkhan_khaldun_01').GetName], święte wzgórze spowite mgłą i tajemnicą, wyróżnia się na tle szczytów Chentej. To miejsce modlitwy i cel pielgrzymek. Panuje przekonanie, że jego ciche zbocza chronią duszę tej ziemi i zamieszkującego ją ludu."
 building_nanhua_temple_01_destination_desc: "[GetBuilding('nanhua_temple_01').GetName] i jej połyskujące w porannej mgle, pokryte dachówkami szczyty górują dumnie nad zielonymi wzgórzami i spokojnymi wodami rzek. Pokonawszy ścieżkę wyznaczoną przez wiekowe cyprysy, pielgrzymi klękali przed wejściem do sal przez stulecia stanowiących królestwo pobożności i cichych nauk."
 building_jizu_shan_temples_01_destination_desc: "Położone na skalnych zboczach tarasowe [GetBuilding('jizu_shan_temples_01').GetName|l] wznoszą się ponad sunące na podobieństwo fal obłoki, a wykonane z brązu młynki modlitewne obracają się na wietrze. Podczas gdy mnisi doglądają kadzideł wśród wiekowych drzew, pielgrzymi cierpliwie pokonują kamienne stopnie w poszukiwaniu echa pradawnej mądrości."
 building_tiantai_monasteries_01_destination_desc: "Uczepione okrytych mgłą klifów [GetBuilding('tiantai_monasteries_01').GetName|l] górują nad dolinami, strumyki szumią, wijąc się wśród omszałych głazów, a wyposażeni w zwoje mnisi rozprawiają o pismach zawierających pradawne nauki mistrzów poświęcone medytacji, doktrynie i samemu światu."
 building_maoshan_academy_01_destination_desc: "[GetBuilding('maoshan_academy_01').GetName] wznosi się ponad otulonymi sunącą leniwie mgłą, szmaragdowymi szczytami. Po jej dziedzińcu niesie się woń sosen i atramentu, a w blasku lamp uczeni oddają się przepisywaniu tekstów poświęconych mistycznej medycynie, podczas gdy wzdłuż najeżonych kapliczkami grzbietów krążą żurawie."
 building_lize_academy_01_destination_desc: "Pod koniec wędrówki moim oczom ukazuje się [GetBuilding('maoshan_academy_01').GetName] – tuż obok spokojnego jeziora, w którego lustrze zdają się przeglądać wierzbiny i pokryte dachówką szczyty. Podchodząc bliżej, słyszę już z oddali, jak mnisi w prostych szatach recytują klasyczną konfucjańską literaturę."
 building_culai_academy_01_destination_desc: "Gdy moim oczom ukazuje się wreszcie [GetBuilding('culai_academy_01').GetName], ogarnia mnie rosnący zachwyt nad jej pięknem. Spływająca ze szczytu góry Culai mgła osnuwa dziedzińce, gdzie poszukiwacze wiedzy oddają się pogoni za akademickimi ambicjami."
 building_shigu_academy_01_destination_desc: "Podróż wreszcie doprowadza mnie do miejsca, gdzie pośród bujnych lasów, na szczycie spowitych mgłą wzgórz, kryje się [GetBuilding('shigu_academy_01').GetName]. Wspiąwszy się po schodach, z radością witam widok słynnej, pokrytej złożonymi inskrypcjami bramy stojącej w cieniu niedawno odnowionego dachu."
 building_white_deer_grotto_academy_01_destination_desc: "[GetBuilding('white_deer_grotto_academy_01').GetName] jest coraz bliżej – i uderza mnie, jak płynnie komponuje się z otaczającymi ją wzgórzami. Otoczone gajami bambusowymi kamienne budynki przypominają, gdzie uczeni poszukiwali niegdyś prawdy i harmonii."
 building_gongsanseong_fortress_01_destination_desc: "Gdy moim oczom ukazuje się wreszcie [GetBuilding('gongsanseong_fortress_01').GetName|l], uderza mnie okazałość górującego nad doliną rzeki gmachu. W starych murach słychać wciąż echo opowieści o dawno zapomnianych bitwach, lojalnych królach i niezłomnym duchu dumnego królestwa."
 building_besakih_temple_01_destination_desc: "Mimo niepozornej nazwy [GetBuilding('besakih_temple_01').GetName] okazuje się nie samotną świątynią, a rozległym kompleksem zarówno ogólnodostępnych, jak i prywatnych kapliczek służących do modlitw i ceremonii. Rozumiem już, dlaczego mówi się o niej „świątynia matka”."
 building_mount_apo_01_destination_desc: "Gdy na horyzoncie zaczyna majaczyć [GetBuilding('mount_apo_01').GetName|l], potęga i spokój jej majestatu budzą we mnie pokorę. Wdychając łagodną woń deszczu i popiołu, spoglądam na święty szczyt – sanktuarium duchów ziemi i ognia – wieńczący otulone chmurami, postrzępione zbocza."
 building_dieng_plateau_01_destination_desc: "Nierealnie wręcz cichy [GetBuilding('dieng_plateau_01').GetName|l] jest uderzający dla ludzkiego oka. Ze szmaragdowych zagłębień wypływają kaskady strumyków, a z mgły wyłaniają się starożytne kamienne kapliczki. To zapierająca dech w piersi kraina, w której natura i boskość zdają się oddychać tym samym powietrzem."
 building_plain_of_jars_01_destination_desc: "Przede mną pod jasnym niebem rozciąga się wielka i milcząca [GetBuilding('plain_of_jars_01').GetName]. Rozsiane między wzgórzami potężne tajemnicze dzbany wynurzają się połowicznie z traw i cienia. Nikt już nie pamięta, jaki był ich cel. To dziedzictwo cywilizacji, która zniknęła dawno temu – a jednak nie przepadła całkowicie."
 building_pagoda_of_fogong_temple_01_destination_desc: "Stoi przede mną [GetBuilding('pagoda_of_fogong_temple_01').GetName|l]. Drewniane poziomy tej budowli unoszą się ku górze niczym modlitwa skierowana do samych niebios. Na każdym piętrze rozchodzi się aromat pradawnego kadzidła, symbolizującego nieustanne, trwające prawie tysiąc lat oddanie, oraz kunsztowne rzemiosło."
 building_hanging_temple_01_destination_desc: "[GetBuilding('hanging_temple_01').GetName] trzyma się klifu niczym efemeryczna wizja zawieszona między niebem a ziemią. Z kamiennej fasady wyrastają drewniane sale, a podtrzymujące je belki wydają się zaprzeczać grawitacji. Tutaj, pośród wiatru, ciszy i niesłabnącego oddania, mnisi gromadzą się przy modlitwie."
 building_muaro_jambi_01_destination_desc: "[GetBuilding('muaro_jambi_01').GetName] rozciąga się wzdłuż rzeki. To istny labirynt ceglanych sanktuariów otoczonych przez dżunglę. Pnącza wiją się wokół szykownie zbudowanych stup, a w powietrzu wibruje historia tego miejsca. Przybywający tu uczeni i pielgrzymi zostają, by handlować i praktykować wiarę."
 building_liuhe_pagoda_01_destination_desc: "Znajdująca się obok rzeki [GetBuilding('liuhe_pagoda_01').GetName|l] wita mnie majestatyczną, wielowymiarową elegancją. Wyższą część budowli znaczą jaśniejsze barwy, a niższą – ciemniejsze. W środku droga na szczyt prowadzi wzdłuż zewnętrznych murów, zygzakujących korytarzy, wewnętrznych ścian i niewielkich komnat, w których urzędują zapracowani uczeni."
 building_dau_temple_01_destination_desc: "[GetBuilding('dau_temple_01').GetName] stoi tam, gdzie Rzeka Czerwona spotyka się z niebem. Na dziedzińcach budowli czuć zapach kadzideł i słychać dźwięki modlitwy. Pradawne chramy połyskują w promieniach słońca. Miejsce to stanowi kolebkę buddyzmu w tym regionie. Przez stulecia ludzie dawali tu wyraz swej gorliwej wierze."
 building_mount_baekdu_01_destination_desc: "W oddali wyrasta [GetBuilding('mount_baekdu_01').GetName|l], a jej ośnieżony szczyt odcina się jasnym blaskiem na tle horyzontu. Ponoć w kraterze na samej górze znajduje się wielkie jezioro, w którym, niczym w lustrze, odbijają się niebiosa."
 building_byeokran_port_01_destination_desc: "[GetBuilding('byeokran_port_01').GetName] rozciąga się wzdłuż zatoki, która – widziana z pobliskich klifów – lśni w promieniach słońca. Obok drewnianych masztów wyrastają tam magazyny, a skrzeczenie mew miesza się z brzękiem kotwic."
 building_hwangnyongsa_01_destination_desc: "Przede mną znajduje się [GetBuilding('hwangnyongsa_01').GetName|l], której dziewięciopoziomowa pagoda lśni w promieniach słońca. Na przepastnych dziedzińcach śpiewają mnisi. Czuję, że w każdym kamieniu i każdej złotej belce odbija się moc wiary i żywotności."
 building_hakata_port_01_destination_desc: "[GetBuilding('hakata_port_01').GetName] pełen jest kupców i żeglarzy z odległych regionów, a przez doki przewijają się jedwabie, ceramika i przyprawy. Na przystani tłoczą się skrzypiące drewniane okręty, których żagle trzepocą na wietrze. To tętniący życiem ośrodek handlu, kultury i cesarskich wpływów."
 building_chinjufu_01_destination_desc: "[GetBuilding('chinjufu_01').GetName] to miejsce, w którym panuje naznaczony dyscypliną porządek. Koszary i stocznie rozbrzmiewają brzękiem pancerza i okrzykami marynarzy. W zatoce wyrastają wieże strażnicze, czuwające nad północnymi morzami państwa, w którym pragnienie obrony i poczucie obowiązku napędzają każde uderzenie serca."
 building_dazaifu_01_destination_desc: "[GetBuilding('dazaifu_01').GetName] znajduje się pośród łagodnych pagórków i śliwowych zagajników. Pełno tam skrybów, posłańców i urzędników. To ośrodek, w którym powstają dyrektywy administracyjne rozsyłane następnie do odległych prowincji. Postanowienia te pieczętowane są tuszem, kadzidłem i subtelnie wyrażanym autorytetem."
 building_enryaku_ji_01_destination_desc: "Wieńcząca górę Hiei [GetBuilding('enryaku_ji_01').GetName|l] spowita jest mgłą. Pielgrzymi wspinają się po krętych ścieżkach, przechodząc obok śpiewających mnichów grzechoczących dzwonkami. Tutaj nauki $SaichO_$ wciąż kształtują wiarę i dyscyplinę całego narodu."
 building_kofuku_ji_01_destination_desc: "[GetBuilding('kofuku_ji_01').GetName] wyrasta ponad wodami mętnego jeziora. Pięciopoziomowa pagoda budowli rzuca na ulice długi cień. Dworzanie i mnisi przemykają pod solidną brama, a uczeni oddają się spokojnie buddyjskiej medytacji."
 building_ise_jingu_01_destination_desc: "[GetBuilding('ise_jingu_01').GetName] wyrasta ponad wodami mętnego jeziora. Pięciopoziomowa pagoda budowli rzuca na ulice długi cień. Dworzanie i mnisi przemykają pod solidną brama, a uczeni oddają się spokojnie buddyjskiej medytacji."
 building_heian_palace_01_destination_desc: "[GetBuilding('heian_palace_01').GetName] wyrasta ponad aleją. Cynobrowe wrota otwierają się na przepastne dziedzińce, których powierzchnię pokrywa wyrównany, biały żwir. Wyperfumowani dworzanie suną przez lakierowane sale, gdzie złote ekrany i dobiegające z oddali dźwięki cytry odzwierciedlają elegancję cesarskiego życia."
 building_itsukushima_jinja_01_destination_desc: "[GetBuilding('itsukushima_jinja_01').GetName] wyrasta ponad wody pływowe, a cynobrowa brama torii wygląda, jakby unosiła się między morzem a niebem. Latarnie chwieją się pod drewnianymi okapami dachu. Śpiewy mnichów, którzy doglądają świętych rytuałów, mieszają się z rytmicznymi uderzeniami fal."
 building_mount_fuji_01_destination_desc: "[GetBuilding('mount_fuji_01').GetName] wnosi się majestatycznie nad równinami, a jej ośnieżony szczyt jaśnieje na tle bezchmurnego nieba. Zarówno mieszkańcy wiosek, jak i pielgrzymi spoglądają na nią z nabożnym szacunkiem, kojarzona jest ona bowiem z patronującą jej boginią, a także służy za zwierciadło ukazujące ponadczasowe piękno."
 building_sunday_bazaar_01_destination_desc: "[GetBuilding('sunday_bazaar_01').GetName] tętni życiem. Skąpane w promieniach słońca ulice wypełnione są jedwabiami, przyprawami i zwierzętami gospodarskimi, a kupcy z dalekich regionów prowadzą negocjacje w licznych językach. Powstały tu gobelin głosów i towarów uosabia ducha Jedwabnego Szlaku."
 building_dunhuang_market_01_destination_desc: "[GetBuilding('dunhuang_market_01').GetName] wibruje pod pustynnym słońcem, a kupcy z rozmaitych regionów handlują towarami – i egzotycznymi, i niezbędnymi. Wielbłądy odpoczywają przy bramie, podczas gdy pielgrzymi i miejscowi wymieniają się zwojami i opowieściami, które trafią do odległych oaz."
 building_hamadan_bazaar_01_destination_desc: "[GetBuilding('hamadan_bazaar_01').GetName] wije się przez zadaszone aleje wypełnione zapachem szafranu i zwierzęcych skór. Z ocienionych straganów nawołują kupcy, zachęcając do zakupu prezentowanych towarów. Mijają ich przechodzący przez ten historyczny ośrodek handlu podróżni i lokalni mieszkańcy."
 building_lahur_bazaar_01_destination_desc: "[GetBuilding('lahur_bazaar_01').GetName] wibruje dźwiękami i barwami. W wąskich alejkach tłoczą się sprzedawcy przypraw, farbiarze i złotnicy. Ze straganów z jedzeniem wydobywa się aromatyczny dym, a każdy zaułek aż buzuje od energii obfitości i bujnego handlu."
 building_changan_market_01_destination_desc: "[GetBuilding('changan_market_01').GetName] pełne jest kupców z całego świata, którzy rozstawiają swoje towary pod kolorowymi sztandarami. Zagraniczne towary nadają kolorytu temu ruchliwemu targowisku, na którym między straganami mijają się kuglarze i uczeni."
 building_khiva_bazaar_01_destination_desc: "[GetBuilding('khiva_bazaar_01').GetName] wije się pod turkusowymi wieżami. Plątaninę słonecznych uliczek wypełniają zapachy kminu i wełny. Handlarze targują się o ceny dywanów i kości słoniowej, a ich głosy odbijają się echem od kopuł, które stanowią symbol imperium oraz pustynnego handlu o długiej tradycji."
 building_lhasa_market_01_destination_desc: "[GetBuilding('lhasa_market_01').GetName] rozciąga się pod powiewającymi flagami modlitewnymi. Na straganach znaleźć można obfitość lampek maślanych, kolorowych koralików i wełny jaków. Tutaj, oddychając wysokogórskim powietrzem, spotykają się mnisi, koczownicy i kupcy. Odgłosy targowania się łagodzi odległy brzęk świątynnych dzwonów."
 building_dvin_shuka_01_destination_desc: "[GetBuilding('dvin_shuka_01').GetName] to miejsce, gdzie w powietrzu wibrują głosy ludzi z dalekich krain. Pod plecionymi baldachimami lśni brąz, a kupcy zachęcają mnie do skosztowania ich słodyczy i przyjrzenia się barwnym jedwabiom. Każda taka interakcja daje wgląd w pełną życia energię miasta."
 building_herat_bazaar_01_destination_desc: "[GetBuilding('herat_bazaar_01').GetName] to miejsce, które wyróżnia się zadaszonymi salami, gdzie nad ocienionymi straganami lśnią kafelki. Woda płynie kamiennymi kanałami, a zapach barwników i kurzu spowija tłum ludzi nieprzerwanie prowadzących handel."
 building_hoshi_ryokan_01_destination_desc: "[GetBuilding('hoshi_ryokan_01').GetName] to gospoda, której drewniane belki wypolerowane zostały stuleciami cichej gościnności. Latarnie oświetlają wyłożone tatami korytarze, a z łaźni wydobywa się zapach cedru i wody źródlanej. Można odnieść wrażenie, że czas płynie tu wolniej."
 building_borobudur_01_destination_desc: "O świcie wyrasta przede mną [GetBuilding('borobudur_01').GetName]. Tarasy tej świątyni unoszą się ponad mgłą niczym kamienna mandala. Gdy słońce dotyka stupy, posągi przedstawiające Buddę zdają się obserwować okolicę. Jest to wyryty w kamieniu wulkanicznym symbol ścieżki prowadzącej od tego, co ziemskie, do oświecenia."
 building_krakatoa_01_destination_desc: "Z mojej łodzi w cieśninie obserwuję majaczący na horyzoncie wulkan [GetBuilding('krakatoa_01').GetName]. Jego zbocza spowija falujący dym. Morze szepcze niespokojnie, a w powietrzu czuć cierpki zapach popiołu. To przypomnienie, że pod falami spoczywa niespokojne serce góry."
 building_po_klong_garai_01_destination_desc: "[GetBuilding('po_klong_garai_01').GetName] praży się w bezlitosnym słońcu, a jej wieże z czerwonych cegieł wyrastają z wysuszonych wzgórz niczym rozżarzone symbole oddania. Podniszczone rzeźby bóstw i węży stoją na straży sanktuarium. Panująca tu cisza i aromat kadzideł stanowią hołd dla króla, który przeszedł do legendy."
 building_citadel_thang_long_01_destination_desc: "[GetBuilding('citadel_thang_long_01').GetName] – to tutaj przechadzam się wzdłuż usypanych z ziemi murów obronnych sięgających rzeki. Wieże strażnicze czuwają nad lotosowymi stawami i budowlami pokrytymi dachówkami. Żołnierze i dworzanie poruszają się w oparach dymu z kadzideł i porannej mgle, strzegąc rozrastającej się stolicy."
 building_citadel_thang_long_02_destination_desc: "[GetBuilding('citadel_thang_long_02').GetName]… Przechodzę przez bramę i przyglądam się smoczym motywom zdobiącym pradawne kamienne mury. Na dziedzińcach słychać kroki strażników i czuć zapach deszczu na cegłach. Panuje tu atmosfera przywodząca na myśl dobrze ugruntowany autorytet."
 building_angkor_wat_01_destination_desc: "Przechodzę przez groblę z piaskowca prowadzącą do [GetBuilding('angkor_wat_01').GetName]. Wieże tego kompleksu przypominają pąki lotosu wznoszące się ponad bliźniaczymi fosami. Rzeźbione filary i galerie rozmieszczono symetrycznie. Na każdym kamieniu widnieją bóstwa, tancerze i wizerunki ponadczasowego rytmu."
 building_quanzhou_seaport_01_destination_desc: "[GetBuilding('quanzhou_seaport_01').GetName] tętni życiem. Pełno tu statków, z których ludzie wyładowują towary w zatłoczonych dokach; marynarze krzyczą ponad szuraniem lin i wózków, a urzędnicy starannie dokumentują każdy ładunek. Ten nadbrzeżny ośrodek żyje zgodnie z miarowym rytmem handlu."
 building_qianling_mausoleum_01_destination_desc: "W [GetBuilding('qianling_mausoleum_01').GetName|l] kamienne ścieżki prowadzą w dół wzgórza, gdzie znajdują się królewskie grobowce. Posągi przedstawiające konie i posłańców tworzą milczące szeregi, które strzegą spoczywających w objęciach ziemi cesarza Gaozonga i cesarzową Wu."
 building_forbidden_city_01_destination_desc: "[GetBuilding('forbidden_city_01').GetName]… Wchodzę tam przez olbrzymie cynobrowe wrota. Oszklone dachy lśnią niczym promienie słońca odbite na powierzchni wody. Dziedzińce okolone rzeźbionymi smokami rozmieszczono symetrycznie, a pawilony dopasowano do cesarskiego tronu."
 building_kaifeng_palace_01_destination_desc: "Gdy opada poranna mgła, ukazuje mi się [GetBuilding('kaifeng_palace_01').GetName|l] i jego elegancko wymalowane belki. Pokryte kafelkami dziedzińce okolone są kotłami z brązu. Kaligrafowie i urzędnicy przechadzają się pod ażurowymi rzeźbieniami, dając wyraz autorytetowi dynastii Song."
 building_giant_wild_goose_pagoda_01_destination_desc: "Wyrasta przede mną [GetBuilding('giant_wild_goose_pagoda_01').GetName], siedmiopiętrowy ośrodek wiedzy zbudowany z cegieł w kolorze ochry, zwieńczonych brązem. Wzniesiono go z myślą o ochronie buddyjskich sutr. Stanowi symbol wiary, nauki i wymiany kulturowej."
 building_lingyin_temple_01_destination_desc: "[GetBuilding('lingyin_temple_01').GetName] jest coraz bliżej. Idę tam, przemierzając zamglone doliny, a ze szczytu Feilai przyglądają mi się rzeźby Buddy. W środku głównej sali znajduje się wielki, pozłacany Siakjamuni, promieniejący pośród dymu kadzideł i śpiewów."
 building_shaolin_monastery_01_destination_desc: "[GetBuilding('shaolin_monastery_01').GetName], położony w pobliżu góry Song, to miejsce, gdzie wśród zapachu sosen i kadzideł mnisi oddają się szkoleniu, które łączy medytację i sztuki walki w ramach jednej, bazującej na rytmie dyscypliny."
 building_wudang_mountain_temples_01_destination_desc: "[GetBuilding('wudang_mountain_temples_01').GetName] są coraz bliżej. Wspinam się tam krętymi ścieżkami, by ujrzeć budowle trzymające się kurczowo zamglonych klifów. Pokryte brązem dachy błyszczą wśród chmur, a mnisi w ciszy przemieszczają się między kapliczkami i sosnami. To święte miejsce, w którym architektura spotyka się z naturą."
 building_yungang_grottoes_01_destination_desc: "[GetBuilding('yungang_grottoes_01').GetName] to kompleks jaskiń. Klify w kolorze miodu zostały tu przekształcone w wielkie, kamienne sanktuaria. Wśród chłodnych cieni ustawione w rzędzie posągi Buddy spoglądają w przestrzeń, a na ich spokojnych twarzach wciąż widać ślady starej farby."
 building_leshan_giant_buddha_01_destination_desc: "Stoi przede mną [GetBuilding('leshan_giant_buddha_01').GetName], wyrzeźbiony w czerwonych klifach górujących nas spotykającymi się rzekami. Wokół jego olbrzymich kolan gromadzi się mgła. Pobliscy mnisi śpiewają cicho, a ich modlitwy niesie ten sam wiatr, który ukształtował tę świętą górę."
 building_wulingyuan_01_destination_desc: "Podróż kieruje mnie do spowitych mgłą dolin [GetBuilding('wulingyuan_01').GetName], gdzie olbrzymie filary z piaskowca górują nad bujnymi, zielonymi lasami niczym pradawni wartownicy. Nierealnie wyglądające wodospady spływają kaskadą z klifów, a ukryte przed wzrokiem świątynie trzymają się kurczowo półek skalnych."
 building_swahili_port_lamu_destination_desc: "[GetBuilding('swahili_port_lamu').GetName] to miejsce, gdzie domy z koralowców skierowane są w stronę morza, a łodzie unoszone są przez fale. Słychać tu szum regionalnych języków, a wąskie, nasłonecznione alejki wypełnia zapach goździków i soli."
 building_swahili_port_pate_destination_desc: "[GetBuilding('swahili_port_pate').GetName]… Ich linia brzegowa jaśnieje pod palącym słońcem południa, a na tłocznych kejach pełno jest kupców, których okrzyki niosą się ponad skrzyniami kości słoniowej i zboża. Za murami portu falują daktylowce. Cała wyspa pulsuje dźwiękiem odległych mórz."
 building_swahili_port_mombasa_destination_desc: "[GetBuilding('swahili_port_mombasa').GetName] rozciąga się nad pełną żagli i okrzyków zatoką w kształcie półksiężyca, której strzegą kamienne fortyfikacje. Na sięgających brzegu targowiskach czuć intensywny zapach oleju palmowego i miedzi. Rozległe morza kuszą obietnicą przygód."
 building_swahili_port_zanzibar_destination_desc: "[GetBuilding('swahili_port_zanzibar').GetName]… Miejsce to tętni życiem pod przesuwającymi się chmurami. Rzeźbione, drewniane drzwi prowadzą do uliczek wypełnionych straganami z przyprawami, a do nabrzeża przybijają statki z obcych stron."
 building_swahili_port_pemba_destination_desc: "[GetBuilding('swahili_port_pemba').GetName] to miejsce, które aż wibruje od dyskretnie wyrażanego poczucia celu. Powietrze ciężkie jest od aromatu goździków. Nieznani kupcy z północnych wybrzeży płacą srebrnymi monetami. Ludzie uwijają się przy rozładunku przywiezionych przez niewielkie łodzie worków przypraw, które mają trafić na odległe targowiska."
 building_koganeyama_mines_destination_desc: "[GetBuilding('koganeyama_mines_01').GetName] to miejsce na wyspie Kinka, gdzie pełno jest pracowitych kopaczy, poszukujących słynnego złotego pyłu. Powiada się, że schował go tam Kanayama, kami górnictwa."
 building_tsushima_mines_destination_desc: "[GetBuilding('tsushima_mines_01').GetName] to miejsce, którego sława stale przyciąga górników ze wszystkich zakątków wyspy. Wydobywają oni czarne złoża i poszukują nowych."
 building_sado_mines_destination_desc: "[GetBuilding('sado_mines_01').GetName] to miejsce przytłaczające i odludne, lecz pod powierzchnią ziemi górnicy wylewają z siebie siódme poty, by wydobyć ukryte skarby wyspy."
 building_tada_mines_destination_desc: "[GetBuilding('tada_mines_01').GetName] to miejsce ukryte pośród porośniętych drzewami gór Settsu. Wewnątrz uwijają się poszukiwacze miedzi wydobywający z głębin ziemi ukryte skarby."
 building_mozu_tombs_destination_desc: "[GetBuilding('mozu_tombs').GetName] to prawdziwy cud. Podobno te imponujące, otoczone fosami grobowce kurhanowe w kształcie dziurki od klucza, w których spoczywają dawni cesarze, kształtują zarówno to, co widzimy, jak i to, co odczuwamy."
 legendary_watchtower_destination_desc: "[GetBuilding('legendary_watchtower').GetName] wznosi się wysoko, przyglądając się ziemi nieustępliwym spojrzeniem. Jej potężna konstrukcja stanowiąca punkt orientacyjny w promieniu wielu mil to świadectwo czujności jej twórców. Służy nie tylko jako posterunek obserwacyjny, ale także jako symbol ochrony przed każdym, kto ośmieli się zagrozić pokojowi państwa."
 legendary_hunting_ground_destination_desc: "[GetBuilding('legendary_hunting_lodge').GetName] to miejsce, w którym dzicz rządzi niepodzielnie. Jego rozległe tereny pełne różnorodnej flory i fauny oferują dziewicze sanktuarium dla szlachetnej sztuki łowieckiej. Tu przeplatają się tradycja i natura, zapewniając wymagające, ale satysfakcjonujące doświadczenie tym, którzy chcą sprawdzić swoje umiejętności w dziczy."
 legendary_palace_destination_desc: "Majestatyczny [GetBuilding('legendary_palace').GetName|l] to arcydzieło architektury, które oczarowuje każdego, kto wchodzi na jego teren. Jego luksusowe sale i ogrody są świadectwem szczytu osiągnięć artystycznych. Centrum potęgi i piękna, jakim jest ten pałac, budzi podziw i zachwyt w sercach odwiedzających."
 legendary_statue_destination_desc: "[GetBuilding('legendary_statue').GetName] to nieśmiertelny hołd dla heroizmu i cnót, które reprezentuje. Wyrzeźbiony w kamieniu, ale przesiąknięty duchem legendy przyciąga wzrok wszystkich, którzy przechodzą obok. Jest najważniejszym punktem napawającym dumą i stanowiącym źródło inspiracji ucieleśniającym zbiorową pamięć i aspiracje ludzi."
 legendary_shrine_destination_desc: "Położona w zacisznym miejscu [GetBuilding('legendary_shrine').GetName|l] to święta oaza, która przyciąga zarówno wiernych, jak i ciekawskich. Jest to miejsce refleksji i oddania, gdzie rytuały i modlitwy rozbrzmiewają na przekór upływającemu czasowi. Kaplica ta oferuje ukojenie i więź z boskością, służąc za pomost między tym, co ziemskie, a tym, co niebiańskie."
 building_generic_destination_desc: "Gdy docieram na miejsce, jego wyjątkowy charakter i historyczny przekaz, którym emanuje, są natychmiast widoczne. To miejsce stanowi świadectwo trwałego dziedzictwa tej ziemi, a każdy jego aspekt opowiada historię czekającą na odkrycie."
 building_castle_arrival_01_desc: "Moje podekscytowanie wzrasta, gdy zbliżam się do miejsca znanego jako [location.GetTitle.GetNameNoTier]. Perspektywa zobaczenia jego wspaniałości napełnia mnie niecierpliwym wyczekiwaniem."
 building_castle_arrival_02_desc: "Gdy zbliżam się do miejsca znanego jako [location.GetTitle.GetNameNoTier], moje serce zaczyna bić szybciej. To z radości na myśl o odkrywaniu legend, które skrywają jego mury."
 building_castle_arrival_03_desc: "Gdy tylko miejsce znane jako [location.GetTitle.GetNameNoTier] pojawia się w zasięgu mego wzroku, budzi się we mnie chęć przygody."
 building_castle_arrival_04_desc: "Widok miejsca znanego jako [location.GetTitle.GetNameNoTier] napawa mnie podziwem i ogromną ciekawością historii, które skrywa."
 building_castle_arrival_05_desc: "Gdy zbliżam się do miejsca znanego jako [location.GetTitle.GetNameNoTier], nie mogę się doczekać, by odkryć historie, których świadkiem było na przestrzeni wieków."
 building_city_arrival_01_desc: "Gdy przybywam do miejsca znanego jako [location.GetTitle.GetNameNoTier], czuję dreszczyk emocji na samą myślą o odkrywaniu jego ukrytych skarbów i barwnej kultury."
 building_city_arrival_02_desc: "Zgiełk panujący w miejscu znanym jako [location.GetTitle.GetNameNoTier] dodaje mi energii i nie mogę się doczekać, aż zagłębię się w jego tętniące życiem ulice."
 building_city_arrival_03_desc: "Gdy wchodzę do miejsca znanego jako [location.GetTitle.GetNameNoTier], ogarnia mnie uczucie zachwytu. Cieszę się, że mogę odkrywać skarby kultury i legendarne uliczki tego miejsca."
 building_city_arrival_04_desc: "Gdy przybywam do miejsca znanego jako [location.GetTitle.GetNameNoTier], nie mogę się doczekać, by zobaczyć jego gwarne rynki i zabytki o znaczeniu historycznym."
 building_city_arrival_05_desc: "Przenika mnie energia miejsca znanego jako [location.GetTitle.GetNameNoTier], rozpalając moją ciekawość i chęć zagłębienia się w jego barwne zwyczaje i bogatą przeszłość."
 building_temple_arrival_01_desc: "Gdy wchodzę do miejsca znanego jako [location.GetTitle.GetNameNoTier], z niecierpliwością wyczekuję duchowych cudów, które się w nim kryją."
 building_temple_arrival_02_desc: "Łagodna atmosfera miejsca znanego jako [location.GetTitle.GetNameNoTier] przyciąga mnie, obiecując podróż do krainy spokoju i starożytnej mądrości."
 building_temple_arrival_03_desc: "Gdy podchodzę do miejsca znanego jako [location.GetTitle.GetNameNoTier], ogarnia mnie głębokie poczucie szacunku. Wyczekuję uświęconej przenikliwości, jaką to miejsce oferuje."
 building_temple_arrival_04_desc: "Gdy wchodzę do miejsca znanego jako [location.GetTitle.GetNameNoTier], czuję gotowość na doświadczenia duchowej głębi i piękna, jakie ono skrywa."
 building_temple_arrival_05_desc: "Przede mną miejsce znane jako [location.GetTitle.GetNameNoTier], sanktuarium wiary. Nie mogę się doczekać, by zanurzyć się w jego uświęconej atmosferze."
 building_tribal_holding_arrival_01_desc: "Gdy zbliżam się do miejsca znanego jako [location.GetTitle.GetNameNoTier], wita mnie poczucie wspólnoty i ducha zżytej społeczności."
 building_tribal_holding_arrival_02_desc: "Ożywiona atmosfera miejsca znanego jako [location.GetTitle.GetNameNoTier] wita mnie jaskrawymi kolorami i bogatym przekazem kulturowym."
 building_tribal_holding_arrival_03_desc: "Gdy zbliżam się do miejsca znanego jako [location.GetTitle.GetNameNoTier], od razu widzę harmonijne połączenie natury i tradycji."
 building_tribal_holding_arrival_04_desc: "Rustykalny urok miejsca znanego jako [location.GetTitle.GetNameNoTier] napełnia mnie niecierpliwym wyczekiwaniem i chęcią uczenia się."
 building_tribal_holding_arrival_05_desc: "Gdy wchodzę do miejsca znanego jako [location.GetTitle.GetNameNoTier], uderza mnie prostota i ciepło miejscowej społeczności."
 building_religious_learning_outro_01_desc: "Wizyta ta pogłębiła moją wiedzę na temat wierzeń i praktyk duchowych, które ukształtowały cywilizacje."
 building_religious_learning_outro_02_desc: "Zwiedzanie tego świętego miejsca pogłębiło moją wiedzę na temat przemożnego wpływu wiary na historię i kulturę ludzkości."
 building_religious_learning_outro_03_desc: "Moja podróż tutaj rzuciła światło na różnorodne sposoby wyrażania czci i pobożności religijnej na przestrzeni dziejów."
 building_diplomatic_learning_outro_01_desc: "To doświadczenie poszerzyło moje wyobrażenie o złożoności i niuansach stosunków dyplomatycznych i umiejętnościach rządzenia krajem."
 building_diplomatic_learning_outro_02_desc: "Opuszczam to miejsce z większym uznaniem dla skomplikowanej sztuki dyplomacji i subtelności sojuszy politycznych."
 building_diplomatic_learning_outro_03_desc: "Pobyt tutaj pozwolił mi lepiej zrozumieć delikatną równowagę sił i kluczową rolę, jaką dyplomacja odgrywa w kształtowaniu historii."
 building_martial_learning_outro_01_desc: "Umiejętność walki i strategiczne spostrzeżenia, jakie udało mi się zdobyć podczas tej wizyty, znacznie poszerzyły moją wiedzę na temat wojny."
 building_martial_learning_outro_02_desc: "Zwiedzanie tego miejsca dostarczyło mi cennych lekcji w zakresie taktyki wojskowej i sztuki wojennej, które są niezwykle istotne dla każdego przywódcy."
 building_martial_learning_outro_03_desc: "Udało mi się zdobyć znaczącą wiedzę na temat strategii bitewnych i znaczenia umiejętności walki w kształtowaniu biegu historii."
 building_economic_learning_outro_01_desc: "Moja wizyta pozwoliła mi lepiej zrozumieć zasady ekonomii i kluczową rolę, jaką handel odgrywa w dobrobycie narodów."
 building_economic_learning_outro_02_desc: "Zwiedzanie tego miejsca pogłębiło moją wiedzę na temat zawiłości rozwoju gospodarczego."
 building_economic_learning_outro_03_desc: "Opuszczam to miejsce z bogatszą perspektywą na kluczowe znaczenie obycia ekonomicznego w utrzymaniu potęgi państw."
 building_man_made_wonder_learning_outro_01_desc: "Pomysłowość i kunszt, które tu można zaobserwować, pozostawiły we mnie niezatarte wrażenie ludzkiej kreatywności i ambicji."
 building_man_made_wonder_learning_outro_02_desc: "Ten cud architektury sprawił, że bardziej doceniam, jak wiele można osiągnąć dzięki ludzkiemu wysiłkowi."
 building_man_made_wonder_learning_outro_03_desc: "Opuszczam to miejsce, czerpiąc inspiracje z niezwykłego dziedzictwa kunsztu architektonicznego, które jest świadectwem naszego potencjału."
 building_natural_wonder_learning_outro_01_desc: "Zapierające dech w piersiach piękno i majestat tego naturalnego cudu niezwykle pogłębiły moje uznanie dla wspaniałości świata."
 building_natural_wonder_learning_outro_02_desc: "Wizyta ta wywołała we mnie głęboki podziw dla świata przyrody i niezliczonych jej cudów."
 building_natural_wonder_learning_outro_03_desc: "Opuszczam to miejsce, odzyskawszy szacunek dla budzących podziw mocy i piękna natury oraz jej zdolności kształtowania naszego świata i perspektyw."
 building_exploration_01_desc: "Z niecierpliwością rozpoczynam zwiedzanie!"
 building_exploration_02_desc: "Niecierpliwie ruszam przed siebie, otwierając szeroko oczy z ciekawości!"
 building_exploration_03_desc: "Już nie mogę się doczekać, by zagłębić się w cuda tego miejsca!"
 building_exploration_04_desc: "Z zachwytem ruszam, by odkrywać każdy zakamarek!"
 building_exploration_05_desc: "Czuję dreszczyk emocji. Wyruszam, by chłonąć wiedzę, którą obiecuje to miejsce!"
 building_exploration_06_desc: "Z radością rozpoczynam zwiedzanie!"
 building_exploration_07_desc: "Z uśmiechem rozpoczynam wędrówkę po tym miejscu!"
 building_exploration_08_desc: "Przepełnia mnie poczucie przygody. Towarzyszy mi ono, gdy ruszam, by zwiedzić to miejsce!"
 building_exploration_09_desc: "Z niecierpliwością rozpoczynam zwiedzanie, a każdy krok jest pełen oczekiwania!"
 building_exploration_10_desc: "Z wielkim entuzjazmem przemierzam to miejsce!"
 building_exploration_11_desc: "Czuję ducha przygody. Chętnie odkryję bogatą historię tego miejsca!"
 building_exploration_12_desc: "Z entuzjazmem zaczynam zwiedzanie!"
 building_exploration_13_desc: "Z niecierpliwością wyruszam w podróż po tym miejscu, wypatrując odkryć, które na mnie czekają!"
 building_exploration_14_desc: "Przepełnia mnie poczucie ekscytacji. Zagłębiam się w to miejsce, nie mogąc doczekać się widoków, które oferuje!"
 building_exploration_15_desc: "Rozpoczynam zwiedzanie z poczuciem szacunku. Chcę poznać dziedzictwo tego miejsca!"
 building_exploration_16_desc: "Czuję niebywałą ekscytację. Wędruję, czekając, aż piękno tego miejsca mnie oczaruje!"
 building_exploration_17_desc: "Rozpoczynam zwiedzanie w świetnym nastroju!"
 building_exploration_18_desc: "Rozpoczynam moją wędrówkę po tym miejscu z olbrzymim zaciekawieniem!"
 building_exploration_19_desc: "Z wielką radością wyruszam zwiedzać!"
 building_exploration_20_desc: "Rozpoczynam zwiedzanie, czując przemożną chęć doświadczenia wspaniałości, którą ucieleśnia to miejsce!"
 travel_destinations.1000.t: "Zwiedzanie miejsca o nazwie [location.GetNameNoTooltip]"
 travel_destinations.1000.desc: "[location.Custom('GetTouristHoldingIntro')]\n\n[location.Custom('GetSpecialBuildingTouristDescriptor')]\n\n[location.Custom('GetTouristStartEventOutro')]"
 the_with_space: "$articleblank_blank$"
 travel_start_event.1090.t_activity_roaming: "$activity_roaming$: znów w drodze"
 travel_start_event.1090.t_activity_journey: "Wyprawa: w stronę miejsca znanego jako [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip]!"
 travel_start_event.1090.t_activity_survey: "$activity_survey$: nadzór nad ziemiami"
 travel_start_event.1000.norwegian: "Ut på tur, aldri sur!"
 travel_start_event.1090.desc_activity_roaming: "Nareszcie droga stoi przede mną otworem! Wkrótce postawię stopę na terenie znanym jako [location.Custom('TerrainTypeProvince')] w pięknym miejscu o nazwie [location.GetName].\n\nOch, jakże brakowało mi tego, co można tam spotkać – [location.Custom('GetProvinceFoliageDesc')] i słodko pachnące [location.Custom('get_region_flower_type_plural')]. [location.Custom('GetRandomRegionalWildDaytimeBirdProvince')|U] to piękny ptak, a tam można zobaczyć, jak latają po niebie całymi stadami!\n\nMuszę ruszać!"
 travel_start_event.1090.desc_activity_journey: "Droga do miejsca znanego jako [location.GetName] jest długa, ale nie mogę się doczekać, aby odkryć wszystkie tamtejsze tajemnice. [location.GetHolding.GetSpecialBuildingType.GetName] i [location.GetCulture.GetCollectiveNoun] z miejsca o nazwie [location.GetCounty.GetTitle.GetNameNoTier], którzy tam mieszkają, nic przede mną nie ukryją! [ROOT.Char.Custom('IntentInitialEventDesc')]\n\nChcę być już na miejscu. Musimy się pospieszyć!"
 knowledge_hoarding_1: "Będę robić mnóstwo notatek i chłonąć każdy skrawek wiedzy, jaki uda mi się znaleźć."
 knowledge_hoarding_2: "Przygotuję wyczerpujące notatki i przyswoję każdy dostępny strzęp informacji."
 knowledge_hoarding_3: "Zamierzam zebrać szczegółowe dane i wykorzystać każdą możliwą wiedzę."
 curiosity_1: "Z niecierpliwością wyczekuję spotkań z miejscowymi mieszkańcami. Mam nadzieję, że uda mi się zagłębić w ich historie i tradycje."
 curiosity_2: "Perspektywa nawiązania kontaktu z miejscową społecznością i korzystania z jej doświadczeń napełnia mnie radością."
 curiosity_3: "Moje podekscytowanie rośnie na myśl o spotkaniu z osobami, które nazywają to miejsce domem i dzielą się swoimi opowieściami i mądrością."
 spread_legend_1: "Wplotę opowieść znaną jako „[ROOT.Char.GetPromotedLegend.GetName]” w strukturę tego miejsca, pozostawiając jej ślad w historii."
 spread_legend_2: "Moja podróż jest także misją: mam szerzyć renomę opowieści znanej jako „[ROOT.Char.GetPromotedLegend.GetName]”, czyniąc ją częścią lokalnej tradycji."
 spread_legend_3: "Chcę, by ludzie, których spotykam, doceniali opowieść znaną jako „[ROOT.Char.GetPromotedLegend.GetName]” oraz by ta legenda rosła z każdym jej kolejnym przekazem."
 travel_start_event.1090.desc_activity_survey: "Czas wziąć sprawy w swoje ręce. Osobiście będę nadzorować prace w miejscu znanym jako [location.GetName]. [root_scope.Custom('RegionalFarmAnimal')|U], fortyfikacja, miecz czy worek zboża – policzę wszystko co do jednej sztuki! Moje państwo będzie najlepiej zarządzanym państwem, jakie istnieje. Ruszajmy!"
