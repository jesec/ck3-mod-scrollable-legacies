 #Historical Battles
 TRAVEL_POINT_OF_INTEREST_TT_poi_battles_historical: "#T $TRAVEL_POINT_OF_INTEREST_TT_poi_battles_historical_name$#!\n$TRAVEL_POINT_OF_INTEREST_TT_poi_battles_historical_desc$\n\n"
 TRAVEL_POINT_OF_INTEREST_TT_poi_battles_historical_name: "[Province.Custom('BattlePoiNameHistorical')]"
 TRAVEL_POINT_OF_INTEREST_TT_poi_battles_historical_desc: "[Province.Custom('BattlePoIDescriptionHistorical')]"
 travel_point_historical_name_visit_message: "[ROOT.Char.GetCurrentLocation.Custom('BattlePoiNameHistorical')]"
 BattlePoIHistoricalNameTours: "Bitwa pod Tours"
 BattlePoIHistoricalDescTours: "#emp Zwycięzca: [GetScriptedCharacterByHistoryID( '131721' ).GetFirstNameNicknamed]\nPokonany: Abd ar-Rahman Ghafiki\nData: 10 października 732 n.e.#!\n#weak Bitwa, w której Karol Młot odparł inwazję Umajjadzich na Francję nad rzekami Clain i Vienne. Mówi się, że ludzie Karola byli niewzruszeni niczym mur, ścinając szarżującą ciężką kawalerię przeciwnika. Gdy wytropili i zabili dowódcę Umajjadzich, ci uciekli z pola bitwy.#!"
 BattlePoIHistoricalNameLechfeld: "Bitwa na Lechowym Polu"
 BattlePoIHistoricalDescLechfeld: "#emp Zwycięzca: [GetScriptedCharacterByHistoryID( '1282' ).GetTitledFirstName]\nPokonany: [GetScriptedCharacterByHistoryID( '460' ).GetFirstName] z rodu [GetScriptedCharacterByHistoryID( '460' ).GetDynastyName]\nData: 10 sierpnia 955 n.e.#!\n#weak Brutalna bitwa pomiędzy siłami saskiego króla Ottona a siłami węgierskimi. Po odniesieniu druzgocących strat przez obie strony Węgrzy uciekli, gdy mieli zostać otoczeni i zobaczyli, że przebieg bitwy obraca się przeciwko nim.\n\nPo zakończeniu bitwy schwytano i stracono wielu węgierskich dowódców oraz ostatecznie wyeliminowano zagrożenie ze strony Madziarów dla zachodniej Europy.#!"
 BattlePoIHistoricalNameHastings: "Bitwa pod Hastings"
 BattlePoIHistoricalDescHastings: "#emp Zwycięzca: [GetScriptedCharacterByHistoryID( '140' ).GetFirstName] z rodu [GetScriptedCharacterByHistoryID( '140' ).GetDynastyName]\nPokonany: [GetScriptedCharacterByHistoryID( '122' ).GetFullName]\nData: 14 października 1066 n.e.#!\n#weak Bitwa pod Hastings była jedną z kluczowych bitew w drodze Wilhelma do władzy nad Anglią. Zmuszona do walki pod górę, armia normańska z trudem robiła postępy, a nawet w pewnym momencie zaczęła się wycofywać, lecz Wilhelmowi udało się zreorganizować kontratak na wojska angielskie.\n\nPrzytłoczony przez siły wroga, Harold zginął wraz ze swoimi dwoma braćmi o imionach [GetScriptedCharacterByHistoryID( '132' ).GetFirstNameNoTooltip] i [GetScriptedCharacterByHistoryID( '130' ).GetFirstNameNoTooltip], pozostawiając angielski tron bez władcy.#!"
 BattlePoIHistoricalNameStamfordBridge: "Bitwa pod Stamford Bridge"
 BattlePoIHistoricalDescStamfordBridge: "#emp Zwycięzca: [GetScriptedCharacterByHistoryID( '122' ).GetFullName]\nPokonany: [GetScriptedCharacterByHistoryID( '102531' ).GetNameNicknamed]\nData: 25 września 1066 n.e.#!\n#weak Bitwa pod Stamford Bridge była jednym z kluczowych starć pomiędzy trzema pretendentami do angielskiego tronu: Wilhelmem z Normandii, Haraldem z Norwegii i Haroldem z Anglii. Pędząc na północ ze swoimi ludźmi, Harold zdołał zaskoczyć wojska norweskie i zmusić je do bitwy, na którą nie były przygotowane.\n\nHarald zginął, trafiony strzałą w tchawicę, a na polu walki poległ też jego angielski sojusznik – [GetScriptedCharacterByHistoryID( '124' ).GetFirstNameNoTooltip], brat Harolda. Pozbawiona dowódców armia norweska została po bitwie unicestwiona.#!"
 BattlePoIHistoricalNameManzikert: "Bitwa pod Manzikertem"
 BattlePoIHistoricalDescManzikert: "#emp Zwycięzca: [GetScriptedCharacterByHistoryID( '3040' ).GetFirstName] z rodu [GetScriptedCharacterByHistoryID( '3040' ).GetDynastyName]\nPokonany: [GetScriptedCharacterByHistoryID( '1734' ).GetFullName]\nData: 26 sierpnia 1071 n.e.#!\n#weak Roman, koronowany na cesarza Imperium Bizantyjskiego w 1068 r., poprowadził kampanię przeciwko tureckim najazdom na Anatolię. Po umiarkowanych sukcesach próbował odnieść decydujące zwycięstwo w bitwie z Arp Arslanem z Imperium Seldżuków w pobliżu Manzikert.\n\nRomanos został zdradzony przez jednego ze swoich dowódców, który wycofał się z dużą częścią swojej armii, a następnie schwytany przez wojska muzułmańskie. Później, choć uwolniony przez wroga, został zdetronizowany, oślepiony i wygnany, a po wszystkim zmarł z powodu odniesionych ran.#!"
 BattlePoIHistoricalNameYarmuk: "Bitwa nad rzeką Jarmuk"
 BattlePoIHistoricalDescYarmuk: "#emp Zwycięzca: [GetScriptedCharacterByHistoryID( '163015' ).GetFullName]\nPokonany: [GetScriptedCharacterByHistoryID( '145071' ).GetFullName]\nData: 20 sierpnia 636 n.e.#!\n#weak Bitwa nad rzeką Jarmuk jest jedną z najważniejszych bitew w historii Bizancjum. Zdecydowana porażka doprowadziła do odniesienia przez to imperium strat w Syrii i Egipcie oraz wielkiej ekspansji imperium arabskiego.\n\nTrwająca sześć dni bitwa początkowo toczyła się na niekorzyść muzułmańskich najeźdźców, lecz gdy nad rzeką Jarmuk wzeszedł piąty dzień, zmienili oni strategię z defensywnej na ofensywną, a szóstego dnia zaangażowali swoją kawalerię do śmiałej szarży, która rozbiła bizantyjską armię.\n\nMorale bizantyjskich żołnierzy upadły, a ci wpadali do wąwozów, tonęli lub ginęli, miażdżeni przez żołnierzy wroga, gdy uciekali z pola bitwy.#!"
 BattlePoIHistoricalNameDandanaqan: "Bitwa pod Dandankanem"
 BattlePoIHistoricalDescDandanaqan: "#emp Zwycięzca: [GetScriptedCharacterByHistoryID( '3036' ).GetFullName]\nPokonany: [GetScriptedCharacterByHistoryID( '144129' ).GetFullName]\nData: 23 maja 1040 n.e.#!\n#weak Ważna bitwa między rosnącą potęgą Seldżuków w północnej Persji a imperium Ghaznawidów. Po pokonaniu sił Seldżuków w pierwszych bitwach wojska Ghaznawidów zaczęły kłócić się o pozostawione łupy.\n\nZdezorganizowane i nieprzygotowane do bitwy oddziały zostały zaskoczone powrotem sił Seldżuków. Nękane, wygłodzone i zdemoralizowane wojska Ghaznawidów upadły, zmiażdżone przez swoich przeciwników.#!"
 BattlePoIHistoricalNameAror: "Bitwa pod Aror"
 BattlePoIHistoricalDescAror: "#emp Zwycięzca: Muhammad ibn al-Kasim\nPokonany: radża Dahir\nData: 711 n.e.#!\n#weak Bitwa mająca miejsce podczas inwazji Umajjadzich na Indie, stoczona pomiędzy radżą Sindhów a cesarstwem Umajjadzich.\n\nChociaż jego przeciwnicy byli początkowo liczniejsi, dowódca Umajjadów zdołał uzyskać lepszą pozycję dla swojej armii przed przystąpieniem do bitwy. W trakcie konfliktu ta nierównowaga doprowadziła do powolnego przejmowania kontroli nad przebiegiem bitwy przez siły muzułmańskie, a ich zwycięstwo zostało zapewnione w momencie śmierci radży Dahira.#!"
 BattlePoIHistoricalNameSvolder: "Bitwa pod Svold"
 BattlePoIHistoricalDescSvolder: "#emp Zwycięzca: [GetScriptedCharacterByHistoryID( '101505' ).GetFullName]\nPokonany: [GetScriptedCharacterByHistoryID( '144004' ).GetFullName]\nData: 9 września 999 n.e.#!\n#weak Bitwa między siłami norweskimi Olafra Tryggvasona a koalicją sił duńskich i szwedzkich dowodzonych przez króla Danii Sveinna.\n\nMimo ogromnej przewagi liczebnej przeciwnika norweski król odmówił ucieczki przed wrogą koalicją i zaangażował Szwedów i Duńczyków w bitwę, nazywając ich „pożeraczami koni” i „leśnymi kozami”.\n\nOstatecznie armia norweska, choć zadała ciężki cios wrogowi, została zmiażdżona. Olafr zaginął w bitwie i najprawdopodobniej zmarł.#!"
 BattlePoIHistoricalNameCivitate: "Bitwa pod Civitate"
 BattlePoIHistoricalDescCivitate: "#emp Zwycięzca: [GetScriptedCharacterByHistoryID( '1126' ).GetFullName]\nPokonany: [GetScriptedCharacterByHistoryID( '1338' ).GetFullName]\nData: 18 czerwca 1053 n.e.#!\n#weak Bitwa między Normanami a koalicją dowodzoną przez papieża, w tym Niemcami i miejscowymi Włochami.\n\nPomimo przewagi liczebnej koalicja papieska nie była w stanie przebić się przez normańską piechotę w centrum bitwy, a jej kawaleria przegrała bitwę z kawalerią normańską.\n\nNiedługo po bitwie sam papież został pojmany przez Normanów, co doprowadziło do zakończenia konfliktu.#!"
 BattlePoIHistoricalNameTalas: "Bitwa nad rzeką Tałas"
 BattlePoIHistoricalDescTalas: "#emp Zwycięzca: kalifat Abbasydów\nPokonany: dynastia Tangów\nData: 751 n.e.#!\n#weak Przedłużający się konflikt między kalifatem Abbasydów, rozszerzającym się na Transoksanię od południowego zachodu, a dynastią Tangów rozszerzającą się na kalifat od wschodu.\n\nPoczątkowo ciężka piechota dynastii Tangów i jej tureccy najemnicy odgrywali ważną rolę w odpieraniu sił Abbasydów, ale gdy najemnicy zmienili strony, a wielu sojuszników ich zdradziło, Tangowie zostali zmuszeni do odwrotu.\n\nKonflikt ten oznaczał koniec ekspansji Tangów na zachód, a Transoksania na jakiś czas znalazła się w rękach muzułmanów.#!"
 BattlePoIHistoricalNameSufuku: "Bitwa pod Subushi"
 BattlePoIHistoricalDescSufuku: "#emp Zwycięzca: Emishi z Isawy\nPokonany: [GetScriptedCharacterByHistoryID( 'japanese_iruma_1' ).GetFullName]\nData: 789 n.e.#!\n#weak Ważna bitwa w ramach japońskiego podboju Emishi.\n\nSiły japońskie zostały początkowo podzielone na dwie grupy, posuwając się naprzód po obu stronach rzeki Kitakami w ślad za wycofującymi się Emishi. Strzelcy Emishi uniemożliwili Japończykom przekroczenie wody, osaczając znaczną część z nich między rzeką a górami.\n\nZałamanie się ofensywy Japonii było wielką kompromitacją, a wielu żołnierzy, chcąc umknąć śmierci, przepłynęło rzekę nago. Armia została rozwiązana, a [GetScriptedCharacterByHistoryID( 'japanese_yamato_24' ).GetFullName] surowo skarcił swoich dowódców.#!"
 BattlePoIHistoricalNameBaekgang: "Bitwa pod Baekgang"
 BattlePoIHistoricalDescBaekgang: "#emp Zwycięzca: królestwo Silla i Chiny dynastii Tangów\nPokonany: [GetScriptedCharacterByHistoryID( 'japanese_abe_36' ).GetFullName]\nData: 663 n.e.#!\n#weak Decydującą bitwą morską była potyczka między Chinami dynastii Tangów i królestwem Silla a siłami ruchu odrodzenia królestwa Baekje i ich japońskimi sojusznikami.\n\nBitwa toczyła się głównie na rzece Baengmie. Choć siły japońskie miały przewagę liczebną, flota Tangów utrzymała pozycję i przeprowadziła kontratak, otaczając i ostatecznie pokonując flotę japońską.\n\nZdecydowane zwycięstwo królestwa Silla i dynastii Tangów zmusiło Japonię do całkowitego odsunięcia się od spraw koreańskich, a ruch odrodzenia królestwa Baekje został zdławiony.#!"
 BattlePoIHistoricalNamePalembang: "Atak Ćolów na Palembang"
 BattlePoIHistoricalDescPalembang: "#emp Zwycięzca: [GetScriptedCharacterByHistoryID( '189038' ).GetFullName]\nPokonany: [GetScriptedCharacterByHistoryID( 'javanese_sailendra_25' ).GetFullName]\nData: 1025 n.e.#!\n#weak Nagły atak wojsk Ćolów na stolicę królestwa Śriwidżaja w Palembang.\n\nSiły Ćolów dotarły za morze i szybko podbiły stolicę, plądrując ją i niszcząc.\n\nUpadek Palembang spowodował całkowite załamanie się cesarstwa Śriwidżaja, a wpływy Ćolów w regionie utrzymywały się jeszcze przez dziesięciolecia.#!"
 BattlePoIHistoricalNameAngkor: "Oblężenie Angkoru"
 BattlePoIHistoricalDescAngkor: "#emp Zwycięzca: [GetScriptedCharacterByHistoryID( 'cham_panduranga_04' ).GetFullName]\nPokonany: [GetScriptedCharacterByHistoryID( 'khmer_tribhuvanaditya_01' ).GetFullName]\nData: 1177 n.e.#!\n#weak Okres walk wewnętrznych i zamachów stanu w królestwie Kambudży skutkował dojściem do władzy Tribhuwanaditjego, osoby niebędącej członkiem rodziny królewskiej. Podczas walk z buntownikami popierającymi innych pretendentów do tronu królestwo Czampy najechało Kambudżę.\n\nSiły Czampy posuwały się naprzód wzdłuż rzeki Mekongu i jeziora Tonle Sap, plądrując stolicę Angkoru i zabijając Tribhuwanaditjego.\n\nPo oblężeniu królestwo Kambudży upadło, a Czamowie zabrali łupy ze sobą lub rozdali je w okolicy.#!"
 BattlePoIHistoricalNameSongping: "Oblężenie Songping"
 BattlePoIHistoricalDescSongping: "#emp Zwycięzca: Yang Sijin\nPokonany: Cai Xi\nData: 863 n.e.#!\n#weak Zamieszki w protektoracie dynastii Tangów w Annan sprawiły, że sąsiednie królestwo Nanzhao sprzymierzyło się z miejscowymi plemionami i zaatakowało region przytłaczającą siłą.\n\nArmia Nanzhao i jej sojusznicy oblegali miasto przez pewien czas, zanim ostatecznie przedarli się do wewnętrznej części miasta. Obrońcy stawili ostatni opór przy wschodniej bramie, gdzie przed upadkiem zasadzili się jeszcze na konnych wroga, zabijając wielu z nich.\n\nChoć początkowo siły Nanzhao zostały przyjęte z zadowoleniem przez ludność wietnamską, splądrowały one region, a kontratak wojsk Tangów w 864 r. ostatecznie pozwolił odzyskać cały obszar.#!"
 BattlePoIHistoricalNameMuye: "Bitwa pod Muye"
 BattlePoIHistoricalDescMuye: "#emp Zwycięzca: król Wu\nPokonany: cesarz Zhou z dynastii Shangów\nData: 1046 p.n.e.#!\n#weak Bitwa pod Muye została stoczona między zbuntowanym królem Wu a cesarzem Zhou z dynastii Shangów.\n\nSiły Wu były początkowo w mniejszości, ale wojska Shangów, składające się głównie z niewolników wojskowych, okazały się niegodne zaufania i uciekły z pola bitwy. Ostatecznie siły rebeliantów pod wodzą króla Wu odniosły bardzo krwawe zwycięstwo.\n\nBitwa doprowadziła do upadku dynastii Shangów i przejęcia mandatu niebios przez króla Wu, który założył nową dynastię Zhou.#!"
 BattlePoIHistoricalNameRedCliffs: "Bitwa o Czerwone Klify"
 BattlePoIHistoricalDescRedCliffs: "#emp Zwycięzca: Sun Quan\nPokonany: Cao Cao\nData: 208 n.e.#!\n#weak Bitwa o Czerwone Klify była batalią rzeczną stoczoną między koalicją watażków a północnym watażką Cao Cao w okresie schyłkowym panowania dynastii Hanów. Cao Cao próbował ustanowić przyczółek na rzece Jangcy, aby przedostać się do południowych Chin.\n\nUdając kapitulację, siły sprzymierzone zdołały zwabić statki Cao Cao w pułapkę; podpaliły je, przez co w płomieniach zginęło wielu żołnierzy wraz ze swoimi końmi. Armia północna pogrążyła się w chaosie i poniosła klęskę.\n\nPorażka ta uniemożliwiła Cao Cao przekroczenie rzeki Jangcy i zapoczątkowała okres Trzech Królestw.#!"
 BattlePoIHistoricalNameGuandu: "Bitwa pod Guandu"
 BattlePoIHistoricalDescGuandu: "#emp Zwycięzca: Cao Cao\nPokonany: Yuan Shao\nData: 200 n.e.#!\n#weak Bitwa pod Guandu została stoczona między watażkami Cao Cao i Yuan Shao pod koniec okresu panowania wschodniej dynastii Hanów. Obaj zdobyli wówczas znaczną władzę i stanowili dla siebie główne przeszkody w przejęciu kontroli nad Chinami.\n\nSiły Cao Cao ustępowały wrogowi podczas starcia liczebnością, jednak dzięki przemyślanej taktyce – w tym niespodziewanemu najazdowi na magazyn zaopatrzeniowy Yuan Shao – zdołały osłabić armię przeciwnika.\n\nBitwa ta była punktem zwrotnym epoki; Cao Cao odniósł zwycięstwo i utorował drogę do powstania przyszłego państwa Cao Wei w okresie Trzech Królestw.#!"
 BattlePoIHistoricalNameYiling: "Bitwa pod Yiling"
 BattlePoIHistoricalDescYiling: "#emp Zwycięzca: Lu Xun – Sun Wu\nPokonany: Liu Bei – Shu Han\nData: 221 n.e.#!\n#weak Próbując odzyskać utracone terytoria w prowincji Jing, Liu Bei osobiście poprowadził swoje armie do ataku na Sun Wu, odnosząc początkowy sukces.\n\nPodczas bitwy siły Liu Beiego zostały zwabione w pułapkę przez generała Lu Xuna, który podpalił obóz Shu Han, zmuszając wroga do odwrotu. Ostatecznie Liu Bei zdołał opuścić pole bitwy i nakazał swoim żołnierzom podpalenie pancerzy, tworząc w ten sposób zaporę ogniową przed atakującymi.\n\nBitwa zakończyła się zdecydowaną porażką Liu Beiego i doprowadziła do zakończenia jego kampanii, a następnie – jego śmierci.#!"
 BattlePoIHistoricalNameFeiRiver: "Bitwa nad rzeką Fei"
 BattlePoIHistoricalDescFeiRiver: "#emp Zwycięzca: Xie An – Jin\nPokonany: Fu Jian – Wcześniejsze Qin\nData: 383 n.e.#!\n#weak Bitwa stanowiła zwieńczenie dłuższej kampanii, w której Wcześniejsze Qin, po zjednoczeniu wielu różnych plemion obcych, przejęło kontrolę nad znacznymi częściami ziem Jin. Armie Qin miały znaczną przewagę liczebną nad wojskami Jin, które stanęły do walki nad rzeką Fei.\n\nPodczas bitwy zdyscyplinowane i dobrze wyszkolone oddziały Jin rozgromiły znacznie liczniejsze, ale niezorganizowane i pozbawione motywacji wojska Qin.\n\nPokonanie sił Qin przez Jin przy minimalnych stratach znacząco zmieniło układ sił i zapewniło południowym Chinom niezależność na ponad 100 lat.#!"
 BattlePoIHistoricalNameCanheSlope: "Bitwa na zboczu Canhe"
 BattlePoIHistoricalDescCanheSlope: "#emp Zwycięzca: Touba Gui – Północne Wei\nPokonany: Murong Bao – Późniejsze Yan\nData: 395 n.e.#!\n#weak Bitwa była wynikiem konfliktu, w którym dynastia Późniejszego Yan przeprowadziła kampanię odwetową przeciwko dynastii Północnego Wei.\n\nGdy wojska Późniejszego Yan dotarły do zbocza Canhe, zaskoczyła je tam nagła burza, a w niej – zasadzka wroga. W szeregach armii Późniejszego Yan zapanował chaos, a wielu żołnierzy rzuciło się w wody rzeki Huang He.\n\nBitwa ostatecznie odwróciła dynamikę władzy w regionie, a Północne Wei przejęło większość terytorium Późniejszego Yan.#!"
 BattlePoIHistoricalNameXiangji: "Bitwa w pobliżu świątyni Xiangji"
 BattlePoIHistoricalDescXiangji: "#emp Zwycięzca: [GetScriptedCharacterByHistoryID( 'han_1528' ).GetFullName]\nPokonany: [GetScriptedCharacterByHistoryID( 'an_qingxu' ).GetFullName]\nData: 757 n.e.#!\n#weak Bitwa ta była kulminacją kontrataku wojsk dynastii Tangów na siły rebeliantów, które przejęły kontrolę nad większością północnych Chin, i jedną z najkrwawszych bitew powstania An Lushan. Dwie ogromne armie starły się na północ od Chang’an, w pobliżu świątyni Xiangji.\n\nDo południa armia Tangów zajęła wzniesienie, podczas gdy armia Yan utrzymywała pozycje przed samym Chang’an. Po kilku manewrach starcie przerodziło się w długotrwały impas, w którym zdyscyplinowane oddziały walczyły zaciekle, aż front Yan ostatecznie załamał się z powodu ogromnych strat.\n\nBrutalność bitwy zdziesiątkowała obie armie, ale złamała opór rebelii. Siły Tangów zdołały odbić Chang’an następnego dnia.#!"
 BattlePoIHistoricalNameGaoliang: "Bitwa nad rzeką Gaoliang"
 BattlePoIHistoricalDescGaoliang: "#emp Zwycięzca: [GetScriptedCharacterByHistoryID( '194330' ).GetFullName]\nPokonany: [GetScriptedCharacterByHistoryID( 'han_4801' ).GetFullName]\nData: 979 n.e.#!\n#weak Bitwa była następstwem próby odzyskania przez dynastię Songów 16 prefektur podbitych w 960 n.e. przez dynastię Liao. Bitwie osobiście przewodził brat cesarza (przyszły cesarz [GetScriptedCharacterByHistoryID( 'han_4801' ).GetFullNameNoTooltip]).\n\nMiasto Youzhou było oblegane przez trzy miesiące, zanim przybyły posiłki z rodu Liao, aby odciążyć obrońców. Początkowo zwycięska armia Songów została zaskoczona nocnym atakiem nadciągającym z trzech kierunków.\n\nPo zakończeniu bitwy [GetScriptedCharacterByHistoryID( 'han_4801' ).GetFullNameNoTooltip] uciekł z pola walki na wozie zaprzęgniętym w osła. Była to pierwsza poważna porażka dynastii Songów po dojściu do władzy.#!"
