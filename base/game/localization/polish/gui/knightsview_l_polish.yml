 #this is can_be_knight_trigger in 00_war_and_peace_triggers.txt
 KNIGHT_RESTRICTIONS_TT: "#T Ograniczenia dotyczące rycerzy#!\nTylko twoi [courtiers|El], [followers|El] lub [vassals|El] bezpośredni mogą służyć jako [knights|El].\nO płci postaci, które mogą zostać [Concept('knights', 'rycerzami')|E], decyduje twoja [culture|El] lub [faith|El].\n\nRycerzem nie może zostać:\n– gracz, [child|El], [prisoner|El] lub [GetTrait('incapable').GetName(GetPlayer.Self)|l];\n– członek [Concept('clergy', 'duchowieństwa')|E] (chyba że pozwala na to [faith|El] lub [culture|El]);\n– [master_assassin|El] lub [GetTrait('blind').GetName(GetPlayer.Self)|l] (chyba że pozwala na to [culture|El] lub postać ma cechę [GetTrait('order_member').GetName(GetPlayer.Self)|l]);\n– [diarch|El] lub [ceremonial_liege|El];\n– [governor|El] [Concept('duchy', 'księstwa')|E] (bądź wyższego [Concept('title', 'tytułu')|E]) lub [house_head|El] w [Concept('noble_family', 'rodzinie szlacheckiej')|E].\n\n[traditions|E] kulturowe i wydarzenia mogą spowodować zniesienie niektórych ograniczeń"
 KP_CULTURE_MINIMUM_PROWESS: "@alert_icon! Twoja [culture|El] wymaga co najmniej 12 pkt [Concept('prowess', 'waleczności')|E]"
 KP_CULTURE_ADMIN_FAMILY_KNIGHTS: "@check_icon! Twoja [culture|El] znosi pewne ograniczenia dotyczące płci w przypadku [Concept('wars', 'wojen')|E] obronnych"
 KP_CULTURE_HIGH_PROWESS: "@check_icon! Twoja [culture|El] znosi większość ograniczeń dla [Concept('knights', 'rycerzy')|E] mających co najmniej 10 pkt [Concept('prowess', 'waleczności')|E]"
