 KNIGHTS_VIEW_TITLE_FORBID_TT: "#T Zabroń postaci [Character.GetShortUINameNotMe] dołączenia do $knight_culture_player_plural_possessive_no_tooltip_lowercase$#!\n\n[Character.GetShortUINameNotMe] #emphasis nigdy nie dołączy#! do twoich [Concept('armies', 'armii')|E] jako $knight_culture_player_no_tooltip$. Ta decyzja uchroni tą postać przed śmiercią w [Concept('battle', 'bitwie')|E]."
 CREATE_ACCOLADE_FORBID_TT: "#T Zabroń postaci, którą jest [CreateAccoladeView.GetSelectedKnight.GetShortUINameNotMe], służby jako [GetPlayer.Custom('KnightCulture')|l]#!\n\n[CreateAccoladeView.GetSelectedKnight.GetShortUINameNotMe] #emphasis nigdy#! nie dołączy do twoich [Concept('armies', 'armii')|E] jako [GetPlayer.Custom( 'KnightCultureNoTooltip' )|l]. Ta decyzja uchroni tę postać przed śmiercią w [Concept('battle', 'bitwie')|E]."
 KNIGHTS_VIEW_TITLE_BY_PROWESS_TT: "#T Pozwól postaci [Character.GetShortUINameNotMe] dołączyć do $knight_culture_player_plural_possessive_no_tooltip_lowercase$#!\n\n[Character.GetShortUINameNotMe] może dołączyć do twojej [Concept('armies', 'armii')|E] jako $knight_culture_player_no_tooltip_lowercase$ jeśli [Character.GetHerHis] poziom [Concept( 'prowess', 'waleczności' )|E] jest jednym z najwyższych w [Concept('realm', 'państwie')|E]"
 CREATE_ACCOLADE_BY_PROWESS_TT: "#T Pozwól postaci, którą jest [CreateAccoladeView.GetSelectedKnight.GetShortUINameNotMe], służyć jako [GetPlayer.Custom('KnightCulture')|l]#!\n\n[CreateAccoladeView.GetSelectedKnight.GetShortUINameNotMe] może dołączyć do twoich [Concept('armies', 'armii')|E] jako [GetPlayer.Custom( 'KnightCultureNoTooltip' )|l], jeśli [CreateAccoladeView.GetSelectedKnight.GetHerHis] poziom [Concept('prowess', 'waleczności')|E] jest jednym z najwyższych w [Concept('realm', 'państwie')|E]"
 KNIGHTS_VIEW_TITLE_FORCE_TT: "#T Wymuś na postaci [Character.GetShortUINameNotMe] dołączenie do $knight_culture_player_plural_possessive_no_tooltip_lowercase$#!\n\n[Character.GetShortUINameNotMe] #emphasis musi#! dołączyć do twojej [Concept('armies', 'armii')|E] jako $knight_culture_player_no_tooltip_lowercase$, niezależnie od [Character.GetHerHis] poziomu [Concept('prowess', 'waleczności')|E]. Może zająć miejsce $knight_culture_player_plural_possessive_no_tooltip_lowercase$ z wyższą walecznością."
 CREATE_ACCOLADE_FORCE_TT: "#T Wymuś na postaci, którą jest [CreateAccoladeView.GetSelectedKnight.GetShortUINameNotMe], służbę jako [GetPlayer.Custom('KnightCulture')|l]#!\n\n[CreateAccoladeView.GetSelectedKnight.GetShortUINameNotMe] #emphasis musi#! dołączyć do twoich [Concept('armies', 'armii')|E] jako [GetPlayer.Custom( 'KnightCultureNoTooltip' )|l], niezależnie od [CreateAccoladeView.GetSelectedKnight.GetHerHis] poziomu [Concept('prowess', 'waleczności')|E]. Może zająć miejsce innej służącej jako [GetPlayer.Custom( 'KnightCultureNoTooltip' )|l] postaci o wyższym poziomie waleczności."
