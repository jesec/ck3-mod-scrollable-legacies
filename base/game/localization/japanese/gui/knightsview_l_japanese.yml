l_japanese:
 KNIGHTS_VIEW_FORCE: "強制"
 KNIGHTS_VIEW_ALLOW: "許可"
 KNIGHTS_VIEW_FORBID: "禁止"
 KNIGHTS_VIEW_TITLE: "$knight_culture_player_plural_no_tooltip$"
 MAX_KNIGHT_COUNT: "$knight_culture_player_plural_no_tooltip$：#high [GetKnightCount( GetPlayer.Self )]/[GetKnightLimit( GetPlayer.Self )]#!"
 MAX_KNIGHT_TOOLTIP: "#T $knight_culture_player_plural_no_tooltip$の最大数：[knight_i][GetKnightLimit( GetPlayer.Self )|V]#!\n[GetKnightLimitBreakdown( GetPlayer.Self )]"
 KNIGHT_EFFECTIVENESS: "$knight_culture_player_no_tooltip$の効率性：#high [GetPlayer.GetKnightEffectiveness|%0]#!"
 KNIGHT_EFFECTIVENESS_TOOLTIP: "#T [knight_effectiveness|E]：[GetPlayer.GetKnightEffectiveness|V%0]#!\n基本値：#V 100%#!\n[GetPlayer.GetKnightEffectivenessBreakdown]"
 KNIGHTS_VIEW_TITLE_FORBID_TT: "#T [Character.GetShortUIName]が$knight_culture_player$となるのを禁止する#!\n\n[Character.GetShortUIName]が$knight_culture_player_no_tooltip$として[armies|E]に加わることは、今後#emphasis 絶対にありません#! 。したがって、[Character.GetHerHim]が[battle|E]で死亡することはありません。"
 CREATE_ACCOLADE_FORBID_TT: "#T [CreateAccoladeView.GetSelectedKnight.GetShortUIName]が$knight_culture_player$となるのを禁止する#!\n\n[CreateAccoladeView.GetSelectedKnight.GetShortUIName]が$knight_culture_player_no_tooltip$として[armies|E]に加わることは、今後#emphasis 絶対にありません#!。したがって、[CreateAccoladeView.GetSelectedKnight.GetHerHim]が[battle|E]で死亡することはありません。"
 KNIGHTS_VIEW_TITLE_BY_PROWESS_TT: "#T [Character.GetShortUIName]が$knight_culture_player$となるのを許可する#!\n\n[realm|E]で最も高い[prowess|E]をもつ場合、[Character.GetShortUIName]が$knight_culture_player_no_tooltip$として[armies|E]に加わる可能性があります。"
 CREATE_ACCOLADE_BY_PROWESS_TT: "#T [CreateAccoladeView.GetSelectedKnight.GetShortUIName]が$knight_culture_player$となるのを許可する#!\n\n[realm|E]で最も高い[prowess|E]をもつ場合、[CreateAccoladeView.GetSelectedKnight.GetShortUIName]が$knight_culture_player_no_tooltip$として[armies|E]に加わる可能性があります。"
 KNIGHTS_VIEW_TITLE_FORCE_TT: "#T [Character.GetShortUIName]に$knight_culture_player$となることを強制する#!\n\n[Character.GetShortUIName]は[prowess|E]の有無にかかわらず、$knight_culture_player_no_tooltip$として[armies|E]に#emphasis 加わらなければなりません#! 。より高い武勇をもつ$knight_culture_player_no_tooltip$に取って代わる可能性があります。"
 CREATE_ACCOLADE_FORCE_TT: "#T [CreateAccoladeView.GetSelectedKnight.GetShortUIName]に$knight_culture_player$となることを強制する#!\n\n[CreateAccoladeView.GetSelectedKnight.GetShortUIName]は[prowess|E]の有無にかかわらず、$knight_culture_player_no_tooltip$として[armies|E]に#emphasis 加わらなければなりません#!。より高い武勇をもつ$knight_culture_player_no_tooltip$に取って代わる可能性があります。"
 KNIGHTS_CURRENT_MAX: "[GetKnightCount( GetPlayer.Self )|V]/[GetKnightLimit( GetPlayer.Self )|V]"
 KNIGHTS_SUBHEADER: "適格な[courtiers|E]と[vassals|E]"
 KNIGHTS_SUBHEADER_LANDLESS_ADVENTURER: "適格な[followers|E]"
 ### Knight permissions
 knight_singular: "[GetPlayer.Custom('KnightCultureNoTooltip')]"
 knight_plural: "[GetPlayer.Custom('KnightCulturePluralNoTooltip')]"
 knight_singular_tt: "[GetPlayer.Custom('KnightCulture')]"
 knight_plural_tt: "[GetPlayer.Custom('KnightCulturePlural')]"
 KNIGHT_PERMISSIONS_TITLE: "$knight_singular$の任用"
 KNIGHT_PERMISSIONS_SHORT: "任用"
 KNIGHT_PERMISSIONS_TT: "$knight_singular_tt$として仕えることができる人物を管理する[AddLocalizationIf(Not( KnightsView.GetKnightPermissions.IsDefault), 'KNIGHT_PERMISSIONS_SET')]"
 KNIGHT_PERMISSIONS_SET: "\n#warning 一部のフィルターが有効になっています!#!"
 YOUR_KNIGHT_PERMISSIONS: "$knight_singular_tt$の任用ルールを設定します。\n[acclaimed|e]$knight_plural$や強制的に任命された$knight_plural$には影響しません。"
 MINIMUM_PROWESS: "最低武勇"
 DECREASE_MIN_PROWESS_KP: "[knights|e]に必要な[prowess|e]の下限を下げる\n#i 右クリックで10ずつ下げる#!"
 INCREASE_MIN_PROWESS_KP: "[knights|e]に必要な[prowess|e]の下限を上げる\n#i 右クリックで10ずつ上げる#!"
 FAMILY_RELATIONS_KP: "家族と関係者"
 OTHER_CHILDERN_KP: "他の子供"
 WITH_TRAITS_KP: "特性"
 SPOUSES_OF_CHILDERN_KP: "子供の配偶者"
 COURT_POSITIONS_KP: "王宮役職"
 COURT_POSITIONS_TT: "非戦闘職を許可しない。\n[GetCourtPositionType('bodyguard_court_position').GetName]と[GetCourtPositionType('garuda_court_position').GetName]は戦闘を支援する役職であるため除外され、常に[knights|e]となることができる"
 HBOX_DOCTRINE_FAITH_TT: "#T [FaithDoctrine.GetNameNoTooltip( Faith.Self )]#!\n[FaithDoctrine.GetEffectsDescription( Faith.Self )]\n\n[FaithDoctrine.GetDescription( Faith.Self )|F]"
 KNIGHT_RESTRICTIONS: "適用されるその他の制限"
 #this is can_be_knight_trigger in 00_war_and_peace_triggers.txt
 KNIGHT_RESTRICTIONS_TT: "#T 騎士に関する制限#!\nあなたの直属の[vassals|e]、[courtiers|e]、または[followers|e]のみが[knights|e]として仕えることができる\n[knights|e]として行動可能な性別は、あなたの[culture|e]または[faith|e]に応じて決まる\n\n騎士になれない人物：\n - プレイヤー、[child|e]、[prisoner|e]、[GetTrait('incapable').GetName(GetPlayer.Self)]\n - [clergy|e]（[faith|e]または[culture|e]が許可している場合を除く）\n - [master_assassin|e]、[GetTrait('blind').GetName(GetPlayer.Self)]（[culture|e]が許可している場合、または[GetTrait('order_member').GetName(GetPlayer.Self)]である場合を除く）\n - [diarch|e]、[ceremonial_liege|e]\n - [duchy|e]の[governor|e]（あるいはそれ以上の[title|e]）、[noble_family|e]の[house_head|e]\n\n文化の[traditions|e]やイベントによって一部の制限が解除される場合もある"
 KP_CULTURE_MINIMUM_PROWESS: "@alert_icon! あなたの[culture|e]では[prowess|e]が12以上である必要があります#!"
 KP_CULTURE_ADMIN_FAMILY_KNIGHTS: "@check_icon! あなたの[culture|e]では、防衛的[wars|e]における一部の性別制限が解除されます#!"
 KP_CULTURE_HIGH_PROWESS: "@alert_icon! あなたの[culture|e]では、[prowess|e]が10以上の[knights|e]に対する制限のほとんどが解除されます#!"
