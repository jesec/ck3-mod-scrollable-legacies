l_japanese:
 # reverse button
 LEDGER_SORT_BY: "#T $SORT_BY$[Select_CString( LedgerWindow.GetSortOrder, '昇順', '降順' )]\n#!#I クリックして切り替え#!"
 # active sorting order, creates two loc keys for ascending and descending orders
 ACTIVE_SORTING_LEDGER: "#low 並べ替え：#! #clickable [Localize(Concatenate(OrderLedgerOption.GetKey, Select_CString(LedgerWindow.GetSortOrder, '_least', '_most')))]#!"
 # shared locs
 any_filter: "すべて"
 all_filter_option: "$any_filter_option$" # yes, any is all
 your_filter_option: "$CHARACTER_NAME_MY_CAPITALIZED$"
 most_sort: "降順"
 least_sort: "昇順"
 fewest_sort: "昇順"
 highest_sort: "降順"
 lowest_sort: "昇順"
 player_realms_filter_option: "プレイヤーの領国"
 players_only_filter_option: "プレイヤーのみ"
 sort_by: "並べ替え" # same as SORT_BY but without :
 # standalone sorting buttons, usually reusing dropdown names
 BUTTON_SORT_LEDGER: "[Localize(Concatenate('sort_l_', PdxGuiWidget.GetName))]で$sort_by$" # we concatenate so we don't end up localizeing simple terms like 'date' or 'counties'
 # dropdown items. Using GetKey to reuse them instead of having 40 identical options for titles
 DROP_SORT_LEDGER: "[Localize(Concatenate('sort_l_', OrderLedgerOption.GetKey))]"
 # some standalones need more detailed tooltips, so we replace them like this
 EXTRA_SORT_LEDGER: "[Localize(Concatenate('sort_tt_', PdxGuiWidget.GetName))]で$sort_by$"
