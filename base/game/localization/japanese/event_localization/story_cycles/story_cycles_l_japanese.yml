l_japanese:
 SITUATION_LIST_STORY_CYCLE_MODIFIERS_HEADER: "補正"
 SITUATION_LIST_STORY_CYCLE_DECISIONS_HEADER: "決断"
 not_yet_chosen: "未選択"
 story_cycle_pet_dog: "飼い犬"
 story_cycle_pet_dog_desc: "#F 忠実な犬の相棒は、あなたの傍らを歩き、あなたを守ってくれる。人にはなかなか真似できない忠誠心と深い絆をもたらしてくれる存在だ。#!"
 DOG_INFORMATION_STRING: "あなたの犬の名前は#V [Story.Custom('DogStoryNameAll')]。#!\n毛は[Story.Custom('DogFurColorAll')]、目は[Story.Custom('DogEyeColorAll')]で、[Story.Custom('DogStoryPuppyOrAgeAll')]だ。\nとても良い犬である。"
 dog_age_puppy: "子犬"
 dog_age_proper: "[Story.MakeScope.Var('dog_age_variable').GetValue|0]歳"
 cat_age_kitten: "子猫"
 cat_age_proper: "[Story.MakeScope.Var('cat_age_variable').GetValue|0]歳"
 story_cycle_pet_cat: "飼い猫"
 story_cycle_pet_cat_desc: "#F 気高い猫があなたのそばに寄り添ってくれる。敏捷な狩猟動物で、愛情は気まぐれにしか示さない。#!"
 CAT_INFORMATION_STRING: "あなたの猫の名前は#V [Story.Custom('CatStoryNameAll')]。#!\n毛は[Story.Custom('CatFurColorAll')]、目は[Story.Custom('CatEyeColorAll')]で、[Story.Custom('CatStoryKittenOrAgeAll')]だ。[Story.Custom('CatStupidOrNotStupidAll')]"
 dumb_but_sweet_orange_boy: "\n間抜けなところもあるが、とても可愛い猫だ。"
 story_cycle_pet_eagle: "狩猟用のワシ"
 story_cycle_pet_eagle_desc: "#F あなたの手袋に狩猟用のワシが止まっている。ワシは常に目を光らせ、常に飢えを抱えて、上空から死をもたらす。#!"
 EAGLE_INFORMATION_STRING: "あなたのワシの名前は#V [Story.Custom('EagleStoryNameAll')]。#!\n年齢は[Story.MakeScope.Var('eagle_age_variable').GetValue|0]歳だ。"
 bp2_hostage_loyalty: "忠実な人質"
 bp2_hostage_loyalty_desc: "[hostages|E]のひとりが、あなたやあなたのやり方に心を開きはじめている。"
 hostage: "[hostage|E]"
 HOSTAGE_STORY_PRACTICAL_INFORMATION_STRING: "[hostage|E]の[Story.MakeScope.Var('hostage_target').Char.GetUIName]はあなたの[court|E]で育っており、それが[Story.MakeScope.Var('hostage_target').Char.GetHerHis]の忠誠心に影響を与えている。[Story.MakeScope.Var('hostage_target').Char.GetHerHis]からの[opinion|E]を高い状態で維持し、イベントで適切な選択をすれば、[Story.MakeScope.Var('hostage_target').Char.GetSheHe]が成人した際、あなたに忠誠を誓う可能性が高くなる。\n\n現在の忠誠：[Story.MakeScope.Var('theon_points').GetValue|0+]"
 LOYALTY_LABEL: "忠誠ポイント"
 claimant: "[claimant|E]"
 diverted_crusaders: "方向転換した十字軍"
 frankokratia_story: "フランコクラティア"
 frankokratia_story_desc: "[GetTitleByKey('e_byzantium').GetName|l]の請求者が、西方の好機を狙う者たちを聖戦から誘き出し、その強欲な剣をキリスト教世界の中心そのものへ向けさせている…"
 FRANKOKRATIA_STORY_PRACTICAL_INFORMATION_STRING: "[GetTitleByKey('e_byzantium').GetHolder.GetShortUIName]との[war|E]が、[GetTitleByKey('e_byzantium').GetName|l]の未来を決める。[claimant|E]である[Story.MakeScope.Var('byz_claimant').Char.GetUIName]が玉座を奪い十字軍の労苦に報いるのか、あるいは[GetTitleByKey('e_latin_empire').GetBaseName]が[GetFaithByKey('catholic').GetAdjective]支配のもとで樹立されるのか、未来は二つに一つだ。"
 story_conqueror: "征服者"
 story_conqueror_desc: "あなたは底知れない野心を持っている！世界はあなたの前に広がり、征服されるのを待っている。"
 CONQUEROR_STORY_PRACTICAL_INFORMATION_STRING: "征服者には多数の強力なボーナスが与えられる。ボーナスには[factions|E]の減少、[vassalize_casus_belli|E]の使用権、そして時おり発生する強力なイベントなどが含まれる。\n\n以下のいずれかに当てはまると、征服者ではなくなる：\n$BULLET_WITH_TAB$[independent|E]していない\n$BULLET_WITH_TAB$ランクが[count|E]に下がる\n$BULLET_WITH_TAB$[unlanded|E]になる\n$BULLET_WITH_TAB$#V 10#!年間[war|E]をしていない\n$BULLET_WITH_TAB$多額の[debt|E]を抱えている\n$BULLET_WITH_TAB$ #V 3#!つ以上の[wars|E]で敗戦する\n$BULLET_WITH_TAB$[GetTrait('incapable').GetName( GetNullCharacter )]になる"
 story_destiny_child: "運命の子"
 story_destiny_child_desc: "大いなる可能性を秘めた子が生まれた。まるで運命そのものに選ばれたかのようだ。"
 DESTINY_CHILD_STORY_PRACTICAL_INFORMATION_STRING: "ごくまれに、偉大な運命を背負った子供が生まれてくることがある。そうした子供は普通より早く成長し、将来的に他の者が到達できない高みへと至る。\n\n[Story.MakeScope.Var('destiny_child').Char.GetUIName]を大切に育て、[player_heir|E]とすることを検討しよう。たとえば[Story.MakeScope.Var('destiny_child').Char.GetHerHim]を[designated_heir|E]とするのも一つの手だ。"
 CHILD_OF_DESTINY: "運命の子"
 story_cycle_martial_lifestyle_warhorse: "軍馬"
 story_cycle_martial_lifestyle_warhorse_desc: "あなたには特別によく訓練された軍馬がいる。突撃すれば、敵が震え上がることだろう。"
 WARHORSE_STORY_PRACTICAL_INFORMATION_STRING: "あなたの軍馬の名前は#V [Story.Custom('WarhorseStoryNameAll')]#!、[Story.Custom('HorseStoryMareStallionAll')]だ。"
 DOPPELGANGER: "あなたの[Glossary( 'ドッペルゲンガー', 'DOPPELGANGER_GLOSS' )]"
 story_doppelganger: "泥の中の鏡"
 DOPPELGANGER_GLOSS: "実在の生きている人物にそっくりな、いわば分身のような存在で、偶然出会うことがある。ドイツの民間伝承では不気味な幻影として認識され、凶兆とされている。自分の分身を見ることは病や死の前触れといわれている。"
 story_doppelganger_desc: "あなたにそっくりな農民が見つかった。紛れもない[Glossary( 'ドッペルゲンガー', 'DOPPELGANGER_GLOSS' )]だ…"
 DOPPELGANGER_STORY_PRACTICAL_INFORMATION_STRING: "見た目も口調もあなたにそっくりな農民が発見されたことは、果たして吉兆か…あるいは凶兆か。現在、[Story.MakeScope.Var('doppelganger_character').Char.GetUIName]はあなたの[court|E]に住んでいる。"
 story_cycle_hunt_mystical_animal: "神獣の狩り"
 story_cycle_hunt_mystical_animal_desc: "狩りの最中に、あなたは神秘的な白い獣を一瞬目にした。あの生き物を捕まえることは、聖杯を見つけるに等しい！"
 WHITE_ANIMAL_INFORMATION_STRING: "あなたは#V 白い[Story.MakeScope.Var('animal_type').GetFlagName|U]#!を追っている。\n\n捕獲できれば大きな報酬を得られるが、[Story.MakeScope.Var('animal_type').GetFlagName]に逃げられるたび、[stress|E]を抱えることになるだろう。時折[GetModifier('hunt_sighting_legendary_modifier').GetNameWithTooltip]が狩りを継続させてくれる。\n\n白い[Story.MakeScope.Var('animal_type').GetFlagName]との遭遇回数：[Story.MakeScope.Var('encounters').GetValue|0V] #weak （最初から数えて）#!"
 LEGENDARY_COUNTY_LABEL: "白い[Story.MakeScope.Var('animal_type').GetFlagName|U]の現在の棲みか"
 story_sycophant: "おべっか使い"
 story_sycophant_desc: "露骨にごまをする廷臣が、ただ存在しているだけで封臣たちから反感を買っている。"
 SYCOPHANT_INFORMATION_STRING: "[Story.GetOwner.Custom2( 'RelationToMeShort', Story.MakeScope.Var('sycophant_character').Char )]の[Story.MakeScope.Var('sycophant_character').Char.GetShortUIName]と[Story.GetOwner.Custom2( 'RelationToMeShort', Story.MakeScope.Var('jealous_character').Char )]の[Story.MakeScope.Var('jealous_character').Char.GetShortUIName]が激しく争っている。どちらかに肩入れすることもできるが、そうすればもう一方を怒らせるのは間違いない。どう転ぶかは、いずれ分かるだろう…"
 SYCOPHANT_LABEL: "おべっか使い"
 JEALOUS_VASSAL_LABEL: "最も嫉妬深い封臣"
 story_cycle_pet_rock: "ペットの石"
 story_cycle_pet_rock_desc: "あなたの傍にはペットの石がある。表情が変わらないところが、あなたの特殊な友情観にぴったりだ。"
 PET_ROCK_INFORMATION_STRING: "あなたの石の名前は#V [Story.GetOwner.Custom('RockStoryName')]。#!\nゴツゴツとした表面は[Story.GetOwner.Custom('RockColor')]だ。"
 story_cycle_admin_eunuch: "高名な宦官"
 story_cycle_admin_eunuch_desc: "並外れた才を持つ宦官が宮廷に入ってきた。この人物がもたらすのは好機か、それとも脅威か…？"
 EUNUCH_INFORMATION_STRING: "時が経つにつれ、[Story.MakeScope.Var('eunuch').Char.GetShortUIName]にさらなる権力と影響力を与える機会が訪れるようになり、これにより[GetModifier('admin_eunuch_liege_4_modifier').GetNameWithTooltip]の[modifier|E]を強化することが可能となる。\n\nだが注意が必要だ。[Story.MakeScope.Var('eunuch').Char.GetHerHim]を拒絶したり、忠誠を得ていない状態で#EMP 過度の#!権力を与えてしまえば、悲惨な結果を招くことになる…\n\nあなたはこれまでに[Story.MakeScope.Var('eunuch').Char.GetHerHis]の要求を[Story.MakeScope.Var('eunuch_refusals').GetValue|0V]回拒否している。"
 EUNUCH_LABEL: "宦官"
 UPSET_COURTIERS: "宦官に不満を抱いている臣民たち"
 POETRY_BOOK_LABEL: "私の詩集"
 commission_epic_story: "叙事詩を編纂させる"
 commission_epic_story_desc: "あなたは一族の偉業を記録する大叙事詩を制作させている。"
 EPIC_INFORMATION_STRING: "あなたの[Story.GetOwner.Custom('CommissionEpicScribe')]、[AddTextIf(Story.MakeScope.Var('composer').IsSet, Concatenate(Concatenate(', ', Story.MakeScope.Var('composer').Char.GetShortUIName), ','))]は、あなたの[Story.Custom('CompositionTypeAll')]を作成している。目的は[Story.GetOwner.GetDynasty.GetName][dynasty|E]の[dynasty_prestige|E]を高め、[artifact|E]を獲得することだ。\n\n優れた[Story.Custom('CompositionTypeAll')]が完成する確率：[Story.MakeScope.Var('final_outcome_chance').GetValue|0+/%]"
 COMPOSER: "あなたの叙事詩の作者"
 story_foreign_raised_reformer: "外国育ちの改革者"
 story_foreign_raised_reformer_desc: "あなたは今暮らしている地を故郷と呼んでいるが、実際に育ったのは遠く離れた地だ。\n二つの地は全く異なるが…もし今の故郷を彼の地のようできたらどうだろう。"
 REFORMER_INFORMATION_STRING: "あなたは[Story.MakeScope.Var('advanced_realm').Title.GetBaseName]で、[Story.MakeScope.Var('advanced_culture').Culture.GetName]の[Story.MakeScope.Var('advanced_culture_faith').Faith.GetAdjective]信者、[Story.MakeScope.Var('foreign_educator').Char.GetShortUIName]によって育てられた。[Story.MakeScope.Var('advanced_culture').Culture.GetName][culture|E]に感銘を受けたあなたは、自国の民を彼らのように変えたいと願っている。\n\n今後、文化の改革または強化ポイントのいずれかを得る機会が訪れるようになる：\n$BULLET_WITH_TAB$#indent_newline:7 改革を進めることで、[innovations|E]、[cultural_acceptance|E]、[traditions|E]、さらに[GetBuilding('generic_university').GetName]を獲得できる。ただし、改革には長い時間とコストがかかる。#!\n$BULLET_WITH_TAB$#indent_newline:7 強化を進めると、[vassal|E]の[opinion|E]、[dynasty_prestige|E]、[casus_bellis|E]や[special_troops|E]といった[war|E]関連のボーナスを獲得できる。"
 REFORM_LABEL: "[culture|E]の改革への進捗"
 REAFFIRMATION_LABEL: "[culture|E]の強化への進捗"
 REFORM_MIN_VALUE_LABEL: ""
 REFORM_MAX_VALUE_LABEL: "最大：#V 3#!"
 REAFFIRMATION_MIN_VALUE_LABEL: ""
 REAFFIRMATION_MAX_VALUE_LABEL: "最大：#V 2#!"
 ECCENTRIC_MIN_VALUE_LABEL: ""
 ECCENTRIC_MAX_VALUE_LABEL: "最大：#V 5#!"
 IMAGINARY_FRIEND_INFORMATION_STRING: "あなたの想像上の友の名前は[Story.MakeScope.Var('imaginary_friend_name').Char.GetShortUINameNoTooltip]。[Story.MakeScope.Var('imaginary_friend_name').Char.GetHerHim]と時々交流する機会を得られる。"
 ECCENTRIC_VALUE: "[GetTrait('eccentric').GetName( GetNullCharacter )]獲得への進捗"
 story_cycle_imaginary_friend: "想像上の友"
 story_cycle_imaginary_friend_desc: "ようやく一緒に遊べる友達ができた！本物じゃなくてもいい。私にとっては本物の友達だ！"
 story_greatest_of_khans: "最も偉大なるハン"
 story_greatest_of_khans_desc: "天には多くの偉大な光がある。天には太陽があり、月があり、星がある。だが地上には、ただ一人のハンしか存在し得ない。"
 GREATEST_OF_KHANS_INFORMATION_STRING: "$become_greatest_of_khans_decision_enable_gok_invasion_cb$\n$gok_enable_offer_submission_or_ruin_tt$\n\n@alert_icon! #alert_trial あなたの[dynasty|E]が[Story.GetOwner.GetPrimaryTitle.GetName|l]の支配を失うか、[GetGovernment( 'nomad_government' ).GetName]でなくなるか、#high [Story.MakeScope.Var('gok_final_date').GetValue|0]#!年までに$mpo_gok_world_conquest_decision$#!する[decision|E]をできなかった場合、これらのボーナスは失われ、[Story.GetOwner.GetPrimaryTitle.GetName|l]は崩壊の危機にさらされることになる！#!"
