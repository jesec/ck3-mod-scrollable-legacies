 accolade_rank_loss_notification_tooltip_no_rank: "[changing_accolade.GetNameNoTooltip]はいまや[acclaimed_knight.Custom('AccoladeRankFlavorNumber')]となり、その効果のすべてを失った\n[acclaimed_knight.GetShortUINameNoTooltip]がかつての地位を取り戻せるかどうか、時間だけが告げてくれるだろう"
 accolade_rank_loss_notification_tooltip_no_rank_dead: "[changing_accolade.GetNameNoTooltip]はいまや[acclaimed_knight.Custom('AccoladeRankFlavorNumber')]となり、その効果のすべてを失った\n[acclaimed_knight.Custom('ComplimentAdjective')]な[acclaimed_knight.GetShortUINameNoTooltip]は亡くなり、[acclaimed_knight.GetHerHis]の遺産は今、[acclaimed_knight.GetHerHis]の徒弟の手にある。"
 accolade_rank_loss_notification_tooltip_empty_no_rank: "[changing_accolade.GetNameNoTooltip]はいまや[acclaimed_knight.Custom('AccoladeRankFlavorNumber')]となり、その効果のすべてを失った"
