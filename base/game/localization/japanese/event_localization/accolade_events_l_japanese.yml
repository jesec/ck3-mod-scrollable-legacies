l_japanese:
 acclaimed_opinion: "叙勲"
 accolade.0001.notification_high: "叙勲騎士が素晴らしき階位を得る"
 accolade_rank_unlock_notification_tooltip_high: "[changing_accolade.GetNameNoTooltip]はついに[acclaimed_knight.Custom('AccoladeRankFlavorNumber')]となった\n[acclaimed_knight.Custom('FormalComplimentAdjective')]たる[acclaimed_knight.GetShortUINameNoTooltip]は、遥か遠くの地においても、$knight_culture_player_plural_no_tooltip_lowercase$として知られるようになったのだ。"
 accolade.0001.notification_low: "叙勲騎士が階位を得る"
 accolade_rank_unlock_notification_tooltip_low: "[changing_accolade.GetNameNoTooltip]はついに[acclaimed_knight.Custom('AccoladeRankFlavorNumber')]となった\n[acclaimed_knight.Custom('ComplimentAdjective')]たる[acclaimed_knight.GetShortUINameNoTooltip]は、あなたの$knight_culture_player_plural_no_tooltip_lowercase$として注目を集めている"
 accolade.0002.notification_high: "高名な叙勲騎士が階位を失う"
 accolade_rank_loss_notification_tooltip_high: "[changing_accolade.GetNameNoTooltip]はいまや[acclaimed_knight.Custom('AccoladeRankFlavorNumber')]となった\n$knight_culture_player_plural_no_tooltip$は、[acclaimed_knight.GetShortUINameNoTooltip]が伝説的な地位を取り戻せるかどうか、広く噂を集めている。"
 accolade_rank_loss_notification_tooltip_high_dead: "[changing_accolade.GetNameNoTooltip]はいまや[acclaimed_knight.Custom('AccoladeRankFlavorNumber')]となった\n[acclaimed_knight.Custom('FormalComplimentAdjective')]な[acclaimed_knight.GetShortUINamePossessive]の死によって、[acclaimed_knight.GetHerHis]の称号の伝説的な地位が戻るかどうかは疑わしきものとなった。"
 accolade.0002.notification_low: "叙勲騎士が階位を失う"
 accolade_rank_loss_notification_tooltip_low: "[changing_accolade.GetNameNoTooltip]はいまや[acclaimed_knight.Custom('AccoladeRankFlavorNumber')]となった\n[acclaimed_knight.GetShortUINameNoTooltip]がかつての地位を取り戻せるかどうか、時間だけが告げてくれるだろう"
 accolade_rank_loss_notification_tooltip_low_dead: "[changing_accolade.GetNameNoTooltip]はいまや[acclaimed_knight.Custom('AccoladeRankFlavorNumber')]となった\n[acclaimed_knight.Custom('ComplimentAdjective')]な[acclaimed_knight.GetShortUINameNoTooltip]は亡くなり、[acclaimed_knight.GetHerHis]の遺産は今、[acclaimed_knight.GetHerHis]の徒弟の手にある。"
 accolade.0002.notification_empty: "叙勲騎士が階位を失う"
