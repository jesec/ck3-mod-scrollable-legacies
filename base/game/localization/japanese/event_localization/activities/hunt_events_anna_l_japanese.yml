l_japanese:
 hunt_events_anna.0001.t: "深く根を下ろして"
 hunt_events_anna.0001.desc: "大いなる樫の木が堂々たる冠を掲げ、枝を広く遠くまで伸ばし、その下にあるすべてを闇で覆い尽くしている。分岐する枝を見上げていると、幾多の王朝が興亡する様が思い浮かぶ。私より前に生きた人々、そして私がこの世を去った後に私の遺産を受け継ぐ人々に、私は思いを馳せた。\n\n樫の木に近付いてみると、樹皮に名の頭文字が刻まれていることに気が付いた。それは時代を超えて生まれては死んでいく人々の存在を、優しく教えてくれる。私がこの世に残すものを受け継いでほしいと願うのは、私のすべてである[love_interest.GetFirstName]だ。"
 hunt_events_anna.0001.a: "[love_interest.GetFirstNameNoTooltip]の名の頭文字を木に刻む"
 hunt_events_anna.0001.b: "無意味なことをしている時間はない！"
 hunt_events_anna.0001.b.t_toast: "狩りが私の最優先事項だ。"
 hunt_events_anna.0005.t: "皮を剥ぐ"
 hunt_events_anna.0005.desc: "少し休んでいると、嘲りを帯びた笑い声が近付いてきた。見上げると、思った通りというべきか、[mocking_participant.GetFirstName]がニヤニヤと笑って私を見ていた。手には[ROOT.Char.Custom('SmallAnimal')]の死骸らしきものを持っている。\n\n「君が一人で荒野で生き延びられるとは思わなかったからな。少し練習が必要だろうと思ったんだ」と[mocking_participant.GetSheHe|U]は見下したような口ぶりで言い、その死骸を私の足元に投げ捨てた。"
 hunt_events_anna.0005.a: "動物の皮を剥いでみる。"
 hunt_events_anna.0005.a.toast.good: "皮をうまく剥ぎ取る"
 hunt_events_anna.0005.a.toast.nothing: "見る影もない残骸になる"
 hunt_events_anna.0005.b: "練習？やってもいいが…"
 hunt_events_anna.0005.c: "そのような下賤なこと、私がやることではない"
 hunt_events_anna.0010.t: "落とし穴"
 hunt_events_anna.0010.desc: "重く不安定な足取りで、私は獲物を追って[ROOT.Char.GetCurrentLocation.Custom('GetTerrainTypePlural')]を進んだ。獲物に追いつくことに集中していると、突然、何かが折れるような鋭い音が聞こえた。すると急に体が軽くなり、内臓が浮くような感覚に襲われた。それが唐突に終わると、衝撃が全身を貫き、灼けるような痛みが走った。\n\n痛みに耐えながら見上げると、四方が壁に囲まれている。私は落とし穴に落ちたのだ。何とか這い上がる方法を探さなければならない。"
 hunt_events_anna.0010.a: "穴から這い上がる。"
 hunt_events_anna.0010.a.desc.good: "無事に穴から這い出る"
 hunt_events_anna.0010.a.toast.good: "何とか痛みを堪えて脱出する"
 hunt_events_anna.0010.a.toast.bad: "再び落下し怪我が増える"
 hunt_events_anna.0010.a.desc.bad: "滑ってまた穴に落ちる"
 hunt_events_anna.0010.b: "「誰かいないのか！？」"
 hunt_events_anna.0010.b.flavor: "狩りの一行が狩りをやめて、あなたを助ける。"
 hunt_events_anna.0015.t: "吸って…吐いて…"
 hunt_events_anna.0015.desc: "奇妙な鈍い音と、低く呟く声、そして時折漏れる溜息が林間に響いている。弓を手にした人影が、何かに苛立っているように、前後に行ったり来たりしている。\n\n私はもっと近くで見ようと、木の後ろに隠れてそっと覗いてみた。するとそこには、我が[child_with_bow.Custom('GetDaughterSon')]、[child_with_bow.GetFirstName]がいた。[child_with_bow.GetSheHe]の周りには数本の矢が散らばっている。自分で設置した的にかろうじて届くか届かないかの位置だ。どうやら少し手助けが必要らしい。"
 hunt_events_anna.0015.a: "「ほら、教えてあげよう…」"
 hunt_events_anna.0015.a.flavor: "狩猟の腕には自信がある。私の経験を生かせば、[child_with_bow.GetHeShe]に適切な姿勢と的中させる方法を教えられるはずだ。"
 hunt_events_anna.0015.a.toast.good: "[child_with_bow.GetFirstNameNoTooltip]は私の指示に従う"
 hunt_events_anna.0015.a.toast.bad: "[child_with_bow.GetFirstNameNoTooltip]は私の指示を理解できない"
 hunt_events_anna.0015.b: "[child_with_bow.GetHerHim]に声援を送る。"
 hunt_events_anna.0015.c: "[child_with_bow.GetFirstNameNoTooltip]自身に学ばせる。"
 hunt_events_anna.0015.c.toast: "[child_with_bow.GetFirstNameNoTooltip]は自分で弓の扱いを学ぶ"
