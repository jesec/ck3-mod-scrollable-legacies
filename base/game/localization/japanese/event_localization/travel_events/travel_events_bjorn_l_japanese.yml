l_japanese:
 #Travel Flavor Events
 #Troll bridge - you encounter a troll bridge.
 travel_events.5100.t: "[ROOT.Char.GetCurrentLocation.Custom('GetProvinceTricksterSpirit')|U]の橋"
 travel_events.5100.desc: "「我が君！この橋は不吉な噂があります。橋の下に[ROOT.Char.GetCurrentLocation.Custom('GetProvinceTricksterSpirit')]が棲んでいるのです！」[ROOT.Char.Custom2('RelationToMe', superstitious_traveler)]の[superstitious_traveler.GetTitledFirstName]が叫んだ。「きっと襲いかかってくるか、通り過ぎる時に遠くから呪ってくるに違いありません」\n\n他の者たちがひそひそと話しはじめ、中には守護を求めて[ROOT.Char.GetFaith.HighGodName]の名を呼ぶ者までいる。残念ながら、これ以外に安全に渡れる橋は数マイル先にしかない。"
 travel_events.5100.a: "「[ROOT.Char.GetCurrentLocation.Custom('GetProvinceTricksterSpirit')]も悪魔も恐れるものか！」"
 travel_events.5100.b: "「[superstitious_traveler.GetTitledFirstNameNoTooltip]よ、そんなものはいない」"
 travel_events.5100.c: "「祈りを捧げて追い払わねばなるまい」"
 travel_events.5100.d: "「なんと恐ろしい！別の道を探そう」"
 custom.every_brave_or_impatient_entourage_member: "[GetTrait('brave').GetName( GetNullCharacter )]または[GetTrait('impatient').GetName( GetNullCharacter )]な随行員全員"
 custom.every_cynical_or_impatient_entourage_member: "[GetTrait('cynical').GetName( GetNullCharacter )]または[GetTrait('impatient').GetName( GetNullCharacter )]な随行員全員"
 custom.every_eccentric_or_zealous_entourage_member: "[GetTrait('eccentric').GetName( GetNullCharacter )]または[GetTrait('zealous').GetName( GetNullCharacter )]な随行員全員"
 custom.every_craven_or_impatient_entourage_member: "[GetTrait('craven').GetName( GetNullCharacter )]または[GetTrait('impatient').GetName( GetNullCharacter )]な随行員全員"
