l_japanese:
 #Lessons of the heart
 intrigue_events_bjorn.5100.t: "心の教え"
 intrigue_events_bjorn.5100.desc: "愛する[the_lover.GetFirstName]を見ていて、私はふと思った。[the_lover.GetHerHis|U]のような素晴らしい人間から学べることは多くあるだろうと。[the_lover.GetHerHis|U]の心はまるで発掘されるのを待っている宝のようだ。私にも[the_lover.GetFirstName]に教えてあげられることがいくつかある。\n\n何より、互いに学び合いながら共に時間を過ごせるなんて最高だ！"
 intrigue_events_bjorn.5100.a: "愛する人は私に多くのことを教えてくれる。"
 intrigue_events_bjorn.5100.b: "[the_lover.GetSheHe|U]はとても良い生徒となるだろう。"
 intrigue_events_bjorn.5100.c: "共に時間を過ごすだけで十分だ。"
 #shared interests
 intrigue_events_bjorn.5101.t: "共通の夢"
 intrigue_events_bjorn.5101.desc: "[the_lover.GetFirstName]は本当に面白い！私は[the_lover.GetHerHim]が喜ぶことを一緒に楽しみたい。\n\nああ、二人で至福の日々を過ごせたらどんなにいいか。\n\n互いに手を取り合い、同じ夢に心を傾ける。\n\nそして胸の鼓動さえ一つになるのだ。"
 intrigue_events_bjorn.5101.a: "愛しい人よ、あなたの情熱を燃え上がらせるものは何か教えてくれ。"
 intrigue_events_bjorn.5101.b: "さあ、喜びを分かち合おう。"
 intrigue_events_bjorn.5101.c: "共に何か新しいことを学ぶのはどうだろう？"
 #Dark depths of the soul
 intrigue_events_bjorn.5102.t: "影を愛するには"
 intrigue_events_bjorn.5102.desc: "二人の距離が縮まった今、私たちは一つの境界線を目前にしている。そろそろお互いすべてを打ち明け合って、相手について知らないことが何もないようにすべき時なのかもしれない。普段は人に話さないようなことも、包み隠さず告白するのだ。\n\nここを超えればもう後には戻れない。[the_lover.GetFirstName]は私のすべてを受け入れてくれるだろうか？"
 intrigue_events_bjorn.5102.a: "私には大きな秘密がある。"
 intrigue_events_bjorn.5102.b: "誰にも話したことのないことを教えてくれ。"
 intrigue_events_bjorn.5102.c: "お互いの最も暗い欲望について語り合おう。"
 intrigue_events_bjorn.5102.d: "いや！知らなくていいこともあるはずだ。"
