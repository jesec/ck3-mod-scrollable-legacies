l_japanese:
 #Goguryeo Tomb
 building_type_goguryeo_tomb_01: "$building_goguryeo_tomb_01$"
 building_type_goguryeo_tomb_01_desc: "$building_goguryeo_tomb_01_desc$"
 building_goguryeo_tomb_01: "高句麗王の墓"
 building_goguryeo_tomb_01_desc: "切石で築かれたこの巨大な長方形の墓は、古代高句麗の王のものだと伝えられているが、その名の記憶はすでに失われている。墓所へと続く回廊の壁面には色鮮やかなフレスコ画が描かれ、ピラミッド状の頂には、葬られた者を祀る小さな木造の東屋が建てられている。"
 #Great Buddha of Kamakura
 building_type_buddha_kamakura_01: "$building_buddha_kamakura_01$"
 building_type_buddha_kamakura_01_desc: "$building_buddha_kamakura_01_desc$"
 building_buddha_kamakura_01: "鎌倉の大仏"
 building_buddha_kamakura_01_desc: "鎌倉の#italic 大仏#!は阿弥陀如来の由緒ある青銅像で、重量は数トンに及び、細部に至るまで金箔で装飾されている。南西諸国の寺院に着想を得た大伽藍に安置され、32枚の蓮弁に囲まれている。"
 #Lingapura Pyramid
 building_type_pyramid_lingapura_01: "$building_pyramid_lingapura_01$"
 building_type_pyramid_lingapura_01_desc: "$building_pyramid_lingapura_01_desc$"
 building_pyramid_lingapura_01: "リンガプラのピラミッド"
 building_pyramid_lingapura_01_desc: "この巨大な階段ピラミッドは、聖なる山のごとく密林の中からそびえ立ち、7層の各テラスに祀られている社や祭壇は上層ほど華麗さを増す。最上部の聖域が建造物の頂であり、その内部にはシヴァ神の聖なる#italic リンガ#!が安置され、宗教的意匠による複合的な軸線配置の中心をなしている。"
 #Maijishan Grottoes
 building_type_maijishan_grottoes_01: "$building_maijishan_grottoes_01$"
 building_type_maijishan_grottoes_01_desc: "$building_maijishan_grottoes_01_desc$"
 building_maijishan_grottoes_01: "麦積山石窟"
 building_maijishan_grottoes_01_desc: "麦積山は長く崇拝されてきた山である。その南側の崖は風水的に吉とされ、赤みを帯びた岩壁には何百という祠堂が彫り込まれて、穏やかな表情を浮かべた仏や菩薩の像や色鮮やかなフレスコ画が安置されている。その多くは近隣の名家によって建立されたもので、彼らにとってこの地は、折に触れて巡礼し、瞑想する場となっている。"
 #Three Pagodas of Dali
 building_type_three_pagodas_dali_01: "$building_three_pagodas_dali_01$"
 building_type_three_pagodas_dali_01_desc: "$building_three_pagodas_dali_01_desc$"
 building_three_pagodas_dali_01: "大理の崇聖寺三塔"
 building_three_pagodas_dali_01_desc: "この都市を支配する一族の広大な寺院群の中に、レンガの壁と石の台座で構成された3つの高い仏塔が立っている。これらの塔は二等辺三角形の頂点を成して聖なる幾何学模様を描き出すとともに、周囲の山々と湖を額縁のように取り囲んでいる。"
 #Iron Lion of Cangzhou
 building_type_iron_lion_cangzhou_01: "$building_iron_lion_cangzhou_01$"
 building_type_iron_lion_cangzhou_01_desc: "$building_iron_lion_cangzhou_01_desc$"
 building_iron_lion_cangzhou_01: "滄州鉄獅子"
 building_iron_lion_cangzhou_01_desc: "この記念碑的な獅子像は中国国内で最大の鋳鉄製彫刻であり、その逞しい背中には、金箔で豪華に飾られた菩薩像が蓮華座に静かに座っている。洪水に見舞われやすい平野近くに設置されたこの像は、押し寄せる荒波を防ぐ守護者として地元の人々に知られるようになった。"
 #Gaocheng Observatory
 building_type_dengfeng_observatory_01: "$building_dengfeng_observatory_01$"
 building_type_dengfeng_observatory_01_desc: "$building_dengfeng_observatory_01_desc$"
 building_dengfeng_observatory_01: "登封観星台"
 building_dengfeng_observatory_01_desc: "この地は、風水的な特性からだけでなく、中国の地理的な中心を象徴する地であることからも、何世紀にも渡って天体観測に適した場所とされてきた。現在の建造物は複雑な台形状の構造を備え、巨大な日時計として機能している。中央に立つ定規が、土台を区切る溝に影を落とし、太陽の運行を示すのである。"
 #Candi of Muara Takus
 building_type_muara_takus_01: "$building_muara_takus_01$"
 building_type_muara_takus_01_desc: "$building_muara_takus_01_desc$"
 building_muara_takus_01: "ムアラ・タクス寺院"
 building_muara_takus_01_desc: "この寺院群は数多くの建造物から構成されており、そのどれもがレンガ造りで砂岩の装飾が施されている。中心には#italic マリガイ#!と#italic トゥオ#!という名の巨大な仏塔が立っており、前者は高く細長いのに対して、後者は山のように巨大で、周囲に並ぶ小さな祠堂やテラスの上に屹立している。"
 #Stone Pagoda of Mireuksa
 building_type_stone_pagoda_01: "$building_stone_pagoda_01$"
 building_type_stone_pagoda_01_desc: "$building_stone_pagoda_01_desc$"
 building_stone_pagoda_01: "弥勒寺の石塔"
 building_stone_pagoda_01_desc: "広大な石の土台の上に立つ9層の仏塔であり、ほの白い石肌が日差しを受けて輝いている。朝鮮半島で最初の石塔と言われ、その形状と均整の取れた造形は、半島全土の寺院建築における模範となった。"
 #Thuriang Kilns
 building_type_thuriang_kilns_01: "$building_thuriang_kilns_01$"
 building_type_thuriang_kilns_01_desc: "$building_thuriang_kilns_01_desc$"
 building_thuriang_kilns_01: "トゥリアン窯"
 building_thuriang_kilns_01_desc: "この地には200基を超える大規模な窯が存在し、地域最大の青磁の生産地となっている。ここで焼かれる陶器は、粗く硬く焼き締まった質感と独特の黄緑色の釉薬で知られ、東南アジア全域の市場で取引されている。"
 #Yuelu Academy
 building_type_yuelu_academy_01: "$building_yuelu_academy_01$"
 building_type_yuelu_academy_01_desc: "$building_yuelu_academy_01_desc$"
 building_yuelu_academy_01: "岳麓書院"
 building_yuelu_academy_01_desc: "中国屈指の著名な学問所の一つである岳麓書院は、長らく学問と科挙試験の中心地として機能してきた。その配置は主庭を中心に、そこから幾世代もの学徒たちが科挙の準備に勤しんでいた講堂や東屋が、均整の取れた左右対称の形で広がっている。"
 #Chocolate Hills #NOTE: today are called "Chocolate" Hills, but of course chocolate didn't exist in the Philippines back then. This is a random name I thought out, but it is not based on native names (none of which seem to have survived from then)
 building_type_chocolate_hills_01: "$building_chocolate_hills_01$"
 building_type_chocolate_hills_01_desc: "$building_chocolate_hills_01_desc$"
 building_chocolate_hills_01: "赤褐色の丘"
 building_chocolate_hills_01_desc: "この地形の特徴といえば、見渡す限り広がる、丸みを帯びた無数の円錐状の丘陵群である。草に覆われているそれらの丘は、乾季になると鮮やかな褐色や橙色に変化し、大地に独特の秋の彩りをもたらす。"
 #Fanfang of Guangzhou
 building_type_fanfang_guangzhou_01: "$building_fanfang_guangzhou_01$"
 building_type_fanfang_guangzhou_01_desc: "$building_fanfang_guangzhou_01_desc$"
 building_fanfang_guangzhou_01: "広州の蕃坊"
 building_fanfang_guangzhou_01_desc: "#italic 蕃坊#!は外国商人たち、主に海上交易路を経てこの地にやってきたイスラム教徒のアラブ人やペルシア人からなる、重要なコミュニティである。彼らには都市の西側に独自の区画が与えられ、独自の役人と慣習を有している。中心部には高い尖塔と灯台を冠した赤い壁のモスクがそびえ、船と魂を安全な港へ導いている。"
 #Wilwatikta Palace
 building_type_wilwatikta_palace_01: "$building_wilwatikta_palace_01$"
 building_type_wilwatikta_palace_01_desc: "$building_wilwatikta_palace_01_desc$"
 building_wilwatikta_palace_01: "ウィルワティクタ宮殿"
 building_wilwatikta_palace_01_desc: "ウィルワティクタ宮殿は、東屋、大広間、寺院、そして中庭が広大に連なる複合建築群であり、一つの都市と見紛うほどの規模を持つ。敷地はレンガ造りの長方形の壁に囲まれ、参道への入り口には、見上げるほど大きな#italic パドゥラクサ門#!が連なっている。"
 #Ha Long Bay
 building_type_ha_long_bay_01: "$building_ha_long_bay_01$"
 building_type_ha_long_bay_01_desc: "$building_ha_long_bay_01_desc$"
 building_ha_long_bay_01: "ハロン湾"
 building_ha_long_bay_01_desc: "穏やかなエメラルド色の湾の水面からカルストと石灰岩の小島が突き出すこの絶景のもと、地元の漁師たちが獲物を求めて岩影の下に舟を漂わせている。"
 #My Son Sanctuary
 building_type_my_son_sanctuary_01: "$building_my_son_sanctuary_01$"
 building_type_my_son_sanctuary_01_desc: "$building_my_son_sanctuary_01_desc$"
 building_my_son_sanctuary_01: "ミーソン聖域"
 building_my_son_sanctuary_01_desc: "チャンパの寺院群の中でも最大かつ最も洗練されているこの聖域は、森林地帯に密集するいくつもの囲壁からなり、そのそれぞれに固有の門、祠堂、仏塔が備えられている。建造物はすべて赤レンガで造られて幾何学的に配置され、砂岩のリンテルによる装飾が施されている。"
 #Gunung Api
 building_type_gunung_api_01: "$building_gunung_api_01$"
 building_type_gunung_api_01_desc: "$building_gunung_api_01_desc$"
 building_gunung_api_01: "グノンアピ"
 building_gunung_api_01_desc: "手つかずの密林からそびえ立つこの山は、地元の人々にとって聖なる存在である。湿気と霧が立ち込めるその山腹は、鋭く突き出した石灰岩のピナクルや、長い年月の間に水に削られた深い洞窟が広がっている。"
 #Sulawesi Megaliths
 building_type_suwalesi_megaliths_01: "$building_suwalesi_megaliths_01$"
 building_type_suwalesi_megaliths_01_desc: "$building_suwalesi_megaliths_01_desc$"
 building_suwalesi_megaliths_01: "スラウェシのメガリス"
 building_suwalesi_megaliths_01_desc: "スラウェシ島中部の谷々に点在する数多くの巨像や聖像は、儀式を行い、精霊を祀るために地元の人々が建立したものである。#italic アルカ#!として知られるこれらの像には極めて緻密な彫刻が施され、繊細で優雅な線によってその形が描き出されている。"
 #Izumo Taisha
 building_type_izumo_taisha_01: "$building_izumo_taisha_01$"
 building_type_izumo_taisha_01_desc: "$building_izumo_taisha_01_desc$"
 building_izumo_taisha_01: "杵築大社"
 building_izumo_taisha_01_desc: "この偉大なる神社すなわち#italic 大社#!は、海に面した岸辺近くに建てられている。巨大な木柱と太い丸太に支えられてそびえ立つその社殿は、定命の者が歩む地上から持ち上げられ、この地の神々や精霊が住まう天へと高く掲げられている。"
 #Temple of Confucius
 building_type_confucius_temple_01: "$building_confucius_temple_01$"
 building_type_confucius_temple_01_desc: "$building_confucius_temple_01_desc$"
 building_confucius_temple_01: "孔子廟"
 building_confucius_temple_01_desc: "すべての孔子廟の中で最も古く、そして最も影響力を持つこの孔子廟は、広大な殿堂と中庭からなる複合建築群であり、その調和の取れた幾何学的な配置と洗練された細部によって、中国全土のみならず国外の寺院建築の模範や着想の源となってきた。傍らに広がる静かな森には孔子とその子孫たちの墓所があり、信奉者たちにとって重要な巡礼の地となっている。"
 #Imperial Citadel of Lin'an
 building_type_citadel_linan_01: "$building_citadel_linan_01$"
 building_type_citadel_linan_01_desc: "$building_citadel_linan_01_desc$"
 building_citadel_linan_01: "臨安の皇城"
 building_citadel_linan_01_desc: "鳳凰山の北斜面に沿って築かれたこの皇城は、宮廷と行政の中枢として機能し、その広大な広間や回廊には無数の学者や官吏たちが集っている。北方の都にある宮殿ほど広くはないが、段状に重なる庭園や東屋が持つ洗練された優雅さは、それらを凌駕するほどである。"
 #The Temples of Angkor
 building_type_temples_angkor_01: "$building_temples_angkor_01$"
 building_type_temples_angkor_01_desc: "$building_temples_angkor_01_desc$"
 building_temples_angkor_01: "アンコール寺院群"
 building_temples_angkor_01_desc: "繁栄する都市インドラには金色の寺院の屋根や尖塔が無数に連なっている。そしてそのどれもが神々やデーヴァラージャの彫像や精緻な浮き彫りによって、競い合うかのように贅を尽くして装飾されている。"
 building_temples_angkor_02: "アンコール・ワット"
 building_temples_angkor_02_desc: "アンコール・ワットは、ヴィシュヌ神に捧げられた巨大な寺院群である。ヒンドゥー教の神話に登場する神々の故郷、メルー山を表現するように作られている。立派な堀に囲まれた寺院群には宗教画、彫刻、レリーフで溢れる回廊がいくつもある。"
