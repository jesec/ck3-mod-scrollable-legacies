l_japanese:
 # Flight of the Tai, Mass migration main event
 tgp_tai_migration_event.1000.t: "タイ族の逃亡"
 tgp_tai_migration_event.1000.desc: "今日の評議会で、タイ族の集団移住について報告を受けた。タイ族の共同体の代表である[migration_leader.GetName]がいま、私の前に立ち、控えめに事情を述べはじめた。\n\n「我が[ROOT.Char.GetTitleAsNameNoTooltip]よ、我々は[migration_origin_holder.GetName]の元臣民として、あなたのお導きと新たな住処を必要としています。私は数千の民と多くの氏族を代表して、避難場所のご提供をお願いしに参りました。どうか我らをあなたの庇護下に置き、目的を与えてください。そうすれば我々は、あなたの寛大さに値する有用な僕となれるでしょう」\n\n彼らの運命は、私の言葉に懸かっている。"
 tgp_tai_migration_event.1000.a: "お前たち全員を客人としてではなく、臣下として迎え入れよう。"
 tgp_tai_migration_event.1000.b: "有能な者だけ、我が[ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip]に住むことを許そう。"
 tgp_tai_migration_event.1000.c: "人が増えれば問題も増える。よそを当たれ。"
 tgp_tai_migration_event_1000.c_shooed_immigrants_tt: "移民たちは近い将来、近くにいる別の統治者に避難所の提供を求める可能性がある。"
 tgp_tai_migration_skilled_development_county_modifier: "職人の逃亡"
 tgp_tai_migration_migration_happened_county_modifier: "タイの入植者"
 tgp_tai_migration_migration_happened_character_modifier: "無数の移民を受け入れた"
 tgp_tai_migration_migration_rejected_character_modifier: "移民の受け入れを拒んだ"
 # Lone skilled Tai character offers services
 tgp_tai_migration_event.2000.t: "有能なタイ族"
 tgp_tai_migration_event.2000.desc: "[migrant_skilled_character.GetCulture.GetNameNoTooltip]の地から来たという有能な[migrant_skilled_character.GetWomanMan]が、知識豊富な求職者として、私の前に立っている。[migrant_skilled_character.GetHerHis|U]の態度は、彼らが逃亡したという最近の知らせを反映しているようだ。\n\n"
 tgp_tai_migration_event.2000.wet_nurse.desc: "「聖下、私は[migrant_skilled_character.GetName]と申します。経験豊富な世話役として、お仕えする準備ができております。私は健康で栄養状態もよく、乳児の世話のことはよくわかっています。どうかご家系の繁栄のお役に立たせてください」"
 tgp_tai_migration_event.2000.champion.desc: "「偉大なる我が君、私は故郷では[migrant_skilled_character.GetName]として知られています。誓いを立てた戦士として、数々の試合で勝利を収めてきました。腕は確かで、この忠誠心は揺らぎません。どうかこの私をあなたの戦士にしてください」"
 tgp_tai_migration_event.2000.travel_leader.desc: "「我が[ROOT.Char.GetTitleAsNameNoTooltip]よ、私は[migrant_skilled_character.GetName]。砂漠を越え、星を道標とし、風を味方に旅をして参りした。私の導きがあれば、隊商が迷うことも、困難に遭うこともありません」"
 tgp_tai_migration_event.2000.master_of_hunt.desc: "「私は生まれながらの追跡者で、荒野で研鑽を積んできました。あらゆる獣の匂い、あらゆる森の静けさを知っています。獣の足跡を読み取ることにかけては、私の右に出る者はいません。いかがでしょう、我が[ROOT.Char.GetTitleAsNameNoTooltip]？」"
 tgp_tai_migration_event.2000.court_physician.desc: "「古書に記された軟膏と、窮地においても手際よく動くこの腕。[ROOT.Char.GetTitleAsNameNoTooltip]の神聖なるお体を鎮めるのに必要なのは、この私だけです。皆は私を[migrant_skilled_character.GetName]と呼びます」"
 tgp_tai_migration_event.2000.antiquarian.desc: "「私の目は神話を目撃し、私の手は古代帝国に触れてきました。私に任せておけば、古の知恵があなたの宮廷に届くことでしょう」"
 tgp_tai_migration_event.2000.court_tutor.desc: "「我が[ROOT.Char.GetTitleAsNameNoTooltip]よ、私は数多の戦士や政治家に影響を与えてきました。もしお許しをいだたけるのであれば、私の導きのもと、あなたの子孫も大いなる偉業を成し遂げることでしょう」"
 tgp_tai_migration_event.2000.end.desc: "\n\n[migrant_skilled_character.GetSheHe|U]は必死で避難場所を探しているようだ。おそらくここに来た理由が関係しているのだろうが、腕は確かなようだ。[migrant_skilled_character.GetHerHis]の技能を利用すべきだろうか？"
 tgp_tai_migration_event.2000.a: "お前の力が必要かもしれない。"
 tgp_tai_migration_event.2000.b: "いまはいいが、留まることを許そう。"
 tgp_tai_migration_event.2000.b.success: "[migrant_skilled_character.GetNameNoTooltip]が宮廷に加わる"
 tgp_tai_migration_event.2000.b.failure: "[migrant_skilled_character.GetNameNoTooltip]があなたの提案を断る"
 tgp_tai_migration_event.2000.c: "断らねばならない。"
 # Noble Tai character and his family are asking for a spare county
 tgp_tai_migration_event.3000.t: "家族思いの提案"
 tgp_tai_migration_event.3000.desc: "異国の者が背筋を伸ばし、自信に満ちた様子で広間に入り、ある申し出をしてきた。\n\nその人物は、田舎者らしい粗野な態度を取ることもなく、驚くほど丁寧な挨拶をした。そして我が領地へ至るまで、いかに自分の家族が悲惨な旅路をたどってきたか詳しく説明したあと、大胆な結論に至った。\n\n「…盗賊や略奪者どもの仕業なのです、我が[ROOT.Char.GetTitleAsNameNoTooltip]よ。すべてを奪われた私に残されているのは、確かな才能と鋭い観察眼による監督力、忠誠心、そしてあなたの助けを必要とする私の家族だけです。我が一族は、あなたに不要とされるまで、あなたの僕としてお仕えします」"
 tgp_tai_migration_event.3000.a: "忠誠を尽くす限り、願いは叶えてやろう。"
 tgp_tai_migration_event.3000.b: "公平な取引とは思えない。"
 # A family of lowborn peasant characters offer services
 tgp_tai_migration_event.4000.t: "タイの一家"
 tgp_tai_migration_event.4000.desc: "北の地からやって来た貧しい異国の民の家族が、護衛に連れられて広間に入ってきた。\n\n長々と物乞いの口上を述べたあと、家長は私を見つめ、持たぬものすべてを差し出し、この広大な宮殿の床を掃除することを申し出た。それと引き換えに、私の庇護下に置いてほしいという。彼の話によると、同じような者たちが私の庇護を求めて、我々の地に押し寄せているらしい。"
 tgp_tai_migration_event.4000.a: "苦難のときは庇護下においてやろう。"
 tgp_tai_migration_event.4000.b: "我が宮廷にお前たちは必要ない。"
