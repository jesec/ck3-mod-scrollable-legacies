l_japanese:
 aspect_upgrade_event_header: "[ROOT.Char.Custom('GetAspectNoun')|U]性："
 tgp_east_asia_mandala_events.1000.t: "$aspect_upgrade_event_header$上昇"
 tgp_east_asia_mandala_events.1000.t.final: "$aspect_upgrade_event_header$超越"
 tgp_east_asia_mandala_events.1000.desc.02: "歓喜と踊り、そして[ROOT.Char.Custom('GetAspectNoun')]の儀式を経て、[ROOT.Char.Custom('GetAspectNoun')]性の次の段階へと至ることで、私は[ROOT.Char.GetHouse.GetBaseName]家に誇りをもたらした。\n\n我々の#EMP 力#!の轟きと神々しい行いは、日を追うごとに多くの信者を引き寄せている。\n\n私はこの瞬間を堪能することにして、目の前に広がる祝祭の光景を眺めた。"
 tgp_east_asia_mandala_events.1000.desc.03.outro: "私は背もたれに寄りかかり、生贄の象徴と芸人たちが私のために踊るのを眺めている。#EMP我々の力が増大していく。#!"
 tgp_east_asia_mandala_events.1000.desc.creation_03: "創造性を称える祝宴、色彩と踊りと音楽の饗宴が開かれる。[ROOT.Char.GetHouse.GetBaseName]家が創造性の中間段階へ上昇したことを祝うものだ。\n\n我々は自身の神性を証明し、行動を起こすたびに、数多の信奉者を集めている。\n\nいや、信奉者を増やしているのは#EMP この私#!だ。彼らは#EMP 私#!を信じている。"
 tgp_east_asia_mandala_events.1000.desc.creation_04: "かなり騒がしい宴だ。これほど完璧に近い創造性を称えるのに、ほかにどんな方法があるというのか？踊りと儀式、ちらりと見える素肌が、創造を祝い、[ROOT.Char.GetHouse.GetBaseName]家のさらなる隆盛を祝っている。\n\n数多の信者たちは、我々の勢力を止められぬものにし、この世界における我々の地位を主張している。\n\n私は近くの卓から美味そうな[ROOT.Char.Custom('GetAspectNoun')]を掴み、宴の光景を楽しみながら頬張った。"
 tgp_east_asia_mandala_events.1000.desc.05.intro: "ついに[ROOT.Char.GetHouse.GetBaseName]家とその神聖な子孫たちの旅路は完結した。"
 tgp_east_asia_mandala_events.1000.desc.creation_05: "$tgp_east_asia_mandala_events.1000.desc.05.intro$\n\nもはや誰の心にも疑念はない。[ROOT.Char.GetHouse.GetBaseNameNoTooltip]の姉妹と兄弟たちは、創造性の印と素質を有し、創造主の業をこの地にもたらしているのだ。\n\nそして当然、創造主の統一的全体は#EMP この私#!だ。\n\n私は[ROOT.Char.Custom('RegionalDrink')]をもう一杯飲み干し、祝祭の数週間の始まりを告げた。"
 tgp_east_asia_mandala_events.1000.desc.serenity_03: "祝典は細心の注意を払って企画された。[ROOT.Char.GetHouse.GetBaseName]家が平穏性の中間段階に至るにあたり、費用が惜しまれることはなかった。\n\n人々が我々の平和な生き方に意義を見出すにつれ、我々に従う者たちは着実に増えていっている。\n\nこの世界をよりよい場所、より平穏な場所に導く機会を、私は大切にしよう。"
 tgp_east_asia_mandala_events.1000.desc.serenity_04: "壮大な祝典は、共同瞑想から始まった。静寂のなか、無数の人々が頭を垂れている様子に、私の心が躍る。いままさに完璧な平穏の境地に立つ[ROOT.Char.GetHouse.GetBaseName]家を称えるのに、これ以上の方法があるだろうか？\n\n無数の信者たちが、この世界における我々の居場所を示している。我々は平和と静寂、受容と合意を渇望している。\n\n私は再び黙祷と瞑想に頭を垂れ、そのことについて思いを巡らせた。"
 tgp_east_asia_mandala_events.1000.desc.serenity_05: "$tgp_east_asia_mandala_events.1000.desc.05.intro$\n\n敵が友となった。平和と繁栄が領国に満ちている。[ROOT.Char.GetHouse.GetBaseNameNoTooltip]家の兄弟姉妹がもたらした知恵と静穏は、[ROOT.Char.GetPrimaryTitle.GetBaseName]に永遠の印を刻んだ。\n\n平穏性の真の統一的全体に捧ぐ、真に静寂な祝祭である。\n\n人々の奥ゆかしい祈りと祝福に応え、私は慈愛の心で頭を垂れた。"
 tgp_east_asia_mandala_events.1000.desc.destruction_03: "兵士たちが武器を盾に打ち鳴らす轟音が響き渡り、[ROOT.Char.GetHouse.GetBaseName]家が破壊性の中間段階にと到達したことを告げる。\n\n我々の伝説は瞬く間に広まり、信奉者の数は以前よりもさらに増している。\n\n$tgp_east_asia_mandala_events.1000.desc.03.outro$"
 tgp_east_asia_mandala_events.1000.desc.destruction_04: "#EMP ドン、ドン。#!祝祭の儀式をおこなう[ROOT.Char.GetPrimaryTitle.GetBaseName]の兵士たちが足を踏み鳴らす、雷鳴のような轟音以外、何も聞こえてこない。兵士たちは[ROOT.Char.GetHouse.GetBaseName]家が完全なる超越に近づいたことを祝し、破壊の舞い真似ているのだ。\n\n信奉者たちは我々の大義に加わり、真の破壊性の下で奉仕することを切望している。\n\n私は儀式を観察しながら、刃を砥石で丁寧に研ぎ、ほくそ笑んだ。\n\n#EMP ドン、ドン。#!"
 tgp_east_asia_mandala_events.1000.desc.destruction_05: "$tgp_east_asia_mandala_events.1000.desc.05.intro$\n\n[ROOT.Char.GetHouse.GetBaseNameNoTooltip]の兄弟姉妹に誓いを立てた[ROOT.Char.GetPrimaryTitle.GetBaseName]の部隊が激しく足を踏み鳴らし、声を揃えて儀式をおこなう。まるで大地そのものが震え、揺れているようだ。\n\n兵士たちは神である私の前に跪いたあと、祝典を続けた。\n\n私は玉座にもたれかかりながら、儀式の際に贈られた頭蓋骨をぼんやりと撫でた。"
 tgp_east_asia_mandala_events.1000.desc.trickery_03: "私は[ROOT.Char.GetHouse.GetBaseName]家の悪戯好きな神々の伝統を継承した。祝典の儀式も歓喜に満ちている。\n\n一人、また一人と、[ROOT.Char.GetHouse.GetBaseNameNoTooltip]家の敵は不可解にも倒れるか、我々の信奉者になっていく。\n\n$tgp_east_asia_mandala_events.1000.desc.03.outro$"
 tgp_east_asia_mandala_events.1000.desc.trickery_04: "数多の献上品が[ROOT.Char.GetHouse.GetBaseName]家を宥めるために捧げられ、計略性はもはや完璧な領域にまで迫っている。\n\n金に毛皮、香辛料、貝殻に珍獣たち。信奉者たちは、我々を宥める術を知っている…果たして本当にそうだろうか？\n\nそれは#EMP この私#!が決めることであり、逆らう者は罠にかけてやろう。\n\n私は忍び笑いをした。"
 tgp_east_asia_mandala_events.1000.desc.trickery_05: "$tgp_east_asia_mandala_events.1000.desc.05.intro$\n\n表向きはすべてが祝祭の雰囲気に満ち、変わったところは何もないように見えるが、誰もがわかっている。ほんの小さな間違いや道徳的な過ちが、予測不能な[ROOT.Char.GetHouse.GetBaseNameNoTooltip]の神々を招きかねないと。\n\n彼らは皆、我々の、いや#EMP この私#!の神聖なる恩寵に授かろうと必死だ。\n\n私は群衆を見やり、次に私の注目に値する人物は誰か、狡猾に考えをめぐらせた。"
 tgp_east_asia_mandala_events.1000.a: "すべては定めのままに。"
 mandala_descendant_from_aspect_of_creation.tt: "あなたの[children|E]全員"
 mandala_descendant_from_aspect_of_creation_modifier: "創造の子孫"
 mandala_descendant_from_aspect_of_creation_modifier_desc: "この人物は高位に達した創造性を持つ者の子供である。"
 mandala_aspect_of_serenity_devotion.tt: "非攻撃的[war|E]の年数に応じて#P [EmptyScope.ScriptValue('num_years_of_peace_devotion')]#![piety_experience|E]を獲得する#WEAK （現在#P [THIS.Char.MakeScope.ScriptValue('num_years_of_peace_devotion_payout')]#![piety_experience|E]）#!"
 mandala_forged_from_aspect_of_destruction.tt: "あなたの[THIS.Char.Custom('KnightCulturePlural')]すべて"
 mandala_forged_from_aspect_of_destruction_modifier: "破壊の寵児"
 mandala_forged_from_aspect_of_destruction_modifier_desc: "この人物は高位に達した破壊性を持つ者の下で騎士として仕えた。"
 mandala_aspect_of_trickery_devotion.tt: "この時点に至るまでの成功した[scheme|E]に応じて#P [EmptyScope.ScriptValue('num_years_of_peace_devotion')]#![piety_experience|E]を獲得する#WEAK （現在#P [THIS.Char.MakeScope.ScriptValue('num_successful_schemes_devotion_payout')]#! [piety_experience|E]）#!"
 mandala_ascended_in_aspect_of_trickery_modifier: "高位に達した計略者"
 mandala_ascended_in_aspect_of_trickery_modifier_desc: "この人物は計略性を持つ者として高位に達した。"
 busy_in_mandala_succession: "あなたは現在、[mandala|E]の継承で忙しい"
 mandala_succession_header: "マンダラの継承："
 tgp_east_asia_mandala_events.8497.t.lose_by_default: "マンダラの継承の試練を続行できなくなった"
 tgp_east_asia_mandala_events.8497.tt.lose_by_default: "$tgp_east_asia_mandala_events.8499.a.tt.imprisoned$"
 tgp_east_asia_mandala_events.8499.t: "$mandala_succession_header$試練"
 tgp_east_asia_mandala_events.8499.intro.imprisoned: "[ROOT.Char.GetImprisonedBy.GetTitledFirstName]の地下牢の奥深くにいる私のもとに、ある知らせが届く。どうやら、我が[ROOT.Char.Custom2('RelationToMe', deceased_mandala_ruler )]である[deceased_mandala_ruler.GetFirstName]がこの世を去ったことで、私が長として領国を引き継ぐことになったようだ。"
 tgp_east_asia_mandala_events.8499.intro.recent_adult.imprisoned: "私はようやく成人を迎えようとしている。試練を受け、自身がいかに[ROOT.Char.Custom2('RelationToMe', deceased_mandala_ruler )]たる[deceased_mandala_ruler.GetFirstName]の後を継ぐに相応しい器かを証明できるときが、すぐそこまで来ているのだ。"
 tgp_east_asia_mandala_events.8499.desc.imprisoned: "\n\nだが、こんなふうに牢に入れられた状態の私に何ができるというのか。#EMP 神とは名ばかりで#、汚物にまみれて動物のような扱いを受けている、こんな私に！\n\n私はここを出たら必ず復讐をすると誓った。きっと#EMP 敵の頭上に、復讐の雨を降らせてやる#!。"
 tgp_east_asia_mandala_events.8499.desc.recent_adult: "時は満ちた！ついに試練に臨み、[ROOT.Char.Custom2('RelationToMe', deceased_mandala_ruler )]である[deceased_mandala_ruler.GetFirstName]の後を継ぐときが来た。\n\n各分野における私の優秀さを示し、その実績と人々の反応を見ることで、今後[ROOT.Char.Custom('GetAspectNoun')]の化身たる私に、どれだけの信奉者がついてきてくれるかがわかるだろう。\n\n私は#EMP 必ずや#![ROOT.Char.Custom2('RelationToMe', deceased_mandala_ruler )]の後継者となってみせる！"
 tgp_east_asia_mandala_events.8499.desc.was_traveling: "息を吐く暇もなく部屋に案内されると、浴槽には湯が張られ、衣服も[ROOT.Char.GetTitleAsNameNoTooltip]に相応しいものに着替えさせられた。\n\n素っ気ない扱いと、空気中に突如感じ取った冷気に鳥肌を立たせながら、私は来たる試練に向けて準備を整えた。\n\n[ROOT.Char.Custom2('RelationToMe', deceased_mandala_ruler )]の後継者に相応しい器であること、そして[ROOT.Char.Custom('GetAspectNoun')]の化身であることを証明する時がついに来た。"
 tgp_east_asia_mandala_events.8499.desc: "[ROOT.Char.Custom2('RelationToMe', deceased_mandala_ruler )]である[deceased_mandala_ruler.GetFirstName]は、もうこの世にはいない。[deceased_mandala_ruler.GetSheHe|U]は、[ROOT.Char.Custom('GetAspectNoun')]の化身として領国を導き、その名を歴史に刻む役目を私に託し、現世より高次の世界へと昇っていったのだ。\n\n試練に臨み、多くの面で優れた能力を披露できれば、私がいかに神々しく普遍的な存在であるかを証明できるはずだ。\n\n…一瞬、それが叶わなかったときのことを考えると、背筋に冷たいものが走った。"
 tgp_east_asia_mandala_events.8499.a: "準備は万端だ。"
 tgp_east_asia_mandala_events.8499.a.imprisoned: "必ずそうしてみせる。"
 tgp_east_asia_mandala_events.8499.a.flavor.imprisoned: "こんなはずではなかった…"
 tgp_east_asia_mandala_events.8499.a.tt.imprisoned: "[mandala_succession_succession|E]の試練に姿を現さなかったため、あなたは失格となる"
 tgp_east_asia_mandala_events.8499.a.tt.trials: "[mandala_succession_succession|E]の最初の試練が始まる"
 mandala_divine_retribution_modifier: "神罰"
 mandala_divine_retribution_modifier_desc: "この人物は自身の敵を滅ぼすことに人生を捧げている。"
 tgp_east_asia_mandala_events.8500.t: "$mandala_succession_header$失った頭"
 tgp_east_asia_mandala_events.8500.desc: "我々は今、私の即位を祝うための創造の儀の真っ最中にある。私は群衆に交じり、慈愛の笑みを向けながら、前に進み出てきた信奉者たちからの捧げ物を受け取っていく。\n\n人混みの中から現れた幼子があろうことか、私の腰に両腕を回して抱きつくと、こちらを見上げて、こんなことを訊いてきた。「ねえ、[ROOT.Char.GetTitleAsNameNoTooltip|U]…5つ目の頭はEMP 一体#!どこへ行っちゃったの？」\n\nこの無礼な行動に、[dummy_gender.GetHerHis|U]の世話係は凍りついていたが、室内の皆が耳をそばだてて、私の返答を今か今かと待ち望んでいる。"
 tgp_east_asia_mandala_events.8500.dynasty.override: "「先生に聞けば分かるはずだ」"
 tgp_east_asia_mandala_events.8500.a: "「私の罪と、他の者たちの嫉妬のせいでこうなってしまったんだよ」"
 tgp_east_asia_mandala_events.8500.a.final_aspect: "あなたはまだ、[aspect_of_creation|E]の最終段階に到達していない"
 tgp_east_asia_mandala_events.8500.success.tt: "あなたは[mandala_succession_succession|E]の、[stewardship|E]の試練に合格する"
 tgp_east_asia_mandala_events.8500.b: "「ああ、教えてあげよう…」"
 tgp_east_asia_mandala_events.8500.b.flavor: "#EMP だいたい#!、こんなところではないだろうか？"
 tgp_east_asia_mandala_events.8500.b.t.success: "大変説得力がある"
 tgp_east_asia_mandala_events.8500.b.tt.success: "あなたは皆を納得させる"
 tgp_east_asia_mandala_events.8500.b.t.failure: "興覚め"
 tgp_east_asia_mandala_events.8500.b.tt.failure: "群衆から不信の囁きが漏れる"
 tgp_east_asia_mandala_events.8510.t: "$mandala_succession_header$池の如き静けさ"
 tgp_east_asia_mandala_events.8510.desc: "従者たちが整列して跪くなか、私の即位の儀が執り行われる部屋に低い詠唱の声が響き渡っている。静かに歩き回りながら、私は何人かの額にそっと触れ、彼らに平穏と平静をもたらそうと試みた。\n\n儀式の最中、二人の[dummy_gender.GetWomenMen]が、大声で土地の一画を巡る口論を繰り広げている。\n\n二人が大騒ぎをしたことで、部屋中の注目がゆっくりと私に集まりはじめた。このように平穏を乱されて、私がどのように対処するのかを、皆が注意深く観察している。"
 tgp_east_asia_mandala_events.8510.dynasty.override: "「ここは聖地だ。静かにしないか」"
 tgp_east_asia_mandala_events.8510.a: "「土地も収穫物も、#EMP どちらも#!二人で分け合いなさい」"
 tgp_east_asia_mandala_events.8510.a.final_aspect: "あなたはまだ、[aspect_of_serenity|E]の最終段階に到達していない"
 tgp_east_asia_mandala_events.8510.success.tt: "あなたは[mandala_succession_succession|E]の、[diplomacy|E]の試練に合格する"
 tgp_east_asia_mandala_events.8510.b: "「では、#EMP このように#!問題を解決してはどうだ…」"
 tgp_east_asia_mandala_events.8510.b.flavor: "なぜ人とは、こうも狭量な生き物なのか…"
 tgp_east_asia_mandala_events.8510.b.t.success: "$tgp_east_asia_mandala_events.8500.b.t.success$"
 tgp_east_asia_mandala_events.8510.b.tt.success: "$tgp_east_asia_mandala_events.8500.b.tt.success$"
 tgp_east_asia_mandala_events.8510.b.t.failure: "$tgp_east_asia_mandala_events.8500.b.t.failure$"
 tgp_east_asia_mandala_events.8510.b.tt.failure: "$tgp_east_asia_mandala_events.8500.b.tt.failure$"
 tgp_east_asia_mandala_events.8520.t: "$mandala_succession_header$破壊の舞"
 tgp_east_asia_mandala_events.8520.desc: "私の槍が揺らめく松明の火に照らされ、観衆が灰にまみれた私の顔を静かに注視している。周囲には花々が咲き乱れ、法螺貝から低く震えるような音が響く。\n\n私は神の二元性を象徴する宇宙の舞——すなわち破壊の舞を踊ることを求められている。古き物を破壊し、新しい物が芽吹いて成長する余地を創造するためだ。\n\n広場の中央に設置された円柱型の石に近づくと、穏やかな涼しさを放っているのが感じられた。"
 tgp_east_asia_mandala_events.8520.dynasty.override: "「私はこのために生まれた。これは私の権利だ」"
 tgp_east_asia_mandala_events.8520.a: "こんなことは#EMP 朝飯前#!だ！"
 tgp_east_asia_mandala_events.8520.a.final_aspect: "あなたはまだ、[aspect_of_destruction|E]の最終段階に到達していない"
 tgp_east_asia_mandala_events.8520.success.tt: "あなたは[mandala_succession_succession|E]の、[martial|E]の試練に合格する"
 tgp_east_asia_mandala_events.8520.b: "さて。では、やってみるとするか…"
 tgp_east_asia_mandala_events.8520.b.flavor: "1、2、ええと…横か？"
 tgp_east_asia_mandala_events.8520.b.t.success: "$tgp_east_asia_mandala_events.8500.b.t.success$"
 tgp_east_asia_mandala_events.8520.b.tt.success: "$tgp_east_asia_mandala_events.8500.b.tt.success$"
 tgp_east_asia_mandala_events.8520.b.t.failure: "$tgp_east_asia_mandala_events.8500.b.t.failure$"
 tgp_east_asia_mandala_events.8520.b.tt.failure: "$tgp_east_asia_mandala_events.8500.b.tt.failure$"
 tgp_east_asia_mandala_events.8530.t: "$mandala_succession_header$真の幻想"
 tgp_east_asia_mandala_events.8530.desc: "私を見に——#EMP 私#!に魅了されるために観衆が集まってきた。人々が小声で会話をするなか鐘が鳴り、時間であることを告げる。\n\n私は円柱型の石のそばにある円の中に足を踏み入れ、手のひらで滑らかな円柱の冷たい表面に触れた。\n\n演説に備えて咳払いをすると、静まり返った数多の老若男女の顔が私に向けられる。"
 tgp_east_asia_mandala_events.8530.dynasty.override: "「先人たちについて話をしよう」"
 tgp_east_asia_mandala_events.8530.a.final_aspect: "あなたはまだ、[aspect_of_trickery|E]の最終段階に到達していない"
 tgp_east_asia_mandala_events.8530.success.tt: "あなたは[mandala_succession_succession|E]の、[intrigue|E]の試練に合格する"
 tgp_east_asia_mandala_events.8530.a: "「二元性の幻想について教えてやろう」"
 tgp_east_asia_mandala_events.8530.b: "「…欺瞞は#EMP 錯覚#!だと言ったらどうする？」"
 tgp_east_asia_mandala_events.8530.b.flavor: "少なくとも、民にはそう#EMP 思わせたい#!。"
 tgp_east_asia_mandala_events.8530.b.t.success: "$tgp_east_asia_mandala_events.8500.b.t.success$"
 tgp_east_asia_mandala_events.8530.b.tt.success: "$tgp_east_asia_mandala_events.8500.b.tt.success$"
