l_japanese:
 tgp_travel_danger_events.0001.t: "廃墟で生きる人々"
 tgp_travel_danger_events.0001.intro: "[ROOT.Char.GetCurrentLocation.GetName]を旅していると、至る所で[disaster_situation.GetType.GetNameNoTooltip|l]の影響が見られる。"
 tgp_travel_danger_events.0001.flood: "川岸には瓦礫が散らばり、家々は木の葉のように川を流れていく。村全体が激流に飲み込まれたのだ。"
 tgp_travel_danger_events.0001.earthquake: "かつて肥沃だった土地は今や荒れ果て、活気に満ちていた村は瓦礫に覆われて静まり返り、大地そのものに飲み込まれてしまった。"
 tgp_travel_danger_events.0001.desc: "\n\n廃墟となった町の端に到着すると、瓦礫の中に一人ぼっちの子供を見つけた。[peasant_character_child.GetSheHe|U]はこちらに気付かない。かつて農家だったと思われる建物を、必死に建て直そうとしているからだ。"
 tgp_travel_danger_events.0001.a: "部下に瓦礫を片付けさせよう。"
 tgp_travel_danger_events.0001.b: "[peasant_character_child.GetHerHim]を私の庇護下に置こう。"
 tgp_travel_danger_events.0001.c: "こんなことをしている暇はない！"
 impressed_by_kindness: "優しさに感動した"
