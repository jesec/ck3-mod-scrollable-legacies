l_japanese:
 #St Peter's Basilica
 building_type_holy_site_st_peters_basilica_01: "$building_holy_site_st_peters_basilica_01$"
 building_type_holy_site_st_peters_basilica_01_desc: "$building_holy_site_st_peters_basilica_01_desc$"
 building_holy_site_st_peters_basilica_01: "サン・ピエトロ大聖堂"
 building_holy_site_st_peters_basilica_01_desc: "サン・ピエトロ大聖堂は、キリスト教に改宗したコンスタンティヌス1世の命によりバチカンの丘の聖ペテロの墓跡地に建てられ、西方キリスト教の中心地としての役割を果たしている。\n\nこの教会は伝統的にローマ教皇の居所として使われ、レオニーネの城壁に守られながら、幾世紀もかけて広大な複合施設へと発展してきた。"
 #Mont-Saint-Michel
 building_type_mont_st_michel_01: "モン・サン＝ミシェル"
 building_type_mont_st_michel_01_desc: "$building_mont_st_michel_01_desc$"
 building_mont_st_michel_01: "サント・オベール礼拝堂"
 building_mont_st_michel_01_desc: "708年、アヴランシュの司教オベールは夢の中で大天使ミカエルの幻を見、近くの潮汐島に聖堂を建てるように命じられた。オベールははじめ、この啓示を悪魔の仕業だと考えて無視した。しかし大天使は、伝説によればオベールの頭に触れて頭蓋骨に穴を開け、ついにオベールを説得した。オベールはモン・トンブに新しい聖堂を建てるよう命じた。\n\nこれがモン・サン＝ミシェルの歴史の始まりである。"
 building_mont_st_michel_02: "モン・サン＝ミシェルのロマネスク修道院"
 building_mont_st_michel_02_desc: "この修道院の新しい教会は島の最も高い場所に建てられ、万物を司る神の力と人間の創造力の象徴となっている。\n\n修道院のふもとには、巡礼者や漁師の小さな町がゆっくりと形成されつつある。"
 building_mont_st_michel_03: "ラ・メルヴェイユ"
 building_mont_st_michel_03_desc: "修道院は回廊、礼拝所、ワインセラー、騎士の部屋、そして多くの宿泊施設によって拡張され、建築技術の驚異と呼ぶにふさわしいゴシック様式の建造物群を形成している。\n\n修道院には新しい強固な要塞も備わり、ふもとに広がる集落は、今や多くの巡礼者や住民を抱えるれっきとした町へと発展した。"
 building_mont_st_michel_04: "モン・サン＝ミシェルの要塞化された修道院"
 building_mont_st_michel_04_desc: "最近の戦争によって、モン・サン＝ミシェルのような平和な島でさえ戦略上の要所になり得ることが明らかになった。そのため、この岩の島は厚い壁や稜堡によって完全に要塞化され、駐屯部隊のために新たな宿舎も複数建設された。\n\n沿岸の町は今や活気あふれる都市となり、島を覆うように家々が建ち並んでいる。"
 #Sanchi Stupa
 building_type_sanchi_stupa_01: "$building_sanchi_stupa_01$"
 building_type_sanchi_stupa_01_desc: "$building_sanchi_stupa_01_desc$"
 building_sanchi_stupa_01: "サーンチーの大仏塔"
 building_sanchi_stupa_01_desc: "大仏塔は紀元前3世紀、マウリヤ朝のアショーカ王によって、妻デーヴィーとの婚礼の地近くに建立された。ブッダの聖遺物を納めたこの壮大な建造物は、この種の建造物としては最古級のものであり、精巧な彫刻の施された塔門でも知られている。"
 #Boudhanath
 building_type_boudhanath_01: "$building_boudhanath_01$"
 building_type_boudhanath_01_desc: "$building_boudhanath_01_desc$"
 building_boudhanath_01: "ボダナート"
 building_boudhanath_01_desc: "カトマンズのボダナート仏塔は、「ジャルン・カショール」や「カーサ・チャイティヤ」とも呼ばれ、最大級の仏塔のひとつである。後にチベット仏教となる教派の発祥地とも言われている。その巨大な丸屋根や曼荼羅には、複数の仏陀の遺物や、形や種類の異なるおびただしい数の聖遺物が納められている。\n\nネパールとチベットを結ぶ古代の交易路沿いに位置するため、旅人や商人がしばしば休息や礼拝のために立ち寄る。"
 #Grand Mosque of Yazd
 building_type_yazd_mosque_01: "$building_yazd_mosque_01$"
 building_type_yazd_mosque_01_desc: "$building_yazd_mosque_01_desc$"
 building_yazd_mosque_01: "ヤズドの大モスク"
 building_yazd_mosque_01_desc: "4世紀の拝火神殿跡に建てられた名高い建造物。巨大なイーワーン、タイル張りの丸屋根、空にそびえる双塔を冠した荘厳な正門が、旅人と巡礼者の双方を感嘆させる。"
 #Qutb Minar
 building_type_qutb_minar_01: "$building_qutb_minar_01$"
 building_type_qutb_minar_01_desc: "$building_qutb_minar_01_desc$"
 building_qutb_minar_01: "デリーの鉄柱"
 building_qutb_minar_01_desc: "デリーの鉄柱はチャンドラグプタ2世の栄光の象徴だが、その後の支配者たちもその名を刻んでいる。長い間建っているにもかかわらず、さびの形跡がないことがインドの鉄工たちの技術を物語っている！"
 building_qutb_minar_02: "クトゥブ・ミナール"
 building_qutb_minar_02_desc: "クワットゥル・イスラームは、古代の「デリーの鉄柱」を囲むように建つ大モスク。「クトゥブ・ミナール」と呼ばれる巨大な尖塔を頂いている。\n\nデリーの統治者たちの権力を象徴する荘厳な記念建造物である。"
 building_qutb_minar_03: "拡張されたクワットゥル・イスラーム・モスク"
 building_qutb_minar_03_desc: "クトゥブ・ミナールを中心とする複合建築群は、複数の中庭、門、霊廟が増築され、伝説的な規模に達している。"
 building_qutb_minar_04: "アライ・ミナール"
 building_qutb_minar_04_desc: "複合建築群に2つ目の尖塔が加えられた。この尖塔はクトゥブ・ミナールを模して作られたが、大きさはその倍を誇っている。デリーにそびえ立つこの巨塔はインド・イスラム建築の頂点をなす存在だ。"
