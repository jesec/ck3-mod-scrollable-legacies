l_japanese:
 elder_events.1000.t: "忘れられた存在"
 elder_events.1000.desc: "「[confusion_target.GetFirstName]、親愛なる[elder.Custom2('RelationToMeShort', SCOPE.sC('confusion_target'))]よ——会えて嬉しい！」私の[ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('elder'))]、[elder.GetFirstName]は私の目を見つめてそう言った。笑顔の裏に、一瞬不安がよぎる。「君は[confusion_target.Custom('ComplimentAdjective')]人間だ。だからこそ君は私の一番のお気に入りなのだよ」\n\n[elder.GetHerHis]の[GetTrait('withering_mind').GetName( GetNullCharacter )]は、私と私の[confusion_target.Custom('SisterBrother')]を取り違えているらしい…\n\nだが明日は、他人と思われるかもしれない。"
 elder_events.1000.a: "違います、[ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('elder'))]。私は[ROOT.Char.GetFirstNameNoTooltip]です！"
 elder_events.1000.b: "な…いえ、こちらこそお会いできて嬉しいです…"
 elder_events.1100.t: "階段の先"
 elder_events.1100.desc: "私は何度もこの階段を登ってきた。それなのに、なぜ今日はまるで[mountain_reference.GetName]の山を登っているような気になるのだ？\n\n足が震えて、膝から力が抜ける。支えるものは何もない。\n\n私は階段の下へと転がり落ちた。"
 elder_events.1100.a: "わぁーっ！"
 elder_events.1100.bodyguard: "助けてくれ！"
 EVENT_WINDOW_OPTION_AVAILABLE_BODYGUARD: "この選択肢はあなたに[GetCourtPositionType('bodyguard_court_position').GetName()]がいるため選択可能"
 EVENT_WINDOW_OPTION_AVAILABLE_TUTOR: "この選択肢はあなたに[GetCourtPositionType('court_tutor_court_position').GetName()]がいるため選択可能"
 partially_mute_modifier: "発話困難"
 partially_mute_modifier_desc: "この人物は加齢に伴う病のため、話すのが非常に困難だ。"
 elder_events.1200.t: "麻痺"
 elder_events.1200.desc: "それは突然襲ってきた。体の左側が痺れる。笑おうとするが、唇が動かない。\n\n話そうとする。だが声が出ない。\n\nしばらくすると声は戻ったが、[ROOT.Char.GetFaith.NegativeAfterLife]の恐怖は後を引いている。"
 elder_events.1200.a: "…"
 elder_events.1300.t: "忘れられた教え"
 elder_events.1300.desc: "この[ROOT.Char.Custom('education_scroll_subject')]の巻物は読んだことがあっただろうか…思い出せない。読んだような気もする。\n\nこの内容を私は学び、教育を受けたはずだ…\n\nそう。私の…教育…"
 elder_events.1300.a: "そこまで重要な内容ではなかったはずだ…"
 elder_events.1300.tutor: "思い出すには助けが必要だ。"
 elder_events.1400.t: "ひとしきりの情事"
 elder_events.1400.desc: "「ベッドに来なさい、私の[ROOT.Char.Custom('RomanticComplimentAdjective')][ROOT.Char.Custom('RaunchyComplimentNoun')]よ」と、[ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('lover'))]の[lover.GetFirstName]が[lover.Custom('PurrGrowl')]。[lover.GetHerHis]の目は欲望に燃えている。「[lover.Custom('GetRaunchyPrefix')][lover.Custom('RaunchyComplimentNoun')]が何を学んだか、少しは気にならないのか？」\n\n[lover.GetSheHe]はニヤリと笑って唇を噛むと、シーツの上に体を沈み込ませた。\n\n「さあ、今すぐ」"
 elder_events.1400.a: "千頭の馬も私を止められない！"
 elder_events.1400.b: "[ROOT.Char.GetFaith.HighGodName]よ、この[lover.GetWomanMan]から私をお救いください。"
 death_best_sex_of_their_life: "人生最高の性行為中に心臓発作を起こした"
 purrs: "甘い声で言う"
 growls: "低く唸る"
 raunchy_little: "小さな"
 raunchy_sweet: "優しい"
 raunchy_pretty: "可愛い"
 raunchy_bold: "大胆な"
 raunchy_wild: "野性的な"
 raunchy_fiery: "狂暴な"
 raunchy_young: "若い"
 raunchy_eager: "情熱的な"
 elder_events.1500.t: "命懸けの情事"
 elder_events.1500.desc: "「昔は[lover.Custom('GetRaunchyPrefix')][lover.Custom('RaunchyComplimentNoun')]と呼ばれていたのだ」我が[lover.GetWifeHusband][lover.GetFirstName]はそう言ってかすかに笑みを浮かべると、ため息をついた。「それが今や階段を登るだけで息切れする有り様だ…」\n\n私の若々しい活力で、[lover.GetHerHim]に求められる感覚を思い出させてやることはできるだろう。\n\nだが[lover.GetHerHis]の[GetTrait('faltering_heart').GetName( GetNullCharacter )]は大丈夫だろうか？"
 elder_events.1500.a: "人生最高の思いをさせてあげよう！"
 elder_events.1500.b: "やめておいた方がいい。"
 elder_events.1600.t: "時には抗えない"
 elder_events.1600.desc: "私は走る。だがすぐに止まる。息が切れてしまったからだ。\n昔は[ROOT.Char.Custom('ResidenceBuilding')]の周りを何周も走れたというのに…\n\nまた走り出す。転びそうになる。また止まる。\n\nひ弱な体に憎しみを覚える。"
 elder_events.1600.a: "走るのはもう終わりだ。"
 elder_events.1600.b: "痛みに耐えて#EMP やらねば#!ならない。"
